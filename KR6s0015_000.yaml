front:
  text: 藏經音義隨函録前序漢中沙門釋可洪撰振邍夫界情實相本不窊窿大我玄宗元無眹兆加以量含海嶽壽等太虛體自天真詎煩雕琢良以根情不斷來託𡖉胎種識未忘還依溼化四生既有三界莫空以苦趣為家鄉即幻軀為屋舍循環永劫何嘗生返本之心流浪長時未省發還源之念既迷真際恆歷險徒縱念夷方𠕀知出要是故諸佛調御以大慈悲曲入稠林示其正道聖人雖現非言說無以適其時言說既興非文字無以傳其旨然則衆生之性利鈍不同諸佛化生設教亦異或有不瞚不言而作佛事或有動眉動目而誨衆生或有以念以身名為說法或有㐸㰦謦咳號曰宣談或有方便隨機以文字說即我等教主釋迦文佛是也文字既用典誥爰彰十聖三賢咸依取則繇是資乎詁訓足以聲明四辨斯圓萬法皆爽然後得真忘像得意忘言於域外而蠱融在寰中而倜儻豈不善矣哉實由師範也然藏經文字謬誤頗繁以要言之不過三種或有巧於潤色考義定文或有妄益偏傍率情用字或有此方無體假借成形或有書寫筆訛减增畫點筆訛則真俗並失用乖則句味兼差令討義者口於天書𢔌誦文者躑躅於鳥跡此皆筆受者肆其胸臆謄流者弄厥槧毫遂令坦路變為丘墟瓦礫渾其珠玉吁哉取捨兩端實難棤筆只欲依文喚也又反義焉只欲就義呼之復違字矣更相遞㸦胥屠黴聿思之寧從佛語經云依智不依識依義不依文茲言是也雖諸陀羅𡰱及人非人等名字難究其旨亦在俗用書錯中攝今之所撰或有將雙譯對會以施行或有諸藏勘同詳之取定或有撿諸先作據舊而呼或有自遹𧦧懷輒為音釋且如羯鞞之字作𪂃鞕骯之文為䩕䨾礨將為蓓蕾䒵莇以當薅鋤庶幾乃使謶譏狎習而用䛅謵被褡仍施被闟天殅又設天𩄆謙嗛莫分躄癖相紊並是率意所用者也如喇𡀩哩𠼝已上四字彈舌呼之𠷖𠰏㕨𭌂咤𭈂嗦𠻱𡃝㘕𭊂已上諸字並彈舌呼𤚥𤙖𡅖𡖺等文𬾢𧩰之字並是假借所用也如骨瑣變為骨琑病𤸃更為病瘦琉璃遂成琉瑀真珠轉作瑱珠蠍畫形竭書鴗體攝搹莫辨𩚠飾寧分填之流之類並是書人筆誤也如是等例略舉二三厥數頗多羌難具列洪幸依龍藏披攬衆經於經律論傳七例之中録出難字二十五卷除其雙書翼從及以注正說文於中同號別章名殊體一凡具音𭃄者總一十二万二百二十二字首尾十載綴撰方周用紙九百張寫成十五目曰藏經音義隨函録焉於是橫維函號縱列經題傍布文身下安𭃄腳所冀文無交㸦字有區分開軸而落落終篇啓卷而聮聮盡品雖貧義詁粗有指歸遊法海者虛舟歷詞園者要路所有諸師誤釋經裏譧文並皆詳審是非注之內仍興嬥唱紀述源由諸碩學洪儒望不於寡拙耳時天福五年歲次庚子六月二十日也從長興二年辛卯歲起首序內文字音𭃄如後種識上之勇反子也謂種子識也槧毫上七廉反上巨往反下往反相乖背也黴聿上莫對反自遹羊律反𧦧懷上羊支反𪂃上音羯下音脾諸師並音曷卑非也鞕骯上五更反下戶朗反䩕二同上諸師音昂剛非也䨾礨上扶味反下鹿罪反經中以為蓓蕾字蓓蕾上步罪反下郎罪反䒵莇上音蒿下音鋤正作薅鋤下郭音葅非也謶譏上音斫經中以為庶幾字䛅謵上呼甲反下昌涉反經中以為狎習字用也被褡音答經中作闒字也闟音吸天殅音晴經中作𩄆謙嗛上苦點反經中以為謙苦字也躄躃上卑益反下毗益反喇𡀩上魯割反下魯角反哩嚟上魯耳反下魯兮反𠷖𠰏上方梵反下芳梵反㕨上云梵反下扶泛反𭌂咤上丑陷反下丑嫁反𭈂嗦上多各反下蘇霍反𠻱𡃝上魯丞反下魯昆反㘕𭊂上魯巖反下魯之反𤚥𤙖上牟含反下牛鳴音𡅖𡖺上名養反下名夜反𬾢上子耶反下之靴反𧩰上毗僭反下毗約反骨琑郭氏音消經意是瑣琉瑀音禹經音是璃瑱珠上瞋殿二音經意是真徒冬反經意是蠍鴗音立經音是竭槅音厄經音是攝𩚠音勑經意是飾填上音𥥆下音𡨋又音田誤上徒田反下音學
