body:
  text: 漢中沙門可洪撰依河府方山延祚藏依開元目録見入藏大小乘經律論傳七目㹅一千七十六部五千四十八卷四百八十帙所撰諸經音義共一十五冊大乘經五百一十五部二千一百七十三卷二百三帙大乘經音義第一之一天地玄黃宇宙洪荒日月盈𣅳辰宿列張寒來暑往秋收冬藏閏餘成律呂調陽雲騰致雨露結為霜金生麗水玉出昆㟠劒號巨闕珠稱夜光果李奈菜重芥薑海鹹河淡鱗天大般若經一部六百卷六十帙第一帙第一卷聖教序第一首太宗皇帝製窺天上丘隨反小視也正作窺窺二形也鑑地上古懺反察也正作鑒豪里之反十毫曰也正𭕲也挹之上一入反蠢蠢春尹反區區丘俱反庸鄙上余封反下悲美反拯含上無韻反取蒸字上聲呼之也救也助也紛糾上芳文反下居黝反詎能上其與反豈也未也慨深上苦愛反歎也折理上先擊反探上他含反下仕責反際也三篋苦頰反藏也謂菩薩藏獨覺藏聲聞藏為三篋波濤徒刀反泫其上玄犬反卉木上許鬼反聖教序第二首高宗皇帝製䡄𨅛直玉反綜括上祖宋反宏遠上戶萌反祕扄古營反外關也黔黎上巨廉反黑也秦始皇帝改民為黔首下音犁衆也𣫍衽而禁反衣襟也昆蟲直中反神甸音殿崛山上其勿反山短而高也又梵言耆闍崛山唐言鷲峯山也嵩華上息中反中嶽是也下胡化反西嶽是也𥧼以上千結反私也淺也按字樣作竊也玄奘徂朗反大也三藏名齠齓上徒聊反小兒髮也下初吝反男八歲而去齒也謂留髮去齒也久植亦作殖同音食植種也殖生也足嶽上將句反添也大般若經初會序大唐西明寺翻經沙門玄則製遠覃音曇及也延也罕莫𠋫反正作瓊振上巨營反備乎上皮祕反敷弘上芳無反之𡍕音牒城上女牆也紛上音悅簡也淺躁子告反動也拘攣吕貟反解桎之日反械別名媲司上匹計反配也聮章上力延反闡緩胡管反恐貽音怡遺也搦扎上女宅反下側八反筆別名也炯誡上古逈反明也經文塢波上烏古反威肅音宿熙怡上許之反下與之反和恱㒵也頻蹙子六反迫也俱𦙁陟𡰱反數名也十万為一浴吳一百洛為一俱𦙁万万為億須音逾捨軛音厄庚余主反正作𢈔也殑伽上其陵反下其迦反舊云恆河兩趺亦作跗同音夫本也腳板㹅名也兩跟音根四踝戶瓦反兩脛胡定反兩腨時軟反兩膝音悉兩髀步米反兩股音古兩腋以益反兩音博兩肘知酉反兩碗烏亂反正作腕項胭上胡講反下一賢反頷上以支反下胡感反頰額五格反爆補㒵反火裂聲也此字只一字為句細䎡音軟無睱音下間也八難處也險惡上許撿反下烏各反聾者上洛紅反啞者上烏雅反除愈余主反安適音釋樂也捨喧音暄欻尓上許勿反無繁音煩猶豫上余修余秀二反下余慮反不定也𮌨脹上匹絳匹江二反下音帳臭而大也膿爛上奴冬反下郎歎反青瘀於去反喙噉上音卓正作啄又許穢反非也罣礙上戶卦反床榻音塔床也財㯏古木反陂湖上音碑下音胡飄擊上匹邇反穅𥢶上苦郎反下苦外反苦怪反麁糠也𢙉觴尺玉反正作觸也又音傷誤若𫔝者文正作聞也耳知聲也郭氏作呼目反非也凶黨上音惡也下都朗反輩也魁膾上苦回反下古外反伽羅上巨迦反梵言補特伽羅此六數取趣也亦云人亦云衆生如人無我百法論作補特加羅無我又如八揵度論作人跋渠發智論作補特加羅納息也繕那上成戰反掉舉上徒了反來嬈奴了反苛酷也又戲弄也又音繞亂也又呼𠮧反迅速上信峻二音疾也如燎力小力照二反高原音原捫摩上音門手撫也有舋許吝反劇苦上巨逆反艱也增也微笑音笑作笑螺貝上洛禾反嗢鉢上烏沒反亦云優鉢羅此云青蓮華奔荼宅加反或云奔拏利或云分陀利或去芬陀利花此云白蓮華地第二帙頭頸居郢反前曰頸後曰項也又巨成反肩膊音博正作髆也胸𦚰上許容反下許劫反𦝫脊音積髀膝上步米反下幸七反腨脛上市軟反下胡定反又作脛陽焰音焰古經云野馬也又羊陝反火初著也雜染上在匝反正作雜也雜染同上玄第三帙第卅一卷八勝尸證反古作勝三昧名八勝處也又古譯經云八除入亦云八惟無亦云八惟務八脫音勝在二紙第二十行內黃第四帙瞋恚於季反怒也悼舉上徒了反動也正作掉也又徒到反非也四暴亦作瀑蒲報反急也卒也又蒲卜反流軛烏革反車轅端曲木奮迅上方問反下私俊反鳥振毛羽也正作奮奎也下又音信缺呿正作㐸㰦上音缺下音去張口也緾擾音繞亂也若捴則孔反合也普也皆也并結也古文作㹅字樣作總徵責上陟陵反諂誑上丑染反又音叨非也宇第五帙不眴音舜動也亦作瞬瞚缺呿音去瑕隟上戶加反下丘逆反壁孔也𭜨也間也正隙也字從崇丘逆反喧諍上許元反下阻迸反不喜許記反好樂也巢穴上助交反摽𢡠上必遙反下尺志反正作慓𢡠也下又試志二音所恃時止反依也毀訾音紫𮌨脹上匹江反下知亮反膿爛上奴冬反新韻闕此字舊韻有青瘀於去反喙噉上音卓正作啄也鳥𪅎啄也字從豕骸骨上戶皆反有伺相寺反舊經云有覺有觀定當擐音患掛甲也又音關固鎧若改反甲別名那𢈔余主反百俱𦙁名阿由多十億百阿由多那由多千億也那由那𢈔一義也劇苦上巨逆反自植音食種也忿心上芳粉反怒也洲渚上音州下音煮尓匹云水中可居曰洲小洲曰渚小渚曰沚也喜法上音喜慕也揭路荼上音竭下宅加反亦伽樓羅亦云誐嚕拏唐言食吐悲苦聲鞭撻上卑遠反下他達反宙第六帙不眴音舜缺呿音去瑕隟上戶加反下丘𨒫反慓𢡠上音飈下音熾並從巾蠲除上古玄反除也偱身上音旬歷也循亦巡也伽𦙁上巨迦反下丁𡰱反袈裟名也舊經云僧伽梨此云復衣從九條已上至二十五條皆名僧伽𦙁飲上昌恱反正作𡂜𥧝𮄊上五故反下七朕反臥覺也正作𡩺寢分拆先擊反剖為上普口反緾裏音果正作裹也𮏴脉上音斤下音麥心肝音十肺腎上芳廢反下時忍反脾膽上蒲卑反下都敢反胞𦝩上匹包反下云貴反屎尿上尸旨反下奴吊反洟唾上吐計反涎淚上序延反口液也下力遂反淡膿上正作痰徒甘反心上水病也下奴冬反血也肪𦙽上方房二音下乘安反腦膜上音𢙉下音莫矃上尺之反下奴頂反耽著上都舍反修身觀上音巡正作循下古亂反定也淡泊上徒敢反下普百反靜也正作憺怕亦作惔怕也下又音薄非𮌨脹上匹江反下知亮反青瘀於去反鵰鷲上丁聊反下疾秀反鵄梟上尺脂反下古堯反𧆞豹布㒵反或喙音卓誤或爴古麥反搭獸物也應和尚云冝作欔俱縛反今冝作擭為號反手取也𪙁掣上側加反下昌世昌列二反獸爭食㒵也潰爛上戶內反散也蟲蛆上除中反下七余反腐肉上扶武反臭也糜爛上夷為反正作㸏腨骨上市軟反膝骨上星七反髁骨上苦瓦反髖骨上苦官反𦚰骨上許劫反𦙄骨上許容反亦作胸膊骨上音博正作髆又音博反𦚰也誤頷骨上戶感反又音含頰骨上古俠反髑髏上音獨下音樓頭骨也日暴蒲報蒲水二反日乾也鴿色上古合反䇿勵上楚責反令上于垂反當也正作為也此是書人誤書人字而就裏著為字也經云已生善法為令安住哀字上烏可反正作裏娜字上奴可反砢字上羅可反亦作拖字上徒可反婆字上蒲可反荼字上宅雅反穢上居小反亦作橋沙字上所雅反縛字上扶可反䫂字上扶可反瑟吒上所擲反下雅反二合迦字上居也反娑字上桑可反磨字上莫果反伽字上其可反他字上吐可反闍字上時可反濕縛上失入反下無可反二合達字上借音徒賈反佉字上丘也反羼字上借音又雅反薩䫂上借音桑紇反若字上而者反辣他上郎割反下吐可反呵字上呼可反薄字上蒲可反綽字上借音車者反颯磨上乘合反下莫果反嗑縛上古臘反下無可反蹉字上借音倉可反鍵字上求偃反揥字上借音加反拏字上女加反頗字上普波反塞迦上乘紇反下九耶反逸娑上音溢下上聲酌字上借音之可反吒字上借音加反擇字上音宅亦冝借音茶放光經作嗏摩訶般若經作茶也揭路荼上音竭下宅加反鳳凰神名也金翅鳥也亦名迦樓羅亦名誐嚕拏亦云伽樓羅此云食吐悲苦聲緊捺上居引反下奴逮反樂神名緊捺洛亦云緊那羅亦云甄陀羅亦云真陀羅皆一義也緊此云疑捺洛此云人謂此神似人頂有一角令見者疑云人耶非人耶慢傲上莫諫反下五告反猒戚上一焰反下倉歷反所稟彼錦反受也吠琉璃上𦘺廢反青琉璃也其莖戶耕反枝葉以接反殑伽上其陵反斜正上序蹉反紫縹匹沼反青黃色洪第七帙三乘共目十地如後異生上羊吏反別也坐禪三昧經云得暖法人也亦名得涅槃分善根人也注云不共無漏故言異也舊言凡夫非也又大智度論云乾慧地釋云乾慧地有二種一者聲聞二者菩薩聲聞人獨為涅故勤精進持戒心清淨堪任受道或習觀佛三昧或不淨觀或行慈悲無常等觀集諸善法雖有智慧不得禪定水則不能得道故名乾慧地菩薩則初發心乃至未得順忍已來惣名乾慧也華嚴經云隨順世俗生長善根是童蒙凡夫人明了法種性大智度論作性地釋云性地者聲聞人從燸法乃至世閒第一法於菩薩則得順忍愛著諸法實相亦不生邪見得禪定水惣名性地華嚴經云得無礙不壞信覺法自性是隨信行人明了法第八大智度作八人釋云八人者從苦法忍乃至道比忍是十五心於菩薩則是無生法忍入菩薩住者惣名八人地華嚴經云勤修習法隨順法住是隨法行人明了法遠離八邪向八正道是第八人明了法具見大智度論作見地者釋云見地者初得聖果所謂須陀洹果也於菩薩則是阿鞞跋致地惣名見地華嚴經云除滅衆結斷生死漏見真實諦是須陀洹人明了法也薄地大智度論亦作薄地釋云薄地者或須陀洹或斯陀含欲界九種煩𢙉斷故於菩薩則過阿鞞地乃至未成佛來斷諸煩𢙉餘氣亦薄地華嚴經云觀味是悉知無往來是斯陀含人明了法離欲大智度論亦作離欲地釋云離欲者離欲界等貪欲諸煩𢙉是名阿那含於菩薩離欲因緣故得五神通惣名離欲地華嚴經云不樂三界求盡有漏於受生法乃至一念不生愛著是阿那含人明了法已辨大智度論云已作地釋云已作地者聲聞人得盡智無生智無著阿羅漢於菩薩則成就佛地惣名已作地華嚴經云獲六神通得八解脫九定四辨悉皆成就是阿羅漢人明了法也獨覺大智度論作辟支佛地釋云辟支佛地者先世種辟支佛道因緣今世得小因緣出家亦觀深因緣法成道名辟支佛辟支佛秦言因緣亦名覺華嚴經云性樂觀察一味緣起心常寂靜知足少事因緣自得悟不由他成就種種神通智慧是辟支佛人法菩薩大智度論亦作菩薩地釋云菩薩地者從乾慧地乃至離欲地又從歡喜地至法雲地皆名菩地又從一發心來乃至金剛三昧名菩薩地華嚴經云智慧廣大諸根明利常樂度脫一𭃄衆生勤修福智助道之法如來所有十力無畏功德具足圓滿是菩薩人明了法如來地大智度論云佛地釋云一𭃄種智等諸佛法圎滿故名佛地瑜伽論云永斷最極細煩𢙉及所知障無礙於一𭃄種所境界現等覺故名佛地荒第八帙劇苦上巨逆反難也僮僕上徒東反下蒲上反策勵上初責反爆補㒵反只一字為句天帝大智度論云釋迦提婆因堤秦言能天主即釋提桓因也是忉利天王也仁王經云若菩薩摩訶薩住千佛剎作忉利天王善時分天夜摩天王也大智度論云須夜摩秦言妙善唐言善時分仁王經云若菩薩摩訶薩住万佛剎作夜摩天王妙喜足天覩史天王也大智度論云兜率陀秦言妙足唐言妙喜足亦云知足仁王經若菩薩摩訶薩住億佛剎作覩史多天三妙變化天樂變化天王也大智度論云須涅蜜陀秦言化樂天唐言樂變化天仁王經云若菩薩摩訶薩住百億佛剎作化樂天王自在天他化自在天王也大智度論云婆舍提秦言他化自在天仁王經云若菩薩摩訶薩住千億佛剎作他化自在天王大梵天初禪天王也大智度論云梵天王名尸棄秦言大梵天智度論云已上更無王也仁王經云若菩薩摩訶薩住万億佛剎作初禪梵王極光淨天二禪天王也大智度論云從此已上無王長阿含等經云菩薩不生此天仁王經云若菩薩摩訶薩住百万微塵佛剎作二禪梵王遍淨天三禪天王也長阿含云遍淨天王名淨智四辟捉貝持輪御金翅鳥仁王經云若菩薩摩訶薩住百萬阿僧祇微塵數佛剎作三禪梵王廣果天四禪天王也長阿含云嚴餝果實天王名法花光四禪惣名廣果天也仁王經云若菩薩摩訶薩住不可說不可說佛剎作第四禪大梵天王為三界主爔赫上許冝反日光也正作曦也蔽諸上必祭反掩也如㢕於容反有疫音伇人之皆病也時疾也有癘力世反瘴疫也古為疥癩字安撫芳武反安存也寬廣上苦官反日第九帙迦葉上音加下音攝梵云迦葉波唐言飲光姓迦波也本名畢鉢羅耶那此云樹下生懈廢上古賣反下正作廢月第十帙梵輔扶武反初禪中第二天名為梵輔亦云梵富貴無繁音煩又音婆五淨居中初淨居天也亦云不煩亦云無造亦云阿比婆亦云無䛘塢波索迦上烏古反唐言近事男謂能近事餘律儀故又親近承事諸善士故舊經云優婆塞是也塢波斯迦唐言近事女舊云優婆夷諸險許奄反毛竪常主反正作豎災撗上子才反正作災嶮𢙣上音險下或作惡僚佐上力條反下則個反揭路荼上其列反下宅加反緊㮏上吉引反下奴達反邏剎上來個反甘蔗之夜反籚葦上洛胡反下為鬼反稻麻上徒老反空隟上苦貢反下丘逆反須音逾盈第十一帙讎隟上市由反凌辱上力繩反欺也適興上音釋才也忿恚上芳粉反下於季反螫噉上呼各反蛇傷也又音釋軍旅音呂敗𬽐上北邁反破他曰敗也又蒲邁反自破曰敗也下乘浪反亡也正作喪眘二形軍旗音其蠱道上音古毒藥也寶筒徒東反窣堵上蘇骨反正作窣也下都古反梵云窣堵波唐言方墳即佛塔是也揔持上則孔反皆也正則㹅總二形又音窟誤悖蒲沒反夭歿上於少反下莫骨反死也譴罰上去戰反下扶發反問音信補羯上卜古反下居謁反亦云卜羯婆唐言除糞擔死尸等鄙賤種類也屠膾上達胡反下古外反漁獵上牛居反達上商遇反西天四姓之一也一者婆羅門此言淨行也二者剎帝利王種也此言上田主三者吠舍此言商賈四者達羅此言農人伺求上相寺反奮威上方問反勇𨦣以芮反摩揭音竭亦云摩伽劫比毗鼻二音國名舊云迦毗羅城吠舍上𦘺廢反亦云毗舍離國栗呫上力一反下昌反或云離車或云掣此云薄皮亦云同皮謂波羅奈國夫人生一肉皰後分為二人是一男一女長大立國因以為名也祥茅音猫慶喜梵言阿難陀唐言慶喜以世世忍辱除瞋故生便端政見者歡喜故以名之𣅳第十二帙無字辰第十三帙惟上息慈反念也正作思也在第一百二十六第十二紙第八行內健達縛上其建反下借音扶波反樂神名也大智度論云𠃵闥婆真陀羅亦云童籠摩亦云崘摩甄陀羅此言樹揵達縛上與健字同也又巨焉巨偃二反誤揭路荼上音竭下宅加反芬馥上芳文反下音伏掃拭音識蓋上許偃反窣堵上乘骨反瑜伽上欲朱反下巨迦反此云相應亦云修行道地也邊鄙悲美反達絮息憲反亦云達須言此等人微識佛法不能堅固修行也戾車上一莫結反正作篾亦云離車唐言樂垢穢人言此等人全不識佛法踰於上音逾越也𡧱上奴老反除愈余主反差也蛇蝎許謁反正作蠍也又音曷食挂蟲也非用尓匹云蝎桑也癩疾上音賴亦作癘腫疱步孝反氣皰也正作靤眩翳上玄縣二音下一計反裹此上古火反箱篋上息羊反下苦頰反宿第十四帙列第十五帙張第十六帙寒第十七帙假藉才夜反醫藥上於其反恐懾之葉徙協二反怖也宿殖音食來第十八帙無字暑第十九帙胞胎上怖交反下他來反俱𦙁丁𡰱反感匱巨位反乏也備遭上皮祕反三災子才反謂火災水災風災是也循環上音巡正作循虛羸力垂反劣也補羯娑此云除糞擔死尸等鄙𢙣種類也屠膾上達胡反下古外反漁獵上牛居反猥雜上烏罪反㿈疽上於凶反下七余反癩上古拜反下郎逮反癲癇上丁年反下行間反𤸇殘上力中反背僂力主反傴不伸也矬陋上自禾反下郎𠋫反攣躄補益反手足不伸之疾也減上苦血反下胡斬反枯悴自遂反頑嚚上五還反悟下牛巾反誹謗上甫微甫未二反毀呰音紫蝸螺上古花反下洛禾反介蟲名也自汙鳥故鳥臥二反爛上郎炭反下方問反但說上徒旱反兢持上居陵反串習上古患反往秋收冬藏閏餘成律已上十帙是難信解品純說般若體相清淨處並無難寄録呂第三十帙第二百九十一能擐音患德鎧苦改反麻𥯤云兔反甘遮之夜反正作蔗甘同上苾茤上借音毗必反下測俱反竊作上千結反第二百九十七夭壽上於少反歿死也正作夭也夭屈也嗢鉢羅上鳥沒反青蓮花也鉢特摩亦云波頭摩赤蓮華也拘母陀亦云俱物頭亦云俱牟陀此云紅蓮華也奔荼利亦云分陀利白蓮華也㸦相上音護交也正作互說文下不出腳可奪徒活反慳𠫤力進反放牧音目茂盛上莫𠋫反懷孕以證反睡眂莫田反正作眠也以廟諱民故省民為民也又匙視二音非調第三十一帙卒生上沒反缺呿音去戲笑上喜義反㸦相上胡棓反輕蔑木結反擾亂上而沿反欻有上許勿反揆摸上求癸反下莫胡反䡄音犯欲適音釋往也從商慳吝力進反惛沉上呼昆反下直林反掉舉上徒了反稽上吉兮反欲適音釋往也字從商音的又音隻艱辛上古文作難古間反難也庠序上徐羊反損減咸斬反一尋徐林反六尺也吠琉璃上扶廢反青也醫療上於其反下力照反蚊䗈上音文下音盲蛇蝎許謁反正作蠍非狹下夾反亦作狹陽第三十二帙聰睿以芮反智也不忌其記反畏也不憚徒岸反難也生犢音讀牛兒也堵羅上都古反柳絮之類也舊云兜羅綿飄揚上匹遙反下以良反板普見反資糧音良亦作糧衰耗呼告反杯瓶上普回反敗喪上步邁反下乘浪反穿冗玄决反𤴷痤上音牀下音坐老耄莫報反瑜伽師地論云初未遊戲已來名嬰孩能遊戲者名童子能受欲塵乃至三十名少年從三十至五十名中年從五十至七十名老年從七十已後皆名耄熟牀座上音床正作牀一掖羊益反徐策楚責反扶也正作揀洲渚上音州下音煮𡖉上苦角反下郎短反翳目上一計反將師上子亮反下所律反淳熟上市淪反謂擐音患甲胄丈右反兜鍪也首鎧也鍪音牟牽𢎢上去堅反下以忍反嗢鉢十烏沒反拘某上九愚反下莫狗反奔荼上布門反下宅加反此云白蓮華也沖寂上宜作蠱同直中反沖和也深也蠱虛也老子曰道蠱而用之是也聰敏眉反達也卆能上倉沒反雲第三十三帙嗢鉢上烏沒反有翅音施殑伽上巨陵反下巨迦反擐大上音患德鎧苦改反甲別名嫉姤上音疾下都故反正作妒妬二形也楚詞注云害賢曰嫉𡧱色曰妒也下又古𠋫反非也誤扇𢯯上尸戰反下丑皆反梵言扇𢮎半釋迦唐言黃門其類有五一半擇迦惣名也有男根用而不生子二伊利沙半擇迦此云妬謂見他行欲即發不見即無亦具男根而不生子三扇𢮎半擇迦謂本來男根不滿亦不能生子四博又半擇迦謂半月能男半月不能男王留拏半擇迦此云割謂被割刑者也此五種黃門名為人中𢙣趣受身處也盲聾音籠攣躄補益反癲癇上丁年反下行問反矬陋上自禾反下郎𠋫反無睱音下八元暇謂八難處也謂不間也惛沉上乎昆反掉舉上徒了反安庠音祥嘗無上市羊反又音曾卒暴上倉沒反下步報反蟣虱上居豈反下所揤反蟲除中反磨鎣烏定反不徇辭俊反所恃時止反依也嫉妬都故反劇苦上巨𨒫反青淤於去反膿爛上奴冬反下師歎反𮌨脹上匹江反下知向反詐上居夭反亦作嬌與奪徒活反毀訾音紫揭路荼上音竭下宅加反金翅鳥神名也𨈢欲上都含反歡娛音愚燋炷上子消反下主注二音推微上尺隹反下陟陵反正作徵也不顧音故憔悴上自焦反下自遂反之鮮息淺反少也又思句反礦古猛反亦作獷鄙俚上悲美反下力耳反賴也聊也塊等上苦內反堆阜上都回反下扶久反溝坑苦庚反正作坑株杌上陟朱反下五骨反毒剌音㓨荊𣗥上居英反下居力反瓦礫魯擊反小石子也吠舍上扶廢反戎達上適遇反正作戍也騰第三十四帙淡病上徒甘反正作痰技藝上奇綺反微笑音笑右膝音悉竊作上七結反植衆上市力反潛伏上自廣反威猛音猛愍生上眉殞反𦒡翔上五高反下似羊反高飛而不動翅也箭括古活反惡蝎上烏各反下許謁反毀訾音紫又作呰輕莫結反無也也正作篾二形也咄善男子上都活反𠿒咄喚人之聲也柔䎡音軟遲鈍上直𡰱反𦆔也𡐢掃上方問反下乘早反搕𢶍也掉舉上徒了反凌𮆘莫結反矯現上居少反傲慢莫諫反喧雜上許亢反蛇蠍音歇邏剎上來個反憒丙上古內反下女孝反而雜才合反欻尓上許勿反慨歎上苦礙反歎也塢波上烏古反正作塢也蘇夜摩天王亦云須夜摩唐言善時分夜摩天王名珊覩史天王上先安反亦云剛兜唐言妙喜足亦云知足覩史天王名也𢥇栗上之繕反下力日反源底上魚袁反恃己上時止反下居里反捶打上之水反下得冷反下又音頂㔜𢙣上蒲沒反橋梁上巨反正作橋如啞烏雅反致第三十五帙達絮息慮反亦云達須𮆘上莫結反下力計反瘖啞上於今反𤼣躄上力貟反下必益反背僂音縷癲癇上音顛下音間殞沒上云愍反欲扣音口又苦𠋫反擐鎧上戶慣反下苦改反暗暝莫瓶反盲瞽音古紅縹匹沼反沮壞上自與反敗也止也瞬息上書閏反危脆此嵗反如燎力小力照二反捫摩上莫奔反隱蔽必祭反掉心上徒了反動也又徒吊反引也㔜𢙣上蒲沒反正作勃雨第三十六帙侵淩上七心反正作侵沮壞上才與反鎧鉀上苦改反下古狎反醎味上戶緘反心髓息委反杖塊苦內反斫㓨上之若反下七賜反菴沒上烏含反半娜奴可反藥名半娜娑亦云般娑亦云波那娑西域記云其果大如冬苽熟則黃赤剖之中有數十小果大於雞卯又更剖之其汁黃赤其味甘美或在樹枝如衆果之結實或在樹根若茯芩之在土出東印土奔那伐彈那國內也種殖音食溉灌上古代反下古亂反牙莖戶𥝷反露第三十七帙南謨莫胡反亦作無分扸先擊反包含上布交反𭜨讎市由反匹也仇也溉灌上古代反又音既茷盛上莫𠋫反用愈余主反首上苦禮反低也首至地也正作稽二形也警覺上音景也戒也舊韻作警新韻作驚誤𨈢求上都合反覆𦿔上芳富反下必祭反並掩也正作覆蔽慳吝力進反𠕀𭥗莫報反嘲誚上陟交反下自笑反固鎧苦改反懶上郎旱反下徒果反摩呬香至反三昧名三摩呬多唐言等引亦云等持叨餮上他刀反下他結反貪財曰叨貪食曰餮喧雜上許無反譁也紛擾上芳文反下而汒反不掉徒了反據慠上正作倨下五告反憒閙上古內反上音恣也誤揭路荼上其列反下宅加反具霍呼郭反魯拏奴加反結第三十八帙花莫姧反正作花同上髓𦛁音𢙉𮏴骨上音斤正作莇也無苦血反無隙丘𨒫反無瑕音遐摩捫音門嗅穢上昌右反𢙣氣也正作臭殠二形也又或作嗅七秀反不香也又許救反非也誤祠祀上音詞祭天也下音似祭地也撞擊上宅江宅絳二反𨈢著上都含反乞音依怙音戶匱乏上巨位反簡別上古眼反有奪徒活反身宍而六反為第三十九帙卒暴上沒反下步報反底上力閻反盛香器名坦然上他旱反平也安也正作坦也又七余七預二反誤千輻音福轂上文兩反下古木反羅莫田反鞔上莫官反與趺音夫腳板惣名與跟音根雙腨市軟反醫𭰖上於兮反𦟛圓上丑反摩膝音悉晃曜上胡廣反頸及上居郢反肩項胡講反膊腋上補各反下以益反上亦作從廣子容反上正作縱也諾瞿上奴各反頷臆上胡感反下於力反鋒利上芳逄反喉脉上戶鈎反莭脉音麥眼睫音接目毛也齊𫺗之領反眼睛音精皎潔上古了反下古列反瑟膩上所擳反下女利反梵言烏瑟膩沙此云佛頂斤脉上音斤下音麥兩踝戶瓦反庠序上徐羊反無隙丘𨒫反膝輪上辛七反正作膝敦肅上都昆反下思六反不掉徒了反不窊鳥花鳥化二反不凸徒結反皮膚音夫疥癬上古拜反下息淺反黶點上於琰反疣贅上于求反下之芮反身聚肉也大者為疣小者為贅緻而上直利反額廣上五格反落上直尓反落也參差也正作陀傂𮖆三形也誤諸竅苦𠮧反怡上許之反下與之反頻𮙖冝作顰顣上毗反下子六反跛眉㒵也逶迤上於為反下亦作他同音陀尓匹曰委委他他美也經作陀誤浮泡匹包反折除上先擊反排擾上步皆反正作能技能上其綺反下奴代奴登一反多技也霜第四十帙而擐音患德鎧苦改反顧吝上古悟反螺貝上洛禾反下蓋反欻然上香勿反捶胸上直追反下許容反悲號音豪垣𡓜上于光反下自羊反垣院也墻障也欄楯上洛干反下食閏反寶塹七焰反街巷下絳反市厘直連反正作鄽廛二形也雉堞上直𣅀反下徒協反城高長堵者曰雉城上垣曰堞謂女𡓜也下正作𡍕也誤輝煥上音暉下音喚冷𤏙奴管反泛漾上芳梵反下羊亮反嗢鉢上烏沒反可喜許記反映蔽上於敬反鸚鵡上鳥耕反下無古反鳬鷖上防無反下烏兮反黃瞗音歡鳥名也人靣鳥喙也正作鴅也又丁聊反非也鶬鶊上倉下庚青騖務木二音野鴨別名白鵠胡沃反鳥似鸖春鶯鳥耕反鶖鷺上七由反下洛故反水鳥名鴛鴦上於元反下於良反鵁鶄上音交下音類鳥名也下又音青鶄鸖出南海翡翠上𦘺未反下七醉反青羽雀也鵾雞上古溫反雞名如鸛長鵛赤觜白身黑翅尾亦鸛雀異名𪅱鳿上音囑下音玉鶢鶋上于無反下九魚反海中鳥名妙翅音施亦云金翅鳥即鳳凰食龍者也鶙鶘上音提下音胡羯羅頻伽上居謁反下巨迦反亦云羯邏頻伽亦云迦陵頻伽此云好聲鳥也亦云羯毗亦云羯隨訛略也周寰音還頗𦙁上普波反下丁昆反其蹬都亘反正作隥也又音鄧誤茵褥上音因下音辱綺帊匹駕反綩綖上於遠反下以連反丹枕之審反幃帶上于㱕反綺幔莫半反正作幔珠帳知亮反正作悵奮迅上方問反下私俊反缺呿正作㐸㰦上音大下音去映奪上於敬反下徒活反不售音授賣物出乎也不售者賣不得也試之上尸至反誤右髀步米反相試尸志反𧹞然上女板反諂詐上染反瘡痕戶根反驚駭戶駭反驚也鎣以上烏定反茵耨上音因下音辱正作褥下又內沃奴豆二反並非惆悵上由反下向反荏苒上而審反下而陝反箜篌上音空下音侯槽頸上自刀反下居郢反繩棍古本反轉絃軸子也然宜作𣗽毗結反轉也亦是緾絃關子也如媲字作婫是也又戶本反非義也冝取棍字不辭音詞稽留上古兮反摩揭音竭千斛戶木反金第四十一帙大般若經第二會序大唐西明寺沙門玄則製攄妙上田魚反舒也無垠五根魚斤二反界也漾玄上羊亮反水溢蕩㒵也正作漾又或作以小反弄扣音口又苦𠋫反示警音景寤也戒也闢㝢上毗益反下于主反聲揚羊樣二音動訊音信既駭戶騃反佇析上直與反下先擊反嘗言上市羊反又音曾殉上祥閏反下力底反蟪菌上音惠下巨殞巨遠二反猶擅音繕挻孕上失然反彈壓上徒丹反糾也下烏甲反降也至助責反際也正作鎣曬上於定反下所賣反森撗上所岑反下戶音反曾迥音逈幻𧄜如水反研上五堅反下尺之反正作妍媸也飈谷上必遙反欑輝上才官反下許㱕反盛歟音餘歎辭經文匪懈上非尾反下古賣反矯誑上居少反兩跟音根兩脛胡定反兩腨市軟反亦作踹兩膝音悉兩䏶步米反兩股音古兩膊音博正作髆又匹博反非也兩碗烏亂反項胭上胡講反下於堅反𨂠頷上與之反下戶感反頰額上古俠反下五格反怡上許之反下與之反爆音豹只一字為句啞者上烏雅反欻爾上許勿反紛綸上芳文反下力純反俱丁𡰱反𮌨脹上匹江反下知亮反膿爛上奴冬反青瘀於去反喙噉上音卓正作啄又許微反非也骸骨上戶皆反牀榻上音床下音塔財縠古木反五也正作穀也麥菽稷麻黍是也又戶木反誤欲扸先擊反穅𥢶上苦郎反下苦外反羂取上古犬反損𡧱戶蓋反函作上去記反魁膾上苦回反下古外反周覽音攬掉舉上徒了反迅速上私俊反如燎力小反抆摩上文粉反又音問初分皆作捫音門有舋許吝反悖𢙣上蒲沒反慳吝力進反惜也雜類力醉反四暴步報反急也流軛音厄奮迅上方問反寶篋苦頰反寂靜上情歷反不眴音舜巢穴上助交反下玄决反摽𢡠上必遙反下尺志反生第四十二帙𮌨脹上匹江反下知亮反膿爛郎歎反青瘀於去反驅傷青黑㒵也啄噉上音卓啄𪅎也德鎧苦改反不眴音舜瑕隟丘逆反𭜨也摽𢡠上必遙反下尺志反正作慓𢡠不喜許記反巢穴上交反下决反蠲除上古玄反循身上似遵反瞻顧音故偃息上於㦥反𥧝𮄆上五故反下蜜二反分扸先擊反緾裹音果𮏴脉上音斤肺腎上芳廢反下時忍反脾膽上步支反下都敢反胞𦝩上普交反下云貴反屎尿上尸旨反下奴吊反涕唾上他計反正作淚涎淚上序延反下力遂反垢汗胡案反淡膿上徒甘反正作痰肪𦙽上音方下音珊腦膜上音𢙉下音莫𦡲上尺之反目汁也下奴頂反耳垢也正作𭿇聹淡怕同上鵄梟上尺脂反下古堯反𧆞豹上火古反下補㒵反或𭺙烏麥反手取瓜持物也正作擭也又古麥反應和尚作俱縛反狼藉自昔反𪙁掣上側加反下尺世反蟲蛆上池中反下七余反臰穢上昌右反正作臭殠二形腐宍上音父下音肉骨璅音鎖皓月上戶老反麋爛上美為反散也壞也正作㸏䊳三形腨骨上市軟反腳肚也膝骨上辛七反䏶骨上步米反髖骨上苦官反膊骨上音正作髆又匹各反又音腨非也項骨上胡講反頷骨上胡感反髑髏上音獨下音婁曰曝蒲卜反鴿色上古合反策勵上初𮧓反入𧙃烏可反入跛補可反入娜奴可反入砢來可反入拖徒可反入婆蒲可反入荼徒雅反入沙所可反入縛扶可反入䫂多可反入也以可反瑟吒丑雅反入迦居可反入娑乘可反入磨莫可反入伽其可反入他吐可反入闍常可反濕縛無可反入達徒雅反入捨商可反入佉丘我反入羼又可反薩䫂上蘇沒反入若如可反剌他上郎達反下吐可反入呵呼可反入薄蒲果反借音入綽車可反借音颯磨上蘇含反下莫火反嗑縛上古盍反下無可反入蹉七可反入鍵其火反借音入隹反入拏女加反入頗普火反塞迦上乘紇反下九也反娑乘可反入酌之可反入吒彐可反已上四十二字門多取可字聲相近借音呼麗第四十三帙官祑直一反次也官之次也正作秩也祑祭也書云望祑於山川是也誤爆補㒵反三個爆字此個最初只一字為句珊覩上先安反赫奕上呼格反下以益反燋炷上子消反下之樹反如㿈於容反也正作雍也如𤺨音瘡竊作上七結反苾芻上蒲結反下測俱反塢波上烏古反嬈𡧱上奴了反殃禍音禍毒蟲直中反欲呼各反又音釋軍旅音侶蠱道上音古毒藥也窣堵上蘇骨反盛貯猪與反寶筒音同設利羅亦云䭾都此云身骨即舍利別名也空隟上苦貢反下苦𨒫反㹅攝上子孔反大音族夭歿上於少反下莫勿反譴罰上苦見反下扶發反屠膾古外反漁獦上半居反下力反補羯娑亦云卜羯沙此云除糞擔死尸等鄙賤種類也旃荼上之然反下宅加反戍達上啇遇反亦云首陀此云衆失易上莫𠋫反卑𫞀上必支反所魚勸反欲也念也正作願二形也勃𢙣上蒲沒反奮威上方問反勇𨦣余芮反利也栗呫肶上力日反中叱𮧓反下音毗芬馥上芳文反下音伏掃拭音識安措倉故反置也張施失支反慢蓋上許偃反正作輕微上詰盈反又音致誤邊鄙悲美反達絮思預反亦云達須謂此等人微識佛法不能堅固修行戾車上莫結反亦云離車此云樂垢穢人此等人全不識佛法也蛇蝎音歇癩病上說文作癘同音賴腫疱孝眩翳上玄練反下於計反皆愈余主反病差也裹此上古火反箱篋苦俠反莖幹上力耕反下古岸反芥子上古拜反亦作芥水第四十四帙須臾浴朱反宿殖音食珊覩上先安反不矜居陵反自高也憍慢也不蔑莫結反窣覩上蘇骨反翳眩上音翳下音縣飢羸力垂反燋渴上子消反三災音灾火劫風劫水劫壞世界時名三災也匱法上巨位反乏也漁獵上牛居反猥雜上烏罪反聾啞上洛紅反下烏雅反㿈疽上於容反下七余反疥癩上古拜反下郎割反癲癇上丁田反下行間反癃殘上力中反背僂音縷矬陋上昨禾反下郎𠋫反攣躄上呂貟反下𤰞益反減上苦血反下咸反黧黮上力脂反下他感反窮悴自遂反頑嚚上五還反下牛巾反輕誚自笑反毀呰音紫足地上將句反添也蝸螺上古花反下洛禾反自汙烏故烏臥二反潰上戶內反下方問反慣習上古患反耽著上都含反雜染上才合反摽𢡠音熾能擐音患德鎧苦改反劬勞上其俱反衰耄莫報反嗢鉢上烏沒反青蓮華也可奪徒活反覆𮑇必祭反卒生上倉沒反缺呿音去躁擾上子告反下而沼反欻起上許勿反僕力計反揆摸上求癸反下莫胡反稊稗上徒兮反下蒲拜反掉舉上徒了反稽留上吉兮反當也留心也正作稽也從禾尤𣅀也禾音雞非從禾玉第四十五帙艱辛上古間反亦作囏不肯苦等反無暇音下間也八難處也謂不間也慊恨上音嫌又苦點反誤唐設上徒郎反空也劬勞上其俱反蚉虻上音文下音盲蛇蝎音歇無狹胡夾反增減胡斬反喧雜上許元反泛海上芳梵反損耗呼告反減也壞瓶上普回反裝治上音㽵下音持牽著上丘堅反失上乘浪反喪身同上老耄莫報反𤴷痤上音床下音座上又尸類呼骨二反誤也一腋羊益反徐策初責反扶也將師上子亮反下所律反謂擐音患甲胄丈右反兜鍪也嗢鉢上烏沒反聰敏眉殞反嫉妬上自悉反下都故反偏黨都朗反正作黨諂詐上彐染反又音叨非種才木反正作𫞀扇彐皆反梵言扇搋半擇迦此云黃門謂五種不男人也一者生便半擇迦二者嫉妬半擇迦三者半月半擇迦四者灌灑半擇迦五者除去半擇迦扇搋半擇迦者謂是本來無男根者瘖啞上於今反下烏雅反攣躄卑益反癲癇上音顛下音間矬陋上才禾反下郎豆反無暇音下掉舉上徒了反垢膩女二反蟣虱上居豈反下所擳反等蟲直中反蚊虻上音文下音盲不殉徐俊反猛焰上莫耿反辛酸蘇官反劇苦上巨逆反青瘀於去反經文作淤濁也誤膿爛上奴冬反𮌨脹上匹江反下知向反尸臭而大毀訾音紫作呰殑伽上其陵反下其迦反塢波上烏古文燋炷上子消反下之樹反出第四十六帙憔悴上才焦反下才醉反矛䂎上莫求反下倉亂反懶上郎畢反下徒果反懶惰音墮塠𢍀上都回反下扶久反溝坈苦庚反荊𣗥居力反瓦礫魯擊反引奪徒活反𦒡翔上五高反下似羊反箭括古活反𢙣蝎許謁反正作蠍也又音曷非也稟性上兵錦反𡐢掃上方問反下蘇早反掉舉上徒了反䎡語上而兖反𭰗篾莫結反憒𡗚上古內反下女㒵反毀呰音紫亦作訾邏剎上來個反聰敏音愍達也勃𢙣上蒲沒反桃眼上他聊反捾取也劓鼻上魚器反剡魔上閻染反舊云閻羅達絮息慮反盲聾洛紅反瘖啞上於今反下烏雅反攣躄卑益反背僂音縷癲癇上音顛下音間㿈疽上於容反下七余反疥癩上古拜反下郎達反痔𭼴上直里反下郎𠋫反正作瘻也俗黧黑上力夷反新韻此例閼此字也見舊韻也又力兮反黃而黑也𨈢樂上都含反㭊為上先擊反破也正作析𤁷數上丁歷反𢪨對上苦浪反順上力向反信也相也瞬息上尸閏反投趣上音頭又之末反非煩冤於無反荼毒上達胡反卒𬽐上倉沒反下乘浪反遜謝上乘困反危脆此嵗反劇苦上巨𨒫反奮迅上方問反下私俊反捶打上之水反半娜奴可反溉灌上古代反昆第四十七帙南謨莫胡反誙𠕀上文夫反無苦血反無隟去𨒫反正作隟無瑕音遐髓音𢙉𮏴骨上居反摩捫音門底上力闢反盛香器也正作也轂上音𠕀下音穀鞔上莫官反足跟音根雙腨市軟反𭰖上於兮反鹿名𦟛圓上容反晃曜上戶廣反肩項下講反膊腋上布各反肩也正作髆也又普各反膈也下音亦從廣上子容反諾瞿上奴各反頷臆上胡感反下於大反鋒利上芳逢反婉約上於遠反眼睫音接眼睛音精皎潔上吉了反瑟膩女利反佛頂名烏瑟膩沙也回顧音故無隟丘𨒫反孔也敦肅上都昆反下息六反不掉徒了反不窪烏花反不亞徒結反正作凸皮膚音夫疥癬息淺反點上於琰反疣贅上于求反下之芮反方整之領反緻而上直利反額廣上五格反落上直尓反落也參差也正作陀傂三形也諸竅苦𠮧反怡上許之反下以之反嚬蹙上毗反下子六反眉㒵也面嚬促㒵也正作顰顣也逶迤亦作委他上於為反下徒何反尓匹曰委委他他美也下又音移第四十八帙有隟丘𨒫反如㿈於容反浮泡匹泡反折除上先擊反正作析淡泊徒敢反下普百反靜也正作惔怕也排優上步皆反樂人也正作俳譬如上匹義反引喻也正作譬也德鎧苦改反飽滿上布卯反殷勤上於介反邊鄙兵美反達絮思預反蔑戾上莫結反下力計反無翅音施掉動上徒了反所音動採菽尸六反目連姓大般若經第三會序大唐西明寺沙門玄則製卷第四百七十九夫音扶語助也只一字為句睽於上苦圭反異也乖也殉迹上辝俊反漸漬才賜反函迂上丘記反下衣禹反摛前上丑知反光𭤈芳無反散也藻汰上子老反下他大反洗過也或作汏音大殊炫音縣罕覯古𠋫反號如上胡告反闢甘上毗益反妙上許之反霈圓上普蓋反經文逯得上代第二音及也正作逮也又音録誤兩腨市軟反兩膝音悉兩䏶步米反兩股音古兩音又匹各反兩肘知有反兩碗烏亂反項胭上胡講反下烏堅反頷上與之反下胡感反正作頷也又音閣誤頰額上古俠反下五格反細䎡音軟淳淨上市倫反聾者上洛紅反啞者上烏雅反欻爾上許勿反光奪徒活反掩𮑇博袂反掩也紛綸上芳文反下力純反無策楚責反𮌨脹上匹江反下知向反濃爛上奴冬反正作膿也下郎漢反青瘀於去反啄噉上音卓𪅎啄也牀榻上音床下音塔烔然上徒弄反正作洞也洞達通徹㒵也又音同誤凶黨上許容反魁膾上苦回反下古外反甘簏之夜反正作簏也又郎木反誤也劒第卌九帙財䅽古木反正作檕隸書作穀也麥菽稷麻黍五種皆名㯏又未成米者亦名檕輕蔑莫結反掉舉上徒了反如燎力小反抆摩上文粉反隱蔽必祭反有舋許覲反罪也瑕隙也動也微笑音笑又作笑右膝音悉頭頸居郢反肩膊音博又音腨誤䏶膝上步米反下星七反腨脛上市軟反下胡定反皮宍音肉骨息委反悼舉上徒了反又音導誤四軛音厄瀑流上蒲報反急也卒也又蒲卜反布水流下也奮迅上方問反下私俊反寶篋音愜不眴音舜摽𢡠上正作標下曷志反𮌨脹上匹江反下知亮反膿爤上奴冬反下郎岸反青瘀音淤啄噉上竹角反德鎧苦改反喜法上許記反又音喜濟恤私律反煩惚音𢙉又呼骨反非也煩音𢙉巢冗上仕交反下玄决反能惣子孔反又音窟反蠲除上古玄反除也潔也偱身上祥勻反𥧝𮄆上五故反下二反剖㭊上普口反下先聲反緾裹音果𮏴脉上居反肺腎上芳廢反下時忍反脾膽上蒲卑反下都敢反屎尿上尸旨反下奴𠮧反涕唾上吐計反正作洟也涎淚上序延反下力遂反垢汗胡岸反肪𦙽上音方下音珊腦膜上音惱下音莫𦡲上尺之反下奴頂反鵄梟上尺脂反下古堯反𧆞豹布㒵反豺狼上助皆反或𭺙烏號反樝手取也正作擭也𪙁掣上側加反下尺世反潰爤上戶內反下郎歎反蟲蛆上除中反下七余反骨璅音鎖骨相連㬶白上胡老反正作皓糜爛上美撝反下郎歎反脾骨上步米反正作髀髖骨上苦官反又音坤脊骨上子昔反𦙄骨上許容反膊骨上補各反誤策勵上楚責反入𧙃烏可反誤入娜奴可反入砢來可反入柁徒可反入䫂多可反入佉丘我反入羼又可反借音剌他上郎達反下吐可反入綽車可反借音颯磨上乘合反下莫可反嗑縛上古盍反下無可反入蹉千何反入鍵其可反入拏𡰱可反入頗普火反入酌之可反亂上居少反號第五十帙遷動上七仙反緑縹匹小反雜染上才合反下而陝反備受上皮祕反備受同上血宍而六反映奪上於敬反下徒潔反如㿈於容反疫勵上音侵下正作癘煩惚音𢙉氤氳上一真反下於云反氛馥上扶文反香氣也正作馚馚二形也氛妭氣也又芳文反從草下音伏香氣也竊作上七結反我嘗音常又音曾窣堵上蘇骨反𭡢泥上於撿反輔臣上扶武反巨第五十一帙彼適音釋才遭禍音禍悲願音願囂動上許反喧也毒蟲直中反欲螫呼各反又音釋軍旅音呂身上乘浪反蠱道上公五反魍魎上音𠕀下音兩盛貯知與反寶筒音同殞沒上云愍反夭歿上於少反下莫勿反譴罰上去見反問訊音信無苦血反旃荼上之然反下宅加反戍達上啇遇反勃𢙣上蒲沒反竊作上千結反奮威上方問反摩揭音竭亦云摩伽劫比毗鼻二音吠舍上𦘺廢反栗呫上力一反下尺涉反國名也新韻闕此字舊韻有之祥茅音䅦花莫姧反花同上塢波上烏古反曇上所八反氛郁上芳文反香氣也又音墳邊鄙悲美反達絮息慮反蔑戾上莫結反能𤌢奴管反蛇蝎許謁反正作蠍也又音曷非用癩疾上郎蓋反腫疱步㒵反眩翳上音縣下音翳皆愈余主反枯涸音鸖裹此上古火反箱篋苦俠反莁檊上戶耕反下古岸反預流上余去反梵言窣堵路阿半那或云須氀多阿半那亦云須陀槃那亦云須陀洹皆一義也此譯為修習無漏亦云債亦云入流謂流入涅也唐云預流預流同上也正作預也珊覩上先安反覩史大王名也最自上祖外反他化自在天王名也不矜居陵反循環上音巡歷也燋渴上子消反漁獵上芋居反猥雜上烏罪反聾啞上洛紅反下烏雅反㿈疽七余反疥癩郎達反癲癇上音顛下音間癃殘上力中反背僂力主反傴僂不伸也矬陋上自禾反下郎豆反攣躄卑益反減上苦血反下戶斬反黧黮上力夷反下他感反頑嚚音銀輕誚自笑反毀呰音紫足地上子句反蝸螺上古花反下洛禾反旱地介蟲名如嗅昌右反𢙣氣也正作臭殠二形也或作嗅七秀反不香也又音嘼誤爛糞方問反枯悴自遂反我慜眉殞反兢持上居陵反慣習上古患反亦作串耽著上都含反德鎧苦海反嗢鉢上烏沒反青蓮花也奔荼上布門反下宅加反白蓮華也毀訾音紫能俎自與反壞也正作沮也又音阻貯器也一曰𭃄肉機也非卒生上倉沒反卒生同上缺呿音去正作㐸㰦也㸦相上胡故反交也𮜒擾上子告反下而沼反餓狗古口反上步木反下力計反香象音像正作象也規摸上古隨反下莫胡反劬勞上其于反親戚倉歷反稽上古兮反艱辛上古頏反險俎側所反隔也正作阻慊恨上胡兼反心不平也正作嫌也又苦點反恨也誤醫療上於其反下力照反病悆余主反差也正作愈也又音預誤蚉虻上音文下音盲蛇蠆芥反警覺上亰影反驚覺上居影反寤也戒也見舊韻作警新韻作驚非也怯懼上丘劫反可奪徒活反強取也闕第五十二帙端拱居勇反𣫍手也聰慧上倉紅反生犢音讀壞瓶上普回反未燒瓦也老耄莫報反牀座上助㽵反老耄音冒一腋音亦徐策楚貴反衰耗火告反將師上子亮反下所律反𡖉上洛管反下苦角反翳目上一計反愚冥莫瓶反暗也正作冥也甲胄丈右反兜鍪也首鎧也鍪音牟沖𡨜上冝作蠱同直中反盅器虛也老子曰道蠱而用之是也冲和也深也亦作冲聰慜音愍達也有翅音施嫉姤上音疾下丁故反正作妒妬二形也又古𠋫反非諂詐上染反又音叨誤扇搋皆反瘖啞上於今反下於雅反攣躄卑益反癲癇上音顛下音間矬陋上昨禾反下郎且反無睱音下掉舉上徒了反臭穢上昌右反垢膱女利反蟣虱上居豈反下所擳反正作虱也蟲除中反不殉辝俊反辛酸乘官反劇苦上巨𨒫反青淤於去反膿爛上郎歎反𮌨脹上匹江反下知亮反燋炷上子消反下之樹反推徵上尺隹反下陟陵反憔悴上自焦反下自逐反缺減上苦决反下胡斬反矛𥎞上莫侯反下倉亂反懶墯徒果反懶惰同上堆𢍀上都回反下扶久反溝坈上古侯反下苦𢈔反株杌五骨反荊𣗥居力反竊作上千結反奪上去堅反下徒活反𦒡翔上五高反下似羊反箭括古活反試問上尸志反以言瞫人那瘐余主反數名也正作𢈔也亦云那由也惡蝎上烏各反下許謁反正蠍也又音曷尓匹曰蝎乘蠹也非用稟性上兵錦反柔䎡而兖反弱也正作軟𭰗篾莫結反毀呰音紫邏剎上乘個反憒𡗚上古內反下女㒵反喪失上乘浪反亡也戰栗力一反毀訾音紫捶打上之水反下得冷反勃𢙣上蒲沒也挑目上吐𭛹反撥也又音叨捾取也劓鼻上魚至反割鼻也說文或作劓同鋸解上居去反剡魔上閻染反舊云閻羅背僂力主反尫疾也癲癎上音顛下音間㿈疽上於容反下七余反疥癩郎達反痔病上直里反黧黑上力夷反又力兮反雜也欲扣音口擊也又苦𠋫反珠第五十三帙竊作上千結反扸為上先擊反滴數上丁歷反用黨上步𡶤反下丁朗反願鎧苦改反依怙音戶塢波上烏古反右膝音悉卒喪上倉沒反下蘇浪反和䎡而兖反色脆上音危下此芮反輕蔑莫結反浮𣴊普包反誤前導音道引也駕駟音四一乘四馬也半娜奴可反種殖音食溉灌上古代反甲胄直右反兜鍪也𭜨讎市由反隨眂莫堅反掉舉上徒了反捫摸上音門下音莫祠祀上音詞下音似撞擊上宅江宅絳二反擊鍾也慈愍眉殞反悲也憐也下作愍𢞀二形稱第五十四帙底上力鹽反所蹈徒列反轂上音𠕀下音穀柔音鞔上莫官反雙腨市軟反醫泥上烏兮反正作也𦟛圓上容反摩膝音悉頸及上居郢反雙肩居延反肩項下講反腋上音下音亦諾瞿上奴各反頷臆上戶感反眼睫音接齊整之領反眼睛音精皎潔上吉了反瑟膱女二反斤脉上音斤正作𮏴無隙丘𨒫反不掉徒了反不窊鳥花反不亞徒結反正作凸𤵇癬上音介正作疥或作𪽫也下息淺反黶點上於琰反下丁忝反疣贅上于求反下之芮反瘊子之類方之領反鋒利上音峯正作鋒緻而上直利反落上直爾反落也參差也正作陀傂三形衆竅苦𠮧反怡上許之反下與之反嚬蹙上毗反下子六反月魚越反晝夜半月時嵗數煩惚音𢙉折除上先擊正作㭊駝驢上徒何反排優上步皆反正作俳德鎧苦改反遍執上匹連反鄙也又音遍誤達絮息慮反蔑戾上莫結反下力計反大般若經第四會序大唐西明寺沙門玄則製卷第三百三十八若夫音扶語助也亦作訣曷嘗上胡割反何也下市羊反試也有恃時止反存槩古代反未阻立反復敞昌兩反必警音景或爽所兩反明也差也折中上之舌反下知仲反竊應上七結反措懷上倉故反晨蜉音浮慨斯上苦愛反實由上是力反經文徵詰上陟陵反映奪上於敬反下徒活反竊作上千結反掩泥上於撿反毒蟲除中反欲螫呼各反又音釋軍𢬜音呂蠱道上公五反厭禱上於琰反下都老反滿魚越反宿上音星下音秀𭼩禱上於琰反夭歿上於少反下莫勿反譴罰上去戰反責也下音伐罪也元命包曰四言為詈刀詈為罰也罰之言四也謂四陷於害也四或作罔同音𠕀古之奮威上方問反勇𨦣以芮反夜第五十五帙氛郁上芳文反香氣盛㒵也正作芬也氛妖氣也非蛇蝎香謁反正作蠍腫疱步㒵反眩翳上玄縣二音葙篋上息羊反下苦頰反莖幹上戶耕反下古岸反𦬔子上古邁反辣菜也匱乏上巨位反若秉音丙塢波上烏古反䨥足上所江反字從兩隻不矜居陵反不蔑莫結反昏翳一計反劇苦上巨𨒫反輕誚自笑反拒𨒫上音巨下正作逆足地上將句反蝸螺上古花反下洛禾反枯悴自遂反著上都含反又作𨈢能俎才與反壞也正作沮又音阻誤堅窣音勞固也正作牢也缺呿音去嗤㗛上尺之反躁擾上子告反下而沼反稽留上古兮反除悆余主反病差也正作愈也又音預恱也誤警覺上居影反如泛芳梵反善軛音厄壞瓶上普回反老耄莫報反甲胄丈右反蹊徑上戶雞反下古定反蟣虱上居豈反下所擳反誑上居少反不殉辝俊反殞歿上云愍反下莫勿反英傑音竭俊也侮傲上無府反下五告反戲謔許約反調戲也新韻闕此字勢力上音世正作勢其燋實燋其下燋音注正作炷實下燋音焦䫃吝力進反劫奪徒活反德䭓苦改反甲別名也正作鎧也又五恨反非也誤飢饉巨吝及上亦作饑尓匹曰穀不熟為饑𬞞不熟曰饉繽紛上匹反下芳文反勇悍何岸反𦒡翔上五高反下徐羊反按𦒡高也謂高飛而遨遊應和尚音義曰飛而不動曰翔也謂不翅也箭括古活反箭受絃處也正作筈又音闊光第五十六帙𢙣蝎許謁反毀薎莫結反毀呰音紫稟性上兵錦反柔䎡音軟廉儉上力閻反下其奄反掉舉上徒了反憒𡗚上古內反下女㒵反邏剎上郎個反善軛音厄戰栗音栗捶打上之水反勃𢙣上步沒反堪耐奴代反桃目上吐條反正作桃劓鼻上魚利反達絮息預反啇價音古正作賈瘖啞上於今反下烏雅反攣躄音辟殘缺苦决反背僂音縷癲癇上丁年反下音間㿈疽上於凶反下七余反𤵇癩上古拜反下郎𡧱反痔漏上直里反黧黑上力夷反𠧸上音咸下音魯栽上子才反下五割反伐木餘也出孫愐韻也又魚列反根也析為上先擊反分破也𤁷數上丁歷反循環上音巡歷也下音還圓捲也謂圓轉往復無終始也大般若經第五會序大唐西明寺沙門玄則製卷第五百五十六夭夭於少反屈又和舒㒵也又音妖義同上憤啡上扶吻反下𡚱尾反正作悱也憤憤悱悱謂心喜勇口發言也問也何論云不憤不啓不悱不發是也此謂夫子言若有人來於我邊學業若前人心不憤憤口不悱悱我不與開說發明大道若心憤憤口悱悱即與前人開說大道必識其義理深也若不心憤憤口悱悱者言前人不思義理恐其意淺故也遠鞠居六反告也盛扣音口亟諧上去記反遽也數也下戶皆反合也和也易蕪上以義反下音無情靄烏蓋反非上音亮信也兆朕上直少反下直忍反塵躅直玉反萬舛尺兖反未易以益反想莫𠋫反未𣲖匹賣反不窪五佳五奇二反水際也正作涯搋七上冝作柁直尓反析也謂分析挍量也又皆反以拳加物也義不稱茲壤而兩反亹亹音尾扺羽上音紙掌也謂不應掌毛而輕也經文願鎧苦改反備受上皮祕反具也字樣作備也𬾨受同上竊作上七結反滅上田典反毒蟲直中反欲螫呼各反又音釋諂誑上染反為也下居少反詐也隱蔽袂反軍旅音呂奮威上方問反癩病上音賴亦作癘腫疱步㒵反眩翳上玄縣二音皆愈余主反枯涸何各反裹此上古火反箱篋苦頰反莖幹上戶耕反下古𡷏反頑愚上五還反醜陋音漏足地上將句反臭爛上尺右反蝸螺上古花反下郎禾反枯悴自遂反當歐烏口反喜求上許記反好也又音喜亦作憘嫉姤上音疾下都故反下又占𠋫反誤缺呿音去嗤笑上尺之反下私妙反躁擾上子告反下而沼反規摸莫胡反法也謂法其操也正作模愁惚音𢙉無暇音下間也正作睱嫌恨上戶兼反前會作慊恨空上苦貢反下苦血反蚊虻上音文下音盲蛇蝎音歇正作蠍也又音曷食桂蟲也尓匹曰蝎乘虻非用果第五十七帙須臾音逾堵羅綿上一都古反草木角子內白花也即柳絮之類也卒破上倉沒反又作卒善軛音厄海邊音邊牽入上去堅反穿亢音穴老耄莫報反字樣作耄七十以後皆名徐策楚責反扶也正作捒也翅羽上音施下于句反柔䎡音軟寢𭓺上七朕反下二反正作寢寐卒暴上倉沒反又作卒蟣蝨上居豈反下所擳反蟲直中反𠍴失上丘𠃵反殞歿上云愍反下莫忽反侮傲上文府反下五告反親昵女一反商賈音古排優上步皆反正作俳戲謔許約反船筏扶月反正作筏撥二形也右膝音悉繽紛上匹反下芳文反煩音𢙉輕蔑莫結反無也毀訾音紫覆𦿔博袂反堪耐奴代反如啞烏雅反挑目上吐條反劓鼻上魚利反大般若經第六會序大唐西明寺沙門玄則製卷第五百六十六原夫音扶語助也詞也亦作遽𧥱二字若警音景矧般上尸忍反况也扄牖上古營反門外閏也閇也下音酉樞軸上尺朱反塵區丘子反泛之上芳梵反綏之上息維反𢪨其上戶郎反舉也又苦浪反舉也並作抗正也恬五上徒兼反倐三上尸六反輟有上陟劣反粵有上于月反辭也于也於也審慎之者詞也與曰同也字從亐捐樂上余全反敞拔上尺兩反下步八反駢胦上步田反下於敬反阡眂上七仙反下莫田反下正作眠阡眠田廣遠也輝煥上許阜反下呼亂反凡鼓篋上扶嚴反皆也不一也中音古擊也下苦頰反正作凡鼓篋乘杯音杯經文笈防上其劫反下扶放反比丘名笈防鉢底或梵婆提或云伽梵婆提此言牛呞呞音詩褐麗上胡割反下力計反比丘名褐麗筏名或云纈麗縛多亦云周利槃陀此云髻道亦云路邊生採菽書六反梵云目𠃵連此云採菽謂姓採菽也衍那上羊闡反筏蹉上扶月反下千何反薄矩上蒲反下俱禹反塢波上烏古反羅怙音戶珊覩上光安反兜率天王也磎谷上去奚反撾打上陟花反下得冷反盲𪾼一計反如矟所角反如𥍽尺鍾反矛也如普包反憤恚上扶吻反慊恨上戶謙反又苦點反非也右脅許劫反倐忽上尸六反疾也𮌨脹上匹江反下知亮反尉熱上於勿反又音尉飄揚上匹遙反下余良反馚馥上扶文反下音伏詭言上居委反懷憾胡感反嘶喝上斯兮反下烏芥反聲敗也嗄聲也又喝噎也如人㤄衆時其聲嘶噎也拙澀上之悅反下所立反易上莫𠋫反聾啞上洛紅反下烏雅反赫奕上呼格反下以益反盛美也腥𬛓上先丁反下蘇刀反奕音亦盥洗上管貫二音巖穴玄决反無轡音祕磣毒上初錦反親狎下甲反僕上蒲卜反下力計反斟理上力條反勝天王經作料理也又音針誤塠𢍀上都回反下扶久反荊𣗥居力反隨眂莫堅反正作眠抑挫上於力反下相臥反折伏之也背僂音縷茅衣上莫交反稗子上蒲拜反苗葉似稻暑𥎀上常預反下余庶反根可食也正作薯蕷或藕五口反或芋于遇反牧牛上莫六反甲胄大右反正作胄二形竅穴上苦𠮧反㒹仆上丁年反下芳敕反前倒也面伏地也又芳務蒲北二反鉢上西域記作卑同并弭反正作也又卑兮反樹名也上方作禪川者作第五十八帙呾姪上多達反下借音亭夜反梵言呾姪他或云呾你也他此云所謂𧆞剌郎割反拿莎上女加反下素禾反窶荼上其禹反下宅加反剎莚音延陝末上失染反下莫鉢反𡰱羯居謁反塢魯上烏古反邏跂上來個反下步末反堆𭚖上都回反下扶久反山無石曰𭚖荊𣗥居力反門堞音牒適樂上音釋下音洛氛馥上芳文反下音伏嗢鉢上烏沒反掩遏烏割反若鑿音昨莖檊上戶耕反下古岸反竹荻音底上力鹽反千輻音福轂上音𠕀下音穀鞔上莫官反雙腨市軟反醫泥上伊兮反誤𦟛圓上丑容反頸及上居郢巨成二反髆腋上布各反頜臆上胡感反正作頷也又音閼誤下於力反眼睫音接瑟膩女利反筯脉上音斤正作莇掉動上徒了反不凹烏交反下也亦作容不凸徒結反皮膚音夫疥癬息淺反黶點上於琰反疣贅上于求反下之芮反緻而上直利反細䎡音軟𭏣落上直尓反衆竅苦𠮧反逶迤上於撝反下𬾉何反朱音單赤也正作丹不愜苦頰反大般若經第七會曼殊室利分序大唐西明寺沙門玄則製卷第三百七十四曼殊上莫官反梵言曼殊室利唐言妙吉祥真上特頂反𢭀憩上序全反下丘例反正作旋憩也不聆力丁反餐悟上倉安反汦循上忍反盡也又遲紙二音誤混茫上胡本反下莫郎反陰陽未分繁捴上音煩穊也下音惣結也寥上呼决反下力𭛹反空㒵也沮之上自與反斯𡱈具玉反促不長也夷蕩上以脂反乎也下徒朗反大水㒵也開闢也搖放也𢙉祲子𪀈反氣也慈淹於撿反雲雨㒵便便步田反奕奕音亦美也泠泠力丁反清也玉振上魚欲反白虎通曰王者像君子之德燥不輕濕不重烈火燒之不熱者是真玉也又宿栗二音非晞體上許衣反探其上音貪深取也玄扄古菅反殊轍直列反警策上居影反下楚責反庶七衆上書去反也七衆者謂比丘比丘𡰱式叉摩那沙沙𡰱優婆塞優婆夷是名七衆也較然上音角直也略也又音抆經文採菽書六反善軛音厄擐大上音患被著也甲胄丈右反煆金上都亂反金璞普角反稱量上尺陵反樹胞匹㒵反正作胞氛氳於云反卉木上許鬼反大般若經第八會那伽室利分序大唐西明寺沙門玄則製卷第五百七十六那伽巨迦反此云龍清規古隨反外滌徒的反襟靈上居吟反訊諸上音信告也之稟彼錦反扣分衛上音口擊也分衛者正言荼波多荼此云團波多此云墮謂團食墮在鉢中也或言荼夜此云團團者食團也謂何處𠧒食也挫舉上子臥反迃足上於禹反曲也手上居少反按舉也亦作蹻縣匏步包反瓢也洌井上力竭反寒也凍也正作冽也黜心上律反恢善上苦回反駭偱臂上胡騃反中音修下卑義反蜃樓上音慎正作蜃也蛟蜃無角龍也似蛇而赤吐氣成雲樓也深沙神把者也忘躋子西反輟攬上知劣反下郎敢反電倐尸六反單譯音亦傳言也未經再譯謂之單譯也三復音伏返也重也又扶富也經文羂上古犬反街巷胡絳反戶牖音酉𡐢壤上方問反下而兩反飽滿上布卯反下字樣作滿瞬息上書閏反露𣴊匹包反正作泡大般若經第九會能斷金剛分序大唐西明寺沙門玄則製卷第五百七十七浩汙上胡老反下胡岸反必㧾子孔反又音窟誤之儲音除沖照上除中反倬存上猪角反大也桀其上其列反擅度上徒丹反正作檀願侔音牟齊也曒曰上吉了反格虛上古客反挍也量也泛聲上芳梵反拂靄上芳弗反下鳥蓋反鉤仕責反刷蕩上所刮反拭涮洗也下正作蕩徒朗反搖動洗滌也編而上早連反次也泫而上玄犬反露光也經文俯仰上音免低首也下魚兩反捫淚上無粉反拭也羯利上居謁反舊云歌利大般若經第十會般若理趣分序大唐西明寺沙門玄則製卷第五百七十八核諸上行𮧓反實也瞵德上力人反視也所叢自紅反聚也睎觀上許衣反望也攸炫上音由下音縣淵府上烏玄反水深也正作淵五經字樣作淵以廟諱故省右畫也𢪨策上苦浪反下楚革反甄俗上居延反察也免也秀峙直里反磊以上落罪反嶷以上魚力反愈忿上欲朱反下芳吻反𣅀敻休政反義皎吉了反趣冲直中反垓表上古哀反咀詠上才與反嚼也指晤音悟明也朗也㮴奇上所求反索也求也正作摟經文猗適上於綺反又於奇反剌壤上來割反下而兩反弭多上爾反筏櫒七割反波上烏合反寠拏上其禹反咀他上多達反正作咀揭多上其列反邲壤上毗必反咀姪上多達反下借音亭夜反梵云咀姪他此云所謂謂入呪之初也下又迭抶二音剌𠯋伊禮反羯囇上居謁反下力計反悉𨓝音弟多喝呼割反又烏芥反誤乳上蒲沒反正作勃下徒可反或作𣵺㔜同上浙羅上之熱反遏邏上胡割反下來個反麼毗上莫可反下音鼻達䛧莫計反拽細上羊列反稽上古兮反大般若經第十一會施波羅蜜多分序大唐西明寺沙門玄則製卷第五百七十九六翮行𮧓反誘析先擊反肇唱上直沼反始也正也祕鍵上兵媚反下其偃反亦作捷轢二上歷洛剌三音車踐也淩也遐騖音務糾以上吉黝反急也以上昌隻反逐也遠也正作斥自𮗆徒南反及也自融以戒反和也洎乎上其既反及也方恢苦回反丈也或作詼調也漸染上子廉反入也漬也鄙吝上兵美反下力進反經文映奪上於敬反下徒活也擒縶上巨仐反下知立反相𢼜音舍宥也鈋𨦣上五禾反下以芮反李第五十九帙劓鼻上魚利反刖足上魚越反去手足也折骨上旨熱反拗折也又音舌斷也採菽尸六反豆也衆豆之名也拘縶知立反牽掣上去堅反下尺列反㭫辱上子臥正作挫蝸螺上古花反下洛禾反爵祿上子削反封也淮南子曰爵祿者人目之轡御也音義曰量其職盡其才也出礦古猛反大般若經第十二會戒波羅蜜多分序大唐西明寺沙門玄則製卷第五百八十四夫欲儲上音扶下音除副也又儲貯也䝻貯積聚防其不備也行擑集接二音夷蹬都鄧反階也正作隥也又音鄧非也凝釭音江燈別名也無朕直忍反正作聯之上補各反手擊也又匹各也芬郁上芳文反香氣也迷迭徒結反挻植上失然反下時力反柔泥也正作埏埴綸音倫𢪨之上戶郎反舉也又苦浪反掉影上徒了反仍貽與之反矧復上尸忍反况也𭊴蓮馥上許右反鼻取氣也正作嗅也下音伏上又七秀反吳人云不香為嗅也非用同苦禾反捿之上斯兮反流煦香句反薜荔上蒲計反下力計反此云餓鬼允備上音尹當也進也從也下音備具也辦也成也諏焉上子侯反謀也下于𠃵反語助也上又子于反經文弓弩奴古反排𥎞上步皆反下倉亂反跳躑上徒聊反下池隻反嬉戲上許之反遊也枉禁上於往反囹圄上力丁反下魚與反津胒女利反正作膩也郭氏作女日反溉灌上古代反又音既下音貫火㷮音遭傘蓋上乘旱反引頸居郢反莖幹古岸反採擲音摘聰睿音𨦣大般若經第十三會忍波羅蜜多分序大唐西明寺沙門玄則製卷第五百八十九夫檀上音扶下音繕正作擅膺廣上於陵反親也踵萃上之勇反下自遂反道梗古杏交榛梗荊𣗥也為沮自與反矛箭上莫侯反粉上子西反薑蒜為之也菹鮓類也正作二形外扺音紙側掌擊也然冝作柢丁禮反柢擲也謂投擲拋去之也奚𠫤力進反積汙音烏不流水也龍袞古本反天子之衣也謂畫龍於衣也𡱝渠上音西牛名卆階上子律反詳核行革反規弼皮筆反經文瑕隟丘𨒫反鏵䥫上戶花反龜鱉上居追反下并列反虛費芳未反耗也大般若經第十四會勤波羅蜜多分序大唐西明寺沙門玄則製卷第五百九十妙警音景寤也戒也慈航戶郎反揭情上音竭高舉也高驤息羊反騰躍也擐甲上音患摜帶也策駟上楚責反驅也捶也下音四遄夙上市專反下息六反作力計反𨟼毒上直甚反字樣云借為鳥之䲳也又都合反勞悴自遂反憔悴憂愁也蔫瘐㒵也又子內反恐㒵也又子外反五色采也今取初𭃄為正淺力秀反水溢也流也𣂾幹上徒短反絶也下戶安反井垣也俗謂井匱也正作韓二形蚓弱上以忍反蟹壯上戶買反下阻狀反寄冗玄决反驊鑣上戶花反周穆王八駿馬名也下彼苗反馬銜駑駕上音奴體馬也矧乎上尸忍反勉刻上音免也勤也強也下苦得反自伐也急也正作尅也如燬音毀火別名也或作𤈦許鬼反齊云火也𣑕一上音拯救也說文無韻反取蒸字上聲呼淡即上徒敢反靜也端倪五兮反翹佇上巨堯反下直與反如瞬音舜動目也羣馭音御列鼎音頂緬惟上兖反景躅直玉反將莫𠋫反經文劇苦上巨𨒫反窣堵上乘骨反扸破上先反子上古敗反奈第六十帙大般若經第十五會靜慮波羅蜜多分序大唐西明寺沙門玄則製卷第五百九十一舛競上昌兖反聿興上余律反循也遂也之𠋫胡搆反邅回上知連反照矌苦謗反空明也正作曠沈掉上直林反下徒了反雙音尺朋棲音西孤騫許言反飛舉㒵敞之上尺兩反蒨萰上千見反下力見反儲之上直魚反定𭳮上徒徑反安也不亂也賦作𭃄作定也下力撿反水溢㒵也磊砢上落罪反下來可反聲𮗆徒南反殫變上音丹盡也奮迅上方問反下相俊反經文甲胄丈右反指麾音撝串習上古患反妃后戶口反荏苒上而審反下而陝反大般若經第十六會般若波羅蜜多分序大唐西明寺沙門玄則製卷第五百九十三揆務上求癸反弭執上尓反弭泯也泯然平㒵也調𨦣以芮反卒怙上子律反下音戶寵於上勇反愛也正作寵也又勤董反非鷺池上郎故反甄陶上音真下徒刀反神農作瓦器官名也陶正也化也甄陶者取其融鍊義也上又居延反察也免也卷睇音弟涔𡨜上助今反尓匹注云以米投水養魚曰涔纂文曰以鐵施竹頭將取魚為涔又管涔山名也又蹄涔不容尺鯉也涔牛馬跡也經云無以牛跡等於大海是也翳𧄜如水反褰積上丘𠃵反障縠戶屋反亂轍上郎喚反下直列反彚征上云貴及下之靈反駢而上步田反挻以上失然反和也呬多上香至反此云等引金吻無粉反口也昌𮞠音延席也正作筵也霈玄上普蓋反福庇卑至反宸極上食真反屋宇也天子所居也極中也帝后胡口反延齡上以然反下力丁反黎承上力兮反下之陵反泉也庶狹中上書去反異也狹小也中半也意謂聲聞緣覺為俠中之士擺疑上布買反謂擺撥搖動也輟謗上陟劣反充詘上尺終反下丘勿反辝塞也經文所𮑇必祭反魔羂古犬反所縶知立反淤泥上於去反鹹𠧸上音咸下音魯降澍注樹二音時雨也虹霓上戶公反下五兮反梯蹬都亘反正作隥詮表上此全反平也正作詮也灰燼徐進反索縷上乘各反阿邏來個反童竪音樹𡖉苦角苦屋二反正作也陂湖上彼皮反池沼之繞反原隰音習芬馥音伏採擲知𮧓反輕蔑莫結反耽嗜上都含反下神利反啄長上許穢反正作喙偃蹇居輦反正作明苦角反揭路荼上其列反下宅加反緊捺奴割反筏拏奴加反龍名菜放光般若經一部三十卷第一帙第一卷羅音恱逮得上音代正作逮罣㝵上音畫下音礙腨腸上市軟反𧿽𨁟上普父反下五可反𨎪動上而兖反正作蠕啞者上烏雅反傴者上於禹反拘躄早益反裸者上戶瓦反淳修上市倫反淡然上徒濫反所齎子兮子私二反持也檀徒丹反大品經云檀那大般若經云布施尸式支反大品經云尸羅智度論云秦言善性大般若云淨戒也羼提上初諫反大品經作羼提智度論云秦言忍辱𭃄作羼言佛惟音代大品經云毗離耶智度論云𥘿言精進市連反大品經云禪那智度論云秦言思惟大般若經云靜慮𮏴緾上召殷反青瘀於去反膿相上奴冬反履屣所綺反衣喪音求正作裘也所猗於綺反正作倚幾渧丁歷反又音帝糠上苦郎反下苦外苦怪二反正作穅𥢶㒃吒上女利反正作膩無鞅於良反又於兩反非友上蒲弘反黨也正作朋舊韻說文作孕字樣作朋二形說文云本是古文鳳字象形鳳飛羣鳥從以萬數故後為朋黨字變而為朋也不娶七句反漚惒上烏侯反下胡臥反勝天王經六憂婆憍舍羅此經作漚惒拘舍羅皆一義也唐言妙亦云善巧方便即十波羅蜜中第七波羅蜜也傳記云雖和其光不同其塵故名漚惒拘舍羅沾汙上冝作玷丁蠶反又霑店二音索吾上所革反求也芉蔗上古寒反下之夜反南人呼甘為干也者裁子才反誤第二卷薩云若亦云薩藝然大品經作薩婆若大般若經作薩伐若此云一𭃄智𥟵留上古兮反止也留意也俞旬上音逾㦯云由旬𬼘云十六里應和尚云三十里二吒上女利反第一卷作阿迦㒃吒第四卷作阿迦膩吒大品經作阿迦𡰱吒正言阿迦抳瑟搋唐言色究竟天二膩楚夏異耳佷戾上戶懇反下力計反捫摸上音門下音莫長梪都管反正作短也又音豆誤减上火告反下胡斬反佛笑音笑珠璣音機窗向許亮反窗也第三卷為頸居郢反脊勒上子昔反下正作肋脾腨上步米反正作髀淵流上烏玄反水深也奮迅上方問反下私俊反安股音鉢正作般或云阿那波那或云頞那鉢那阿那言出波那言入即是數出入息而修定也又音古誤不惋烏亂反驚欺也六裁子才反正作栽此五案反第四卷𮊠他上居冝反怛薩阿竭阿羅呵三耶三佛怛音呾邪音耶大品經作多他阿迦度阿羅訶三藐三佛陀此是十號中三號也多他阿迦度此云如來阿羅呵此云應供三佛陀此云正正遍知邪正作邪也膩吒上女利反下陟加反薜荔上蒲計反下力計反此云餓鬼邠耨上甫中反下奴沃反大般若經云滿慈子不㧗音紫粹也捽手捉髮也既有執捉即有所取也勘大品經作不取是也江西音以執代之非也又側尓側買二反拳加人也煞也擊也非此二呼捽存沒反第五卷寶卬因進反無熊他代反正作態𮂶窟上苦禾反正作窠大般若云無巢穴决煆都亂反猒該古哀反樔窟上助交反癡𭼙音𢙉或作𤼣桃輪上徒了反應作銚輪種音即五穀㹅名也正作𮌨脹上匹江反下知亮反爤臰上郎贊反互相上胡故反澆灒音讚走狩尸右反第六卷嬈亂上奴了反聰睿以芮反者陀陟駕反者赦尸夜反者佉去迦反者侈丁可反正作哆大品經作哆光讚經作尸疸音哆大般若經作薩䫂智度論作哆秦言邊不可得者繁音婆大品經作婆大般若作縛者蹉千何反者峨五何反黨上蒲𪪺反大品經云厚不可得智度論云伽那秦言厚大品經作伽此經作峨義同字異蓋譯主言有訛舛耳者咃音他借音加反大品經作他土荼反大般若作搋丑隹反者嵯昨何反大品經作醝者嗟于耶反大品經作遮大般若經作酌者𠻬音荼借音宅駕反大品經作荼大般若作擇智度論云荼必不可得波荼秦言必唐梵並足胞胎上怖交反虜怙上音魯下音戶自大也自縱恣也下正作扈也揵陀羅上音𠃵大品經云𠃵闥婆大般若云揵達縛此云食香訾蔑上咨此反下莫結反籠戾上勒董反下力計反正作𢤱悷諧偶上戶皆反下五口反第七卷紅縹匹沼反不斷徒短反五陰於今反即色受想行識是也大般若云五蘊無偶五口反二也對也經音義云經文作𧪓以替替之也第八卷命𣧩音終四僥古吊反徑也南人呼四徑道為四僥道也拘絺夷反此云膝遏截上烏割反止也遮也第九卷露臺徒來反姝妙上尺未反無疧丁禮反又音祇誤邊際上卑連反提和竭此云錠光亦云燈光即然燈佛也阤鄰𡰱上音陀亦云陀羅𡰱此言惣持又直尓反誤兜術上都侯反𡰱摩羅天大品經作須沮蜜陀天智度論云秦言化樂天波羅𡰱蜜天大品經云婆舍𧿡提天智度論云秦言他化自在天阿波會天樓炭經云阿波羅四阿舍暮抄云阿波嘬羅遮此云光音即第二禪天王也是第二禪之第四天也唐云極光淨天也首呵既那天四阿舍暮抄云首波票那此云遍淨智度論云韋紐天秦言遍淨四捉貝持輪騎金翅鳥是第三禪王惟于頗羅天四阿含墓抄云鞞呵破羅想天此云果實即第四禪之第四天也唐言廣果天䅽貴上古木反護上於勇反下胡故反芉𬉹上古寒反下之夜反正作蔗南人呼甘字不正也項佷上五還反正作頑也下胡懇反應言頑愚佷悷譯者除愚去悷略為頑佷而書人誤作項佷也上又胡講應和尚以項為正一任楝之扷擢宅角反蛇蚖五官反或作虺許鬼反朋友上蒲𪪺反𠧒匂音盅世俗似欲反第十卷矛箭上莫侯反抂撗上於往反洴沙上蒲丁反之剌七賜反蠱道上公五反毒藥也疑也揵沓上巨焉反下唐合反樂神名也此云食香甄陀上音真亦名緊那羅亦云緊捺洛此云人非人又居延反重第二帙第十一卷有創音瘡除愈余主反裹著上古火反函中上胡緘反篋中上苦頰反殖此上音食種也第十二卷牀臥上助㽵反亦作床病瘦所又反梵迦夷天四阿含暮抄云梵迦夷此云淨身初禪通名梵加夷膩吒上女利反下陟迦反第十三卷藪者上袂反拒𨒫上其與反劇痛上其𨒫反薜荔上毗計反下力計反𠧒丐音蓋瘖啞上於今反下烏雅反抵突上都禮反下徒骨反呰蔑上即此反下莫結反邊幅音福琬琰上於遠反下以染反此二字出經後文𡰱德內第十四卷阤洹上音陀下戶官反毀訿音紫苷上古談反下之夜反首阤音陀又豕采二音並非也大笑音笑欣也正作笑也投華上音頭下音花字樣作萃華二形或云拘勿頭或云拘某陀此云紅蓮華也分阤音陀或云芬陀利或云奔荼利花此云白蓮華也所㧗音紫捽也捽𢲻取也妬嫉上丁故反下息悉反勇悍音翰第十五卷劇惡上巨𨒫反記莂彼列反移蒔也經義是分字也正作莂也大般若經云授記是也梗忽上古杏反所立反誤放牧音目䨾礨上蒲罪反下郎罪反花未開者也正作菩蕾也上又扶味反非也誤諸惚音𢙉豫知上音預先也咃卒上他達反過也謂倉猝暴疾亦多言也正作汰𡂖二形或作吐也下倉沒反亦作猝形笑音笑䛴語上丘倚反正作綺枝棭音亦葉也大般若經作枝葉也熟踰上市六反誰也正作孰也揆則上求癸反之摸莫胡反法也熟視上市六反詳也審也正作孰熟二形也病𤸑所右反第十六卷𡨜燕一見反憒𡗚上古內反下女㒵反蛇虺許鬼反耗減上火告反下胡斬反燥濕上蘇早反第十七卷卒破上倉沒反木𢊂自羊反船柱也謂柱也正作也壞瓶上普回反未燒瓦也陂池上彼皮反牢固治上音勞中音故下音持應和尚音義作勞棠以㲂字替之宅莖反莊笇上音莊下音算㧗於上音紫取也不㧗同上大品經云不取色受想行識便得阿耨多羅三藐三菩提此經云不㧗五五陰陰即色受想行識是也謙苦上苦兼反勞也堅持意也亦作䌠也又作嗛慊二形非也恐懅其據反怖也玉篇音渠非第十八卷兩翅音施狡戲上古卯反猾也詐也亦作佼下許義反柔䎡而兖反第十九卷巢窟上仕交反欲上羊林反正作淫也又苦莖五莖戶經三反身長好㒵也非蠱道上公五反毒藥也又羊者反亦作冶第二十卷刀矛音牟淫泆上以林反下以一反蠕動上而兖反將帥上即亮反下所律反頑佷上五還反下戶懇反鎧仗上苦攻反甲別名也猗著上於綺反正作倚也又於冝反非呼芥第三帙第二十一卷雜糅女右反雜飯也形𠸍音笑憒閙上古內反下女孝反獄卒子沒反猗法上於綺反須佷上五還反下胡狠反應言頑愚佷戾譯主除愚去戾而作頑佷而書人誤作項佷也上又胡講反誤欻亡上許勿反耗减上火告反下胡斬反嬈亂上奴了反瘖啞上於今反下烏雅反跛蹇居展反遮迦越羅正言斫迦羅伐剌底曷邏闍唐言轉輪聖王大般若經云轉輪聖王是也散上息玉反正作栗栗二形大般若經云小國王是也撞擊上直江直絳二反擊鍾也大𧋠洛禾反即吹者也法華經云吹大法䗍擊大法鼓第二十二卷𭦟陀上莫官反斛升上戶木反下都口反謙苦上苦兼反荔獸上力計反應言薜荔禽獸亦是略去二字也盟誓上音明約也又大事曰盟小事曰誓也慰勞上於貴反下來到反揵沓上巨焉反下徒合反甄陀上之人居延二反並通或云真陀或云緊那羅大般若經云緊捺洛阿閦初六反不禍胡果反第二十三卷不㧗音紫殖諸上市力反巢窟上助交反野馬即陽焰是也撾捶上陟花反下之水反奮迅上方問反下私俊反頑佷上五還反下戶狠反𢪔上下禮反下徒骨反正作突栗散上息玉反前作非瑕隟上戶加反下丘𨒫反裁根上子才反正作栽溉灌上古代反又音既第二十四卷得逯音代所猗音倚拖如來上尸致反以物惠人彼堓音岸有火告反正作耗第二十五卷緾裹音果嫉姤都故反正作妒妬二形也又音構誤頑佷上五還反非戲許義反薜荔上蒲計反頑佷上五還反愚人也正作頑也下戶懇反𢙣也如前已分別之也應和尚音義以項字為正言頑字非本體洪意以為不可也第二十六卷捫摸上音門下音莫殖諸上時力反胞胎上怖交反蜎飛上鳥玄反又狂兖反蠕動上而兖反適莫上丁歷反所奪徒活反有倩七性反烔然上徒弄反通徹㒵也亦大火熾盛㒵也正作洞迵二形又音同字林云熱氣烔烔也琦音寄玉名也按奇字單作奇也病瘦所右反第二十七卷毛力之反正作氂如泡匹包反盧館上力魚反下古亂反氍氀上其俱反下所俱反毛席也下正作毹也下又力俱反毛布也非用也𣰅㲪上他盍反下都能反綩綖上於遠反下以連反地衣也帳上知向反下莫半反曚上莫紅反下莫丁反苦脅許劫反第二十八卷𮐃字㨾作𮐃冥從宀日作也𭃄作同莫瓶反暗也冖音覓阻色反非六字也飽滿上布卯反下正作滿𦘺宍音肉勸恤音戍嫉姡丁故反正作妒第二十九卷有翅音施𥥆上一了反波倫正作㖮洛昆反第卅卷作菩薩波崘大般若經云常啼言也亦云常悲亦云普慈又音輪誤也𥽭楯上洛干反下食准反臺觀上徒來反下古亂反塊倪上普米反下五禮反城上女牆也上又蒲卑反下又五兮反亦通冷𤏙奴短反鉢釗音流正作劉也摩訶般若云漚鉢羅大般若云嗢鉢羅此云青蓮華也此經作優鉢釗傳寫久誤也又招澆二音誤姝妤上尺朱反鳬上防無反交鶄上正作鵁下音精亦名鵁鸕如雌似鳬而高足柔𣽈音軟柔弱也又而朱反第三十卷薩陀波崘洛昆反唐言常啼菩薩烟悵上由反正作惆也下亮反啼㕭也豫加上余庶反謙恪上苦兼反敬也讓也下苦各反恭也敬也亦作㤩𮃢受上苦禮反不售市右反賣物出手為售也不售謂賣不得也諭諂上以朱反詭言也新韻作揄奮韻作諛也又音喻非寶烏莖反繽紛上匹反下芳文反七卬一進反來坌蒲悶反正作坌又扶問扶吻二反非危脆此嵗七絶二反拘絺夷反此云膝摩訶拘絺羅此云大膝即舍利弗阿舅也薑摩訶般若波羅蜜經一部四十卷亦名大品經第一帙第一卷摩訶那伽其迦反摩訶此云大那伽此云龍亦云為合而言之即云大龍象也謂世尊為大龍象者以彼有大威德故以譬之逯得上音代正作逮陀上蒲末反此云賢㓨𨚗𨚗伽上來割反中閒兩個𨚗字上一個是鄰字也下一個𨚗音那光讚經作羅鄰𨚗竭菩薩是也秦言寶積亦云寶事也蒲豫音余大般若經云𭦟殊室利菩薩唐言妙吉祥子殊梵言輕重耳寶卬一進反兩市軟反兩膝音悉兩䏶步米反腰脊音積項口上胡講反宍髻上而六反嬉怡上許之反下與之反和恱也正作怡啞者上烏雅反裸者上戶兀反得愈余主反恬然上徒兼反不嬈奴了反大臺徒來反繽紛上匹反下芳文反脹相上知向反膿爤上奴冬反下郎歎反阿鞞蒲兮反梵言阿鞞𧿡致此云不退轉是第七地菩薩也檀那此云布施尸羅秦言善性唐言淨戒但是戒之惣名也羼提上初諌反𭃄作羴初眼反亦羼唐言忍𭔱也毗梨秦言精進禪那秦言思惟大般若云靜慮皆一義也牀㩉上音牀下音塔正作牀㯓也扸一上先擊反毀呰音紫第二卷稻茅上徒老反下莫交反𧢻法上昌五反須陀洹上相朱反中徒何反下胡官反此云入流亦云預流阤音象誤第三卷𢢔恌上莫諫反下徒了反動也弄也輕也忽也正作掉挑誂三形也又他聊羊招二反誤摩捫音門摸撫持也㥲心上尺人反阿閦楚六反脊勒上子昔反下正作肋第四卷調𢢔上徒吊反奮迅上方問反下私俊反第六卷奪他上徒活反第七卷曚昧上莫紅反第八卷偱身上徐均反𢭀師上徐反若徐反轉軸截器也正作鏇也𮏴肉上居殷反脾腎上蒲卑反下時忍反心膽都敢反肝肺上古安反下芳廢反胃匹包反盛尿者也正作脬胞二形𡱤上尸旨反下奴吊反垢汗音捍淚洟上力遂反下他計反涎唾上序延反淡飲上徒甘反下於藥反心上水也正作痰癊昉𦚻上音方下音腦膜音莫黍粟上書與反下息玉反𮌨脹上匹江反青瘀於去反豺狼上助皆反𭺙裂上烏號反樝摩𭫠也正作擭也又古麥反挻也打也破也正作摑三形也又應和尚音義云冝作攫九縛居碧二反爪持也攫也今冝取擭字骨瑣音鎖骨上市軟反髀骨上步米反肋骨上郎得反髑髏上徒屋反下𢙣侯反日暴蒲報蒲卜二反曰𠃵也睎也邏字上來個反阤字上徒何反吒字上陟加反亦作咤伽字上其迦反𮑣字上布火反䭾字上徒個反字上尸遮反呿字上去迦反哆字上都可反嗟字上倉何反正作蹉放光經作蹉光讚經作蹉大般若經作蹉智度論作蹉秦言慳無施相末蹉羅秦言慳他字上吐荼反經自𭃄拏字上奴加反頗字上普波反醝字上昨何反第九卷蔑人上莫結反辭辨上徐並反下平件反海第二帙第十二卷羼提上初反微笑音笑床㩉音塔正作㯓又都盍反非釋提桓因桓胡官反智度論云釋迦提婆因堤秦言能天主即釋提桓因也忉利天王也須夜磨夜摩天王名也秦言妙善兜率陀上所姧反大般若作珊覩史多勝天王經作兜率陀應和尚音義作𦙽兜並先安反此云正喜亦云正知足也兜率此云妙足即是兜率天王也刪二音相似譯主鈋舛也又或傳寫誤耳須泹蜜陀秦言化樂婆舍跋提秦言他化自在已上皆天王名首陀婆秦言淨居燋炷上音焦下音注㿈創上於容反下楚㽵反舍利弗舍利鳥名也弗秦言子目揵連中音乾目揵連姓也此云豆大般若經云採菽氏是也以姓為名也其本名俱律陀拘絺田夷反比丘名拘絺羅此云㬵疾上疾業反第十三卷鞞侈上蒲迷反下昌爾反梵言鞞侈遮羅秦言明行足迦蒲拜反或云路伽此云世間解迦冝作伽乖錯上古懷反𠧒匂音蓋第十四卷寶塌音塔蠱道上公五反毒藥也譴責上去戰反問音信完具上戶官反第十五卷膽力上都敢反正作膽也遍淨上見反正作遍遍二形無蔭於禁反揵闥上巨焉反下他達反緊阤上居引反下徒何反又音豕誤也諸惡烏各反偃息上於㦥反名號音號和適音釋毒螫呼各尸亦二反蛆也𮋅上方無反下於計反盲𭿲音古癩𤺨上音賴下音瘡紅縹匹沼反裹著上古火反薰篋上許云反下苦俠反金古郎反第十八卷訾毀上將此反亦作訿呰二形第十九卷苷蔗上古談反下之夜反衰耄莫報反漚鉢上烏侯反花名漚鉢羅此云青蓮華也於光經作憂鉢釗誤也不汙鳥故烏臥二反第二十卷放牧音目惡蟲上烏各反下除中反懷任而甚反正作妊俎壞上自與反敗也壞也正作沮也又側所反俎豆器名也非用卒起上倉沒反𭶜𠐻居輦反倨傲也正作偃戲笑上許義反下私妙反輕莫結反滋味上子慈反又作補當上音府始也正作甫也揆則上求癸反度也謂度量取樣也下子德反法也鹹第三帙第二十一卷修姤都故反或六修多羅或云蘇怛羅或云素怛纜唐言契經正作妬妒二形也又音捿誤桃悔上徒了反正作桃掉二形也五蓋之一也一者貪欲二者瞋恚三者睡眠四者掉戲五者疑悔又音遙誤苦劇巨𨒫反䅽貴上古木反獦師上力葉反蛇虺許鬼反第二十二卷衰耗火告反壞瓶上普回反爤壞上郎歎反估客上公五反從𤴷助㽵反又音忽誤一掖音亦愁惚音𢙉正作𢙉此字在草三卷內第二十四卷有翅音施柔䎡音軟掉悔上徒了反第二十五卷陵陽羊義反輕慢也虜𢱊上音魯下亮略二音奪也劫取也燋炷上音焦下音注第二十六卷株杌五骨反荊棘上居英反下居力反溝坈苦庚反成㲲音寶臺徒來反紅縹匹沼反徑勇上居政反健也猛健上莫耿反恐懅其去反懼也戰栗也玉篇音渠非也第二十七卷覺已上音挍睡醒也寤也下音以恃是上時止反輕挊音弄毀蔑莫結反憒𡗚上古內反下女㒵反臥牀音床正作牀也第二十八卷沈沒上直林反沒也今作沉瘖啞上於今反下烏雅反拘躃卑益反攣也手足屈病也正作躄也又蒲益反非也撞擊上宅江宅絳二反擊鍾也不嗅香又反正作嗅也又七秀反非第二十九卷遍袒上匹連反丁徒旱反上又音遍非也微笑音笑阿衣六反阿閦同上劫奪徒活反第三十卷鎧仗上苦改反駕駟音四一乘四馬也溉灌上古代反又音既河第四帙第三十一卷是上𠳤利反正作煩𢙉音𢙉第三十二卷煩惚音𢙉又音忽誤煩惚同上𮍜率阤上都侯反下徒何反又豕𪺏二音誤掉𢢔上徒了反相上計反第三十三卷無隟丘𨒫反朾擲上得冷反第卅四卷捫摸上音門下音莫遍滿上補見反胞胎上怖交反怒癡上羊林反三毒也第三十五卷無閡音礙禽獸尸右反𠧒匂音蓋底上力鹽反柔䎡音軟合縵莫官反正作鞔鹿𬧅市軟反蚊蚋上音文下而稅而恱二反秦謂之蚋楚謂之蚊也頰車上古俠反迦蘭頻伽上音加下其迦反或云迦陵頻伽或云羯羅頻伽此云好聲鳥眼𥇒音接拘上古侯反下蘇果反正作拘瑣如上爭巧反委陀上於撝反下或作他他二同徒何反尓匹曰委委他他美也廣雅曰袞邪也備足上皮祕反具也皆也字樣作僃備二形不撓奴巧反姝好上赤朱反第三十六卷毫𨤲里之反廬館上力居反下古亂反第三十七卷可救音救又音俱誤第三十八卷有遍匹連反又音遍非也第三十九卷卆死懊惚音𢙉樓櫓音魯可喜許既反好也冷𣊵奴管反𭄩上音扶正作鳬又音力非也垣𡓜上于元反下自羊反玫瑰上莫回反下胡魁反梯陛步米反綩綖上於遠反下以速反茵蓐上音因下音厚幃帶上于㱕反香囊也單帳也惆悵上由反下句反不售音授涕泣上他禮反目汁也第四十卷試之上尸志反薩陀波崘音論此云常啼憔悴上才焦反下才遂反祠天上似茲反祭也脾宍上步米反下而六反𤩀瑚上乘干反下戶吾反創槃上音瘡刀傷痕也正作刑癜也試之上尸志反誤琉瑀力支反又音禹誤高臺徒來反不憩於陵反正作應小𤴷助㽵反又尸顃呼骨二反非也𮕾檀上之然反正作栴寶屑先結反粖也金牒徒頰反書版也簡也禮也金板上書之也小品經作金鍱是也𨔵之上直六反有槽自刀反有頸居郢反有棍古本反應和尚云轉絃者也然冝作棍毗結反亦是轉絃關子也且如經中配媲字誤作婫是也從頸居郢反正作頸曇無竭上徒南反唐言法勇著味上持略反住也𮃢留上吉兮反止也滯也名𫈐音花窒上丁悉丁結二反下力計反比丘名富樓那窒耶𡰱子亦云富樓那多羅𡰱子富樓那此云滿多羅此云慈𡰱者女也是母名也是滿慈女子也大般若作滿慈子是也拘絺夷反淡光讚般若經一部十卷上帙八卷第一卷制攬郎敢反聰揵自反蠲捨上吉玄反不僥音澆求也幸也僞也問訊音信𩖮陀上蒲末反曰兜中于月反因坘丁兮反又音遲周𢭀序全反不𭥗目報反又皆墨溥首按出三藏記作瀉而朱反古維摩經云文殊師利晉言瀉首是也又音普經中亦作普千垓古哀反四嵎牛俱反正作隅恬怕上徒兼反下普白反欣笑音笑恐懅其御反鹽天上羊廉羊贍二反或云炎天或云焰天或云夜摩智度論云須夜摩秦言妙善大般若經云善時分稽首上苦禮反迷憒古內反瑕疵上戶加反下疾斯反五病也光耀以照反晃晃戶廣反傅餝上音付塗也芙蓉上音夫下音容蓮荷別名也紛𮎲上芳文反下普巴反飄揚上匹遙反下余良余亮二反芬馥上芳文反下音伏晃昱音香光也赫奕音亦揵沓上巨焉反下徒合反食齧五結反創爛上楚㽵反下郎歎反即是膿爛也充備音備履懱無發反盡耗火告反然藎徐刃疾刃二反草名也可以染流黃作金色也然蒿呼高反說𧨏音義窈窈一了反二吒上女利反四牧莫回反數也顆數也正作放也而績音積毀呰音紫痛癢羊兩反𧑮動上而兖反奮其上方問反𠢕上胡高反第二卷漚惒上烏侯反下胡臥反十波羅蜜中第七波羅蜜名也勝天王經云優波舍羅大般若經云妙亦名善巧方便波羅蜜也意斷徒管反亦云四意止亦云四神足大般若經云四如意足眷屬音屬千姟古哀反欲抹居又反正作敕咨縒子邪反歎也詠也正作嗟譃二形也又音蹉非也他闕音反二吒上女利反二吒同上試某上尸志反隔閡音礙嵩高上息中反捫其上莫奔莫本二反粗堅上倉胡反踈也大也物不精也正作也粗者行路遠也警防也庶之性患相背而食慮人獸之𡧱故字從三鹿也字樣云相承以為及蟲字作蟲不可施行於經典也矅照上以照反下之曜反行上巨之反喘息上川兖反蜎飛上於玄反下亦作蜚蠕動上而兖反正作蠕他猗於綺反慌忽上呼廣反虛妄見也似有似無也或作恍頸項上居郢反𦚰勒上許劫反下正作肋兩毗忍反華神一反正作實第三卷四音凶亦云四結也謂貪欲戒取見取身見取是也淳熟上市輪反下市六反罣礙上戶卦反又卦桂二音食上徒官反慌忽上呼廣反或作恍惚惶慌上音皇下音荒義與慌惚同也第四卷憂戚倉歷反門閫苦本反不瞚音舜清音證滿𠥱音月而中而音天惡師上鳥各反不善也第五卷僧𨚗鎧苦改反甲別名也僧𨚗言大誓也僧涅自誓也𦒱𢱊音亮笞也千姟古哀反分耨內沃反大上苦回反三扷致中音跂晉言發趣第六卷分耨內沃反正作耨肅震上息六反捶撾上之水反下陟花反憺怕上徒敢反下普白反安靜也鐙明上音登今作燈不𪱄音舜而奮方問反嶮岨側所反隔也正作阻也又七余子余二反非也第七卷卒暴上倉沒反馳騁郢反瓜齒上爭巧反腸𦝩云貴反正作胃肝胏芳廢反心腎時忍反洟唾上他訃反佃家上徒年反稻穬上徒老反下古猛反𮌨脹上匹江反下知亮反熊羆上乎弓反下彼皮反鵄䲷上尺脂反下古堯反交瑣乘果反拘琑上音鉤下音鎖正作瑣也郭氏音消非也膝上星土反下毗忍反𦙄𦚰上音凶頭臚音盧正作顱是披音婆大品經作婆大般若經作婆是𨀸冝作躇宅加反又冝作䖳宅駕反放光經作茶大品經作茶大般若經作荼宅駕反按諸真言中荼字並上聲去聲呼之也大智度論不熱相荼闍秦言不熱又應和尚音義以咤字替之竹嫁反非也又郭移經音作陟格反亦非也今定取荼字呼之是計冝作音曳放光經作夜大品經作夜大般若經作也是吒陟嫁反又平聲是疸他吐多二反正作㢁也放光經作他大品經作他大般若經作他智度論云他四句如去不可得多他阿伽秦言如去又徒都可都個三反並非也誤是奢尸遮反放光經作𢼜大品經作大般若經作捨智度論云者諸法寂滅相多秦言寂滅是呿去迦反放光及大般若並作佉智度論云呿者虛空不可得尸疸都可反大品經作哆大般若經作薩䫂智度論云哆者邊不可得哆度求那秦是事邊唯放光經作侈尺尓反亦哆字誤作侈也是蹉千何反文繁不釋也吒徐上加反放光經作吔大品經作他土荼反大般若作丑隹反智度論云他者無住處他那秦言處又陟嫁反非也是頗普波普播二反是磋昨何反放光經作嵯大品經作醝是侈冝作恀音紙怙也放光經作嗟大品經作遮大般若經作酌智度論云遮不動相遮羅他秦言不動又或作㩼支置二音又尺紙反誤燕坐上一見反問訊音信三拔枝中音跤下音致前作三跋致第八卷疇匹上直由反下普一反崖底上五佳反護上於勇反誤也𭏡底上五街反又音冝鱗下帙二經七卷同帙光讚般若經第九卷痛癢羊兩反大般若經作受思想大般若經作想生死大般若經作行恍惚上許往反夢幻也嗅者上許右反又七秀反非也𠧒丐音蓋病瘦所右反第十卷殊迮普吉反正作匹恍惚上呼廣許往二反又音光非也拘絺夷反邠褥上甫斤反下內沃反摩訶般若抄經一部五卷亦名長安品第一卷恍惚上許往反下呼骨反邊幅音福陀譮胡快胡外二反舊韻云籀文話字也自前皆作首陀會是也又呼戒反非閉塞上計反三拔諦中音跋前經作三跋致第二卷因坘音遲亦云因提此云主謂天主帝釋也又音低阿陂音碑此是波誤作陂也屏隈烏對反嬈𡧱上奴了反下戶蓋反蟲上直中反下直尓反華𢅤音蓋又烏蓋反非也起塌音塔蜎飛上烏玄反蠕動上而兖反一轅于元反萍沙上蒲丁反駟馬上相利反墮舍上音隨放光經作隨耶梨亦云毗邪離或云毗舍離或云薜舍離或云吠舍離皆梵言楚夏大般若云栗呫毗也問訊音信作訊鹽天上閻焰二音即夜摩天也阿羞音修亦云阿素洛甄陀上之人居延二反或云真陀或云緊那𢩘天上烏盍反正作廅也四阿含暮抄云波栗阿波此言少光第二禪中第二天也玉篇音盍非也𢩘波上烏盍反四阿含暮抄云阿波摩那阿波此言無量光即第二禪中第四天也阿陂音波誤惟番音幡又作潘膱吒上女利反完堅上戶官反䎡美上而兖反如飽音飽蛇悕所齧五結反篋中上苦俠反檻中上胡黯反冝作胡懺反匱也枝棭以益反謂枝也第三卷署是上時𥎀反恍惚上許往反正作恍也廅天上烏盍反此云光牆波摩那天上烏盍反正作廅也又自羊反誤之久也比伊潘上音毗下正作䊩音幡第二卷作帷番又普盤反並通狹習上正作狸胡甲反嗛苦上苦兼反自前皆作謙苦也又苦點反非大鎧苦改反甲別名第四卷無翅音施泊然上普百反正作怕祠祀上音詞下音似淫泆上音淫下音溢無蜜音早狗也正作𧎮也誤邊愊音福又善逼反非也叉上以勞反是騫丘乾反恆架其迦反正作枷也大般若經作殑伽天女是也又音嫁誤第五卷勇捍音翰猛也𢪔也亦作惶貌具上戶官反攻伐上古冬反慊苦上丘兼反正作謙又苦點反非義也互談上胡故反不啻音施多也正作啻也釋名云不啻不是也不是爾許而更多也
