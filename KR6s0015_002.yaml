body:
  text: 漢中沙門可洪撰依河府方山延祚藏大乘經音義第一之二此册二十一帙潛羽翔龍師火帝鳥官人皇始製文字乃服衣裳推位潛道行般若經一部十卷第一卷熟念上市六反實也詳也正作熟孰二形也𭙡庠上他弄反下羊兩反正作痛癢也五蘊中受蘊也下又音祥誤所𭣣尸由反吁與上火孤反正作呼也又况于反誤離本上力義反下布反今作本正作李也字樣作本説文云從木十𭃄韻云從木丁舊韻云從木丁音下無點罣得上戶封反下五代反小兒如支反正作貌兒是𠛩戶辦反相誑惑也正作幻二形也字汙音呼與吁同也誤邠休上甫巾反下冝作傉內沃反前諸部作兮耨文陀𡰱弗文阤音陀僧那僧涅奴結反僧那言大誓僧涅言自誓號如上胡告反如音幻邊幅上音邊下音福令上古雅反邠祁與休字同也冝作耨也又音耆誤適得上音釋又之釋反謙苦上苦兼反敬也勞力法俗音俗閉塞上計反那鈴音含若枯古反正作苦也又音袴拘祐上九愚反下冝作扯丑耳反比丘名也諸經云拘絺羅是也上方經作私延上之然反下以然反經弓居願反有平皮兵反亦作坪無手同上諸部作底此經作平按底字説文下也平也今經文作㸦以底字替之彼誤也住罝音罝第二卷因坘音遲亦云因提此譯云主即天帝釋也又丁兮反古經字多作坘也亦梵言楚夏耳如梵婆亦云伽梵鉢底如三摩躍提亦云三摩鉢底如支提作制底是也亘修上古鄧反避隈上普益反正作僻也下鳥對反又鳥回反摩蚔巨支反藥名也自前諸部作摩祇小品經作摩𨢘猛祝上音猛下音呪蜎飛上烏玄反下或作蜚字𧑮動上而兖反搗搗香上二同都老反大般若云末香旗幡上巨之反寶塌音塔一轅于元反洴沙上蒲丁反羼持上初鴈反下音提誤大竹朱反正作株柏梯本作株問訊音信鹽天上閻焰二音即夜摩天也唐言妙善甄陀上之人反拔致上蒲末反廅天上烏盍反𢩘波同上須音滯直世反中陰經作須滯四阿含暮抄作修提經律異相作須陀並一義異名也此云善見天也又音帶都蓋反大樓炭經作須𠸻應和尚音義作喋同音帝並正作蹛也郭移音武非貌堅上胡官反濡美上而兖反前諸部並作耎美飽也所齧五結反除愈余主反繒裏上疾陵反下古火反若篋苦頰反若臽音咸正作函又音非也枝棭音亦第三卷義上以劣反揵陀上巨焉反甄陀上之人反摩睺戶鉤反此云大腹行神恍忽上許往呼廣工反又音光非也病瘦所右反醫藥上於其反拔致上蒲末反亦云拔提天𤸱天上烏盍反𤸱波同上正作廅伊潘普官反亦作番膱吒上女利反痛癢羊兩反無夾下恰反正作狹中短音豆是輩倍反是曹自刀反輩也儻聞上他浪反醜𦼇烏各反久劇巨逆反悏習上胡夾反近也正作狎也又五頰苦頰二反並非也大鎧苦改反第四卷牧牛上莫六反盧舍上力魚反正作廬濡遲上而兖反下直𡰱反上又音𪝥非也悉豫余庶反先也署菩上常預反效驗上胡挍反心卒倉沒反陂波上彼皮反下冝作池撜作上求癸反度量也正作揆便吁音呼甫當上音府始也不肯苦等反病瘦所右反適安上音釋才也書上胡角反𤢌狩上巨今反下尸右反薜荔上步計反下力計反奈之上奴太奴個二反𠧒歹音蓋求也正作丐丐二形第五卷厄害胡蓋反也正作害燥漯上乘老反下尸入反正作燥溼也下又他合反非也至奏子豆反號字上戶告反罣得上戶卦反下五愛反邊幅音福一逮居業反時名也正作劫或作砝三形梵言劫簸此云分別時節也前後諸部皆作劫也應和尚經音作疌以劫字替之是也川音作疌音劫並是也又或作建劫彥反劫之與建或譯主㸦用聲轉也亦不失輕重也二同音接逮音代並非也又音致亦非也證詄自七反速也急也正作疾𧪠二形也小品經云疾得涅槃明度經云已得證疾並是也玉篇作意佚二音非也𭃄作徒結反亦非也一逮音劫前後諸部皆云若一劫若減一劫是也又子反或梵云楚夏耳乃序全反低上助架反仰牛兩反舉首也又五郎反見禮記音義卒破上倉沒反若𡓜自羊反船上忛柱也正作檣二形壞瓶上普回反拖張上託何反曳也亦作拖扡二形又或作施失支反設也敷也又他可徒可與尓力尓尸智他個弋支七反並非牀褥上助莊反下而欲反病愈余主反間臺音臺適著上釋的二音從也樂也愍念上眉殞反悲也有翅音施自投音頭棄也擲也又之禾反手擎撲也第六卷祠祀上音詞下音似嗜酒上神利反嫉姤上自七反下都悟反蹈地上徒到反斐服上芳尾反文章貌也冝作披普皮反披也應和尚以裴字替之步回反垢坌上古口反下步悶反塵著物也正作坌也又或作圿古黠反蝨上子老反下所擳反不孚芳無反信也詭𡣠上居委反下奴了反淫姪上羊林反下羊一反完具上戶官反亦作貌創癩上楚莊反下郎太反蠱道上公五反又音野䅽食上古木反羼提上初諫反惟逮音代精進別名燈炷主注二音棄捐音緣佛笑音笑更斐布姧反正作斑扳二形也謂扳拽整理衣服也上方經作被亦非也誤阿閦初六反梵言阿閦此云無動亦作閦第七卷勇悍戶岸反厄難上烏𮧓反危也迫也閔傷上眉殞反耎語上而兖反果蓏郎果反説文云木上曰果地上曰蓏應云木實曰果草實曰蓏張晏云有核曰果無核曰蓏也底跪上丁禮反下也又音旨致也自音呼榆旬上羊朱反第八卷𠇺習上胡甲反正作狎問訊音信𦲸離上力掌反下力義反上又莫官反非也却乎上居業反正作劫也無拔助亮反正作狀今作狀也作槗巨反聾羊上洛紅反瘖痾歐上於今反中烏雅反下冝作傴衣禹反背屈也痾音阿非也導首上音道引也斤𦲸力掌反𮂶限上苦禾反程也條也本也斷也或作料音療幾渧音的正作滴又丁計反非刻作上苦得反屈伸音申佻上丁兮反下五郎反俯仰也正作低仰也賈客上音古居賣曰賈通財曰𮚘又音嫁山顛丁年反琦音奇問訊音信羅麟音鄰第九卷悉牧音捨釋也棄也散也明度經云悉捨忘之其過少耳又音目放也又或赦音舍宥也悉音亡遺也正作忘須欲朱反無鞅於良反又於兩反非啼笑苦屋反惟逯音代精進波羅蜜也正作逮也恆邊布玄反揵陀呵盡上音𠃵下知右反此云香象也下正作晝山巔丁年反正作巔明度經云須嶺姝好上尺朱反諭諂上欲朱反下染反強染上巨良反下力羊反誤僥幸上音澆下音幸舊韻作僥幸説文作僥幸亦作徼幸説文僥偽也徵求也幸寵也説文云吉而免凶曰幸也字從夭從羊又應和尚云徼遇也幸得也非分而得謂之幸也冀望得也又云規求親遇也拖行上音絁正作施惆悵上由反閉在上計反曇無鴗上徒南反下其列反下又音立誤阿祝昌六反又音粥鴗羅上其列反羅戶屋反緹縵上他禮反下莫半反須揵提中音𠃵亦云修𠃵提此云黑花占匐蒲北反黃花也鳨鷹上音扶下五諫反正作鳬也上又音力並誤女上羊招反美好也亦作姚也拖高上失之反設也安置也正作施文繡音秀綩䘰上於遠反下以然反自衒音縣賣也行賣曰不售音授試之上尸志反不伹徒旱反正作但又蛆粗二音非也人四音血人宍而六反兩䏶步米反高臺徒來反炳然上兵永反作織音隻布施尸智反以物惠人也㯓上都盍反撗被也如架上安衣謂之也正作褡㯓二形也本作㯓書人誤從木作㩉也下補覓反牆也恐懼音具格戰上古額反鬪也𥛏幡上音其正作旗菩薩因進反三昧名第十卷波崘洛昆反前卷作薩陀波倫誤曲戾力計反荊𣗥上居英反下居力反汙埿上烏故反下奴計反䪺上之領反下都困反坌師上蒲悶反貌健上戶官反正作完池邊音邊欄楯上洛干反下食準反俠陛上戶頰反下步米反儲水上直居反副也貯也貯積備急用也須彌音蠕動上而兖反行上巨支反喘息上川兖反巫祝上音無下之六反女仕鬼者曰巫也祝者辝也祭也謂禱祝祭祀鬼神祈福祥求永貞也下又音呪須音逾返遺以遂反贈也光琰音焰三昧名曰光焰也明度經作曰光炎也又以染反誤箜篌上音空下音侯有絃音賢有桴音浮鼓椎正作枹也諂上欲朱反下染反手拊撫下二同芳武反拊拍也撫持也據也安存也羽小品般若經一部十卷第一卷調象音像逯得上徒愛反五於今反大般若云五蘊即色受想行識是也拘絺夷反拘絺羅此云膝𮕾辿上之然反下以然反第二卷衆華音花逼上音正下音遍希有上香衣反欲毀許委反摩呼兮反小蟲直中反惚𡨟上音惱下音害經弓居願反道場直羊反又音亦非也以存呼老反正作好也以好華香也誤是上音置誤求短音短問訊音信斯慝女力反王名也正作匿也又他得反誤羼提上楚諫反此云忍辱𤾇率上都侯反梵輔音父遍淨上補見反𠃵闥他達反所螫呼各反又音釋裹著上古火反其篋苦俠反第三卷是上陟吏反委也釋也且住之言也刺蕀居力反暗𡨋莫丁反苦惚音惱糟粕上子刀反下匹各反熱血上而設反下呼決反第四卷無疧丁禮反又音祇誤成熟市六反園林應和尚音義作垣林于元反牆也彼誤懷妊而甚反欲上息惟反正作雖慠上五告反互相上乎故反輕蔑莫結反得寫音像正作象揆度上求癸反妨廢上撫方反害也礙也下方肺反止也正作廢𭜨魔上烏各反正作惡詭誑上居委反第五卷救療力叫反正作療蚊虻文盲二音正作蚊虻毒螫音釋無閡音礙𤾇率上都侯反所牽苦堅反輕躁子告反動也疊毳上正作㲲下尺稅反細毛也大般若經云覩羅綿是也本破上倉沒反正作卒卆二形又音叨今為本字也誤彼音岸爤壞上郎岸反邊船上音邊下音船下又呼江反非也棠治上宅庚反下音持船也止水也正作撑也周禮云角撑之也切作撑悮也一掖音亦隧落上直遂反正作墜上音道引也𣜦師上音道正作導悕望上音希欲得也不悕普故反正作怖隨順上音隨下音翅未上尸智反戲挊音弄第六卷偷奪徒活反耶上似嗟反下羊林反濡語上而兖反安似余反穢上古口反諂曲上染反下丘玉反慳愱音疾沖若上而與反正作汝賊上苦候反寫馬上徐兩反自抑音憶監閡上古銜反領也下音礙言婦人有三監五礙也惡獸尸右反正作獸第七卷微嘆私妙反正作笑二形也遍袒上音偏下音但金華音花精鋭以芮反躓頓上陟利反相柱知主反城墎音郭輕蔑莫結反𢙣賤上烏故反雜女右反正作糅粈二形賊上苦候反正作寇憒𡗚上古內反下女貌反刑勠音六隨慎音順隨順同上第八卷礕上普擊反下呂擊反菩䔒下音薩梵言菩提薩埵今菩下除提薩下除埵而作菩薩也聾啞烏下反眼上郎代反痤短上昨禾反正作矬聾疴烏雅反正作啞也郭氏音阿非也上又經文作聾誤頑鈍上五還反邪上徐嗟反無䛘俱况反誤第九卷莘悉上呼瓜反微𠸍音笑須音逾新乘浪反第十卷惡魔上烏各反顧録力玉反𭄩上音扶又音力誤玫瑰上莫回反下戶魁古回二反陛上他兮反下步米反挮撜都鄧反幃帳上于歸反下知亮反隱抉反掩也正作蔽也不售音授試是上尸志反大祠音詞右䏶步米反困苦音苦創槃上音瘡下正作瘢重塹七焰反金鍱音大品經作金牒音牒碎粖上乘對反下莫鉢反有槽才刀反箜篌身有棍古本反此依應和尚經音呼也今冝作毗結反轉絃關子也如經配媲字並作婫是也又胡本反非也媲匹詣反字從音毗非從昆古魂反冝取字坌於上蒲悶反無上乘浪反須𢏏音山名也唐言善高亦云妙高翔大明度經等二經十一卷同帙大明度經四卷第一卷善業魚劫反正作業也梵言須菩提或云修浮底或云蘇補底或云藪浮帝或云蘇部底並同也唐言善現亦云善實亦云善吉又云空山雜譬喻經云舍衛國有長者名鳩留産一子字須菩提有自然福報食器皆空所欲即滿因以名之也後出家成羅漢秋露子亦作鶖鷺鳥名也梵言舍利弗亦云奢利弗多羅此云鸜鵒子也舍利此云鸜鵒弗此云子此是時人見其母眼似鸜鵒故詺云舍利子也本名優波提舍不怛都達反驚也熱也火起也正作怛𤇅二形應和尚作憚資貨上即斯反財也經文作訾即斯反量也思也非義也費耗上芳味反下火告反擁著上巨貟反不但都割反正作怛進擢宅角反拔出也不擁音拳變也逯得上徒愛反不否方久反不也應言不不行斯譯主回不為否也佪流上音回正作洄不睹音覩慧一進反𧑮動上而兖反文𩚠尸力反裝也正作飾之鎧苦改反奈何上奴太奴個二反捐人上一入反悴上倉感反下自遂反奏三上祖豆反質音亮即阿修羅是也𪪺裕欲注反寬也苞容上布交反間睱音下費耗火告反昆弟上或作晜二同古魂反兄也後也周人謂兄為也近狩尸呪反守也備也正作獸也狩冬獵也非義也廓上苦回反溝港上古侯反下音講南人謂近河小水溝為港也今經中以為須陀洹者取其入流之義也溝淃同上也又音倦誤其膝音悉鳴絰乎鳴絰乎鳴音烏經徒結反歎異聲也道行經云作如是歎譽小品經云快哉快哉經文作鳴經誤錠光上徒徑反除饉巨吝反神祝音呪𤢌狩上巨今反琦音奇質涼音亮一轅于元反質諌音亮正作涼二形耶償上徐嗟反下得朗反正作黨𢁙有上許依反監天上閻焰二音正作鹽也第二卷去莫丁反不夾胡夬反正作狹狎習上胡甲反量樓藏作植常職反種也或作殖無玷音點𭟃喜上火官反菆樹上才紅反出字樣又才宮義注二反但欲上徒旱反又蛆粗二音誤貌具上戶官反正作完陂水上彼皮反慍猒上於運反𠧒音蓋問訊音信之腦音惱力計反一劫道行經作一逮得證疾道行經作得證詄非一切音劫道行經作一逮居健反𬌏子上徒屋反乍𫢏丁兮反乍仰五郎反舉首也又魚兩反平壞上倉沒反板𡓜自羊反船中帆柱也正作檣推慧上音拳正作蓷不逮音代正作逮也又徒合反正作遝也尓匹曰逮遝也郭璞曰今荊楚人言逮為遝拖張上託何託可二反曳也舒也冝作施失支反施設開張也捕治上音補下音持兩闢毗益反盟誓上音明約也嫉姤丁故反上音早下音瑟瘡癘音賴姪羊一反放嫁也倿𭒯上奴定反下魚列反榆𭁿上音余蠱道上公五反倡優上尺良反楺利上音貪殞命上云愍反歿也第三卷卬幾上伊進反夫上羊一反應和尚經音作姪夫也婸也也鐙炷上音燈下音注者音禍或作楇戚為上倉歷反佛笑音笑重讎市由反之裁子才反正作栽窹已上五故反捋踧子六反踖行而謹敬也經意是蹙迫也近也從也欲喜許記反屈伸音申仰五郎反又魚兩反捔才古反也略也正作粗粗二形之臧自浪反正作藏第四卷喪親上乘浪反揵陀呵盡上巨焉反下知右反正作晝也菩薩名也或云𠃵陀訶提此云香象菩薩也即小品經作香象菩薩是也經中作揵揵陀陀呵呵盡盡開開士士誤也非無怒奴故反梵言阿閦亦云阿祝此云無動亦云無怒亦云妙喜小品經作阿閦應和尚經音作阿閦此經作無怒斛量上胡屋反須嶺力郢反或作巔道行經作山諭諂上欲朱反下染反強梁上巨良反僥幸上音澆下音幸不惜音昔不暏都古反正作睹調悵上由反正作惆哀慟徒弄反適無上釋隻二音往也又音的從也帷縵上于誰反下莫半反戲廬力居反舍也占副蒲北反正作匐也𭄩匕音扶野鴨也又音力似鳬而小也本非𭄩也百稽音啓炫煌上音縣下音皇文繡音秀綩綖上於遠反下以然反不售音授啼器苦屋反正作哭試之上尸志反誤兩脾步米反正作髀如舊音舊瘡愈余主反欣豫音預寶函音咸闟壁上都盍反以衣物橫被於壁以充捨施正作褡也道行經作㩉也又許急反非也又應和尚經音以毾字替之他盍反毛席也非是此義罷倦上音皮惓也因泥丁兮反洗上子老反師拖失支反正作施了戾力計反荊棘居力反愸頓上之領反下都困反坌師上蒲悶反𦢊瘡上補角反皮破也正作𦢊也蘭偱上洛干反下音巡階際木也正作欄楯也下又食準反俠陸上胡頰反下步米反正作陛也儲水上直余反羆字上蒲買反歸也正作罷也誤胸臆上許恭反蜎飛上烏玄反𧑮動上而兖反蚑行上巨支反喘息上川兖反巫呪上音無道行經作巫祝音粥返遺以遂反與也贈也光炎音焰正作焱卬封上一進反桱手上遙曜二音動也正作播種娉呼老反正作好也自警音景𮧓桴音浮不諂染反又音叨非也唃音粗前卷作捔又古木反非也又郭氏音角又呼角反非也畫玷上戶麥反下音點句投音逗勝天王般若經一部七卷第一卷序文此序或在經後置之始洎其既反及也至也置懷上之義反雅懆七到反正作操也又音草非辭丘月反𮝛睦上音集和也負笈上音及負書箱也又其劫反義同法其俱反人名僧杲古老反紛綸上芳文反下力勻反又古頑反渙然上火亂反揵捶上巨焉反下直追反咸萃自遂反智昕音欣彭匯胡罪反尚書云東匯澤為彭蠡也匯洄也又苦乖反澤名伏膺於陵反偱環上似均反萬駰因殷二音股肱上音古下古弘反𣏌梓上音起下音子或猜倉才反經文兜上先安反正作𦙽摩𨢘呼兮反優波舍羅亦云漚惒拘舍羅此云沙波羅蜜亦云善巧方便第七波羅蜜名也𡰱丘丁兮反又音遲或云𡰱低或云尼提此云願婆羅此云力闍那或云若那此云智親戚七歷反治𦲭上直之反下七入反喧撓奴巧反擾亂也三𠍴丘𠃵反意有三業三也謂貪嗔邪見也撾打上陟瓜反下得冷反盲𪾼音翳如槊音朔如衝尺鍾反正作𥍽命終音終憤恚上扶吻反覆知孝反倏忽上尸六反𮌨脹上匹江反下知亮反毀呰音紫漬草上疾智反坑塪苦感反溼物上失入反暫住上昨濫反正作暫暫二形也嚬蹙上毗反懷憾胡感反恨也正作憾也又丘廉苦減二反誤軟語上而兖反恚堙於堅反正作煙云貪欲火瞋恚煙也嘶喝上斯兮反下鳥芥反聲敗也噎也經文作嘶唱誤也拙歰所立反欺侮音武易上莫候反誤瘖啞上於今反下烏雅反第二卷降澍音注腥𬛓乘刀反酤酒上古胡反輕鄙兵美反犁軛音厄盟洗上管貫二音正作盥巖冗音穴罕人上呼笴反勒上兵媚反量忖村本反第三卷塋治上烏定反正作瑩鎣二形也下音持塊擲上苦內反亦作𠙽聞上古瓦反懆毒上初錦反正作墋也又音草誤戲卡音弄收獲戶麥反得也又應和尚音義作穫戶郭反親狎胡甲反可嗾所角反𥛬𬽹上力計反料理上力條反塠𭚖上都回反下音負第四卷佷戾上戶懇反折挫上之熱反下子臥反𤹪背上於禹反正作傴裸形上戶瓦反芧衣上莫交反稗子上蒲拜反暑預上常庶反下余庶反根可食也正作薯蕷食芋于遇反食藕音偶炒穀上初巧反倒仆蒲北反火𦦨音焰又以染反第五卷真丁𡰱反正作胝此云善思惟多姪借音夜反又徒結反羅拿弩假反又作拏莎臼荼上素禾反中巨久反下杜假反柘上之夜反下寧履反簉多上初救反義近音延大般若作剎莚暮舸古我反甌樓上烏侯反羺莎上奴侯反褒多上布高反占匐步北反門堞音牒臱上音扶正作鳬狌狌音生革屣所綺反第六卷若鑿音昨第七卷甘之夜反荻林上徒的反𡰱上於真烏兮二反王膊市軟反眼睫音接額廣上五格反不愜苦頰反遍袒上音偏又音遍誤資財上子斯反龍文殊般若等經十二經十五卷同帙文殊師利所説般若波羅蜜經兩卷上下合卷拘絺夷反實蒢子例反邊也畔也會也正作際也又音除誤寂靖情井反生疱步孝反皮起也法卯卬一進反二同金屑先結反鬱波上於勿反或云優鉢羅花或云嗢鉢羅此云青蓮花鉢頭摩華或云波頭摩華唐言赤蓮華拘物頭華或云拘牟陀華唐言紅蓮華分陀利華或云奔荼利唐言白蓮華文殊師利所説摩訶般若波羅蜜經一卷羼提上初諫反唐言忍辱疲勞上蒲碑反下郎刀反深殖時力反無貌音貌金釙音朴鎚打上直追反下得冷反樹脆匹貌步貌二反皮小腫起貌也正作胞靤二形也又七絶此歲二反並非濡首菩薩經兩卷上卷濡首上而兖反經中亦作軟首或作轜耎二同音軟又而朱反瑕疵上戶加反下才斯反所覽音攬深邃相醉反肅恭上息六反淵𢢶上於玄反下於冀反汪洋上烏光反下以良反崖邊上五佳五奇二反底泓烏肱反深也淡泊上徒敢反下普伯反正作惔怕也澶然上徒岸反漫也𮨇䀎音麵霩出上呼郭反然雲消貌也正作霩霍二形又音鵠煒曄上云鬼反下云輒反炳然上兵永反𥊸稟兵錦反受也遷飛上七仙反吹噭古吊反鳴軻苦何反螺也𧋒蟲上音釋蟲行毒也蛆也正作螫也又徒冬反誤蟒蝮上莫朗反下芳六反蛇蚖五官反蜂蝎上芳逄反下許謁反樓祐音各正作閣又音右誤垣𡓜上于元反下自羊反牗上所初反下由柳反恱懌羊益反樂也正𠮮胡搆反正作后恢廓上苦回反下苦郭反動上子到反摷窟上助交反苞蕉上布加反誤下子消反𮄎𮄆上七朕反下利反躇步上直余反無伸音申丘陬上去求反下才句反並俗潭泊上徒南反下普博反琦上巨冝反苞羅上布交反渆上於玄反下於冀反正作淵懿也淡滿上徒敢反猗著上於綺反錠燭上徒丁反正作也又音殿巨燎力堯反擲霧上時隻反療撈上力吊反下郎到反賜也正作僗也又音窂誤雪上昨木反類也周禮四閭為族鄭玄曰百家也亦聚也今言族雪者誅其根本也正作族也又於騃烏改二反䒵莇上呼高反下助魚反正作茠鋤亦作薅也下又郭氏作側魚反非也蕩除上徒朗反下卷罣得上戶卦反下五愛反慌惚上呼廣反下呼骨反陬落上自字反愷慷上苦改反下苦朗反喟然上苦貴苦怪二反華孚芳無反花榮貌也正作荂莕二形倡導上音唱下音道霧蘢郎公反茙盛上莫候反正作茂也又音戎誤巔倒上丁年反創楚上初莊反衆惚奴老反正作惱也又音忽誤雜垢音狗益集上於亦反正作益霩然上呼郭反褊袒上音偏下音但奚為上乎雞反這當上音釋才也始也又音隻正作適也煒煒云鬼反𪾳畢上云鬼反下云輒反瓅瓅音𢟍玓瓅明珠色也又應和尚音義作玓瓅上音的晑然上音丙光也正作昞也郭氏音響非也應和尚音義作皓古老反上方藏作晌郭氏音祿亦非也晃昱上戶廣反下羊六反填上一了反下莫瓶反並誤奇嶷魚力反之筫音質封莂彼列反仁王護國般若波羅蜜經兩卷上卷僉然上七廉反味勾俱遇反正作句也字樣云無著某者一渧音的城塹七焰反鉾𣛝上音牟下音順下卷杻械上勑酉反下胡戒反𠃵川苦昆反古文坤字也𠃵者天也川者地也灰煬上呼回反雕喪上丁聊反下乘浪反尚殞于愍反瘡疣于求反蠢蠢春尹反憺怕上徒敢反下普百反日蝕時力反彗星上祥嵗反妖星也又音遂漂沒上匹遙反水吹也正作漂礔礰上普擊反下郎擊反亢陽上苦浪反玉葙息羊反正作箱鳩睒失染反國名上居例反正作𦋺健拏奴加反涕出上他禮反目淚也金剛般若波羅蜜經舍衛國者秦羅什譯筏喻上扶月反涕淚上音剃正作洟自鼻曰洟自目曰淚也金剛般若波羅蜜經舍婆提城者後魏菩提流支譯味觸音觸筏喻上扶月反捫淚上莫本反金剛般若波羅蜜經祇陀林者南梁真諦譯遍袒上匹連反抆淚上文粉反𠳀躍上容隴反能斷金剛般若波羅蜜多經唐玄奘譯補特伽羅此云數取趣亦云更求趣亦云人殑伽上巨陵反下巨迦反俯仰上音免俯也羯利上居謁反俱胝竹𡰱反那𢈔以主反塢波上烏古反強有上巨兩反苾上毗必反下測俱反能斷金剛般若波羅蜜多經唐義淨譯圓寂秦歷反舊經云滅度伽上巨亮反制底丁禮反亦云支提亦云窣堵波舊經云塔廟新經云靈廟即佛塔異名也星醫於計反正作翳摩訶般若大明呪經惚壞上奴老反罣得上戶卦反下五愛反實相般若波羅蜜經唅呼含反唵烏感反憾胡紺反引淤泥上於去反咭利上許吉反又音吉怛纜上多達反下郎闞反烏舸古我反㘕郎甘反荷胡可反頡唎上胡結反下力至反性遍音遍周也驃毗妙反擾亂上而沼反般若波羅蜜多心經罣礙上胡卦反揭諦上其列反大明呪經作竭也作羯字者非師大寶積經一部一百二十卷一十二袟第一帙第一卷序太上皇製毫芒音亡草端也麥芒也陶鈞上徒刀反下吉旬反甲胄文右反首鎧也潰旅上戶內反下力與反惠晷音䡄瓊編上巨營反下卑連反睿聖上余芮反靜𭒯魚列反巢燧上助交反下音遂執鞭卑連反擁篲音遂又徐嵗反蟠桃上蒲官反下徒刀反永淳市倫反當寧直與反禮云天子當寧而立謂門屏之間也又音除義同循機上徐倫反登摳尺朱反丕搆上普悲反下古候反勗就上許玉反尋繹羊益反部襄直一反億兆音趙氓之上莫𥝷反野人也恆佚音逸緗帙上息良反第二序告成縣主簿徐鍔撰澡漉上子老反下郎木反唯曒古了反明也聿修上余律反亶作上多旱反大也厚也仙虹音紅晝爍尸斫反睟容上相醉反視也潤澤貌也又子內反目際也危屏音瓶三禮圖曰扆縱廣八尺晝斧文今之屏風則遺像也係慈航上古詣反下戶郎反烏呼音呼烏呼歎辭也古作於戲今作嗚呼也又音乎又况于反非也終盩知流反山曲為盩水曲為厔謂山曲水洄則船車不行也正作盩也又江西音作力計反綬名也非用𮀒示上呼閴反然物相離聲也又呼麥反遹被上余律反亟傳上去記反玄奘自朗反如綸音倫又古反炯茲上音逈又古逈反光也明也瑞憲許建反豁屢上呼各反下力遇反殉齊上徐俊反罕能上呼旱反希也丕就上普悲反洎我上其既反苑籞魚與反禁苑也隄封上音提須畒也又是支反亦作提之扉音非之驥音冀勛格上許云反下古厄反法一信反肅敷上息六反敬也明𫾻音羊刊緝上苦千也頺網上徒回反絶紐女久反弼諧上皮密反輔也備也亦作弼不忒他得反握仙扎上烏角反下爭八反謂持筆也慧迪徒的反探諸上他含反神古眼反庇影上必至反纂而上子管反邠王傳上彼巾反下知戀反驛也盧𭽀倉贊反詹事上之廉反文館古亂反亦作館崔璩音渠鳳墀音遲雞圃音補巨鹿上其與反張説音稅瑣闈上乘果反青瑣墀也下于歸反倐換上尸六反衡晷音䡄宸襟上音辰下音金彤霄上徒冬反荐加上才見反式顏上尸力反徐巨反正作鐈彼穹去弓反遙岵音戶胠篋上丘劫反下苦頰反莊子篇名也上又去魚反江西音作丘呂丘鹿二反非探笥司寺反簡箋作先反槐火上戶灰反木名苔上徒來反下直一反鏤軸上郎候反瓊籤七廉反綵簟徒點反竹席也霓舒上五兮反吹嶽五角反姤路上都故反梵云修姤路唐言契經也正作妒經文卉木上許鬼許貴二反百草惣名也麒麟上巨之反下力人反熊羆上乎弓反下彼皮反鴝鳲上奇枸反下之尓反亦云拘枳羅亦云拘翅羅此云烏鴉鳬上音扶野鴨也茹食上而去反蓊𬅕上烏公烏孔二反草木盛貌也甄叔上居延反樹名靃靡上息委反下眉彼反草木弱貌趾步上音止也流澍音注畋獵上徒年反第二卷上古入反下音𠕀獷古猛反蝦蟇上音遐下音麻刀搶七羊反拒也毀呰音紫資財上即斯反貨也財也所貸他代反遆㸦上徒禮反下乎悟反諛諂上羊朱反詭也虗加上許魚反憒閙上古內反下女貌反𥧦窹上古孝反下五怖反濕繁上尸入反下步波反比丘名唐言馬勝繖蓋上桑旱反輟己上竹劣反薄蝕上布各反下神力反涎唾上序延反噬齧上時世反下五結反謫罰上知𮧓反下扶月反邏上古遝反下來個反第三卷然上倉感反亦作𢡚劈踊上毗益反號咷上戶高反下徒刀反掉弄上徒了反投倉亂反徒穴上於少反嬉戲上許之反贈遺上才鄧反下以醉反鄙陋上悲美反下郎候反盲傴於禹反蝙蝠上音邊下音福眼睛音精梨黯烏斬反媒上莫回反下古候反毯毛上他敢反毛席也橐囊上他各反刀針音針奮長推上方問反下直追反砧前上知林反煆鐵上都亂反鉗推上巨廉反甲也正作鉆下直追反正作椎第四卷明苦角反哆地上多個反下提也反塢計上烏古反𡀔計上盧故反娜唎上那可反下力至反設儜女耕反又冝作濘奴頂反聲穩闥上商遇反下他達反吃唎上居𠧒反嗢哆上烏沒反下都個反𢈔伽上余主反下巨迦反磨𬮼喜夷反正作𣢁也又許器反㮈陀上奴割反麼底上莫果反下丁禮反弭磨上爾反薩𠼝力夷反㘕婆上洛甘反勢囇下力計反磨𨢗呼兮反又音海磨𨢗呼兮反正作𨢘醢醢醢四形又音海塢荷上烏古反下胡可反羅嚀音寧勢鎩所拜反亦作鍛三縵莫半反囉呬上魚𠧒反中魯加反下香至反下亦作㕧第五卷映奪上於敬反下徒活反簡擇上古眼反亦作蕳醍醐上徒兮反下戶吾反親戚倉歷反諸經作二形唐捐上徒郎反下以宣反謂空卉也枯稿苦老反㸦相上乎故反第六卷牟折之熱反吒你上竹加反下奴里反揭帝上巨列反靺囉上莫鉢反憚上傷句反下徒按反嚩嚟洛兮反彈舌呼那𠼝同上波𭊵同上鉢唎音利枲你上胥里反扷上音下音致莫音異又與之反莫企丘智反皤上蒲波反下扶廢反些設上蘇個反俱胝竹𡰱反省霓五兮五結二反囉攘汝羊汝兩二反地孕以證反二合囉上戶沒反囉瘧魚約反耄馱上莫報反下徒個反謎嚧上莫計反下洛俱反枳邏上吉以反下來個反怒孽魚列反亦作𦾨第七卷粵皤上于月反𠧒矖所拜反誤曩酩莫頂反目溪苦奚反吒𭊵上陟嫁反下力兮反驕上居妖反下尸遮反矖野上所介反囉莾莫朗莫古二反囉喃女咸反鉢砧知臨反塞唎上蘇沒反中魚𠧒反下力至反爛捺上郎歎反下奴達反墮喏而者反阿䞘其𠧒反其迄許𠧒反圖蒲弘反今作朋古作本是古文鳳字今為朋黨未捻奴頰反多𭊃蒲梵反多囒郎干反寧疙魚近反經自切罨上