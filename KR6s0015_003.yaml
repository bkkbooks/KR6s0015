毅魚既反穬古猛反不悴自遂反不訕所姧所諫二反謗也荏若上而審反下而斫反若猶𥬕也𥬕而陝反荏苒展轉也因循也卒發上倉沒反𦷥得上必際反下五愛反曀匿上一計反這出上音釋正作適無鞍於良反正作央鞅二形也鞅於兩反諸經以為無鞅數字也又音安誤地裏音里志操七到反憒𡗚上古內反下女貌反懷偑蒲昧反正作佩帶也又音風誤自在王菩薩經兩卷上卷遍袒上匹連反下徒旱反又上音遍非也貫鉀上亦作摜同古患反下音甲謂帶甲也刀鉾音牟掣大上尺世反障敝必祭反正作蔽也又毗祭反非也一探居六反正作掬也又他含反誤下卷曲折之熱反衣裓古得反憒𡗚上古內反下女貌反鄣弊上之亮反下必祭反正作障蔽也並誤也手捲巨貟反正作拳又音卷非也一杷比馬反正作把又蒲巴反非也懟恨上直遂反奮迅王菩薩經兩卷上卷翻譯記𦙚次上所角反月一日也啓挾音甲創筆上楚霜反經文陵莫結反著鉀音甲刀矟音朔怖呼格反正作赫華莫顏反救贖殊玉反聾啞上郎紅反下烏雅應和尚音義作聾痾頑鈍徒困反屎尿上尸耳反下奴吊反下卷分析先擊反伊帝曰于月反多伽巨迦反礦古猛反硬也澀也言語硬也笑語上相妙反正作笑也迭㸦上徒結反下胡故反湯寶星陀羅𡰱經一部十卷第一卷序釋法林撰五乘寶陵反駕也車也今作乘鞮譯上丁兮反允文上唯準反既𭫃於檢反閇取也覆也正作掩也八紘戶盲反方也謂八方也抱朴子曰八埏之外有八紘淮南子曰東北方曰荒上東方曰桑野東南方曰泉女南方曰反戶西南方曰火土西方曰沷野西北方曰沙所北方曰委羽也瀚海上胡案反北海也堤封上是支反頃畒也又音啼亦作隄提二形也鳳冗玄決反洽踵上音持下音腫玄扈音戶天笁音竹波頗音破洎乎上其既反爰懋上于元反為也下莫候反美也搜𫾻上所愁反下以良反玄謨莫胡反比丘名十愊音福正作愊也經文疾船市專反西謂之東謂之舟也正作船船聰睿余稅反耐無上奴代反羂索上古犬反退壞上他內反撾鑱上陟花反下仕銜反月釤所懺反曲橑力條反鈞也取也謂鈎取物者也短槊所角反鐵𣏌北嫁反正作把大棒蒲講反正作棓薜荔上蒲計反下力計反第二卷如熏許云反正作熏璽印上斯此反栂栺上莫口反呬利上香利反迷呿去迦反利篩音師堵母溪上都古反中莫口反下去兮反哱囉上蒲沒反下洛牙反侈陀上尺爾反履哆多可反紐迦上女久反鴦咎上於良反下巨久反朋瞿上蒲弘反移婆上成兮反合作枷音加大集經作羯婆字也你虱上奴里反下所擳反否嘍上方久反下洛侯反大集經作富婁逃竄上徒刀反下倉亂反毀呰又作訾同音紫第三卷悒恨上音邑憂也你弭上奴里反下爾反裝束上阻床反刀䂎倉亂反甲胄直右反擐甲上戶串反駝象上徒何反水上呼古反一滴音的多嘻徒結反揭伽上其列反下其迦反為蘂如水反芬馥上芳文反下音伏聰睿余稅反憒𡗚上古內反下女貌反戰慓力日反正作栗掉動上徒了反幢幡音幡牆堞上自羊反下徒叶反樓櫓郎古反欲𭫶張𮧓反㘁哭上戶高反下苦屋反第四卷號哭上胡高反下苦屋反戰栗力一反椎上直追反下音劈踊上毗益反撫心也摩上測俱反飄勇上匹遙反輕也金屑先結反事菟他故反靨記上於反面上黑子也或作壓於琰反有疵才斯反聰睿余稅反觜星上姊危反搩手上知𮧓反正作磔小疣于求反福上蒲博反冗宿上苦浪反宿上丁禮反從跨苦瓦反腰間也又苦化反奴邏來個反星名䏶內上蒲米反右脛胡㝎反陀你奴里反上上市兖反宿上苦圭反𢌿下上必支反阿溼失入反拇指上莫口反魚鱉并列反處上所八反第五卷薩上莫胡反阿𨴖初六反豎立上殊主反市釐直連反𡰱一進反堅鞕五更反第六卷獷古猛反𢙣也鈛斧上于月反正作鉞蠱道上公五反互相上乎悟反問訊音信告也問也亦作訙鴦伽邏上於良反中巨迦反下羅個反榆利上羊朱反哂利上香至反正作呬大集經作嘻利又尸忍反誤也已下並同音呬受屣所綺反數萆卑弭反數箄同上鉢溼失入反莘闍上師臻反叱電堵上尺一反下都古反哂哂上香至反下多個反大集經作嘻嘻多揭馱上音竭下徒個反大集作竭陀勃提上蒲沒反磨佡丘智反瑟侘嫁反梅底上武罪反婆坘音底又直𡰱反縊哂娜上烏計反中香至反下奴可反荼呿上宅加反下丘迦反耶蒂都涅反經自出伽拿女加反嘔遮上烏侯反菷迦上之手反殞墜上于愍反第七卷暫瞬音舜勝魔上尸證反勝妙同上枳梨上吉以反鍑比佉上所求反中音毗下丘迦反大集經作修比呿婀茂上烏可反下莫候反大集經作阿茂華莫顏反稻禾夌上音道下音麥倉窖古孝反蒲萄徒刀反麼泜上莫果反下忍二反正作泯又音紙誤倉廩力錦反第八卷樹坘低底二音否若上方久反嘍拏上郎侯反下奴加反吒娜上知加反下那可反鳩捨攞上居求反下來可反馱升上徒個反下都口反大集經作陀兜也吒娜上知加反不悄音消又七小反悮也猒蠱音古正作蠱溫瘧魚約反災惱上子才反𧵤器上知與反第九卷陂河上彼皮反讚擊胡的反姧狡上古顏反下古巧反嗜那上神利反囉揭墟偈反經自出墟偈上丘魚反歐佉上烏侯反下丘迦反麼耄莫報反簉陀上初渙反經文自出𥘉𣸪所有反踡縮上巨貟反阿蚶呼甘反經自出嗽履上乘奏反亦作漱欶二形忍耐奴代反第十卷羖羊上公五反獐鹿上之羊反咳欶上苦愛反履篩所綺反嘔舅上烏侯反下巨有反柘履上之夜反阿眵昌支反正作眵大集經作阿車泥𢩪𣎸下二許有反正作朽也大集經作泥休休阿吒婆拘真言作𡰱休休並是也郭氏作了歷二音非也卑上二徒何反朋窮上步弘反下巨弓反惡差上烏各反下初加反坐大方廣佛花嚴經一部六十卷東晉天笁三藏佛陀陀羅等譯第一帙第一卷序文磊落上郎罪反衆石貌也泓澄上烏宏反抑亦上於力反按也美也實日上市力反實也是也不易音亦變也改也轉也已矣上音以止也下亍起反併開上卑政反魚也並也又餅並二音逞曜上郢反不虧丘隨反正作非芥苞上古敗反下布交反蝸牛上古花古懷二反小螺也旱地者名牛遒細上字由反盡也迂駕上於禹反曲回貌也局念上具五反暨晉上巨既反及也至也下音進國名也亦云南晉杜𥎀云今平陽絳邑是也磐牙上步官反兩翅音施鳥翼也翮也亦作翅翨二形也孟顗魚起反靖也樂也人名也褚叔上與反寰中上戶反王者封畿內縣號為寰宇尤重上于求反甚也多也一爽所兩反差也晉誥音告典也華牡上戶花反下阻狀反巨右反昺烈上音丙光也明也亦作炳也下力折反孰窺上市六反誰也下苦規反視也經文華鬘上音花下音蠻其幹古岸反音上音軟菩薩名也又奴短奴亂二反非喜華上許記反睒婆上失染反修羅名摩呼兮反𥌒心上公五反沮壞上疾與反倫匹普吉反涯限上五街反五奇反水際也第二卷暉晱音熖又以陝反非也安峙直里反立也正也正作歭欄楯上郎干反下食準反第三卷綸音輪廣也綸絡也緩也經理也八隅音愚角也第四卷𢭀流上序緣反煥明上音喚光也旗幡上巨之反垣𡓜上于元反下自羊反泛上上芳梵反洄澓上音回下音伏逆流水也漩也倫迮普吉反貧形上步門反八嵎牛俱反正作隅柔耎音軟穬古猛反𢙣也又作獷獚橑觀上力條反窗也空也穿也亦遠也正作寮遼二形也又音老簷前木也宄盡上居右反又音䡄反第五卷鮮少上息淺反揣食上徒官反言剌七賜反澀所反仇對上巨牛反𭜨也寄令自宣反陷溺奴的反古溺也𢱊取上力向反奪也絞上古巧反危脆七嵗反漂淪音輪輕飄匹遙反物隨風貌憤毒上扶吻反怒也驚駭戶騃反匿疵上女力反下疾斯反駃流上所事反速也正作駛𪾼目上於計反孤焭巨縈反無父曰孤無子曰獨無兄弟曰焭第六卷雲曀於計反尓雅曰陰而風曰曀也㸇火上子官反正作鑽怒上羊林反聾聵上郎紅反下五𪫦反盲𥌒音古嚼揚上疾雀反噬諸上音逝齧也盥掌上管貫二音澡漱上音早下音瘦陂水上彼皮反洗濯音濁浣也園圃補布二音種菜曰亦園也淡泊上徒敢反下普百反正作惔怕衰耄莫報反八十耄也耄謂惛亂也忘也醜陋音漏鄙𢙣上兵美也甲胄丈右反法鎧苦改反城墎音郭可俎自與反正作沮第七卷博綜祖宋反習也賈客上公五反倮形上戶瓦反又作裸無衣也映蔽上於竟反下必祭反毀訾音紫惚害上奴老反正作惱也又音忽非獚古猛反正作猛也又音黃非澀所反㧾持上子孔反又音窟非絲上五口反僅半上巨吝反才也劣也少也餘也華莫顏反第八卷絞絡上古巧反也下郎各反維也薝蔔上之廉反下步北反錠光上徒徑反寶鬘莫顏反第九卷俗尸力反脣䀎普幻反美目視也亦作盼也又音麵心觸尺玉反亦作粗稱幾居依反誹也諫也正作譏拖設上失支反設也正作施是夾戶恰反窄也正作狹能辨步莧反致也第十卷彼音岸所猗於綺反依也正作倚憂倉歷反憂戚同上憂也懼也痛也正作戚二形也朝第二帙第十一卷隨𨔵直六反正作逐映蔽上於竟反下必袂反珓珞上古孝反下郎各反成上音代及也正作逮也又音録非迭用上田結反㸦不上乎悟反彼音岸貧窶其禹反貧無財備禮曰寠窶亦空也第十二卷姝妙上尺朱反妖艷音焰美也鄙穢上兵美反下於廢反捶擊上之水反亦作箠摩䨲那頭反此言意生身不徇辝俊反求也最為上子外反回流上或作洄同戶灰反逆也可沮才呂反壞也止也第十三卷侮慢上文府反童曚莫紅反身癭新華嚴作嬰於盈反又於井反非也焭獨上巨縈反老邁莫芥反遠也危脆青嵗反密身上愍筆反天名九竅苦叫反阤羅上達何反又音豕非伽阤上巨迦反下徒何反欄楯上郎安反下食準反窗牖音酉第十四卷勒上兵媚反慧淵於玄反柔耎音軟第十五卷塵曀一計反免贖市玉反忿恚上芳粉反下於季反鉤鉺人志反分扸先擊反楯音順憂惚音惱脣䀎普幻反又音麵第十六卷所猗於綺反附託也幃帳上于歸反下知向反從小者非窗牗音酉正作牖也説文云在室曰窗在牆曰牖恬然上徒兼反亦作恬連膚音夫皮也肝肺芳廢反揣食上徒官反古文也今作團第十七卷相扣苦狗苦候二反擊也連膚音夫六瘤力由反剩肉也眴息上音舜亦作瞬奔驟助右反或遺維醉反第十八卷其干古寒反傘柄也正作竿又古罕反技本也經作千非絞飾上古孝反裝飾也正作鉸珓二形又古巧反非也冠冕上音官下音免首飾也易曰黃帝戴黃冠禹致美乎獻冕同加垂旒皆玄上緟下以木板廣八寸長尺六寸以卅叔玄布衣之於上謂之延以朱繒為裹大裘之冕無旒袞冕前後各十二旒鷩冕前後各九旒毳冕各七旒絺冕各五旒玄冕皆綵為旒亦云藻每旒有五十二玉間各一寸九旒青珠七旒黑珠也世本曰黃帝作冕杻械上抽酉反下戶戒反𢱊上苦老反下力向反裸形上戶瓦反𢷋上上必遙反俆噍上序余反下自妙反不退音退庠序上音祥審也俎壞上自與反正作沮也宍上息委反下如六反撰擇上思兖反正作選傭纖上容反筒密上徒東反齊也義合作同第十九卷肉抓爭巧反無五愛反門外閞也正作開柔而兖反弱也亦作濡耎懈怠上古賣反下徒改反懶也上作懈第草卷華鬘下莫姧反正作所呂進反惜也恨也誤慊恨上戶兼反又苦點反誤聰睿余芮反履行上力几反正作履寶裊祥兩反正作象悲願魚勸反欲也每也念也思也誤問第三帙第草一卷撰擇上宣兖反離曀伊計反俎壞上才與反敗也壞也正作沮又音阻非用拖作式支反設也正作施逯得上徒愛翻䨱上芳煩反下芳玉反第草二卷覺想上古孝反第草三卷鉤餌人志反沮壞上慈呂反柔耎如兖反法鎧開改反迫迮上補陌反下爭白反揵馱上其焉反下陀個反刪兜上所姧反正作刪也兜率天王名也亦云珊兜率第草四卷照一上音照疑挴火罪火對二反吝也改也正作悔又武罪反貪也傅寫誤也偈讚音讚慊恨上刑兼反又苦忝反非柔濡而兖反又音儒蔽其上并袂反不勉明辨反止也脫也正作免為師所類反統也又音率將也淳至上時倫反朴也肌宍上居夷反下而六反第草五卷獷古猛反𢙣也戲笑私妙反弊惡上鞞祭反下阿各反欲乎𢦥反巢窟上助交反籠攬上盧紅反下咸黯反闌圈也正作擺檻也喜法上許記反好也捫摸上莫奔反下莫胡母各二反撫持也自投徒婁反又之末反誤備受上皮祕反具也僉皆上七廉反咸也皆也卷舒守諸反澆漬慈智反沮壞上自與反第草六卷氛氛芳文反霧也須以朱反又作臾蠱毒上姑五反溉灌上古愛古氣二反啼哭空木反正作哭遏絶上安割反第草七卷淪沒上力旬反消涸何各反淤泥潦上於據反中奴計反下郎道反者上徒活反第草八卷無閡音礙煩惚奴老反正作惱又呼骨反非為鬘息朱反花蘂也口噓音虛軻梨上口何口我二反山名此云空破山也由乾巨焉反正作𠃵瑜伽論云持雙山第草九卷陜心上咸夾反小也正作狹狹二形也愚曚莫紅反又水孔反第卅卷鞞婆邏上毗兮反下羅個反頻電音申顛倒上丁田反下刀告反遮姤都故反數名摩馱音大彼音岸華鬚莫顏反正作鬘道第四帙第卅一卷枳怛上吉紙反下丹達反菩薩住處巴連上補麻反邑名摩瑜他侯反國名正作鍮偷二形又羊朱反鄰阤達何反又音豕誤羅延羊然反又音征誤𦋺上居例反癡曀伊計反俎壞上才與反又音阻誤第卅二卷眩或上玄縣二音惑也亂也幻也藂落上音聚誤又在紅反卒疾上沒反下秦悉反短上都管反抓牙上爭巧反浸溺上子沁反下奴的反宮館古亂反第卅三卷奮迅上方問反下相俊反鳥振毛也齗齶上魚斤反下五各反右䏶步米反右𬧅市軟反無雜自匝反猒上於焰反下烏故反憎也下正作惡錠光上徒徑反第卅四卷所殖市力反種物也童曚音蒙昧也能澍注樹二音時雨也第卅五卷煩惚音惱又呼骨反非也百䅽古木反卉木上許鬼許貴二反輕濡音軟又人朱反非淡癊上徒甘反下於禁反柔濡而兖反娛樂上牛俱反映蔽必祭反乾乘老反邊丁禮反又音祇非也拖作上失支反設也正作施也玫瑰上莫回反下古灰戶灰二反第卅六卷漂沒上匹遙反風災子才反淵池上於玄反金翅音施奮勇上方問反兩劈步益反正作闢而撮子活反也無退音退第卅七卷花𩬞莫顏反稟受上兵錦反逯得上徒愛反𭊴味上許右反寶𩬞音蠻淳熟上市倫反憂惚音惱第卅八卷無字第卅九卷鄙悲美反量塌音塔或挑他條反捾取也或級居立反斬首一人賜爵一級因名賊首為級第卌卷滅上自歷反鄙陋郎豆反垂第五帙第卌一卷癡曀伊計反無閡音礙俎壞上自與反壞也止也正作沮也罣閡上戶卦反彼音岸毀呰音紫第卌二卷隨慎垂潤反正作順摩䨲奴侯反淡泊上徒敢反下普百反安靜也正作憺怕也柔耎而兖反奮迅上方問反下相俊反金翅音施膜上苦角反下牟各反撮上布各反下倉活反憒閙上古內反下女貌反戲笑私妙反輕躁子告反愍悼音導罪舋許吝反輕莫結反第卌三卷嫉姤上自悉反下都故反頻蹙上毗反下子六反瞋也眉貌也正作顰蹙柔濡音軟古猛反亦作獷不音違𠃵闥他達反從上斯此反映𦷥必世反盲𥌒音古嬉戲上許之反下許義反壞器上普回反第卌四卷枯稿枯老反渧數上丁歷反又音帝非頸項上居郢反巨成二反下胡講反為轂公木反又口耕反非為輻音福受音為楯音順兵器也深塹七熖反澍法上注樹二音熒火黃瓶反寶鬚莫顏反泛遊上芳梵反拜暑常𥎀反位也正作署達嚫初吝反欄楯上郎干反下食準反寥嚮上力條反穿也下許亮反謂窗牖也垣𡓜上于元反下疾羊反列殖市力反華鬘上呼爪反下莫顏反俗第卌五卷裸形上戶瓦反城墎音郭捕獦上蒲悟反下力反放牧音目振恤上之刃反下私律反救贍也從具安峙直耳反第卌六卷羼提上初諫反唐言忍庠序上徐羊反下徐與反忍鎧苦改反勉衆上音免止也脫也泣涕音躰沮壞上自與反嘯和上蘇叫反下戶臥反祝藥上之右反第卌七卷隧落上直遂反正作墜逯得上音代及也起塌音塔頂冠音貫天冠音又官貫也各齎即西反澡瓶上子老反洗也無賈音價映蔽上於竟反下必繼反鳬上伏無反喜樂上許記反窗牖音酉除愈余主反第卌八卷錠光上徒徑反縈髮上於營反結也長上息廉反細也正作纖也又音杉非縵上莫官反傭䏶上容反下步米反鹿𬧅市軟反第卌九卷黶子上於琰子姝妙上尺朱反能力吊反治病也正作療耶上序嗟反下余林反下又五耕苦耕二反非也垂都果反正作睡身珮步昧反或挑他聊反撥也又音叨或投音頭柔濡音軟弱也又音暖非蘭揗食尹反刪兜上所顏反天名第五十卷船舶音白海中大船曰舶流淵於玄反刪兜上所姧反屯堅上徒昆反天樂神名亦云屯甄此云樹也寶𩬺莫姧反拱第六帙第五十一卷沮壞上自與反門閫苦本反煩惚音惱映蔽上於竟反下必世反正作蔽等𧂐子賜反膜上苦角反下忙各反寶繒疾陵反鴈王上音像正作象狗王上古口反舟接集二音進船掉也宣敘徐與反次第也毀呰音紫第五十二光炎音焰正作焱怡上許之反下與之反憂倉歷反城墎音郭癡曀於計反第五十三鄙陋上兵美反下郎豆反陵蔑目結反宴集上於見反會也羼提上初諫反危脆七歲反隅者上音愚角也罣閡上音話下音礙第五十四俎壞上自與反正作沮寶帳知亮反覆蔽必際反卉木上許鬼許貴二反百草惣名也衆也叢林上才紅反苗稼音嫁枯稿苦老反病瘦所右反自擈蒲角反上欣音素正作訴也又音欣誤令濟上自宣反隧於上直遂反正作墜盲𥌒音古牀席上助莊反腸胃音謂正作胃第五十五卷鬚蓋上莫姧反正作鬘姝妙上尺朱反淫泆上羊林反下羊一反又作泆枯燥乘早反陵徒活反侵犯上七心反犬豕尸尓反蘭楯食尹反鉤闌也又巡順二音沾浛上知廉反下胡夾反正作霑洽也又胡紺反誤巖崿上五銜反下五各反裸苐莫交反正作茅撫採上芳武反下居六反正作掬新華嚴經作撫鞠是也囹圄上力丁反下魚呂反裸形上戶瓦反榜苔上步盲反下丑之反正作笞也悲號音豪矝赦上居陵反下尸夜反刑力竹反也第五十六卷華鬘莫姧反臍中上自兮反髓𦜩音惱又音忽誤悼惻上徒到反下初色反欲娉匹政反殞滅上于愍反第五十七卷縷練上力主反嫉姤上秦七反下當故反繒纊上疾陵反下苦謗反淵渟上烏玄反下徒丁反經作淵停誤也蠲除上古玄反第五十八卷柔音軟記莂彼列反正作𧧸拯拔上取蒸字上聲呼救也下蒲八反淤泥上於去反水中泥也勉濟上音免脫也鉤鉺人志反正作餌淵居上於玄反原丁禮反誤㧾攝上則孔反又音窟非也苦役音伇傭作上余封反𢌿下上必支反𢤱戾上力董反折角上時熱反不音違童曚音蒙師上音道引也亘生上古鄧反遍也第五十九卷羅邏來個反脆假上布交反又七絶反誤爴裂上古麥反破也打也正作二形𢤱悷下力計反沃燋上烏酷反下子消反善鑷尼輒反鈷也甲鐵者也利矟所卓反釿斧上音斤下音府衰耗呼告反洗濯音濁善羂古犬反鉤餌而志反淵居上於玄反阿伽其迦反藥名阿伽陀此云無病一銖音殊瞻蔔蒲北反捐減上音下胡斬反燈炷音注竄伏上倉亂反琴弦音絃中上苦角苦木二反摩伽其迦反亦云摩竭此云鯨魚也魚王也依恃時止反沮壞上才與反犁無上力兮反有扼音厄不令音全爛壞上郎歎反金屑先結反碎末也肴膳上戶交反䓚也食也第六十卷苞容布交反乳糜美為反法蠡洛禾反增孫本反正作又音緣誤錠光上音㝎佛名
