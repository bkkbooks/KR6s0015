寶古猛反金玉之璞也正作磺今作礦礦二形古文作鉗草二形説文從黃第三卷一徒官反嬈亂上奴了反亦作嬲吹蕩徒朗反開闢也搖放也正作蕩吹蕩同上塵曀一計反犀牛上先兮反噠囉上徒割反沓婆上徒合反婆褐胡割反𭜨讎市由反仇也對也虎犳補貌反豺狼上助皆反獐鹿上之羊反枳薩上吉以反愍惻初力反身猗於綺反誑上居小反急躁子告反蝮蝎上芳六反下許謁反蚤上子老反下所擳反蜂鼠上或作蜂螽二同芳逢反蜜蟲也尾有刺蛆人者也孝經援神契曰蜂蠆垂芒為其毒在後是也經音義作螽應和尚以鼨字替之音之弓反非也經意蜂鼠二物非只鼠也蛆音哲重胡上許運反正作薰燻曛訓四形閞西呼薰胡亦云薰侯山東云訓狐即鵂鶹也菟梟上他故反下古堯反鷹鷂上於陵反下以照反甘脆此嵗反辛所立反鹵上戶緘反下郎古反青翠七醉反蔚茂上於謂於勿二反下莫候反草木盛也毀呰音紫謫罰上知𮧓反下扶月反捕獵上音步捉也下力反忌尅上其記反憎恐也下苦得反又應和尚以期尅替之上音其第四卷羯篩上居謁反下所綺反坘𠼝上丁禮反又作底𠼝婆𡱝音西頞羅上烏割反𭋶差上郎侯反下叉戒反妹囉上莫鉢反柘之夜反支邏來個反蒲陶徒刀反亦作萄類也虎豹補孝反蕃息上音須茂也滋也息也閞中言㛯息芳万反摩系胡計反第五卷不啞烏雅反喜重上許記反訴訟上乘故反冗旱上苦浪反正作亢猒蠱上於琰反下音古誤羅婫匹計反正作媲系杵上胡計反下尺與反經音義作系杵憘樂上許記反下五孝反上又音喜利上疾反不𢙨古拜反驚異也正作怪菟身上他故反第六卷佉伽上丘迦反下巨迦反亦云朅伽齊言犀牛也毗沙拏奴加反齊言角𦷥性上毗袂反𢙣也正作弊婁上苦圭反下郎侯反熒或上戶營反𭥦畢上莫飽反觜參上姊壘反娵星名也下所今反翼上以力反下之忍反冗互上苦浪反下丁兮反枲呵上須陵反經自出也應和尚作息里反非也䨲娑上奴侯反婆蹉千何反陂泊上彼皮反下普博反不流水也下正作濼弊𢙣上毗祭反第七卷鄙賤上悲美反搆捋上古候反下郎活反醇淨上市倫反溉灌上古代古忌二反辛澀所立反枯燥乘早反羖羊上公五反奚摩上胡雞反𧿡多上蒲末反尸仛加反經自出又音鐸應和尚作勑嫁反非也頭坘丁兮反尸騫丘𠃵反又作褰哆廬上丁可反下力魚反摩上尸遮反跌荼上田結反下宅加反瘡疣于求反編髮上蒲犬反交織也正作辮也又音邊𭃄巷胡絳反縷綖上力主反下相箭反班駮布角反黃鼬由救反朚瞿上莫郎反儚伽上亡魯反經自出又應和尚作霍弘反睒婆上失染反頞支上烏割反黚婆上九嚴反經自出枲何上息里反黟𠃵上一兮反經作一子反誤也急上七到反志也言行急也正作操也又子告反正作躁躁絺多上夷反謫罰上知𮧓反黜上卑進反下律反熊羆上乎弓反下彼皮反並獸名蠅𧈡音早正作螽也營綜子宋反商賈上尸羊反下公五反豬豚徒魂反豕子也亦作肫豚哆絰上多達反下徒結反嘍子上洛侯反下音奚正作兮也悮虱蠆上所擳反下芥反崎囉上丘肯反黟泥上於耆反子泥上音奚正作兮婆稚直利反修羅名第八卷則挑他條反盧上徒骨反稟受上兵錦反獷澀下所立反初錦反汙坌步悶反牸牛上才寺反袈裟匹見反正作片首阤音陀儐罰上卑信反縮上巨錦反婆系戶計反𭦟讎上莫官反叉收尸由反首牧同上首牧亦同上又音目誤旦那上多案反䨲那上奴侯反涑唎上娑樓反經自出又枲須陵反經自出矢至上失旨反摸囉上莫胡反又音莫呵紂直有反婆𨴖又六反緊柘上吉忍反下之夜反阿衫所銜反捲縮上巨貟反毗𡃳呵朋反經自出索上古犬反鉾上倉亂反下莫侯反或長音仗跛癖音辟背僂力主反迭相上曰結反持𢬩扶月反正作筏駃流上所事反疾也又快決二音誤閔邏上眉殞反下郎個反伽蓰所綺反阿囉上烏何反儐從斯此反鞕打上卑連反希有上許衣反奩鼓上力鹽反相上徒禮反第九卷巷跕上胡絳反下他叶丁叶二反白郎合反蒲萄徒刀反掘求上巨勿反鴦崛上於良反下其勿反𢙣上七到反正作操羅仛加反經作刃加反誤羖羝上音古下音低讇鞞上市瞻反經自出槃荼上居求反正作鳩也下宅加反此云陰囊亦云刑卵謂陰囊狀如冬瓜行時擎在肩頭坐則踞之也烏場直羊反藪離上蘇走反嚪婆上羊廉反堤他上丁兮反刪時上所姧反只薩上支紙二音香筒音同枳薩上吉以反𦋺上居例反搔上乘刀反刪朱上所姧反天鎧苦改反蓰堤上所綺反于闐音殿龜茲上居追反下子慈反執蠡郎禾反鄯善上時戰反下時演反國名也本名樓蘭因傳天子勑斬其王復更名鄯善上鄯在去聲下善上聲然經中亦惣作善善字婆雌七斯反雙瞳音童目企丘智反箭爪爭巧反甄羅上居延之人二反阿兮音奚摩坘低底二音鍮石上他侯反白郎盍反水潦郎到反第十卷氐宿上丁兮反嵩伽上息弓反波搜所愁反薑闍上居良反國名頻螺郎禾反遮噠徒怛反諸經達嚫字皆作噠或云檀嚫也國名也應和尚作勑轄反區荼上烏侯反國名羅上烏兮反褰遲上丘𠃵反瞬遲上尸閏反悉鬚他計反孫愐韻作鬚俗以為替之替也海島都老反涑利上速侯反日虹音紅惱創音瘡嗶啼上戶高反𪸼帳上由反正作惆下亮反自抑於力反崩頺徒回反懆𢙣上七到反志也言行急也正作操慥二形也又音草誤火攢才官反自撲蒲角反圮上皮美反下格反檛打上陟花反摩子音奚正作兮唐大乘大集地藏十輪經一部十卷第一卷聖教序御製庸愚上音容常也淺也正作庸𬙘窮上呼旱反毫𨤲音狸挹之上一入反蠢蠢昌準反庸鄙悲美反慨深上苦愛反探𭭻上他含反下仕責反馳驟助右反泫其上玄犬反䡄躅直玉反綜括上子宋反𥝠扄古螢反門外閇也黔黎上巨廉反𣫍𥘛而甚反衣禁也昆蟲上或作蜫䖵二同古魂反下直中反神甸徒見反齠齓上徒聊反下初覲反嶽上將句反添也經文殑伽上巨陵反下巨迦反稼穡上音嫁下音色種曰稼𣫍曰穡溝上古侯反下呼各反蠱毒上公五反毒藥也正作蠱疫癘上唯隻反下力計反苦歰所立反杻械上勑酉反下胡戒反鞭橽上卑連反下他建反楚上苦老反𮊵惙上力垂反下知劣反所螫尸亦反又音郝戰掉徒了反動也達上商遇及農人也剡魔上以陝反芧屑先結反讖蒲上初禁反方廣十輪作閻浮羯𠸪上居謁反下羅角反茷囉上扶月反方廣十輪經作毗囉也伐折下時列反方廣十輪作婆闍囉或折囉此云金剛蓿摩上徒感反正作萏也方廣十輪經作達摩帝昵上丁𤿺反下泥吉反丁𤿺補果反又音播正作帝字切腳𫽄婆上𥘉洽反塢波睒上烏古反下失染反奈野娜上奴太反下奴可反剌惹上郎割反下而也反剌拏奴加反臘婆上郎盍反下迦反醯上呼兮反又音海蓿謎上徒感反下莫計反諀上匹里反經作正里反誤揭剌上其列反吹上𨢘以反下力計反臘薜毗計反曷剌上胡割反弭上爾反黳羯上烏兮反下居謁反託齲上他各反下丘禹反闥上他達反磨綻徒界反經自出𭙴綻上音丹正作𭙴又多個反下徒界反方廣十輪作多杖盎矩上烏浪反下俱禹反遏𠼝上烏割反下力夷反祁𠼝上祇以反祁唎音利苫沫上式占反𢾊祇上宅耕反下蔡計反滸盧上呼古反説文作汙窣堵上蘇骨反下都古反𭇶力耳反叛荼上蒲半反喝羅上呵割反正作喝方廣十輪作呵羅也又烏芥反非也嚕上郎古反下郎胡反方廣作䅽藥上古木反細耎而兖反煩惱音惱第二卷聰哲或作哲哲三形同知列反智也姧上古顏反下居小反乘馭音御毀呰音紫誣𠕀上文夫反盲翳一計反疫癘上唯隻反下力計反癲癎上丁年反下行間反平恕音庶豸推上即見反下尺維反嫡子上丁歷反珥璫上而里反下都郎反環玔上戶關反下尺反傘蓋上乘旱反亦作繖輕𮆘莫結反闕正上丘月反羯諾奴各反彆荔上卑結反下力計反此云餓鬼有作荔多者誤也鮮薄上息淺反賑恤上之刃反下正作恤謫罰上知𮧓反謫罰同上佷戾上胡懇反下力計反嘉上音加下神利反正作嗜嗜嗜三形嬉戲上喜之反猜二上此才反疇咨上直由反咨也正作也城墎音郭邏上商遇反下來個反舍羅上尸夜反此云百舌鳥也雄者也若言舍利雌者也溪澗上苦兮反陂河上狓皮反嶮岨上許撿反下側所反正作阻也又子余七余二反並非也形音六囹圄上力丁反下魚與反幽縶知立反絆也驅擊上烏口反耽湎上都南反下兖反結憤扶吻反跨王上苦化反下于誑反亘窮上古鄧反蘇刾來割反正作剌比丘名蘇剌多此云善樂溟海上莫瓶反海之別流也亦海之名也第三卷輕子告反艷色上羊贍反嗢達上烏沒反底沙上丁禮反寶積經作迦盧底輸憒𡗚上古內反下女貌反蝸螺上古花反下郎禾反牛麝時夜反挑取上吐條反搗蓗所綺反羅也正作篩又所冝反竹器也芬馥上芳文反下扶福反萎悴上於為反下自遂反鐵徒官反卉木上許鬼反不挊音弄不卆倉沒反獷古猛反𢙣也硬也經作獚音黃誤也素怛纜音濫亦云修多羅亦云蘇妒路唐言契經燕麥上一見反苗似麥其穗音遂第四卷商估音古灰燼辝進反凡猥上扶嚴反下烏罪反黜上卑進反下曰律反諂倿如定反桃壞上吐條反侵倰力乘反棯箭上奴叶反視覘丑熖反候也又廉反窺也彎弓上烏還反號詬上戶高反下呼構反謂叫怒也哽噎上古杏反下一結反速𮜍徒盍反踐也自桃吐條反正作挑朅籃上丘列反下郎甘反唐言強鬡上仕耕反下女耕反其頸居郢反所賚郎代反頒告上布還反挂其上古話反智策楚責反兩脛胡定反欲撲蒲角反抆上文粉反摩拭也聰睿余稅反聖也智也正作睿睿二形壓油上烏甲反有蟲直中反第五卷那庚余主反正作𢈔窣堵上蘇骨反甘簏之夜反又力木反誤𭁿歒上苦候反鈔也暴也淤泥上於去反上於小反下乘浪反愆陽上丘𠃵反旱上苦浪反怛絰徒結反𭥗上莫報反下力計反揭臘茷上其列反中郎盍反下扶月反梨上恨沒反曷票上胡割反下力日反笈謎上其劫反騷剌上乘刀反下郎割反姤剌拏上都故反中來割反下奴加反唈茷上烏合反丁扶月反𭌆茷上音履下音伐啞羊烏雅反障𦷥必祭反啞羊音亞亦作瘚憃愚上降反愚也出應和尚音義又𭃄作用龍江三反泆上羊林反下羊一反障蔽必際反障敝同上也又毗祭反非也𮌨脹上匹江反下知亮反爤臭上郎嘆反下尺右反交五貫反習也正作玩第六卷悖上許容反下蒲沒反厲上初錦反正作磣墋二形也磣辣不可食也𢙣性者喻之呵叱尺一反崖揆上五佳反岸也水際也正作崖涯崖三形也又音冝下求癸反度也勇揵其建反正作健舌𤴽其禁反舌病也謂牛舌下有病如小丁頭而黑牛有此病則不食水草人以鑷之即差也亦作𤘡輕誚自妙反打棒步講反課稅上苦禾反差也第七卷無字第八卷車輅音路凡礫上五寡反下郎擊反所輾女展反投掣尺世反酬抗苦浪反非也顏莫豹反第九卷鬱𤉋之剩反乖諍上古懷反挮撜上他兮反下得亘反四扼烏𮧓反正作軛第十卷擾上子告反下而沼反簫然上蘇條反正作蕭鬱蒸音證熱氣也正作𤉋吊大方廣十輪經等二經十卷同帙大方廣十輪經一部八卷第一卷佉羅上丘迦反提耶上冝作堤低底二音山名水𣴊普包反謫罰上知𮧓反觸身上尺玉反苦澀所立反煩惚音惱浚流上音峻正作浚回示上胡頂反今作逈彼音岸如𡱝音西倮者上戶瓦反駃流上所事反連也正作駛也又快決二音並非也誤自蔽必祭反溪澗上苦奚反溝𭐋音郝蟲道上公五反正作蠱鉀仗上古狎反囚執上似由反鞕杖上卑連反誤也𤢌獸上巨今反所螫尸亦呼各二反等屑先結反閻浮上初六反浮上二同初六反正作阿含尸夜反正作舍也地藏十輪作阿迦舍婆吒居𠧒反正作吃地藏十輪作羯婆吒上音娑下陟家反地藏十輪作薩帝也修躓上息由反下陟利反地藏十輪作素吒摩𨢘呼兮反上尸遮反奚上戶雞反正作奚陀奴禮反陀同上正作也他仚丘智反度扠上音摩下皆反地藏十輪作磨綻梵音輕重訛舛耳又或是牧度上文粉反下徒古反鴦久上於良反頞梨上烏割反枑梨上音耆正作祁地藏十輪作祁𠼝枑梨上巨戶反正作祁地藏十輪作祁𠼝苦婆上式占反𧴥祇上冝作音直地藏十輪作𢾊祇梨杈皆反正作𭠎嚧𠺕上音虛下音留地藏十輪作滸盧嚧樓𠺕上許魚反下盧求反地藏十輪作滸嚕嚧檀奴禮反阿𧙯直一反第二卷戰栗力日反苦惚奴老反又音忽誤互相上乎故反毀呰音紫魅上知反下眉祕反冷𣊵奴短反藻浴上子老反爵位上子削反料理上力條反𠐝罰上竹隔反擲罰同上鞭杖上卑連反疑古縣反城墎音郭邏上商遇反下來個反緻密上直利反欲𡑅烏甲反第三卷自姿咨次反正作恣佷戾上戶懇反嬉戲上許之反剪治下音持伐也爪甲上爭巧反戲挊音弄刑𠢜音六煞也正作壽上於小反不勘苦含反正作堪多憘許記反好也正作喜嬉二形也又音喜情也非蛭數上丁悉反亦云底沙憒閙上古內反下女孝反麝香上時夜反又音石桃其上他條反搗蓰所綺反羅也又所冝反輕莫結反無也揌持上子孔反𧅚麥上其俱反正作蘧稗莠上步拜反下由柳反穟既上音遂秀也田畯子峻反農夫也諂曲上丑染反偽也正作諂又他刀反疑也非用第四卷墾土上苦佷反塌寺上他盍反毀訾音紫挽箭上無遠反踏彼上徒盍反踐也軻藍冢上苦何反中郎甘反下知勇反蹲坐上自尊反舐足上時紙反皆疼徒冬反壓油上烏甲反俸祿上扶用反秩也冗旱上苦浪反霖雨上力今反置梨上莫報反正作𭥗也地藏十輪作𭥗栗芝上力日反下章而反阿昵尼日反迦上尸六反地藏十輪作束又經音義作喌才歷反非也此蓋譯人或筆受者妄加其口以為叔字致失本音矣鉢哆丁個反舊拏上巨右反阿菟奴侯反也婪梵上郎含反地藏十輪作𭌆茷第五卷鬲身上古厄反別也謂別受身處也正作隔地藏十輪經云餘身是也啞羊上烏雅反堅鞕音硬駃流上所事反編椽𣗥刺上居力反獷古猛反詭語上居委反捉攬郎敢反愍矝居陵反第六卷憒𡗚上古內反下女貌反喑啞上於今反舌𤴽巨禁反牛舌下病也正作噤齡𤘡𤘡四形遏善上烏割反將師上即亮反下所律反祠祀上音詞下音似估客上公五反勉斯上音免脫也第七卷蹍斷上女展反逯得上徒愛反淤泥上於去反又音由誤由離力義反正作離柔而兖反又奴管反誤輦輿上力蹇反下音余車也載也正作輿也又音𥎀舁食者也非聖一進反信也大集須藏經兩卷上卷船橃扶月反大曰小曰桴乘之渡水者也正作筏撥二形泛施上芳梵反係心上古詣反傒念上同又音奚誤𤏙乳上奴管反虻上音文下音盲蝗蟲上戶光反下直中反旱潦郎告反丘墟丘魚反溪澗上苦兮反嶮壙上許檢反下苦謗反蓊蔚上烏孔反下於貴反苦歰所立反豆𥢶苦外反廣硤下夾反隘也正作狹尤劇上于求反下巨逆反衰耗呼告反地邪地上亭也反中以嗟反下音他誤亦云怛絰他亦云怛你也他並是也搔𨢘上乘刀反下呼兮反伽苫上巨迦反下式占反羅制中丁𡰱反下隻兮反羅丁𡰱反與同也又音止誤又音底掣下隻兮反與制字同也又尺世反又尺兮反憩多上去例反正作憩劬摩邪上求于反下以嗟反諶林上市針反篩所綺反賃鞞上女禁反下步迷反佉曷上去迦反下胡割反揵咃上巨焉反下他個反鵄提上尺夷反邪娜上羊嗟反下奴可反延拏奴加反多上蒲末反又烏交反誤戰慓力日反正作栗吐疜音下痢疾也癵縮上力貟反迭相上田結反帝爾反正作弭婆嘶音西迷踦丘冝反又音剞都裔音曳𮑣邪上布果反下以嗟反債鞞上女反誤梨上尸遮反下卷蝦蟇上戶加反下莫加反毒齧五結反申上毗反下正作軟謂舒手㐸呿也輸拒上束朱反下音巨𦯕勤上楚責反敖貴上戶高反作勢豪二形又五高反出遊也戲也非用剔除上他歷反如篋苦頰反惱𤇏音證無𦍬音姑食蒜乘亂反葷菜也説文作蒜薜荔上毗計反下力計反伽嚪羊廉反目仚丘智反𠧒匂音蓋臭屏步正反安豸徒賣反苓翅上力丁反下尸智反達坘低底二音無辜音姑罪也字從古從辛作辜臠縮上力貟反正作癵也又力兖反末堤低底二音囉喃女咸反潦溢上郎告反又音老遮嚌竹皆反又在計反非衫婆上所銜反阿鎌力鹽反裴摩上扶非反又音陪梨拪音西摩蹉千何反椑伽上音卑正作裨盧醯呼兮反濘伽上奴定反柘漩上之夜反下序全反迦㘕郎甘反又音濫諶鞞上市林反迦上烏兮反蚊上無云反下而稅反泉厡魚袁反胡椒子消反豍麻上卑兮反正作萆萆二形也經音義作蜱豆應和尚以豍豆替之並非也經云和豍麻油呪一千八遍是也便澍音注愛羂古犬反逃避上徒刀反喜笑音笑押油上烏甲反躓朴上之日反正作質下普角反質本也主也朴木素未成器者也正作朴字也上又音致非也阿差末經云其諛諂者令修質朴是也一斛胡屋反暴虐魚約反鬪𧯞音斗民虛空藏菩薩經等五經十一卷同帙虛空藏菩薩經一卷底翅音施嗅香上許右反此堓音岸礔礰上普擊反下郎擊反傘蓋上乘旱反荊棘居力反坑坎上苦庚反下苦感反不平也塠阜上都回反下扶久反澄霽子詣反瘖啞上於今反下烏雅反癃殘上力中反病也毦帶上而志反羽毛飾也馬璁音惱為鬚莫顏反為蘂如水反花中茸也正作藥也拘癖卑益反正作躄𤓁摩上音焰天名也邏訕上郎個反下素干反母塿郎斗反踣鈐上怖得反經自出下巨廉反虛空藏神呪經作浦窮應和尚依字作蒲北反非也鈐臺上巨廉反下徒履反經文自出伽疧上巨左反下丁履反麞鹿上之羊反完全上戶官反根栽子才反城墎古霍反正作郭淫泆上羊林反下羊一反衒賣上音縣自媒也囹圄上力丁反下魚與反撗上於小反𢿛上烏口反下郎候反諾踦上奴各反下去支反經自出虛空藏神呪經作那企應和尚作居綺反非也䫂上多可反下力計反阿䨲奴口反經作奴𠮮反誤也奴𠮮胡口反正作后卬上伊進反下以廉反閻字𭃄腳粟上力日反浮侈都可反經自出祂迦上吐賀反下居左反胡個反正作賀拖字切腳扶𭾖以梵反虛空藏菩薩神呪經一卷映蔽上於竟反下卑祭反𭊴香上許右反覺觸音觸金古郎反華莫顏反埠阜上都回反下扶久反正作堆𭚖姓上自木反若𮒽音悟哆擲咃上借音怚下音他利佉丘迦反亦作呿呿二形薩埵都果反經音義作薩皤此經無浦窮上滂古反𠐝罰上知𮧓反慊情上音嫌又苦點反非留牟上力由反經音義作𠺕牟無音切那仚丘智反阿䨲奴侯反婆咩爾反迦奴禮反睒摩上失染反多衭直一反吹呿上音欠下音去正作㐸呿也虛空孕菩薩經兩卷上卷佉羅坘上丘迦反下音底虛空藏神呪經作佉羅帝耶又丁兮反梵撅巨月反菩薩名也正作撅前兩卷並云梵頂梵音鎧甲上苦改反哥咏于命反沙鹵郎古反土塊苦內反礓石上居良反裸者上胡瓦正作裸倮二形又郎果反説文赤躰裸裸也風俗以為𢙣口也𮕾檀上之然反廊廡上音郎下音武寶綖音線為繐音遂正作穗繸二形謂旒頭垂䩸也虛空藏經云毦帶乘飾是也又音嵗非用也犀牛上先兮反䟡跪上胡故反差也一膝著地也這囉上之夜反虛空藏經作遮囉遮囉適囉上之夜反又音隻迦嘍音樓羶這上尸然反下之夜反陀唎音利末膩𡰱利反逋囉上布胡反婆貰音世破鉗其廉反晡唎上布胡反野狩尸呪反上詰利反柱杖上知主反閉𢙣上計反流斯此反呵叱昌一反啞羊上烏雅反下卷鄙𢙣上陂美反船舶音白蟒蛇上莫朗反蝮蝎上芳六反下許竭反䠒跪上胡故反觀虛空藏菩薩經一卷式義上尸力反驅卑進反此後三十五佛名及懺悔回向文出決定毗𡰱經及寶積經第九十卷內目録中無此後文昨依録截去恐是三藏安之故却續尾題之後耳也虹炎上戶公反下音焰車此云樂垢穢人謂此等人全不識佛法也一揣徒官反菩薩念佛三昧經一部六卷第一卷闍崛巨勿反花鬚莫顏反熙怡上許之反下與之反微笑音𥬒喜也正作𡄇咳上苦頂反下苦愛反剌夵上郎達反下陟加反比丘名也諸經作賴吒和羅也又琰漸二音花鬚莫顏反挨姓上才禾反蘭楯食尹反曹花上莫反互相上胡故反棠觸上宅耕反玭鿱上步卑反下步巴反豪桀音竭胤上直右反下以日反樓櫓音魯廛里上直連反捶上直追反下許容反𢪛淚上文粉反為擴音郭𧂐上上子賜反奮大上方問反振也揚也正作奮也又作奮並誤也倫匹普吉反𭐋然上呼拓反達也正作豁又呼各胡各一反誤伏伈音仙泊然上普百反正作怕敷拆先擊反炫晃上黃反下黃廣反歡樂上呼官反喜也所曝步報步木二反勉衆上音免脫也第二卷歡娛上呼官反下牛于反恬寂上徒兼反氤氳上於真反下於云反蠲別上居玄反溪𭐋呼各反以篋苦寸反揣如上徒官反疇匹上直由反捻取上奴叶反挑擲上徒了反溪𡼏音諫正作澗觜置上所角反口翕也正作欶嗽二形淳流上音亭正作渟沠別上普賣反撰擇上宣兖反正作選矚對上朱玉反紛綸上芳文反下力均反𢭀之上徐反轉也乎技槃等也第三卷敷析先擊反把上北馬反下羊力反亰畿巨依反限也國畿同遠千里也無慎尺真反無惛呼昆反不爥之玉反正作燭枯稿苦老反懾伏上之涉反懼也又徒叶反大憘音喜攣癖上力貟反下輔益反特上徒頂反癡暝莫瓶反晦也燈炬音巨沾洽上知廉反下胡夾反蠕動上而兖而尹二反第四卷阿閦初六反異塌音塔柔耎而兖反髓𦖟音惱又作𦜩正作腦苾芬上毗結反下芳文反磐石上蒲官反彼闕丘月反恚佷上於季反下胡懇反怒𢙣也佷也忿上芳吻反下力計反懟恨上直遂反髓𦜩音惱彼闕丘月反閉塞上計反誤第五卷味觸音觸膿血上奴冬反涕唾上音剃正作洟眴息上尸閏反危脆七嵗反挊戲上郎貢反痛癢羊兩反正作癢眩或上玄縣二音瘡疣于休反卒為上倉沒反微𠸍音𥬒漱口上所右反堅䩕五更反第六卷鹿茸而容反㫬頃上音舜目動也正作眴下苦反刻少時也伐大方等大集菩薩念佛三昧經一部十卷第一卷崛山上巨勿反謦嗽上苦頂反下苦愛反摩揭音竭阿吒摘家反夜又名迭相上待結反窊凹上烏花反下烏洽反勝橦宅江反正作幢楣棖上美悲反門上撗梁也下宅庚反摳𨶩上尺朱反下胡臘反置廁上徒年反塞也正作填也又之義反誤欄檻上郎干反下胡黯反階際木也銀𦶇而容而用二反毳飾也正作䩸䩸二形笳簫上古牙反下蘇條也芬馥上芳文反下扶福反香氣也達䨲奴侯反嬉戲上許之反遊也美也魁偉上古回反下于鬼反異上徒頂反第二卷亭傳上徒丁反下知戀反漢家因秦十里一亭謂亭留也傳謂驛也衢巷胡絳反街也淡然上徒敢反恬靜也大噭古吊反躃地上毗益反商主上尸羊反又音的誤盡音𠃵以褻徒叶反偏悼徒到反卒捨上倉沒反鼓螺郎禾反特上徒頂反曩時上奴朗反洞然上徒弄反火盛貌也燈炷音注𤒯燼上子廉反滅也正作𤏖也下徐進反第三卷柔耎而兖反礦古猛反恬然上徒兼反驚懅其去反向時上尸亮反少時也又久也正作嚮也熟能上市六反誰也較上音角競也貪羡徐箭反陂池上彼皮反烔然上徒弄反火盛貌也正作洞也又音同非摩抹莫鉢反撥手摩也第四卷陶家上徒刀反撮取上倉活反一掬居六反亦作臼向時上尸亮反反少時堰塞上於愋反可否方久反小𢬩扶月反疾上疾反謇塞上居輦反陜劣上胡夾反正作狹無滓側史反毛渧丁歷反正作滴也音帝非用第五卷嘶破上斯兮反悲聲嗄聲也正作𧬊切上七細反不一也衆也下初轄反佛國土謂之也正作剎也口歔音虛暗晦呼對反洗蕩徒朗反死姤古口反塵也正作垢也又音搆誤枯稿苦老反羸瘠上力垂反下秦昔反端勺市斫反顯呼格反正作赫第六卷嫉姤上自疾二音下丁故反𭥦宿上莫飽反衆上亭頂反出也特立也自剜烏官反門闑五結反哀婉於遠反甛味上徒兼反楚撻他達反撾打上陟花反廝伇上息疵反儐從上卑進反相也出接曰儐入贊禮曰相也又音敬也下才用反拆骨上先擊反疾上疾反餘肢音枝除撥音鉢鄙悲美反第七卷滂洽上普郎反下胡夾反觸上徒官反四食之一絶上徒典反滅也怠惰上徒改反下徒果反陵侮音武棘剌上居力反下七賜反第八卷法蠡郎禾反奮大上方問反法鞉徒刀反小鼓著柄者謂之也亦作鞀屎尿上尸旨反下奴吊反枯犒苦老反危脆七嵗反嬉戲上許之反遊也美也鏝陀上莫官反上撒奉摋乘割反放也迸散也以手拋物也正作𥻦第九卷陽焱音熖剃除上他計反除髮也與剃字同也字樣及孫愐韻説文並作剃也新韻音弟非刀矟所角反烗熾上苦戒反熾也盛也經音義作烗熱彼誤陜劣上胡夾反正作狹也楚撻他達反打也撾捶上陟花反下之水反挑髓上吐條反能溺奴歷反古溺字髣佛上芳𠕀反下芳勿反柔輀而兖反瞬息上書閏反駿速上音峻速也疾也又子峻反快馬也第十卷陏名上徐為反寶葙息羊反一斛胡屋反粘汙上女廉反倉稟力錦反正作廩也倉有屋曰廩也誤印璽斯此反倫匹普吉反罪般舟三昧經等三經八卷同帙般舟三昧經當藏兩卷成部般舟三昧經兩卷録云三卷上卷羅余雪反即王舍城是也亦云摩竭陀國得剬之世反也正作制也又都官反之兖反二誤陀惒上蒲末反下胡戈反此云賢槗曰兜上巨反中于月反下都侯反菩薩名也或云越兜邠𮟴上彼巾反下丁禮反因坘音鳩睒上居求反下失染反上誤和論音輪也夷亘古鄧反吒上女利反天名也亦云膩吒𡰱吒等門閫苦本反濡如上而兖反鵠毛上戶反𠧒匂音蓋孑身上居列反單也不貿莫候反開闢音劈寶琦音奇姝好上尺朱反師短音短嗅之上許右反嫉姤上自疾二音下都故反譁説上呼瓜反喧也大語也正作譁也諭諂上羊朱反𦷢師上烏各反四嵎音愚是㒼音兩憂𦜩音惱又音忽非輕易羊利反相輕也慢也正作易下卷鵯上居謁反下蒲卑反正作羯脾也或云羯毗或云羯鞞或云羯皆隨梵言楚夏耳正言迦陵頻伽亦云羯邏頻伽唐言好聲鳥也上又郭氏音曷下音卑非也又應和尚音義作鶡鴨上胡葛反下烏甲反並非也此乃譯主羯下去陵頻下去伽而從鳥作鵯以為羯鞞字故使諸師誤釋賢哲錯詳矣徹照音照和協音叶福𥙐于救反正作祐或作祜音戶僉然上七廉反不猗於綺反正作倚檛捶上知花反下之水反衆𡗚女孝反謗訕所姧所諫一反淫泆上羊林反下羊一反大烏𥝷反猛狩尸右反大菼上徒太反不小也下莫朗反蛇最大者也正作大蟒也下又他敢反二並誤蛟龍上音交母龍也能吞人也枷欔上音加下俱反大母猴也善攫持人也正作𤠙玃薜荔上蒲計反下力計反柔戟上音牟正作矛蚢蛇上五官反嫌隟丘逆反狼上蒲袂反𢙣也郭氏及諸師作直庚反非也大蟒莫朗反𢙣上蒲袂反𢙣也困也正作弊殊𭩶音竭正作傑也俊也英傑特立也荐臻上才見反重也仍也妖蠱上於反下夷者反正作蠱古經以為野狐字也又音蟲誤波𥠕逾遙二音正作褕也上方經作波喻比丘尼也諸經云波闍波提或云波遮蜎飛上烏玄反𧑮動上而兖反斟酌上之林反下之若反蒙蘢郎紅反樊也正作籠迮素上普吉反正作匹也山巔丁年反饋遺上巨位反下以醉反窈𡨋上伊了反深也斯芩巨今反轉輪聖王名惟斯芩此譯為勝遊昉習上方𠕀反明也或作倣放二字放學也陂菩薩經一卷陂上音下冝作陀陀二同徒何反梵言陀婆羅此云賢護般舟經作陀惒賢護經直云賢護是也下又彼皮彼義二反又寶積經云陀羅波利隨言賢護疑傳寫誤焉迦簍郎侯力主二反正作簍也拘暹上音俱下息廉反國名也或云鳩睒或云向謾論上麥顏反下力勻反闍貰音世堅強巨良反勝曅云輒反陰莫瓶反塗烏故反正作汙如限或作閬限緊三形同胡眼反門閾也擔動上音遙正作搖如狉普悲反狸也字㨾及𭃄並作豾也賢護經云云何當得如貓狗獸等心業成就故濡上而朱反霑溼也正作瀉濡二形下而兖反柔弱也正作輀𢡼二形上又團普博三音下音𪝥並非所痏于救反動也正作忱又于美反非也般舟經云如門閫正住堅心是也蜚鳥上音非正作飛賢護經作飛鳥麋鹿上美悲反猴猿上戶鉤反下于元反墯上徒果反欲音採所灑所賣反與灑同不饜於贍反如景居影反光出則影生故即謂之景也雨陏上力掌反下音隨常掔去堅反固也持也又音慳菩薩棄市陵反正作乘人鐙苦改反正作鎧懈殆上古賣反下徒改反不跌徒結反不宥于救反寬也曳直上音身正作申為𮑒音棄渾家藏經作業至𮒽音悟睡覺也正作寤陰莫瓶反著而映反正作染徭聞上音搖正作遙這𮒽上音釋才也始也又之懌反並正作適遊戲上音由正作遊𣳹露上烏故反猗著上於綺反正作倚閔試上音文下音式正作文餝歡喜上呼官反偕事上音皆俱也莫綺於蟻反正作猗沮及上子預反洳漸濕也亦作沮世音岸不嗅音嗅自挾甲叶二音持也護也綺著上於蟻反正作猗戲譺上𥝠妙反下魚既反啁也啁音嘲也又五戒反又魚起反調也薄一上布各反換交易也通也正作簿二形曹輩上自刀反下博昧反可惔音𪫦倿調上奴㝎反下徒吊反牧意上莫六反養也放也相蹡七羊反趍也走也正作也蹡行貌也冝也集也敬也非義大集賢護經一部五卷第一卷一音團戚上倉感反下倉歷反第二卷𮌨脹上普降反下知亮反噉宍音肉螺鼓音征上郎禾反區別上丘愚反兮也嗅嘗上許右反下時良反捻鼻上奴叶反頑騃五駭反佷弊上戶懇反過飾尸力反正作飾笑上尺之反呰毀上咨此反鮮少上息淺反分扸先擊反一搆古候反將牛乳也第三卷金鎚直追反爐鞴步拜反融消上羊戎反鍊冶上力見反下羊者反受羈居冝反超上徒頂反咨詢相倫反朋黨都朗反正作黨𧵤聚上豬與反䏎膚上居夷反下音夫岌多上魚急反人名㧾宣上子孔反又音窟誤篋笥上苦叶反下司寺反造塌音塔第四卷水上烏耕反犀牛上斯兮反豺豹上助皆反下補貌反𠧒匂音蓋贊助上子散反佐也下床疏反益也佐也正作助也從且力漱口上所右反洗滌徒的反䠒跪上胡故反無諂染反為也又音叨誤鞭打上卑連反非𥌒音古白鵠戶反鳥名也亦作牡麗上阻狀反鏗鏘上苦耕反下七羊反金石聲也亦作銵瑲煒燁上云鬼反下云輒反聾上郎紅反下五怪反正作聵二形生而自聾曰也第五卷嫉妬上自疾二音下丁故反毀犯音范侵也僣也勝也法也正作犯歸憑皮陵反託也正作憑周阿差末經等二經十三卷同帙阿差末經七卷第一卷浩浩晧晧上二古老反撓也水大也出應和尚音義下胡老反光明也撫恤上芳武反下𥝠律反陶演上徒刀反下以淺反曄上為鬼反下為輒反錠燎上音下力堯反大也燭也上又音㝎非用𥥆𡨋上於了反正作窈瑕疵上戶加反下才斯反摑裂上古麥反蠲除上古玄反愚戇陟絳呼貢二反鄙等上悲美反𭦟上莫官反下蒲末反不𣊬尸閏反正作瞬聖哲音哲堅跱直里反照曜上之曜反僥遇上古堯反丘墟去魚反柔耎音軟綩綖上於遠反下以然反適莫上丁歷反怕恬上普百反下徒兼反不瞬音舜第二卷文飾尸力反諛諂上羊朱反偏頗普波反獷古猛反憒亂上古內反詭譎上居委反下居血反正作譎也恭恪苦各反周𢭀序全反正作旋突上丁禮反下徒骨反倡伎上尺羊反下巨倚反疇匹上直由反下普吉反不懅其去反不倩七性反尊戶高反正作勢豪二形也豪俠有勢力也又五高反悗恱上步保反持也懷也正作抱也下以雪反恆抱恱心也上又莫官反誤闕漏上丘月反純淑上市倫反下市六反衆𡗚女孝反損呼告反煩荷胡歌胡可二反神𠇈音仙掩戲上力條反正作嫽橑二形又音奄誤撾捶上知花反下之水反悸喜上求季反恱愓餘慮反安也逸也正作豫忬二形也第三卷苞裹上布交反下古火反十垓古𮕷反𪪺上古回反協恨上胡頰反懷也正作挾也協和也非志操七到反都較音角略也又古孝反開闢蒲益反能譴去戰反第四卷謙遜蘇困反睒現上失染反若蚖五官反𡱈迮上其玉反下阻格反德勉音免強也姝特上尺朱反猶待直里反質朴上之日反朴也信也謹也下普角反厚也以起丘里反喘息上川兖反貪餮天結反麼麼小蟲上二莫杲反下一直中反蚑蜂上巨支反下芳逄反捎柫上音消搖梢動物也又所交反下芳弗反愚戇陟絳反愚也竪音樹僮㒒未冠者也小兒也謂凶悖小人也亦作豎侏倀上陟由反下知良反正作譸張也又上音朱下良反非令上為丙反正作永第五卷心憘許記反好也正作喜也又音喜非療治音持除病也又音值理也正作治也以諱故省之懷抱蒲保反正作抱盡𧨏音義飄疾上匹遙反又音四佂之靈反行也伀也鉤瑣乘果反桃擲上徒了反正作挑脣戀上音故亦作顧坦然上他旱反經音義作擅誤宛戀上於遠反然也應和尚音義作慻戀以眷戀替之眷𮨇也悒悒音邑履屣所綺反芬上芳文反下普巴反如虺許鬼反淡泊上徒敢反恬靜也下普百反正作怕罪舋許覲反瑕隟也罪舋同上淫泆上羊林反下羊一反嬰咳戶哀反正作孩缺漏上苦穴反又作缺訥隧上內骨反下直遂反誤大猷音由道也圖也順也所猗於綺反正作倚又於冝反倚也總章上子孔反大唐高宗帝時經後年號也亦作總也第六卷殃舋上於良反下許覲反乳哺音步願卒子律反終也翦去上即淺反般黨上北官反下都朗反正作番黨鮮言上息淺反好默莫北反正作墨上研五見反反也正作硯也牽來上苦堅反危脆七嵗反井子到反疇迮上直由反下普吉反痛癢羊兩反不係音計憂戚倉歷反未嘗才登反經也又音常試也謂口試味也第七卷猗在上於綺反躓礙上陟利反誘𮗼上由柳反下私律反增減胡斬反耗也村落郎各反廣匹曰落者居也謂人所聚居處也亦作渃大邦江反國也亦作嬈亂上奴了反亦作嬲無盡意菩薩六卷第一卷吐洸上他古反下直林反沒也正作沈今作沉也又光汪二音誤暗置莫瓶反正作又之義反誤彼圻音岸又巨依魚斤二反誤㴎汙上而陝反正作染也郭氏作他蓋反非也木零力丁反落也正作零蕶二形遷動上七仙反稽首上苦禮反種稷子力反應𢪛尸由反不𦚧音舜正作眴分阤音陀梵云分陀利亦云奔荼利此云白蓮花疾姤丁故反有上許依反荊蕀居力反曾眴音舜蒲探居六反正作掏布有上許依反少也不稠也正作希也遙見上羊招反不俎才與反壞也毀也正作沮也又音阻誤姧上古顏反下爭嫁反筫直上之日反呰夢上即此反下莫結反正作篾也瑕疵上戶家反下才斯反㴎愛上而陝反第二卷軻貝上苦何反訷諂上羊朱反又音申誤俾面上普米反傾頭也面傍視也正作䫌也又卑爾反非也撩擲上力條反易上莫候反竊盜上千結反憒𡗚上古內反下女貌反不恌徒了反動也正作掉挑二形又吐條羊招二反並非也抵上丁禮反下徒骨反猗著上於綺反羼提上初諫反并當上卑政反下都浪反除去不淨也正作拼擋第三卷善斷徒短反絶也正作斷也彼堓音岸罣得上戶卦反下五愛反不恌徒了反動也正作挑掉二形拖得上尸智反以物惠人調裊徐兩反正作象不眴音舜𢭀三上序全反順助常閏反寶莫顏反海濤徒刀反觸界上尺五反諸扼烏𮧓反正作軛𧣈受上尺玉反如沫莫鉢反如泡普包反漯相上失入反正作味觸音觸俗諦上訟欲反不悕音希死上郎早反正作老呵㥽阻格反毀紫將此反正作訾未耒上微沸反下郎才反至也正作來來二形不怖音希正作悕也怖懼上普故反鮮少上息淺反賦上阻立反下音付怖求上許依反微眇音妙好也亦作篎也又小反小也誤攝取上尸涉反暗曚莫紅反愚暗也正作懵也又莫孔反暡曚日未明也悉善上星七反下常演反正作悉善也如耒音來第四卷嬈惚上奴了反下奴老反勸都反正作理也察也虧壞上去隨反頻子六反輕莫結反赧女板反慙而面赤也正作赦勸𭙿力計反淵流上烏玄反正作淵二形第五卷寂上為丙反長也正作永也遠也諸師以為偃字於蹇反非也是抳烏𮧓反車搹也正作軛扼二形也又女爾反誤倢利上疾反羊上烏雅反卒暴上倉沒反下蒲報反悕求上許依反㒼舌上力掌反唐捐上徒郎反下以宣反謂空棄也鄣蔽上之亮反下必祭反正作障蔽也上又音章非紙筆上之爾反第六卷損呼告反正作耗輕濡音軟俎壞上自與反正作沮撰集上仕晚反述也㝎也撰擇上思兖反揀也正作選也燋惚上子消反下奴老反疾上才反發大集譬喻王經等二經十卷同帙大集譬喻王經兩卷上卷斷理上力條反金礦古猛反金璞也鎧甲上苦改反甲別名也池泊普反正作濼也又蒲反非也下卷干筒音同𣗥刾上居力反下七賜反欲澍音注陂池上彼皮反倚抌之審反眼上吐條反正作挑羼帝上初諫反大哀經一部八卷第一卷彼堓音岸蠲除上古玄反蔽礙上必祭反不照音照開䦱為委反闢也又苦乖反淵也上烏玄反深也應和尚音義作淟池上他典反並非也彼誤道𧨏音義毀訾音紫蘭上郎于反下句順二音錠鐐上徒丁反下力堯反大燭也正作燎也𭽀麗上倉贊反而峻音峻則拖失支反正作施四嵎牛俱反正作隅考𢱊音亮須臾羊朱反之頃苦反明㷿音熖疇上直由反下普必反衆七歷反犛牛上莫交反正作𤛆窹夢上五故反寣則同上疇迮普吉反牀㩉上助莊反下音塔光矅音曜善拖尸智反如眴音舜首上苦禮反僉然上七廉反皆也咸也恭恪苦各反從容上七蹤反綬步也正作從從二音跱立上直里反繒幡上疾陵反帛也鋀鎮上他侯反石似金陶之則分也下知鄰反寶也貴也正作應順音順志七到反正作操第二卷法敖戶高反正作豪𠢕二形菩薩名法𠢕王亦云惣𠢕王寶積經作惣豪王菩薩也照耀羊照反始音岸牽致上去堅反睴矅上許歸反下羊照反上又胡本五因二反並非逯吾上徒愛反揔敖音豪已下並同又五高反誤也璝異上古回反琦𭹀上巨冝反下知鄰反旗幡上巨之反尊上胡高反志操七到反族姓上自木反穬古猛反瑕疵上戶加反下才斯反𭒃飾上染反下尸力反偷𭒃上羊朱反詐也偽也正作榆諛二形也下染反上他侯反佷上胡懇反下力計反禁𢗂音忌愚贑陟絳呼貢二反愚也正作戇戅二形也又感紺二音水名也非用潭泊上徒敢反下普百反安靜也正作憺怕上又徒合以審二反下又蒲博反並非也憂𭀁倉歷反正作蹙郭氏作私占反非也愚陟絳呼貢二反幽腎於計反正作翳䩕五孟反俗智上徐浴反疾上自反不猗於綺反志懆七到反誤句趺子昔反正作迹不弄郎貢反正作弄卒暴上倉沒反意上音丙正作秉不懅其去反𠼢吃上苦浪反正作慷忨二形下苦愛反正作慨愾慨三形慷慨大息也謂大喘息聲也慷慨嘆息聲也亦咳嗽聲也正應言謦咳也經意謂菩薩常寂靜乃至不聞謦咳之聲也謦苦頂反咳苦愛反上又冝作唴丘亮反方俗呼慷慨為唴慨耳上又郭氏作巨兩反下香反並非也柏梯本作吃猛𣪴魚既反吮吟上直林反沒也三思也謇訥也正作沈霃二形也下魚今反躓礙上陟利反強心上巨羊反又居亮反亘無上古鄧反惔怕上徒敢反下普百反罪舋許覲反億垓古𮕷反第三卷惣敖下音豪按寶積經作惣豪王也正作𠢕也又五高反傳寫誤也嫉賢上自疾二音害賢曰嫉汲汲音急遽也正作彶也貪餮天天結反猗著上於綺反憒亂上古內反邪黠下瞎反𤵜疾上忍反病也輒轉上合作輪力春反姓上才木反疇匹上直由反下普必反淡泊上徒敢反下普百反愚贑陟降呼貢二反馳騁郢反痛癢羊兩反怕上徒敢反下普百反安靜也正作憺怕也上又他紺反憛憛懷憂也非用無㴎而陝反正作染慌忽上呼廣反下正作惚羅捺又作奈同奴太反國名波羅捺也可擭黃麥反得也謂不可得也正作獲也又烏號反誤也那鋊胡南反正作鋡也又音欲炭鉤也誤宄盡上居右反窮也又音䡄誤溪谷上苦奚反芬馥上芳文反下音伏殃舋上於良反下香覲反淑淳上市六反下市倫反相音韋柔順音順治邦上持值二音下博江反姪上羊林反下羊一反耗呼告反懸矌苦謗反誤周椄子反持也會也正作接也接續木也靡不上眉彼反無也劈裂上普擊反破也正作劈也又蒲益反非也第四卷志懆七到反正作操也又倉早反非也圻際上巨依反岸也限也亦作畿璣憂𭀁倉歷反正作戚耎劣上而兖反薄鮮息淺反穬古猛反又應和尚音義作粗澀上音下音澀依猗於綺反第五卷擾擾音繞億該古哀反餘僚力條反隧于上直遂反落也又音遂誤晧晧昊昊四同胡老反晧晧光也明也日出也昊昊天氣也尓匹曰夏為昊天也今冝分昊字為泉杲二同古老反昊白澤大也泉日出也明也白也攏戾上郎董反觸忌音忌犯煞上音范正作犯大邦布江反蟲蟻上直中反下魚綺反瑕丘月反正作闕愁戚倉歷反第六卷偏愛上匹連反邪也就一邊也正作偏也誤也汜流上芳梵反四瀆徒屋反卓然上知角反特杅胡硬反正作行飄上匹招反下以招反俠劣上胡夾反正作狹雜碎上才合反麗上倉