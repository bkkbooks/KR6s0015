body:
  text: 漢中沙門可洪撰河依府方山延祚藏大乘經音義第一之三此册有二十帙讓國有虞陶唐吊民伐罪周發殷湯坐朝問道垂拱讓大方等大集經一部卅卷第一卷逯得上徒愛反煩惚音惱能拖音施善𢛳烏各反惚濕尺入反阤羅上者陀又音豖非也𩇕上盡歷反下自井反𠇾息上許牛反實見上市一反放逸羊一反垂櫩羊廉反蘭𣛝上郎干反下食準反梯梐上他西反下步术反階橙上古諧反下都鄧反正作階隥蹬中上都能反正作登也行上芳福反下戶𢈔反嗜肉上神利反愛食也長跽求几反稽首上苦禮反平等上皮明反能蔽必際反了淨上胡告反名也正作號號二形彼音岸嬈害上奴了反下胡蓋反貓牛上莫交反得疧丁禮反又音秖誤磬咳上苦頂反下苦愛反正作謦咳也也也作一上失反正作攝難俎慈與反正作沮平等上皮兵反無瞬音舜動也斷於上徒短反罣得上胡卦反下五愛反獷古猛反明苦角反羼提上初諫反命上徒活反知於禁反第二卷方俗似欲反正作俗疑罔音亦作𠕀罔二形德莫姧反觸相上尺五反魔音𠕀穬古猛反沾汙上音霑染也冝作玷點伈人上相遷反破宍而六反第三卷惠拖音施短音短不長也彼堓音岸渥不上奴兮反正作埿淫泆上余林反下余一反第四卷抅崘闥上九愚反中洛昆反下他達反抅抧上九愚反下居以反喘息上川兖反水漬才智反浸也氀揭上力愚反下胡割反正作毼二形寶珮蒲昧反𨱰餝上弗拂二音下芳往反正作也正言髣佛即是也下又音式誤育枑丁兮丁計二反或云育多花名也經音義作育坘音遲此云相應脣䀎音麵無脆七嵗反悉𭊴許右反鼻取氣也俗非跂布果反正作跛也非躃卑益反正作躄非墎音郭雲氣音氣遮卬因進反以下並同印華臺徒來反又作臺挂閡上胡卦反下五代反有滯直世反第五卷呢吒上女遲反根子才反弓𭚯奴古反箭矢尸旨反牟矟所角反戈楯食尹反第六卷柔耎音軟恌悔上徒了反心動也正作挑掉二形又吐條余招二反並非也誤聞上古瓦反婇女上倉海反事也事君之女也正作采採二形也又擇也採擇衆女以填宮因以名之書無此字病瘦所右反𭹀寶上知人反七竹角反高也謂七遍高上而退下也不𢣷音具暗填莫瓶反持上則孔反為倉歷反狹心上胡夾反窄小也第七卷隨其上徐為反無力進反曾眴音舜動也善音牙千輻音福跟傭反𠕀縵莫官反足濡音軟王膊市軟反陰藏上於今反缺骨上苦決反摩膝音悉尺里反王𮌟音接宍髻音計流法上失林反上靡眉彼反殖衆上神力反朱又音必親巨右反故也正作舊搹取上尸反又音厄非也退卯因進反退卬同上涅𦟄涅槃嫉姡上音疾下丁故反營他上音營造也擁護上於勇反下胡故反第八卷悉弊必袂反正作蔽別本作弊磬咳苦愛反正作謦咳辱鎧苦改反商主上尸羊反又音的非也𤊟燎上特丁反下力遇反燈燭也正作燎也樹於門外曰大燭於內曰燎也又上音定非兔角上他故反譏刺上音機下亦作誅摩夷律云知摩夷者善於訓導宰任玄網也跛躃卑益反阤羅上徒何反正作陀又直尓尸尓二反誤舍摩阤吐何反正作他亦名奢摩他此云定也毗婆舍那亦云毗鉢舍那此云慧也無牽音奉無𢱍音晚第九卷離莁上正作璃下戶萌反寶臺徒來反不肖音笑瑋璍上云鬼反下云輒反琢磨上竹角反賈直上古蠱反正作價耐磨上奴代反穿押上音川下音甲兩物共持也瑕玼上胡家反下手斯反語上丁兮反正作低仰語上王郎反舉也出禮記音吃語上居𠧒反重言也啞語上烏雅反輊語上去盈反又音致不愛音愛罪巨有反正作咎別離力支反正作離利𢛳音惡兩舌上力掌反繫語上音計縛也閉語上必計反説誘上音稅下音酉醜陋音漏椯食上徒官反無垢音狗船舫上市專反下方望反𫕻情井反正作靜猛健上莫耿反正作猛也劣上力垂反第十卷𠃵薪上音干今作乾多有上得何反正作多㨙助上于願反螢火上胡管反障弊必祭反苷蔗上古談反下之夜反陶師上徒刀反能焚扶文反正作焚真實音實擁護上於勇反下胡故反𪯥駮上布顏反下布角反差別上楚加反隱蔽必袂反國第二帙第十一卷嫉姤上自疾二音下丁故反村屯徒魂反聚也亦村也瞋懟音墜獷古猛反心迮阻百反咃亦上吐何反蠱亦上公五反蛇亦上夷歌吐何以者三反字門也第十二卷苷蔗上古談反下之夜反稻田上徒老反溉灌上古代反下古亂反從之上子用反有上息維反陶師上徒刀反揵推上巨焉反下直追反鎧苦改反青黛音代疊上尺稅反下徒協反細毛市也正作毳㲲奢耶上尸遮反野蠶繭織為衣名奎耶衣也淨浣戶管反灰浸上呼回反下子反趍走上七俱反疾行也清廁上正作圊同音清不眴音舜世界名婇女上倉改反正作綵璝異上古回反放逸音溢四攝尸反得上戶麥反從蒦頭阤音陀伊帝曰音越多伽巨迦反十二分經之第八分名伊帝曰多伽也成實論云是經因緣及經次第若此二經在過去世名曰多伽也秦言此事過去經典丁反正作典獸中上尸古反取上補各反啓請上苦禮反五陰於今反去聲呼重擔都濫反垢穢上古口反毀呰音紫濡語上而兖反輕莫結反短長上都管反堤塘上丁兮反下徒郎反高燥乘老反乾也正作燥羸瘦上力垂反下所右反御之上冀與禁也上也當也正作禦應和尚經音義作禦也又音馭誤恐怖上丘勇反四音妄正作望生懅其去反無邊卑玄反華臺徒來反娑音弭娑咩同上音弭𧰃濘上徒侯反正作頭𣪌二形也下奴定反又作豆婁二字呼之上又應和尚音義作嘍洛口反非也又郭氏作郎頭反亦非也婆坁丁禮反又音低睼徒兮反摩囄力支反比囉提上音毗下或作緹徒兮反坁上蒲末反坁同上又烏交反誤也𭉮坁上音扇下音底叉蛇羊者反從此已下並同此呼目𭇔丘智反娑𭒂音婆囉綈徒兮反𭒂踟上音婆下音池茂𭇔上莫候反下丘智反醯坁上呼兮反留拏奴加反暮絰徒結反憂𢌿音卑又必尓反遮極都西反遮極同上守極亦同上並誤也卉木上許鬼許貴二反第十三卷陂池上彼皮反吒上女利反天名阿迦吒或云阿迦𡰱吒或云阿迦膩吒或云阿迦抳瑟唐言色究竟樔窟上助交反淳至上市倫反羼提上初諫反此云忍辱為軒古旱反古寒二反莖也正作蓒也相上胡故反苦音惱格量上古容反度也所漂匹遙反所猗於綺反第十四卷沮壞上才與反根子才反辨上自反唐捐音緣唐謂空棄也第十五卷這生上尸亦反始也又音隻繽紛上匹反下芳文反須莫姧反正作又音剃誤鉾箭上莫浮反刑戮音六垖阜上都回反下扶久反膢躃上力主反下卑益反正作僂躄也上又音婁非也痤短上昨禾反正作矬跛蹇居輦反汙面上音鳥𮃹也正作墟應和尚以𮃹替之也睞眼上郎代反垣𡓜上于元反攎上來胡反柱也下蒲百反柱上祈也江南曰枅閞西曰㭼析音雞㧺也山𧂐即賜反淳淑音熟怡液上與之反下與益反和恱也下正作懌恌動上徒了反正作挑掉二形又吐條余招二反並非鑒徹上古懺反鏡也照也撰擇上宣兖反正作選也鑒領上古懺反察也領也應和尚以監替之古銜反察也覽也船舫方望反並兩船也又音謗輨轄上古短反下行瞎反釘鑷上音丁下女輒反為轅于元反驅䇿上丘愚反下初責反馬捶也鞦靷上七由反下直忍反旒幢上力由反旌旗之垂者也旐也廣雅白天子十二旒至地諸侯九旒至輇大夫七旒至轂士三旒至肩下宅江反第十六卷酬匹上音酬下音匹笇𡱈上乘亂反下巨玉反昔殖音食觸嬈奴了反不掉徒了反動也屏處上卑領反慠上五告反音礦輕子告反羞耻上息由反上五告反誤敖上五告反正作傲疾上疾反歸仰上音歸正作歸扸為上先擊反燋悸上子消反下求季反冝作燋悴戰栗音栗悚息上息勇反𣴟令上戶管反華𩬞莫顏反笑上尺之反下私妙反正作笑輕挊音弄低上苦末反下丁兮反多䨲奴侯反咩上尸遮反下爾反耐提上所姧反又奴代反誤勒荖音又鳩攡力支反咻樓上許牛反枳奢上吉以反下尸遮反魅低上音媚下音低蔚耆上於勿反䨲鉗巨廉反疊毳尺稅反憒𡗚上古內反下女貌反隧墮上直遂反誤如劓魚利反阤夜𮑣上徒何反下布臥反目仚丘智反羶帝上失然反尸𡺸音耆拏奴禮反頗耽麋上普播反中都南反下美悲反藪首矖上乘走反下力支反多啼徒兮反正作啼犯叩呪中亦是呪字又音口誤也頭攡力支反魑上女利反下知反第十七卷頒宣上布顏反瘖無上於今反無缺苦史反無駃音使速也疾也又快決二音並非之一反第十八卷無讖初禁反姑臧子郎反垂矝居陵反不拋普包反捷匹上自反正作揵作脆七嵗反殂壞上才與反正作沮又自蘇反非也誤𡐢衣上方問反揵陟上音乾馬名邏羅來個反聞上古瓦反第十九卷瞿枳吉以反疏拙上所初反貪嗜神利反牽挽上去堅反下音晚第草卷拘侓阤上音俱中音律下音陀舍利弗名也𩇕音靜五陰於今反無音勉正作勉野狐音胡大苦庚反平坦他但反正作坦嶮上苦庚反下許奄反嬉戲上許之反器鉀上丘至反下古狎反商主上尸羊反懊惚上烏老反下奴老反妻子上七西反失上乘浪反焚燒上扶文反俎壞上自與反正作沮殷多上於斤反怖畏於貴反刀梢所角反正作矟首上苦禮反低也𢛳心上烏各反歡憘歡喜無翅音施取鐵天結反所搹尸反正作攝得失針反正作深閡邊上戶卦反中五代反下卑玄反物邊音邊得上胡麥反電持上音殿正作電尼吒知加反病上音伇正作疫兵𮧓古厄反軍也不熟市六反正作熟穀米上古木反禽獸上巨今反下尸右反攻伐上古冬反闍落翅上神遮反下吉支反寶星經作闍盧計賴帝上蒲末反上方經作𭒂賴垊𨢘上呼兮反上方經作啼婁呵蛇上音婁下音野寶星經作婁呬耶也摩迷卑反上方經作摩咩從所綺反上方經作離屣也𨢘上呼兮反闍鬪都候反寶星經作禪堵上方經作禪𧰃音豆俗目佉丘迦反上方經作茂㖉婆沛音虎正作滸汻二形又貝霈二音並非也寶星經作婆呵上方經作婆呵也私阤上普咨反上方經作思陀賴坘丁禮反寶星經作哱囉帝上方經作𭒂囉音底修蛇音野寶星經作蘇利耶折啾上音斫下音秋寶星經作斫茤樹堤上神注反下丁禮反寶星經作殊底又裔羊世反正作裔上方經作又蛇音也豆寧寶星經作度泥上方經作𧰃濘𧰃音豆濘音泥溫布何反寶星經作鬱波上方經作郁音波吃栗多上丸𠧒中力一反上方經作吃音多訥阤上奴骨反中布何反下音陀寶星經作訥哆波陀上方經作䨲阤奴鴦於良反掘上巨勿反買崛上莫報反下巨勿反婆坘丁禮反上方經作𭒂賴垊婆上丁禮反上方經作多𭒂樹坘上神注反下音底上方經作樹喻坘樹坘二同上寶星經作殊底上方經作樹音底膱迦上女利反摩多來反與𪘜字同也寶星經作摩底應和尚以字替之音悉非也嘻上許之反下力計反上方經作𭈇阿訥或作同力由反寶星經作阿留又女劣反非也婆坘音底上方經作𭒂賴坁音底絁上力計反下普皮反正作翍旇二形又或作普彼反寶星經作沒履頗上方經作勿絁又郭氏音絁非也婆仚丘智反又裔以世反正作裔咄𭒂上徒骨反下蒲何反正作鈯婆寶星經作突婆上方經作𧰃婆多凡扶嚴反上方經作捶婆毗提若而遮而者二反上方經作比提蘘音攘多他吐何反上方經作多咃從呵上所綺反正作篵上方經作莎呵食剬之世反禁也斷也止也正作制又都官之兖二反並非也誤也間上知勇反𭜨讎音酬弊𢙣上毗袂反𢙣也𠇈人上相遷反捅試上古嶽反下尸志反正作角試也並誤所所八反正作殺涕唾上他帝反下他臥反膱吒上女利反狂亂音亂懊憹音惱妥見上必吉反正作必闍勠上音徒下音六煞也正作屠戮也沉身上直林反遁走上徒本反啼㕸音泣非實音實有第三帙第草一卷悲㘁音豪刀戟居逆反搶屬兩枝刃長六尺持矟所角反迷行上音迷下音衡輕蔑莫結反堅鞕音硬事菟他故反龜上居追反下并列反睿哲上以稅反可斷徒管反又音短亢丘上苦浪反下丁兮反尾萁居之久星名額廣上五格反輕子告反柔濡而兖反確盡上苦角反愚騃五揩反癡也胸臆上許容反確瘦上苦角反皮乾也正作𤿩也音學枊星上力酉反獷古猛反𢙣也䏶有上步米反翼星上以力反軫星上之忍反亦作軫奎星上苦圭反昴星上目飽反觜星上即疵反星名也羸瘦上力垂反偷竊千結反嬈亂上奴了反擾亂上而沼反誣謗上文夫反毱多上巨掬反歔煞上許魚反不寬苦官反第草二卷躿著上都南反毀呰音紫忽所立反毗陀音陀又音豕誤商賈音古財䅽古木反鴦伽呤上於良反中巨迦反下力丁反寶星經作鴦伽邏半蠅以陵反婆蛇下羊者反已下並同比呵上音毗已下同咩留上爾反阿唅丘智反寶星經作阿溪又呼含胡紺二反並非呿𭇔呢上丘迦反中丘智反下女遲反慕坻丁禮反寶星經作𭦟帝翅𭒂上吉尸反下音婆寶星經作雞伏上又音施非此呼已下並同此呵濘奴㝎奴計二反𧿡提上蒲未反頗上普播反下力計反揉頗上女右反正作糅下力計反寶星經作紐破上誤𭒂極丁禮反寶星經作婆帝伽拏女加反𭒂瀾坻上音婆中洛于反下音底寶星經作婆藍帝嘻利上許之反𨶒婆上時瞻反借音寶星經同此音迦嘶音西頻𧰃下徒樓反正作頭𣪌二形也寶星經作嬪頭婆帝又應和尚以𨄜字替之力口反非也又郭氏作郎侯反亦非也𭒂醯呼兮反壽屣所綺反薩失支反正作絁絁三形寶星經作娑寫多咃吐何反寶星經作多他𭠭提上之然反寶星經作旃涕咃咩上音陀寶星經作達迷咃咩同上寶星經作馱迷究鑄音注遮婁洛侯反究知流反正作寶星經作俱株薩下多也反此是𭃄身字也字從多音多古文多字也寶星經作底是也應和尚以陀字替之徒多反非也郭氏音陀非也羆上方救反下彼皮反寶星經作補數草上二同丁禮反寶星經作底底𭒂鉹上音婆下實支反寶星經作𧿡時應和尚作昌氏反非也郭氏音起也陀睼徒兮反寶星作馱提應和尚作吐奚反非也茂吟上市蓋布末二反下力丁反寶星經作布字是也婆呤上毗林反正作𣽮也此是譯人從水從以聲取字也下力丁反寶星經作嬪婆是也應和尚以淫字替之以針反非也聿師上餘律反寶星經作奚莘吳音異也㗭多上星七反寶星經作瑟恥多薩多也反寶星經作薩底郭氏音陀非也𭒂上音婆下丁禮反寶星經作婆底蛇咃上夷歌夷者二反下音他寶星經作耶他已下同聿陀上餘律反寶星經作耶他又奚馱薩多也反已下並同寶星經作薩底佛睼徒兮反寶星經作勃提應和尚作吐奚反非也枳羅上居以反寶星經作履末岐巨支反賴坻丁禮反已下並同寶星經作囉帝䨲竭鞞上奴侯反下步迷反至晗力丁反正作𪾧吟二形又經音義作應和尚以字替之𦛜音寶星經闕此句婆吔以者以歌二反正作蛇又音移不與蛇蟲同呼也寶星經作婆耶郭氏音誕非也上多來反此亦𭃄身字也字從多從來與字同呼寶星經作履又應和尚以膝字替之私七反非也郭氏音來亦非也阿音迦寶星經作三慕賀塞迦囉囉栖音西昶極上廁街反正作或作翅音施下音底寶星經作廁底私上都故反下息咨反寶星經作都死囉𫽄音底聿多上或作建音律寶星經作離多沛究上呼故反正作汻滸二形也寶星經作呼色迦彼加色字也又貝霈二音誤也私上都故反寶星經作都死也摩𫽄丁禮反又音低正作坘寶星經作麼底摩𫽄丁禮反伊奴禮反𭒂佻咃上音婆中音妣下音他寶星經作薄鉢他中正作沘也經音義作仳又美反又步支匹弭二反並通呼也又郭氏音作他遙大了二反並非也邏𫽄上來個反下丁禮反𫽄唎音利提蘘而羊反寶星經作提若浴上子老反𭒂𠻬呿上音婆中音荼下去迦反寶星經作婆荼呿尼上多來反與𪘜字同也寶星經作蒂履𡰱𦀨𭒂上奴何反正作挪二形也或作娜奴何反寶星作娜婆撥奢上北末反下尸遮反散音迦寶星經作僧塞迦羅上音施正作翅又初佳反寶星經作史坘下音底䔧上蒲計反下力反正作薜荔力計反或云閇麗多或云卑戾此云餓鬼荔與同也誤戲挊音弄遮踟音池寶星經作氈池𥿞咩上吐何反下爾反寶星經作他弋叉上羊力反寶星經作藥叉𧿡極丁禮反𡰱鞀徒刀反薁廁上於六反曹伽上莫𪪺反下其迦反陀喃女咸反亦作喃喃二形收𭇔上莫六反下丘智反梨侈尺爾反號曰上胡告反寶鬚莫姧反天坘音遲又丁兮反真言中作呼天澗古鴈反掕伽上勒登反下巨迦反寶星經作楞迦長那上直羊反寶星經作地也娜經音義作𫪛應和尚以𥇔字替之𥇔亮反非也𧿡多上蒲末反啅那上吒角反寶星經作吒那多咃音他寶星經作多他抅置上九愚反寶星經作句梨居右反正作究也寶星經作履鳩阤𮍜上音陀下都侯反寶星經作馱斗賴吒陟加反親𭀁七歷反正戚也郭氏作私占非也兵𮧓古厄反軍器也謂甲胄盾三物惣名草也第草三卷鴦𬽦音求蛇上夷歌夷者二反已下並同此呼茂蘘上莫候反下而羊反寶星經作母若啫那上神利反正作嗜寶星經作嗜那賴𭇔丘智反寶星經作囉揭立偈反闍魯郎古反正作魯寶星經作闍老阿都故反正作蠹寶星經作否迦頻𧰃下徒侯反正作頭𣪌二形寶星經作頻頭富迦上方救反正作富寶星經作否迦啾睼吟上七由正作秋湫二形中徒兮反下力丁反寶星經作簉陀利上又子由反非呼蘘蛇上而羊反下羊者反寶星經作爾也陀上之然反寶星經作氈陀搔蘘上乘刀反提㗭音悉𣽮婆上毗淫反或冝作澿巨今反前卷作𣽮婆寶星經作嬪婆此卷內又作𣽮婆多寶星經作健哆健或便步田反拏上奴禮反膩頗上女利反陀嘻許之反羖羊上公五反失所上尸日反戲𠸍音笑亢旱上苦浪反矌野上苦謗反空也正作矌𧰃摩上徒侯反寶星經作豆摩豆摩又或作豆婁摩二字呼之亦不失呪意也如何吒婆拘鬼神大將真言作豆留咩豆留咩並是也梨屣所綺反嗜上神利反下奴禮反寶星經作視泥牟濘奴㝎奴計二反䉛𡰱上於六反彈踟真知反阿低底二音坻殊同上上二陟角反下或作啤必脾反寶星經作卑𬽦上都侯反下音求寶星經作斗窮不皼音古華莫顏反彼堓音岸俗字穬古猛反喻坘丁禮反囉縻夷至反安縷與𧰃字同也音頭又力主反誤也縻上郎大反下以至反那䨲奴侯反滼𣸪上音梵下音伏𭒂嗏上步波反下宅加反鞞哹上步米反下宅加反問訊音信贈遺上才鄧反下以遂反薩丁也反噢喃上於六反下女咸反那讇市曕反借音作深反非翅奢上音施下音坘上與翅同又初佳反下丁禮反閔陀上眉殞反阿駒音俱珊菩上乘安反伽悢上巨迦反下力向反䩯囉上丁計反正作𩉬又丁兮反應和尚以低字替之也又依字丘力反非呼叱那上尺一反摩昵女一反死音岸龜茲上居追反下子慈反西域作屈支屈居勿反而又𭃄上音丘下音慈寶積經於金剛力士會作丘慈是也于置徒見反西域記云亦云渙那凶奴謂之于遁諸胡謂之豁恆印度謂之屈丹正言瞿薩怛那唐言地乳謂地生其乳以飲神童也真音丹亦云震旦乇婁上徒昆反下郎侯反陶師上徒刀反埏埴上失然反下時力反泠濡上力打反下奴管反正作冷𤏙又上力丁反下而朱反並非也泠𣊵同上第草四卷夫安上音扶語初也曇摩毱上徒南反中莫臥反下巨掬反律部師宗名曇摩毱多亦云曇無德此云法鏡亦名法藏即四分律部也薩婆帝婆律部宗名也亦云婆多亦云婆阿𥝠婆扡此云一𭃄有即十誦律部也迦葉毗上音加中尸涉反律部師宗也亦云迦葉維亦云迦葉波亦云柯尸悲與此云飲光此部律此土無文沙塞乘則反律部師宗名也亦云沙翼亦云嬉捨婆柯與此云化地謂不作地相水火風虛空識相故名沙塞也即五分律部是也婆蹉富羅亦云婆富羅亦云私弗底梨與此云犢子謂皆説有我故名婆富羅摩訶僧祗此云大衆是婆蹉富羅宗也殿堂徒郎反梯撜都亘反樂觸上郎各反下尺五反顛倒上丁年反兔毛上他故反正作兔悉蔽祭反刺蕀居力反𮠴阤上呼兮反下徒何反虎上七斯反晡養上音步正作哺㘁𡘈上戶高反下苦屋反淦路上音徒正作塗也又古暗反誤也三𤏙奴管反不爤郎歎反火熟也正作爛皮膚音夫肌宍而六反筋骨上居殷反髓上息委反下奴老反第草五卷旱潦郎告反一筐丘王反銖兩上市朱反淤泥上於去反芙蓉扶容悟悎古孝反睡起也正作寤覺或作寤寐頻縷下與𧰃字同音頭又力主反誤也阿貺音况𦇑羅上音摩薜荔上毗計反下力計反有䨲他故反正作兔菟二形又奴侯反兔兔子也義雖通用非正躰𭠭陀上之然反正作旃栴二形囉蛇羊者反已下同呵醯呼兮反又音海睞蛇上音來下羊者反侈𭒂上尺尓反下蒲波反茂呤上莫候反下力丁反佉伽上丘迦反下巨迦反䉛義上於六反陀縱𥿞中精用反下徒何反呵縻羊至反𥿞比上音他下音毗唏希豈希冀二反薩多也反又應和尚與郭氏並音陀非也那䨲䨲下二奴侯反㗭坁上音悉下音底頞浮上烏割反桃上徒刀反下苦角反閉尸上計反五胞匹貌步貌二反迫迮上布格反下阻格反面側右反稀踈上喜衣反下所居反危脆此嵗反醎酢上音咸下倉故反正作醋孫愐韻云説文作酢也劇苦上巨逆反執推直追反器皿明丙反第草六卷彼音岸弊諸上必祭反正作蔽弊𢙣上毗祭反𢙣也塵坌蒲悶反探腹上音貪深取也互相上乎故反𭜨讎市由反茹食上而去反謀叛音畔跉跰上力丁反普丁反正作竛竮行不正也猶孤獨劣弱貌也應和尚作伶俜也師上即亮反下所律反哽咽上古杏反下一結反收淚上文粉反正作抆耗呼告反𪯥宣上布還反布也次也正作頒班二形也賫妙上即西反又作賫賫二同俎壞上才與反正作沮第草七卷問訊音信柔耎上而兖反毀呰音紫亦作訾訿二同第草八卷此卷內陀羅𡰱品中有四首真言當藏本第二首真言與上方藏本當第四首上方藏本第四首真言與當藏本當第三首同不委何正也駿速上即峻反肉揣徒官反唼食上子答反村渃來洛反揵捶上巨馬反下直追反裊馬上似兩反又玉篇音鳥非也馲驢上徒正作駝駝二形何反也上方經作生啞烏雅反伴賞都朗反誤𭒂蛇上音婆下音野已下並同此呼㗭比上或作癡苔二同之反下音毗上方本作癡比曰藏經作洟仳坁鉹上丁禮反下市支反上方經作汦𣏚汦丁禮反呿岐上丘迦反下巨支反阿曾郎古反正作魯上方經作阿路𥿞咩上音他下爾反上方經作侈咩上加反𥿞摩上音他上方經作羅𣏚膇蘘上直睡反下而羊反曰藏經作踏婆攘上徒合反上方藏經中作挫若挫音垛又應和尚作膇翼之反非也以下囉同音硾曰藏經作囉踏斫啾子由反上方經作遮飆音啾斫踿子由反與啾字同也上方經作遮飆子由反郭氏作子六反非也𭒂呤上音婆下力丁反已下並同此嗜貺上神利反下音上方經作時貺迦蛇以者反已下並同此撥奢上北末反下尸遮反上方經作潑拖音施多拿奴加反上方經作室蘘闍坘低底二音上方經作闍提音堤𧯱呿上徒屋反或作猒同音獨下丘迦反曰藏經作獨佉上方藏經作豆呿應和尚以𠸹字替之𠸹於六反非也多失支反正作絁鍦上方經作多寫茂波上牟候反正作茂上方經作牟波婆𥿞大支反正作絁絁鍦三形又冝作斯此反又音他非也日藏經作娑卸思夜反上方藏經作薩寫思也反比蛇上音毗下音野日藏經作鞞也羶坁上失然反下丁禮反日