body:
  text: 漢中沙門可洪撰依河府方山延祚藏大乘經音義第一之四十八帙平章愛育𥠖首臣伏戎羌遐一體率歸王平大方廣佛華嚴經一部八十卷大唐天后代于闐三藏實叉難陀譯第一帙第一卷序天冊楚責反又所諫反誤權輿上音拳下音餘尓匹權輿始也繫象上胡計反易之卜辝西峙直里反苞括上布交反沙劫音劫覺歟音余玉扆於豈反獻賝林反𮎃深上戶郎反𣫆矣上苦定反下於起反㱕挹一入反𮄚覦上去隨反下以朱反竭陀音陀肇興上直沼反始也緬惟上兖反遠也于闐徒見反粵以上于月反辝也於也月𢬜力與反亦作呂雙月為呂沽冼上音姑下先典反三月律𦙚惟上所角反後𮗆徒南反及也式開上尸力反繕寫上尸戰反治故造新曰繕也亦補也鄙作上兵美反陋也經文枝幹古岸反莖也正作幹也萃影上自遂反集也堂榭音謝尓匹曰無東西廂有室曰寢無室曰榭注云即今堂隍也又闍謂之臺有木謂之榭戶牖音酉須彌音擢幹上宅角也柔耎而兖反迅流上相俊反樹杪小反掯也遊覽音攬普揵萩反花蘂如纍反第二卷宮歿音沒摧田典反俾無上卑弭反第三卷滌除上徒的反所暨其既反唐捐音緣普自接反婆稚直利反此譯為有力苫末上失占反樹抄小反正作杪克上苦得反第四卷旋澓音伏洄流也正作淀洑霈澤上普蓋反大雨也恬怡上徒兼反下與之反治上力𠮧反下音持險詖彼義反憿幸也匝地上子合反廣闢毗益反睡覺音教卒無上子律反終也盲𥌒音古綸音輪周匝包羅謂之綸眀矚音囑第五卷川鶩音務馳也正作騖基陛步米反或坥音坦平也又蛆覷二音誤遆發上提禮反凝睟雖遂反視也炳然上兵永反明也門闥他達反小門也𣱦氳上苻文反下於云反香氣盛也樹岐巨支反聳擢上修勇反下憧角反繁花上扶番反穊也庇映上卑至反下於敬反第六卷奮迅上分問反下詢俊反僉然上七廉反皆也咸也第七卷偱復上祥導反下扶福反第八卷芬馥上芳分反下扶福反沮壞上慈呂反澄垽魚靳反澱也垣牆上為無反下自羊反援蔽也繚繞上力小反緾也壇墠上徒丹反下禪戰反墠亦壇也佉勒上丘迦反此言篅第九卷匝字音万音義廣有釋文繁不引之迥照上胡炅反本作逈龍淵一玄反深也又作淵慣習上古患反𭜨讎常周反寶堞甜協反世界也第十卷祥烏角反大惟也俾倪上普米反下五禮反城上女牆也俾正作僻陴埤三形下正作堄也繢像上回對反堅硬五更反醜陋上昌柳反下婁豆反不端嚴㒵迫隘上補白反下烏賣反狹也海蚌蒲講反刀釰九缺反正作劒㘁𠮧上戶高反又音亦章第二帙第十一卷欄楯上洛干反下食尹反縱廣上即容反樓櫓盧古反城上守禦望樓也寶塹七熖反花𧄜如纍反䰅臺上息朱反𧄜也映𡙸上於竟反下徒活反萃止上秦遂反集也枝樂上奇綺反下五角反巾馭上九銀反下魚據反法𣷨一玄反靡不上門彼反無也㧾持上祖孔反皆也普也合也正作捴惣二形又音窟誤第十二卷瞻蔔蒲北反此云黃花甚有香氣醫羅跋上烏兮反下蒲末反佛名也正作醫字豐溢上芳風反下寅一反超邁莫芥反簡言上閒眼反略也鮮少上息淺反寡薄也關鑰上古還反下羊略反癕瘡上於容反分折先擊反開也破也躁動上則告反仇對上巨牛反鄙賤上悲美反隈陋上烏罪反鄙也正作猥字也下婁豆反上又烏灰鳥對二反誤獷古猛反破印因進反音義作郍玃上九反下時世反渾濁上胡昆反喪失上桑浪反壞器上普回反未燒也憤恚上苻粉反下於避反驚駭鞋騃反匿疵上女力反下疾移反慠慢上我到反下馬諫反駃流上所事反速疾也正作駛又音决傳寫誤也飄動上匹遙反正作飄又毗遙反疾也第十三卷戲笑私妙反蠲滌上吉玄反下條的反常淪音輪沒也湍流上吐端反疾瀨也從口角空木二反𡖉波濤徒刀反大波也音義作濤波雲曀一計反阿揭音竭梵言阿揭陀或云阿伽陀唐言無病樵濕上自焦反鑽燧上子官反下音遂皆火母也赫曰上呼格反孩稚上戶哀反下直利反小也芒草上文方反遍射常亦反騰躡上徒登反下女輒反受餧奴罪反餓也正作餒也又於位反非盲繢戶內反畫也基堵上居其反下都古反第十四卷奢摩上尸遮反奢摩他此云定毗鉢舍那此云慧猗覺上於綺反新經云輕安覺支也又於反羼提上初諫反唐言忍罪軛烏𮧓反車加牛領者也亦作軓下裙音群梵言涅盤僧唐言裙嚼楊上自雀反諸上常世反蠲除上吉玄反洗滌徒的反盥掌上管貫二音澡手也洗也發趾音止斜曲上徐嗟反翦除上即淺反截也陂澤上彼皮反池沼之繞反園圃補布二音園也種菜植樹曰操行上七到反甲胄直右反兜鍪也羡欲上徐箭反柔䎡而兖反澀所反炎毒上于廉反摧上自回反下田典反晃曜上戶廣反絢煥上呼縣反文彩㒵下呼換反火光也飢饉巨進反尓雅曰𬞞不熟曰災難上子才反愜其上苦頰反怏也俾樂上卑爾反使也下五孝反俱抧吉以反此云赤觜鴉喧憒上許元反下古內反不靜淵才上烏玄反良醫於其反蹲踞上音存下音據稟邪上兵錦反第十五卷瀑流上步帽步木二反疾雨也船筏扶月反毀呰音紫逮成上徒愛反虧減上去隨反下戶斬反懶墯上郎坦反下徒果反拯濟上蒸庱反救也將歿音沒臨𣧩音終倮形上戶瓦反淨無衣戈鋋市連反小矛也五湖之間謂矛為鋋弧𠂕上音胡下尸爾反弓箭也車輿羊諸反須音逾敗𩈄女六反挫也徒𢬜音侶伴也竄匿上倉亂反下女力反蹈金上徒到反踏也僅其上巨𠫤反才也憂悴自遂反上古犬反以繩繫獸也摩𨢘呼兮反摩𨢘首羅唐言天自在也所拒音巨珂雪上苦何反貝也馬腦音𢙉𭦟陀上莫官反𭦟陀羅唐言恱意亦云圓雞羅上吉兮反末利香花名也華嚴經音義作香非第十六卷層級上自登反下居邑反繒綺上疾陵反迦葉上音加下尸反佛姓也此云飲光鳩羅上居牛反佛名也此云所應斷已斷𥌒者上音古無目也希有上許衣反偉哉上云鬼反大也奇也劇苦上巨𨒫反艱也宴寢上一見反下七朕反暨于上巨既反及也至也第十七卷喉吻文粉反口也𢬃縱上衣力反下子用反可沮慈呂反傘蓋上桑但反寶悵知亮反𢢔莫半反翳瞙上伊計反下母各反耽味上都南反嗜色也第十八卷惣持上宗孔反普也正作捴惣二形唐捐音緣唐空也捐弃也連屬種五反對文相屬也音義作車屬誤舛上川兖反相違背也僻見上匹益反邪也瑕玷上下家反下多忝反植堅上成力反種也第十九卷屈撓女孝反曲也弱也危脆此歲反姝麗上赤朱反下力計反染上都含反又作耽第草卷聰敏眉殞反頑嚚上五還反下冝巾反匪懈上非尾反下皆賣反適莫上丁歷反就也主也冀望上居利反希也不該個來反備也包也音義作誤也未嘗音常曾也迫隘上補白反下烏賣反所儔直由反愛第三帙第草一卷陵𡙸徒活反姦上古顏反下余林反傷殺山八反備造上皮祕反具也咸也𭜨讎時周反面側瘦反稟𪫬上兵錦反受也輟己上竹劣反止也下居里反自命上於反少喪曰身嬰於盈反緾繞義焭獨上巨營反單也又無兄弟曰無子曰獨羸頓上力垂反瘦㒵也必冀居利反有所希求也望也貧窶其矩反念上居陵反憐也心胏芳廢反廢捨上方胏反止也正作廢薄祐胡古反福也正作祐又音右助也誤脆假上布交反下徒亂反胞胎也正作胞危脆此歲反嬈亂上奴了如沼二反下盧假反過咎求九反𢙣也正作咎也第草二卷沮壞上才與反層級上才登反下今及反綺煥歡貫反窗牖音酉彰施上周良反下書支反明設也彌覆上莫卑反長也廣也亦作罙冒也欄楯上洛干反下食准反垂陰於今反延袤莫𠋫反由長廣也亦長撫擊上敷武反疾也持也不瞬書閏反恱豫余庶反安也淤泥上於據反下寧計反映𡙸徒活反正作𡙸莊麗上側床反下力計反技𢪊樂上二同其𦂶反下五角反第草三卷兩膝音悉良烏毒反灌也涯底上五住反五奇反際也算數上蘇亂反羼提上叉反瞋佷痕懇反頑毒上瓦還反盲𥌒音古邃谷上錐遂反下古木反甲胄紬右反玷上丁忝反下火穴反籠檻上郎紅反檻也正作攏下戶黯反欄也諸上桑浪反大壑呵各反救贖殊玉反耽著上都含反索上經兖反俾知卑婢反種植市力反暨于上其利反聰達上倉紅反第草四卷寶璫得郎反蔭映上於禁反下於敬反軒檻戶黯反𭚫覆音滋味上子慈反多也澡漱上子老反下所右反一徒官反躁競上子告反下奇敬反陀羅上音陀第草五卷恬然上亭兼反溥蔭上破古反被音六煞也連膚音夫皮也骨髓息委反心腎辰忍反肝胏上古寒反下方廢反大腸直良反僧坊音方區也區院也又音房揣食上徒官反丸也霔大音注咽咀上因見反下才呂反不咳口愛反嗽也又烏芥反通食氣芬馥上拂分反下扶福反順愜苦頰反快也可也車𤦲其魚反此云勝藏音義作誤第草六卷駿馬上子峻反駕馭魚據反翼從上羊力反下才用反唐捐上徒郎反下由全反空弃也問訊音信告也上玄練反好衣曰紅昌石反火色悲慜眉殞反繁布上扶番反享灌上香兩反臨也受也疪蔭上并至反下音禁反覆也寂靜上情曆反下情并反曒曰上澆了反眀也遞相上提禮反首冠古亂反杻械上抽酉反下胡戒反倮裸露上二同胡瓦反淨也永訣古穴反別也砧上上知林反木鏘七羊反正作槍貫其上古丸反第草七卷密緻直利反額上進反下硬挌反字上音万其𩬊右旋像字形也螺文上洛禾反鑒徹上古懺反聾聵上洛紅反下五怪反輟身上竹劣反止也銛白上息廉反完粒上黃官反㸦起上胡故反更慣習上古患反纖長上息廉反𦟛圓上容反直也七仞人振反七尺曰𣫆捨上輕徑反盡也蒞物上力二反臨也殘忍上昨千反賊也亦作戔第草八卷懈惰上皆賣反下徒果反恭恪可各反敬也寬宥音右臺榭邪夜反毒虐魚約反暴也車騎上九魚反下奇寄反牀蓐上助㽵反下而欲反萃止上疾遂反第草九卷來劫音劫倫匹普吉反第卅卷喧雜上許元反大語也或作歡囂也變易音亦改也善音軟育第四帙第卅一卷周聞音問達也歿想上莫骨反第卅二卷垢繒慈陵反俾無上并爾反使也從也耽著上二都含反願鎧開海反甲別名第卅三卷欄楯上洛干反下食尹反軒攬上許言反下咸黯反延袤莫𠋫反門闥他達反窗牖音酉八楞郎登反貫穿上古九反下尺專反扣擊上苦狗苦𠋫二反擊也垣牆上為元反下自羊反迥然上螢頂反遠也繚以上力小反緾也寶幹古案反莖也聳擢上息勇反下直角反稠密上直由反甲胄直右反跋陀上捕末反此云賢克諧上肯得反下戶皆反鑒十上古懺反迫隘上補白反下烏賣反技樂上奇倚反又作技暨于上其既反及也第卅四卷沮壞上齊與反為帥所類所律二反瑕點上戶家反下正作玷第卅五卷媒定上母回反不喜許記反好也獷古猛反鄙𢙣上悲美反庸賤上余封反祐益上為救反助也乖離上古櫰反正作乖厚膜上侯口反重也下母各反回澓音伏湍馳上吐端反疾也奔激經歷反不睱遐嫁反原阜浮九反重胡𢦥反礬石上扶番反投身上徒婁反又之末反誤捫摸上莫奔反下莫胡母各二反蚊蚋上無分反下而稅反鍊治上力見反下直之反險詖彼義反第卅六卷偱身上似遵反猗覺上衣綺反又平聲易誨上夷義反不難慍暴上於運反恨也波濤徒刀反印璽斯此反天子玉印曰癲狂上丁田反正作癲鬼魅眉祕反蠱毒上公五反陂池上彼皮反遲回上直𡰱反徐也久也脫也緩也又經音義以彽徊代之彽徊徘徊也姍遊也淪涓上力句反下相魚反第卅七卷溥濟上破古反溉灌上古愛古氣二反𣧩歿上諸弓反下莫忽反涕泗上梯禮反下相至反自目曰涕自鼻曰泗也泥潦郎道反技藝上奇倚反下魚計反第卅八卷喧諍上許元反𭔏寤上交孝反下吾故反淳熟上市倫反除翦即淺反羈擊上居冝反境排步皆反第卅九卷𧆛誠上巨焉反繽紛上匹反下芳分反花力閣反香篋謙頰反口噓音虛摩𮠴火兮反正作𨢘鈿廁上亭賢反間也飾也鞞陀上瓶兮反山名斫羯上之約反下居謁反嶷然上冝力反第卌卷奮迅上方問反第五帙第卌一卷飲漱沙右反羅邏羅個反胎名或云羯剌藍此言薄酪閞鑰上古還反下羊斫反上又音辨非淤泥上於據反第卌二卷稼穡上古亞反下所力反種之曰稼𣫍之曰穡也退𩈄女六反挫也絲上五口反陂澤上彼皮反淳善上市倫反辨具上蒲莧反致也正作辨辦三形瑩徹上烏定反聰敏眉殞反縛茤測俱反澒涌上洪孔反下容隴反臺𧄜如水反第卌三卷𧿡難上蒲末反鮮少上先淺反嶷然上冝力反山峯㒵無涯崖冝二音水際畔也慣習上古患反馭四上魚據反第卌四卷降澍注樹二音羸瘦上力垂反下沙右反觸上郎敢反善軛烏革反第卌五卷矝羯上居陵反下居謁反摩上泥札反婆鈐上蒲可反下巨今反毗攞羅可反佉擔上去迦反下都甘反醫攞上因兮反音義作醫勃麼怛上蒲沒反中摩可反下多達反鞞麼上步兮反下母可反薜羅上補計反窣步上蘇沒反睥羅上普計反謎羅上迷計反攞荼宅家反䭾麼上陀個反𧿡多上蒲末反一趣七句倉狗二反數名也菴浮上烏含反果名因果為國名苫婆上或占反香樹名因樹為窟名第卌六卷沮壞上慈與反映蔽上衣敬反下卑祭反第卌七卷技樂上奇綺反字義作妓字倮者上胡瓦反淨也悲號戶高反涕泣梯禮反目汁也遞相上提禮反不回戶灰反胸臆上許恭反下依力反驚懾占涉反怯懼也第卌八卷密緻池利反凞怡上喜之反下以之反炳然上丘永反玩味上五喚反習也正作玩音義以忨字代之非也上咢我各反右𩒺亦作𩔁扶武反頰骨也經作輔相字字上音萬正作頸有上經郢反右臀徒魂反右䏶毗米反與膊遄敕反王腨同上足跟音根第卌九卷凡庸音容輕微眇小之人日啞羊上於雅反洎乎上其既反及也唐捐上徒郎反下以全反言空弃也充洽上昌終反美也備也正作充下咸夾反𣽈也和也第五十卷希有上許衣反右其几反惟忖村本反思也降霔音注佉陀上去迦反山名澍雨上朱遇反令燥蘇老反首第六帙第五十一卷靡不上門彼反無也普霔音注苗稼家亞反技樂上求綺反女樂也正作妓緊那上古忍反哮吼上虎交反鳴囀竹戀反適恱上始石反穿鑿曹作反穿也正作也火𦦨余贍反又上聲風災子才反把乾上補馬反執也音義作捕瓦反誤洞然上同弄反徹也第五十二卷連澍音注奮迅上分問反下私俊反金翅音施鼓揚上公五反擊也動也兩闢毗益反而補各反擊也撮取上倉活反遍法上補見反巾也今皆作遍訛也無歿門忽反華蘂如水反𦬔子上古拜反草𧂐子賜反沮壞上才與反第五十三卷唐捐音緣弃也無怙音戶第五十四卷種植乘力反種也蔽毗祭反𢙣也正作弊第五十五卷打棒上德冷反下步講反自勉音免也勤也毀呰音紫撾打上竹花反下丁反楚撻他達反或挑吐條吐刀二反或級九及反第五十六卷迫隘上補白反下烏賣反觸嬈泥了而沼二反嬉戲上喜之反遊也醜陋上昌柳反下婁𠋫反耽染上得南反泥潦勞道反法繒淨陵反柔䎡如兖反第五十七卷匪懈上非尾反下皆賣反耽著與耽字同得預余庶反廁也以冠古喚反不㢮施爾反釋也廢也弃也問訊私進反舒展上手諸反險詖彼義反侫也欺𡙸度活反不𨓤吐對反甲池右反憺怕上談敢反下普白反慣習上古患反癡口角空木二反第五十八卷憒𡗚上古對反下女孝反蕳擇上古眼反儔伴上直由反喧憒上喜元反虛夭反詐也獷古猛反聰敏上倉公反下眉殞反中畫撗麥胡卦二反虹霓上黃公反下魚兮反瘡疣為求反瘢痕上步安反下戶根反猶豫余庶反罪舋欣進反嚬蹙上毗反下子六反頑佷上五還反下侯懇反醒悟上星定反從置上斯此反字上音万正作第五十九卷怡上許之反下以之反印璽斯此反弧矢上戶吾反下尸履反弓箭也博奕音亦圓碁戲也劬勞上其俱反暨于上其既反及也枝幹公案反莖也繁密上房番反穊也為頸居郢巨成二反戒轂古木反昧音儔匹譬吉反𣴟滌上胡管反下亭的反洗也巾之上居銀反衣也㽵飾衣帶也衣於既反鑯圍上天結反下韋胃二音迥䢖上螢頂反遠也菡萏上含感反下談感反第六十卷窗闥上叉雙反下他達反階𭏊上挌諧反下直𡰱反軒檻上許言反下咸黯反階隥登鄧反欄楯上洛干反下食尹反垣牆上為兀反下自羊反湍激上吐端反下經歷反洄澓上戶灰反下扶福反臺榭音謝𣱦氳上扶文反下於云反羼提上叉諫反唐言安忍倮形上胡瓦反翳膜上伊計反下母各反薄皮也捕獵上薄故反下力反放牧音目賑恤上真刃反下詢律反等鑒鑒二同挌懺反臣第七帙第六十一卷奮迅上分問反下私俊反技樂上其倚反式尸食反第六十二卷赫奕上呵挌反下夷益反徽纆上許韋反下蒙黑反𮝲勒上悲媚反悲轂古木反信軸丈六反忍轄遐瞎反車軸頭䥫大箱修羊反茵蓐上伊人反下如欲反羈鞅上居冝反下於兩反便軛音厄揔持上則孔反覺悟上古孝反能閉必計反布護乎故反遍布也正作濩辨折上平件反別也理也慧也正作辨下先擊反分也楞伽上郎登反下其迦反旋澓音伏激電上經歷反𮮴荼宅家反第六十三卷市肆上時止反下斯至反音義作苐肆誤沮壞上才與反遽即上其據反急也恃怙上時止反下乎古反拯濟上蒸字上聲呼之也救也降霔音注涕泗上他禮反下相至反猶豫上蒲八反中余修反下余慮猶豫不定也憶念上衣力反聰慧上倉紅反澡瓶上子老反字上音万正作第六十四卷師傅方務反三公之一也謂太師太太保也正作傅字也𣱦氳上扶文反下於云反鳧上房無反俱枳諸氏經氏二反陂池上彼皮反挾閣上嫌頰反投身上徒婁反又之未反誤桂出上古話反正作挂寶釧川反耳璫都郎反尼拘九愚反樹名此樹如此方柿子如此方枇杷子果蒂如柿蒂諸樹中最為高大也聳擢上息勇反下宅角反編草上卑連反織也第六十五卷可喜許記反不瞬音舜動也倫匹普吉反風癎音間啇估上尸羊反下公五反阿𢈔余主反羯上居陵反顆粒上苦果反閞𨷲上古還反下羊略反德淵於玄反羽翮行𮧓反憩止上丘例反稟善上兵錦反受也第六十六卷游彼上羊修反藤根上徒登反雉堞上直爾反下徒叶反寬平上苦官反蠱毒上公五反𧿡底上步末反欄檻上郎干反下戶黯反戶牖音酉猛卒上莫耿反下子沒反褊陋上卑緬反下郎豆反攘上而羊反或挑他𭛹反取也或剝卜角反號𠮧上戶高反俾倪上普米反下五禮反城上女墻也𮏄蓐上音因正作茵下而欲反上誤蹄角上徒兮反該練上古哀反階𭏊直𡰱反窗闥上初江反下他達反軒攬上許言反簷也婆拿女加反竊自上七結反私也堪耐奴代反漁師上音魚捕也㧌動上呼毫反攪也第六十七卷䣑店上直連反下丁念反巖巚魚蹇反鬻香上音育賣也索上古犬反波濤徒刀反晨晡布乎反晷漏上居委反堅脆七歲反𣾫滑上所迫迮上音百下音窄沃田上烏酷反持上疾反第六十八卷有𤯔音人市㕓音緾唼我上子合反脣吻文粉反門閫苦本反遞相上徒禮反鞞瑟𦙁上步兮反中所擳反下竹𡰱反補怛多達反山名也舊云補陀羅山縈映上於榮反下於竟反蓊鬱上烏公烏孔二反懶惰上郎坦反下徒果反勉策上眀遠反下初責反藏上苦角反哮吼上呼交反佇立上直與反方隅音愚慞惶上之羊反龜王上居追反象王上音像古華嚴經作鳫王彼誤溝洫上古侯反下許遙反宣敘音序呰辱上將此反眠𮄆蜜利反第六十九卷臨馭音御嬪御上音頻婦也又婦人有法度之稱也𥧦𥧝上古孝反下五故反騎從上巨至反下自用反第七十卷不藉自夜反耕耘音云梁上徒老反下力羊反中上知仲反下於小反鄙陋上兵美反下郎豆反其幹古岸反陵莫結反𡙸曜上徒活反下亦作耀縈茂上于兄反正作榮高倨音據伏第八帙第七十一卷姊妹上則此反愛染而陝反孫䭾徒個反無斷徒短反絶也又都管反第七十二卷忿怒上芳吻反羡慕上似面反旋澓上序全反下扶福反杵破上尺與反從廣上音蹤正作縱姤他上都故反又音搆非苗稼古亞反樹王穀曰稼稼亦種也枯槁苦老反匱乏上巨位反依怙音戶扣地上苦狗苦𠋫二反擊也捶胸上直追反下許容反屈膝音悉長號戶高反蓬亂上步逢反皮膚音夫𭽫裂上七倫反皮細破也控告上苦貢反勉濟上眀遠反翳瞙上於計反下忙各反盲𥌒音古頒下上布顏反布也賜也牀搨上助㽵反下他盍反輦輿上力蹇反下以諸反林藪乘走反心腎市忍反肝胏上古安反下芳吠反荊棘上居英反下居力反沮壞上自與反姝妙上尺朱反竊盜上七結反下徒到反佚上羊林反下羊一反枯涃戶各反水竭也正作涃也又音困非暴虐上步報反下牛約反止措倉悟反惸獨上巨營反無兄弟也淩𡙸上力丞反下徒活反欺取也犬豚上苦反下徒魂反擎以上巨亰反璃幹古岸反霑洽戶夾反繁盛上扶幡反塠阜上都回反下扶久反僉然上七廉反中宵音消夜也䰅𧄜上相朱反下而水反撫鞠音掬毒蟲呈中反唐捐音緣唐空也捐弃也辭退上似慈反第七十三卷諸劫居葉反時名亦作劫囹圄上力丁反下牛與反獄名也夏曰夏臺殷曰羑里周曰囹圄也枷鎖上古牙反下乘果反杻械上抽酉反下戶介反搒笞上步𢈔反下之反割上毗忍反去膝蓋骨也斷足也倮形上戶瓦反羸瘦上力垂反下所右反筋斷上九殷反苦劇巨𨒫反寬宥音右宮闈音違刑音六歿命上莫忽反投地上大侯反赦太上尸夜反宥也嵐毗上郎南反第七十四卷無字第七十五卷周遍音遍布也趺音夫隆起上力中反高㒵也縵莫官反正作鞔足跟音根柔䎡音軟王腨市軟反傭長上田容反直也頸文上居郢反頰如上吉叶反睫如上子反拘陀音陀牽馭上去堅反下牛去反翊從上羊力反下自月反延袤莫𠋫反備擬上皮祕反欲上古瓦反殞滅上于愍反嗣位上詞字反匹偶五口反假寐上古雅反下蜜二反假謂詐睡也額廣上五挌反蹇縮上正作騫丘軋反虧也下所六反上又居輦反非寶葉余接反璃莖戶耕反獷古猛反𠫤吝惜上力進反慳也亦作吝繒纊上疾陵反下苦謗反芬馨上芳文反下許經反遍十上補見反𨔛相上徒禮反第七十六卷御扜音翰嚴肅音宿恭也戒也蠲除上古玄反耳璫都郎反戶牖音酉迫窄上布陌反下爭格反迦葉上音加下音攝梵言迦葉波唐言飲光剛楯食尹反映𦿔上於竟反下必世反正作映蔽不瞬尸閏反正作瞬惛蜜利反唱邏郎個反唱拖託何反蒱我上步胡反唱荼徒解反唱伏可反唱哆都可反瑟吒上所擳反下丑雅反降霔音注湍激上吐官反下古歷反齊峙直里反唱伽巨野反唱拖徒可反尸苛戶可反蘇恨沒反唱壤而兩反曷攞上戶割反下郎可反婆麼上蘇反下莫可反唱縒七可反唱拏可反婆頗上蘇反下普可反夷舸古我反唱侘耻加反咸綜祖宋反鬼魅音媚呪詛阻疏反癲癎上丁年反下戶閒反羸瘦上力垂反下所右反痊愈上七全反下余主反藪澤上乘走反婆咀多達反第七十七卷將徒典反傭作上余封反旃荼上之連反下宅加反犗牛上古敗反犍牛也舟楫接集二音捃拾上居運反冠王冠上音貫下音官耗呼告反漁人上牛余反金翅音施鳥翼也亦作翅爾𦦨音熖此云所知謂智所知境非須識境也信炷音注天𤯔音人哽噎上古杏反下於結反普策音冊第七十八卷曩於上奴朗反擐甲上戶慣反淤泥上於去反貪鞅於兩反撤睡上直列反壞也漂汩于筆反水流㒵也又音骨抅害上九于反下尸蓋反慧象音像獷㑦上古猛反下力計反穽上苦庚反下疾井反香篋昔叶反能貯知與反毗笈巨劫巨立二反藥名利豫音牟鎧苦改反利鋸居去反鉗鑷上巨廉反下女輒反索上吉犬反鉤餌而志反食也淵中上於玄反易上莫𠋫反如鍊力見反亦作煉一銖音殊海島音搗椰子上羊嗟反哮吼上呼交反竄伏上倉亂反子音斤樂絃音賢𡖉上郎管反下苦角反徑捷上居政反下疾反銛利上息廉反若奮方問反瘡疱步白反慣習上古患反技藝上巨倚反下魚祭反鐵鈎鎖上天結反下乘果反吞音逝安繕市戰反延齡音靈𦒿舊巨右反故也有揳先結反虧上去隨反滲漏上所禁反第七十九卷窗牖音酉金屑先結反碎末也慠上即遂反下五告反法蠡郎禾反虹霓上戶公反下五兮反或挂音卦霈然上普蓋反多雨不音遷𣴟濯上戶管反下宅卓反第八十卷沮壞上自與反休咎巨久反嬉戲上許之反弼輔上皮筆反中晝音獲戎信力入印法門經等八經十三卷同帙信力入印法門經五卷衆𫈐音花赫奕上呼格反下羊益反奮迅上方問反下音峻蘭楯上郎干反下食尹反𣇣師上知記反委也子𨱞音毛正作髦也窗牖音酉分阤音陀梵言分陀利此云白蓮華也又尸爾直爾二反非彼音岸差別上楚加反兜率上都侯反倒上丁年反根向上也正作𠑘攝受上尸反獷古猛反猗覺上於綺反羼提上初諫反諭諂上羊朱反下染反詭言也柔渜音軟又奴短反非不誑居况反欺也又而林反非鄙惡上兵美反下烏各反宍髻上而六反廣陜戶夾反正作狹隨渃上徒果反下郎各反正作墮落經挾古洽反毀訾音紫又作呰劫𡙸徒活反照曜音曜佛花嚴入如來德智不思議境界經兩卷蘭拏女加反奢利上尸遮反梵言利弗多囉隋云鸜鵒子葉簸上深涉反下補我反姓迦也此云飲光迦底上古牙反下丁禮反亦云迦多衍𡰱池陂彼皮反不喘川兖反俱嚧音盧子息朱反正作溼生上深入反柘囉上之夜反外道也泥揵音𠃵算數生句反正作數今作數沙詫丑嫁反諸經皆作阿迦𡰱吒天池泊普各反正作濼又旁各反止也翳瞙上伊計反下母各反𠷐伽上其陵反下其迦反界𣊹力讓反又音良羂索上吉犬反卑𥠖力兮反或云薜荔此云餓鬼盡篋謙頰反邊淵一玄反誅煞山八反命也正作殺煞却亭的反正作女牆自羊反寮窗上力𭛹反從穴欄楯上郎干反下食尹反為悵知向反正作悵大乘金剛髻珠菩薩修行分一卷甄叔上經賢反寶名枳羅上吉紙反亦云雞羅句上因進反池榭音謝𡰱峰芳逄反拆為上先擊反邏𠷉上羅個反下居伽反外道名也佛華嚴入如來不思議境界作囉迦斫𠷉上之若反𡰱健音𠃵外道名也又巨建反誤蹲踞上自尊反下居御反稗子上蒲拜反頑嚚上五還反下冝巾反喜怒上許記反好也嗔恚上赤真反下於譬反嫉姤丁故反又音搆誤鮕忙上奴兼反正作鮎瞿㮏奴達反又音奈羆面上彼皮反螭面上丑知反兔面上他故反猛酷上莫哽反下空沃反毒上叉錦反又七感反誤唼食上子答反班駮補角反偃蹇上於𭞽反下居輦反傲也正作偃𠐻鞭闥上卑連反下他達反洋銅上余良反焇也鎔也正作煬煬二形鸜鵒上其俱反下余玉反瘖啞上於今反下烏下反猒倦其眷反或眇小反聾啞上洛公反下烏雅反纞躃上吕貟反下必益反卷攣手病也並俗飼之上詞字反靜謐必反安也羖羊上公五反篳篥上蜜反下力曰反𭦟荼上莫安反下宅家反梵言羅此云壇掘地上其月其勿二反大方廣佛華嚴經修慈分一卷馳鶩無付反芬馥上芳文反下房六反重茴音因綺褥音辱堤岸上丁兮反齒蓞上含感反下徒感反正作菡蓞氛氳上扶文反下於云反撫擊上芳武反凞怡上喜之反下以之反恱懌音亦樂也眩翳上玄縣二音下於計反或餐倉安反喫食也正作餐餐二形繽紛上匹反下拂分反恱豫余慮反大方廣佛華嚴經不思議境界分一卷于填音電國名傭長上丑容反直也伽良上其迦反尊者名沒特即目揵連是也羅怙乎古反塢波上安古反纈麗上賢結反下力計反尊者名或云周利盤陀此云路邊生揭路荼上其列反下宅家反緊捺上吉忍反下乃達反樂神名殑伽上其陵反下其迦反患翳一計反三勃蒲沒反𠧒匂蓋割二音塢波上安古反拖耶上徒我反梵言塢波拖耶此云親教師閦鞞上又六反下步兮反勉勵上眀辨反下力世反勉勗也強也勵勸也大方廣如來不思議境界經一卷磐根上步安反擢本上直角反抽也青翠七遂反繁枝上扶番反布濩乎故反遍也森蔚上所岑反下於胃於勿二反森長也秀上余頃反夷敞昌兩反𦲮茂上緣雪反草生而新達曰王頸居郢巨成二反𧆑靡上雖委反下眉彼反互不上乎故反植廣上承力反種也溉灌上古礙反古氣二反粖香上莫鉢反大方廣入如來智德不思議經一卷阿㝹那頭反樓䭾陀個反又音陀佉陀上丘迦反子𩭈音須漸龧時慮反曉也正作曙銷涸何各反汙池上音烏不流水也又音戶食上徒官反度諸佛境界智光嚴經一卷鉢底丁禮反或云梵波提此云牛呞般特上步安反踏臘驃上徒盍反中盧合反下毗妙反亦名達羅弊亦名陀驃亦沓婆摩羅子此云財力士也淮陀上之尹反亦云專陀也誤普嶮余贍反正作㷿嚬申上毗反迫迮上補陌反下爭格反子𮤅力反也正作鬣也自前經作師子䰅是也電焱音熖慲恆上莫伴反盈也充也正作滿又莫安反誤寶繖音散蓋也嚬呻音申一揣徒官反丸也正作團二能辨上奴登反多技也下蒲莧反具也備也作也也正作辦二形亦作辨羌大方廣普賢菩薩所說經等九經十三卷同帙大方廣普賢菩薩所說經一卷于闐徒見反國名也唐言地乳靡不上莫彼反無也雙𬧅市軟反雙膝星七反雙股公五反會𣴶才果反挫也結趺也正作坐古文作坐大方廣菩薩十地經一卷崛山上巨勿反𦒿闍崛山唐言鷲峯羼提上初諫反唐言忍啇人上尸羊反又音的非彼圻音岸又牛斤反華𩭈音澄靖音淨清徹丈列反盡卬肷一進反余律反漸𬾨一𭃄智德經五卷第一卷善音拳經𧨏音義僉使上七廉反皆也下所起反招致上旨搖反周𢭀序全反辨才上平件反慧也沾汙上音點又竹廉丁念二反弘照之曜反光明也之一進反罪舋許覲反救滲即計反離垢古口反浛道上戶紺反諭諂上羊朱反平圴居巡反正作均淳𤍨上市倫反下市六反牽連上去堅反躊躇上直由反下直余反無古口反塵也這聞上尸隻反才也初也正作適蕩滌上徒朗反下徒的反慺慺郎侯反謹敬也又力朱反恱也煒煒云鬼反毫跱直耳反垂顧音故淡泊上徒敢反下普百反憒亂上古內反一𤁷丁歷反撰擇上思兖反擇也正作選也𢗂難上巨記反僥幸上古堯反求也下戶耿反愛也恐懅其去反傾覆芳福反景摸莫胡反法也規也琦音奇微上倉胡反大也物不精也正作粗二形渾家藏作𦼐同音抄抄小反未也正作杪門閫苦本反門䦘也塵埃烏開反誘導音道引也教也損耗呼告反質朴普角反偏儻得朗反正作黨論語注云相助匿非日黨也意憧尸鍾反意不定也往來㒵也協於上戶頰反淫怒上羊林反欻欻許勿反𨒫上初患反痛癢羊兩反帑藏上他朗反㻉瑤上蒲故反下以招反千姟古哀反兆載上直小反下子改反不音危衆賈音古居賣曰也又音嫁賈人知善𢙣也儔迮上直由反下普必反偶也正作匹又作殖衆上時力反種也多也𮃢首上苦禮反罣閡上戶卦反下五愛反善慈上而斫反下子司反覺𥧝上古孝反下五故反瞢瞢莫弘反在也惛也心𢬘步保反正作抱第二卷穬古猛反或作獷方愊音福之闊狹也正作愊也又普逼皮逼二反並非迫迮上補陌反下阻格反狹也盜竊七結反蜎𢑮上於玄反下方微反蠕動上而兖而准二反蚑行上巨支反又音企喘息上川兖反俗辝上徐欲反萹章上匹連反正作篇喜欲上許記反無饜於廉於熖二反飽也正作饜嫉姤上自七反下都悟反貪餮音鐵蛇蚖五官反表裏音里常𢭃音短窈𦿔上於了反下必祭反所郭氏作力主反盲啞烏雅反浮泅似由反浮渡也三淵烏玄反正作淵嗜欲上神利反戀郎到反慕也正作嫪猗見上於綺反正作倚也又於冝反攻擊上古冬反貧匱巨位反徒儻得朗反輩也正作黨也又他朗反非普𬾨音備至上徒愛反不𮒽音悟姧惡上古顏反下烏各反劣愵而斫反劣也正作弱也又音溺非不協戶頰反迮上巨玉反下阻格反促狹也正作迮這起上音釋才也碎上自匝反帑藏上他朗反璝琦上古回反下巨冝反肌宍上音飢下音肉貪力進反𢌿言上必支反下也恬泊上徒兼反下普百反捫摸上音門下音莫摩挲也蜎上於玄反下音非彊勇上巨羊反涕泣上吐禮反之熊他代反意也作恣也正作態恃怙上時止反下胡古反憑也算猶上乘亂反經作笄非也羣萌莫耕反亘然上古鄧反遍也第三卷剖判上普口反詰誳丘勿反辝塞也今作詘說文作誳卬綬上一進反下神右反綬綵衣也所以別尊卑也跳越上他反越也遠也正作跳趠二形又音條謿說上竹交反𨽁邑上自禹反衆也共也咨嗟上子私反華𩭈莫顏反正作菀囿上於遠反下于救于六二反㥄傷上力乘反侵侮也欺也真實神曰反苦惚音𢙉刻印上苦黑反下伊進反奔逸上布門反老耄莫報反八十曰也亦作耄乖絶音乖恬怕普百反結上莫瓶反又眠麵二音儔迮普必反騃上莫瓶反下五駭反慌𢙉上火廣反下火骨反誤錠燎上徒丁反下力燒反上又音定瑕疵上胡家反下疾支反憒閙上古對反下女孝反心亂也惔怕上徒敢反乾燥蘇老反竚立上除呂反蕭成上蘇𭛹反樂器也誤衆苦回反柔䎡音軟第四卷惶上戶光反下莫光反淳淑常六反大舶音白舉舤苻嚴反船上慢也正作忛䑺二形也須臾羊朱反𤢌獸上巨金反下尸呪反慊恪上苦兼反下苦各反錠光上徒徑反受莂逼列反殖德上時力反種也正作殖淡泊上徒敢反下普百反不肖音笑似也不肖謂不似也侯行上之亦反下戶庚反憣黨上北安反輩也正作𤳖般二形也暗置莫瓶反又之義反非娙塵上羊林反正作淫二形又苦耕五耕戶經三反非夙夜上息六反早也淹𦿔上於撿反下必世反正作掩蔽𮈊藏上兵媚反密也神也正作祕祕二形也下自浪反渾家藏經作祕藏晃耀上戶廣反等卞乘亂反計也正作算𣽈劣上儒軟二音上方經作孺非儻侶上都朗反正作黨第五卷之縵莫半反背𦜩音𢙉寶瑛於亰反晃昱音育𦿔上必祭反下女力反正作蔽匿溪㵎上苦兮反曳敘上音申下音序軻地上或作珂坷二形同苦何苦我二反華嚴及十住並作軻字也經文作柯誤也持眴音舜為魯上于僞反以也下自登反經也誤煌上戶光反下莫光反正作惶恾誤也創痏上楚㽵反下于美反之𭹀知鄰反救福上居右反護也止也助也正作𧧷救二形又俱求二音非㽵嚴菩提心經一卷𧿡陀上蒲末反梵言陀婆羅唐言賢羼提上初諫反梵言羼提唐言忍也啇賈上尸羊反下音古上又丁歷反非暐曄上音偉下云輒反薝蔔上之廉反下步北反嬉戲上許之反遊也諸菩薩求佛本業經一卷𢜪那上而者反唐言智郭氏音怙非愛𢡽音昔邊幅音福力上居反佪念上戶灰反如市專反誤蜎飛上一玄反𧑮動上如兖反淫泆上余林反下羊一反沾汙上丁忝反又霑店二音傴惒上烏侯反下胡臥反或云優婆舍羅唐言方便善巧也正作漚又於主反誤狎習上咸甲反喘息上昌兖反無丁禮反正作底又旨止二音誤流淵一玄反饋遺上求位反下唯醉反贈也𤢌狩上巨今反下守右反薜荔上蒲計反下力計反鹽樓上羊廉反亦云閻羅也菩薩本業經一卷德式音識法也不𬾿音天名也諸經皆云不樂天又音槗非也不倦巨卷反淫泆態上羊林反中羊一反下他代反拘綴知稅反沾汙上音點又竹廉丁念二反非也除剔他的反除𩬇也飭好上尸力反正作飾開閉音閇𣽈和上儒軟二音柔也擲去他歷反挑也又音擲投也滲漱上子老反下所右反蕩滌上徒朗反下徒的反𣹉手上音貫洗也忮忟上之義反𡧱也下眉殞反傷也謂無𢙣言傷人也下正作閔也一本云令無有𢙣口是也下又郭氏音抆非也諂諛上丑染反下羊朱反㓨棘居力反危殆音待恬惔上徒兼反下徒敢反完具上戶官反喜笑音笑協持上戶頰反園圃補布二音廗以上祥昔反綵縶音𤗊正作㲲也各曳音電平諄之倫反誠也至也又之閏反寧也兜沙經一卷梵言兜沙此云行業活逸上戶括反流㒵也潘利上普官反儨提上之日反華嚴經云剎名實色佛名伏𭜨智也正作懫應和尚經音作儨經文作儨郭氏音坘提上直𡰱反俱䜖音談應和尚經音作䜖廅天上烏盍反此云有光壽天二禪中初天也亦云少光天廅波同上天名波摩那亦云阿波摩那天此云無量光亘羞上古鄧反下息由反羞託下他各反亦云沙詫須𨅐帶滯二音正作蹛也郭氏音武非㒃吒上女利反正作膩也正言應云阿迦抳瑟𢮎唐言色究竟天羅鄰力真反𢜪那上而者反梵云𢜪那此譯云智陀上蒲末反梵云䡋陀師利此云賢吉祥菩薩名也別本作戰非也菩薩十住經一卷無鞅音央柔而兖反弱也又乃短反非鳩摩上居牛反梵云摩羅浮此云童壽亦云童子也誤俞羅上羊朱反暑置上神預反正作署菩薩十住行道品一卷波渝羊朱反長𢭃音短有於熖反傷上眉殞反正作閔也又音翰非索子上所革反求也遐十住經等四經十一卷同帙十住經四卷第一卷皆電音申展也將隧直遂反誤文辭音辝如蜂音峯淳至上市倫反嫉上於元於願二反正作怨柔音軟𦿔其上必世反不勉音免脫也廬舍上力魚反鍊金上力見反亦作煉貧匱巨位反乏也柔䎡音軟古猛反欲戶介反樔窟上助交反籠檻上郎紅反下戶黯反深摷助交反第二卷輦輿上力蹇反下以諸反捫摸上音門下音莫種𮁽自木反柔𣽈音軟雨漬疾賜反沮壞上自與反氛氛芳文反蠱毒上公五反戲笑音笑城墎音郭兜上所姧反為鎧苦改反華莫姧反第三卷俎壞上自與反正作沮消涸音鸖泥潦音老迫隘烏解反遏絶上烏割反懅事上其去反思㥧音順差別上初加反二吒上女利反亦云膩吒亦云𡰱吒此云色究竟天第四卷輕子告反揌持上子孔反攝𢭃音短所澍音注口噓音虛軻梨上苦何苦我二反伈聖上相遷反貫䆤上音官下音川以上知利反𠇈聖上音仙老兒不死曰仙仙遷也遷入山隱也亦作仚如來興顯經四卷第一卷閣上步盲反棧也閣也正作棚輣𨍩三形又平病二音非罣㝵上古賣反下音礙猴上戶麥反正作獲逯諸上徒愛反之裏音里無鞅於良反無邊也𢿘姟音該照於上之召反䨱𦿔上芳救反下必祭反族姓上自木反彼音岸罪舋許進反世𧨏音義奮光上方問反今鄙兵美反奚本上戶雞反正作奚惔怕上徒敢反下普百反疇倫上直由反適莫上丁歷反挨姓上自木反惟恍以雪反喜也樂也正作恱也柏梯經作恱也凞隆上許之反廣也下力中反高也善㩲音拳枝黨得朗反正作黨飄颻上匹遙反下羊招反強執上巨羊反下之入反正作執憒亂上古內反下音亂循殖上息由反下市力反疇迮普吉反𭉊嗟上子斯反鳥跡音跡陰雨上於今反消灡即歎反糜爤上美垂反下郎歎反毀渃音落𡕆此上乙既反山名𡧱𡎔奴兮反山名也郭氏音非阤羅上徒何反又音豕非揵呇惒上巨焉反中徒合反下戶戈反之淵於玄反此上方問反普備音備𧑮動上而兖反𦁉懷上音雖安也正作綏又音接非所苞卜交反綏集上息惟反崖疧上五佳反下丁禮反下又音祇非也憣上北槃反下都朗反正作𤳖黨㥧隨上市閏反第二卷苞裹音果光嶮羊贍反正作㷿這出上尸亦反始也初也填者上莫瓶反暗也正作𡨋也又音填非輝耀上許㱕反下以照反窈𡨋上於了反蜎蜚上烏玄反下音飛瀆上徒木反下尸芮反瀆溝也溫也清也溪谷上苦兮反奮振上方問反陵阜音婦丘垤田結反高埤音卑卑下也亦作庫也又脾婢二音非用依猗於綺反窈上於了反下莫瓶反叵逮上普果反下徒愛反耗呼告反瞻戴都代反奉也埤下上必脾反色㹸音㒵醫祝上於其反下之右反這見上尸亦反除愈余主反孤焭巨營反無兄弟也顏貌上音顏下音㒵諸𤺫音𢙉琦上巨冝反純淑市六反其罔音𠕀志七到反憂戚七歷反捊我上步交反引取也又孚浮二音吁對上火乎反正作呼愁懺倉歷反佹戾上居委反變也悔恱正作恑詭二形又居垂反見也瀀渥上於牛反下烏角反而澍注樹二音先竹與反盛也正作貯微渧丁歷反又音帝非沾洽上竹廉反下戶夾反適子上音的長也正也君也正作嫡也又音釋蔭而上於禁反亦作廕倫禑五口反二也謂阿須倫妻也正作偶也塵上郎屋反正作鹿鳴音幽鹿鳴也正作呦𣢄三形出應和尚音義鹽天上閻熖二音錠光上徒徑反定居月反淡泊上徒敢反下普百反棄捐上詰利反下以全反第三卷恃怙上時止反下乎古反獲得上戶麥反摩𠇾音休去上郎刀反下丘與反藏也蕩合上湯堂二音沉上莫朗反下戶朗反大水貌也又水流㒵蘇揣徒官反暉㷿音熖殖不上市力反賄賂上呼罪反下郎悟反焚治音野陶冶上徒刀反天館音貫舍也經裏音里志操七告反畔上居羊反正作疆摩荼宅加反頻伸音申僉度上七廉反鶱翥上亦作鶱蹇二形同許言反鶱飛舉也輕也蹇走㒵也下諸預反鳥高飛也上又經文作蹇誤也奮扇上方問反波蕩徒朗反攫食上俱縛反挑出上他刀他聊二反捾取也應和尚音義作掏徒刀反捾也善逮音待及也第四卷大較音角略也憺怕上徒敢反下普百反鐙明上都能反乖無上于丙反正作永狎習上戶甲反諛諂上羊朱反下染反譖增上㽵蔭反雖步𫝊