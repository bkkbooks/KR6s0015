反下沙右反藪澤上素走反年穀古木反婆咀多達反正作呾波濤徒刀反田上烏毒反柔䎡而兖反一大般涅槃經一部四十卷第一帙第一卷推上直追反正作椎胸也戰摽力日反懼也戚也正作慓也誤涕泣上他禮反目汁哽𠰸上更杏反下因結反裁抑上昨來反下衣力反互相上乎故反戰掉徒了反逮得上徒礙反嚼楊上慈雀反嗽口上蘇奏反澡手上子老反轅𨍮上為元反下古厄反六醈徒濫反水味也無鹽也正作淡郭氏徒紺反輕耎而兖反悵快上亮反下於亮反德𩭈音唼食上子答反樓櫓洛古反竅孔上苦𠮧反鵄梟上赤脂反下古堯反鳥名鵰鷲上下條反下疾右反棗等上子老反洟唾上吐帝反下吐臥反毀呰音紫惆悵上由反策使上叉責反下所滓反倚牀助㽵反燈炷主注二音睒婆上失染反女上余柖反美好㒵鳬上縛無反鸜鵒上其俱反下余玉反俱翅書智反婆嘻喜其反鳥名翁鬱上烏孔反烏公反下於勿反草木盛㒵也從草蔭𦿔必袂反正作蔽作倡音昌樂也又音唱導也凞連上香其反此云有金河也白鵠何各反正作鸖又胡沃反俗用蘭楯食尹似遵二反階際木也迦枳經紙反花名刀釰居缺反正作劒鎧仗上口改反甲別名也牟梢上莫侯反下所卓反牟㦸也梢長丈八也正作矛也羂索上古犬反啅枳上角反下經紙反正作踔也泥洹經作咃翅字是也誤咤咃竹家反呵力計反諭諂上以朱反下染反軻貝上苦何反下蓋反並大海中介也螺別名也枯燥蘇早反戰慓音栗滅上田典反塹上七熖反下五按反馚馥上芳文反下扶福反為珦許亮反窗也正作向玫瑰上目回反下戶灰反梯梐上吐兮反下步米反𧏙蜋上去羊反下力羊反蝮蝎上芳福反下許謁反蟲也正作蠍也下又胡割反尓雅蝎乘蠹蟲也非丘墟去魚反荊棘上居英反下居力反第二卷純陀上市倫反長者名也亦作淳也又之尹反西域記作准陀舊云純陀訛也沙𪉖郎古反確薄之地也醎土也正作滷也拯及上取蒸字上聲呼之也救也助也矝愍上居陵反愍也遷動上七仙反如蝅昨含反處繭古典反扼上烏𮧓反純受上市倫反不雜也輕𮆘莫結反輕無也𠧒匂音蓋携抱上戶圭反下步保反蜂螫上芳逢反下尸隻反魚鱉并列反鼉上音元下音陀試汝上音施驗也涕唾上音剃正作洟閉之上必計反囹圄上力丁反下魚與反牢獄別名也廣雅曰夏日夏臺殷日姜里周日囹圄又博文曰夏日念室殷曰動止周日稽留又云秦曰囹圄得勉明辨反脫也正作免嶮歰上許撿反下所立反俾倪上普米反下五禮反女牆也正作㪏堄也啇主上尸羊反又音的非伊字上於耆反正作𠁼也並者撗行作小縱則竪行作皆不成𠁼字也𠁼字三點者喻解脫涅盤般若也涅盤者即法身也義云人法各異故名三點也解脫者妄心不生也心若不生即無所屬心本寂滅名為涅盤心量廣大名摩訶般若三事闕一則性不圓也縱亦上音蹤下日三玷音點䩭瑣上居冝反下蘇火反䤄上莫見反下黃練反惑亂也正作眩也又上音眼下音玄頑嚚上五鰥反下魚巾反奉祿上扶勇反與也祿也或作俸扶用反秩也癡騃五駭反甛酢上徒兼反下倉故反牸牛上才寺反麥羊力反放牧音目養也飲餧上於禁反下於位反拇指上莫口反第三卷屏猥上卑領反下烏悔烏誨二反隱蔽處也下正作隈誅戮音六徵治上知陵反下直之反揃上即淺反下步八反抄𢱊上初孝反下力向反搆捋上古𠋫反下郎活反攢搖上子官反酪取蘇也正作鑽也不𧢻音觸危脆七歲反鉾梢上音牟下音朔伊帝曰干月反多伽其迦反十二部經中一部名伊帝曰多伽也成實論云是經因緣秦言過去如是完處上戶官反芬子上古敗反正作芥芬二形𢆰相上胡悟反果蓏郎果反說文云木上曰果地上曰蓏應云木實曰果草實曰蓏張晏云有核曰果無核曰瞪瞢上都鄧反下莫鄧反失睡極也惛悶也昧也正作𧄼夢沮壞上自與反壞也深邃相遂反第四卷多含胡紺反含食餧也正作唅也唅哺也壽上於小反豪力之反噉䔉音算𩬇㧓爭巧反𮧓蓰所起反皮履也蠱道上音古又音野摴蒲上魚反下正作蒱聰明上倉紅反子糩苦外苦敗二反糠也正作𥢶棗葉上子老反下以妾反子璫得郎反捔力上音角競也木鏘七羊反正作槍浣濯上戶管反下宅角反縫打上扶峯反下得冷反于逯徒愛反東洲名第五卷嫉姤上自七反下都故反鹽豉上羊廉反下實義反捲縮上巨貟反曲也又居轉反𠬧也瘡疣于牛反拊以上音付塗也正作𫝊也又音撫非𣊵氣上奴短反又而春反非城墎音郭面爭瘦反聲屖音西瓦破聲也嗄聲也正作㽄蜱麻上卑兮反草名子似正作𦱔萆三形也又步卑搖二反並非振㩧博㒵補角二反火烈聲也正作爆也又普角反亦作爆泛長上芳梵反下知兩反水大也莖幹上戶耕反下古岸反門閫苦本反濤波上徒刀反一跳他吊反越也躍也正作跳也又音條為迮音匹𧂐七賜反逃入上徒刀反正作逃𧆞𤝧上呼古反正作虎緣廟諱故今皆作虎也下補㒵反虎屬第六卷稗子上步拜反法式尸力反讎隟上市由反下丘㦸反稊稗上徒兮反儲君上音除副也彊力上巨羊反暴也健也篡居上初患反𡙸也𨒫也亡叛音畔背也奔他國也遠投音頭託也正作投又之末反非也守邏郎個反遊兵也躃地上毗益反堤塘上丁兮反下徒郎反隄塘同上耘除上音云耨也稗音酉裁有上音才僅也暫也亦作才併不上卑政反並也皆也第七卷釜鍑上音父下方副方復二反燒器種植時力反亦作殖羖𦍞上音古下音低自舂束容反碓搗也憒閙上古內反下女㒵反治𡑅上音持下音押草蓯上古厄反下所綺反梵言亟屣唐言靴也箱篋上息羊反下苦頰反果𦬔郎果反又吉花反扸石上先擊反吉上徒骨反罪名吉羅此云𢙣作善見律云者名𢙣羅者名作是也諛諂上羊朱反下染反嗅香上許右反又七秀反投淵一玄反陶糠上徒刀反下苦郎反故抃音弄為跂巨𨒫反正作屐苦惚音𢙉拘癖補益反攣也跛也正作躄觸上丁禮反膚中上音夫皮也癃跛上力中反正作𤸇木音同钁𣃆上九反下竹角反𧟶王上架反下于誑反梯橙都亘反第八卷若𣊵奴短反造詣上七到反金捭卑西反刮藥所用者也正作箄髣佛上芳𠕀反下芳物反曚曨上莫紅反下郎紅反樓櫓郎古反讇語上時瞻反睡語也應和尚以寱字替之棠觸上宅耕反覆復上芳木反下音伏而笑音笑先逃上蘇見反下徒刀反蠶𧏙蜋上自南反中丘羊反下力羊反此三字在他陀二字中聞也十四音噁者上烏各反阿者上烏何反億者上於力反伊是上於𦒿反郁者上於六反憂者上於牛反者上烏堅反𪐭者上於計反烏者上屋胡反炮者上烏告反菴者上烏含反阿者上烏個反二十五字迦者上居佉反佉者上丘迦反伽者上巨迦反𠷐者上巨拯反又巨者反俄者上魚者反此行牙音遮者上之車反車者上尺遮反闍者上時遮反膳者上時忍反又時者反若者上而者反此行齒音吒者上知加反咃者上加反荼者上宅加反祖者上宅謹反又宅雅反拏者上女雅反此行舌音多者上得何反他者上託何反陀者上徒何反彈者上徒懇反又徒可反那者上奴可反此行喉音波者上補何反頗者上普何反婆者上補何反滼者上蒲錦反又蒲可反摩者上莫可反此行脣音蛇者上羊舍反囉者上郎嫁反羅者上郎個反啝者上胡臥反奢者上商夜反沙者上所詐反娑者上索何反呵者上呼歌反從蛇字至呵字名超聲重結句如後噁阿億伊郁憂理狸此二字出應和尚經音義𪐭烏炮菴阿此行是十四音迦佉伽𠷐俄遮車闍膳若吒咃荼祖拏多他陀彈那波頗婆滼摩此上二十五字名五音蛇囉羅啝奢沙娑呵此上八字名超聲魯流盧樓此上四字名和會音苷蔗上音甘下之夜反草名汁甘也益州人謂之薯蔗也薯音諸金丱古猛反金𤩶也字㨾作草𭃄作𨥥𮀑礦礦四形又戶猛反未成器也𬒳押烏甲反正作壓月蝕時力反若𮢩富福二音聾啞上郎紅反下烏雅反㨹星上音遂星也正作彗又徐歲反第九卷塠阜上都回反下扶久反陂池上彼皮反手創音瘡刀傷也正作𭃅完無上戶官反密緻直利反鬱蒸上於屈反下之剩反乳餔音步枉撗上於往反下戶孟反非理來也創疱上音瘡下步㒵反哲下上知列反正作蜇又應和尚以席字替之竹例反白痢也亢旱上苦浪反水淕音六高平日也正作陸草羊力反子尿奴𠮧反𦋺上居例反第十卷祠祀上音詞下音似輕躁子告反唐捐音緣唐空弃也姝大上尺朱反瓌異上古回反奇也携上戶圭反水涱知向反水大也又知兩反吐核行𮧓反溉灌上古氣古代二反灌也澆也診之上之忍直刃二反𠋫脉也驗也綜習上子宋反總也理也𮊵瘦上力垂反下所右反下應和尚音作瘠音藉體第二帙第十一卷胏病上芳廢反㿇音習皮膚風病也又私集反小痛也噎上於月反下於結反𨒫氣也上又於劣反淋瀝上音林下音歷小便病也疼痛上徒冬反腹脹上音福下音帳乾痟音消諭諂上音逾下音諂懟恨上直遂反喜睡上許記反缺呿音去𧄼瞢上都亘反下莫亘反療治上力𠮧反下直之反若偃於㦥反牀蓐上助㽵反下而欲反惡賤上鳥故反所遷七仙反調適尸隻反善也羸瘦上力垂反下所右反相拘音鉤逯得上徒愛反嬰咳戶哀反小兒也正作孩也猗臥上於綺反正作倚怡上許之反下與之反玫瑰上莫回反下古回反㓟剝上普皮反開也分也下布角反上又應和尚音皮皮剝也擘裂上普擊反破也正作劈又厄反非煴𤏙上音溫下奴短反上又於云反非啞者上烏雅反拘擘必益反正作躄海音岸潤漬疾賜反親挨自木反尸骸上失支反下戶皆反麒麟上音其下音鄰仁獸也雄曰麒雌曰麟其狀麋身狼尾一角又云磨身牛尾狼蹄又作騏驎非䐗豕上竹魚反下尸爾反拘抧吉以反𤝔狼上仕皆反𧆞𤝧卜㒵反白郎盍反鍮石上他侯反氍𣯜上具俱反下所俱所愁二反織毛褥也㩉㲪上音塔下音登茸衣上而容反正作茸䩸長受上直向反多也子上子反五種子之一也正作疌接二形起世經云一根子二莖子三莭子四接子五子子是也亦云心種子僧祇律云芋等根種楊柳等為莖種竹葦等為莭種蓼藍為心種五穀等為子種又長阿含經云一根子二莖子三莭子四虛子五子子又起世因本經云一根子二莖子三莭子四合子五子子編織上卑連反安簧音黃木枕之審反雞雉直爾反摴蒱上魚反下步胡反拍毱巨六反投音胡道上去見反抓鏡上爭交反芝草上音之瑞草也或作芝芳凡芳梵二反髑髏二音獨樓卜莁音逝正作筮也龜曰卜蓍曰筮投於上徒侯反挑其上他條反攙㓨上助咸反劓去上魚至反割鼻也不折音舌第十二卷脾腎上步卑反下時忍反腸𦝩上音長下音謂洟唾上他計反肪膏上音方下音高腦膜上音𢙉下音莫腦胲古哀反根也胎也飴也謂腦膸如稠餳也正作荄三形也應和尚以解字替之非義也以柱竹主反撐也踝骨上戶瓦反𬧅骨上市軟反膝䏶上辛七反下步米反臗腰上苦官反下於消反肋骨上郎得反骨上子昔反項骨上戶講反頜骨上戶感反又音閣誤骨上布各反骨上烏亂反姿態他代反視瞬音舜喘息上尺兖反𧈸虱上音早下音瑟撾打上竹花反下得冷反楚撻上初所反下他達反咳𨒫上苦代反正作咳璝麗上古回反膚皮上方無反皴裂上七巡反白上五蓋反衰耗火告反𧹞然上女扳反腳跌田結反背瘻力主反傴背也又力朱反被押烏甲反正作壓璝瑋于鬼反逃迸上徒刀反下補諍反捕得上蒲悟反蘆騾上郎乎反葦未秀者也下郎禾反驢父馬母曰騾䗍王上郎木反撥撤上音鉢絶也除也下直列反壞也去也又音發舉動也蝎螫上許謁反毒蟲也正作蠍下尸亦反上又戶割反非幽暝莫瓶反肉皰普㒵步㒵二反疱即同上開割普口反轂上音穀下音𠕀紺艷上古暗反下羊贍反髦尾上音毛長毛也睿哲上余芮反枆大上呼高反攪也正作撓也又音毛非䇿謀上初責反牀㯓上助㽵反下他盍反桓因上戶官反視眴音舜動也杻械上勑酉反下戶介反第十三卷愐上都南反下兖反謂荷思也彗星上徐嵗反又音遂息肉上相即反𢙣肉也正作瘜𦞜二形蟲疽上直中反下七余反瘡痍羊胘反羅驃毗妙反𦀟利藍上乘禾反下郎甘反上浴梵語水異名上又音娑也鉗鎖上巨廉反下乘果反環玔上戶關反下尺反叉璫上初街反下得郎反臂卬因進反糠火上苦郎反火上羊力反㝹角上他故反正作兔又奴侯反兔子也捲合上居轉反又音拳收上尸由反下牛吠反煆金上都亂反毗紐女久反陶師上徒刀反執鎌力閻反第十四卷伽那上巨迦反𨳰手上博計反伽那閈手並胎名也諸皰匹㒵反矬人上昨禾反生涎序延反口液也𮇷米上音道粳穀也正作稻也羼提上初諫反唐言忍因燧音遂火母因攢子亂反正作鑽因捊謀反鼓推也竊復上七結反下音伏涕唾上他計反顧盻上音故下普幻反美目視也正作盼船舫音放𥧝上音校下音悟薄祏音戶福也厚也正作祐又音右神助也第十五卷曰多伽上音越亦作越下巨迦反成實論云是經因緣及經次第若此二經在過去世名曰多伽儴佉上而羊反下去迦反此字但相丞呼其體不正也正言勝佉唐云螺亦名貝如勒成佛經作餉佉勒下生經作蠰佉解莭經作傷佉百福㽵嚴相經作啇佉唐言白螺是也阿含經直作螺是也餉蠰二同尸亮反蠰又音商作羆音碑作麞音章亦作獐橖觸上宅耕反性悷力計反敦喻上都昆反勉也鞭鞬上卑連反下他達反悟鞭韃同上此正豌豆上烏官反堅䩕音硬豆羹音庚如尺沼反其子木反芬馥上芳文反下音伏竝照上音並雙也踏煞上徒盍反第十六卷拇指上莫口反開闢毗益反裸𢒈上戶瓦反嗚唼子合反𧧂之上之忍反為臛呼各反號咷上戶高反下徒刀反眼眶音匡刖劓上音月反下魚至反上又經音義作刵傅藥上音付塗也挑出上吐條反又音叨蚉𠲿即委反正作𭪿擲𬚰古犬反抓壞上爭巧反憲制上許建反𧌡上音早下音瑟熊羆上音雄下音碑𠚫草上牛吠反礦古猛反劈地上毗益反赦我上音舍宥也免罪也𠍴咎上丘𠃵反下巨久反唯仰魚向反侍也撲護上普木反投淵烏玄反蕀㓨上居力反編椽上卑連反下直緣反氀褐上力俱反下正作毼茹菜上音汝食也雞雉直几反第十七卷拘絺夷反詎有上其與反豈也腳跌田結反第十八卷御者上牛去反正作御能灡郎歎反贖命上市玉反忽難上所戢反蚉𭉨音觜奢尸遮反此云藏謂蝅藏也即菡是也拘睒失染反第十九卷憋𢙣上步祭反正作弊也又并列匹列二反非煞戮音六無𦍬音姑蚉蟻牛綺反流惻初力反愴也闍上所姧反𦙁子上竹尸反髡樹上苦溫反截也從情上子用反深穽自性反百攢七亂反矛也正作䂎婆藪乘走反潤漬疾賜反有作濕者非機關古還反在巨向反取獸也氣噓音虛慝他得反戮上尸志反下煞上日也龍卬一進反弒害上尸志反邠坘上彼巾反下丁兮反𦀟草上素禾反判合上普羊反正作胖牉多上巨掬反接敘音序鄙悼上悲美反下徒到反衰田典反欲頺徒回反甲胄丈右反間間上古莧反下古顏反在熬冝作鏊五告反掉動上大了反增劇巨𨒫反第二十卷鬱蒸上於勿反下音證齒下音發正作髮狗上之審反携手上戶圭反星上苦圭反𭥦星上莫巧反撩打上力條反下得冷反手曳以世反班駮上布間反下布角反或澀所戢反懅務上其去反撗迦上戶孟反下古牙反正作撗加削上息雀反刻也婆啝戶臥反亦作率第三帙第草一卷讖記上楚禁反窈暗上伊了反深邃相遂反正作邃𢬘持上步保反正作抱羅邏郎個反拔坘上步末反下直尼丁兮二反河名也亦云提亦云鉢底畫水上戶麥反柔𣽈音軟弱也又人朱反𡏞上古侯反下苦庚反雨堓音岸檀㝹奴侯反疧布上丁禮反又音祇非梯梐步米反苦惚音𢙉嫉姤上自疾二音下都故反埠阜上都回反下扶久反荊蕀居力反疑音𠕀毒鏃子木反𠌵王上音像正作象揵疾上自反疾也正作揵不𡙸徒活反強取也僧𩬞莫顏反覆𦿔上芳救反下必祭反破拆先擊反非適音釋始也非炎子廉反正作尖䆤掘上尺專反下巨勿反囹圄上力丁反下牛與反攢人上子官反第二十二卷閉在上博計反掩也塞也又并結反猗臥上於綺反嚫身上初吝反正作襯佷㑦上戶懇反下力計反倿上奴定反犬齧五結反咬也揣此上徒官反能螫音釋不𨾜音受賣物出手曰五枚莫回反護筏扶發反編木渡水也種殖市力反蠅上羊陵反下子老反蝮螫上芳福反膚𦘺上方無反蘇尺沼反塗拊音付塗也正作傳也又音撫摩也又音夫非坌之上步悶反第二十三卷親奮巨右反難冀音既望也正作冀餧祀上於位反下正作食音似飯也祀祭也又冝作飼也戮之上力笁反投一上徒侯反𨶳看上去規反器上行江反手抱步交反亦作捊腳踏徒盍反若楯音順若鎧苦改反若銷所卓反正作矟稚小上直利反俎壞上自與反正作沮聰哲知列反駃河上所事反憒𡗚上古內反下女㒵反摩鍮音偷呾呾多達反𭦟陀上目官反坘羅上丁兮反又音遲第二十四卷澀所戢反潤漬疾賜反燎力燒反屠膾上達乎反下古外反師上力反雞䐗上吉兮反下竹魚反麞鹿上之羊反歔毒上許魚反鷹鷂上於陵反下羊照反蚤𧌡上子老反下所擳反瘖啞上於今反下烏雅反𤸇𭼨上力中反下昨丹反背瘻力主反傴背也又力朱反曲脊也𠧒匂音蓋摩醢呼兮反亦作醯瘡疣于求反其渧音的又音帝非微緻音稚第二十五卷下瘧牛約反殞命上于愍反估客上公五反寶渚之與反狂騃五駭反鉤𣃆音卓共輿與諸反又音預非也拘睒失染反耶奢尸遮反婆睺音侯搆角上古𠋫反取牛乳也押沙上烏甲反正作壓安撅巨月反第二十六卷縷綖上力主反下相箭反䨱𦿔必祭反𥼝膠上知反下古猫反用捕蒲故反捉也粘手上女廉反踏之上徒盍反蹴也又池合反非用嚙之上五結反衣著上於既反卜筮時世反蓍曰筮筮决也摴蒲上居反投音胡拆裂上先擊反雉戒上直几反𣮓多上巨掬反氣噓音虛喜生上許記反𧴵易上莫𠋫反𣯫褐上力魚反下戶割反白郎盍反第二十七卷牙狐爭巧反正作胡苽古花反如蝅自南反作繭古典反拍毱巨掬反第二十八卷為為上于垂反下于僞反晃曜上戶廣反丘墟丘魚反炳著上兵永反下竹去反醪𤏙上音校起麵者也正作酵也又音勞下奴短反鵠耶上戶反種橘居律反熬之上五高反私屏音餅佉陀上去迦反阿坘丁兮直𡰱二反眼𥇒音接飢饉巨進反無穀曰飢無菜日饉上亦饑嶮俎側所反正作阻第二十九卷沙郎古反鹼醎土也正作滷鹵蕀㓨上居力反拖心上尸智反惠也底上力閻反亦作足跟音根𠕀莫官反正作鞔又莫半反非莭踝戶瓦反𦟛滿上容反王市軟反裸跣上戶瓦反下先典反缺骨上苦血反破也臂肘知酉反子頰古叶反彼𢭃音短垖阜上都回反下扶久反卬上郎盍反下伊進反合上匹見反半體也正作䏒片二形又冝作牉姅二同音判夫婦也𢙉璅音鎖捲合上巨貟反爤壞上郎歎反正作爛生胞普㒵反亦作皰生𭉨即水反鳥口也正作嗺觜開剖普口反令取上自宣反輻上音福下音𠕀晧首上戶老反白也盜羊林反又五反非互相上乎悟反餧養上於位反羔羊上古毫反羊子也䐗腞上竹魚反下徒門反憩駕上去例反娑枳居以反城名最陋上子外反下郎豆反隘小上烏懈反彼音岸伊𭡪所愁反末坘丁禮反河名繁茂上扶幡反希有上許衣反正作希悲喜音喜四無量也慈悲喜捨也苟能上古口反且也誠也懅務上其去反未睱音下間也第三十卷開闢步益反駿馬上音俊正作駿百匹普吉反刻鏤上苦黑反下郎𠋫反劫𡙸徒活反蔚茂上於貴於物二反下莫𠋫反盛也捔其上古嶽反搆之上古𠋫反向中上許亮反窗也亦作闢兩階間曰孚乳上芳無反𡖉生也亦作𤞲鬱𤇏上於勿反氣也臭也下之剩反熱也謂久濕遇熱相𤇏熱氣也熒火上戶扄反正作瑩第四帙第三十一卷駕駟音四如鹽音閻遺燼寺進反䓸上牛吠反下古顏反芓別名如浣戶管反鎧杖上苦改反甘鐹古禾反鑄器也正作坩堝攪上呼高反下古巧反正作撓攪所囓五結反所螫音擇不七歷反憂也正作戚諸垢古口反憒𡗚上古內反下女㒵反謿調上竹交反下徒𠮧反問訊音信鴦崛上於良反下巨勿反梵言鴦崛摩羅此云指獐鹿上之羊反羆鴿上彼皮反下古合反上正作羆魚鷩并列反水蟲也正作鱉也又必袂必至二反雉也兔蛇上他故反膿血上奴冬反𡱁尿上尸旨反下奴吊反亦作屎涕唾上他計反鉾矟上莫浮反下所卓反上巨向反下力反賈客上音古居賈也船舫音放一枚莫回反疲弊毗祭反困也患創音瘡呻呺上音申下音豪盲𥌒音古姡心上都悟反劓其上牛利反刖其上牛越反第三十二卷姑臧子郎反危脆七嵗反冷暖奴短反壞器上普灰反不耐奴代反推壓上都回反聚也正作堆也下烏甲反諸蟲直中反梯隥都亘反輕躁子告反如駝音陀芻草上測俱反羅毦而志反細毛也絍婆上如林反此云苦練木名也獄卒子沒反守獄人廁豬竹魚反如鐵天結反所黏女廉反瑕疵上戶加反下疾斯反㲲花上徒叶反鐵鎖乘果反頞多上烏割反礠石上自茲反登𣶵時攝反正作涉罐綆上古亂反下古杏反罣礙上戶卦反葵藿上巨維反下呼郭反如橘居律反牽象上去堅反蘆蔔上郎乎反下步北反菜名也尓雅曰葖蘆蔔如箕居其反木臼巨文反正作臼步兵上蒲故反正作步掉蓮上直孝反出經後文第三十三卷米上古盲反水禾粟𢇲上息玉反下美垂反正作銷瘦音瘦減上阻瘦反下戶斬反生瓠乎悟反菜名也又戶悟反肋出上郎得反脊骨上子昔反線上息箭反下之緣反剜身上烏官反㲲纏直連直練二反釘釘上的靈反下的定反不喘尺兖反菟身上他故反羖羊上公五反驅音如躄卑益反毀呰音紫亦作訾訿鹹味上戶緘反不宿音宿淨𩚳音飯智𭪿音觜沮壞上自與反洄澓上音回下音伏廝下上息資反沙𠧸音魯收實上尸由反草上古老反三烏耕反拘上步各反踡脊上巨貟反餐食上倉安反酒糟音𮞸妷音逸蹲地上自尊反自戮音六則音手撓音蒿牸牛上才寺反駮犢上音剝下音讀第三十四卷𤍽渴上而設反瓜上上爭巧反寂靜上自積反婆蹉七何反掘出上巨勿反移徙斯此反聰明上倉公反躃地上步益反收其上尸由反便𣧩音終憋𢙣上毗祭反𢙣也困也正作弊也又并列反非氀毼上力朱反下戶割反瞿坘丁兮反比丘名也亦云永德亦云瞿底亦云瞿提澀滑上所戢反第三十五卷撾打上竹花反下得冷反額上上五格反正作額𭥦星上莫巧反把吒上北麻北架二反下竹加竹架二反氣歔許魚反開口出氣也第三十六卷坘上丁兮反魚名䱜魚上倉作反惋手上烏亂反或云阿濕繁或云阿說示唐言馬勝坘舍上丁兮反或云堤舍或云底舍寶積經云迦盧底輸唐言鬼宿鈴優上巨廉反優婆夷名也正作鈐刁長者上丁聊反亦策楚責反捶也有翅音施行般上戶庚反用也進步也有功用也三法度論云行者謂之有為多方便及道緣行至無為故日行般涅槃也無行般涅槃者謂無為也少作方便及道緣無為至無為故曰無行般涅槃也亦謂之身證也邠坘上彼巾反下亦作𪲀同丁兮反第三十七卷先診之忍反鄙𢙣上悲美反紅婆上而林反正作絍柔䎡音軟壞器上普回反𢙉𤍽音熱魎上文往反下力掌反第三十八卷毀悴自遂反鮮乏上息淺反虛耗呼告反皰時上普㒵反煒燁上云鬼反下云輒云立二反鞕朾上卑連反誤下