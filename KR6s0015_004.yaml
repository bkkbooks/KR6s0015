反下卑信反行言上疋見反正作斤石上先擊反破也正作㭊護塌音塔芬子上古敗反茂羅業上莫𠋫反前卷作芪非也蠱道上古野二音蟲道同上蜜上而主反悞第五卷啞者上烏雅反掘地上巨月反穿也現筒上冝作埋下音同酢味上倉悟反醈味上徒濫反利鑿音昨堅由苦內反令碎音碎早於小反梯橙都亘反懷妊而甚反槿樓上闍靳反經文自切坏噐上普廻反未燒瓦也璞也膚翳上音夫下音曀膚肉同上又音容非髣髴上芳𠕀反下芳物反澹上音談下於禁反正作痰𤷜自漉郎木反伏徐姉反山海經云狀如野牛蒼黑色一角肉重千斤皮厚可為鎧也似同上正作咒𠒃亦作兕蝅虫上自南反作蠒古典反十四音短阿烏可反長阿烏何反短伊於以反長伊於耆反短憂於九反長憂於牛反者上烏堅反堙者上於計反烏者上屋胡反炮者上烏告反安者上烏干反阿者上烏个反迦者上居佉反佉者上丘迦反伽者上巨迦反重音伽上直用反下巨者反俄者上魚者反此行是牙音遮者上之車反車者上尺遮反闍者上實車反重音闍上直用反下時夜反若者上而者反此行是齒音吒者上知加反荼者上加反荼者上宅加反重音荼上直用反下宅雅反拏者上𡰱雅反此行是舌音多者上得何反他者上託何反陁者上徒何反重音陁上直用反下徒可反那者上奴可反此行是喉音波者上補何反頗者上普何反婆者上步何反重音婆上直用反下蒲可反摩者上莫可反此行是脣音耶者上羊柘反羅者上來雅反輕羅來歌反和者上胡臥反又音禾者上商夜反又商遮反沙者上所詐反娑者上索何反呵者上呼歌反羅者上來雅反重結句如後阿阿上上聲下平聲伊伊上上聲下平聲憂憂上上聲下平聲堙上音煙下音曀烏炮下烏告反安阿烏个反已上從阿阿至安阿字是十四音然闕理狸字二十五字迦佉伽伽俄遮車闍闍若吒荼荼荼拏多他陁陁那波頗婆婆摩已上二十五字名五音耶羅羅和沙娑呵已上八字名超聲離流離流已上四字名和會聲𮭕上五諫反下何各反正作鸖亦作鸖鶴同上此正撰擇上思兖反正作選慧𦤼徒來反瘖瘂上於今反下烏雅反第六卷隆殘上力中反正作𤸇津澤上即辛反浸入上子沁反奉澤上即辛反液也正作津也螢火上戶營反熬令上五高反乾憔音焦𦬣藥上無往反枝觚音孤柯也柯上古何反雨渧音的鄙陋上悲美反耻也下郎豆反醜也𢙣也毀呰音紫亦作訾訿愚騃五駭反名鹽羊廉反澡槃上子老反必索所𮧓反求也𢢔惰徒果反盡搆古豆反取牛乳也正作𤛗金鑛古猛反悵悏上向反下於向反㝹羅上奴侯反其宂玄决反又而勇反非浸壞上子反豪𨤲力之反汎涱上芳梵反下知向反携兒上戶圭反其核行𮧓反溉灌上古代古氣二反下古乱反澆田也稊稗上徒𠔃反下滿拜反叢林上才紅反慠俗上五告反尅勵上苦黑反下力計反食上徒官反天祠音詞廟也摩訶衍羊淺反梵言摩訶衍唐言大乘也摩訶言大衍言乘天繒疾陵反帛也王方等泥洹經等三經十卷同帙方等般泥洹經兩卷上卷蠕動上而兖反脆潤上七嵗反拘絺夷反分耨內沃反或云邠耨陁佛音拂亦作佛又作分耨文陁尼弗雲渟是倫反正作淳比丘名也亦云均頭亦云專陁又音亭非檀廬力居反哀酷苦沃反收拭上文粉反下音識冝作紋飾字者悸巨季反諭諂上羊朱反金摸莫胡反𣧑暴上許容反揵沓惒上巨焉反中徒合反下胡戈反拍毗忍反䏶也憔悴上疾焦反下疾遂反用上余訟反下側瘦反經音義作面縐牧眼上文粉反號咷上戶高反下大刀反自擈步角反擗地步益反覆面上芳福反倒也𧿟跽上乎悟反下巨凡反劇賊上巨𨒫反艱也竦慓上息勇反下力一反問訊音信量興經音義作量跤音跡潺撗上仕連反悒毒上於立反憂也勉喻上音免勗也猗臥上於綺反挍鏤音漏貧寠其禹反憒𢙉上古內反如踞音據輔弼上扶武反下皮密反輻湊上方副反競聚也䐗馬上竹魚反馲駝上音洛下音陁瘖瘂上於今反下烏雅反甄陁上之人反捶地上之水反食上徒官反𡶅峨上普可反下吾可反柔又作𣽈同人兖反弱也芬馥上芳文反下音伏子呼古反捐讓上一入反羅音𧿡呿遬上丘迦反下乘木反醢犁上呼𠔃反下力𠔃反上又呼改反非下卷躃地上毗益反卑音斯正作廝廝下也出經音義也又音兼非嵩崑上息中反下古䰟反下又經音義作𤠞音毗非也懅悲上其去反拘絺夷反伸臂上尸人反悲訴音素脯著上音府下之与反正作煑也稠煑之曰也那鋡音含慓悔上音懷抱也悞怡懌音亦車釭音公絳栴上古巷反汙勒上音烏檀木名也別藏作汗音于非綩綖上於遠反下以然反綬紛上市右反下芳文反蹉七何反為傒戶計反緒也帶也正作系又音𠔃非阿初立初洽二反佛名即阿閦佛也正作也眠眩上或作暝下音玄啼㕸音泣寶珥音耳渜音上而兖反所侄音經歷也又音質非哮吼上呼交反咆陸上步交反虎聲鴹鴨上音羊下音押鸕鸞上音盧下音慈下正作鶿也悞鳫拘上五諫反又羅上楚加反丘墟去魚反大丘也大悲經五卷第一卷法䗍郎禾反傴僂上於主反下力主反擗地上毗益反洞然上徒弄反麞鹿上之羊反等戲許義反崖音岸紫礦古猛反刑劓牛至反割鼻也熬煑上五高反鉾矟上莫浮反下所卓反鞭打上卑連反下得冷反厭蠱上於琰反攘去灾也下公五反覺𥧝上音挍下音悟稟受上兵錦反戲咲音笑缺減上苦决反下戶斬反預𬾨皮秘反扷鏃子木反梢尾上所交反舩䑨尾也荒嶮下巨奄反少也飢饉也正作儉恱豫余庶反安也亦作預淤泥上於去反彼音岸著鎧苦亥反毀訾音紫憙煞上許記反好也下亦作殺第二卷搥匈上直追反下許容反稽留上吉𠔃反𭠎淚上文粉反正作抆𦽦荼上莫官反下宅加反毱多上巨掬反𦋺上居例反相上徒禮反贈遺上自鄧反下以遂反祁婆上巨夷反獨占之熖反憒𡗚上古內反下女㒵反係念上古詣反苷上古談反下之夜反第三卷吞噬音逝千牧莫廻反肌宍上居夷反下而六反拆破上先擊反一渧丁歷反又音帝非飄曝上疋遙反下步報步卜二反日乾也揩宎上苦皆反下徒骨反毗嵐郎南反虧捐上丘隨反捕魚上蒲故反鉤餌而志反食也棘㓨上居力反糞壤上方問反下而兩反墾治上音懇下音持溉灌上古伐古氣二反下古乱反澆也䉼理上力條反屏廁上毗政反正作屏荊蕀上居莫反下居力反渥治上奴兮反下直之反上正作埿𦬔子上古敗反嬉戲上許之反淹泥音掩又於廉反我把北馬反暫瞬音舜動也值佛上直利反遇也經文作植諸悞第四卷澷捍上莫岸反下戶岸反捉䏶步米反羼提上楚諫反忍也藉上疾亦反族也下直右反胤也淵遠上於玄反麦羊力反第五卷禦𨒫上牛与反止也禁也藪林上乘口反抆淚上文粉反鞞提上步首反睒上失染反婆抧吉以反國名也又之尒反非迭相上田結反互相上乎悞反冗旱上苦浪反蟲上子老反下直中反𢙉𧢻尺玉反悲憙音喜推胷上直追反下許容反號𠮧上戶高反四童子經三卷上卷欻得上許勿反憂音𢙉愁倉感反愴悲感反蹔瞬音舜婁䭾上郎侯反下徒可反牛呞音詩悲悼徒到反摧剝補角反撓動上呼高反哀慟徒弄反駭動上戶騃反惋歎上烏乱反喐吚上音郁下音伊𭉊嗟上即斯反戰慓力日反正作慄也又疋小疋妙二反非垂跢都可反正作軃手捲巨貟反正作拳也摑裂上古麦反捫面上莫本反又音門號咷上戶高反下徒刀反哽絕上古杏反長噓音虛涕淚上他禮反悵悏上向反下於向反擈地上步角反遞相上徒禮反執𢱍音晚引也正作挽啇人上尸羊反又音的非臥𤴷助㽵反挑眼上他條反侳陋上昨禾反下郎豆反上正作矬也又子靴反非攣跛上力貟反蚍蜉上音毗下音浮蛺蠂上古叶反下徒叶反正作中卷可憙許記反貫穿上古丸反下尺專反研精上五堅反傴身上於禹反樓櫓郎古反竅孔上苦𠮧反扷坘上步末反下直𡰱反下卷揣聚上徒官反涕𡘈上徒𠔃反下苦屋反上正作㖒睺嘍上戶鉤反下郎侯反螺髻上郎禾反下古詣反經作𮫀非創快上初狀反下於向反俱稀知反正作絺也梵言俱絺羅正作俱瑟祉羅唐言膝大栂莫口反大指也正作拇柔𣽈而兖反正作輭縵莫官反正作鞔勘任上苦含反任也勝也正作堪戡二形也
