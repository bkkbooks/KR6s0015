body:
  text: 漢中沙門可洪撰依河府方山延祚藏大乘經音義第一之七此冊有十一帙傷女慕貞潔男效才良知過傷無字寶篋經等二十一經二十二卷同帙無字寶篋經一卷元魏天笁三藏菩提留支譯寶篋苦頰反箱類也緘也亦作篋頂𩬩古詣反綰髮也正作髻也又古活反結髮也非此呼淳熟上市倫反亦作純淑大乘遍照光明藏無字法門經一卷大唐天笁三藏地婆訶羅譯安穩烏本反如𦦨音焰火光也荷擔上戶可反𧴥也缺減上苦决反下戶斬反大乘離文字普光明藏經一卷大唐中天笁三藏地婆訶羅初譯序言緒音序筌其上七全反逗根上徒𠋫反睿唐上余稅反聖也智也正作睿睿一形御㝢音字屬上力向反下朱玉反相連也閔凶上眉殞反遽違上其去反舟楫接集二音月𢬜音呂裝縹上側床反下匹小反青黃白色雜也法𧋠郎禾反正作蠡部帙直一反正作帙經文寶洲音州渚也水中可止曰也勉濟上眉辨反強也勗也法音𠕀珠𩬩音計佛說孝女經一卷痛癢羊兩反相揩口皆反有揲桑朗反正作𣞙二形持捊音浮鼓捶也亦作抱棓二形𤘽留上音俱佛名披揵上布何反下其焉反佛名也一云波健佛說孝母經一卷棰鼓上之水反擊也禽狩守右反孝羸力垂反孝母六英經一卷恂恂相倫反從燧音遂撾鼓上竹花反從椎直追反佛說長者子制經一卷食上蓋割二音高𤍜蘇老反迦㮈奴太反云加奈歿故上莫骨反嬈我上奴了反小音摩經意冝作磨莫果反小也劇苦上其𨒫反𧑮動上而兖反遮迦為月反轉輪王也𤾇術上都頭反馬𦜩音𢙉寶名又音忽誤佛說菩薩逝經一卷高𤍜蘇老反加奈奴蓋反好縶音牒蜎蜚上一玄反下甫微反溪峪上苦兮反中古木余五二反前經作溪谷郭氏音路非也裁淹上音才下於廉反前經作才掩佛說逝童子經一卷𡨜漠音莫肅然上息六反剝業上布角反脆哉此芮反佛說無垢賢女經一卷樓上補益蒲益二反婦人名也懷妊而甚反懷子也探察上居六反盡也窮也之𡖉郎管反未孚芳無反𡖉化也舒翅上羊諸反下手智反鳥羽也布翼羊力反餟草上竹劣反止也正作輟竦立上息勇反蛐蚓上丘玉反下羊忍羊刃二反正作蚯蚓不捶初立反行㒵也正作𢕬二形又爭洽反裸形上胡瓦反捍樓與字同也又音汗身上莫𠋫反達嚫叉覲反倡道上音唱導引也佛說腹中女聽經一卷肅肅音宿相柱猪主反撐也但𮏴音斤鵄鵂上赤脂反下許求反蛇蚖五官反蝦蟇上戶家反下莫家反歡喜上火宮反佛說轉女身經一卷固鎧苦海反苗稼上美反下古亞反上又徒的反誤臭穢上昌右反手捲居轉反樢藥上覩考反正作搗舂米上束容反若𭵶五高反袖毳上由反下尺稅反紡疊上芳𠕀反下正作㲲筋上正作荕音斤下丘堅反佛說德護長者經兩卷上卷拘舍上瞿俱二音般浮上蒲安反刪闍上所姧反坘子上音遲又丁兮反翅舍上尸智反器皿上丘利反下眉丙反𤴷前上助㽵反正作床牀延咃音他評章上乎病二音漏泄私列反又音曳籧篨上巨魚反下直魚反或嘯蘇𠮧反沮壞上自與反蜘蛛上音知下音株下卷傘蓋上乘旱反踏寶上徒盍反踐也又他合反非聰睿余芮反廡廊上音武下音郎盧戶沒戶結二反毗挃知日反邏莎上郎個反下素禾反佛說月光童子經一卷嫉姤上自疾二音下都故反愁憒古內反鬱毒上於物反憂也垂𦗟下他定反許也川音作非也俎敗上自與反正作沮𠷰上居隨反正作規效命上戶孝反這半上音釋正作適為椓直全反頑𠷰上居隨反正作拱手上居勇反頑計上居隨反特上徒頂反神摸莫乎反以索乘各反盡也奮發上方問反旌旗上音精下音其曀日上伊計反圍嬈而沼反周也正作繞繞二形踏地徒塔反正作踏唱喚或作喚同呼亂反川音作噭音𠮧摧折上自回反挫也川音作非皓汗上戶考反下戶岸反滔天上他刀反摷木上助交反鳥窠也拪山上西細二音雞宿之處蟄鳥上直立反藏也又應和尚以鷙字替之音至猛鳥也非義也懾竄上之徒叶二反懼也伏也下七亂反金翅音施怖巨季反心動也氣不定也正作悸痵逃走上徒刀反遁藏上徒困反逃也避也縱撗上子容反熢隧上芳逢反下隨醉反蠅莫結反小蟲也毀悴自遂反稽乘朗反之莫瓶反推之上尺維反貫綜祖宋反肅然上息六反正作肅綪紺上七見反赫奕上呼挌反下羊益反遏絶上烏割反晃照上戶廣反印成上伊進反煌煌音皇俾傀上普米反下五米反傾側也正作䫌倪經音義作脾倪也𬽯俄上普果反下五可反厭鬼上於反亦作魘魅鬼上眉祕反低仰五郎反痾言上烏雅反癖行上卑益反跛也正作躄叉釧上初街反下尺反㽵嚴具也相棠宅耕反人𢒈音刑笓芭上步夷反下步巴反箏笛上側耕反下徒的反魚并列反正作鱉魭𩵔上音元下音陀正作鼉系竹上音思正作絲有絃之樂器也又音覓細絲也羅縠戶屋反緹縵上他禮反下莫半反互相上乎故反赤𭉨子纍反拘𦒿上音俱鳥名也羯鞞上居謁反下毗迷反飛𤢌巨今反正作禽海力丁反重戶果反正作裯縱𫃻上七容反下余鍾反有威儀也間睱㒵也正作傱容亦作瑽容瘳除上音抽病差也首罪上音默自伏非罪也欲免音免脫也去也得免同上𨓤坐上他內反自揆巨癸反勉罪上音免脫也正單作免採道上他含反正作探經音義作探也𭟙然上呼郭反𨗻得上音代正作逮刀釰居缺反正作劒無限五根魚斤二反岸也正作垠圻二形經音義作垠也琵琶上步夷反下步巴反申日兒本經一卷申日下于月反大集經作申越此云首寂傳記作申𮍜本又作申日兜並非也掘坑上巨月反下苦庚反駱動上長水藏作駱素刀反僂者上力主反更炊上古硬反下尺維反乳光佛經一卷乳𭓜都弄反乳汁也正作湩也又竹用反憋惡上毗世反下烏各反上又普結并列二反非搆取上古𠋫反牸牛上疾寺反殺上丁禮反下所八反折辱上之舌反挫也所所八反正作殺塹裏上七焰反下力耳反弊惡上蒲祭反若儻他朗他浪二反或也踏上丁禮反下徒盍反踐也下又他合反非蠕動上而兖反捫摸上莫奔莫本二反下門門胡二反突徒骨反牛粗倉胡反踈也更愸之領反踏上丁禮反倩鄉上青性反𢪕㑦上丁禮反下力計反枑拒也㑦佷也謾𢪕上莫盤反欺也也但痤音坐罪也佛說犢子經一卷邠遲上彼巾反下直𡰱反弊𢙣上毗祭反前經作憋惡伽耶山頂經一卷編𩬇上卑連反織也次也冝作辮字呼法𧋠鹿禾反貝也鄣閡音礙奮迅上方問反下私俊反大乘伽耶山頂經一卷法螺洛禾反分析先擊反蕳擇上古限反佛說象頭精舍經一卷𧋠𩬩上音螺下音計摩拭手食反係念上音計連也莁軡上戶耕反下古案反噁阿上音𢙣下音阿文殊師利問菩提經一卷浴上子𦒳反車匠疾亮反斫治音持女佛說無上依經等二十三經二十四卷同帙佛說無上依經兩卷上卷葉上子𦒳反下羊接反繖蓋上桑旱反古文作傘荻林上徒的反𢙉口角反稚小上直利反幼也腳跌徒結反𮌨爤上匹江反下郎歎反漚和上烏侯反沾汙上音點又霑店二音毀呰音紫𨱞髮上莫高反下卷坑坎苦感反陷也斜戾上似嗟反下力計反轂上古木反下文兩反𦟛直上容反衣飴上於既反下辝字反下又與之反非王市兖反鉤鎖蘇果反眼瞼居掩反眼外皮眼睫子反無腋羊益反縫也正作也經音義作腋以解字替之非也額廣上五格反輪㻔都果反委陀上於為反下徒何反委委陀陀德之美也悠悠音由遠也遐也思也正作洗濯直角直孝二反浣也佛說甚希有經一卷玄奘徂朗徂浪二反大也窣堵上蘇沒反塔也䭾都上徒個反舍利別名棗葉上子𦒳反下羊接反穬麥上古猛反青稞也間隟上古莧反下丘㦸反珠簾力閻反塢波上烏古反又音鳥殺曇上所八反下徒南反數塢波𡰱殺曇亦云優波𡰱沙陀此譯為因佛說未曾有經一卷戶牗音酉芬子上音芥正作芥上拖式支反設也正作施柈蓋上音盤露也酸來上蘇官反下子𦒳反麥上古猛反芬子上音芥菜名罝是上陟吏反委也釋也正作置弗于逯下一音代東洲名栴檀上諸然反欄楯食准反挍飾上古孝反下尸食反樓櫓鹿古反館閣上古亂反挍餝手力反裝也正作飾佛說决定捴持經一卷瑕疵上戶加反下疾移反熒火上戶扄反蟲名也正作螢救䇢枯古反正作苦惣令上子孔反又音窟誤馳駛所里所吏二反疾也速也姓上昨木反正作慠貴上五告反塌寺上他盍反自誤音娛牛拘反樂也又吾故反錯也為莘呼瓜反正作華花二形橫枉上戶孟反下於往反夷犾徒的反東夷北番人也䨱弊上芳右反下必袂反正作覆蔽喑啞上於今反下烏雅反蛟龍上音交似龍鮫人上牛居反捕魚人也獵也正數漁三形也又音交誤所𭓯胡蓋反煞也正作害𡧱二形盲置莫瓶反又之義反誤床㩉吐盍反柔慎音順謙遜孫困反𢌿順上音卑又音俾誤諭諂上羊朱反下染反蛇蚖五官反毒螫呼各書亦二反殞歿上于愍反下莫勿反揌持音惣謗佛經一卷面上音笑喜也挑拔上吐條反下蒲八反能忓音干犯也誤也多軼田結反波坘直𡰱反天音底由系胡計反唐鵝五何反正作鵝如來師子吼經一卷電炎音熖離上上力義反斥法上匹麵反又尺夜昌右二反誤辭辨上祥慈反正作辝一徑音經歷也又音徑非大方廣師子吼經一卷嚬申上毗反舒展也赫奕上呼格反下羊益反暉愌音喚火光也正作煥分剖普口反久植音食種也前世三轉經一卷便笑音笑光𭉋同上迦翼羊力反法華經云伽耶迦葉鞕杖上卑連反正作鞭妷羊一反姝好上尺朱反手去堅反子同上且待上七野反創上音瘡下音盤豆上子𦒳反耕種上古莖反稻米上徒𦒳反穬古猛反且續上七也反齒不上尺耳反不傴於禹反扶拭尸力反乳哺音步口餧食也向市時止反空匂音蓋𩬞𩬇上音須正作身上而甚反果蓏郎果反身食音寺餧也古文飼字也經音義作餧於位反饐口上五恨反食飽也方言云秦晉之間食麥饘謂之也郭璞云關西呼欲絶食為也正作饐二形又於冀反非也經音義作糊音胡饘音旃妙法决定業障經一卷嬈𢙉上奴了而小二反誹謗上非沸二音屎尿上尸旨反下奴𠮧反瘖啞上於今反下烏雅反金翅音施鳥羽也亦作翍𦐊翨三形時俗之人皆與熾字同呼非也蓋寡聞矣希有希有挍量功德經一卷車葙息羊反正作箱淳淨上市倫反清也朴也最無比經一卷繕那上市戰反車箱息羊反塢波上烏古反間𨻨丘𨒫反孔也正作隙隟大乘百福相經一卷序筌其上七全反逗根上徒𠋫反睿唐上余稅反聖也御㝢音宇屬上力向反下朱玉反相連也夙遘音搆閔凶上眉殞反遽違上奇去反舟楫上音周關西謂之船東謂之舟下接集二音進船木也正作楫裝縹匹小反部帙直一反經文雨渧丁歷反又音帝輪埵丁果反耳鉤鎖蘇果反不撓女巧反婆瑳七何反王上彼休反翡翠上扶味反下七醉反跖俱上之釋反𧿡多上步末反虛茅音猫耳璫都郎反矛矟上莫浮反下所卓反弓𠂕尸旨反鉞斧上音越下音府𦊰索上古犬反耒𥞐上郎內反下辝子反羖羊上公五反金椎直追反啇佉丘迦反唐言螺䡴刃上宅絳反縵莫宮反足跗音夫腳板㹅名𦟛上市軟反下容反眼睫音接大乘百福㽵嚴相經一卷雨𤁷丁歷反芬馥上芳文反下扶福反稀穊上許依反下居利反紺艷音焰疵穢上疾斯反筯脉居欣反誤密緻丈利反傘蓋上乘旱反弓弧音胡弓也箭矢尸旨反亦作𥬘金巨音巨天棒步講反杖也正作棓牟麥上莫浮反翠鳥上七遂反大五高反頷頰上戶感反下古叶反兩髀步米卑弭二反股外也足膚音夫正作附趺鞔莫官反稱讚大乘功德經一卷遊適音釋劇苦上巨𨒫反映𡙸徒活反毀呰音紫淩𮆘莫結反謗讟音讀捶打上之水反下得冷反驅卑進反鄙劣上悲美反瘖啞上於今反下烏雅反䐔䏲上卑典反下他兮反正作匾𠥶侳陋上昨禾反正作矬誤等澍注樹二音綜攝上子宋反寥廓上力條反枯槁苦𦒳反俱𦙁竹𡰱反大乘四法經一卷苾茤上毗必反下測俱反喪命上乘浪反喪命同上喪命同上菩薩修行四法經一卷序衆夥音禍多也又戶買反覆簣上芳目反下巨位反土籠子枕之審反樞轄上尺朱反下戶瞎反關鍵音件行顗牛豈反徙於上斯此反雞鶩音木鵷鴻上於元反經文憒𡗚上古內反下女㒵反策勤上楚責反所囋音讚讚歎稱美也又自贊自達二反非銀色女經一卷食揣徒官反正作團也又初委反非也不上布卯反贖得上市玉反電地上以世反引也𮒌灌上子𦒳反下古亂反採華違王上佛授决號妙華經一卷䩭伇上居冝反愕然上五各反驚也愁倉歷反發篋苦頰反須𦽦莫安反牧取上音目使也當殺音煞不懅其據反唯願諸經多作原同魚勸反放免也今也原樂也又音元佛說阿闍世王受决經一卷百㪶戶木反激起上𠮧擊二音疾波也涕淚上吐帝反下力遂反哽咽上古杏反下一結反這見上音釋始也誤㸌然上火郭反𭭲也目開也俗寶積三昧文殊師利菩薩問法身經一卷得印因信反痛癢羊兩反禽獸守右反薜荔上蒲計反下力計反悕望上許依反正作悕入法界體性經一卷磨瑩於定反提上蒲末反河名珂玉上口何反螺貝也佛說正恭敬經一卷壘足上力本反重也經音義作蹀音牒踔足孝卓二反跳也經音義作白反半步也桛足上音弄重循音旬㖒唾上吐帝反臯也正作洟又音提非溫𤏙乃短反𧆞𧳓洛堂反正作狼稟受上兵錦反正作稟佛說善恭敬經一卷十盧盍反踔腳褚挌反半步也謂闊腳而立也褊隘上邊緬反肩音捫拭上文粉反下尸力反塠擈上都回反下蒲角反鉤𭉨即纍反正作噿嗺觜紫四形也不憘音喜情也經意是喜喜二字也喜欣也喜恱也又冝作嬉許記反好也慕佛說諫王經等二十九卷二十九卷同帙佛說諫王經一卷霸治上補嫁反下直之反遍枉上匹綿反下於往反不正也鄙也上又音遍誤淫泆上余林反下羊一反稟與上兵錦反觸上古還反下古瓦反正作鰥寡也上誤巾㥽爭革反也𤟮上方武反下方勿反經音義云白與黑謂之黑與青謂之𤟮尓匹章也斧謂之文畫為斧形也正作黼蔽字也字從繭竹几反復填莫瓶反心惚音𢙉𢲻上布各反下七活反𢱊治上力讓反下直之反狂攘如羊反亂也正作娘勷二形也上冝作劻音匡哈之上戶紺反哺也正作唅也又五合反非也脣乾古寒反經作乾𤍜燋上乘旱乘告二反下即消反乾㒵也𨳲塞上計并列二反拘𦇷上九愚反下力貟反手足屈病也下正作孿𮏴急上居欣反杷空上步巴反摸索上怇各反下正作𢱢讒言上仕咸反煒燁上于鬼反下于輒反目填莫瓶反誤旁圻巨衣牛斤二反藏匿女力反苾芬上步結反下芳文反栝鼻上古活反塞也又或作䄆音活祠也珠璣音機文繡音秀華𮤝上戶花反下丘月反壂舍上徒見反大堂也牀㩉上音床下音塔𣰽𣯫上具俱反下數俱反𣯚𣰆上音塔下音登筵上於遠反下以然反幃帳上于㱕反下知向反柱音梁倡伎上尺羊反翠毛上七遂反寶羽上正作葆音保羽葆鼓吹之餝聚翟毛為之似纛也畫上音丹下音話蘭𣛝音順椎心上直追反吁天上火乎反正作呼郁嗟上於六反悲也正作噢走狩音獸摑抴上古麥下以世反打掣㒵風匹遙反隱隱真真上或作𨏈於譁反車聲也盛也下冝作𭣪之人之忍二反𨌈𭣪喜恱也又經音義作闐冝作𨌈同音田呂氏春秋云天子𨌈𭣪莫不戴恱也酷治上苦沃反虐也下持值二音大方等修多羅王經一卷婇女上倉改反擇正正作採亦作綵也所以採擇衆女填宮也書無此婇娛樂上牛俱反覺已上音挍下音以如來示教勝軍王經一卷無撓女巧反傘蓋上乘旱反灰燼似進反𢪨拒上苦浪反下音巨佷戾上戶反延涕上似延反正作涎也下音剃喉乘朗反梗噎上古杏反正作哽喘息上尺兖反偃臥上於㦥反牀針審反正作枕琰魔上閻染反舊云閻羅泛大上芳梵反浮也溟海上莫瓶反𤌢火上乃管反熷光上則登反屏障上蒲經反又音餅惟上于㱕反下烏角反從巾氍毹上其俱反下山茤反綺悒普駕反錦衾去今反被也鵄梟上尺脂反下古堯反乘馭魚據反目上莫瓶反辟手上蒲益反除也車上蘇郎反崩慟同弄反楂掣上側加反下尺世反雨漬前智反熢𤊀上蒲紅反下蒲沒反佛為勝軍天子說王法經一卷徭伇上余招反黜罰上律反形音六煞也恤上取蒸字上聲呼之救也助也下私律反黔黎上巨廉反下力兮反園圃補布二音乾燥蘇𦒳反撩亂上力迢反取物也涎唾上序延反溘然上苦合反奄也奈曳以世反揭多上其列反𠿒帝上呵割反怛姪上多達反下徒結反苫䛧上式占反下迷計反澡漱所右反凉燠烏告於六二反熱也室燎力燒反爛潰胡對反喰食上倉安反㦥悵上許偃反佛說𭦟殊室利呪藏中挍量數珠功德經一卷𭦟殊上莫安反舊言文殊此云妙吉祥槵子上音患木名無也八顆苦果反粒也佛說挍量數珠功德經一卷誦掐口洽反木檈音患佉叉上去迦反佛說了本生死經一卷序文𢯇讓上一入反𩥵惑上倉南反押賢上安甲反侮聖上文府反姦慝上古顏反下他得反恚針之林反梟截上古堯反正作法音精節也正作旌重霓五兮反八紘戶萌反際也𨦣陷上余稅反舉上才古反麁也略也字從手從角古文粗字也綸音輪淵乎上一玄反雅邃雖醉反奧莫角反探玄上他含反取也𮥸哲上子峻反刈足上魚吠反折中上之舌反下知仲反童曚音蒙又蒙孔反穿鑿音昨讜孤上得朗反直言也經文躇步上直魚反苦悶莫本反愁悶也又音滿煩悶也心惚音𢙉嘗啖徒濫反箭芒音亡草端麥也鋒也色猗音倚又於奇反噤閇上其禁反𣧑衰上許容反緣起聖道經一卷玄奘徂朗反大也沉淪音輪沒也舊其右反下古定反故道也欻然上許勿反卒也城墎古霍反塢波上烏古反白衣中受佛五戒男弟子名塢波索迦舊云優婆塞佛說貝多樹下思惟十二因緣經一卷極劇上渠力反中也致也下奇逆反增也艱也痛癢羊兩反唐翻為受山塹七熖反坑也得態他代反意也佛說龍施菩薩本起經一卷蠕動上如兖反果蓏鹿果反嬰烏耕反鳥聲也正作嬰蜚鳥上府反占飛走狩音獸悢力讓反已已音以上也涕零上音剃下音靈淚落也泆上羊林反下羊一反懈殆徒海反蟲蛾五何反𧒢上子𦒳反下所擳反自投音頭弃也置也又之未反誤愕驚上五各反艱淴上古間反下所立反下又烏沒反誤也屢陳上良遇反數也胎世佛說龍施女經一卷浴上子𦒳反危脆此歲反乃笑私妙反正作㗛八吉祥經一卷揵闥上其焉反下他達反緊那上居忍反摩睺侯𠋫二音此云大胸行神佛說八吉祥神呪經一卷缺減上苦穴反下咸斬反觸嬈奴了反弄也亦作嬲義上緣雪反蠱道上音古又直中反誤諭諂上羊朱反陀上蒲末反槗曰兜上居妖反中于月反下都頭反亦越兜因坘音遲佛說八陽神呪經一卷內噲音快經意是快字稱心也喜也可也八佛名經作普入毒螫呼各始石二反呪詛阻疏反澡漱音瘦臣億上音巨大也歡喜上呼官反蠱道上公五反毒藥也前經作蠱將師所類所律二反并力上卑政反專也曰兜菩薩內戒經作越兜八吉祥經作槗日兜誤八佛名號經一卷鄣閡音礙逯得上音代及也又音録誤右𢭀序緣反正作旋熊羆上于弓反下彼皮反豺豹上助皆反下補㒵反槃荼宅家人芬馥上芳文反下扶福反佛說盂蘭盆經一卷盂蘭盆此言倒懸乳哺蒲故反含食餧字往餉式亮反奉物也揣食上徒官反握也𮡻燭上音燎也燭也又音汪洋上烏光反下余良反佛說報恩奉盆經一卷連柱知主反食上徒官反握也燭與𮡻同音又持頂反浴像功德經一卷浮蓱音瓶水上浮草也正作萍惚亂上音𢙉陀上莫安反此大壇甘松似容反香名芎藭上去弓反下巨弓反麝香上時夜時亦二反獸似麞齊有香佛說浴像功德經一卷麥上古猛反窣都上蘇骨反下音覩誤計上子𦒳反𠛴竿古寒反麩片上芳夫反麥皮也沈水上直林反水香也又音蜜誤熏陸上許云反下力竹反藿香上呼郭反淨濾力去反瀝取上呂擊反足踏徒盍反正作踏稻芉經一卷稻芉上徒𦒳反下古旱反生穗音遂潤漬疾賜反駛流上所事反正作駛又快决二音非也佛說轉有經一卷睡夢亦作寢同莫鳳反寐中神遊也黠慧上遐八反恱豫余慮反安也樂也佛說文殊師利巡行經一卷毀呰音紫𧿡提上蒲末反號上戶高反下苦屋反文殊尸利行經一卷折伏上之舌反俆步上祥魚反孔冗戶决反正作穴特上頂反相皂莫孝反正作㒵煩惚音𢙉毀訾音紫一𧢻下尺玉反犯也𥥛也亦作粗佛說自誓三昧經一卷精蘆力魚反舍也正作廬珓露上古孝反或云交露或云絞露顯揚音羊洋序上徐羊反踔茅上冝作跳他吊反越也又孝卓二反非須申羊朱反正作今贈才鄧反相送也專推下作擢同文孝反進船者也又尺佳他回二反非也積殖音食翼從上羊力反下才用反研精上五堅反宍結上而六反下音髻薩披上蘇割反下彼依反遠上七到反捻耳上奴篋反兆意上音非誤句睒上音俱下音陝謳合上烏侯反揵推上音𠃵下音捶草耨音辱泥曰子月反亦作越如來獨證自誓二昧經一卷句潭上音俱下徒南以審二反國名也又冝作瞫二同音審前經作句睒也踔苐上他吊反越也正作跳趠二形也趍向上七俱反專擢直孝反進船木箄也正作擢棹二形遍露上匹連反又音遍非薩披上蘇割反下彼依反操遠上七到反分乘讚反揵捶上巨焉反下直追反草蓐音辱灌佛像經一卷一臠力兖反斷期上徒管反絶也僉然上七廉反咸也皆也摩訶𠛴頭經一卷繕作上時戰反補故就新洋銅上余良反𦫿納上五蓋反下或作奴合反香草也異物志云如拼櫚子似檳榔可食也三月採其細破乾之味積苦豆是也捼而上奴回反紺黛音代足之上將句反添也造立𢒈像福報經一卷憂填音田王名言諾奴各反應也又而者反柔𣽈音軟恢上土上苦回反下徒古反無於熖反炎光上羊贍反醜陋音漏刻畫上苦黑反下戶卦反作佛形像經一卷拘鹽上音俱下郎甘反前經作拘羅琦物上巨冝反正作奇薜荔上步計反下力計反貞不空羂索神變真言經一部三十卷第一帙第一卷阿商遇反軟草上而兖反喜愈音逾恱也𮒷魯荼上魚列反下宅加反䠆跪上直羊反斷愕上魚斤反下五各反腹助下音勒正作肋痔痢上直里反下力至反腫上都反癀病上戶光反㿃病上知例反赤白痢也又當蓋反瘡皰匹㒵反又薄孝反經後作薄者反非癢癲上音羊下音顛𥜒蠱上於瑛反下公五反鞭撻上卑連反下他達反能禳而羊反即譡都浪反芬馥上芳文反下扶福反身膚音夫正作膚姝上尺朱反下以雪反怕怖上普嫁反呪詛阻疏反荼枳吉以反𣩦𡧱上奴了反正作嬈溥示上音普廣也若讜當朗反直言也經後作他朗反娜麼上那可反下摩可反窒上下吉反下力計反上經作丁吉反誤誐嚲上魚者反下都我反帝瓢毗藥反陀𭌆音履囉窋丁律反㫊唎上烏可反下音利索跢上蘇古反下都個反囉拏上文發反中魯雅反下女加反襪囉拏同上嚲詑上多可反下他可反僧㰤上斯孕反下呼可反縒漫上娑可反下莫半反喇濕上盧達盧乞二反弭嗢上爾反下烏沒反詘巽上俱鬱反娜曳上莫口反中乃可反下以世反枳嘌上吉以反下力日反悌耶上音弟下以嗟反播苫式占反唎上胡沒胡結二反目佉去迦反去聲呼訕洙上所諫反下莫鉢反襪嚲上望發反𡀩起上力角反下其乙反拓囉上之夜反誤枲唎上星里反䭾上輸律反下陀個反翳曳呬上烏計反中以世反下呼以反勃𠆙上蒲