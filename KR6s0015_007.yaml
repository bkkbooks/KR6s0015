地上薄𣳚反躍折上步末反下時設反梵云𧿡折唳唐言金剛揭鞞上巨列反下毗迷反𭇿𫪭上巨迦反下丁禮反亦云底夭逝上於小反亂心上郎喚反揚上以招反下以良反坌身上步悶反拇指上莫口反記莂彼列反大輸力旬反正作輪怛唎音利迦喃女咸反𭊭音菴諸真言中此行從大輪字皆作唵烏感反已下出經後文佛頂尊勝陀羅𡰱經一卷開元録云大唐𦋺沙門佛陀波利譯弟三譯此卷是下方延祚寺藏本右洪尋此經合是日照三藏再譯弟四譯者也按此經序云波利至永淳二年回至西亰共順貞譯僧將梵本向五臺山於今不回至垂拱三年定覺寺僧志靜見日照三藏遂就三藏咨受神呪法師於是口宣梵音經二七日句句委授具足梵音一無差失仍更取舊翻梵本勘挍所有脫錯悉皆改定其呪初注云最後別翻者是也又云其翻經僧順貞見在住西明寺據此序意是志靜見日照三藏時再譯弟四出者也開元録云佛陀波利譯第三譯者謬也此序既言波利將梵本向五臺山於今不回是誰更取舊翻梵本勘挍亦不應言最後別翻矣此亦心錯會序意耳序文裁抑於力反行顗魚反捐軀上余宣反下丘愚反懷上古還反逗留上徒𠋫反他意也緣由也經文苾茤上毗必反下測俱反𡀔枳上郎故反下吉以反尾戍商注反正作戍滿哆上莫管反下多可反娑頗普破誐底上魚也反尾秫輸律反覩𤚥牟含反阿𢈔余主反羅柅女爾反塢瑟上烏古反梵云塢瑟灑唐言佛頂最上言受持之人由如佛頂尊上一𭃄之上最最尊元能過者也濕茗頂反迦𩕳奴頂反又奴丁反殺播上所八反下補臥反見別真言作殺吒播哩上戶沒反下力耳反訥魚列反𩕳文發反正作襪也晚發反上音挽下音此是襪字𭃄腳也乃𬒳書人移晚字於當行內非也轉舌咶下音呼舊闕轉字又誤作咶今添轉字改咶為呼也又火戶刮二反並非恆闥上多達反正作怛惹野上自攞反嚩日囇上無博反中咨反下力計反下二二合日囕上咨反下郎敢反䭾上莫北反下徒個反捺上奴達反下力計反𧎔蛇上莫朗反窣堵上蘇骨反佛頂尊勝陀羅𡰱經一卷開元録云大唐𦋺沙門佛陀波利譯第三譯此卷是上方藏本右此經與方延祚寺藏本並依品録勘經文紙數首尾文及序並同亦亦佛陀波利譯弟三出者然其真言中使用文字句逗有異下方藏本真言五十四句此本真言五十二句所用文字亦異未詳何正故兩本中文字並録於冊內但諸藏中有者據經施行以防不備矣然此本疑是日照三藏弄譯第四出者也准真言不同經文無異序此序與下方經序文並同劬勞上具俱反𫽄濟上取蒸字上聲呼今之度反正作拯裁𢬃上自來反製也下於力反按也之項苦顂反正作須永淳市倫反捐軀上余宣反此于𠃵反正作焉逼留上音豆下方本作逗下亦作經文苾茤上毗必反下測俱反蟒蛇上莫朗反䠒跪上乎悟反苻𧙕反上伏無反中鉢反下音筏字𭃄腳至嚟上丁𣵀反下力兮反吉㖿羊嗟反迦字𭃄腳丁你奴里反阿上格反咤字𭃄腳多捺奴達反怚字韻苻邏郎個反塞坡喇反經作波喇反非也音喝呼割反呵字音也居刈魚吠反縛上乘割反他哆上吐可反下多可反擲歌上吒𮧓反吒字𭃄腳麼麼寫上二莫果反下息我反殑伽上巨陵反下巨迦反光焰音㷔又以染反窣堵上蘇骨反身上自宣反一把北馬反那𢈔羊主反其真言中自有𭃄佛說最勝佛陀羅𡰱淨除業障經一卷開元録云大唐中天笁三藏地婆訶羅於東都再譯第四譯右此經合是日照三藏先譯弟二出者也其彥琮序合此卷初安之何以明之杜𮨜與波利未善唐梵言音故其經皆云佛在舍衛國兼具列菩薩名故知同時也其日照三藏譯者云薄伽梵在室羅筏與唐奘淨二三藏所譯經合同耳矬陋上昨禾反下郎𠋫反哀惋烏亂反向時上尸亮反少時遽盡上其去反纏裹音果冤煩上於元反卒躁上七沒反下子告反噉屎尸旨反噉尿奴吊反今賴音賴咎責上巨久反投躃毗益反血瘀於云反如笮音迮壓也花袋音代號咷上戶高反下徒刀反尤最子外反䎡語上而兖反妊娠上而甚反下尸人反乳哺音步昊天上戶老反啼上丁計反俗𡀖囉上卜未反俗瑟咤拆佉反拆佉上丑格反下丘迦反怚姪徒結反𭊭烏含反喉中擡聲呼揭底上巨列反婆皤蒲我反曬雞上所賣反下居列反喝囉上呼割反頞地上烏割反𭉐上亭吉反勃地上步沒反勃陀上步沒反躍折𠼐上步末反中市列反下力兮反勃𭉐上步沒反下地耶反殑伽上巨陵反下巨迦反杜𮨜與波利譯者並云恆河沙由此證知杜𮨜與波利相次譯日照兩本並在波利後譯也眇小上小反瘖啞上於今反下烏雅反窣堵上蘇骨反入上尺專反放赦音舍稜伽上郎登反飱三上倉安反羼提上初限反不喎苦乖反不斜序嗟反正作斜佛頂尊勝陀羅𡰱經一卷大唐義淨三藏譯第五出從胸音凶琰魔上羊染反古經云閻羅王欲𣧩音終嘻哩上丁結反下力耳反盧枳吉以反鉢喇郎達反颯縻上乘合反下莫火反颯普末反揭底上巨列反㖸喝上巨約反下呼割反瑣婆上蘇火反戍𬀹上商律反下徒計反上又經文作高律反誤也痾喝上烏何反下呼割反戍睇音第沙上女利反下所詐反溼弭上失入反下爾反珊珠上乘安反侘娜上丑加反下奴可反下又經作下可反非𭥐那上多炭反戴也上都代反呾闥上多達反下他達反孤㨖音致鼻窣蘇骨反伽上巨向反下巨迦反訣樂上苦邁反正作快也又音决非蹲踞上音存下音據種種雜呪經一卷跢姪上多可反下地夜反上丘冝反下女買反上正作𭣿羶𦍞上尸然反下丁兮反𥀷叉上步兮反鼻皤步跛反瑟䶩都皆反塢矩黎上烏古反中俱禹反下力兮反迦㿲丘冝反迦徙斯此反跛囄力支反𧬜伽上斯蠅反下巨也反𧿡闍上步末反跌嚟上田結反下力兮反耶𤙖喉吟反牛鳴音合口喉中作聲呼之也又許今反初蝺丘禹反鳥𤙖下音吼二合與唵字同呼囒𧧂上郎安反下奴也反𦍞鑠尸可反那姥莫古反准𨓝音弟甕烏貢反諸真言作唵字也此字只一字為句屈聾上居勿反下郎紅反囉吠伏廢反訶𢪔丁禮反驃上毗妙反勝幢印陀羅𡰱經一卷大唐三藏玄奘譯玄奘自朗自浪二反諸師作子朗反呼非也情類下力遂反枳利上吉以反徙利上斯此反頞泥上烏割反拏上女加反下奴禮反穾揭上徒骨反下音竭妙印幢陀羅𡰱經一卷大唐于闐三藏實叉難陀譯于闐徒見反國名也唐言地乳備受上皮祕反正作備枳唎音利徙唎上斯此反柂囉上徒可反㕹囉上步末反誤𭣋那上初覲反經文作祛覲反勃囇上步沒反下力計反搩加上吒𮧓反吒字𭃄腳穾揭上徒骨反下巨列反無量門微密持經一卷吳支謙譯第一出猗行上於綺反虞界上牛俱反菩薩名或作麌牛禺反殆棄上徒改反下詰利反𨗻聞上徒愛反恱懌音亦樂也為羹下是善美二字知暑常預反書記也拜也正作署也又尸與反非錠光上定殿二音亦云燈光佛浴上子老反洗也入所禁反非出生無量門持經一卷東晉佛陀跋陀羅譯第五出強而上巨羊反焱王上羊贍反亦作爛阿難陀目佉𡰱呵離陀經一卷宋求那跋陀羅譯第六出𠶾離上呼哥反經本作𠶾依目録改作呵字目㤎古何反合作巨伽反諸譯本並作目揵連此本作目恕連或梵言訛也眇御上笑反下市律反藝好也正作妙術也眇句上笑反正妙崖互上五佳反下丁禮反正作涯底提惒音和眇法上笑反精好也泆羊一反鑎遺上巨位反下唯醉反上正作饋財費苦沸反惠與烏為披音婆又匹皮反非也䝱不上許劫反陀謣音于借音和于反諸經云𠃵沓和是也無量門破魔陀羅𡰱經一卷宋沙門功德直共玄暢譯第七出阿奴帝反阿仚起反經自𭃄𮑣上布火反下蒲詣反無邊門經作鉢鞞也應和尚經音作所冝反非嘻上許之反眤闍上女日反婆𭒂蒲餓反迦力之反沙奴禮反正作別譯者一本作史你一本作沙頞扶上烏割反下莬質反莬質上他故反扶字𭃄腳咃上𠡠賀反𤿺上布火反上盧轄反哆𦏌上多個反下奴侯反眵䜵上姝支反下常利反羅𡰱女遲反破魔經作羅𡰱又一向出生經作囉膩又音夷非劬上具俱反下多計反一向出生經作瞿多法式音識俎壞上自與反正作沮緻栗䭾上直利反中力日反下徒個反𥥛陀上大骨反柴嘊音崖阿難陀目佉𡰱呵離陀鄰𡰱經一卷元魏佛陀扇多譯第八出𣽈首上𪝥軟二音憂置莫瓶反又支義反非疾𨗻音代阿攱丘冝反正作欹也別譯者一本作阿仚莫仚一本作阿仚摩仚一本作阿啓磨啓一本作阿溪磨溪並是此句也又居委居僞二反非也應和尚作居毀反亦非也默攱上莫北反下丘冝反三𫉐莫官反目攱丘冝反廣如前注也羅捭步迷反正作椑或作步卑反別譯者一本作波羅鞞一本作百囉陛一本𤿺鞞一本作鉢鞞並是也又布買反非也應和尚作反亦非也劫𢌿𢌿牌二音𠈱離上索何反離上步末反嘻羅上許之反羅捭步迷反正作椑或作音牌陀上居起反正作紀又或作音別譯者一本作已一本作也埿奴兮反披捭之子上一音婆上二音鞞上三與捭同音鞞下一音奚正作婆捭兮也與別譯者勘定也此是先書者作婆捭兮後書者作披捭之子致使誤也法楷椑上布何反中羅合反下步迷反正作波摺捭別譯者一本作波羅鞞一本作百囉陛一本作羅簸鞞是也中又音皆非揭棧音羯絰提上徒結反絰提同上也與別譯勘定披提上步何反或作拔步末反下丁兮反正作堤別談者一本作婆底一本作跋帝一本作薄帝並是也頞遮上烏割反𮟯提上所姧反正作刪羞絺上息由反下丑夷反椑呵上步迷步卑步益三反並通呼也別談本何毗訶目攱丘冝丘寄二反與別譯本勘定提上步末反𢪔羅上底帝二音𭙴上他丹反正作痑嘽殫三形別譯者一作湯米一本作蕩咩是也又多安徒丹多個二反並非也蕩他浪反法楷上布何反下郎合反正作波摺也別譯者一本作波立一本作波羅上又波乏反吳音椑富上步迷步卑二反呂㝹奴侯反揭提上音竭下音低異譯本作伽帝𮟯叱尺日反佉音膩刪提上所姧反妷音逸挨親上自木反饋遺上巨位反下唯醉反這停上尸隻反摩上呼兮反舍利弗陀羅𡰱經一卷梁僧伽婆羅譯第九出阿𠷠苦禮反盲疧音底又巨支反非也鹿底上郎木反無量門經作陸底無邊門經作泥嚕託多經音義作麂底上音機非也抲羅上古何反婆奴禮反亦作禰𡰱持下音時或作恃音市無量門經作昵闍比摩上步夷反己履上居里反雉波上直爾反富䗶郎盍反娑𭦟莫官反沙弭爾反阿㝹奴侯反𡰱拖徒可反無量門經作𡰱陀又音陀舸字上古我反屣字上所綺反能沮自與反壞也止也無量門經作俎音阻豆禮器也非用一向出生菩薩經隋闍那崛多等譯第十出蕳擇上古眼反飢蜂芳逢反亦作螽阿女買反阿仚丘智反落𦿔步袂反阿膻尸連反正作羶脠二形無邊門經作阿散應和尚依字作徒亶反非膩轍直列反婆音盤地𠼝音犁膻地上尸連反又音但非私䰅音剃魏譯本作羞絺無邊門經作思體鸖囉上戶各反腅𥧝上濕染反下利反正作𮄆也無邊門經作濕咩也莫去智反正作企薩扷步末反坘娑上丁兮反題熙許之反啅帝上丑卓反正作踔晫二形無邊門經作耻低也縱𫃻上七容反下羊封反正作容也邏字上郎個反柵字上初責反策勤上初責反䇿進同上正作策也漢書曰策𧷤也勑使整𧷤不犯法也出生無邊門陀羅𡰱經一卷大唐沙門智嚴譯弟十一出麼拏上莫火反下女加反𡆗咩上郎個反下尓反翳黎上呼街反一力兮反上作醫止無量門破魔經作嘻舸立上古我反下必兮反又步益反娑嚟力兮反囉啝音和𮠴羅上呼兮反遮嚟力兮反哆上莫鉢反下多可反涅𦺞上奴結反下呼哥反僧倪五兮反縒咩上娑可反乘葛上索郎反下古遏反屣拏上所綺反姪嚟上田結反下力兮反姪荼宅加反楬低上巨列反閜那上阿可反扯陀上車者反下提耶反目𢪨苦浪反勃上步沒反下徒何徒個二反正作䭾一句出生經作佛陀遨低上五高反携接上戶圭反毀呰音紫亦作訾訿儲積上直佘反攞字上郎可反戍嚟上商注反下力兮反鞞嘮上步迷反下力交反諸真言中口邊字多依本音轉舌呼之也又依字交反喧聲也非娘鉢上女羊汝羊二反下音鉢窣耶上蘇沒反右從無量門徵密持經已下八經新舊十一譯闕本其見存八卷內所有文字訛誤處並將同本別譯者㸦相對勘取定善梵音楚夏者幸勿疑焉此處既然諸經亦耳癸卯歲高麗國大藏都監奉勑雕造
