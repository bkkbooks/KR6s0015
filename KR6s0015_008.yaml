body:
  text: 漢中沙門可洪撰依河府方山祚藏大乘經音義第一之八此冊有十九帙必改得能莫忘𠕀談彼短靡恃己長信使可覆噐必無崖際持法門經等十九經十九卷同帙無崖際持法門經一卷無崖五佳反或作涯琦音奇巢窟上助交反䎡性上而兖反驚惕他的反捫摸上音門下音莫芸鋤上音云正作耘竭𠷥音亭藏偎烏迴反讇讛上市廉反下魚祭反上又依字田染反無眴音舜跪拜音拜搙動上音震正作振也又奴豆奴二反非洗上子老反𢙣𤺨音瘡奢臈上尸遮反下郎塔反樓櫓郎古反俾倪上普米反下五禮反女牆也上又音脾正作陴持世間經一卷內題云東方㝡勝燈王如來遣二菩薩送呪奉釋迦如來助護持世間經目錄云東方㝡勝燈王如來經經狀題及目錄並略也那祁音耆多姪上都可反下他也反傞泥上冝作傞素何反又郭氏作楚冝楚佳楚界三反應和尚未詳木仚丘智反阿仚去𠔃反經自出阿嗘呼以反㕹帝上步末反㕹帝同上正作跂亦作跋陁羅𡰱集作婆底跋帝同上㕹帝同上恀羅上尺尒反又音氏頞那上烏割反阿嘖悼皆反悼階上徒到反婆哂呬下二同許至反中又尸忍反非呪咀阻䟽反蝮蝎上芳福反下許羯反瘧等上牛約反𤵇病上古拜反癬病上息淺反溼癘上尸入反下音頼古癩字咩波上音弭下音跛音弭尒反那哆多可反麼吒枳上莫火反中竹架反下吉以反陁奴禮反䭾音你音你奴里反字音囉嗘音音呼𠔃反嗘字音輸薜上失朱反下步計反闍𥘡丁𠔃反胵膝上戶定反下辛七反髖髀上苦官反下步米反蝢項上居郢反正作頸也下戶講反上又郭氏音頁非也脇膊上許刧反下布各反淡上徒甘反下於禁反心上水也正作痰癊阿閦初六反癲蠱上丁田反下公五反豺羆豹上助皆反中彼皮反下布㒵反蟒虵上莫朗反蠍等上許謁反鞭杖上卑連反裴陁上步迴反斫抧吉以反摩上音懺水淵烏玄反尊菩所問一𭃄諸法入无量門陁羅𡰱經一卷雜𩭈莫姧反珠網音𠕀應辨平件反門辯上同寫汦上思夜反中徒的反下丁禮反下正作汦坘二形上入聲呼之下又應和尚作之氏反非耶施失支反目佉丘迦反𮑣梨上布火反下力夷反仇拏上巨牛反下𡰱加反目呿去迦反摩呤力丁反以下皆同扇汦丁禮反下句云扇多目呿以下皆同𮟯虵移者反上句云修𮟯移以下皆同此目去弭反下句云修目呿以下皆同此呼闍泠力丁反下句云闍羅已下同此竭丁禮反下句云阿竭多伽濘奴頂反下句云阿能伽囊杬底上居履反悞机多同上陁上莫𠋫反正作坘羅上丁禮反以下並同利疧丁禮反下句云利多阿襜尺間尺焰二反阿莫𠋫反阿吃音坘䩭上丁禮反下居冝反目𭇔丘弭反下句云何目呿啝坘上戶戈反唎多上音和上句云啝多阿𠹛音豈又玉篇作戶哀反郭氏作都內反應和尚未詳多咃音他摩奴侯反殊㗌丁吉反正作㗧又丁結反應和尚作乃結反非也曇咩音弭桓伽上戶登反𦘺𠯋戶西反正作𠔃也又烏乱反非𭊿叉上借音居陵反舍𡐊古歷苦厄二反蓯所綺反摩奴禮反沙拏女加反嵐脾上郎含反下步米反薩勺音多虵咩咃脾上夷哥反中託何反下步米反上經文作咃悞虵咃上羊者反下託何反沙攡力支反阿之然反上句云阿遮又他典反非呼也虵吔上音野下音他汦上音滅下音底阿𮟯奴何反正作那上句云阿𮟯娑邏郎个反脾犾上步卑反下徒的反蠱戶上直中反正作蟲也又古故野三音並非善憙許記反病上魚約反正作瘧摩𢪛文粉反奢上尸遮反下郎盍反㭬梠上音傳下音呂嚮牗上音向下音酉俾倪上普禮反下五禮反池塹七焰反師子奮迅菩薩所問經一卷𦬔子上古敗反佛塌音塔噠咃上徒夜反下吐何反呵呂支反悞𠽮攡上丁兮反下呂支反邏𫪦上羅佐反下竹池反竭汦丁禮反下並同此呼也又音紙非用花積經云伽知且摩上多按反孑波上居列反呢𠽮虵上女遅反中丁𠔃反下移也二音花積經云嫟哆耶頞汦上安割反下丁禮反華積陁羅𡰱神呪經一卷怛施上多逹反下峙耶反峙耶上池里反施字𭃄脚杜羅上徒古反杝羅上徒何徒可二反奮迅經云陁羅𢘻池尒反栴上諸連反下同上𮟯侔音牟嫟訶囇上女力反中荷反下狸迤反荷上許之反下乎可反狸迤羊尓反胵底上竹𡰱反正作𦙁又尺脂反非也婆徙斯此反葛俾上古遏反下卑尓反阿媚眉秘反奓上徒可反正作爹也下奴禮及奮迅作題𡰱也上又音吒非嫟哆徴耶反経自𭃄徴耶上知里反佛持引反經作侍引反非奮迅經作佛提是也璅訶上莎果反下呼可反華聚陁羅𡰱經一卷兜具上戶官反正作完也六情完具也悞旃題上之然反下徒𠔃反上正作栴羯𢌿上居謁反下必脾反啝帝上戶臥反泥音多奮迅經作呢𠽮華積經作嫟哆也又灼杓二音非咥拏上丁結反下女加反六字呪王經一卷五紙恍忽上乎廣反又音光非檀陁上之然反悞正作𣄛氈提興都侯反正作亮也悞摩啇丁計反正作帝佉歐上丘迦反下烏侯反𭼩蠱上於琰反下公五反四繳古吊反小道也漢人謂四徑道為四道也正作徼又音澆亦正作徼也又之若下草二反非減壽上古斬反興帝上都侯反正作兜移陁上息咨反正作私下奴禮反後卷作蓰陁井子告反井同上磑磨上音對正作碓疊綖音線菟羶上奴侯反下之然反正作氈𭥆二形後卷作阿𮕾帝莬提上奴侯反羶陁上之然反正作𭥆澡手上子老反漱口上所右反𫪦虵上直尸反下以者反梵言多𫪦虵他此云所謂入呪之初也亶耶上多旱反葉婆上尸反六字神呪王經一卷失譯開元錄云六紙品次錄云二紙此卷六紙合開元錄不入品錄中二紙者也氊陁上之然反提兜都侯反只吒上支紙二音淮濟上戶乖反下子禮反陂塘上彼皮反下徒郎反正溏垣𡓜上于元反下疾羊反碓磨上都內反廁溷戶困反鞌馬上烏干反靴㡌上許𦘺反下莫報反佉傴上丘迦反下於禹反域壽上古咸反正作緘也前卷作減傳記本作劒壽緘壽上古咸反此正域壽同上也下同此蓰陁上所綺反下奴禮反伊中閒字音此云苦集也陁蔽毗祭反正作弊也亦云蹋部此云滅陁陁敞毗祭反亦云達蹋部此云道狂像音象正作象也羅以嗟反佛說呪六字神王經一卷此經出品次錄不合開元錄下方延祚寺藏不入此本右此經按開元錄云六字神呪王經一卷六紙品錄云二紙出傳記陁羅𡰱雜集經第八卷當藏依開元錄本不入此二紙者也且傳記中既有此本則不合却将戴於目錄以為卷數只可抄諸經因緣於傳記內耳品錄棄彼取此得無乎不應從末取本矣今但錄此經中文字於冊內以防諸藏有本處使用焉郍荼上音般經本作鉢陁翅油上借音吉支反跋帝上步末反下典支反𮜞頭上毗民反正作也經本作頻頭也又或作毗忍反擅頭上徒丹反經本作陁檀荼上之然反經本作氊羅尸遮反鄧伽上音登下巨加反經本作燈伽頭上毗忍反脂吒吠上音夷反中知加反下扶廢反呪咀阻䟽反𭼩蠱上於琰反下公五反佉䮃他上丘迦反中冝作音鳥下音陁經本及孔雀經等並作佉歐陁亦云佉傴陁又丘于反非也歐烏侯反𧴵陁上莫侯反碓磑上都內反下五內反牀敷上助㽵反放戾力計反施陁羅上之然反正作旃劒壽上居欠反嬈近上奴了而沼二反陁奴礼反阿蜱破西反経自𭃄祢灈俱反経本作瞿沙泯𭰖上真忍二反經本作伊蹹蜱上徒合反下破西反經作被西反悞也佛說持句神呪經一卷鳩桓戶官反毒狩書呪反正作獸嬈亂上奴了反敢螫呼谷尸隻二反執治音持蛊道上古野二音諸經有野道是也漢人呼蠱毒為蠱野也正作蠱也又音沖非陁隣𡰱鉢經一卷拘上音瞿下自南反正作蚕二形世界名阿難陁拘蠶晉言花積也薜荔上毗計反下力計反有䈥音斤郁倚丘蟻反正作綺目𬽾丘弭反正作企也持呪句作優佉目佉色莫孝反頞𩉬上烏割反下丁計反拔𩉬上步末反之蟲直中反迦前自先反大灌頂經作迦偂𡰱非除愈余主反護命法門神呪經一卷難陀音陁切處尺反毀訾音紫亦作呰訿二形撗上於少反鄔俱上音烏又鳥古反莽俱上莫古反麼你上莫火反下奴耳反橠虎上烏可反下呼古反跋䫂多可反折𠼝上常逸反下力𠔃反拖𠼝上陁可反薜上步計反下丁以反𭦟荼上莫安反下宅雅反鉢洛可反彈舌呼哩拄上力耳反下知主反𨭝拖上所八反下陁可反謨荼上莫乎反弭𠼐上尒反下力𠔃反唎上下沒下結二反下音利㰤你上呵可反𠿒囉上呵割反呬犂上希利反下力𠔃反揭雉上其列反下直几反蟾上木廉反下步末反上又之廉反鉢嚂郎闞反正作濫跋監羊贍反正作鹽折音濫拖鹽上他个反下羊贍反鶻嚕上戶骨反下鹿古反䞘囉上共𠧒反欯𠼝上許昌許吉二反經作許昌反悞鉢喇郎達反多㗚上丁也反下力日反柂訶上他可反訶䛧米計反補𣾫所立反荼上郎坦反下徒皆反𦙘你上竹𡰱反下平聲折㘕上帝逸反下郎甘反苫上式占反𣾫蓖必𠔃反伽上莫亘反正作瞢窣堵上孫沒反堀嚕上其勿反悞下洛古反遏𪘨上安割反下卓皆反𪘨上乃可反曷囉上何割反朋祁上蒲亘反下巨𠔃反祁奚上音耆下音𠔃祁字𭃄脚𭌆上力反𡀔弭上洛故反下尒反閃䛧上失染反下米計反鄔禫上烏古反下徒感反折上常逸反下力計反㨾𦒿上羊亮反下祁西反矩𪘨上俱禹反下知皆又揭路荼上其列反下宅加反緊捺上吉引反下奴達反佛說善法方便陁羅𡰱經一卷逝唻洛加反郎皆郎改二反嘍嘍洛口反唻羊朱反摩上父藍反自切誃猪耶反𡀖𭌫上音鉢中音下音避護命法門經作奔𡆆鞞嘻囉上許其反頞哆上安割反下多可反波爛郎讚反婆檐羊廉反悞憘他上許以反他擔羊廉反正作擔護命經作拖鹽威狠音㒵勇悍寒案反婆嘙蒲我反𭇿囉上其迦反護命經作囉嘻上許魚反金剛秘密經作希利磨糸音覓護命經作麼麼摩音避護命經作摩薜僧怚多割反悞籚笪上力胡反下都達反磨㘓洛干反婆呮吉以反護命經作婆雞肩上失戰反金剛秘密經作睒婆正作扇扇婆上夫戰反弗巴布麻反伽上莫報反中其迦反下力計反佛說金剛秘密善門陁羅𡰱經一卷漚究上烏侯反婆汦丁禮反善法方便經作婆帝護命經作婆丁履反經音義作直飢反非也毗汦丁禮反善法方便經作毗帝護命經作薜真上昌之反呼𡰱上音浮正作哹善法方便經作跃弓迦絰徒結反𨚪𡰱上巨尸反正作祁善法方便經作忌𡰱又陁羅𡰱集作祁護命經作𦒿你虵他上羊者反善法方便經作耶他利都含反正作躭滅上田典反嚙木上五結反𡰱仚上守伊反下丘智反護命經作尸弃善法方便經作尸棄沠利上諸尒反正作泜善法方便經作旨利羯步卑反護命經作揭薜桎上陟栗反善法方便經作天之日反護命經作旨𦙁你雙存羅汦丁禮反睒婆上失染反弗羆彼皮反羅汦音底羶汦上式連反下丁禮反善法方便經作扇帝𮛲目汦上年結反下丁禮反善法方便經作涅目帝兜汦音底虛空藏菩薩問七佛陁羅𡰱呪經一卷多絰徒結反菴烏含反雞利上吉𠔃反蛊道上公五反悞呪咀阻䟽反夜警居影反碧綖音線陁喃女咸反桔皮上音結銅𣏚市支反卷一上居願反𦥞物也正作𢍶銅祇市支反正作𣏚一扺同上又音紙悞指𢲻子活反三指取物也指撮子活反如箸音筯銅鍼之林反寸匕音妣口噤其禁反甜姤上徒兼反下丁故反前經作私田闘癖病上普擊反痃病也刷齒上所刮反亦作㕞如來方便善巧呪經一卷獚古猛反正作獷又音黃犬名也非𭊭烏含反摸拓上莫胡反下之夜反前卷作無遮鄙惚乃老反又音忽悞一祇是見反正作祇癲病上丁田反揭多上其列反鉢拓之夜反正作柘涪多上縛謀反呵𠲸女咸反諸瘧魚約反祇抄上市文反八𢪛莫迴反漢坘多𠔃反又音底或云阿羅漢多伽坘同上虛空藏經作伽帝𢙣創音瘡沈水上直林反香名若忤吾故反錯也正作悞或作迕腫癖普擊反濕𤺨音瘡貰迦上尸逝反折上支舌反下力計反摩錍步𠔃反又音卑衫鉢上所銜反囉女二反唏詈上香翅反下力義反風齲丘禹反請觀世音菩薩消伏毒𡧱陁羅𡰱呪經一卷淴所戢反不利也正作澀𣾫哆咥咃上多反中田結反下託何反孡鵞上音胎下音俄咃字𭃄脚也名叛音畔首埤音脾絰咃上田結反下音他鞮首上丁𠔃反摩蹬音登耶啤音卑𦀟呵上索何反多𭊾田結反𮅙樓上都侯反正篼矧墀上尸忍反下直𡰱反婆𠷐巨陵反案涅槃十四音作𠷐字也又况遠反非杻核上抽酉反下戶戒反刑力竹反煞也浴上子老反興蕖巨魚反阿魏也穢污烏故反鷹隼音笋囹圄上音靈下音語枳由上吉以反羶阤上尸然反下音陁耶尸遮反菓芪古花反正作苽蝮蝎上芳福反下許謁反調恂吉旬反正作均也悞𠲿之上所卓反駛水上所事反𫮺然上呼括反正作豁收其上尸由反流蜼力支反正作離頂𦜩音𢙉毗上當侯反勉離上音免脫也下力義反無垢淨光陁羅𡰱經一卷黑𤸃音瘦輪橖宅庚反塔中柱也䬃哆上乘合反下多我反俱𦙁竹𡰱反戍陁下商注反正作戍簿質上步各反鉢喇郎達反阿殄田典反麗娜奴可反喇拏女雅反珮燄上步昧反下以贍反𧋠形上郎禾反永字上音万正作卍羅曳以世反已下同瑟竹里反已下同伐囇上扶發反下力計反吽吽音吼牛鳴音合口喉中作聲急呼麝香上時夜時歷二反剌𡰱上郎達反麗昵𡰱日反伽上巨向反下巨迦反捺地上奴達反揭鞞上音竭前後皆同此呼之下步迷反侘那上丑嫁反杜攞上徒古反下郎可反金剛場陁羅𡰱經一卷拔上步末反梵云阿毗拔此云不退轉離垢古口反正作垢悲苦屋反醒寤上星定反下五故反毀訾音紫嗅香上許右反正作齅疾上自反速也金剛上味陁羅𡰱經一卷𨓝相上徒禮反愸服上之領反正作整攢火上子官反正作鑽又才官反非也有隧音遂火母也正作鐩檖筭𢿘上乘乱反濩湯上戶郭反悕怕上普悟反下普架反𨓝𢆰乎悟反今作㸦改佛說內藏百寶經等十七經十七卷同帙內藏百寶經一卷遘精上古豆反憙樂上許記反草而欲反正作蓐壞上步邁反如鐙音燈百佛名号經一卷傴曲上於禹反佛塌音塔傘盖上乘罕反旈璃上力由反蹉七何反婆瑳同上勝德上尸證反別經本經音義並作勝音孕佛多也不委何正瞿嚧音盧漚樓上烏侯反安穩烏本反嬈乱上奴了反歡憙音喜菩薩行五十緣身經一卷𢜪那上而者反亦作若那此云智首亦云龍首琦音奇𢌿者上必脾反荊棘居力反凡石上五馬反丘墟音祛躓誤上知利反面上子老反䟽齒上所魚反發上夫𧙕反下子郎反之同上迺如上奴改反佛鞈古含反正作合佮二形合集也佮併佮聚也鞈勇捍也非用又音夾囊橐也亦非用經云菩薩世世不壞人宅舍常喜作舍用是故佛合金剛之力四方如山无能𡧱佛身者是也應和尚以塔字替之非也䖟蜂上音文中音盲下音峯𧈸虱上音早下音瑟色𢢔莫半反履屣所綺反菩薩修行經一卷叡達上以稅反擁慧上巨貟反正作㩲腐爛上扶武反下郎歎反危脆七嵗反如創音瘡摷窟上助交反又音抄非係属上古詣反連也勉勵上明辯反下力世反獷古猛反能勉明辯反脫也正作免酸下初錦反醋甚也食有沙也正作醦墋二形晃昱上戶廣反下羊六反暐曄上云鬼反下云輙反洋洋音羊水流㒵也蜎飛上於玄反𧑮動上而兖反寶經一卷錠燎上徒丁反下力堯反正作庭燎也經音義云樹於門外曰大燭於內曰燎也上又音定非熱㭙上之入反正作執煌煌音皇㧌上呼告反正作耗床㩉音塔跱立上直里反珠璣音機跛者上布火反經後作跂非僂者上力主反相棠宅𥝷反觸也正作𢿧鈴鈴力丁反玉聲也正作玲也又經音義作𠏧以鎗字替之初庚反非斟酌上音針下音斫饌上戶交反正作也賜遺以遂反贈也埃塵上烏開反塵同上或作㶼音哀可𧨏音義量也僉信上七廉反怵惕上丑律反𢙢也下他歷反憂也罪舋許恡反不布火反正作跛憒𡗚上古內反下女㒵反毒祝音呪虛呼告反怛然上多達反恭恪苦各反䫃䀎上音故下普幻反又音麵猗眾上於綺反㷿華上音焰佛名也寶罔音佛名愁踖冝作䇎七略反驚㒵也竦也又子昔秦昔二反並非義无饜於焰反斯黨都朗反憂傶七歷反㧌上孫本反下呼告反織絾音成沈載上直沼反十億也正作兆皓皓戶老反汙大也正作浩支數上音反下所遇反返謂徃來度數也兆姟上直沼反下古哀反芙蓉上音扶下音容扣法上苦吼反寶罔音𠕀憧黨都朗反四嵎牛俱反正作隅晃晃戶廣反𥂙光上方問反正作奮𮕜上呼决反下莫獲反正作血脉㧌上蘇本反下呼告反毛力之反正作舍裏力耳反內也經作裏非床㩉他盍反正作㩉塌廟同上湏頼經一卷心靖音靜純淑上市倫反下市六反衣菅上於既反下古顏反跙徐与床呂二反樹名又經音義作才与反種恬徒兼反正作甜饕餮上他刀反下他結反躁擾上子吉反下而沼反食儲直魚反副也夫憙上音扶下許記反煴𤏙上烏昆反下奴管反上又於云反非操疾上子告反動也疾也正作躁趮二形也狂步沒反不消音笑正作肖不肖不似也和恊音叶合也諭諂上羊朱反枚上上尸由反正作収也捐𮁠呼告反正作耗𭜨慊苦點反恨也華𩭈莫顏反貪謫知𮧓反責也𭢞拖上滂古反下尸智反正作普施也普大也遍也持物惠人曰施也謂此菩薩勸王立普施限也經云大城之中立普施限是也應和尚以布字替之非也此是書人吴加其才致使諸師罕詳矣迊待上魚亰反正作迎金色王經一卷翻譯記捨上都昆反𦙚次上所卓反經文食槫徒官反丸也騲馬上倉早反蘭廐音救如𡱝音西赤翅尸智反抹面上音未暫存上慚濫反正作暫𮜋不勉音免脫也暫瞬音舜𢪛淚上無粉反佉陁上去迦反此譯為可食之物巨呂正作粔上音巨下音女餈餻也經音義作粔𥹡蜱豆上必𠔃反正作豍稻粮力羊反正作梁馬𦛁音𢙉寶石也正作碯腦菩薩生地經一卷撾捶上竹花反下之水反常憘音喜周心上戶盖反正作害急憋井列反怒也形𠸍音笑誙𠕀上丈夫反𢪔上丁禮反下徒骨反佛語經一卷波卑㧻以反亦云波卑夜此云𢙣者正作掾四不可得經一卷人𡗚女孝反竊至上七結反擘山上愽厄反夭命上於小反入市下神止反正作市煒燁上云鬼反下云輙反一且多案反正作旦忽耄莫報反面阻瘦反柱杖上知主反𢭃氣上都管反呻吟上尸人反攝矢上奴叶反下尸旨反經音義作捻箭如搒步盲反笞打也噓天上許居反倡導上尺亮反親自木反俸禄上扶用反与也秩也趍行上七逾反輕蔑莫結反庸馬上余封反入溷戶困反裸形上戶瓦反慌忽上呼骨反不猗於綺反正作倚也又於冝反梵女首意經一卷澹泊上徒敢反下普百反恬靜也大淵於玄反峻峙直理反聳立也臨䀎音麵又普幻反入錧古乱反正作舘小㩉音塔床也正作榻㯓𧨏趣上魚寄反無喆知列反智也亦作𣧑危上許容反妄上尺之反㗛也輕侮也又輦反蟲神行也癡騃三騃反欣咲音笑式佛上尸力反溫室洗浴眾僧經一卷沙掘巨物反夜欻許勿反攬攝上郎敢反手取也正作攬浴上子老反漯𤹝上失入反下必至反脚冷濕病也正作溼痺也下又音鼻容上七容反苾芬上毗結反亦馝下芳文反香也為瑛於亰反玉光也羙石次玉也應和尚以纓替之於盈反福田經一卷系髮上音覓細絲也正作系適莫上丁歷反早喪乘浪反亡也禮䟽云失國曰造廁初事反正作廁披拘上音婆下音俱比丘名也悞雄桀音竭枯熇苦老反乾也正作搞熇𣩅三形也享福上許兩反迄今上許𠧒反至也出淵於玄反正作淵惡創上烏各反下音瘡崖限上五街反際也園圃補布二音菓苽郎果反正作蓏也說文云木上日菓地上日蓏應劫云木實曰菓草實曰蓏張晏云有核曰菓無核曰蓏也又古花反一杅云俱反正作盂一牧莫迴反脆胎上布交反正作胞廁圂上初事反下戶困反殞命上云愍反大方等如來藏經一卷𢙣𩞹於焰反糠糩上苦郎反下苦外反淤泥上於去反又音由非也明苦角反核內上行革反開摸莫乎反嚴𩚠音餝繒縟而浴反正作縟成具光明定意經一卷就榻音塔床也已索乘各反盡也沃若土烏酷反𦘺也下而斫反上正作𦰚也崐崘上古䰟反下郎昆反叡惠上以芮反山洋祥羊二音勞來上郎告反下郎代反下正作徠之刑音形行仵上戶郎反下音五飽足上布夘反恍忽上呼廣反卓犖力角反髣髴上芳𠕀反下芳物反瞢莫弘反炳別上兵永反蚑行上巨支反𧏦動上而兖反琦音奇玉名柔䎡音軟流浂於玄反真喭五諫反偽也古作贗也核說文作喭二形又音彥非襃訕上布毛反下所諫反既揌子孔反意態他代反剗貪上初眼反𠚫欲上魚吠反𢰔五上初洽反不宥音右寬也愛𮏴音斤埃濁上烏開反㸌然上火郭反躓礙上陟利反不罣音畫四署常庶反滅上丘隨反潭然上徒濫反恬靜也經音義作憺也又音覃水深也又以審反水動㒵非念否皮羙反塞也又方久反不也斷見上魚斤反煒曄上云鬼反下云輙反眉髭子斯反經音義作卷以眉毛替之非眼瞼音撿經音義作睫眊彼經悞勉之上眉辯反脫也正作免補完戶官反讒倿上仕咸反下奴定反不力向反知也佐也相也不謂不信也嗶呲上疋弭反下即此反𢙣言也難可也正作諀訿經音義作啤呲也悁恚上於玄反訿毀上即此反毀薎莫結反閑讌於見反吁嗟上况于反枉撗上於徃反寬弘上苦官反不肖音笑似也謂不肖不似也陳訴音素抂慍上於徃反下於運反老力垂反瘦老上所右反下經音義作𭓮二形應和尚以毫耄二字替之同莫報反老也八十九十日耄也耄僻忘也謬也亦惛乱也字樣從耂從毛作耄也枰閣上蒲庚蒲登二反棧也閣也正作棚也又平病二音非也狼惻上苦佷反謙𢌿必脾反妐姑上之容反下古乎反端愨苦角反謹也𮄚看上丘隨反小視也正作窺耶僻上徐嗟反下普益反財賄呼罪反倡妓上尺羊反下巨綺反盥手上古乱反漱口上所右反演道俗業經一卷曈曚上音童下音蒙裁𦿔必世反掩也正作蔽食係古詣反如蜂芳逢反正作蜂螽禍福上戶果反咄嗟上都骨都括二反𮓸盛上許鬼反弱上力垂反危脆七歲反猗世上於綺反同懽音歡食測俱反疇疋上直由反下普吉反𤵜疾上丑刃反猶虺許鬼反腦上音𢙉下音結出郭氏音或作酷苦沃反酷苦也安股音鉢正作般也念捄居右反又俱求二音非也憒亂上古內反眾𡗚女㒵反痛痒羊兩反水𣴊普包反正作泡㕘𧨏音義量也譖入上阻蔭反𨒫辟必益反君也法也挑眼上他條反令尸由反正作收搒笞上步盲反下丑之反讒之上仕咸反𨒫肆音四陳也恣也願赦上魚勸反下尸夜反不苞布交反道樹經一卷亦名私訶三昧經戰慄力日反坵墟上去牛反下去魚反丘陵也聚也正作二形又音遅非也諭諂上羊朱反下丑染反窂強上郎刀反下巨羊反癡𤻀音穢僮而注反勸勉音免勗也勸勉同上此正便音笑喜也又音羙非億上音童正作僮未冠也古作僮子字令為僮㒒字也質音亮得稱楊諸佛功德經等六經十卷同帙稱揚諸佛功德經三卷上卷隱𦿔必反上居例反國名也正作𦋺二形行𨽁音聚寶都迴反長跪具委反得勉明辯反脫也止也正作免勉勗也非正覺上之聖反直也真也是也正作正大強巨羊反盧力反鐙明上音登古經以為燈字也脇許刼反助也中卷芬子上古敗反神塌音塔褊狹上卑興反下戶夾反局意上巨玉反禿𭀆音頭地獄名也虫䗍郎未反下卷宍眼上而六反若音岸土壘力水反稟丞上兵錦反𦽦莚上文販反下以線反身