正作𠢕同戶高五高二反俊健也又豪俠尊貴之家也勢貴同上正作𠢕豪二形又音世非也鐙明上音登古燈字諭諂上羊朱反質朴普角反弘綽尸斫反不亂音乱不隧直遂反悞繒白上疾陵反下步百反正作帛也帛幣帛禮帛長一丈八尺周禮有六帶又素等㧾名帛虹電上音紅下合作霓音倪偏頗普波反頻覩上毗反携接上戶圭反下卷火嶮音焰正作憸瘳愈上丑由反下余主反怒上羊林反羅音饋遺上巨位反下維醉反炳然上兵永反斗戶木反疇迮上直由反下普必反少剬之世反正作制禁也又之兖都官二反非匿態上女力反下他代反電㷿音焰情淖女㒵反陷也態匿女力反別本作態慝非因摸莫胡反㨾也分賦音付布也量也分贓音自正作賦又子郎反非𫽄突上丁禮反下徒骨反正作突鈎釣上古侯反下丁𠮧反穋稠上美休反下直由反緾綿也正作綢繆抑剬上於力反下音制悞刼鈔初孝反硑精上五堅反正作研也玉篇作砰迸二音非躊躇上音儔下音除探筞上音貪下音冊愁倉歷反郭氏作私占反非錠光上徒徑反殞光上市力反正作殖暈曜上音暉又音運非也牀㩉上音床下音塔遅重上音搖正作遙匱路上巨位反下正作賂幾渧上居豈反下丁歷反王后音𠋫酌上之林反畢上子老反貴上戶高反正作𠢕豪二形鉤餌而志反𤠾者上丑朱反獸似狸而大山中人呼虎大者為𤠾犴也犴音岸裨馳上戶瓦反履屣所綺反殖眾上市力反不𢛳烏故反菀囿于救反園也聖上音豪正作𠢕𭤔望上許衣反秏呼告反謙冲直中反和也眩或上玄縣二音愽綜子宋反髣髴上芳𠕀反丁芳沸芳弗二反屢𦗟上刀遇反訾量上子斯反思也蹉跌上七何反下田結反未孚音敷信也又應和尚作䞯音赴急疾也一鍼音針激錯上音𠮧偱也小道也正作徼也又古歷反四鉿音含正作鋡也又古合反非流羡似延反囹圄上力丁反下牛与反徙至上斯此反移也謗訕所諫反酷𢱊上苦沃反下力向反真阤音陁摩𠇾音休智上音拳正作㩲彼賢刧經一部十卷一帙目錄云十三卷第一卷陁上蒲未反此云賢題云陁刧三昧晉曰賢刧定意經庠序上音祥下徐与反經文作庠非揌持上子孔反諸蔭於禁反慍色上於運反怒也救𣸫即計反古濟也溥首上音普寶積經作普首又或作溥𣽈同人朱反俗法上祥欲反拖安上尸至反危殆音待判伴上普口反正作剖下普半反正作判牉拌三形也剖判斷割也分折也謂善能安立義理分別决擇無疑滯故謂之剖判慧也上又應和尚經音作判愽江反下又步滿反並非也此帙內有六箇剖判字後並作判伴並悞也上方經作剖判是也陰蔽上於禁反下必世反不慌呼廣反愚贑知絳呼貢二反這被上音釋正作適也又音彥非悕望上許衣反憺怕上徒敢反下普伯反不恊和頰反懷也正作挾稫積上丑六反聚也正作稸也又音福非牧餝上文粉反又作文餝瑕疵自斯反痂痏上音加下于美反瘡也下文作痏非也𮟵伴上方経作剖判如前𭃄除上所銜反伐也正作也川音作上万經作𠚫載茂莫𠋫反𣸫脫上子計反正作㴉創痛上楚㽵反陗去上音消盡也又七笑反非恭恪苦各反淫平上羊林反應和尚經音作垐以准字替之非也省下力恱反悞念𩭈莫顏反明喆音哲夙夜上息六反擿去上音擲投也又他的反挑也愚駿五駭反愚也正作騃景摸莫胡反戲𭉋音㗛蜎蜚上烏玄反下音飛𧑮動上而兖反蚑行上巨支反喘息上尺兖反如𡱝音西第二卷常𢬘步保反自勉音免癡窴音𡨋蜚蛾上音非下五何反古經以為飛字上又扶味反繒縶音𤗊經弓音眷躓㝵上音下音礙手上音旱正作澡撾打上竹花反下知冷反婬𡟔上羊林反下余玉反正作欲為勞郎刀反正作勞𢫀前上又作辜𭷣四形同丘堅反姡他上都故反正作妬妒二形悚慄上息勇反下力一反如𡱝音西牛名正作犀世勞為兄反華也正作榮水泡普包反正作泡无疧丁禮反又音祇非異上其列反英特立也俊也強暴也正作傑搩二形也𤾇術上都侯反正作兜无逸羊一反正作逸愁倉歷反𮟵伴上普口反下普半反正作剖判也上方經作鄰伴並悞中上知仲反下於小反惔怕上徒敢反下普百反恬怕上徒兼反𠚫去上魚吠反穫也勞怕上徒敢反正作惔彼堓音岸悕望上許衣反塵勞郎刀反𤢌狩上巨今反下尸呪反噵利上徒到反正作道第三卷怯愵而斫反又奴的反非曀翳二同於計反陰障也讖識上楚禁反而耐奴代反錠光上定殿二音穬古猛反第四卷怯弱經音義作怯愵彼悞淡泊上徒敢反下普百反鼉上魚元反下徒何反𠬧捕音步耗呼告反正作耗大屏音瓶浮栰音伐卒慌上倉沒反魚也下莫郎反遽也怖也下正作㐬𭦇二形丁又呼廣反惶懅其去反亦作遽足縵莫官反𦟛好上丑容反竚立上直与反卆暴上倉沒反晃昱上戶廣反下羊六反𦟛脾步米反髀𦟛同上牽掣上去堅反下尺世反漸傭丑容反編合上布玄反次也合緻直利反煒煒云鬼反𥩳立上直里反第五卷杜塞上徒古反塞也閇也憒𡗚上古內反下女㒵反編髮上蒲犬反正作辮乳湩都弄反勉己上音免勗也下音紀身也第六卷愁悒音邑淫怒上羊心反怒癡三毒也亦云貪瞋癡也正作也斑宣上布還反醎酢上音咸下音措僉然上七廉反咸也皆也其𧨏音義𮟵伴上普口反下普半反正作剖判也㸌然上呼郭反怒上羊心反正作孚疾上芳無反徧黨上疋連反下都朗反殃舋許覲反瘖瘂上於今反下烏雅反毒𧈭許鬼反且汙烏故反第七卷天著上音無下直略反皆相全反正作宣純淑上常倫反下常六反恒𢬘步保反正作抱興隆力中反正作隆无疧丁禮反又音祗非也俗業上序谷反邊疧上必玄反下丁禮反禍福上胡果反正作禍𮟵伴上普口反下普半反正作剖判好喜許記反坦然上他旱反平也撰擇上宣兖反怛然上他旱反正作坦不猗音倚又於冝反果實音實抑伏上於力反安也屈也卒暴上七沒反倮形上戶瓦反之倉歷反伈足上相遷反勝𪫟助㽵反正作牀無讇丑染反第八卷鋡牟上戶南反含上胡告反召也正作号勳𩭈莫顏反月鐙音燈罷勞上音皮惓也勞也慊卑上音謙敬也又苦點反非𮟵伴上普口反下普半反上方經作剖判抄兒上小反正作抄坘舍上丁𠔃反又遅底紙三音非第九卷謵施上音習佛母名也又昌葉反非第十卷一枚莫迴反履屣所綺反亦作挍餝上古孝反裝也正作鉸前作坟文粉反又作文餝或作紋餝紋音文𢤱悷上郎董反下力計反竿蔗餳上古寒反中之夜反下徐盈反竿蔗謂甘蔗也吴楚襄鄧之間謂甘蔗為干蔗也下經音義作錫先擊反非也好拂芳物反經音義作怫繒潔下音𤗊正作㲲絞餝上与挍同古孝反或作紋音文又古巧反非牧牛上莫六反細縶音𤗊正作㲲前作潔並非都較音角略也𡱁䖝上尸旨反趣谷古木余玉二反經音義作峪非也彼悞亘然上古登反溝瀆上古侯反下徒木反短大法炬陁羅𡰱經一部二十卷上帙十卷第一卷上澈直列反通也達也正作徹持弓居雄反正作弓射𠂕上時亦反下尸旨反指㑯苦反正作項玉篇音思非也多姪徒結反裒留上愽毛反上呼甘反耶上奴禮反笳吹上古牙反梠上音傳下音呂圮開上皮美反讖悔初鑒反第二卷右髆音愽掉悔上大了反諠雜上音喧下音雜蘭拏上郎干反下女加反梵言阿蘭拏亦云阿闌那此云无諍亦云空家善馭音御洗濯音濁鑪鍋古禾反亦作爾翱翔上王高反下似羊反以翅音施埻的上音准射堋也埻中木曰的也无徒果反射堋也正作𭩥堋音朋陶師上徒刀反拍上徒官反丸也乾燥蘇老反暴令上蒲報蒲卜二反晞也日乾也迭共上徒結反遞也更也㸦也挾持上戶頰反第三卷䰻人上言居反氣爽所雨反如𩵾音魚獵也密緻直利反縵莫槃反又相也不瞬音舜動也如上蒲愽反不厚也正作薄𦟛足上丑容反髀髆上步米反下布各反分炳音丙𡱁尿上尸旨反下奴吊反羸𡚁上力垂反下毗祭反孜孜子慈反摩捫音門又莫本反扶抱步保反民慜音煩多也正作繁農始羊工估音古觸上丁禮反齧蹋上五結反下徒塔反寥廓上力迢反下苦郭反第四卷鞭打上卑連反放牧音目察也刀矟所卓反椎杖上直追反羈縶上居冝反下知立反𦊰繫上古犬反安繩取獸也籠檻咸黯反坑穽上苦庚反下情井反陰相上於今反焚身上扶文反正作焚𮊵廋所右反也又音叟非𠇾強上音休下巨良反姤恨上丁故反誤徧心上疋綿反又音遍悞戶旨反第五卷船擢直孝反𢯇也正作擢忛挽上扶咸反下五迴反正作㧪舩上竿也即帆柱是也經音義作挽音晚引也糇粮上戶鉤反丘墟去魚反垌然上徒弄反又音同非拯駛音使疾也速也又快决二音𡃧螫上許魚反下呵各反灰燼似進反寶后侯吼反皇也為棍古本反經音義云轉絃者也諸經有作𢱧毗結反拗轉也為槽音曹洟唾上他計反第六卷羅邏來个反受胎七日赤白精和合時名迦羅羅也頞浮上安割反受胎二七日時如繭皰狀名浮陁也蜱羅尸上閇支反正法念處經作錍羅十地論作捭尸或云蔽尸或云枇尸或閇尸或閇手皆一義也此云肉團瑜伽論云若已成內仍極柔䎡名閇尸是也又蒲卑遙二反非也五皰疋㒵反沮壞上慈与反猖狂上尺良反彼徒果反正作𣐟掩襲音習入也經音義云夜戰曰也奮矟上方問反第七卷輕𮆘莫結反聞上古瓦反可耐奴代反撾打上竹花反蠱魅上公五反又音野古經野狐字多作蠱𧆞𤝧補㒵反犲狼上助皆反聾瘂烏下反第八卷鎧甲上苦改反折挫子臥反若矛莫侯反亦作茅若推直追反若掊步講反刀鈇音夫鉞也竿橦直絳反又音幢第九卷依平陵反託也正作憑恁二形毀訾音紫謗也輕躁子告反嘶散上斯𠔃反羸瘠秦昔反第十卷菅針上古顏反茅也裸露上戶瓦反𧇊失上去隨反灰壤上火迴反下而兩反稍晚上所孝反下無遠反瓶下江反貪婪落含反貪也亦作惏騣尾上子紅反石黛音代也舉筞楚責反棄卑進反逃叛音畔背也枷鎻蘇果反桎梏上之日反下古沃反桁械上戶郎反下戶戒反苛暴上何可反負也卒亦上子律及終也形音六殺也靡第二帙十卷第十一卷能備音俻燎力燒反或棓蒲講反鈇鋸上音夫鑽矛上子乱七乱二反鋋也槍也從矛驚悸求季反警悟上居影反跋提上蒲未反源丁禮反又音旨輕躁子告反生棗子老反第十二卷頞浮上安割反裸露上戶瓦反枝藝上其綺反𧶜賈上始羊反下公五反行𧷮坐賈卉木上許鬼許貴二反筯骨上音斤正作荕洟唾上吐計反燒上扶文反正作焚𡙸迅上方問反正作奮右髆音愽遍此上補見反正作徧遍第十三卷兩梐步米反正作䯗羹飯上古盲反過熱而設反正作熱枯燥蘇老反膱不上女利反𫽄肥父非反正作𦘺禦武上魚呂反無簡古眼反擇也大也禮也詭上居委反正作詭鉄钁俱縛反銫掘上步包反下其月反怛緻直利反謦欬上苦頂反下苦礙反㧾置上子孔反又音窟悞若𥌒音古盲也裸形上戶瓦反衣筐去狂反跨躡上苦化反越也第十四卷隄防上丁𠔃反偉壯上子鬼反下阻亮反根上吾口反沾𣽈上竹廉反下人朱反濠塹上戶高反下七焰反芬馥上芳文反下扶福反海丁禮反予㦸上音牟正作矛𥎞矟上七乱反杵棓上赤呂反下音捧湏上書閏反下苦反撾擊上竹爪反𤝦狼上仕皆反眾舶音白第十五卷柎其上芳武反拍也正作拊亦作撫阿揭音竭真言鞞上奴禮反佷戾上戶懇反下力計反侵𡙸徒活反摴蒲上丑魚反投音胡噐名長音秘馬勒遠魚據反枝藝上其綺反下魚例反第十六卷鴝鵒上其俱反下余玉反喙食上音卓正作啄卒然上子律反既也自也聞上古瓦反刮削上古𭘕反暴曬上蒲卜反下所賣反第十七卷仂農上六食反勤圃音補園也薜荔上蒲計反下力計反儕類上助皆反等