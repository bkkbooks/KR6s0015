他並悞溉汝上古代反飲上都南反嗜酒上神利反他上羊林反正作婬撾打上竹花反伏匿女力反發舒尸余反散也伸也上方經作子音余非排說上步皆反推也上方經作俳說不喜許記反好樂也正作憙上方經作僖許其反亦非營諸上余傾反造也上方經作筞非塌廟上他盍反營諸上方經作築非此宍音肉目眩玄縣二音第二卷邊疧丁禮反又巨支反非齒爪爭巧反叢林上才紅反泉源上音全古作洤上方經作湶非聚落郎各反亦作渃洛惡咎上烏各反跳騰上徒反𥥛走上徒骨反口瘂烏雅反經卷居願書一軸日也正作弮占作弓蠅䖟音盲石先擊反兮也破也又丑格反裂也燋穀上子消反野馬炎下音焰謂陽焰為野馬也以噴普門普悶二反欲𡑅烏甲反僑客上巨反迦葉上音加下音攝醎醈上戶緘反下徒敢徒濫二反不醎也正作淡也又冝作𪉧他濫反無味也唐器乘浪反寐寤上利反下五故反單縫音逢蔽𢙣上毗祭反𢙣也因也正作弊蠅虱上羊陵反下所擳反科斗上苦禾反蝦蟇子也正作蝌蚪魚鱉并列反𤵇癩上古拜反下郎太反㿈疽上於容反下七余反𥆔瞎上呼交反乾也亦宮殿形狀也正作灱庨二形上方經作哮疱亞上步㒵反下田結反正作靤凸也吃瘂上居𠧒反呵叱尺一反呪咀阻䟽反第三卷乘𠌵音象駱駞上郎各反勳陸音六香名渚堓上之与反下音岸式佛上戶力反捴持上子孔反唐喪乘浪反衰𮁠呼告反枉橫上於徃反下戶猛反仕𮃻音患菀轉上於遠反裸走上戶瓦反面阻廋反皮緩㒵也妙上倉乎反亦作醜陋音漏完具上戶官反殘缺苦血反撰擇上思兖反正作選資賄音悔何冶音野恬也上徒兼反正作甜燋悴上疾焦反悞下疾遂反第四卷若許委反怖懅其去反出苦角反止伓許牛反息也正作休也郭氏音丕非也祭祠音詞師上力反𦜩皮上奴到反熟皮也正作惱養䖝自南反正作蠶押油上烏甲反掘鼠上巨月反婦上古瓦反沽酒上古乎反疾䔧正作螏蟍上音疾下力支反蜈蚣別名能食虵腦別本作上音慈下音梨水鳥也水鳥不應食人也非鵄梟上尺脂反下古堯反所辨步莧反正作𡨜滅上秦歷反裓華上古得反有音閻鹽身同上瀬多上郎太反𫪦上田結反下音知阿𨢘呼𠔃反欝呵虵上於勿反下音也已下同阿㝹奴侯反脇𣸪上許劫反下音伏𠴼𫪦上田結反正作經咥三形海濐之与反彼圻音岸薰陸上許云反土上郎古反膿血上奴冬反下呼决反上亦作舋僧伽吒經四卷第一卷阿疇直由反縱廣上子容反上下曰縱也又子用反恣也臨時詳義呼之蛊不上音古正作蠱睺地上音侯地獄名荖苦上郎倒反虎形上呼古反獸名正作虎也避廟諱故省之第二卷渧上丁歷反𠷐伽上巨陵反音瘂烏雅反宍揣上而六反下徒官反凞然上許其反和恱㒵也誅音六羽翼上于遇反下羊力反問訅音信收穫戶郭反第三卷且貸他代反假貳人物也金𭪿音觜窯師上羊招反挑火上他條反第四卷相上徒禮反牀塌音塔麝香上神夜反贍蔔步北反藥上市右反鞭撻上卑連反下他達反撾打上竹花反細䎡音軟履屣所綺反力㽵嚴三昧經三卷上卷遷動上七仙反不瞬音舜閦塞上初六反靉上音愛下音代𣱦氳上扶文反下於云反暗音𡨋堆阜上都迴反下扶久反海㠀音㨶根上五口反中卷特上徒頂反小𦸲音偶毗嵐郎南反小𥸮音早𦬔子上古敗反下卷身𧢻音觸循環上祥倫反言上知利反嗅一上許右反大方廣圓覺修多羅了義經一卷金鑛古猛反聚螢戶扄反蟲名中鍠戶盲反聲也亦作韹蝢漸上者困反齊也都也惣也正作頓也又其筠唐韻及郭迻經音頁戶結反非絲緩上音賢正作絃針𦫿五盖反俻殫音丹財上大官反噐觀佛三昧海經一部十卷一帙第一卷頭上以雪反淨飯玉也牝牡上毗忍反下莫口反牝雌也牡雄也跳踉上徒反下力羊反自擈蒲角反正作𢷏牙扴側巧反又古八反非竹荀相尹反又音詢悞𮌨尸上疋江反脹臭也澍如上之遇反難阤音陁此云喜其核下𮧓反孟冬上莫更反屏㟪上并領并政二反下烏罪烏𭔹二反壤上府問反不淨也下而兩反土也侓阤上音律下音陁赫弈上呼挌反下羊益反蕖上其魚反下五口反伉儷上苦浪反下力計反惎適音釋恱也汝娉疋政反特上頂反意音脂敬也見竉丑勇反愛也正作寵踞湏上居御反憾喜上戶惑反㧲搖動也正作撼絳汁上古巷反遁走上徒本反隨㥧音順從也慇重上於斤反𭉨相上即壘反髭䰅上子斯反下相朱反𧎗斗上苦禾反腭際上五各反口中斷下斷魚斤反璃筒音同咽於容反又烏公反垂𦖋都果反耳也跓腋上知主反正作拄臂𦟛丑容反槃龍上蒲官反正作蟠合𭦟莫槃反如玵音紺俗來胸音凶膺也正作胷脇肋上許刧反下郎得反王𬧅時軟反踵相上之勇反䗍文上洛禾反毗紐女久反天名也轂上古木反下文兩反𦜩頗上奴老反下普俄反四觚古胡反楞也欲看苦寒反正作看一絲音思初疊上楚魚反舒也下徒恊反白也已已二同音以止也訖也炳然上兵永反水子老反洗也正作澡也又所禁反悞關鍵上古還反下𠃵蹇反開闔合塔反窓牗音酉正作牖後音救金鞌音安顒愚容反即也溫恭㒵也德也惙然上知劣反电其上音申舒也渧音的第二卷枯槁苦老反乾也正作槁羸瘦上力為反下所右反井底都禮反又音祇悞敗之上補邁反破他日也紫爓音焰光也眼睷子反正作睫也郭氏未詳礕礰尖上普擊反中六擊反下又作炎同音焰又子廉反悞釰樹上九欠反正作劒穹脊上去弓反高也下子昔反蕀㓨上居力反毛獦力反正作髦鬣也儵忽上書六反疾也正作倐𭝶蹹狼上徒盍反躡也正作蹋銏鉤上山卓反㦸也俗指抓側巧反𨦟上芳逢反下無方反羈頭上居奇反箭鏃子木反奮身上方問反爓赤上羊贍反巖崿五各反捲脊上巨貟反正作䠰弮二形挟尾上古狭反𭊴地上香右反不淹衣廉反敗也八鬲音革䥫釵楚加反躃倒上蒲益反輈張上張流反䛘也正作講也燋悴上才焦反下才遂反上又焦了二音非懊上烏毛反下奴老反𭜨恨也正作憹也八卷作㤇憹也䀎目上音麵斜視也冝作盻普幻反美目也妖冶音野安拖式支反設也正作施華𩭈音芬馥音伏昱𤓈上羊六反下羊斫反鞌摩上安岸反正作按也偃息上於𭞽反涕唾上他帝反鼻液也正作洟又音體非也骨管上音謂正作胃肝肺上古寒反下芳廢反喉嚨上戶鉤反下洛紅反肺俞上芳吠反下羊朱反正作胏腴也肝鬲音隔正作膈延流上序連反正作延皮上步各反嘔吐上烏口反日曝步報步卜二反晞也面側瘦反繚戾上力鳥反下力計反復抱步保反六竅苦𠮧反正作竅蚘虫上戶灰反人腹中長虫也經音義以蛕字替之非也郭氏音尤亦非也蛕音悔玉篇音郁並非也驚㘁音毫又音亦團欒洛官反圓也正作圞也如羸力垂反創疣上楚床反下于求反捋左上乱活反𤛓乳也扴端上側巧反誤綩延上於遠反丹之審反䂓欲上古隨反敗績上步芥反自破也下子歷反功也奮迅上方問反奮迅同上卬相上一進反矗然上丑六初六二反直也互相上乎故反棠𧢻上直𥝷反下尺玉反上𢖍昌鍾反向也突出㒵也正作𧘂衝二形也華巠之利反到也正作至古作圣鏗然上口𥝷反剛楷音皆稈也華𩭈音湏四音岸一𫭡同上池疧丁禮反又音祇悞映𦿔必袂反輪墎音郭鞕撻上卑連反下他達反利創音瘡俎壞上才与反又音阻灰心上火迴反憒丙上古對反下女㒵反心乱也正作𠆴濟上自宣反䡰上古木反又音鏗非骨上之審反頭骨玉也正作𩑔枕二形𧰟紫上羊贍反美也髮抄小反梢也未也正作杪蜂翠上芳逢反下七遂反眼睷子反眼睫同上俱眴音舜前作瞬雙眥在詣反目際也角也又財賜也眼睷音接垂𦖋都果反偃臥上於㦥反下五過反輝艶上許㱕反下羊贍反兩吻無粉反口角也王即水反鳥口也正作觜嗺𭉨稊米上徒𠔃反齗然上冝引反齊也龕室上苦含反自慨苦代反第三卷蓊蔚上烏公烏孔二反下於貴於勿二反鼷鼠上戶雞反空上苦弄反下苦血反玟瑰上莫迴反下瓌迴二音𡰱網音𠕀𦬔子上古敗反𡱁尿上戶旨反下奴吊反晃昱上戶廣反下羊六反𦮰焰上呼格反𦮰弈上呼格反赤也明也盛也正作赫也下音亦美也上又郭氏作与石反非鉤璅音鏁𦮰弈上呼格反號哭上戶高反下苦屋反自撲步角反老耄莫報反烊銅上音羊消也𦮰焰上火挌反第四卷下逯音代靉上音愛下音代胎苦甬反頭萎於為反也摧茹上自迴反下而与反手折音舌脚戾力計力結二反乖也曲也互相上乎悟反今作㸦烟炇上於賢反下莫迴反正作煤也炱媒黑煤也成𧂐子賜反坌汙上步悶反水蠄丑知反正作螭樹揩音皆正作稭疼痺上徒冬反下必至反啞者上烏雅反亦作瘂𤸇跛上力中反正作𤸇疥癩上古拜反下郎割郎大二反入塌音塔項偑上戶講反下步姝反帶也正作佩也又音風非扴真上爭巧反正作抓𤓰第五卷䥫音䥫𧎔莫朗反正作蟒也大虵也尒雅蟒王蛇也自爆音愽近大也亦作煿𢫫身上郎沒反不利也磨也正作效硉䧟隧直遂反正作墜斷學上徒管都管二反婬妷上羊尋反下羊一反𭄩上良食反挑其上他刀也迢二反大䖝許鬼反又音冲從廣上子從反擗𤇚上普擊反下丑挌反破裂也正作劈𭏊也當勉眉辯反脫也正作免喙腦上竹角反鵮鳥食初也正作啄陰闇上於今反睒失染反䥫傘音散大隊徒𭔹反斬銼七臥反破也斬也正作剉莖二形𭉨距音巨樔喙上又交側交二反取也擊也正作摷二形也下音卓甬睞來代反鉢釪為俱反藏去丘舉反癊善上於禁反直擗上池食反下普擊反令蹬音登匍匐上步乎反下步比反撲煞上蒲甬反䥫竹林反相遺以醉反喙耳上陟角反又許穢反悞轢身上郎達反𨏼著也又歷洛二音蚘䖝上戶灰反偷𥧼千結反盜也癭瘇上於郢反下時勇反生祥廉反以湯瀹肉而去其毛也正作燖欻燂爓𦢨五形也摷出上楚交反取也正作摷也摷擊也駈䠞子六反迫也逐也趂也正作蹙蹴二形堓上上五案反爆我上補各反𬉹也朾檏上都冷反下普木反鐵鉗巨廉反正作𨥰口𤍜蘇老反乾也正作燥脣咃經律異相作𤜣同丁也反脣下垂㒵也又音他字吐何反面阻瘦反襵也𡅶吃上居輦反下居𠧒反重言也上正作謇振悼徒了反動也正作掉也又音道非挊杖項上郎貢反中直兩反下苦反疽上必遙反正作瘭也下七余反瘭疽病也上漂瓢二音並非諸音忌跌也謂機關轉發處弩鏃上奴古反下子木反㯓㲪上音塔下音登𮢁上音鐵悞也又二同音忌仾昂上丁𠔃反下五郎反搔痒上乘刀反下以兩反亦作蟬讒㓨上助銜反正作攙口噤巨禁反尖石上子廉反囈語上魚例反挓口上知挌反張開也正作磔厇擗口上愽厄反正作擘諭諂本闕第六卷佛跡音跡𬼹㑅上音亦下音作妙糸音覓細絲也庫𮐯音藥輾轉上知演反邠坘上彼巾反下丁𠔃反跑白上巨委反氣噓許魚反陁上之然反下徒何反從正上疾容反正作從㺃竇音豆穴也正作竇頭上丁𠔃反下也正作頭𦜩音𢙉又音忽非隨從才用反撞鍾上宅絳反鳴皼音古寶轝音余正作輿節家上去哀反效驗上戶教反下魚焰反老步祭反正作弊十号音号蘭巡順二音蘭循同上瑠瑀力支反又音禹非也寶拖音施惠也躡階上女輙反第七卷手奮方問反揚也檈大上音暉正作揮也又関患二音非攘上而羊反穴中上玄决反乱行上盧喚反正作乱均提上居旬反正均雜色上在迊反舊金上方問反𣰽𣯜上其俱反下山反正作氍氀也𣰅㲪上他盍反下音登愽噬音誓嚙也𨙫頭上苦狗反逡巡上七旬反退也旋轉也解拆先擊反乨意上郎喚反不理也煩也正作乱亂𢿢三形也第八卷遘疾上古𠋫反遇也儐徙斯氏反移也閭如上力魚反長者名魁膾上苦回反下古外反灌上子老反下古乱反擛僧上徒恊反摺也正作𤗊疊二形也僧伽梨袈裟名也從九條已上乃至二十五條名僧伽梨僧祇枝亦名僧脚欹此云掩腋衣即副髆是也懊憹音𢙉又音農非此呼不音寧憹上烏老反萎𢫌上於為反蔫也下他可反長舒也曳也正作拖也經音義作委佗音陁委委佗佗德之美也此非經意也經意謂彼化人自㓨而死萎拖在地而死也青於據反𮌨脹上疋江反下知亮反爤潰上郎贊反下胡𭔹反如膠音交如柒音七粘著上女廉反絞達上吉了反寶枷音嫁衣也正作架手搏音愽擊也又付拍二音隧地上直遂反落也誤落上直尒反落也毀也正作褫陀裸形上戶瓦反裁縫音逢字一進反第九卷寶壺徒來反互相上乎故反樓阤音陁䨱護上芳救反下胡故反跓腭上知主反下五各反𨳰口上補計反苦筞初責反里糸音覓右序全反𭢀摩上安岸反下莫臥反赫弈音亦舒旋書二音長梪音短又音豆誤未上思維反揌持上子孔反正作惣惚濁上奴老反阤音陁第十卷金𮡻頂反卬綬上因信反下市右反扶𮒄山居反亢旱上口浪反迯逝上徒刀反舉𢖾音凢亦作䑺竝出上蒲頂反烔然上徒弃反通徹㒵也又音同非癸卯歲高麗國大藏都監奉勑彫造
