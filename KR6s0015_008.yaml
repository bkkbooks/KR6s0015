物也正作倚也諸經有作依倚是也猗者猗狔從風㒵也又於冝反美也又去勢犬名也所𢪿古乎反罪也正作辜偹滿上皮秘反具也成也瘡痍音夷澡漏上所禁反漉木也又水入乾地也正作滲墋二形諸經亦作純淑上市倫反下市六反可沮自与反華𩭈目顏反閹塞上於撿反窗堅也音義云宮中閇門人也又於廉反五𦿔必袂反掩也正作蔽僥望上古堯反求也僥倖也非其所得而得之日僥消盪徒朗反除也滌搖弃也如秤尺剩反乎斤兩者也廣雅曰秤謂之銓銓謂之衡衡謂之平說文作稱從禾爯聲也春分而禾生夏至晷景可度即禾有秒秒音秒禾芒也秋分而定之律數十二栗而當一分十分為寸其為秤以重十二栗為一分十二分為銖今以春分禾生秋分禾成故以此時而平度量權衡因以禾平為秤也又尺陵反知輕重也撮上布各反下子括反眩惑上音玄乱也視物不定也迷也又音縣限上苦禾反程也品也正作科十發為程十程為寸十寸為科又音課第二卷輕莫結反煩憒古內反心乱也恍惚上呼廣反又許徃反下呼骨反倐忽也上又音光非志七到反窮厄困迫不失其志也正作操僥倖上音澆下音倖豪力之反正作氂十毫曰氂氂亦強也皃具上戶官反全也正作完瑕疵上戶加反下疾斯反澹然上徒敢反恬靜也𮁠呼告反減也虛也正作耗揌攝止子孔反普也正作惣也又思來反非也好憙許記反情好也慕也又音喜謗讒仕咸反讚言也正作讒俗作讒苞容上布交反裹也枉慍上於徃反下於運反不勉明辯反脫也止也正作免牽連上去堅反引也挽也憺怕上徒敢反下普百反邊愊上卑連反下夫目反應這音釋善也徃也又音隻等也又音的從也此三呼並正作適也又之夜魚達二反並非殃舋上於羊反禍也下許恡反罪也俎壞上疾与反壞也正作沮也又音阻非用貪𠫤力進反惜也正作吝窟上苦禾反正作窠澹泊与憺怕同也下又音薄非摸則上莫乎反也正作摸憂戚倉歷反正作戚𢗂難上巨記反畏也憎也正作忌分褥上甫文布還二反下內沃反正作䅶亦云邠䅶也正言富羅拏迷仾黎夜𡰱弗多囉此云滿慈子亦云滿嚴飾女子因母為名也諸經云富樓那多羅𡰱子也文阤音陁哽噎上古杏反揮淚上許㱕反灑也深邃相遂反洗濯宅角反經作擢非也无滓音宅地獄名也正作澤䆤漏上尺專反得勉音免脫也正作免坏器上普迴反第三卷抑制上於力反六閞古還反又飯弁二音非也耶𨶳上序嗟反下去隨反限局具玉反促也小也正作局侷舋咎巨九反撾搖上竹花反之水反下正作捶捶者上之水反瞢二同莫登反目不明也下悞四毗祭反困也𢙣也正作弊𬾨悉上皮秘反秏呼告反拖為上失支反設也正作施舊迅上夫問反下私俊反振身也正作奮奞驕上居妖反下莫結反相𤟡音㒵正作貌卒賤上倉沒反嚴愸之領反理也正作整整二形閛閣上步育反棧也閣也正作棚也又音砰非作倡音唱樂也又音昌𧢻嬈上尺玉反下奴了反擁謢上於勇反下乎悟反叛𨒫上步半反背也奔他國也竊避上七結反私也麾上許為反勸勉音免也魔上步袂反料蕳上力條反下古眼反結步愽反正作薄那鋡戶南反棠𧢻上宅耕反捄生上居右反護也助也濟難也正作救𧧷二形也又俱求二音非豁若上呼括反空大㒵也療捄上力照反下音救微曀於計反嫉姤上自七反下都悟反下正作妒妬二形楚詞曰𡧱賢曰嫉𡧱色曰妬也恭恪苦各反敬也耗呼告反輕蔑莫結反根𣚸子才反正作栽稽㽞上古𠔃反憒𡗚上古內反下女㒵反徧黨上𨐫綿反正作偏下得朗反上又補見反非也儔迮上直由反下普必反正作匹周𢭀序全反獷古猛反犬𢙣也又性強悍也亦作穬也第四卷弊㝵上必扶反下五代反上正作蔽撰擇上思兖反揀也正作選怯愵上去刧反下而斫反劣也下正作弱也又奴的反非捄攝上居右反貧匱巨位反乏也勉上許玉反下音免撗𧴵上莫乎反也下目𠋫反交易也正作𧵍七瀾郎汗反瑕訾疾斯反黑病也正作疵玼二形不猗於崎反着也又於冝反非差于㱕反𨗻定上徒愛反自盟音賜約也誓也辨才上平件反利口也慧也正作辯也才者能也憂倉歷反懼也痛也正作感慽二形郭氏作思占反非強記劒上巨羊反下居欠反勽去上魚例反也正𠚫也悞疑聚上牛之反惑也正作疑隧落上直遂反正作墜成辨步莧反死堓五反又作正作岸𦷢露上烏故反諸經云汙露不淨亦云𢙣露是也在上阻澀反正作第五卷膖脹上普江反下知向反屍臭大也九𦜩奴若反又呼骨反非蜎飛上於玄反𧑮動上而兖反露臺徒來反山𭏡五街反悁上徒果反落也正作墮也又於緣反憂也非己巳上居里反下羊里反忽所戢反正作歰畏𢣷其句反正作懼係在上古詣反不肯苦等反𭄩上音力似鳬而小者也正作𭄩又或是鳬字速上疾反疾也利也指扴爭巧反正作抓爪二形又古黠反非刮于上古頢反駐然上呼麦反忽也破聲也亦物相離聲也正作騁砉慝相上女方反煴上徒郎反下烏迴反熱灰火也正作煻煨也二並悞門閾况逼反門柣也瘖痾上於今反下烏雅反下正作瘂也又音阿非誦謵音習學也又尺涉反非𢙣露上烏故反前卷作𦷢非躰第六卷糸孔上音覓細絲也或奣烏猛反六合清朗也應和尚未詳私阤音陁湏揵音乹婆搓七何反逼迮阻百反相棠宅耕反觸也正作楟深淵烏玄反擿菩上他的反挑也又音擲投也振也又知厄反取也摸𫈣上莫乎反下音犯係意上古詣反連也堅䩕音硬瞪瞢上徒登都鄧二反下莫登莫鄧二反失睡極也惛沉皃也正作𧄼蔞恍忽上呼廣反失志也正作慌忽也又呼往反無形不㝎之像也正作怳第七卷瑱珠上之人反正作真𦫿納上五盖反周音旋膖脹上普江反下知向反屍臭大㒵䏶骨上步米反意具玉反而挑他條反諸觚音孤段徒乱反蜎音非前卷作蜎飛𧑮動上而兖反蚑行上巨支反斷蕳上力條反下古眼反蟲狩上直中反下尸呪反正作蟲獸也狩者冬獵也非用㸌然上火郭反腥𬛓上先丁反下先刀反五鼎音頂㓨𮣃居𨒫反難倩青𪫬反假也又云見反鉅明上其呂反正作炬𭠭陁上之然反下徒何反揵疾上疾反正䫃盻上公悟反下疋莧反正作䀎盼又諸系二音恨視也非疇迮上直由反下普吉反六湮音因落也沉也眼上補厄反正作擘頊上都困反撼也正作扽𩑔薩扴爭巧反甲也悞忘十住斷結經下帙三卷三經七卷同帙第八卷酌上之林反沮壞上慈与反彊記上巨良反𧨏理上冝寄反冝也摸𧴵上莫胡反也未也下莫𠋫反交易也純淑市六反隧于上直遂反落也悞懽憘上火官反下許里反不猗衣綺反探籌上他含反下直由反恍忽上許徃反正作怳又火廣反又音光非蜎飛上一玄反𧑮動上而兖反携持上戶圭反提也有洷羊林反正作滛無涇同上慈露上烏故烏各二反正作惡露不淨也紺綪千見反青赤色𨱞尾上音毛髠也拘水上音俱酌也正作也萬葙息良反隊也正作廂箱二形恬泊上徒兼反下普百反拯濟上取蒸字上聲呼救也五鼎音頂第九卷蚑行上巨支反喘息上川兖反僉然上七廉反身上自宣反完也科窟上苦禾反甄陁上之人反澹泊上徒敢反下普百反靜也長跽求几反𢷋𢡠上補招反下試熾二音哂然上申忍反㘁泣上戶高反又音亦愚贑竹降火貢二反正作戅也愍梂居右反護也肋也正作救𧧷二形又音求非用憒亂上古𭔹反戢在上阻立反伊眤尼日反昵同上奢上尸耶反第十卷陁上蒲未反姓上昨木反倨生上居御反坐也從足務魄普百反六度集云暮魄飄浪上疋遙反風吹物也又音瓢志操七到反拖行上或支反正作施荊蕀居力反老秏莫報反經音義云八十日又火告反減也面側瘦反皮緩也呻吟上尸人反瘡痍音夷慊苦上苦兼反按由勞也懃也堅持意也正作謙䌠二形也未曾有經云皆由謙苦懃學是也又苦點反恨也非用係属上音計連也係属同上未曾有因緣經兩卷上卷問訊音信告也飯上戶木反窈窈一了反𭥗涉上莫報反无悉羊亮反患也憂也正作恙也悞我上七句反正作娶又或作才遇反聚也聚共也會也諸經中有作聚作聚妻是也違戾力計反恩奮求右反劇於上其𨒫反人頰居業反之榾和果反正作禍嬉戲上許之反捍不上戶按反餧師上於為反肅然上思六反可悼音導頑弊毗祭反叩頭上苦吼反活湟上戶括反下無放反更欲得也正作望山切瑳千何反治象牙也尓云骨謂之𭃄眾謂之國堺音界𠅘受上香兩反臨也向上正作亨富二形撿括古恬反頑嚚魚巾反蕳乚古眼反下以雪反宗𮁽昨木反尋𢱊力讓反瘖瘂上於今反下烏雅反裸形上戶瓦反竉受上丑壟反愛也正作寵也俎壞上慈呂反又音阻非跛瘻音漏瘡也又力朱反痀曲脊也又音縷蠻莫姧反胡虜郎古反楒攝上子孔反又音思悞屎尿上尸旨反下奴吊反慌慌火廣反攢火上子官反后輿音余鞭打上卑連反下得冷反撤骨上丑列直列二反通也達也逃突徒骨反下卷裴扇上父非步回二反國名守古瓦反六十無妻曰鰥五十無夫曰也夫聟音細儭婆上初覲反䓗䔉音筭伐樵才焦反苦惚音𢙉憂㒵也又音忽非用易上羊益反下七到反氍氀上其俱反下山菡反㲪上他盍反下得能反錦繡音秀綩綖上於遠反下以連反鵁鶄上音交下精青二音𩲓魅上於搞反下眉秘反上又音跋非廁溷戶困反耐湯上奴代反餉上式亮反遺也頻曳音申舒也悞欠呿音去正作㐸㰦也𠉱臣上蒲光反又作傍蕳栝上古眼反下古活反憔悴上才焦反下才醉反曰上音笑正作㗛戲挊音弄訢向上蘇故反告也𢙣也正作訢又音忻悞撾罸上吒革反璃椀烏管反亦作𭮓寶琬同上又音婉先苦擊反飲也正作𠿊仇恨上巨牛反沛然上普盖反酒貽丁念反酒舍也正作店酟二形鑷腹上羊頰反下方福反泅度上似由反翅脚上巨遙反正作翹磓匈上都迴直睡二反壓也鎮也亦作槌諸佛要集經兩卷上卷柰叢昨紅反沙巨右反沙同上虵上莫朗反鳥狩手右反麋鹿上羙悲反蛟龍上古肴反愧上昨三反恪苦各反謙遜蘇困反牀搨上音床下音塔徍快上音街善也又音佳吴呼為加覆𦿔上芳富反下必袂反諭諂上羊朱反下丑染反不古瓦反不殆音待懈也正作怠無𢌿音卑殃舋許恡反灰盡上呼迴反愁倉歷反正作感郭氏作私占反非依猗於綺反正作倚古多作猗𠧒匄盖割二音墟聚上丘魚反謿囈上竹交下魚祭反諸經作嘲譺五介反憒𡗚上古內反下女孝反不靜也常𠚫魚吠反翦於上子淺反愁傶倉歷反襄入上所追反正作襄無疵疾斯反亦作玼門上五按反恍惚上呼廣反下呼骨反𢗂難上巨記反稽幸朗反空印伊進反下卷邏者上音代及也正作逮𨗻可𨗻音代或作遅徒合反不斯此反遷移也毛力之反十毫也正作𣯛𣮉疇正上直由反下普必反這與上尸隻反下許陵反正作適興何顃力遂反善也法也種也此卷有八个類字七个作顃並悞也又玉篇作談塩二音並非也偏黨都朗反正作黨志七到反正作操經𧨏音義相棠宅𥝷反正作𭣜躃地上毗益反天萃音花字樣作萃華大捊音浮搥也撾此上竹花反㷿明上羊贍反嶮明上与㷿同羊贍反光也正作爓焰𤏭其華音花樹裏音里見卭伊進反𠕀菩薩瓔珞經一部十四卷上帙八卷第一卷彼音岸行上息由反脩𭰹同上𣽈首上音儒又音軟陁惒上音跂下音和此云賢擑在上阻歰反止也正作戢也又接集二音並非緾裹音果恭恪苦各反煩憒古內反拖設上失支反正施穬古猛反不猗於綺反捄濟上居右反正作救𧧷䉼度上力吊反彼音岸倮形上戶瓦反馳泆音逸俎壞上疾与反正作沮適莫上丁歷反不傶倉歷反憂也正作慼礔礰上普擊反下郎擊反山𡶤北瞢反摸𧴵上莫胡反下莫𠋫反褊狹上卑典反𢷋式