作掉字揣食上徒官反酤酒上古乎反涕出上他禮反淚也流慟徒弄反佛藏經四卷第一卷嚼咽上才雀反下一見反為𢬩扶月反挮撜上他兮反下都鄧反經上五口反下息慈反手承是陵反正作承兩渧音的又音帝非雜糅女右反如扸先擊反淳濃上常倫反糟粕上子曹反下普各反第二卷㩉上助莊反下他盍反粃粳上卑履反下苦郎反蝙蝠上布玄反下方伏反欲捕蒲故反布拖音施㘠溺上尸旨反下奴吊反輕躁子告反攣躃補益反正作躄以跨苦化反正作跨尿上尸旨反下奴吊反毀悴疾遂反佷戾上侯懇反下力計反𭜨鄀丘逆反𭜨也正作隙瘕疵上戶加反下力斯反上又加嫁二音非本用𭥗受上莫報反涉也又童墨干也援助上音院救助也下正作助也不憘音喜俎壞上慈與反又音阻非癩瘡音瘡林上助臻反洋銅上余良反焇銅也衆𡗚女孝反俠為上戶頰反憎烏故反正作惡第三卷狎習上戶甲反諸詓音法誤訶耐奴代反律媯居魔反螺字𭃄腳笑上尺之反下𥝠妙反沮壞上才與反反叛音畔背也猥木上烏罪反笑上尺之反下絮妙反第四卷呵訾音紫紫縹匹沼反正作縹遍黨上匹綿反下當朗反正作偏黨也上又音遍誤縫紩上房峯反淨浣戶管反鐵鍱音屎尿上尸旨反斷諸上徒管都管二反絶也須阤洹上相朱反中達何反下胡官反腞子上徒門反俗豖子也古猛反瘡疣于求反菩薩戒本玄奘譯序文靜邁莫芥反瀛上羊嬰反下莫瓶反大海也下又上聲沖廓上直中反惣川上則孔反宏邀上戶萌反大也下澆腰二音遮也玄奘徂朗反弜齡上而斫反下力丁反年也上又強祇二音誤軼俗上羊一反車過也或作欥辝也欥音逸遊真之人反正作真晣知上旨熱反光也漱其上所右反蕩滌也涮其上所患反洗也淤泳上羊修反下為命反淤浮也泳潛行水中也正作遊泳也上又衣居衣據二反誤韘上許規戶圭二反角錐也童子佩之下蘇協書涉二反射具也童子佩之正作而整之領反別也正作整而嬉喜之反遊也爰以上于元反於也為也創膺上楚亮反下於陵反蹄旨上徒兮反悼虛上徒到反傷也紊譯上音問亂也下音亦傳也愴神上楚亮反悽悲也痛也又初兩反恍失意貌紕傅上匹夷反謬也正作諧也戾金上力計反至也殉妙上辝𨳝反實號上是力反是也實也所旌音精表也式摽上始食反下必招反摩揭音竭國名函杖上戶南反禮云席間杖也容也尊人坐前容杖指畫處也篾以上莫結反一稔而審反年也誤三折巨衣反求也報也告也正作祈也又之舌常列二反拗也欹也誤允上直小反始也下音尹信也許也殷望亡放反一上力讓反佐也綸上以脂反下力純反正作綸也宏上戶萌反下居隨反吟味上魚今反匪替上非尾反下吐帝反喉襟居吟反衣小帶也亦懷也流澌斯義反盡也或作𤺊音西散也猥廁上烏罪反譯僚力迢反同官為正作僚親稟兵錦反受也大猷音由聊紀居里反識也記也襗辰上羊益反傳言也翻也正作譯也誤攸忘上羊修反邁也所也明琰羊染反戒文專勵力計反勸也正作勵素呾纜上蘇故反中多達反下郎闞反唐言契經摩呾多達反正作呾或云摩多羅迦或云摩得勒迦或云摩怛履迦此目之為論也忿𮑇上芳粉反下必袂反犯上于歸反背也犯法也侵也中品縓直連反繞也正作緾又七全七二反誤忿蔽必祭反嗜長上巨脂反長也老也正作耆也誤推腃證反正作勝也誤貧遺求位反乏也正作匱窣堵上蘇骨反下都古反或黜丑律反拒上于歸反下其與反慊恨上戶兼反心不平也正作嫌又苦蕇反誤法𣪴魚既反果也深生上商林反正作深不顧音故拘胝丁𡰱反廢其上方吠反止也正作廢囹圄上力丁反下牛與反刖手上魚越反截也劓鼻上魚器反刵耳上人志反倡伎上處良反於蕩徒朗反吟詠上魚今反正作吟二形又音令誤詭詐上居委反𮑇抑上必袂反下衣力反為掉徒了反嬉戲上喜之反遊也喧譁上許元反下呼瓜反紛聒上芳文反下古活反輕子告反猜阻上此才反猒皆一啖反下蒲昧反正作厭背憤怒上扶粉反堪忍上苦含反越上于歸反下于月反正作違越疲㢢蒲祭反困也忍受上人反正作忍睡眂莫賢反正作眠又匙視二音誤疾𤵜丑刃反宿病也亦作𩖊染汅烏故反正作汙綜集上子宋反㧾也菩薩戒本曇無讖譯無讖楚蔭反三藏名也正作讖沽咸上古胡反下子郎反郡名也正作藏臧二形毀呰音紫謫罰上竹革反慊恨上戶兼反又苦簟反誤笑上尺之反𢤱戾上力董反下力計反折伏上之舌反罰黜丑律反𥥛吉上徒骨反菩薩羯磨文堪耐奴代反樂嬉許記反補特伽羅此云人亦云有情亦云衆生𥧦窹上古孝反下五故反菩薩善戒經一卷緻織上直利反輕蔑莫結反笑上尺之反下私妙反嗤笑同上篤信上東毒反厚也床榻音塔應必進反服上之領反正也理也聖菩薩內戒經等十四經十四卷同帙佛説菩薩內戒經一卷頭𦜩音惱又音忽誤於俗辝欲反又音紹誤漚惒上烏侯反下胡過反或云優婆舍羅唐言善巧方便惟逯徒愛反唐言精進琉瑀力支反又音禹誤倡伎上尺良反著葌古顏反傘蓋上桑旱反姪羊一反讒擊上仕咸反或作撾捶上竹花反下之水反舄䮀上祥兩反下達何反正作象駝也下又蒲角反誤上方經作象駝是也雞犬上吉兮反畜牲上丑救丑六二反下音生羹飯上古盲反迦庇上占牙反下必至反浮溜力救反羅祁音耆馭法上魚去反摩褥內沃反正作耨痛癢羊兩反極傴上丁兮反正作低下於禹反僂也䛴語上丘倚反禁剬之世反止也正作制又專軟反割也非薜荔上蒲計反下力計反𤛅生上丑救丑六二反正作畜揵推上巨焉反下直追反蜎飛上一玄反𧑮動上而兖反不嗅許救反又七救反非蜎𧍃音飛怖懅其據反正作勮也玉篇音渠非也沾汙上音點又霑店二音恬然上徒兼反無疧丁禮反又音祇誤公嫗於遇反強上古郎反下巨兩反投身上徒侯反又之未反誤朝晡布乎反阤上蒲末反下達何反惒輪稠上戶戈反下直由反諸經作和輪調師邊布玄反正作邊俞阿上欲朱反菩薩藏經一卷十坩苦含反輾轉上知演反相次也一徒官反丸也物在手也舍利弗悔過經一卷羅音恱王舍城也澡漱所右反姪羊一反輕尺證反小廾音斗瘖啞上於今反下烏雅反須阤洹上相朱反中達何反下胡官反正作須陀蜎蜚音飛古文惟逮徒愛反此云精進勸勉音免勗也大乘三聚懺悔經一卷掉戲上徒了反能惻楚色反量度也可喜許記反文殊悔過經一卷抱怯上蒲保反正作抱又跽上音又下其几反𢤱悷上力董反下力計反自首書救反伏也自非罪也篾於上莫結反所俎慈與反壞也又音阻諛諂上羊朱反下丑染反詭侫也傲貴上五告反慢也毀呰音紫遏絶上安割反創瘢上楚莊反下步官反殃舋欣覲反罪也淡泊上徒敢反下普白反噵御上徒老反引也教也導御同上挨姓上昨木反刺棘居力反正作𣗥曚𡨋上莫紅反而炳音丙錠燎上特丁反下力燒反經音義云樹於門外曰大燭於內曰也俗暗蔽上於撿反日無光也根栽子才反係屬上古詣反琦寶上巨冝反雜香上在匝反瓌奇上古回反抑制上於力反蚑行上巨支反喘息上川兖反志七到反正作操也黠慧間瞎反正作黠佛説文殊淨律經一卷𧨏品上冝寄反結閡五愛反霩然上火郭反稽桑朗反稽低也額也低額至地故曰稽也正也典誥音告奮斯上方問反正作奮延仚丘弭丘智二反望也稟受上兵錦反僉雨上七廉反皆也踦𨄅上丘冝反下丘俱反山路也傾仰之義也巔倒上丁田反顛倒同上壞瓦上普回反褊上卑演反下其玉反促也短小也正作𢩁二形也奔走上布門反惶懅其據反懼也正作勮也矜救上居陵反愍也須蔓莫槃反陀鋡音含憔然上子消反誤窈𡨋上一了反窱深也周𢭀徐全反姿𧰟音焰義也儔延上直流反下普吉反蜎蜚音非經音義云古書飛字多作蜚也燔燎上扶反燒也下力小力笑二反燎𬉹也放火也𤢌狩上巨今反下書呪反怯懦而兖奴亂奴臥三反並訓弱也菀囿于救干六二反訾量上即斯反思也量也汙塗上烏故反正作汙也又音涴又烏戶二音非經旨也毒虺許鬼反祝術上州右之六二反所猗於綺反蛇螫呼各反惔怕上徒敢反下普白反陰蓋上於今反去聲呼恬怕上徒兼反適莫上音的沾污上丁簟反下烏故反又上霑店二音下又音烏誤瑕疵疾斯反沾汙與沾污同也清淨毗𡰱方廣經一卷遍袒上匹綿反下徒旱反暗蔽必袂反掩也正作蔽屈電音申煩惚音㤕疏薄上所魚反沈水上直林反羡香上音美好也又羊脂羊箭似箭三反誤泛無上為丙反長也遠也正作永又馮泛二音並非也久誤矣遠離力義反彼音岸㘁𡘈上胡高反下苦屋反所𧋒呵各書亦二反蠱道上公五反破拆先擊反分開也成熟音熟琉瑀力支反又音禹誤𮁼袒上之連反下徒反正作栴檀也下徒旱反誤寂調音所問經一卷須蔓莫官反瞻蔔蒲北反習緒徐與反帶系也所螫呼各始石二反庸作音容賑給上之刃反輕蔑莫結反船舫放謗二音並兩船也優婆塞五戒威儀經一卷瞋憤扶粉反若猗音倚誣謗上音無枉也來倩青性反欲螫火各反繩林上寶陵反下助莊反革蓰上古厄反下所綺反樓繤子管反鋋歿腳下鐵也正作䂎竪𢷋上硃主反下必遙反法律三昧經一卷毒羹音庚臛迂遠上為俱衣俱二反遠也曲也又音傴謗訕所姧所諫二反讇意上丑染反侫言也卑呰上匹弭反下將此反經音義作啤呲以諀訿替之也聚踧子六反迫也促也急也亦眉貌也正作蹙顣二形枝掖羊益反毫里之反正作犛如蝅昨含反作繭古典反緾裹音果曚𡨋上莫紅反諍誙音無目上莫瓶反合眼道氣去既反古文氣字又莫胡反三蔓陀陀羅菩薩經一卷頑佷上五還反下胡懇反所牽去堅反諭諂上羊朱反因坘丁禮反根也又音低正作抵又遲紙二音非此二呼也甄陀上之人反薜荔上蒲計反下力計反怛沙竭上一多達反應言怛沙阿竭阿羅訶二耶三佛馱摩訶般若云多他阿伽度阿羅訶三藐三佛陀放光經云怛薩阿竭阿羅訶三耶三佛應和尚音義云此即十號中三號也多他阿伽度此云如來阿羅訶此云應供三藐三佛陀此云正遍知也此經云怛沙竭少阿字也十善業道經一卷目眩音玄惑亂也又音縣眼花貌也喧掉上許元一下徒了反唐捐上音堂空也下音緣棄也寧殞于愍反歿也皈依上居韋反就也還也安也正作歸禮記婦人嫁曰歸卉木上許鬼許胃二反百草惣名菩薩五法懺悔經一卷枯稿苦老反乾嫉姤上自疾二音下都故反害賢曰嫉害色曰姤菩薩受齋經一卷阿蕪音無勸勉音免勗也樓亘上烏盍反下古鄧反此云光世音菩薩也即是觀世音菩薩也又按般若心經云阿哩也嚩魯枳諦濕嚩嚕胸地娑怛梅唐言聖觀自在菩薩也已上大乘律音義竟大乘論九十七部五百一十八卷五十帙大乘論音義第三之一從智度論至轉法輪經論十五帙是釋經論又從瑜伽論至破外道小乘涅槃論三十五帙是集義論德大智度論一部一百卷十帙第一帙第一卷永已上音永下音以彼音岸妃后上芳非反下戶豆反車慝女力反正作匿貿上莫候反易也下倉乎反式棄上尸力反下詰利反嫉姤上自七反下都故反唐勞上徒郎反虛也下郎刀反勤也嚶咳上於盈反下戶哀反小兒也正作嬰孩乳餔音步嵐毗上郎南反此云解脫處幼稚直利反小也嬉戲上許之反遊也術藝魚祭反正作藝揌攝上子孔反轅軸上于元反輻輞上音福下音𠕀膩酢上女利反下倉故反苦忽所戢反不骨也正作歰澀煞音六兔角上他故反龜毛上居追反遍無上必見反正作遍遍長扴爭巧反指甲也正作抓爪又三形婆蹉七何反多上具俱反弗巨久反揃扴上即淺反下爭巧反唐突上徒郎反下徒骨反衝也正作搪揬蹴踏上七六反下徒盍反伽阤上巨迦反下徒何反聚渃郎各反多人所居日聚一家獨住日落正作落也崖疧上音涯下音底下又巨支反非鞭影上卑連反長爭巧反棄悁上音棄下音緣下正作捐也又於緣反非也毀呰將此反謗也毀訾音紫阿阤音陀持啞烏雅反無咎巨又反詭名上居委反詐偽也第二卷僑尸上居妭反正作也偶浮上五口反下都勒反下正作得也得取也床卑連反𦨉陀上所姧反正作刪也掣電上尺世反又尺列反𠱜吼上呼交反正作哮咷上戶高反下徒刀反大哭聲也敷裂上芳無反散也經音義作剖裂𡶤落上布𪪺反彗星上徐醉徐嵗二反妖星也郁咿上於六反下於尸反悲也鯁噎上古杏反下於結反甄陀上之人反死券音勸撾銅上竹花反揵上音𠃵下直追反出三藏記作犍捶經音義作揵椎闍貰音世廢闕上方吠反下丘月反讖悔上楚鑒反誤漚多上烏侯反七條袈裟多漚多羅僧也魔弊必祭反正作蔽陰藏上於今反革蓰所綺反門上博計反又音翰非嬌梵上音誤牛呞音詩問訊音信懊惚音惱就杭之審反廓然上苦郭反扣門上苦吼反擊也經音義作敲苦交反門蘥音藥能勉音免于瑟所擳反蜫勒上音毗正作蜌也梵言毗勒秦言篋藏也第二十八卷內外道名作蜫盧坘維摩經作毗羅胝子是也又古魂反蟲名也非呼傳寫久誤也匿藏上苦叶反正言篋也梵言蜌勒秦言藏也蜌者古文毗字也上又女力反非第三卷所齧五結反蛇觜所卓反所五結反帶杅音盂鞞侈上步迷反下尺尓反秦言明行足也略伽上音路中巨迦反下步拜反秦言世間解上誤魔䨲奴侯反舍喃女咸反黑黷經音義作黯應和尚以黶字替之於琰反面黑子也黯於咸於減三反黑也黷音讀非也韋紐女久反偱環上似均反番息上音煩滋也息也經音義作蕃也又音播正作番刮刷所刮反覆創音瘡𢷋以上必遙反函丈上戶緘反迦阤上音伽誤下音陀尋陷音陷田力反遂𨔵直六反拘晱失染反正作睒多弊毗祭反燋焠上疾焦反下疾遂反正作憔悴治癰上直之反下於容反塗尉於貴於勿一反躍恕戶預反𤿺如上跛播二音正作簸也呵磐步官反池堓音岸鳩睒失染反劬師上具俱反崫多上具勿反長者名也亦云毱多亦云笈多虎𤝧布貌反舊迅上方問反下相俊反揚也振也烏張毛貌也正作奮奎也豫知上由慮反先也第四卷晡時上布胡反申時殖樹上市力反種也生也猶豫余慮反不定也繫音閇掩塞也又音捍誤澍大上注樹二音𤏙法上奴短反蜫盧上音毗正作人名盧持如飽布卯反憒塞上古𭔹反鴻五諫反正作鴈二形事𭞚其據反務也急也第五卷夾小上胡恰反隘也正作狹也又古洽反誤伓息上許牛反正作休郭氏音丕非也抒大上徐與時與除與三反泄也揌持上子孔反轡勒上兵媚反正作缺陋上苦穴反下郎豆反𦋺𮟯上居例反救之上居右反護也助也正作救𧧷二形又俱求二音非也純淑市六反善也翹一上巨遙反曾眴如春書閏二反動也兩𬧅市兖反兩寬苦官反兩髂間也正作髖也內倉歷反正作戚攀稱上匹姧反引也挽也亦作扳又音斑攀與稱同尺證反賜匂蓋割二音嬉戲上喜之反遊也搔擾上蘇刀反下而沼反罝九上陟利反親倉歷反叩頭上音口撾捶上竹花反下之水反命上徒活反強取也正作奪三形兜師所律反王后侯吼反頞浮上烏割反上古典反下匹貌反五步孝反正作靤又匹貌反正作皰胞二形也傭好上丑容反指擳子結反繭也正作節又阻瑟反誤縵莫盤反正作鞔又莫半反非用寶屐巨戟反正作屐而直利反眼睫子反如捲巨貪反正作拳第六卷𢪮㩉上助莊反下他盍反幃帳上于歸反下知亮反幄上烏角反下莫半反趠小渠上他豫反越也正作跳又丑孝丑角二反非膸𦜩上息委反下乃老反賈人上音古又假嫁二音坼邊上五案反下布茲反清黛音代有上息唯反𤿺婆上跛播二音𦴭寫上依字小忙角二反又三𦴭三菩提作藥反數名也下相野反醘婆上呼兮反數名呵樓數名經音義作膢字同上忮羅上祇妓二音數名也正作伎古華嚴經作祗羅新華嚴作偈羅又音至非仚盧上丘弭反瘧病上魚約反地坍苦庚反塹也虛陷也正作坑坑三形也鞾鞋上許反下戶街反頻電音身第七卷䛴語上丘倚反正作綺斷膚音夫罣得上古賣胡卦古惠三反拷刺上苦老反赴淵上芳付反下烏玄反更互乎故反今作㸦不溉古礙反如助皆反正作豺竄伏上倉亂反正作竄可觸尺玉反縹色上匹沼反陰𪾼一計反雲曀同上若電音申狹谷上戶夾反齗齒上魚斤反舌咽烏堅反樓櫓郎古反瞋上羊林反下尺真反第八卷火槽子曹反正作㷮𮛫藉上徒到反下秦昔反踐也正作蹈踖也無猗於冝於綺二反針𬉹九救二音𢱍車上音晚正作挽大𭠭苦庚反第九卷上羊林反下昌真反伯仲兄弟也仲中也須蔓莫官反當備音備𦋺𮟯上居例反滿濡而朱反秦言妙德正言𭦟殊室利唐言妙吉祥執寶卬上之十反下因進反阤陀奮人上其救反梯他兮反國名稱處上尺陵反中布古反下尺庶反中正作補龍蟠步官反狂古面反急也音義云狂者進取於善道者守節無為也希有上虛依反兩脾步米反正作髀脊上於消反下子昔反搖樹上余招余照二反動也捕上蒲故反下十居反閈門上博計博結二反䊩淀上普官芳元二反下徒見反浙米汁也正作潘澱也長跽其履反𦬔子上古敗反第十卷互有上乎故反宿上丁兮丁禮二反栁宿上力酉反萁宿上居其反奎宿上苦携反宿上所岺反宿上真忍反亢宿上古郎苦浪二反觜宿上即斯反星名穬古猛反忽所反如掩烏甘反論文自出亂者上郎唉反裸者上乎瓦反揵推上巨焉反下直追反前作揵倮形上乎瓦反灰塗上呼回反𭞚務上其據反拖酒上尸智一髑髏上徒木反下鹿頭反賣音閻藍縷上洛甘反下力主反衣弊也正作𧟋樓象廄音校舍也宿𤵜丑刃反堆庘上都回反下烏甲反正作槌壓也一云堆山押拂隧渃上直遂反下羅各反上又音遂悮𢱊上苦老反下力讓反閉繫上博計博結二反戶排步皆反木闍開戶者也論文作俳非用苦他弄反刑戮力遂反揵坘上巨焉反下直𡰱都兮二反人名此云續慝王上女力反讒之上仕咸反侫也讚也正作讒也淡然上徒濫反安也靜也經音義作侫字也黜而上丑律反退也去也以肅息六反戒也建第二帙第十一卷木杅為俱反押佛上烏甲反迸木上補諍反頭音痛聚渃曾各又首阤音陀天名芬馥上芳文反下房愊反大上胡緘反正作函又音陷誤奮名上求右反𣲙暗上彼憑反並治上音並下音持鞞恕上步兮反下書慮反餐阤上倉安反下徒何反佛名也姤都故反被創音瘡趠圍上他豫反越也正作跳又丑孝丑卓二反非垢翳上古口反月氏音支國名又精是二音𦋺上居例反阤上力計反中蒲末反下徒何反亦云離婆陀佛扴爭巧反又古八反誤遍吉上補見反普賢菩薩別名也正作遍遍二形寶璩巨魚反能躃步益反倒也鉢緣以反脣也毗紐女九反身上倉胡反古文作粗手去堅反第十二卷贈遺上才鄧反下與醉反縫衣上扶峯反針枉而蔭反正作維問訊音信告也延此上巨謹反正作近波毱巨六反徐排步皆反金叉初街反𢟅遠上余修反遠也遐也思也正作悠者𢯇一入反問訊音信問訊同上推𡊠上都回反下烏甲反疽創上七余反下又床反携輕上戶圭反輿五上羊居反共舉也作𧂐子賜反筏渡上音伐愚矇音朦溫𤏙奴管反虭利上居政反健也強也正作徑也郭氏作虬音非也摩䨲那頭反羅驃毗妙反蛇𦜩奴老反又音忽誤羅鞊去吉反梵云毗摩羅唐言無垢稱舊云淨名淨則無垢名則是稱也無適音的甄阤上之人反下徒何反怖𭞚其據反戰慓力日反正作栗又匹妙匹徑二反誤屯崘上徒門反下落昆反第十三卷姞利上巨反答昨曹作反酬也正作酢字也豪爽所兩反明也猛也互同上乎故反繾綣上去演反下去遠反不相離也一日謹慎也𡬥闍上所姦反正作制喘喘尺兖反而笑息妙反恩愛烏礙反自投音頭又之未反誤虛𡪲音寶撫然經音義作憮莫古文府二反七也失意貌也又芳武反誤長扴側巧反甲也正作爪有實音實拘絺丑知反舍利弗名也秦言大膝鐵鍱上他結反下以接反暗蔽必祭反僶𬾲上忍反下明辨反抵觸上丁札反躃地上毗益反妻汝上七細反以女人也甲胄大右反兜鍪首鎧也拘丑知反尊首名此云大膝翦扴上即淺反下爭巧反函大上乎緘反正作函折薪上先亦反破也從木讖悔上楚鑒反正作懺瞤法上奴管反四種決擇法之初也閉目上博計反瓢陀上之人反正作甄天𩬞莫姧反揌名上子孔反豪里之反淵府上烏玄反林藪蘇走反識上古瓦反所郊戶教反學也正作效又音交邑外也誤危脆上魚為反下此嵗反翕嚮上許急反謂奄忽之聞也蕩然上徒朗反夷滅上以脂反毀也滅也好櫪音歷求蔭於禁反呪願音願券要上去願反約也縵莫官反正作鞔𬧅相上市軟反眼睫音接輕泆羊一反普告上滂古反正作普𡱝甲上音西正作𡱝也似水牛豬頭一角屖甲同上虎豹補貌反虎屬也亦雄虎也寶䡬許偃反綩綖上於遠反下以然反茵蓐上音因下音辱丹枕上都安反下之審反罝上知利反下助莊反𧿵角上古狎反豪桀音竭正作桀串樂上古患反下郎各反不順音順首上苦禮反正稽無勘苦含反正作煁令嗽所右反洗口也正作漱顯現上呼典呼見二反明也正作顯顯巧言上苦卯反正作巧也第十四卷彼音岸腳踏徒盍反泍著上而反無𢗞力進反提拏女加反太子名須提秦言好愛身七亂反藏同上募人上莫故反召也求也要車上於消反勒也又於照反嬉戲上許之反遊也無𢗞力進反者上力反𮛫殺上徒到反下所八反捍之上寒案反群象音像𭸯人上力涉反手𢱍無遠反正作挽不侵七心反效之上乎孝反兔角上他故反龜毛上居追反龜毛同上長梪都管反又音豆誤龜毛上居追反正作龜二形拊之上芳武反拭口上書食反從式卬上盧盍反下一進反慧抓側巧反浴上子老反紙默上之氏反下正作墨蝦蟇遐麻二音一居追反控告上苦貢反引也告也周救經音義作賙救上之由反下居右反以財物與人也㘁咷上戶高反下徒刀反艇舟上特頂反小船也二百斛已上曰也棗林上子老反𠈟扱普姧補姧二反引取也挽也正作板又楚洽反亦通用自勉音免脫也罝陀上陟利反罝死上莫報反涉也又音墨突前也屈電音申舒也裹中上古火反自替音剃自勉音免強也勗也不肻口等反被杭之審反鞭打上卑連反下得冷丁二反考掠力讓反鞭𥮵上卑連反下楚素反正作鞭䇿羇跘上居冝反下補判反枉攬上於往反下郎敢反恨戾力計反罡𣸪上古郎反下苻逼反恨也正作愎也又扶富扶福二反又也返也履屣所綺所寄二反第十五卷佚引一反勉勵上明辨反下力世反經勸也勉苦上明辨反脫也止也正單作免字也儜兒女𥝷反因也弱也洋銅上以良反消也撓鐵上書招反正作燒也又火高奴飽奴孝三反非牀㯓上助莊反下他盍反怖𭞚求據反避猥烏回烏對二反曲也映也正作隈也又烏罪反鄙也兀樹上五骨反并國上卑政反兼也專也又平聲幾失上巨依巨既二反近也未已也蜫蟲上古魂反小蟲也苟勉上古口反下音免華鬘莫姦反淫泆上以林反下以一反不穆音目和也邪避匹益反正作僻避之音婢遠離之也日耗火告反陶作上徒刀反經音義作寶音遙洗上子老反如來子老反果名也如奈奴太反翕然上許及反㘁上戶高反下苦屋反邏羅上勒佐反詭言上居委反梨吒竹家丑家二反樹名甘之夜反誤伏慝女力反藏也又他得反𢙣也誤恍惚上火廣反下火骨反上又音光非也狂騃五駭反斷羊林反正作也又苦𥝷五耕胡經三反並非也間瓏盧紅反斐斖上敷尾反下文匪反文章美貌也又進也質姤丁故反樹名亦云波利質多嬉怡上許之反下以之反卒無上子律反終也奮發上方問反揚也正作奮也歡娛音愚適意上尸隻反樂也剋己上苦黑反下居里反棟梁上都弄反下力羊反㧾名上則孔反又音窟誤式叉上書力反六法𡰱名也此云學亦云隨順無為憒𡗚上古對反下女孝反恬淡上徒兼反下徒濫反呿提上丘迦反秦言慮室梵志名又去怯二音𩬞𩬇上息朱反下方伐反鉢杅為俱反又作釪第十六卷蜿轉上於遠反間不容間上古間反中也下古反隔也果敢上亦作惈古火反敢也勇也勝也剋也則蹶居月巨月二反倒也失腳也虎布貌反屏處上卑領毗政二反隱僻無人處奮其上方問反間閞上古反下古還反謂遞代而進身也人上時夜時亦二反𢱍滿上音脫弓也能𮊵力垂反五迮普吉反捲法上巨貟反被杭之審反燋悴上疾焦反下疾遂反膚體上音夫皮也瘦黑上所右反瘠也貴倉歷反正作戚嬰咳戶哀反正作孩𢫎子上步保反嗚嗽上屋乎反下所卓反押佛上烏甲反正作壓捲打上巨負反秋獲戶郭反𠚫也正作穫也又戶麥反誤𦋺上居例反麞鹿上之良反博𨔵直六反䪺睫上都困反下子菜反𥌽盲上於營烏耕二反下莫瓶莫耕二反心態也好貌也新婦貌也正作婪嬪叱之上尺日反黃髮音發經音義作髯汝廉反逡巡上七旬反光曜音曜昱爍上羊六反下羊略反光明也正作爚也下又尸斫反非也慳姤都故反桎梏上之日反下古沃反加璅音鎖閉繫上博計反囹圄上力丁反下魚與反含笑音笑回盻普幻反美目視也填積上徒年反伎藝魚例反𠇈人上相遷反侵害上七心反下戶蓋反奮劒上方問反侵至上七心反抑制上於力反讒賊上仕咸反拘睒音陝煏煮上皮逼反以火乾肉也諸經作脯煮上音府下之與反㑢之上魚去反第十七卷瞋音惱能勉音免箭鐵子木反等鐵天結反黑金也亦作鐵鐵二形金銀上居音反正作金分拆先擊反相乎歸反背也正作違火上子官反既揌子孔反在溷戶困反隧𢙣上直遂反正作墜稽留上吉兮反留也止也鉉繩上戶涓反挂也繫也正作懸也又胡犬反鼎耳也非論旨山𭏡五街五奇二反正作崖決結穴反斷也壞也破也又應和尚音義作胡玦反唐無此𭃄第十八卷𢱍不上音晚也足蹴七六反粘著上女廉反首伏上音獸伏罪也抒大上音序泄也除也又直與神與二反貿得上莫候反鞕打上卑連反正作鞭燒爍音落正作烙也遍多上匹連反鳩鴿上居牛反下古合反上又戶官反非雞鶩上吉兮反下莫卜反𭉨距上音觜下音巨䩕五孟反蝮蠍上芳六反下許謁反跂蜂上巨支反下芳逄反正作蚑蜂也蚓蛾上羊忍反下五何反𧏙蜋上丘羊反下力羊反螻蟻上郎侯反下牛猗反鵂鶩上音休下音木又下合作鶹音留角鵄尺脂反輕子告反正作躁㹢玃上古㸦反下俱縛反熊羆上乎弓反下彼皮反上音叨下音鐵瘧上五告反下牛約反卯生上郎管反眼𥇌音陷入也又冝作䁍音掐苦洽反目陷也俗蕩條上徒朗反下徒的反正作條也守卒子沒反獄吏也以梢所卓反誤鐵叉音叉鐵鏟初眼反正作丳鐵抓爭巧反𭺙裂上古麥反手塔也又應和尚以揵字替之居反也今冝作獲烏伯反拼度上補耕反解拆先擊反揣截上徒官反正作剸讒賊上助咸反無𦍬音姑賊上仕咸反六駮卜角反鶉鳥上市倫反咬齧上五巧反下五結反䶩掣上竹皆反下昌世昌列二反齧挽曰䶩也上又在計反非轢諸上剌落歷三音鐵巨久反如苲音責壓也庘油上烏甲反蹂場上而由而酉而呪三反成𧂐子賜反狐兔他悟反赭色上之也反堅居政反股上音古下音又正作杈如苼阻伯阻嫁二反互相上乎悟反㘁呼上戶高反下力恱反正作劣窮古瓦反呺上戶高反下苦屋反決詐上古血反詐也正作譎蘍殺上許云反下所八反享宍上普庚反下而六反熟爤上市六反下郎歎反沸灰火回反煎熬上即先反下五高反炎林上音焰下音床正作牀煮生爾上之與反下古典反生爓祥廉反湯瀹肉也䐗羊上竹魚反如㭦知革反掣𢱍上尺列反下音晚劒梢所卓反亂隧直遂反賖摩上尸遮反猛𤝈牛既反正作毅蝮蝎上芳六反下許謁反鐵棧棧上一天結反下二羊力反橛也正作杙也坐鐵棧棧從下入也以鉗巨廉反甲也忽所戢反踢突上徒郎反下徒骨反藏倉亂反顛匐上丁年反下步北反正作蹎踣沸尸旨反銅鐝巨月反頞浮上烏割反或排步皆反若巨月反若鏘七羊反發撤直列反𠇾息上許牛反噤戰上巨禁反㳌泄上戶甲反下直甲反凍相著也搒𢰥上步盲反下丑之反失上于歸反撰擇上相兖反𭥗涉上莫報反理上力條反俎割上音阻豆器名應和尚云𭃄肉几也或作葅側魚反鮓也漬其上疾賜反蔚荿上於貴於勿二反下莫候反正作茂拜已上博介反下羊里反正作拜已并而上卑政反專㩲也以䛘俱况反正作誑𮄊憐上七錦反下力田反第十九卷嚻塵上許反蔽天上必祭反神𠇈音仙無猿于願反正作援如莫真反正作夢寢二形樹頃苦菅反𢙣上毗祭反飄阤上音真下音陀兩手上力掌反餉僧上口亮反與人物也翳䨱上一計反下芳富反寬罝上苦官反下知利反不眴音舜躃地上毗益反槃上子老反下步官反麚塵上音加雄鹿也下音憂雌鹿也麀鹿上音憂正作麀粗二形也有身正作娠懷孕也鍕持上音君下亦作𨨲果蓏郎果反𮊵音瘦怯愵而斫反又奴的反非取笑音笑四淵烏玄反悼悔上徒了反動也正作掉也又音道非岐道上巨支鹿上卜各反正作也儜人上女𥝷反困弱也躃人上卑益反跛也正作躄毒甕烏貢反波蕩徒朗反嬈亂上如沼奴了二反戲也亂也弄也波蕩徒朗反如而冝所綺二反羅物竹器也正作篩也如甑子孕反炊飯瓦器也説文作籀文作鬻羅鞊丘吉反梵言毗摩羅詰唐言無垢稱燕坐上一見反蜫蟲上古魂反螺𩬩音計甄陀上之人反屯崘上徒昆反下郎昆反天鬘莫顏反第二十卷抨則上普𥝷反尺烏郭反正作蠖蜫勒上音毗誤這足上章石反始也亦發語之辝也正作適也又音彥非呼也又釋的二音亦非此二呼名第三帙第草一卷𡪲道上市日反又作實苦惚奴老反正作惱又音忽誤倒上丁田反皆攝尸涉反足遼力吊反治病也正作療也又力條反遠也誤順隨順二音𢙣法上烏各反脊上方伏反下子昔反脅勒上許劫反下正作肋尿上尸履反下奴吊反屎坑上尸履反下苦庚反餝以上書食反正作飾餝浴上子老反風筫之日反正作質眵𧩈上章移昌支二反下力遂反目汁𤁒也結聹奴頂反耳垢也涕流上他帝反鼻也正作洟唌吐上似連反口液也正作涎下他故反冝作唾上又音壇非用漏囊奴即反為灰音灰𮌨脹上匹江反下知亮反爤壞上盧歎反下懷怪反終女音必冝音棄屈電音申視眴音舜喘息上尺兖反俞重上羊朱匹然也益也𤵜病上古拜反王作疥又丑忍丑刃二反誤揩𬉹上口皆反下之石反弊暴上蒲祭反下蒲報反咽塞上烏結反下桑得反不音弆作𭜨烏各反𧑮動上如兖反蔽𢙣上蒲祭反因也𢙣也正作敝也侵尅上七心反下口得反𠈣常上郎道反正作老隨𨔵除六反須臾羊朱反扴𩬇上側巧反正爪外身上五會反正作外妻子上七西反揌觀上則孔反亂上蘇贊反下洛喚反少鹽羊廉反第草二卷如雍於容反瘡也骨幹古案反脅也莖也皮裹音果牽故上苦堅反周祥全反正作旋𭜨染上烏故反正作𢙣惡火上序全反空捲巨貟反法上安各反正作𢙣不惡烏各烏故二反也布拖守智反惠人也如救居右反正作救輕子告反動也正作躁俎壞上才與反正作沮也又音阻非略説上力斫反骨璅蘇果反洋金上以良反竹林上豬六反正作竹管從上以傾反正作營也下才用反互相上乎故反第草三卷憒濁上古對反心亂也第草四卷辝訣古穴反別也呺上戶高反下苦屋反捍挌上寒案反抵也下古客反闕擊也跳騰上徒聊反下徒登反姝媚上尺朱反下眉祕反平頞烏割反鼻也青瘀於據反黑血色烏桃他刀吐條二反取也刳腹上口乎反分掣昌世昌列二反𭺙裂上烏號反爪取摣也又經音義作居碧居縛二反腦唌序延反口液也正作涎又音堙非䪺睫子反肌膚飢夫遍除上匹綿反又音遍誤破扸先擊反疧下上竹𡰱反皮也正作胝胝三形又音祗誤懎然上所力反小怖也深千演反正作淺也誤迦上其迦反正作伽下蒲拜反路此云世間解貰多上尸制反又時夜反魔奴頭反間跱持里反獨立也躇也踞止不前也踞音荼歐樓上安侯反漚樓同上相音違考𢱊音亮冶也刑音六洗漬疾智反浸潤也漚也著跂巨逆反履屬也正作屐又巨支丘弭去智三反非呼第草五卷溉灌上古礙古氣二反下古喚反澆也豐渥烏角反厚也瘻步上力主反曲脊也正作僂也又力朱反痀蚊𭉨即纍反讖悔上楚鑒反誤囹圄上力丁反下魚舉反桎梏上之日反下古沃反杻械也蒙赦書夜反寬免也金瑣蘇果反𤏙法上奴短反驅策楚責反叛來上蒲半反奔他國也儐棄上卑刃反斥逐也危脆此嵗反淹塵上於廉反第草六卷臨坑口庚反得勉又作勉同明辨反止也脫也正作免堅著上居賢反困也強也世俗似欲反正作俗煩𬊡奴老反正作惱鞕杖上卑連反又音硬誤涕泣上他禮他帝二反目淚也正作涕或作啼音啼視眴音舜塗創音瘡大音岸爤涎上郎贊反下似延反火煮之與反亦作鬻如釜音父熟糜上市六反下美為反釀酒上女亮反醞作酒曰墾殖上口佷反下市力反耘除上于文反收獲上失由反蹂治上而由而酉而呪三反下直之反踐穀也舂磨上書容反洮沙上徒刀反下所駕反亲苦上相親反拊之上芳武反雨捲上力掌反下巨貟反推胸上直追反正作推胸也呼嘔烏侯反賊上仕咸反譖毀也調投徒俠反托也棄也正作投又音砓誤引挽音晚踏蹴上徒盍反下千六反異上居小反詐也誤罣得上胡卦反下五代反奮言上巨右反正作舊亦作奮也注文棟梁上都弄反下力羊反椽壁上直緣反秦言上疾辛反如𡪲神一反難辨蒲莧反也正作辨辦三形也啇人上手羊反又音的誤味羹古盲反竹筒徒東反煩𬊡奴老反第草七卷鞕杖上布連反擊也殖善上市力反𢛳謗上烏各反又音德誤難辨蒲莧反挑戲上又作掉同徒了反下許義反般陀上步官反呪利陀伽亦云周利盤陀此譯為小路拖𧿡上書支反下蒲末反正作施跂也佛姑名施𧿡羅以㨝先結反木也憒𡗚上古對反下女孝反心也不靜也猥也第草八卷吸風上許及反音義作吸同音吸蕀上上居力反俎壞上才與反毀也壞也正作沮又音阻非用也亦誤蜫盧坘上蒲脂反下直𡰱反下又音低長阿含云毗羅坘又云毗盧持古維摩經作毗盧持中阿舍作鞞羅增一阿含作比盧持三卷維摩經作毗羅雜阿含作毗羅低根本律作毗羅知陀羅𡰱集作倍羅胝子無垢稱經譯云無勝髮是也正作貔二形也咿羅上於耆反龍名彼音岸兵仵音五音義作伍説文五人為伍也鄭玄曰伍衆也薄也仵人姓也非用也兜佉丘迦反論文作呿國名也此云月氏月氏章移反又精紙二音蹇吃上九輦反下居𠧒反弊迦上扶夜反論文自出僧佉去迦反此云數髦𩬇上莫高反扣地上苦吼反虎𤝧補貌反虎屬廄象上居右反深㴭相後反深也滿與之反一築知六反十二部經之一名也亦云伊帝頞浮上烏割也第草九卷不挑徒了反漚樓上烏侯反頻螺洛戈反針袵而甚反織也正作絍紝二形也斐斖上妃尾反下文匪反伐上之呈反行也正作佂腳苦化反越也正作跨諸經要集作字也距一上渠舉反諸經要集作踏一菟他故反剝皮上布角反斯吒竹家反梁抨上力羊反下二同平病二音梁橫也枰獨坐板床也從木者誤也鞭影上卑連反嗽唾上所卓反羼提上初諫反語都管反羯簸上居謁反下波火反衣名第三十卷大僻蒲益反法也除也五形有大從辛者所以制其罪從口用法也正作辟也又匹尺反非也蜫蟲上古魂反小蟲也扱稱上普班布姦二反正作板下尺證反波蕩徒朗反踔上丑孝反跳也至枰平病二音獨坐板床也而呞書之反帶杅為俱反推石上他回反佛上烏甲反者上力反又作同上金翅音施鳥翼也兩闢毗益反開也立第四帙第三十一卷觚枝上古胡反枝本也雷霆特丁特頂二反疾雷也學趠他吊反越也正作跳又丑孝丑卓二反障蔽必祭反函文上戶緘反紹胄直右反胤也胤嗣也在口角口木二反羅鞊輕一反革屣所綺所寄二反𤏙法上奴管反一探居六反掫也兩手捧物也正作掬臼二形瓶甕烏貢反第三十二卷參倍上倉南反三也下蒲海反半也𭥗死上莫北莫報二反于也涉也揌相上子孔反又素來反誤多惚音惱撾罵上竹花反難阤徒何反佛弟名此言喜縵上莫槃反正作鞔妙𬧅市兖反眼睫子果反讖記上楚禁反珠璣居依反來俎疾與反又音阻止也錠光上特徑反佛名也廣徒故反脫也濟也正作度𮌨脹上匹江反下張亮反第三十三卷薩阤達何反正作陀波崘郎昆反梵云薩陀波崘唐言常啼亦云常悲禮貺許誑反賜也與也謙遜蘇困反瑱珠上之人反正作真真二形又徒年徒見他見三反誤𢪮㩉上助莊反下他盍反琦妙上巨冝反異之也正作奇也不勉音免貺也揣食上徒官反幃悵上于歸反下張亮反從心非等上之審反正作杭藏𮋅於計反甄陀上之人反下徒何反𠃵沓徒合反毀呰音紫上尺真反下乃老反懾伏上之涉反怖也伏也失常也𥗦𭫑上子容反下其俱反青礪石也音義云細礪謂之礙𥗫礛䃴治王磫𥗫治金是也正作磫𥗫也上又郭氏音總下其魚反非用也嬰姟戶來反正作孩又古來反非鉤鉺而志反正作餌病𤵜丑忍丑刃二反宿疾鵠毛上胡沃反俎壞上慈與反又音阻非導綖上徒倒反引也下相箭反縷也縫衣上苻峯反鹹土上胡緘反經音義作鹵溝渠上古侯反下其魚反經音義作溝堒應師以字替之實陵反稻畦也第三十四卷肌宍上居夷反下如六反膸𦜩上雖委反下奴老反詭説上居委反羅鞊音詰常閉音閇搔之上蘇刀反梁上力羊反下直緣反並誤閉獄上博計反挃梏上之日反下古沃反在足曰桎在手曰桔也二並誤獄卒子沒反著跂巨逆反𢭀還上序全反被裓戶戒反腳核同上又下革反果也非第卅五卷隱須上於靳反下音頂誤曾祖上子登反重也尓匹父為考父之考為王父王父之考為曾祖王父踏壞上徒盍反出系音覓細絲也如犀音西牛名捲不上巨貟反生喜音喜第三十六卷上古肴反下郎盍反大冶音野固石上音故鑄也正作錭欲拆先擊反息𢗂音忌憒𡗚上古對反下女孝反跛𨁟上普火反下五可反傾側貌也廁溷上楚事反下胡因反拯扷上取蒸字上聲呼救也助也舉也下蒲八反攞也盡也正作第三十七卷戲笑私妙反刑力竹反勢援音院助也豢要上去願反約也拏上力計反下女加反菟身上他故反正作免蜫蟲古魂反縹紫上匹沼反青黃色也正作縹瘖痾上於今反下烏雅反正作啞下又音阿誤從𬧅市軟反從脾步米反目多一竹目多迦亦云伊帝曰多伽十二分經之一也此云因緣成實論云是經因緣及經次第若此二經在過去世名曰多伽𭍲其上烏號反摣瓜取也正作擭經音義作居碧居二反也摣女加反取也以貿莫候反痿熟上於為反所衒胡犬反擊也正作繯又經音義以胃替之古犬反又胡練反目媒也非第三十八卷形兆直沼反也吉凶形謂之朕也音義云見也形也先見也二吒上女利反下竹家反此云色究竟天撮上補各反下倉活反牡勢上阻亮反有力也字從牛士分解上扶問反下胡賣反餐陀上倉安反賢劫初佛名不口等反不嬈而沼反仰射時夜時亦二反作摸莫胡反爍之上羅各反正作烙也大㕺戶高反貰夷上書制反婆羅門名自潰胡對反散也第三十九卷疪其上必至反廕也正作庇字也誤蔭者上於禁反從廣揣食上徒官反黶子上於陝反人面黑子禱林上直由反又音㨶誤電木上以世反𭷣也鞕杖上卑連反正作鞭又音硬誤隨順音順君妻七西反曾𦚧音舜目動也又相旬如春許綃三反並從目也嫉姤丁故反害賢曰嫉害色曰也娾上余林反下余玉反正作欲慌迷上火光反正作荒又火廣反誤姤懋上丁故反下其記反正作妬忌也親𮁽昨木反穢惡安故反穢音賤輕也誤如其亮反𡘽蛾上扶文反下五何反戲調徒吊反動之正作掉剬之上之世反禁也止也正作制也又都官旨兖二反誤也鞕之上卑連反擊也正作鞭揙二形有垢古口反強以上巨良反稻茅上徒到反下莫交反迦上古㸦反下丑脂反稠𥣔直利反比次上蒲蒲必二反並也次也力古瓦反手擲他的反挑也正作揥又音摘第四十卷翕鐵上許及反中玷丁忝丁念二反瑕也木㨝蘇結反字體正作揳也終卒了律反盡也既也自也正作卒廬館上力魚反下古玩反梁拄上力羊反下直主反掾㨂上直緣反下都弄反二同匹見反衆禮側八反正作禮有禮同上除扎同上斫木𭤟也無扎同上木柿也並從水一鞭卑連反駑馬上那胡反體馬也音義云駘鈍馬也駘臺怠二音也埿揣徒官反又初委丁果尺三反並非此用形第五帙第四十一卷鐵上蒲世反下他結反相于歸反揌相上子孔反皆亦音亦擁護胡故反同上毒屑先結反粖也諧𧪓上戶皆反下五口反和合也正作偶也效佛上胡教反力上始制反正作勢鞕杖上卑連反蛇𮓸許鬼反正作虺深奧烏告反𢱍車上無遠反正作挽離而設反正作熱火離相第四十二卷未勉音免脫也跳擲上徒聊反牝牡上毗忍反下莫口反雄雌也陀上蒲末反此云賢劫𮑣波果反秦言分別時節也𢱍言上音晚正作挽串樂上古患反乳餔蒲故反正作哺嬰姟戶來反始生小兒也女曰嬰男曰孩也正作孩又古來反非第四十三卷陵埠扶九反山無石曰也正作𭚖吒上女利反或云𡰱吒或云膩吒此言色究竟天宍眼上而六反第四十四卷慢恌徒了反動也正作掉挑二形也又吐條餘招二反誤寶堀苦骨反正作窟摩捫音門又莫本反𢁙有上許衣反開闢蒲益反如撅巨月反弋也正作撅橛𪲘三形又居月反擬物也誤第四十五卷脊肋上子昔反下魯得反脛上形定反下時兖反一戶屋反聶提上女輒反梁㧻上力羊反下直緣反恌慢上徒了反奮迅上方問反下私俊反寶卬因進反𤏙忍上奴管反如蔽蒲祭反困也𢙣也正作弊又補祭反掩也誤第四十六卷五迮普吉反四丈四尺八揲為一匹也正作匹鑿戶牖上在作反下羊抑反若上所姧反問訊音信告也正作訊數延普吉反正作匹第四十七卷為實神質反而笑私妙反為弊毗祭反受見上烏礙反憂悲上於牛反攝諸上始涉反海印因進反無垢古口反有疧丁禮反正作底又音祇誤燃烥音巨火也正作炬空倦巨貟反握手為也正作拳論中又作捲同音拳又音惓悮第四十八卷奪財上徒活反強取也正作奪奪也三形佛同上斫鑿上竹角反下在作反來齧五結反第四十九卷此音岸可適音釋煩惚上扶番反下奴老反論文作順惚並誤下又音忽誤第五十卷考𢱊力讓反故拖尸智反實相市一反揌攝上子孔反下書反口上烏各反又音德誤鞭杖上卑連反奮戒上求右反讖悔上楚鑒反從心阤羅上達何反𡰱卬因進反曰鐙音登怖懾之涉反翳鄣上烏計反此𢝆宅江反正作幢又直勇反誤能穿尺專反辭辨上祥慈反下平件反循道上似遵反伾息上許求反息也正作休郭音丕非也但隨上徒旱反正作但不喜音喜顛倒上丁田反可烏故反俗𮏴骨上居勤反下古沒反挽出上無遠反鎖腳上蘇果反正作鎖端第六帙第五十一卷偱身上似遵反屈電音身舒也正作伸申𢭀師上徐反正作鏇也偱身上似倫反胃胞上為貴反下匹包反正作胃脬也淡𣼩上徒甘反下於禁反並俗肪𦙽上方房二音下蘇安反脂也在腰曰肪在胃曰梁也鬲盛上古厄反黍粟上書呂反下相玉反膖脹上匹江反下知亮反青瘀於據反積血也𤢌狩上巨今反下守右反爴裂上烏號反摣爪持也又古麥反破也又經音義作居碧九縛二反骨璅蘇果反膊骨上市軟反䏶骨上步米反脊骨上子昔反臅膢上徒木反下鹿頭反鞕杖上卑連反誤腐敗上扶武反下蒲芥反攢燧上子官反下音遂尋繹羊益反理也陳也長也大也青淤於據反妖蠱上於反下羊者反鞭心上卑連反𤏙法上奴管反邏字上羅個反荼字上宅家反闍字上常者反簸字上布火反𮑣字同上馱字上徒個反又音陀賖字上手遮反呿字上去迦反哆字上丁個反又都可反大般若經作薩須施字上吐何反經本作他字大般若經作剚他嗟字上千向反放光經作蹉光讚經作蹉大般若經作蹉又子邪反誤伽字上其迦反他字上偷加反拏字上女家反頗字上普火反醝字上才何反哆上手遮反下丁可反濕尛莫火反牢堅如金剛石阿濕焱下一莫火反秦言石經音義以麼字替之是也又余贍呼聞二反並非此呼嗟字上千何反論文作嗟誤末蹉同上歌大徒個反拆竹上先擊反割也破也第五十二卷篾人上莫結反迦上古牙反下書涉反姓也此言飲先娶金上七句反取也寶屐巨逆反水音岸波崘落昆反曇無竭上徒南反唐言法勇舊譯云法來𨻩丘逆反孔也大羆彼皮反獦者上力反又音葛非無綆古杏反井索也人上莫結反大㥬音慢經本作慢𮤝失上丘月反第五十三卷診病上之忍池刃二反候脈也罣得上占卦反下五愛反若短都管反促也亦作矩城墎古霍反俗臺觀上徒來反俟待上床史反亦作俟暗蔽必袂反掩也正作蔽意觸尺玉反多阤達何反正作陀又音豕誤第五十四卷逃遁徒本反隱也去也賊冠苦候反揌相上子孔反正作惣也又蘇來反誤𭭩所立反第五十五卷憂倉歷反憂也懼也痛也正作戚戚二形第五十六卷敢餝上魚九反下施食反拯濟上取蒸字上聲呼救也助也正作拯下古文作滲子計反無垢古口反堅相上古賢反𡪲相上神一反利自上楚魚反正作初妻子上七西反床㯓音塔香莘音花給袘尸智反以物惠人也正作拖施二形也誤籌量上直由反算物數姣輸上古巧反媚不實也輸寫也讒賊上仕咸反煩惚折上扶番反中奴老反下之舌反挫也前後皆云煩惱折薄也利方上楚魚反荊蕀上居擎反下居力反𠸍私妙反𣜦引上徒老反教也引也茲心上才茲反正作慈有上許衣反第五十七卷桓因上戶官反𡬥兜上所姧反下都侯反率阤上所類所律二反下達何反亦云珊覩史多兜率陀天王名也秦言妙足亦云知足須涅奴結反障隔古厄反羅吒陟家反弓槃荼上居雄反下宅家反薜荔上蒲計反下力計反雜語上在匝反刪兜上所姧反下都侯反而上必祭反可恥耳反正作恥傍及上蒲光反邊也廣也癰疽上於容反下七余反難愈逾主反箭𨮹音的鏃也癰𭼔等上於容反中七余反下得肯反生𭟢於焰反但為上徒旱反語辝也空也徒也又音壇正作但也又七余才古二反誤春殖音食種也繁茂上扶元反下莫候反籌量上直流反安慰於貴反搗香上刀老反草上方問反所𢪛書州反吒上女利反下陟家反色究竟天名也深澗古反二嚮許兩反聲也趣求古懷反相況休誑反妖諂染反言辨音辨幽邃相遂反逾遠上羊朱反越也論文作愈古文深淵烏玄反觀煘莫列反盡也絶也正作滅第五十八卷𨐯起上博厄反兩手分也正作擘捷疾𮗿上疾反下平件反歰所立反種殖音食甄名上居延反察也免也免點也冝作摽也慍心上於運反怒也第五十九卷伊尸遮反鞞侈上蒲號反下昌紙反伽上其迦反下蒲拜反脣䀎上公悟反下母見反命上衣小反賊𭁿口候反鮮少上先淺先甸二反鄣鉾上諸亮反下莫侯反𠧒蓋割二音𠧒也求也第六十卷蠱道上公五反毒藥也兩惚上力掌反下奴老反死苦禾反不書石呵各二反彼音岸罝一上陟利反正作置經弓居𭛔反綆短上古杏反下都管反詰嘖上去吉反下爭革反經音義作譴責問訊音信完具上戶官反華鬘萎上呼爪反中莫姧反下於為反掖下污上羊益反下寒案反栁叉上於力反呪名也正作揤此論云能知他人心呪名栁叉𡰱𡰱能飛行變化呪名揵陀梨上方本作抑又𡰱是也此本剩一個𡰱字犍陀梨上巨焉反下力夷反表第七帙第六十一卷沾洽上竹廉反下乎夾反所𮤝去月反也折薄上之舌反伏也𡌚也城墎古霍反內充尺中反美也若慲音滿盈也充也又莫官反忘也誤第六十二卷病上所追楚危二反小也微也耗也誤毒螫書亦呼各二反膚𮋅上府無反下於計反𥌒上音盲下音古紅縹匹沼反薰苦頰反璁中上奴老反函上戶緘反沮壞上慈呂反渾濁上戶昆反又音混第六十三卷卒意上布損反根也始也下也舊也説文從木從丁作市字體也𡇂隨上於真反託也仍也就也緣也欲抑於力反正作抑經弓居𭛔反樂上五孝反下魚兩反揌凡上子孔反阤洹上徒何反下戶官反上又豕二音誤折上之舌反伏也堅䩕五更反正作鞕堅牢也強也誤六翮下革反鳥羽也利本謂之木跂巨逆反履也正作屐第六十四卷𡬥兜上所姧反毒泥奴兮反又奴禮反誤不汙烏故烏臥二反微習上無非反淳熟上是倫反下常六反有上許依反互相上乎故反第六十五卷作俠下甲反正作狹衆縷力主反正作縷牆𡶤上自羊反下比朋反眼瞎呼轄反二目合也𭤔有上許衣反必是上卑蜜反正作必勤苦口古反正作苦手麾許為反指也非撥布末反謫毀上博妄反下許委反𡇂緣上一真反膸𦜩音惱裹填莫瓶反暗也又田甸二音誤曰耗呼告反其上必祭反掩也覆也久劇巨逆反幹枯上古寒反正作乾漧二形又古案反莖也誤喜忘許記反又音喜喜𭜎同上泍汙上而陝反第六十六卷䇞上古談反下之夜反正作甘蔗亦名諸蔗第六十七卷柒汙上而陝反正作染也又音七誤𤻝人上女𥝷反困也弱也經弓居𭛔反燕上一見反下情歷反常𨔵直六反憂惚音惱又音忽誤輕莫結反區鉢上烏侯反物阤音陀花名顯現上呼典呼見二反閉門上博計反折無上先亦反破也分也第六十八卷彼音岸俞更上羊朱反然也新劈博厄反分開也正作擘緤緻上私列反下直利反尺蠖烏郭反第六十九卷𢙣蟲直中反懷妊而反識上古瓦反護上於勇反下乎悟反中廢上知仲反下方吠反嬈上奴了而沼二反下郎喚反惜上力進反𥊸受上他定反正作聽阿閦初六反俎壞上慈與反壞也毀也止也又音阻非鞕之上卑連反誤熾盛時正反多也明也正作盛晟第七十卷讒謗上仕咸反毀呰將此反拖與上尸智反患也偃蹇上於愋反下居輦反慠慢上五告反下莫諫反輕莫結反甫當上方武反始也我也沮壞上才與反推押上都回反下烏甲反串樂上古患反輕蔑莫結反揆則上求癸反度也莖幹古案反正第八帙第七十一卷攢𢷊上子官反下隨醉反有攢子亂反並從金憒𡗚上古對反下女孝反斷事上都亂反人上卑進反腹脹知亮反足之上將句反添也勒上兵娟反鳥尸履反恌悔上徒了反勤也又吐條余招二反誤串樂上古患反耗減上火告反下咸斬反耗減同上耗減同上須阤洹上相朱反中徒何反下乎官反不俠乎夾反隘窄也正作狹也屈電音申近音岸𤏙法上乃管反能軒古寒反正作乾爤壞上郭贊反火熟也可爛同上如𥸮音早果名也分拆先擊反隨順音順相于歸反阿鞞步迷反上蒲末反梵言阿鞞致此云不退轉四種不退轉惣名也此中第七地菩薩也第七十二卷嬈惱上奴了反弄也如實市一反踐上徒到反寶上知鄰反折薪上先亦反內息唯反𢛳人上烏各反嫡子上丁歷反正也君也第七十三卷裝治上側床反下直之反沮壞上慈與反𭤔有上喜衣反親倉歷反折薄上之舌反伏也挫也第七十四卷陋廬力魚反舍也撅釘上巨月反下丁定反有翅音施羽翼音弋效己上下孝反下居里反𢌿賤上補睥反下也又卑爾反本也非第七十五卷掉悔上徒了反庠序上似羊反審也有法度貌也戶蟲上乎古反下除中反偈食上七心反得一進反淳熟上市倫反下市六反穬古猛反折薄上之舌反摧伏也辛酸蘇官反不退音退俎壞上慈與反又音阻非淩易上力丞反下羊義反虜𢱊上郎古反下音亮又力𠰥反奪也毀訾音紫以鉗巨廉反正作鉆也娙欲上羊林反又苦𥝷五𥞩乎經三反並非餌食上人志反食也六蔽必祭反掩也正作蔽也第七十六卷須陀徒何反怖𭞚其據反杖鞭卑連反隱之忍反皮外小起也正作𤻘疹燋炷主注二音炎憔上羊贍反下子消反塗𫟚音果第七十七卷互相上乎故反調悔上徒吊反株杌上陟魚反下五骨反𮏂蕀上居迎反下居力反溝杭上古侯反下苦庚反誤卯生上郎管反漯生上始入反又他合反誤微笑上無非反下私妙反紅縹匹小反阿𨴖楚六反輕躁子告反錠光上徑反係在上古詣反徑勇上居政反相柱知主反菅草上古顏反捉綬乎管反耎軟二同如兖反親𮁽在木反第七十八卷級其上居及反輕拤音弄毀莫結反頭陀音陀輕拤音弄又音辨非抃同上輕𨇁遠上苦謗反大也遠也郭氏音橫非也曠遠同上正𤢌獸上巨今反俗勉出上音免脫也是救居右反護也助也經音義作救徑入上吉定反近也受音六之拖音施惠也第七十九卷沈沒上直林反嬈上奴了反其疧丁禮反如啞烏下反不言也魔懮而沼反亂也正作擾嬈二形又奴回反誤也彼上悲美反下五案反擁護上於勇反下乎故反沈沒上丈林反瘖啞上於今反下烏雅反拘癖補益反跛也正作躄也不苦穴反或作缺揌攝上子孔反正作惣撞擊上直絳反膸𦜩音惱希有上許依反吝惜上力進反完具音九抑制上衣力反在口角反順路上時閏反自擔都甘反推沙上他回反老耄莫報反拔如上助亮反形也正作𢪂也誤世俗祥欲反者上莫瓶反門卬音印𭜨的反皆郊下孝反學也又音交誤不伾許牛反息也正作休郭氏音伾非也希有上許衣反信上息惟反語助也豈也正作雖雖二形也空第九帙第八十一卷隨順音順有上許衣反微𠸍上無非反下私妙反白上昌亦反正作赤紅縹匹小反俎壞上才與反又音阻罝一上陟利反須臾羊朱反阿𨴖又六反壁如上匹義反逯得上徒愛反又音緑誤怯愵而所反又奴歷反非也卬可上一進反卬可同上筫如上之日反正作質也宍眼上如六反顯示上呼典反正作顯觸得上尺玉反下五愛反尸摩莫何反面側救反𮊵瘦上力垂反下所右反𮊵瘦同上轅輻上為元反下方伏反第八十二卷折薄上之舌反攝五上尸涉反羼提上初諫反此言忍辱又上聲正作羼也今不上居吟反正今也脹上方伏反下張亮反實相上市一反揌名上子孔反不奪徒活反髓𦜩音惱又音忽誤隨𨔵直六屎尿上尸履反下奴吊反救𬈀上居右反下子計反正作救濟上又音俱誤也祝術上州右反羼提上初鴈反須阤音陀奮迅上方問反下私進反能勘苦含反正作堪剬令上之世反禁也止也正作剬又都官之兖二反並非超躑池石反奪上即早反下徒活反涅涅槃二字第八十三卷俎壞上才與反又音阻鎧杖上口改反若殺音煞善魚據反正作御駕駟音四一乘四馬也掩羅上烏含反果名也正作菴穩便上烏本反被創音瘡可笑私妙反正作笑三擳子結万莖指之正作節莭二形也又阻瑟反非用也第八十四卷撾子上竹花反捶也第八十五卷鞭打上卑連反騰跳上徒登反下徒聊反輕蔑莫結反陳訴蘇故反石埠都回反煆截上都亂反打也第八十六卷柔耎音軟欲樂音洛喜也安也樂説上五孝反愛好欲慕戀五訓又五角反樂也所以恱樂於人也詳文勢呼之第八十七卷娙恚上余林反望得上無放反又音亡悕望上許依反掉慢上徒了反杻械上勑酉反下胡戒反第八十八卷無缺苦決反無隟去逆反難𣓏居蔭反又音金緣挮他兮反初桄音光為䅽古木反蒿草上古老反𠧒匂蓋割二音先余慮反恱也或作愈余主反差也第八十九卷捫摸上莫奔莫本二反下莫胡母各二反勉出上音免脫也五陰於今反去聲呼色受想行識為五第九十卷蕳擇上古眼反正作簡又古顏反誤也偱身上似遵反底上力鹽反合縵莫官反鹿𬧅市軟反兩掖羊益反方頰古挾反眼𭾰子反目毛也𡇂緣上於人反不實市一反未勉音免脫也有上許衣反割截上古褐反伈人上相遷反正作仙屳二形也有上思惟反大𮈄音舍寬免也正作赦羅鞊去吉反須阤音陀世俗似欲反迭腹上徒結反若揌子孔反垢業上古口反啫好上神利反漯性上失入反得觸尺王反不必音必利折爭巧反指甲也正作爪抓二形也𦋺上居例反密迹音迹肩膊音博指髀步米反谷第十帙第九十一卷網縵上文兩反下莫官反輪㻔都果反耳也委陀上於垂反尓匹委他美也他音陀不撓女飽反亂也右𢭀序全反鵝王上五何反怒上余林反下奴故反灰燼上呼回反下似進反但有上徒丹徒旱二反語辝也空也又疽粗二音非也豪里支反廬館上力居反下古亂反惡苟上烏各反下古口反自吠扶廢反投井上徒婁反又之未反誤豪里支反十毫曰正作釐犛二形也第九十二卷耗減上火告反下乎斬反鞭杖上卑連反𡬥迦上所姧反孆姟上於盈反下乎來反出系音覓細絲也自裹音果折薄上之舌反破折先亦反四辟補益反第九十三卷須陀音陀無垢古口反意會力恱反弱也鄙也少也正作劣上方藏作意劣玉篇音會非也廬觀上力居反下古玩反裊馬上祥兩反排門上蒲皆反熟打上市六反下得冷反故奮巨右反集𭉋私妙反不完戶宮反瘖啞上於今反下烏雅反揌説上子孔反禪毱巨六反毛丸也第九十四卷猒受上於焰反下市有反受著上烏礙反得上息惟反無顏五姧反生惚音惱𮏂蕀上居迎反下居力反攝心上尸涉反摓衣上扶峯反以針之林反竹徒東反正作筒出筒同上誤也出還曲及塌音塔寶上知鄰反須𢏏音醜陋上赤手反下郎候反羹飯上古行反下扶販反備具上皮祕反妻妾上七西反如坑口庚反正作坑如創音瘡垢上古口反下女二反灰埿上火回反下奴兮反浣之上乎管反婆蹉七何反梵志名則詰利反所剬之世反禁也止也正作制又都宮之軟二反非也𤾇術上都侯反過咎求九反過也𢙣也病也𭤔有上許衣反端政之聖反第九十五卷昆蟲直中反迂回上衣俱為俱衣宇三反遠也曲也稽留上吉兮反當也留心也考也石呼嫁反縫也無翅音施高翔音祥白𮭕何各反暗弊必祭反正作蔽又毗祭反誤第九十六卷廬觀上力魚反義息惟反目𮋅一計反豪力反反荖別上楚家反貿草上莫候反何求九反正作咎調達但怛反正作達世俗似欲反羅鞊輕吉反穿𡓜上昌專反下自羊反第九十七卷緣邊卑玄反正作邊可𭉋思妙反正作笑佛上羊忍反正作引入上摩各反正作莫薩陀波崘郎昆反薩陀秦言常波崘言幣合云常啼也毛里支反十毫為也正作躄也懾伏上之涉反蜜音博未閉音閇躊躇上直由反下直魚反影翳於計反金牒徒協反彼音岸慊恨上乎凞反又苦點反非自隧直遂反誤溝塹七𭒃反完𥤱上戶官反下郎刀反蘭楯音順安靖情井反樓櫓郎古反冷𣊵奴管反𠒎上房無反玫上莫回反下乎灰反挮𭠷上他兮反下步米反𫺺帶上干歸反正作憐勸勉音免勗也勤也強也第九十八卷綬上一進反下市古反惆悵上丑由反下丑亮反俎壞上才與反正作沮又音阻正作俎隱蔽博袂反能敝同上又毗祭反非也不市右反賣物出手也不不出手也啼哭苦屋反正作哭也試之上尸志反驗也燋悴上才焦反下才遂反上誤也何賈家亞反數也又假古二音割右脾上古遏反下毗米反金牒音牒書版曰也砵末上蘇薱反寶屑私結反米也寶因進反示導音道教也引也隱弊必袂反誤燒煆都亂反蔭覆上於反下芳富反法喜音喜謝折常列反敬也持七到反志也正作操親挨才木反第九十九卷實際上神一反𨔵之上直六反有槽音曹有頸居井反有弦音賢有批經本作掍經音義作掍同公本反轉絃者也又或作批毗結反捩轉也批音鼻誤也隱必袂反稽留上古兮反為捲音拳無泍而陕反憂喜上於牛反寙墮上羊主反勞也勞苦多惰也𭃄云器空中也亦病也正作寙又况禹反誤有乎堅反正作弦亦效上羊益反下乎教反則上郎道反正作老慊恨上乎兼反又作嫌疲捲巨眷反正作倦惓著廗祥昔反癰創上於容反下楚床反未熟市六反俎壞上慈與反又音阻亲苦上相親反正作辛𭤔有上許衣反揵推𠃵捶惶𭞚其據反世俗似欲反心牽苦堅反潦水上音老雨水也又經音義作潦郎告反淹也第一百卷經弓居𭛔反閉諸上博計博列二反𡪲相上神一反正作實如煮之與反山裏音里琉璃力支反又音禹誤雜餝上在匝反下尸食反分折先亦反𮕾檀上之然反涷𣲙上都貢反下彼陵反並徒水窒上丁吉丁結二反下力計反比丘名也富樓那耶𡰱子此云滿慈女子羅鞊音詰揌相上子孔反又音思誤漚和上烏侯反和拘舍羅唐言巧方便親𮁽才木反㧾説上才孔反又音窟誤灟盡上郎候反正作漏𦋺上居例反國名正之迦濕羅傳十地經論一部十二卷一帙第一卷序文基輿羊居反正作輿綱統上古郎反下他宋反慮上池沼反始也正也敏也開也長也正作肇肁二形也赤為上呼格反感也正作赫旭上苦禮反下許玉反輟暉上知劣反淵𤡽上烏玄反下余修反沖𭭻上直中反下助責反終泯忍反影煥大貫反豁上莫瓶反下呵各反瀛嶽上以嬰反下五角反正作瀛嶽也𡱈言上其玉反靡測上眉彼反實傒上常力反下古詣反淵上烏玄反下人朱反婆籔蘇走反婆槃豆魏言天親正言伐蘇畔度言世親也高上頂反扷英衣亰反正作英於上居隨反正作規徽縱上許韋反下子容反遐慨上戶家反下苦礙反爾上莫角反𢟅想上余修反遠也思也正作悠㓻藏上古郎反菩薩名金藏乖遼上古懷反下刀條反神協嫌頰反往烈力哲反準傍蒲浪反爰製上為元反睿哲上余稅反下知烈反𮥸神上子峻反敷道上芳無反栖照上斯號反之囿于救于六二反搜隱上所愁反不皮祕反玄杼許反星名也尓匹玄枵虛也正作拐也字體似杼神與直呂二反非也道音希三藏名菩提流支魏言道正作悕緒上側持反紫持丁反正作庭餘弓居願反亦作弮經書軸也邁俗上莫芥反淵部上一玄反肉不上亡兩反無也正作岡研攬上五賢反下郎敢反片辭上匹見反隻説上之石反拜詣上補介反正作拜遺上莫結反親紆衣俱反玄子老反正作藻飛𮋖寒案反洋音羊斖音尾測上去隨反忝廁上他念反辱也下初事反間也末莚羊然反席也敢竊千結反𥘡記上旨夷反敬也又丁兮反短也論文彼堓音岸咨請上即夷反謨也遍聞上補見反周也正作遍遍二形無閡五愛反無垢古口反勝陶許恭反正作胸懷孕以證反能泍而陝反放逸羊一反勘辨上苦含反下皮件反勘智上若言反正作堪戡椑羅上必脾反胎名也迭共上田結反更也遞也勘聞上苦含反他上其記反姤勝上丁故反望上許衣反㴎汗上而陝反下烏故反嘶字上斯兮反阿上烏各反顯示上呼典反咀嚼上慈與反下慈雀反第二卷隱蔽必祭反臺徒來反揌相上子孔反正作惣鳥疏子昔反兔角上他故反是子孔反言噵音道鳥疏音迹淳至上市倫反向時上書亮反少時也又久也正作嚮調矛而由反正作柔第三卷臥具上五過反迎送上魚亰反軓則上居痏反法也説文字樣從九又音犯誤不上羊益反罝河上陟利反蔽其上博袂反嫉姤上秦悉反下都故反死生上五家反正作牙吝惜上力進反琉瑀呂支反又音禹非也軻貝上苦何反車璩其魚反馬音惱僮蒲木反𧵤積上知呂反調柔而由反勉諸上音免脫也第四卷直心上他力反望上許依反下無放反捶朾上之水反下得冷反𦔺悔上丑耳反捕養上蒲故反惚害上奴老反下乎蓋反耶上祥嗟反下羊林反𢷋護上必招反耶淫羊林反親挨才木反侵惚上七心反下奴老反古猛反不受烏礙反胸心上許容反膺也臆也正作胸閉塞上博計博結二反熱惚上而舌反下奴老反比𡰱上蒲脂反戲𠸍私妙反三徒活反𠧒蓋割二音不𮤝去月反習氣丘既反弊𢙣上蒲祭反䛴語上丘倚反前揌音惣厚𪾼上侯口反下一計反將墜直遂反駃流上所事反又快決二音誤愛璅蘇果反閉在音閇涅上奴結反下步官反覆蔽上芳救反下必祭反摷窟上助交反又側交反誤樔窟同上侵惚侵惱置樊上陟利反下扶番反正作礬也𭧶已上之與反復置陟利反第五卷撗衣小反閇在上博計反掉沒上徒了反矛濡上而白反下而兖反上又音牟下又音𪝥並誤履水上力几反踐也正作履捫摸上莫奔莫本二反下莫乎各二反撫持也摸𢱢也蠅上無云反中莫庚反下羊陵反相貌音貌悕望上許衣反下無放反第六卷煩音惱力音世煩音惱泍上奴老反下而陝反循身上祥遵反猗覺上於綺反下古嶽反上又平聲法蠡音騾雨漬慈賜反第七卷智上徒短反荖別上楚牙反陰界上於今反去聲呼亦云蘊界牽取上去堅反心同上此火典火見二反明也𠃵竭上古安反下奇列反𮋅藏上烏計反下在郎反諸奮求右反顯示音顯繫閉音閇自謢乎故反莊音嚴卬笇上音印蠱毒上音古毒藥也戲笑音笑薗觀上為元反下古亂反華果花果二音琉瑀呂支反又音禹誤珊瑚上桑于反下戶吾反𤥭璩上尺遮反下巨魚反馬璁音惱摩瑩上莫何反下於定反第八卷靖上音寂下音淨䨱蔽必祭反溉灌上古愛反下古亂反迭㸦上徒結反下乎悟反生觸音觸熱惚上而設反下奴老反並誤惚聚上奴老反下自遇反若實音實心熱而設反啼哭苦木反阿阤音陀又尸尓反非為導音道為師所類反第九卷俎壞上自與反正作沮未勉音免為導音道第十卷𭞚事上其去反廣狹戶夾反首阤音陀西天四姓也一曰婆羅門二口剎帝利三曰吠奢四曰首陀羅方網音第十一卷濡中上而兖反亦耎根攝尸反隨𨔵同上讒倿上仕咸反下奴定反第十二卷為鬘音琉瑀留離齊輪上疾西反華鬘上音花下音放逸羊一反迭㸦上田結反下乎悟反奮迅上方問反下相俊反能勘苦含反正作堪澍大上朱句反雨聚音聚華葙音廂遍䨱上卜見反口噓許魚反𭤔有上許衣反伎藝魚例反不鴗音竭巧匠上口卯反下才亮反攢上子官反下尺專反魔𨢘火兮反梵言摩首羅此言大自在天王也聲勒菩薩所問經論等三論十卷同帙勒菩薩所問經論五卷第一卷序彼已居里反身也正作己遍私上匹綿反又音遍誤沖寄上直中反醇䣭上市倫反下以修反醨風上力支反搆捋上古豆反下盧活反蕩其上徒朗反滌也搜玄上所愁反鑒上余稅反夙成上息六反卓𮥸子峻反闡阤音陀又豕二音誤敫嘉上古吊反歌也冝作敷芳無反下音家善也處遘古豆反祥墟丘居反𧧦通上休政反自也正作詷也道不通也響蘋才遂反集也正作萃法餐倉安反萇翻上直良反下芳煩反沾神上竹廉反智古須反鋭鋒上余稅反下芳逄反𤩶素上普角反勾合上九遇反正作句理備皮祕反執筆上之十反婉而上於遠反旨上九月反而鄣音章明也正作彰畢效下教反伓功上普悲反有力也正作伾奮學上其右反𮈘融上古郎反下余戌反衆袟陳一反自𥨕冝作消惺二同息井反減也悟也序云故使元明重山不持禪慧而自崩封情執見弗假久習而自是也郭氏音作息定反有幸胡耿反遇也正作幸也又音達通也本也謶未上書慮反冀也正作庶又之若反欺也非也論文毀訾音紫𠧒蓋割二音緣觸昌玉反四魔莫何反跳躑上徒聊反下池石反定聚才句反罣得上戶卦反下五愛反路猗衣綺反第二卷遍黨上匹綿反下當朗反上又音遍誤不肻口等反煩惚音惱五陰於今反黑綖相箭反地獄名亦云黑繩劈裂上普擊反分阤音陀此言白蓮華也然有三異焉一華而未開名屈摩羅開而將落名迦摩羅處中盛時名分陀利亦云奔拏利亦云芬茶利皆一義異名也嫉姤丁故反不倉歷反誤無實慎一反挮撜上他兮反下登亘反牽舒上去堅反下手諸反毀呰音紫安罝陟利反𢁙有上許衣反指鉗巨廉反𢁙有上許衣反𧵤積上知呂反第三卷禱林上直由反穊也又都老反誤獷古猛反又音黃誤憒𡗚上古對反下女孝反不恌徒了反動也正作挑掉二形也又余招他𭛹二反誤也抵𥥛上丁禮反下陀骨反捲手上巨貟反摑打上古獲反下得冷反戲笑私妙反𦚧目上音舜正作𦚧奮眉上方問反兆火上徒義反正作地坔二形又音趙誤一葙息羊反如𭊴香左反正作鞭杖上卑達反漯地上失入反兔角上他故反蛇蝎許謁反又音曷誤麞鹿上諸羊反碓臼上都內反下巨久反雀鼠尸與反雹蕀居力反相相韋第四卷迭共上田結反勘等上苦含反正作堪戡畏𢣷音具及娙羊林反誤略有上力若反荊蕀上居迎反下居力反差別上楚加反塔𢉱明照反正作厲私吒竹加反命辨皮件反正作辨髓𦜩上息委反下奴老反佉陀上丘迦反此云可食中上知仲反下於小反第五卷彼音岸燈炷主注二音蕀刺上居力反土塊苦內反亦作凷也攢燧上子官反下音遂鹽喻上羊廉反羅邏郎個反鼓捊音浮捶也水上直林反沒也字樣作沈消阻瘦反如抲古何反各抦也批尸上卑旨反胎名也正作枇也亦云閇尸亦云椑尸亦云閇首皆一義也瑜伽論云表裏如酪未至肉時名遏部曇若已成肉仍極柔耎名閇尸也又普迷反非也大寶積經論四卷第一卷不甄居延反免也察也又音真沮壞上疾與反吝惜上力進反諂恌上音叨疑也下徒了反動也五蓋中二蓋也一貪欲二瞋恚三睡眠四掉戲五疑悔今云諂恌是疑悔掉戲二蓋也下正作挑也又祧遙二音非索鎖音鎖第二卷火五高反炒也正作熬攢成上子官反問訊音信國繼古詣反𠻸也劈地上步益反指音尺逐也第三卷腃安上尸證反正作勝離𧜜同上卑隰尸入反正作溼濕迭互上田結反下乎悟反灰聚上呼回反下自禹反惚泍上奴老反下而陝反退淨上他內反却下也亦作退退逃𡗱上徒刀反下子口反第四卷如犮苦泫反狗也逐塊苦內反𧂐宿上子賜反澀所戢反寶髻經四法憂波提舍一卷翻譯記烏萇直羊反國名也驃騎上毗妙反下巨寄反武官函勃海上步沒反鄴城上魚劫反論文洲埏上音州下音誕下正作灘水中可居曰洲水中沙堆曰灘也又音延非陂池上彼皮反縵莫官反踹䏶上市軟反下步米反頥頰上以之反下古俠反目睫音接膱狎上女利反下戶甲反踝平上戶瓦反鵝步上五何反腹脅香劫反正作脅黑黶於琰反𠸍微上私妙反笑則同上毀呰音紫額中上五挌反坑坎上苦庚反塠阜上都回反下扶久反無䩛音祕馬勒口鐵也正作轡䩛二形又毗必反非也蠡髻上郎禾反羼提上初限反虛佛地經論等三論十卷同帙佛地經論七卷第一卷揭婆上巨列反遏濕上烏割反赤蟲直中反羯雞上居謁反呾諾上多達反下奴各反緊撩上吉引反下奴達反大蟒莫朗反比拏上音妣下女加反亦云劫那第二卷永斷徒短都管二反絶也配屬上普昧反下之玉反慧上疾反𢤱悷上郎孔反下力計反不調不泍而陝反堪耐奴代反贍蒲古反正作部樹名也南洲因樹為名古經云閻浮提亦云剡浮並是也剡時染以染二反異𤍨市六反㴎淨上而陝反第三卷如鉗巨廉反免角上他故反令無上自宣反今皆作全卬境上伊逸反長梪音短又音豆非唐捐音緣補特上卜古反伽羅上巨伽反梵云補特伽羅此云人亦云數取趣亦云更求趣也眩翳上玄縣二音下於計反第四卷醍醐上音提下音胡燒燥音掃勞弊上郎刀反鑒淨上古懺反第五卷編織上卑玄反憂戚倉歷反更足將句反添也又退音退第六卷能詮七全反殉利上似俊反勇捍戶岸反相上徒禮反彼音岸第七卷分扸先擊反瑜膳上羊朱反下時戰反𣩦伽上巨陵反正作殑下巨迦反河名也潛注上自廉反金剛般若論兩卷取上補居反羼提上初限反腎攘上時忍反下而兩反腎禳同上般羅腎攘波羅蜜者即是般若波羅蜜具足翻也又而羊反持散上直之反正作持荒廢方吠反止也正作廢能斷金剛般若波羅蜜多經論頌一卷遷異上七仙反荖𣧘川兖反錯訛也秣磨上莫鉢反溜州上音緇正作淄道恪苦各反玄傘音散正作傘同館國上古亂反間廄音救堂金剛般若波羅蜜經論等五論十一卷同帙金剛般若經論三卷上卷收衣上尸由反捨筏扶發反須阤音陀中卷煩惚音惱涕淚上音體目汁也又他計反淚也冝作洟音剃鼻液也泣者必淚俱出也捫淚上文本反拭也𢁙有上許依反正作𭤔智音岸揌持上子孔反淳熟上市倫反下卷㧾持上子孔反正作揔總二形又苦骨呼骨二反非也能斷金剛般若波羅蜜多經論三卷上卷覺轅于元反遷異上七仙反蕑別上古眼反下彼列反遼落上力條反中卷塵坌步悶反汙也亦作坌婫此上匹計反配也正作媲胄族上直右反胤也國子曰胄注出上竹句朱句二反解也荖舛尺兖反配屬朱五反相連也喃陀上女咸反痾陀上烏何反貽傷上羊之反悏當上苦叶反可也快也下都浪反上又五類反非鞠理上居六反推也窮也膠柱上音交欺也下知主反草也臧否上子郎反善也下兵美反𢙣也下又方久反不也下卷覆俗音俗灰燼辝進反亦作美陀羅上徒何反親竅行𮧓反實也正作核也又戶的反窮也又音擊迫也也又苦叫反非厄音厄幽沖直中反深也分綱上音界大也正作介下古郎反在𭳮力奄反水溢貌體上居六反正作鞠巘際上魚蹇反橐籥上音託下音藥悽音妻倏忽上尸六反靉靆上音愛下音代屯雲上徒門反煥爛上呼亂反星田典反籍思上自夜反誤金剛般若波羅蜜經破取著不壞假名論兩卷上卷序睿唐上以芮反御宇于矩反幼齡力丁反夙遘上息六反下古豆反閔凶上眉殞反病也舟擑接集二音月𭡖音呂八月律管南呂十二月大呂陰也又隻月為律雙月為呂也裝縹上阻床反下匹沼反青黃白色雜也丕業上普悲反大也論文俾其上卑爾反使也有褊方伏反吉也爵命也正作福也又卑緬反非掉慢上徒了反隨眂莫賢反正作眠捫淚上文粉反拭也下卷妄上居小反沮亂上自與反鞭打上卑連反殞命上云愍反即晞許衣反曰乾也泫露上戶犬反雨渧丁歷反又丁計反非文殊師利菩薩問菩提經論兩卷辮𩬇上步犬反交織也古亦作編法蠡郎禾反迭共上田結反婆藪桑走反梵言婆藪盤豆此云天親新譯云伐蘇畔度唐言世親妙法蓮華經優波提舍一卷元魏中天笁三藏勒那摩提共僧朗等譯優波提舍楚語也此言論議謂廣解經中語也陀上步末反阿𨴖初六反驚寤上音景下音捂正作警寤也法上尸林反遠也正作深也郭氏音嫁非也𩝊糊上音提下音胡陜劣上戶夾反正作狹狹謦咳上苦頂反下苦代反習妙法蓮華經優波提舍等八論十二卷同帙妙法蓮華經優波提舍兩卷元魏北天笁三藏菩提留支共曇林等譯法蠡郎禾反淳熟上市倫反彼音岸𡄇咳上苦頂反下苦代反謂警覺之聲也嗽也經本及前論並作謦咳是也下又音孩非用勝思惟梵天所問經論四卷此上去堅反憒𡗚上古內反下女貌反人𮤝音闕愚懞莫孔反不聰利也又莫公反𣇲暗也無閡音礙以耎音軟𠧒音蓋迭共上田結反性頑五還反慳狎下甲反危脆七嵗反涅槃論一卷狹小上戶夾反隘窄也亦作狹涅槃經本有今無偈論一卷純陀上市倫反亦作淳陀也又音準西域記作準陀是也見杌五骨反樹無枝也挑衣上徒了反撰擇上宣兖反正作選僧佉去迦反此云數論熟雞音雞併在上卑政反皆也三具足經優波提舍一卷翻譯記深邃胡遂反深遠也未去規反小視也鄴城上魚劫反魏府是也又縣名也驃騎上毗妙反下巨寄反武官函海上步沒反郡名也正作渤論文畏𨒬音經歷也諸經作徑也徑又古定反非也𢌿劣上必脾反下也桃施上他條反撥也抉也雪埠音婦山無石曰阜也萇簿上直羊反足扴爭巧反指甲也正作二形也囉拏女加反肝肺芳廢反脾脂上步卑反五藏之主也忍耐奴代反正作耐臠割上力兖反罷身上彼皮反似熊色黃白頭多力能拔樹木孝經援神契曰赤羆見則姦宄自遠堅鉀音甲船舶音白海中大船大者受万斛也虎音元蕳擇上古眼反先姤都故反使卒子沒反正作卒防邏郎個反戍護上商遇反正作戍恐哧呼格反怒也正作嚇鬩二形又呼嫁反大怒也捅力上古嶽反競正作角較相撲步角反虎𤝧布貌反蛇蟒莫朗反隘陜上烏懈反下戶夬反災𦾨魚列反蟲災也式叉上尸力反此云學𠧒匂音蓋問訙音信若卑進反逐也正作若黜出反毀呰音紫中後甛徒兼反甘也構得上古候反取牛羊乳也正作穀穀蛇蝎許謁反不燥桑早反轉法輪經優波提舍一卷有翻譯記抒海上徐與神與二反𠧒匂音蓋無量壽經論一卷淤埿上於去反水濁泥也又音於下奴兮奴計二反稠濁水也遺教經論一卷貿易上莫候反墾土上苦佷反掘地上巨月反穿也媟慢上私列反狎也慢也苞藏上布交反瘕疵上戶知反下疾斯反過也經本作瑕疵鄙𮒸上悲美反下私列反不烏故烏臥二反正作涴也郭氏作烏各烏外二反非貯積上竹與反牧牛上音目察也制上兵娼反人上去堅反坑陷上苦庚反賊音禍輕子告反踔躑上孝反猿跳也冝趠丑孝他吊二反越也大步也急挫祖臥反有𪾼於計反抑入上於力反驚悟上音景戒也正作警寤黑蚖許鬼反蛇名經本作𧈭并除上卑政反正作拼併除同上悁自上音緣棄也正作捐也誤也憒𡗚上古內反下女貌反著鎧苦改反提塘上音低下音唐自勉音免癸卯歲高麗國大藏都監奉勑雕造
