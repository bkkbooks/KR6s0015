body:
  text: 漢中沙門釋可洪撰依河府方山延祚藏大乘經音義第一之十此册有二十一帙維賢尅念作聖德建名立形端表正空谷傳聲虛堂習維佛説菩薩內習六波羅蜜經等二十三經草五卷同帙佛説菩薩內習六波羅蜜經一卷羼提上初限反此云忍辱惟逮徒愛反此云精進痛癢羊兩反唐翻為受生殊音死唐翻為行色受想行識五陰也倡導上音唱引宄也猗著上於綺反依附物也正作倚也又依字猗犬名也非用又於冝反此呼非正佛説菩薩投身餓虎起塔因緣經一卷𠃵阤音陀國名又音豖誤荖摩上楚加反𪁽上扶味反下七醉反鵁鶄上音交下音精在上胡頰反正作挾俠二形也又音甲科撿上苦禾反㑢上思夜反也正作卸又音却誤𢬁他活反著凡上知略反下扶咸反卸寶衣著凡故跟投適之石反往也又釋的二音裴提上步回反又音肥斫撨才焦反又蘇條反誤卒有上倉沒反從上奴禮反可齎即西反放赦音舍免也千匹音匹國上去為反正作虧儻不上他浪反正作儻見音違尪𮊵上烏免反下力為反褰裳上去𠃵反下是章反捶胸上直追反下許容反涕泣上他禮反披拍上普皮反下音擘瞤動上如春反更蘇音蘇豪挨昨木反攢尋上子官反掘井上巨月反餉致上式尚反涕哭上徒亐反下苦木反哳螫上知列反正作蜇蜇二形也下始石反能荖楚懈反病也悲戶高反自撲步角反𦙴頰上竹主反下古協反叩頭上苦狗反哀慟徒弄反度淺上徒各反曰上音閻轄二音臰瀾郎歎反頭檀上一羊虛反淨飯王也跛躃必益反正作躄金剛三昧經兩卷上卷欣懌音亦恢廓上苦回反下苦郭反唵摩上烏感反挹彼上一入反不羇居冝反多喘川兖反滴瀝上丁歷反下六的反驚駭下騃反蹬正上音登也上也正作登二形海瀓直陵反清也下卷智導音道引也教也排諸上步皆反推也亦軍器也晈然上吉了反亦作曒措意上倉故反則括古活反𬦤跪上乎悟反一膝著地坐也正作㸦諸經作䟡䠒法常住經一卷有陰於今反去聲呼適莫上丁歷反連上去堅反逮得上法愛反三品弟子經一卷漚和上烏侯反薩藝音云貌具上戶官反懷協音叶和也蔽障上必世反條疏上徒聊反貫也下所初反理也戰栗力日反八大人覺經一卷危脆七嵗反罪藪乘走反奮惡上巨右反下烏冬反四輩經一卷質音亮除剔他的反蜎飛上於玄反𧑮動上而兖而尹二反曚𡨋上莫紅反稟受上兵錦反丞也刻繒上苦黑反下陵反戲譺魚起反欺也調也又魚記五戒二反盻睞上普幻反美目視也正作盼䀎二形也下郎代反傍視也姑章上古乎反下正作夫聟音細撾罵上竹花反調挊上徒豫反下郎貢反戲笑音笑當來變經一卷句逗音豆崱倒上士力反喜遊上許記反憒𡗚上古內反下女貌反不靜也邑傶倉歷反憂也正作悒感也傳上相全反通也遍也正作宣言屢屢中中二同力句反下一知仲反剩一個屢字也數也希言屢中是句是總下音天恍惚上呼廣反下呼骨反上又音光非用過去佛分衛經一卷任身上而甚反正作妊姝好上尺朱反戀郎告反正作貧夾音狹潺渧上士連反下丁歷反佛笑音笑并食音寺餧也古文飼字十二頭陀經一卷憒𡗚上古內反下女貌反料理上力條反正作料空靖音淨安也腹脹知向反轡勒上兵媚反裸形上戶丸反膿爛上奴冬反下郎歎反筋骨上居殷反肪膏上音方下音高腦膜上音惱下音莫洟唾上他計反淡陰上徒甘反下於禁反正作痰癊也金剛三昧本性清淨不壞不滅經一卷𮕾延上諸延反下以連反難阤音陀此圻音岸諸經作又祈銀二音𭦟阤上莫官反奮迅上方問反下私俊反正作奮迅遍袒上匹連反下徒旱反右膝音悉大伈音仙淡泊上徒敢反下普百反靜也正作憺怕也下又音薄非赫奕上呼挌反下羊益反綬上伊進反佶也説文云執政所持信也漢職曰諸王黃金橐駝印劒文曰章金印紫綬𢭀史大夫也二千石皆鋤印漢官儀曰印者因也所以虎者陽類獸之長取其威猛以伏群下龜者陰物隨時蟄藏以示臣道也下市右反綵衣也漢官儀曰綬者有所丞受所以別尊彰卑有德有業者也𡰱𧰟音焰煩惚音惱阿褥內沃反沃焳上烏酷反下即清反傷火也又或作潐音焦海中有沃潐石方三百里水灌之隨盡不濕也躡虛上女輒反岨壞上疾與反敗也正作沮也又七余床呂子余三反並非映蔽必祭反隱𦷥同上自𡶤布弘反其迹音迹甚深尸林反水厚也正深天華音花深心上失林反順勿上時刃反謹也正作慎下音物英也無也長壽王經一卷政法上之聖反暴虐上步報反下魚約反故肯音肯哽咽上古杏反下一結反辭讓上似慈反殞命上云愍反吁天上音呼又况于反非擔撨疾焦反間閞上古莧反下古還反間代也迭也轉也謂迭代穿轉而過方達於中也庸賃上余封反下女反案行園田經音義作㧦園祥俊反置邊上支義反置也止也挍命上戶孝反呈也力驗也致也又音教報也檢也好力反汝膝上之審反下辛七反殷勤上於斤反劒上去剎反墾惻上苦佷反下楚責反貪酷苦沃反虐也又酒味苦也師子月佛本生經一卷跳上上徒耶反如券音勸約也正作券也濩湯上戶郭反燒煮之與反沸屎尸旨反寒冰彼陵反亦作水俱睒尸染反不時刃反誡也正作慎也不可不慎也𢌿賤上必支反𫮺然上呼括反達空大貌也亦大閉目貌也正作豁奯二形又呼各乎各二反非也十吉祥經一卷羅音恱亦云王舍城亦云摩竭陀國挨姓上自木反上像音像長者法志妻經一卷焜煌上戶本反下戶光反撾捶上竹花反下之水反晃晃戶廣反殃舋許吝反今首音獸懺也伏罪也藏慝女力反隱也正作匿也又他得反𢙣也非曚上莫紅反下莫瓶反薩羅國王經一卷鴹隨上居謁反下祥為反上正作羯或云羯毗或云加毗或云迦毗或云迦㖫頻伽或云羯邏頻伽唐言好聲烏也隨毗二字梵言楚夏耳上又音羊傳寫反誤也盧鷀上正作鸕郎乎反下音慈水烏也長頸食魚口生子也亦云鷺絲翻上音幡飛貌也自猗於綺反倡伎上尺羊反下巨綺反溝淭上古侯反下巨魚反龜鱉上居追反下并列反魭蛇上音元下音陀正作黿鼉亦作魭鮀也欣懌音亦流瑀力支反又音禹非也窈上一了反下莫瓶反開辟毗益反法也除也或作闢字也悚然上息勇反自拊芳武反拍也頓上之領反下都因反盲聾上莫庚反下郎紅反瘖啞上於今反下烏雅反病瘦所右反瘠也無肥肉也正作瘦痠二形法滅盡經一卷俗衣上似欲反𥞩田上古莖反正作耕墾稙上苦佷反下市力反正作植也又音陟非煩燒扶幡反正作燔燔𬉹肉也宗廟熟肉曰燔也今冝作燌音焚也噓天上許魚反沒上田典反姪上羊林反下羊一反淡泊上徒敢反下普百反延萇直羊反草名蔓生似桃悲倉感反惋嘆上烏亂反驚嘆貌也厄也深大回向經一卷耎語上而兖反問訊音信頒陀洹上音須下戶官反初果名也上正作須長者女菴堤遮師子吼了義經一卷𫮺然上呼括反達大空貌也正作豁二形一𭃄智光明仙人慈心因緣不食肉經一卷闐廁上徒年反塞也加也滿也正作填置綜練上子宋反彗星上徐醉徐歲二反星也尓雅曰彗星為攙搶淮南子曰鯨魚死而彗星出許慎注云彗所以除舊布新矣白兔他故反兔王同上并命上卑政反合也攘佉上正作蠰尸亮反下丘迦反梵言蠰佉此云螺也上而羊而兩二反非樹提伽經一卷開元録云宋三藏求𮟯跋陀羅譯三紙單譯此本合開元録不寫品録中五紙三行者樹提伽下巨迦反此云火生長者金床助莊反上方本作牀踞玉几上居去反下居履反幃帳上云歸反下知亮反然柒音七奄奄音掩日無光也正作暗料理上力條反綾羅繒上力丞反下疾陵反捶鍾上直追反撩捩上力烏反下力計力結二反正作繚戾腰脊音積上方本作腰髖跛𨁟上普果反下五可反傾側貌也正作頗𩒰也上方本作婀鳥可象何二反頭額五格反正作額叵哦上普可反下五可反正作頗𩒰下亦作俄也頗𩒰醉貌也上方本作頭腦叵我字亦非用菴屋上烏含反錩錥上音昌出玉篇下音育溫器也上又經音義作應和尚以鷁字替之音烏鴿錥小釜也銼𨯤也上又郭移作履文處亮二反非也上方本作鵭錥密弆五與反物儩音賜弆儩二字出經音義樹提伽經一卷此是偽經未詳改撰人名出品次録五紙三行此本不合開元録延祚寺藏不入此偽本經也右按開元録云宋三藏求那跋陀羅譯三紙單譯此本品録亦云宋三藏求那跋陀羅譯五紙三行可洪詳閲此本是人撰偽文入在經內其經文亦被添改刪略與正本不同當藏依開元録本不入此五紙三行者今但録其文字於册內以備諸藏有此本處用矣挂著上古詁反拭體上尸力反瑤恱上音遙下方本作豐恱金牀音床踞玉几上居去反下居履反不㤿於欠反甘也不㤿不甘也此是撰經人添底字也此本云為我設拜有何不㤿眼中淚出正本云金銀幃帳出設拜眼中淚出王曰何故淚出是也此處被添兩行黤黤音掩日無光也忽也正作暗奄二形也下方本云奄奄忽忽是也又烏咸烏攬二反並非用也此亦是撰經人改作黤也斷理上力條反正作料料理同上此正也羅繒疾陵反捶鍾上直追反撩戾上力烏反正作繚下力計力結二反腰髖苦官反婀婆上烏可反下步可反軟弱貌也上正作妸𧙃二形也此亦是撰經人改作婀婆也醉客上即逐反叵我上普果反正作頗𩒰鎢錥上音烏下音育按應和尚經音義作錥亦被改作鎢蕩照上徒朗反從蕩照天下文已下有八願文並是人撰凡詞也其第八願云願我轉今身聰明如阿難常欲教十方不般於泥洹厈日據經意佛為國主説樹提長者宿曰事此願乃云聰明如阿難豈不謬乎其餘七願並皆言語凡鄙謬妄顯然達鑒英賢請詳臧否遼散上力條反羆豹上彼皮反下布貌反枷杻上音加下音丑徒八願後七行文却是正經仍文不足又從此後至未四十六行偈文一並是人撰又略十住經菩薩名入於此經內也諸明眼賢達請詳真偽焉突上丁禮反下徒骨反濡鵠上而朱反下戶反麋鹿上美悲反叢林上自紅反狐狢上戶吳反下戶各反鯉魚上力耳反天王太子辟羅經一卷僉曰上七廉反資費芳沸反繈負上居兩反負兒衣也正作襁比肩上步支反並也欣懌音亦銅之上音寺亦作食麋粥上美為反粥也眇王上笑反精好也正作妙也巧也優婆夷淨行法門經兩卷上卷枝藝上巨綺反正作技伎稟性上兵錦反受也技藝上巨綺反猗於上於綺反𮌨脹上普江反下知向反肪膏上音方下音高脾肺芳吠反肚骨上徒古反下音謂正作胃涕唾上他計反涎淚上序延反下力遂反屎尿上尸旨反下奴叫反俱眴音舜眼瞼動也亦作瞬瞚二形也目睫音接合縵莫官反正作鞔捐纖上音指傭直正丑容反正作傭腨腸上市兖反下直羊反底上力閻反盛香器也傭直上丑容反鹿市軟反下卷𣰽𭯫上具俱反下數茤反䀎賚上普幻反下郎代反美目視也正作盼睞惓起上音拳髮屈貌也正作鬈卷二形也𩬇捲同上又居兖反俎壞上疾與反壞也敗也止也正作沮也又音咀非也指胛音甲無黶於琰反不喎苦乖反不擔都甘反頰緩貌也正作胡二𤏙奴短反白繖音散𧑮動上而兖反尊𢌿必支反白傘音散與繖同也自此已前大乘經音義竟大乘律二十六部五十四卷五帙大乘律音義第二此有五帙賢菩薩地持經一部十卷一帙第一卷勘任上苦含反勝也剋也正作堪戡二形為𡆮於真反託也正作因抵捍上丁禮反下戶岸反含笑音笑問訊音信毀呰音紫農啇音傷勘耐上苦含反下奴代反憒亂上古內反頑鈍上五還反染汙上而陝反又七內反非苦觸音觸他奴老反嬈也亦作嫐亦不惚上音亦下音惱揌説上子孔反悕望上許衣反第二卷固鎧苦改反俞更上羊朱反益也下古硬反慊恨上音嫌又苦點反非訕大上所姧所諫二反若瘦所右反正作瘦障蔽必袂反能辨步莧反辨聲上備件反䛴語上丘倚反雷定二音鸜鵒上具干反下逾玉反挊舞上郎貢反下文甫反完過上戶官反第三卷黍稷上尸與反下子力反稻糧上音道下音良正作梁也𮊵瘦上力垂反下正作瘦食上徒官反師倦音拳吝法也亦作捲係心上古詣反輕躁子告反第四卷捕獵上蒲悟反羅上竹孝反車輿音餘車也又音預非掉動上徒了反涕唾上他帝反嗤笑上尺之反下私妙反孤焭巨營反無兄弟商賈音古䪺施上都困反䪺施同上塵坌步悶反式叉上尸力反六法𡰱名喪失上桑浪反罰黜丑律反恬靜止徒兼反優戚倉歷反躃者上必益反跛也正作躄悼悔上徒了反正作掉輕侮音武慢也𮁽姓上自木反賑給上之刃反酬和上市由反嗤𠸍上尺之反下私妙反下又音美非戲挊音弄第五卷長巨几反非效戶孝反謫罰上知革反嬉戲上許之反慚耻丑耳反辱也字樣作恥𢤱戾上郎董反下郎計反𧯞諍上都豆反競也爭也正作鬪門二形也説文云字從兩刃相向也突吉上徒骨反第六卷歰所反臥上助莊反下五過反不緩上戶管反泍汙上而陝反殷勤上於斤反不惓也計詨古孝反考量也正作挍也又交孝效三音並非也謢精進上乎悟反正作護缺漏上告決反飢饉巨吝反尓雅云穀不熟為飢𬞞不熟為也水陸音六迷醉子遂反為惡音𢙣共辨上尸日反下平件反離一上力義反可喜許記反正作喜第七卷問訊音信不子告反𢌿賤上必脾反下也亦鼻羞𦔺上息由反下丑耳反成熟市六反但是上徒旱反正作但輕薨莫結反頻子六反正作蹙不尺之反彼𮤝丘月反圮䪺上皮美反諂曲上丑染反下丘玉反拉捍上丁禮反下戶岸反拒也亦作分父上方文反正作分道分扶問反成熟市六反揣上徒官反下尺沼反方上苦卯反正作巧但言上徒旱反拖設上失支反正作施市肆上時止反下司自反官爵即削反正作爵捶打上之水反呵嘖音責燕哩上一見反吉眤𡰱日反㗩波上蘇急反分齋自詣反齊也限也正作齊復次上房福反下七四反畢竟上卑吉反第八卷亲苦上相津反拖設上失支反首阤音陀西天四姓之一也離垢上力義反下古口反戲𠸍音笑吝惜上力進反隨拖尸智反惚害上奴老反下戶蓋反集聚音聚第九卷逯得上徒愛反比𡰱上音毗律也危脆七歲反皮鄣諸亮反正作障膚鄣上府無反骨鄣上古忽反説文云骨者肉之核也身也顯識論云又有身識者我見所覆此識為我見貪愛所覆故受六趣生此識為生死身若有此識即有身識此識𠰥盡則生死身盡我見生一𭃄肉惑貪愛生一𭃄皮惑故有生死身𠰥離愛我見即無皮肉煩惱若無皮肉煩惱即無三界身是故身識受生死也經意謂皮喻貪愛膚喻我見骨喻識也識者即阿陀𮟯識也謂根本識也云阿陀𮟯識甚深細一𭃄種子如瀑流我於凡流不開演恐彼分別執為我是也第十卷迭相上曰結反料理上力條反師惓音拳握吝惜也亦作捲傭足上田容反𬧅踢上市軟反下直羊反肩頸居郢巨成二反缺骨上苦決反身膚丑容反頰車上古叶反下瞬音舜抓指上爭巧反兩䏶步米反兩捥烏亂反正作腕掔兩股音古兩臀徒門反兩圓或作圜同于拳反天體也核也𦓏也正言𦓏避俗諱故作圓也𦓏戶官反兩斷魚斤反正作斷兩必進反𬧅直羊反正作腸也團光上于拳反又作圓光是也眼睫音接法蠡郎禾反一具甲蟲也伽馱上巨迦反下徒個反䪺得上都困反正作䪺突吉上徒骨反羅縠戶屋反尅菩薩善戒經等二經十卷同帙菩薩善戒經九卷第一卷病瘦音瘦五陰於今反離陰上力至反下同上第二卷朾割上得冷反𭭩渭上所立反下戶八反永失上于丙反軍𧙿力與反正作旅𢬜二形第三卷無𢡼下而兖反髂貝上苦何反童齓初覲反無貌戶官反全也誤器上戶江反正作瓨也又音杜懶上郎但反下堂果反摩夷律云知摩夷者善於訓導宰任玄網也坑塪苦感反彼音岸第四卷𭜨𡨟胡蓋反因同上正作害也真實神日反病所右反正作瘦𭜨心上烏各反喪失上桑浪反惚亂上奴老反下盧喚反張巨亮反捕上薄故反下力反形音六刀槊所卓反投淵上徒侯反下一玄反正作投淵也既布卯反𨈦落上才句反𮕾阤上之連反下徒何反使上楚責反正作策𥮵使同上詃賣上古犬反誘也承匝上市陵反下冝亰反痤床座字也無息由反耻也正作羞俾面上匹米反正作䫌懅務上其據反下無付反正作勮務也根上五口反中絲音司一蝅為忽十忽為也第五卷謫罰上吒革反下煩月反手捲音拳輕躁子告反寂上息由反正作修修二形盲𥌒音古躃者上補益反跛攣也正作躄也不笑音笑縫衣上扶峯反紩也浣濯上戶管反下直角反種𮁽昨木反俎壞上才與反壞也毀也正作沮又音阻濡心上而兖反不救居右反又俱求二音非也第六卷能拖尸智反冗旱上苦浪反語上而兖反解先擊反又丑挌反非也解折同上穬古猛反呰毀上將此反鄰比音毗並也又妣鼻二音輔也近也一綖音線獷古猛反輕蔑莫結反掉悔上徒了反第七卷鉾矟上莫侯反下所卓反救解上居右反俗羈上居冝反鹿勉他故反小獸名也又音免第八卷耽樂上都含反嬉戲上喜之反廁填音田塞也滿也危脆此嵗反惱垢古口反正作垢能淹於廉反正作淹也塵埃烏開反者膚音夫如前祑廣釋第九卷傭滿上丑容反縵莫槃反傭腸上丑容反中市軟反下直良反身膚丑容反直也正作傭傭二形及上苦官反正作髖二膊市軟反脣丘魚反額上上五挌反兩𮌋楚懈反衣也正作𮜑滿上丑容反蠡音上郎禾反壽於小反氀褐上力朱反下正作若眴音舜淨業障經一卷殞命上云愍反蓋纏音緾軛上烏革反暗冥莫瓶反正作未適丁歷反從也又釋隻二音嫁也往也𮊵