body:
  text: 漢中沙門釋可洪撰依河府方山延祚藏大乘論音義第三之二此冊有三十一帙𦗟禍因惡積福緣善慶尺𤩹非寶寸陰是𥪰資父事君曰嚴與敬孝當竭力忠則𦗟瑜伽師地論一部一百卷十帙大唐三藏玄奘譯梁代真諦者名十七地論真諦只翻得五卷緣礙遂輟其論亦不存矣第一帙第一卷玄奘自朗反三藏名嗢柁上烏沒反下徒可反古譯云鬱陀那唐言惣攝也呬多上許至反定名三摩呬多唐言等引即十七地中第六地名也十七地者一五識相應地二意地三有尋有伺地四無尋伺地五無尋無伺地六三摩呬多地七非三摩呬多地入有心地九無心地十聞所成地十一思所成地十二修所成地十三聲聞地十四獨覺地十五菩薩地十六有餘依地十七無餘依地是名十七地也俳戲上步皆反喧聲上許元反應舐音氏應吮序兖反歰性上所戢反癢悶黏上羊兩反下女廉反若鞭五孟反亦作硬若䎡音軟若𤌢奴短反掉舉上徒了反串習上古患反捶打上之水反用上步𪪺反具闕音闕懸覆芳福倒反也紛亂上芳文反捫摸上音門下音莫翻精上芳煩反下正作睛咀沫上自與反嚼也桷力上古嶽反如稱尺證反低𭥦五郎反正作昂黑𦏌奴侯反胡羊也喜樂上許記反下五孝反嬉戲上許之反遊也相貌音㒵癭鬼上於井反熱癊於禁反杇爤郎歎反宗葉羊妾反蘆荻徒的反一𤁷音的生上徒官反羯羅灆上居謁反下郎甘反賴邪羊嗟反第八識名阿賴邪也又語辝之未也問辝也又似嗟反邪僻不正也此字一躰兩呼臨時看文勢呼之也第二卷遏部曇上烏割反下徒南反閉尸上博計反鍵南上巨偃反佉上尸遮反下去迦反內稀音希灰鹽音閻稀鮮息淺反黑黯烏檻反或癬息淺反𤵇癩上音介下賴剌二音跳躑上徒聊反下持石反宴會上於見反粟稗上息玉反下步拜反箱篋苦叶反蹎僵上丁年反下居羊反殆盡上徒乃反殞沒上云愍反𨦣利上余稅反一磔知格反枯槁苦老反風飈音摽吒迦上陟挌反別本作矺陟𮧓反山名毗那吒迦也又陟俹反非呼朅達上丘列反車葙息羊反正作箱黳羅葉上烏兮反下以妾反從廣上即容反牝象上毗忍反捋蓮上郎活反喜見上許記反沠流上匹賣反𣩦伽上巨陵反下巨迦反上正作殑修其上徐倫反拉未上郎合反無糠音康無𥝖戶沒反糏也亦作麧䫃䀎普幻反又音麵訶呰音紫戍陀上啇注反西天四姓中之一也一者婆羅門此云淨行二者𠛴帝利此云曰主王種三者汱合此云啇賈四者戍陀羅此云農人名也稍㿲丘冝反魚鱉并列反迦卒子沒反恆𠛴上多達反正作怛剌多上郎達阿笈巨劫巨立二反發憤扶吻反破苦角反鵝上五何反剖胎上普口反蟲蝎許羯反又音曷非也飛蛾五何反豐稔而審反𨚎肆上音底下音四瑩飾音識僞升都口反僞稱音稱僞函音咸迫許劫反正作愶棰打上之水反下得冷丁二反禁閉上居蔭反下必計反驅上丘愚反下卑進反槗誑上居小反陷逗音豆陷沒也逗導引也勤策楚責反錮輪上徒東反正作銅字耄熟上莫報反嬉戲上許之反啇賈音古旌姓上自木反正作族盧衫所銜反崽拏上所皆反下女加反沙邪羊嗟反沙䫂多可反盧𨭝所拜反驚駭戶騃反警悟上居影反咀味上自與反雜糅女右反燒爛郎歎反燥暑上桑老反混濁上戶昆反第三卷三處尺與反色邪善嗟反分沜音判散也冝作㭊先擊反兮也㸦不上呼悟反孔隟丘𨒫反土塊苦內反諳悉上烏含反問訊音信耽嗜上都合反下神至反煆業上都亂反等鼓音古罡等鼓上古郎反下音古正作鼓宰堵魯上蘇骨反中都古反下郎古反香名麝香上時夜市赤二反䛧羅上莫計反香名洟香上他計反淤埿上於去反下奴兮反粳稻音道羶味上失然反可嚼自雀反𠇾愈上許牛反下余主反蕩滌上徒朗反下徒的反搦觸上女卓女宅二反揉觸上而由而呪二反蛇蠍許謁反堅鞭五更反正作鞕暖觸上奴短反跳墮上徒聊反牀坐上助㽵反機登上居履反下合作凳都鄧反臺戶浪反正作笐冝作𮂱之審反屢觀上力句反𢿘𢿘所卓反第四卷一皰匹㒵反喝哳詀上烏介中竹轄反下竹咸反俱舍論作頞哳吒諸經並作阿吒吒地獄受苦之聲也上又應和尚作呼割反非也臛臛凡上二呼各反下一扶嚴反緑豆上力玉反亦云採菽即目連也中上知仲反下於小反匱乏上巨位反躃地上步益反繩拼北耕反若鑿音昨若𣃆音卓若剜烏官反𦏌頭上奴侯反𦍞頭上丁兮反䥫敖五告反正作鏊鐵串初眼反正作丳貫之上古丸反反覆上芳煩反下芳福反推捧上直追反下步講也䥫串初眼反兩音博骨璅音鎖䥫箕居之反簸揃上布果反下即淺反䥫鉆巨廉反咽喉上於堅反下戶鈎反洋銅上音羊正作煬煻煨上徒郎反下烏回反娘矩上而羊反此云糞尿蟲也亦云針口下俱禹反蟲上又女羊反亦云攘黑梨力夷反正作䵩揸掣上爭加反下尺世反脊𦛗上音積下音呂䥫𭪿即委反探喙上音貪下音卓索羂古犬反卷縮上巨貟反下所六反皰潰上普㒵反下戶內反青瘀於去反鞭撻上卑連反下他達反灾炭上子才反下作烖災針口上之林反頸癭上經井反下於井反焰莫顏反正作欽溺奴吊反舊上莫顏反下巨右反萎悴上於為反下自遂反偃臥上於𭞽反陵蔑目結反悚栗上息勇反下力日反殞歿上云愍反下莫忽反奮戈上方問反綺飾音識窗牗音酉綺𬫉下田殿二音以寶飾器也正作鈿車輅音路輦輿上力蹇反下以諸反閒飾音餝卬伊信反高徒頂反娛樂上牛俱反下郎各反稻上音庚下音道而獲戶郭反規摸上居隨反下莫乎反宏壯上戶萌反下阻狀反繢車上戶內反𭭩所戢反鼓桑告反談謔許約反第五卷推打上他回反築踏上知六反下徒盍反劫奪上居業反下徒活反𤵇癩上古拜反嫁娶音趣欻然上許勿反嬈心上奴了反殟拖上烏沒反下徒可反羈遊上居冝反第六卷亂上居小反如𠙰烏貢反葂角上他故反正作免又奴侯反免子也愚稚直利反策發上楚責反陶師上徒刀反燒瓦竇如鎌音廉漸扸先的反第七卷祠中上似慈反能祀音似惡劫上烏各反攪亂上居小反卒起上倉沒反颯然上桑合反𮕱悴自遂反機疾反殑伽上巨陵反下巨迦反薄蝕上音博下音食第草上莫交反滿瓮烏貢反餉佉上尸亮反第八卷流軛烏𮧓反車槅反𨓤失上他內反解釋上古雅反閞也釋義也吳音也又古買反講也揌句上子孔反捃多上居運反拾也又居蘊反亦叨餮上音叨下音鐵適事上音釋往也嫁也亦作嫡舅姑上巨久反竊相上七結反妻妾上七西反女不娉自嫁曰妾禮記云娉則為妻奔則為妾也黜責上律反毒螫尸亦呼各二反獷音礦挾瞋上戶頰反歌笑私妙反耗呼告反猥法上烏悔反第九卷捕鳥上蒲悟反罝㝹上子邪反下他故反魁膾上苦回反下古外反讒㓨上士成反下亦作諫猶豫余反猶預同上𮕾荼上之然反下宅加反卜羯上布木反下居謁反亦云補羯娑此云除糞擔死尸等鄙穢種類馳騁丑井反洟淚上他計反第十卷褶云上之反緩上戶管反下側廋反黑黶於琰反脊傴於禹反喘嗽上尺兖反下桑奏反僂前上力主反慿據上皮陵反依又皮孕反亦作憑也杖策楚責反亦作捒㒬上烏光反下力垂反腹冗玄决反無𮤝丘月反縱𮤝上子用反下丘月反滅上自宣反分同上更㸦音護苦㸦五加反如炷主炷二音如膏音高𭥲也可以然燈也今論意但是油惣名為膏禍第二帙第十一卷呬多上許至反嗢拖上烏沒反下徒可反揌摽上子孔反下必遙反掉舉上徒了反動也猜問上倉才反疑也笑睇徒帝反青瘀於去反薵慮上直由反算也正作籌也啞啞烏𮧓反笑聲擛上彐余反下步乎反䫃䀎普幻反又音麵萎悴上於垂反蔫也下疾遂反衰也悎悟上古孝反曉也正作覺寤前後多作覺悟並同此呼憒丙上古內反下女㒵反問苦血反策心上楚責反狹小上戶夾反第十二卷仚耶上丘智反𮊵劣上力垂反正作羸也隱𦿔必祭反正作蔽瓶瓮步門反亦作盆隱弊必祭反正作蔽隱蔽同上此正不五郎反尺鷃烏鴈反雀屬也急捉持尺鷃鳥者謂如人雀緊則死𢢔則失喻修行緩急也聰睿余苪反蚌蛤上步講反下古合反浴徒官反津𧸐女二反間隟丘𨒫反嗢鉢羅上烏沒反亦云優鉢羅此云青蓮花利上自反堅緻直利反荏苒上而審反下而陝反因偱也擾動上而沼反第十三卷患上古患反䎡中上而兖反本不勝未也蕩塵上徒朗反陶練上徒刀反燒也下亦作煉鍊除垢音狗𮤝輕上丘月反梗歰上古杏反下所戢反𮤝輕上丘月反故同上賴邪上郎太反下羊嗟反怛纜上多達反下郎暫反此云線亦云契經舊云修多羅又云修妬路也塢波索迦上烏古反梵語也此云近事男謂佛五戒弟子也舊云優婆塞耽著上都南反下直略反第十四卷憘樂上許里反𤌢性上奴短反𡖉上郎管反下苦角反頞部上烏割反閉尸上必計反鍵南上乾件二音胎至三七日時如疑酪名鍵南舊云伽那善軛烏革反悼𢢔上徒了反正作掉輕蔑目結反正䇿楚責反慳妬弊上苦間反中都故反下必祭反掩覆也誤劣上戶夾反下作狹狹第十五卷戲笑上許義反倡女上尺羊反耽嗜神利反發憤扶吻反輕懱莫結反相狀仕向反形㒵也目眩玄縣二音惛懵上呼昆反下莫貢反迷亂也正作惛懵也下又莫鄧反悶也悶醉即遂反楒名上子孔反結捲巨貟反握手也正作拳也又居轉反𠬧衣也又去貟反𭃡𭃄正角犎音封輕躁子告反妍美上五堅反而爭廋反聰余苪反嬉戲上許之反下許義反是蛇市遮反嘶聲上先兮反哮吼上火交反咆勃上步交反下步沒反青翠七遂反目上𡨋眠二音合眼也蹎上丁年反下巨月反顯不音視正作禾又巨支反非鄙俚上悲美反下力耳反獷音礦謇吃上居輦反敦肅上都昆反下息六反饞速上初銜反氣欲盡㒵語急也非次而言也又助銜仕鑒倉陷三反亦作儳也過隟去𨒫反亦作而𨓤音退竦肩上息勇反敬立之㒵也國語云竦善揤𢙣又冝愯音竦懼也倡穢上尺羊反不遜孫困反順也種族自木反亂上居小反根栽子才反估上尸羊反下正作賈音古白虎通曰居賣曰賈通財曰𧶜𧶜者傷也以利傷義故名曰傷也防𮟯上扶妄反下奴個反此言女㓨繡裁縫等業也第十六卷𨓤屈上他內反亦作𨑧之溼尸入反之𤌢奴短反燬之上許委反吳人云火也亦火盛也亦作燒𤌋飄之鼓上匹遙反下公五反𠙰之上烏貢反亦瓮亭邏郎個反瓮甕上步門反互相上呼悟反池沠匹賣反無虧去隨反也少也捐也瘡皰匹㒵步㒵二反親昵女日反蟒毒上莫朗反善聽他定反待也許也耳採聲又察獄有王聽以求民情一日聽辝言不真則繁二曰辨色顏色不真則赤三日察氣不真則喘四日視目不真則動五日觀心不真則言語倒錯性怯也又音聽酤酒上古乎反眀琰羊陝反貽則上與之反篾爾上莫結反庶幾上尸預反幸也下居依反兾也此行四字出論後記第十七卷詭現上居委反殞沒上云愍反尤于求反過也嗟也多也𨓝相上徒禮反耽若上都南反下力進反諧偶上戶皆反下五口反諧偶謂和合也骨瑣音鎖第十八卷戍達上尸遇也企邪去弭去智二反下以嗟反梵云何僧企邪此云無𢿘古經云阿僧祇唐捐音緣唐捐謂虛弃也斗稱函上都口反中尺證反下戶緘反陵目結反士上人朱反善也柔也碩德也正作儒也下助史反人善稱也論語子貢問曰何如斯可謂之士矣夫子日行已有耻使於四方不辱君命可謂士矣周禮曰上士三命中士壽命下士一命其不命之士即府吏屬之毛豎殊主反亦作堅諾瞿上奴冬反稼穡上音嫁下音色種曰稼𣫍曰積也𧆞豹上呼古反山獸之君正作虎淮南謂之烏瓶江南淮楚謂之李耳風俗通云本南郡中廬李耳化為虎讒耳廟諱故今作虎也下卜㒵反凶猾戶八反竊劫上七結反抄虜上楚交反下郎古反摩魯迦梵言也此云藤類𦽦生繞樹至死者也窬上去隨反下以朱反母邑上莫口反婦人惣名曰母也字樣作母內兩點像乳也下於急反大威德陀羅𡰱經云母村注云梵名母村此名婦人是也有作母色者非也亦誤挫辱上子臥反楚撻他達反雞豬上吉兮反下竹余反傭俗上音容常也經音義作庸也生聾郎紅反從生不聞曰生聾從生無目曰生音生啞亦然生啞烏雅反不解語也或癬息淺反翹勇上巨堯反商賈音古封薑居羊反克伏上苦黑反能也勝也第十九卷遊泛芳梵反為墉音容城也甎石上之緣反繩絍而反織也又而林經音義作女心反亦作䋻自苦角反駛流上所事反疾也正作駛駛二形此字經論中極多並同此呼之也又快决二音良馬也非此呼之誤腥𬛓上先丁反下蘇万反屢以上力遇反翱翔上五高反下序羊反高飛也飛而不動翅曰翔也踰𡓜塹上羊朱反中疾羊反下七㷔反垣𡓜上于元反下正作牆四軛音厄義如論釋蠲除上居玄反淪墜上力旬反沒也左道上子可反下也逆也謂不順正道為左也能餐倉安反食也正作餐橋設上居小反依僅巨吝反波羅羊然反正作延漏泄私列反毒蜿市遮反正作蛇殖沒上云愍反正作殞毒蛇市遮反所𧍷呼各反劬勞上具俱反勤也亦作𠣪第二十卷達須相朱反大般若經作達絮言此等人識佛法不能堅固修行也夢戾車上目結反中力計反下尺遮反此云樂垢穢人謂此人等全不識佛法頑嚚上五還反下莫巾反春秋傳曰心不測德義之義經為頑愚也瘖啞上於今反傲五告反縵緩上莫鴈反下戶管反沈沒上直林反蔑莫結反倡伎上尺羊反下巨綺反歡娛牛俱反悼逸上徒了反正作掉呵卑進反缺犯上苦血反𮤝沙上丘月反塢波柁邪上一烏古反上三徒可反下一以嗟反此云親教師阿遮利邪下音耶此云䡄範師古譯經云阿闍梨談謔許約反戲也動上子告反正作躁喧逸上許元反灾癘力世反溉灌上古代居氣二反因第三帙第二十一卷嗢拖上烏沒反下徒可反蔑戾上莫結反耽著上都南反頑騃五矮反瘖啞上於今反下烏雅反悎窹上古孝反下五故反仚邪上丘弭反下以嗟反勞策初責反驅也勵志也漏泄私列反又音曳倡蕩上尺羊尺下堂郎反洗濯直反又音掉僧伽此云重復也從九條乃至二十五條之惣名也三衣中最上者也亦云僧伽梨草子賜反積也正作𧂐林藪蘇走反掉舉上條了反蝸牛上苟花古脾二反螺屬嚴酢上魚缺反下倉故反醋味厚也正釅醋融練上余戎反輕蔑目結反閒隟去𨒫反壁孔也正作隟桌二形第二十二卷蕩鉢上大朗反懶隋惰上一郎旱反下二大果反詐上九小反勃步沒反卉木上許鬼許貴二反俳戲上步皆反㗛歡上私妙反飄揚上匹遙反下以良反上又音瓢疾風芬馥上芳文反下荷福反逝上衣小反第二十三卷應策又責反咀嚼上才與反下才雀反涎液上序延反下以益反痤上於容反下在戈反疥癩上皆拜反下來達反疽丁上七余反疨嗽上許牙反下蘇奏反皰漿上匹㒵反下子羊反噦噎上於月反下一結反吐𨒫也癲癎上丁年反下行間反陰逭直睡反重病也謂陰腫下垂而重也正作膇㾽二形經音義作徒雷反非也柎胸上芳武反下許容反塊刀上苦對反俱師所律反扣擊上苦狗反盤𤞚所卓反正作也又音消誤䂎矛上倉官反下莫侯反禶敠也矛槍也蜀軍梭搶也牛𡐢方問反鎔銅上余封反餅尺少反羹臛上古盲反下呵各反糜粥上美為反油糖徒郎反沙糖也苴鮓上側魚反下爭雅反菜和酢半熟曰苴以米釀魚曰鮓也上又七魚子魚二反誤為徒官反嘗哾才兖徐兖食尹三反嗽也舐也姝妙上尺朱反美也嬉戲上許之反擾上子告反按摩莫破反拍毱求六反託石經音義作拓𤗊拓𭡄四目他各反跳躑上徒聊反下池石反蹴踏上千六反下徒盍反正作踏踏二形下誤攘上女羊反扼碗上烏革反下烏亂反控弦上空貢反下戶堅反梳理上生魚反耽嗜上都含反下神利反𮩚餮上他刀反下他結反湎著上兖反沈重上文林反叨餮上他刀反下他結反疥癩上古拜反下來達反沒上衣小反鎮𡑅上知鄰反下烏甲反叨餮叨䥫二音第二十四卷勇悍下按反毀呰音紫謗也膖脹上匹江反下知亮反殞沒上云愍反從順上才容反誤抨酪上普𥝷反波上烏古反正作塢拖耶上徒可反塢波拖耶此云親教師即和尚也𡗚藂上女㒵反傴僂上於禹反下力禹反上施書之反設也帳上莫半反下知亮反上又經音義作𭞽携手上戶圭反不磔吒格反褰張上丘𠃵反房穗音遂正作穗穟采三同囓斷上五結反躁動上子告反第二十五卷猗觸上衣綺從人又平堪耐奴代反推𪭟上直追反下昌與反蛇蝎許謁反誤磣毒上楚錦反堅徑居政反貫穿二音官穿縫綴上苻峯反下竹稅反摩咀多達反咀纜郎闞反火𤌢奴管反淡癊上徒甘反下於禁反𤵜疾上丑刃反蛇蠍許謁反正䖧螫上知列反下尸亦反蚰羊然反正作蜒嚻舉上許反𠧒丐音蓋求也沙磧倉歷反水中沙灘也振恤上之刃反救贍也下私律反亦作賑恤救援音院助也親昵𡰱日反又音日駝騾上徒何反下洛戈反𨚎痁上丁禮反下丁念反正作店也䣑肆上直連反下先至反寺館古玩反捨軛烏𮧓反嗢咀囉上烏沒反中多達反下音羅七條袈裟安怛婆叄音三五條袈裟也舊云安陀會貯畜上知與反下許六反洟唾上吐帝反洗浣戶管反垧野上古營反未鞭卑連反未擘布厄反縷線上力主反下相箭反妷羊一反第二十六卷札火上爭八反栜也斫木片也𮡻上徒端反下頂反推煆上直追反下都亂反瞚息上書閏反枯槁苦老反踈歰上山魚反下山立反燥蘇老反稜層上勒登反下賊登反烈上倉感反下力哲反𭝂𢙣上蒲沒反正作悖尤䖧知列反相渠呂反正作又之刃反給也約也誤