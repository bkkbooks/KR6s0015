正作咀也理迦此名為論亦云本母暴燥上蒲報蒲木二反下蘇老反日乾也所楺川音作揉同而由而酉二反屈也第六十八卷懵憒上莫亘反下古對反扇𢮎丑住反或云扇侘此云黃門亦五種不男之名扇半擇迦𤵇癩上古拜反下郎達反攣躄上吕貟反下補益反劫𢱊亮略二音𡙸也強取也僞稱尸證反僞函下胡緘反正作函又或作備音陷又𣟧字正冝作棸乎監反𣟧也撾打上陟花反下都冷反樝撮上女加反下子活反擭取也賄貨上呼罪反洟唾上他帝反鼻也昉膏方房二音脂也在𦝫𠕀第六十九卷醍醐音提胡經音義作餅也第七十卷曛暮上許君反日入也亦黃昏時也掉舉上徒了反音擢誤憒𡗚上古對反下女㒵反銓量上此全反謂稱量也善第八帙第七十一卷串習上古患反蓄積上六許六二反聚也對治音持也理也伐也糊音提胡蘇精也或荒火先反草多也正作荒又去聲擾上子告反下而沼反生憤扶吻反喧亂上許元反相較音角直也略也又音教比也䎡中上而兖反造詣上七告反至也憒𡗚上古退反下女孝反第七十二卷不揆求癸反誑上居反詐也於燧音遂火母中庸音容下也嗢拖上烏沒反下徒可反耽嗜上都含反下神利反第七十三卷低五郎反舉也第七十四卷飲𡱤奴吊反掉舉上徒了反慳𠯌力進反憺怕上徒敢反下普百反耽湎上都南反下莫兖反第七十五卷輕蔑莫結反矛䂎上目侯反下倉亂反胡椒音焦𥗤羅丁故反正作𥗤第七十六卷眩翳上女縣二音下一計反巨勝胡麻也或苣虎魄上火古反或作虎虎二形字㨾云避國諱故省一畫也下普白反欻聞上許勿反正作欻毀讟徒木反痆斯上女八反第七十七卷融消上余戎反正作融融撓泉上火高反細揳先結反瞚息上音舜正作瞚須臾羊朱反三十息也𠧒匂蓋割二音第七十八卷耐𭜨上奴代反捨軛音厄瞬息上音舜動也𨓝興上提禮反第七十九卷欲廛音緾蕀圍上京力反呼噪速告反爾上羊修反也音義云小笑也然冝作音由空也言空笑也槗亂上居小反詐也正作嬌牽引上去堅反輕子告反離音厄稼穡音嫁也種曰稼𣫍曰穡也邏怙上羅個反下乎古反舊云羅睺般拏上步官反下女知反第八十卷映敝上於敬反下必袂反正作蔽也下又毗祭反誤瑕隟去𨒫反著上都南反樂也亦作耽耽二形瘡皰匹㒵反又音靤輕蔑莫結反無也亦篾殞沒上云愍反慶第九帙第八十一卷嗢柁上烏沒反下陀可反希望上許衣反呬多上至反研𩅢上五堅反下行革反正作判决利普半反正作判嘶掉上斯兮反下徒了反第八十二卷劬勞上其俱反正作劬羂古犬反開閳昌演反正作闡儲餘上直諸反第八十三卷襲師上尋集反勇捍悍二同寒案反慧轡兵媚反睿誓上余芮反下合作哲能抗苦浪反𦂝綴上七入反下竹稅反編列上布玄反第八十四卷毒蛇神遮反問訊音信諭揚上羊朱反下以良反詭言也又動舉也又音喻諫也非悎悟上古㒵反譏誚上居衣反下才妙反𧴵易上目𠋫反揉捼上而由反下奴回反手搓摩物也下又音挼飈動上必招反披折上匹彼反下之舌反蹎蹶上丁年反下居月反僵仆上居良反下芳務反僵仰也仆伏也前倒也下又芳𠋫步北二反晧首上乎老反褶多上之涉反緩上戶管反下阻救反黃皴七旬反脊傴上子昔反下於禹反前僂力主反雜黶於陝反惛耄上呼昆乎本時悶三反下目告反瞬息上書閏反腐敗上音父朽也殞者上云愍反滅上田典反𦓒退上奴管反言臨命終時火火漸退滅也正作𤌢心音徂落在乎反笞罰上之反舄𠧸上思積反下靈古反醎土也正作瀉滷耕植音食種也你伽上奴里反下其迦反此云流注不斷亦云𡧱為軛烏革反車搹也名弊毗袂反𥥛尸羅上徒骨反律云𥥛吉羅亦云突色栗多罪名蝸螺上古花反下力禾反叨餮上他刀反下他結反希求上許衣反親昵女日反又音日串習上古患反遽務上渠據反急也耿著上都南反正作耽又音哽誤堅鞭五更反堅罕也正鞕硬二形䖧𧍷上知列反下呵各反獷古猛反有灾子才反有同上又音非第八十五卷囹圄上力丁反誤下魚舉反幽縶知立反誤第八十六卷違戾力計反䖧螫音釋又呼各反墋毒上初錦反憤發上扶吻反怒𢜩含紺反恨也正作憾又丘廉苦斬二反誤欻勃上許勿反下蒲沒反匱乏上求位反竭也乏也明口反愛鎖蘇果反所縶知立反趣巨月反事同上𦕍湎上都含反下兖反猥雜上烏罪反警覺上居影反悒然上衣及反塢波上烏古反柁耶上徒可反塢波柁耶此云親教師𭦴出上無遠反正作脕謦咳上苦頂反下苦代反微褊卑犬反小也急也狹也第八十七卷詭言上居委反愚戅竹絳反頑嚚也依勉音免強也未剋苦黑反急也必也從生上斯此反茫然上莫郎反闢官上毗益反超踰音逾隍塹上戶光反下七㷔反官闕去月反也門兩傍然為道也或稈古旱反尫劣上烏光反憒𡗚上古𭔹反下女孝反第八十八卷歔欷上許居反下許既反拊上芳武反下於陵反冤結上於元反盲莫瓶反上衣小反下莫骨反漂淪音輪沒也𤵜疾上刃反非迮爭白反被迮同上經音義作笮𣧩歿上諸隆反參羅上所岑反羅算蘇亂反卜筮時世反陵結反謇訥上居輦反下內骨反第八十九卷英羊芮反憒丙女㒵反正作𠆴𡗚二形裂上倉感反奮發上府問反𠧒丐音蓋朋嚋直由反正作疇拒上丁禮反𧄼瞢上徒登反下莫登反音義云失臥𫽄也上又莫亘反夢也諀訿上匹爾反下音紫居政反惙爾上知劣反分拆先亦反第九十卷覆苫式苫反關鍵上古還反下𠃵件二音勉勵上音免下音戾徵𩅢上知陵反證也明也召也索也下行革反實也又戶狄反窮也尺第十帙第九十一卷嗢拖上烏沒反下徒可反喪上於反下桑浪反心殞云愍反楚撻他達反倐㱕上手六反染上都南反掉舉上徒了反怡上許之反下與之反膚怡上方無反正作膚躁擾