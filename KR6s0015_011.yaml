上子外反極也正作最也韋昭云第一為最𫽄下為殿都見反第十卷輕𮆘莫結反無也目勞無睛也𤌢頂上奴短反踧踖上子六反下子昔反上正踧也踖行而謹敬㒵也字林云踧踖不進也陰第二帙二論十卷同帙大乘阿毗達磨雜集論下六卷第十一卷綴𦂝上竹稅反下七立反英余稅反企邪上丘智反下以嗟反怛纜郎暫反串習上古患反塢拖上烏古反下徒可反第十二卷殑伽上巨陵反下巨迦反麾空上許為反堪耐奴代反䇿勤上楚責反種殖市力反槗亂上居小反詐也正作嬌矯二形憤發上扶吻反𭜨也心中欲怒也𢴰弄經音經作譏居依反諫也誹也諫七賜反槗亂上居小反毀呰音紫第十三卷麟角上力人反仁獸也牛尾一角一𨻩去𨒫反𤌢位上奴短反企耶上去智反痆斯上女八反第十四卷悵悢上丑向反失志也下力向反恨也第十五卷二睱音下間也安也經名十二睱也斤柯上音府正作斧下音歌經名也令攝上自宣反青瘀於去反死黑血也膿爛郎歎反胮脹上普江反下知向反第十六卷獷音礦卒暴上倉沒反躁急上子告反中論四卷第一卷序文耿介上古幸反下古拜反耿介節操也亦光明也折之上旨熱反敞玄上尺兩反陳枚莫回反枯悴疾遂反第茨上目交反下自咨反庂陋上阻色反下郎豆反宏曠上戶萌反險詖彼義反喉襟音金祛內上去居反舉也論文違糅女右反楒破上子孔反如戶辨反㑥中上巨例反頸下上經郢反垂音胡牛頂下垂肉也正作𩑶𠴱二形第二卷視眴音舜被鎧苦改反勉角上他故反龜毛上居追反甲蟲名可煆都亂反匍匐上步乎反下步北反遍有上匹連反梁椽上力羊反下直緣反有捲音拳雜銅上自合反𡬥陀上所顏反第三卷拖主上尸至反亦作施如券丘願反正作券也釋名曰券也相約綣為限也刻別也大書中央破之契刻識其數也字從半分所弊必世反正作蔽不擉徒木反正作獨也又丑卓楚罔二反非也且罝陟利反正作置則音墮龜毛上居追反此陰於禁反第四卷煩音祝術上之右反祝願求祭之詞也亦作呪如鐵天結反豪力之反浣衣上戶管反洗也亦作浣𣴟時上牛例反割也正作也又初加反非也渥上奴兮反下經歷反誤苦強巨羊反唌出上序反又徒丹反非也涎出同上㭬上力羊反下直緣反下又音卓非也是般若燈論一部十五卷第一卷序大唐翻經沙門慧製開元録云沙門慧製序鑒云上古懺反下合作忘亡二同文方反亡無也忘遺也若夫音扶發言之端也亦作𧥱𧥱詞也尋詅七全反正作詮顛沛上丁年反下布蓋反仆也下正作伂詞鎽音峯更壅於勇反捐珠上余宣反弃也珠類一非舉摩𡰱之珠以喻真常之性也怖龍力容反史記曰女媧羡愛龍不見真龍忽有龍來怕之無色又公高好室雕文皆盡以龍像後真龍下鬪頭牖外施尾於堂公見之退走喪其神生上徒頂反特獨出嗜欲上神利反下余玉反深上音恱披也自鄙悲美反佩兩上步昧反悼彼上徒告反傷也㸦顯上乎悟反紛然上芳文反駕駟音四馬四匹為駟也禮曰天子駕六諸侯駕四大夫駕三士駕二今通言駟者拳諸𬾃之駕也顯厥居月反其也染翰戶岸反詞翰也又獸名長毛可為筆也析微上先擊反開也破也𦏁農上許冝反伏𦏁神農並古帝號也代記曰伏羲之時有龜負圖出畫八卦世紀曰伏羲蛇身人首有聖德為百王先帝教民犧牲也神農教民耕農故號神農陶鑄上徒刀反下音注侔於上音牟齊等也而治特值二音整也理也寤寐上音悟也覺也下利反睡也波頗音破三藏名也開元録云波羅蜜多羅唐言作明知識此序云波羅蜜多羅唐言明支略之也博綜祖宋反惣也附杙羊力反橛也亦作弋法勇傳云過䓗嶺上雪山懸崖壁立無安足處石壁皆有古弋孔處相對人各執四弋先拔下弋乎攀上弋展轉相代三日方過乃到平地舉熛必遙反飛火也恐非是此字也冝作煙於聖反火氣也法勇傳云䓗嶺下有大江浚急如箭於東兩山之脅繫索為攪相去遠十人一遇到彼岸已舉煙為識後人見煙知前已度方得更進久不見煙則知暴風吹索人墮江中耳熛者小火星也恐誤四方合作字諏觜上正作娵子于反下子斯反星名也西方七星名也尓雅公娵𤽤之口亦作娵訾也即是丁亥年也亰輦力展反亰大也白虎通曰夏為夏邑商為商邑周為亰師公羊傳曰亰者何言天子之所居亰大也師衆天子所居必衆大也輦步挽車也說文云一輪車也或作鄻地名也奏見上子豆反進也目以事聞上也下戶甸反自下朝上日見也又吉甸反自上詣下日見僧𧦪音辨人名慧助責反誤崛多上巨屈反玄齡力丁反人名詹事上之廉反省官名翊聖上羊力反助也亦作翼玳玉佑時上于救反助也佐也或作佐義亦同上骸戶皆反骨㧾名慮上直小反始也實資上是力反鑒譯上古銜反領也押領主持也正作監也下亦音翻言也蕭璟上蘇條反草名蒿屬又姓出蘭陵杜陵二望本自宋支子食於蕭縣後因氏焉下俱永衣景二反玉光也䔍始上冬反厚也無輟竹劣反止也已也研𩅢上五堅反磨也行草實也磨虛取實也下又戶的反窮也函丈上戶南反容禮記席間文覆詳上芳目反審也壽星上市手反東方七星之首尓雅云壽星冗也即壬辰之年也司南之車上息慈反主也南北也詩序云周南部南政教之始言自北而南也下尺遮反鬼谷子云鄭人肅慎氏獻白雉還周公為作指南車送恐其迷惑也帝記云高辛氏造指南車照膽之鏡兩亰記曰髙祖入咸陽得鏡廣四尺九寸表裏皆明人直來照則倒見以手掩心而來則腸胃五藏歷然無礙有病者亦見之女人有他故照之心動始皇以此照宮人心動者煞之三秦記曰秦有照膽之鏡破申合作中內也裏也內上音尺逐也蕩焉上徒朗反書𫝊云開闢也論語云君子坦蕩蕩寬廣也合作蕩蕩焉少一蕩字耳下于𠃵反恢恢焉上苦回反罔知上音無也正作罔說文從四從亡為正䂡礪上脂紙二音下力世反並磨石名也險上莫瓶反漖海也舟輿上音周方言曰關西為之船開東謂之舟下音余車也駭昏上戶騃反動也雷二音疾雷也第二序學士中散大夫行著作郎臣德言奉勑撰前序出開元録此序出品次録依兩録故䨥存也爻畫上女交反下后麥反象繫戶計反生上徒頂反憤慨上扶吻反下苦代反錙銖上音錙下音銖銖六錘錘暉也二錘則錙錙熾也二錙則兩也當二十四銖為兩也鈐鍵上巨廉反下巨偃反車轄也開鎖也舟航戶郎反魚鵠戶沃反生音趙針鎽音峯叵值上普可反蔽野上必祭反剝𢱊亮略二音膺降上於陵反親也忍鎧苦玫反𡱈區上具玉反下丘愚反軒后上許言反古丘名也亦人姓軒轅也歷帝記曰黃帝姓都軒轅丘慧助責反啒多上巨屈反正作崛又骨忽二音非也蕭璟俱永於景二反法式尸力反用也度也不郊戶孝反琳上力今反下助責反琳𭭻同上琢磨上竹角反碩德上市尺反大也美也壯也宸扆上市人反下衣言反旒纊上力由反廣雅曰天子十二施至地諸侯九旒至大夫七旒至肩旒旐也有官則旒無官則旐今為前垂藻曰施非喪幅之旒旐也下亦絖苦謗反織布八十縷今之二升布也易曰黃帝戴黃禹美乎獻冕周加垂旒凡冕皆玄上緟下以木板廣八寸長尺六寸以三十外玄布衣之於上謂之綖以朱繒為裏大裘之冕無袞冕前後各十二旒驚冕前後各九旒毳冕各七旒絺冕各五旒玄冕皆綵為旒亦云藻每旒有玉十二玉閒各一寸九旒青珠七旒黑珠屢拂上力遇反漸去隨反論文戲論上許義反惡邪上烏各反下序嗟反婆伽巨迦反亦云薄伽梵稠林上直由反捐捨上余宣反適心上尸隻反樂也牛𡐢方問反易可上羊義反悉檀徒丹反梵言悉檀亦云悉曇唐言成就知邪上羊嗟反此字耶斜二音為字一躰臨時詳呼二去迦此云衆兔角上他故反鞞世上毗兮反阿毗曇徒南反亦云阿毗達磨此云無勝法亦云無比法苦參所今反竹笋思尹反如𮆘莫結反成筐下音匡䰅莖上相朱反中戶耕反下羊接反纈目上戶結反夷狄徒的反如絲音思栴檀札下爭八反柿也凡器片上五寡反下匹見反第二卷𢐷鬵上子孕反下疾心反第三卷馬櫪音歷玉篇云馬槽也食糠音康蚋蠅上音文中而稅反下羊陵反延䂎倉官反遙擲也又倉亂反嗢羯烏沒反上師上羊招反第四卷伏翼羊力反蝙蝠別名也亦名仙鼠上亦作服尓雅曰蝙蝠服翼猫貍力之反紫礦古猛反堅漯失入反又他合反非毫力之反摩瑩於定反第五卷龜毛上居追反𪾲上音盲下音暗如音染汙同上置瓶上知利反如捧步講反正作棒尌音上音樹立也後攏郎孔反略也兩手之令高上也應和尚作力東反非也洗濯音濁垢穢上古口反龜毛上居追反角𭷟音峯垂𭈰音胡牛項下垂肉也正作𩑶咽第六卷唾壷上音垂市為反下音胡牛頸下垂肉也正作𩑶也上他臥反非也第七卷上郎盍反下毗佉反論文自𭃄遏羅上烏反下郎個反第八卷如茂扶發反正作筏又莫反非也不泄私列以世二反漏也減也更丘乎悟反第九卷囹圄上力丁反下牛與反周獄名也廣雅曰夏曰夏臺殷曰美里周曰囹圄閞籥上古還反下羊略反杻械上勑酉反下戶戒反屯度婆上徒門反下借音摩梵言屯度婆亦云屯頭摩羅此云兩頭蛇也第十卷橯漉上音勞下音鹿荏婆上而審反梵言荏婆羅唐言苦練木如券音勸生莧音官草名可為席也又戶官反突厥上徒骨反下居屈反北方胡名也漢書音義云夏曰獯鬻殷曰鬼方周曰獫狁漢曰胸奴魏曰突厥也箭笴古旱反堅上力進反竹名也堅可為席也正作莽也甐瓦名也非用𥪰第二帙五論十卷同帙般若燈論第十一卷泛說上芳梵反那邏郎個反第三卷作𮟯羅也根𦽦音万𦬔苗葛苗之類也芬子上古敗反明帆音凡船上𢢔也又音梵撥漉上郎刀反下郎木反水中取物也正作撈靈水第十二卷兔角上他故反蟾蜍上之廉反下羊諸反蝦蟇也抱朴子曰蟾蜍壽三千歲百歲者頭上有角頷下有朱書八字玄中記曰蟾蜍有角者食之壽千歲江南謂之蟾蜍也又市席反下市余反第十三卷迦逋布乎反唐言白鴿第十四卷更音護運棬音拳第十五卷毱多上巨掬反見酢音醋生涎序延反魏武軍失道軍士皆渴帝曰前有大梅林士卒聞之口皆水出也論文作唌徒丹許安二反唌𡅧語不正也非用百論兩卷上卷序文泥曰于月反亦作越名上居月反𮥸氣上子峻反亦作㒞擅步上市戰反謂自專獨步也殆亂上徒𫨻反仰慨苦愛俯悼徒告反藻煥上音旱才藻也下音喚明也躊躇上直由反下直余反行不進也垂迂於禹反曲也形羇居冝反不輟竹劣反論文韋紉女久反正作紐僧佉去迦反投淟於玄反水深也正作𣶈也又他典反非也自隧直遂反又音遂非也偱始都故反新譯經云素怛纜䛴語上丘倚反瞋惚音鞕杖上卑連反正作鞭匝送上𩵋亰反柔𣽈音軟偱垢都故反正作妬妒如鹽音閻垢古口反拖戒上尸智反難阤達何反此云喜羊上丁兮反正作𦍞鬱多上於勿反千䓣力掌反又莫官反非視音舜有音遍陀羅𩦾毗妙反此亦云實窯師上羊招反陶師上徒刀反見龜上居追反身𧢻音觸無𧣈同上有惚音𢪛𠚫上尸由反下牛例反叉時上同上也正作刈乂生涎反生延同上紙拜上音紙下步莧反正作辨㧾相上子孔反揌相同上縷渧上力主反下音的作滴也又音帝非下卷著跂巨𨒫反履底有齒者正作屐圓疧丁禮反又音祇非疧腹音福眼𥇒音接挻㨁上尸然反下市力正作埏埴兔角上他故反龜毛上居追反迂逯音代抅耶上九愚反梁椽上力羊反下直緣反一㮏奴太反果名亦作奈於桑音早果名於瓜古花反亦作苽廣百論本一卷衆都故反時戶根反瘡瘢也正作痕也論釋作痕也䥫𮡻徒頂反篲星上音遂正作彗為燎力遙反十二門論一卷序文僧音𨦣不泯忍反落荃七全正作筌幾乎上𢴰析二音近也冀也顛沛蓋反正作伂焉上二苦回反下于乾反希聲上許衣反和鑾上或作鉌戶戈反下郎官鈴也崔豹古今注云五輅衡上金雀者朱鳥朱鳥鷹也因鸞口銜鈴故謂之鑾也傳曰錫鑾和昭其聲用誠上步𪪺反論文𢴰杼上居依反勝也緾經也下直反梭也說文持緯者也出曜經云猶如張綜以投抒織漸盡其縷是也俗謂針齒為杼者非也亦作䇡梁㭬直緣反正作㭬欑搖上子官反正作鑽梢拂上相焦反正作捎也搖捎動也又所交反垂音胡垂𩣭子紅反同𧿵音甲蹄也謂驢馬不分蹄也十八空論一卷併屬上卑政反俱絺丑夷反婁佉上郎侯反下去迦反資廣百論釋一部十卷第一卷駭浪戶騃反驚也玄奘自朗自浪二反秦晉謂壯大也諸師相承作子朗反呼非也清矌苦謗反無吝力進反雜糅女右反龜毛上居追反僑舉上巨嬌反容也或作嬌音舉手也㸦興上乎悟反檀立上時戰反專擅自是榮悴疾遂反偱環上序倫反𨓝代上大禮反互相上乎悟反錦繡音秀剌闍上郎達反躁警上子告反下居影反奔濤徒刀反分折先擊反鎔銅上音容下音同消銅也經音義作鑄鎔非也第二卷不竝音並兔角上他故反立上居小反波羅奢尸遮反此云赤花樹即紫礦樹是也𥗤蟲上都故反下直中反第三卷時痕戶恩反𤸤痕上楚㽵反正作瘡䥫𮡻徒頂反苟避上古口反正作苟雕畫上丁聊反下戶卦反莬角上他故反又音問非依堤丁兮反動慮力去反詎勞上渠與反豈也所嗤尺之反礭言上苦角反眯覆上莫禮反第四卷怛策楚責反串習上古患反假從子用反亦作從眩翳上音縣下音翳第五卷菟角上他故反遷逼上七仙反夢啞烏雅反編石布玄反次也羯羅邪上居謁反下羊嗟反西國豆名也經音義作羯羅𮟯第六卷羈緾上居冝反惔怕上徒敢反下音拍耽媔上都南反下兖反猖蹶上尺羊反下居月反謂狂走也劇苦上巨𨒫反見壼音胡㧌攪上呼高反下古巧反顛蹶上丁年反下居月反淤埿上於去反貪五巧反遍知上必見反溷猪上戶困反下竹魚反阿揭音竭亦云阿伽陀唐言無病藥除𠍴去𠃵反𠧒匂音蓋養妻音妻貧癩音賴膏腴羊朱反淤泥上於去反又音由非第七卷令可上自宣反知𤏙奴短反如𢭀序全反如涉所戢反枊難上於力反下奴歎反挫汝上租臥反淹遲上於廉反眇無上小反𥌒目上公五反鵂鶹上音休下音留能詅七全反摽𢡠上必遙反下尺志反羂索上吉犬反下桑作反實繁上市力反下扶憣反𮕹娜上奴了下奴可反弱㒵也喜抃平變反舞也拊掌也嬉戲上許之反篲星上徐歲反星也正作彗也又音遂第八卷滌除上大的反互相上乎悟反局別上巨玉反又作𡱈諺通上古哀反立餐倉安反立溺奴吊反亦作尿如𣓞所卓反聰睿余稅反寱語上魚例反睡語也雙泯忍反汝曹自刀反輩也衆也亦作糾紛上居黝反下芳文反𨓝相上徒禮反誹上音非下音尺第九卷根系戶計反緒也自縫音逄咀嚼上自與反下自雀反泛說上芳梵反嬰咳上於盈反下戶哀反菟上他故反兩堺音界封壃居羊反研𩅢行革反第十卷伏膺於陵反伏匐也敬也膺胸也誰肯苦等反晈然上吉了反作上居小反屢辨上力遇反非考苦老反成也嗤笑上尺之反下私妙反𢌿陋上必脾反下郎豆反鄙拙上悲美反𢪨論上苦浪反措言上倉故反為燎力遙反以上烏酷反滅上田典反燎纖上力小反殉命上辝盡反也亡身從物曰殉父十住婆沙論一部十四卷第一帙十卷第一卷濤波上徒刀反大波曰創癩上楚㽵反漚血上烏口反正作嘔淋瀝上力今反下令擊反𭼱疽上𢌿遙反下七余反脹滿上知向反燋上烏醋反下子消反傷火也或作潐海中有潐石方三百里水灌之隨盡不濕彼五案反正作岸郊汝上戶孝反俎壞上疾與反正作沮沸尸旨反誤銅橛巨月反刀梢所卓反正作矟𨥤㦸上音牟正作矛𨥤㦸上音牟正作矛䥫剗初眼反推捧上直遙反下步講反䥫鏘七羊反𨪏鏫上音疾下音梨䥫巨久反正作臼䥫音𠕀剝裂上卜角反考𢱊音亮狡狗上古巧狂也䶥掣上爭加反下尺世反鳥鵄尺夷反䥫𭉨音觜所啄音卓傴逼上音驅正作驅身上知挌反張開也𧯫也正作磔二形郭氏作倉結反非也括削上古反正作刮摓勃上步紅下步沒正風火盛㒵也臠割上力兖反鍭湯上戶郭反湧沸上余腫反顉㵭上富福二音似釜而口下下之與反冝作音府頭𦜩音𢙉䥫鏟初眼反屎河上尸旨反駃雨上所事反疾也𣷽漬上子反下疾賜反淹物於水掣上丘堅反下尺列反鷲踏上七六反正作蹴下徒盍反上誤耜檏上都回反下步角反頞浮阤上烏割反下徒何反阿邏郎個反𢮒阜上都回反下扶久反飛激音擊㔁創夷上知玉反寒瘡也中初㽵反下作痍羊脂反上正作也論云涷創痍號咷上戶高反下徒刀反焭獨上巨營反𣽈心上而兖反弱也又而朱反𭷻鼠上余秀反㹢玃上古牙反下俱縛反𤝧上辝姊反下卜㒵反熊羆上乎弓反下彼皮反蛇上許鬼反正作虺蝎上芳福反下許謁反黿龜上音元下或作鼉音陀蛟上音交下巨幽反正作虬龜二形也螺蚌上郎禾反下步講反鷹鷂羊照反上巨向反伺捕上司寺反下蒲故反捉也䩭靽上居冝反下下畔反䆤鼻上尺專反針頸上之林反下居井反大癭於井反蕩滌上徒朗反下徒的反屎尿奴吊反長抓爭巧反涕唾上他計反裸形上戶瓦反唼食上子合反嗽也正作咂𠾱二形波簏道反論文自𭃄也𭃄玉篇無𬼘音論云四句偈名波簏六句偈名夜又依字祿識𧩨音護慍恨上於運反異小居小反正作矯悼愍上徒告反毀呰音紫繫閈博計反又音翰非桎梏上之日反下古沃反刑音六煞也𧟶王上卜架反下于况反第二卷異上居小反俯仰上眉辨反永㢡子羊反正作將捋膽幹上都敢反下古岸反強也論云有力者名為志幹儜劣上女𥝷反僧佉去迦反榆伽上羊朱反下巨迦反𠳮曇上巨反金翅音施鹽羅上羊廉反倮形上戶瓦反哆子上丁可反為𩭈自姧反杵臼巨久反正作臼又居六反非坑坎上苦庚反下苦感反埠阜上都回反下扶久反藂上助臻反荒也坌穢上步悶反泥潦音老陷上巨久反或作臽音坎巉巖上助咸反猥鄣上烏內反正作隈也字林云映隈隱翳處也又烏回反曲也下章向反上又烏每反非峻峭七笑反論文作非醎上戶緘反下郎古反正作𠧸幹𤍜上古安反下桑老反正作乾燥也沙礫音歷凡石上五馬反鮮少上息凌反豪力之反逃迸補諍反涅劬上奴結反下具愚反蟲蝎上直中反下戶割反食木蟲也尓雅云蝎來𥗤傷齧五結反連編卑連反嚴飭尸力反如𩭈莫顏反戾上吉了反下力計反絞繚曲親㒵也蚋上無云反下而稅反照耀上之曜反下以照反芬馨上芳文反下許盈反天繒疾陵反參羅上倉南反雜也合也猗靡上於綺反猗狔從風㒵也溺也下文彼反偃也靡𦽦美色也第三卷㯹勝上必遙反縵莫官反泥市軟反密緻直利反𥇒如上子反侫媚上奴定反志幹古岸反論云志幹者所謂德勢威也幽𫮺呼各反子𩭈莫顏反佛名也邠陀上彼巾反如䨥所幢反睒菩薩上失染第四卷堤防上丁兮反慊恨上戶兼反正作嫌也又苦點反非褊袒上匹田反正作偏智卬因進反氣噓許𮫭反為勉上于垂反下他故反輕挊音弄俾面上普米反傾頭也不欲見也正作䫌也抑挫上於力反下子臥反俠勢上戶頰反睥上步米反下作髀寶助㽵反正作床殖上音播布種也下市力反第五卷輕躁子告反詭異上居委反輕子告反卑助上必脾反補也經正作裨音義作卑步卑反附也豪𨤲力之反枷杻上音加下音丑鎖核力戒反正作械𤝔狼上助皆反鱣魚上知連反𮫭名擒粘上丑知反正作䅻膠粘鳥者也又音禽非第六卷三氣烏各反正作惡𢙣二形又莫謨氣三音並非淫泆上羊林反下羊一反小㯓音塔瑕疵上戶加反下疾斯反聾啞上郎紅反下烏雅反別上云丙反長也正作永也𡶤岸上北𪪺反問訊音信憒𡗚上古內反下女㒵反刀梢所卓反正作矟謙遜孫因反𮕱耗呼告反衰枆同上㵱流上匹遙反槗梁上巨反深仕臻反如縶竹立反拘鹿上古口反正作㺃榜抬上步盲反下丑之反履屣所綺反正作屣纖傭丑容反軻雪上苦何反坘華上直𡰱反密直利反俱眴音舜二創音瘡沮壞上疾與反佃作上徒年反作也第七卷法扡音施上𢭀序全反𬧅𮜑上市兖反下丑容反過膝辛七反正作膝密𥠧直利反煩惚音𠇆瞻上牛兩反止作仰不泍而陝反鹿上布各反重檐都濫反親自木反罝答上陟利反岐夜上巨支反伽阤上巨迦反下徒何反斐𦘺儸上步回反中扶非反下郎何反十二部經之第十名斐𦘺儸亦云毗佛略此云賚說也正作棐已辨上音已下音辦甲隆力中反飛鴻音紅右音旋僂曲上力主反圓上方伏反里匝於進反正作印手畫音獲脣赤音赤四音牙不希音希額平上五格反黑蜂音峯珊瑚上桑案反為杴之審反又許嚴反非幃帳上于㱕反下知向反正作幃帳絞具上音扶正作鉸車𤦲音渠機上皮證反下居旨反瞻𠇆音𠈟上齴五各反正作齶𪘰氣激古歷反論音是擊字激浪同上疾也布拖音施鄣閡五代反䰅音豪峙直里反無讒仕咸反誤委蛇上於垂反下徒何反正作逶迤尓雅云逶迤美也下亦作他音陀又逶迤屈曲行也又或作蜲蛇上於垂反下羊支反㽵子云蜲𡊇之狀其大若轂其長若轅紫衣而朱非此義也庛點上疾斯反王上戶公反踊上上徒到反正作蹈令上古雅反諸𧢻音觸貫䆤上音官下音川閻浮上音閻下音浮婉童上於元於遠二反栴遮上之然反須泹奴結反商估上音傷下音古鬱頭藍上於勿反下郎甘反聞上古瓦反韋大上于㱕反下徒個反或云韋馱四韋大論者一曰壽謂養生善性也二曰祠謂享祭祈禱也三曰平謂禮儀占卜兵法軍陳四曰術謂異能伎數禁呪醫方昴星上莫巧反第八卷錠光上徒徑反𠬧獲戶郭反正作穫草羊力反正作我或作四形川音莎非義也是讖音懺第九卷恭恪苦各反毀訾音紫唌唾上序延反陀上步末反第十卷隈鄣上烏內反蜜揣徒官反善諳音菴苻擊上音扶下戶的反告急牘也說文云二尺二寸書插羽傳之田䲧烏古反正作塢事第二帙二論十卷同帙十住婆沙論下四卷第十一卷牽挽上音下音晚擈著上步角反耶上似嗟反下以林反鞕杖上卑連反正作鞭手捲音拳𡬬兜所姧反正作𡬬常喜許記反憒𡗚上古內反下女㒵反喜為上許記反下于垂反如兔他故反深邃相遂反第十二卷沸音屎波𮑣音跛羅邏郎個反𦒱𢱊音亮笞也眴須上尸閏反下苦反少時㓨蕀居力反黑卬於進反刀捎所卓反正作矟攢木上子官反蜜渧音的又丁計反非可勉音免相上子孔反所𮋅於計反所㵱匹遙反濤波上徒刀反所覆芳福反翻傾也浀復上音回下音伏滉也𨒫流也正作洄澓也鹹水上戶緘反淹灡郎岸反第十三卷見遏烏割反欲上羊林反戲笑上許義反下私妙反猗心上於綺反劫貝卜蓋反茤摩上測俱反絁失支反楚言絁亦云奢亦云俱舍唐言藏即野蠶茴是也效我上戶孝反麞鹿上音章字樣作獐𢌿人上必支反犞異上居小反浣濯上戶管反下宅角反輕薎莫結反過舋許吝反陀上步末反𮇕弟子上音結第十四卷矯異上居小反寶飭尸力反正作飾無閡音礙行𢬜音呂其輞音𠕀華䰅音扴押上爭巧反下古狎反正作抓甲不瘦所右反肌膚傭上市軟反下容反䏶如上步米反額平上五挌反如軻苦何反貝也正作珂也白色也其𥇒音接青𥠧直利反芬馨上芳文反下許盈反上正作芬香力閰反提盧上丁西反天女名炳現上兵求反天䰅莫顏反祝術上之右反俎壞上疾與反正沮輕音躁眉上阻瘦反菩提資糧論六卷無闕丘月反杓火上市若反挹器亦作勺𮟩膩上郎個反下女利