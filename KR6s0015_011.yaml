碗二形也毗丁兮直𡰱二反正作丘翅上音文下音施正作蚊法上許建反掉動上徒了反河音岸淳淑上市倫反下市六反毒螫尸亦反貴才木反貴族同上如梢所卓反正作矟豪𨤲里之反佯步上以羊反擊儜女耕反仍翅上丁兮反下音施讒謗上仕咸反譖毀上㽵蔭反讒也毀也頺拾上徒回反優上子告反下而沼反願羡似箭反用磑五𭔹反鎧鉀上口改反下古狎反芋苾上為俱反下所擳反大威德陀羅𡰱經云般遮之會此云五年大會也大㽵嚴經作般遮于瑟會是也索上古犬反亦作𦊰第八卷拘睒失染反敖𢢔上五告反正作傲傲𡟋三形也又五毛反誤聚額五挌反面之鄂也亦作額𢷋相上補招反輕目結反屠枷吉俹反誤蹙眉上子六反蹙頞鼻頗促㒵也正作顣聚頞安割反叱叱赤日反叱𠿒呵也捶䇿上之水反下楚責反揣食上徒官反頑嚚上五還反下莫巾反疽蟲上七余反縫衣上扶峯反芭掓上北麻反下即消反牸象上才寺反嶮岨音阻反音疽誤鉤𣃆竹角反捖諸上他活反遺也解落也正作挽脫二形仰上都兮反下五郎反垂舉㒵也正作昂也下又莫兩反非用俾面上匹尓反戾面也正作仳諀二形經音義以顆字替之匹米反傾頭也古伈音仙當板布姧普姧二反板挽也引也正作板多上求六反尊者名也正作毱捅力上古嶽反輕抃音弄𫀽根上五口反跌倒上田結反挌量上古客反挍也我上無方反正作七熒火上戶𢩁反正作瑩一掬居六反毱多上渠六反眼瞬音舜動也漱口上所右反怡上許之反下與之反消澌斯㓨反盡也禮注云死之言澌也或作嘶儩二形也或作澌音斯第九卷懈𢢔上古賣反下莫諫反投阤上徒侯反下徒何反正言杜多容裕由主反排囊上蒲拜反下乃郎反炳然上兵永反晃曜上皇廣反下遙照反獐鹿上音章鹿屬也雉菟上池旨反野雞也下他故反下又乃侯反澡𣹉古亂反𣃆捎上竹角反下息雀反正作鄧削也並誤譏剌七賜反蚠創上蒲閟反正作坌也下音瘡如以灰創灰蕀上火回反下居力反火𧂐子賜反不令自宣反醫㕹上於其反下誤廢反狗聲也正作吠字體似㕭烏反反非此呼兄噴阻挌反呵噴也正作責嘖二形又普門普問二反非也誤嗽口上所右蘇奏二反正作漱也鞕繫上卑連反正作鞭心脯音府脯藏也正作𦝮拘䆤上九慮反牛秦也下昌專反穿孔也鞕上卑連反下他達反打也正作鞭撻或作楄韃也並誤怍稱上側嫁反僞也正作詐咋二形又音昨誤下尺陵反宣揚美事也正作稱也第十卷薝蔔上諸廉反下蒲北反炳著上兵永反下猪筯反淡泊上徒敢反下普百反靜也下又音薄非昞然上兵永反圍碁音其欺挊音弄庠序上似羊反䉼理上力條反憂七感反鞍韀上烏寒反下子先反以系音覓絲也𭤔有上許依反并劓疑器反打撲上得哽反下普木反急𥾣古卯反㗘也聲笑苦屋反字從吅犬腳跌徒結反中絳古巷反正作虹𭉨白上即委反連翩匹連反飛㒵其股音古殞絶上云愍反歿死也嚴下帙五卷三論十卷同帙大㽵嚴論第十一卷𡶤背上博登反下蒲昧反還𩇕音淨檛打上陟花反嚙上音逝正作噬只郭氏音制下五結反蟒蛇上莫朗反大蛇也班駮補角反𢙣鞭卑連反打撲普木反儜劣上女𥝷反焚燒上扶文反正作焚棠𧢻上宅耕反下昌玉反𣓏制之世反止也斷也䩛勒上兵媚反馬也正作轡或作也又毗必反車草也非禁剬之世反正作制又端剸二音非也䖧螫上知列反下尸亦反截刖音月又五骨五刮二反𢪨衡上口浪反下音行枷羅上音加羅莫顏反輕子告反正作躁女上羊林反又苦𥝷五耕戶經三反非𧧂之上之忍直忍二反𠋫脉也鄙𧃳上悲美反下私列反今𤵜丑忍丑刃二音人跌田結反籠戾上力董反正作𢤱多上求掬反多同上琛多亦同上也笑私妙反多上永掬反長者名也尸利多或云掘多㧌羹上呼高反攪也正作撓下音庚愁懆七感反又章草泍曲上𢙣胡反寧下也正作汙二形也右普莧反顧也視也美目正作盼也又詣二音非也獷古猛反或泄音𦵮即閈音閉又音汗誤㗛上處之反𮊵瘠上力垂反下秦昔反第十二卷沒上所蔭反液也水沒入也正作滲謦咳上苦頂下苦代反正作咳側假𭤧睌𭤧煩二反覆也轉也正作㤆也前帙作㤆芳万反如鵠戶沃反又音鶴俗共捅音角又他孔反誤諸鸖何各反叱汝上尺一反呵也驚怕匹架反哲螫上知列反下尸亦反奔突徒骨反戲挊音弄蝗蟲上音皇花𦗨而容反花㒵也正作穠稓茸三形經音義作毦以茸字替之是也頑𡧱上居隨反圖也圖謀也正作戰掉徒了反掉動也哀慟同弄反悉懈古買反散也正作解劓毀上冝器反豪𨤲里之反慊恨上戶廉反又音嗛第十三卷中𠸻丁計反噴𠸻鼻息也正作喋𭦟佛上莫槃反聞也蛇苦協反炳著上兵求反下猪筯反牧淚上文粉反掝也又音目誤燎力燒反火扷羅上蒲末反捲手上巨貟反香廉力鹽反盛香器也正作奩二形也輕則告反正作躁彼音岸勇悍寒案反嶮岨上許撿反下側所反路徑𢙣難也正作險阻也下誤手捫音門頺雲上徒回反薝蔔上之廉反下步北反𧂐諸上子賜反白𫀽五口反尓匹荷芙蕖其根掖挾上羊益反下戶頰反讒㓨上仕咸反從補莫反正作髆䉼理上力條反字從米十第十四卷寶鈿音田金花也又音甸以寶飾器也寒也迭㸦上田結反用𧴵目𠋫反草芥古敗反正作芥拖鹿上尸智反惠也與也正作拖又陀可反誤𠧒蓋割二音求也𠧒也宍揣上如六反下徒官反躃地上房益反輕子告反越䩭居冝反窗𪮧用栁反正作牖𨶳看上苦反鼻衄女六反鼻血出也又音𢙣讎郤上市州反下起𨒫反摩穾他骨反園名摩穾羅或云摩偷羅或云末叱羅正作貸我他代反揵推上其焉反下直追反異策叉責反醫𧧂上於其反下真忍反沮壞上疾與反𨳰𢙣上博計反第十五卷投烏玄反自隧直遂反落也誤墜巖同上此正餧養上於僞反附庸音容持鍬七消反見別本作揪花莫顏反見別本作一丈庚反塔柱也距捍上渠語反下何案反挌也衛也禦也正作拒捍一羌丘良反蘇下江反穢𣽈而朱反又音𨎪俗通呼此上莫𠋫反刑力竹反薝蔔上之廉反隱甕烏貢反雞𨿉上吉兮反下助俱反梯隥登鄧反樚攎上盧木反下鹿胡反即擲張𮧓反手取物也縷線上力主反下相箭反恨悢力讓反嚴飾施食反牀悵上助㽵反下張亮反氍㲣上其俱反下山俱反毛席也織毛褥謂之氍㲣也正作毹也下又乇篇音搜毾㲪上他盍反下得楞反戲笑私妙反喧譁上許元反下呼瓜反八胡木反碩也衰耗上𬂟追所追二反下火告反小減也拔吒上蒲末反下竹嫁反酬上神州反答也順中論兩卷翻譯記淳𮟯上市倫反一葙息良反在第徒帝反諸侯所居曰第揮辭上許㱕反下祥慈反揮霍也奮也灑也振動也或作徽辝訟也正作辭辝三形也論文毀訾音紫又作呰戲抃音弄又音辨非兔角上他故反迭相上田結反相音違撾打上竹𠂢反下得冷丁二反撾打捶繫也董我上許云反但氣擊鼻曰董也正作薰也又冬動反誤奮所上求右反萇短上直良反灌二音早貫攝大乘論本三卷陳真諦譯第一出犁柄兵命反如箕居其反杵臼求九反正作臼如之酉反煩惚音又音忽誤毀呰音紫修絺上息由反下丑脂反柯履上苦何反中藤徒登反𡨜靖情井反歡喜上火官反以先結反泍汙上人陝反正作染下烏故烏臥二反與攝大乘論本等三論十卷上帙攝大乘論本兩卷佛陀扇多譯第二出迭㸦上田結反下乎悟反犁轅于元反簸箕上布破反下居之反碓臼上都內反下巨久反條之酉反淴所戢反又烏沒反非勤劬音瞿攢相上子官反正作鑽𦠌相上奴短反下作暖大綖音線羼提上初限反此云忍勘能上苦含反任也正作堪戡隱𦿔必祭反鄣閡上之亮反下五代反上正作障瘖啞上於今反下烏雅反攝大乘論本三卷唐玄奘譯第三出序文窺天上去隨反鑑地上古懺反豪𨤲力之反紛糾上芳文反下居黝反玄奘音藏又自朗反大也此字上聲去聲並載之也竊見諸師作子朗反非也蓋不明清濁矣慨深上苦代反扸理上先擊反探𭭻上他含反下仕責反幽深波濤徒刀反泫其上戶犬反輿𠃵上音與正作與䡄躅直玉反綜括上子宋反祕扄古螢反黔黎上巨廉反𣫍衽而甚反衣袊也齠齓上音迢下音嚫足嶽上子句反添也論文阿笈巨劫反苣勝上音巨下亦作勝稱二形同尸證反胡麻也越絶書曰麻山勾踐欲伐吳種麻以為弓絃也抱朴子曰胡麻一名芳莖餌之不老耐風葉名青襄本草云胡麻粒大黑者為巨勝也苣勝同上蘆束上郎乎反衆纈戶結反絞文上古巧反脊𮌹上子昔反下力羊反正作梁梨抦上力西反下兵永反正作犁柄如𪭟昌與反如箕居之反如臼巨九反如之酉反欲廛呈連反眩翳上玄縣二音惑亂也青瘀於去反毀訾音紫搸梗上仕臻反下古杏反蕳擇上古限反又音姧誤嗢拖上烏沒反下陀可反以先結反策勵上楚責反下力世反樂上都含反下五㒵反殟波上烏沒反貝戍上蓋反下啇遇反譯云兩舌如啞烏下反乏上巨位反乏也竭也字從上音方羞恥上息由反下丑里反盲聾洛洪反捨軛烏𮧓反車軛也攝大乘論釋一部十五卷陳真諦譯第一出上帙五卷第一卷序文圖諜上達胡反蓋也下恬協反問也或作牒書版也周姖居之反周姓也正作姬經誥古到反導之上徒老反教也引也以俗訟欲反誤千祀音似年也迄今上許反至也正作迄安以稅反僧名騁兆上丑郢反下阻亮反正作壯生直沼反僧名檀玄上是戰反專檀也專誠也獨也作擅也竝葉上瓶頂反下閻接反分鏕彼遙反銜也比詠上音毗並也組習上子古反草也開枊衣力反按也屈也慧愷口改反大也和也僧名負橐音託聚螢上才主反下戶扃反史記車胤袋聚螢讀書迹上昌里反下子昔反徒兵錦反遊寓音遇也寓𭔃得上音備具也但綜上徒旱反下子宋反上又𦚭粗二音非路上居月反其也俊越上即峻智出千人曰俊也又人中最才也正隽俊四形高𭩶音竭英𭩶特立也俊也正作傑閎縱上戶萌反巷也逸群上羊一反通奧烏告反苞上布交反胸襟上許容反下居吟反墳藉上扶文反下秦昔反墳藉大簿也比鄰上音毗並也咫尺上音紙八寸曰咫建鄴牛劫反混淆尸交反濁也荐及上在甸反重也𫢈也閩越上美巾反慷慨上口朗反下苦礙反者𭤔音希卞和上乎變反䗍尺上力底反正作蟸別上呼旱反正作罕下彼列反分也番禺上普官反下牛俱反縣名在廣州歐陽頠上烏侯反下五毀五罪二反間習也靈上五反下力丁反匡道上丘狂反少稔而審反年也沉蔽博例反膺於陵反睽違上苦圭反也外也餐和上倉安反餐食也喫也正作餐餐恇然上去狂反怯也陽恨沒乎結二反夙業上息六反峻愸上息俊反下之領反該上古哀反下以拙反宏壯上戶萌反大也正作宏下阻狀反輪火亂反文彩明㒵也正作魚徽猷上許㱕反下羊州反弼諧上貧密反輔也備也下戶皆反蕃正上方煩反又音煩協洽上胡頰反下咸夾反太嵗在未曰𭜴洽也姑洗先典反三月律名神紀九里反極也會也事也理也識也又二十年日紀也句芒上古侯反下音亡春令名勾芒必鄣音章露也明也正作彰廗間上祥昔反座廗也正作席函杖上胡南反函容也禮云席間函杖果受上彼密反書之於紙曰果受也誤研𩅢行𮧓反實也冤上古丸反下明辨反倫上以脂反常也法也正作下或作綸絲也舟𮎃侯郎反婆藪速走反婆藪槃豆譯云天親正言伐蘇畔度唐言世親道亞烏嫁反次也風格古客反式也度也量也峻峙上相俊反下池里反爽發上所兩反紕紊上匹夷反下文運反挫外上子臥反不揆求祭反膚淺上音容正作庸泛芬上芳梵反下音芥誤區𫮺上渠呂反大也正作巨下乎各反上丘俱反烏侯反二誤𦯕駘上楚責反驅𦯕也捶也正作䇿下徒來徒改二反駑馬也瘦也鈍也上又音宋誤庶纍上書去反衆也冀也聚爝上才兩反下子笑子略二反炬火也正作爝也尋音恱論文被上普皮反開也分也正作披也下音恱簡也具也智鄣之尚反正作障枉坑上於往反五篇匹綿反篇品也章也正作篇有五篇七聚也誤放逸羊一反如實市一反鬱阤上於勿反下達何反能𢎢音引癁𣾫上所右反瘠無𭥲肉也言聲聞人無大乘功德向也正作疫瘦一形或作也下所立反上方藏作疫瘦音伹是上徒旱反語辝也正作但成口反烏𡖉皮也又口木反吳人云也洫𤁷音的厭𢙣上於㷔反下烏故反卵生上都管反字從肉卩音節漯生上失入反誤黑脹張亮反軟渭乎八反根五家反正作牙理上古懷反隨𨔵丈六反第二卷未掕蒲八反有糠口郎反沙絺丑𭥲反煆師上都亂反柯上竹𡰱反下古何反遍執上匹綿反不正也鄙也正作偏也下針十反持字也正作執卦二形上又音遍非也䔉不上素亂反沉麝時夜時亦二反香名彎弓上烏還反第三卷抲羅邏上古何反下郎個反𫝊𫝊二知戀反𫝊相也音椽音由遠也第四卷皆熟市六反𠌵馬上祥兩反翳暗上伊計反自乎故反也字㨾作第五卷荖別上楚加反永無上為丙反欲顯大典反明也誤起上助詐反煩惚音煩同上更乎故反串習上公患反有垢古口反逼𡧱戶蓋反為枉於往反不乖古懷反懶愭上郎旱反下徒果反慵也下正作惰敬攝大乘論第二帙十卷第六卷如來音來若屬音蜀屬真同上卡影上郎貢反正作弄金藏上居吟反燒練力見反𥎀立上余反懶墯上郎坦反下徒果反毀呰音紫慳𠫤力進反亦作各修絺上音修下夷反此云善住施音那離施那此云正勤僧柯音哥僧柯履多此譯為疲倦劬勞上具俱反輕蔑目結反更㸦音護無垢音狗成熟音孰無邊音邊謂𫝊𫝊下知戀反歡笑上音歡下音笑厭倦上於㷔反厭𤷄同上又音拳非謂搹尸反正作攝永儐必進反第七卷所詅音詮顯現上乎典反備觀上音備下音官練磨莫何反亦作劑貪吝力進反𢎢出上以忍反㸦為上乎悟反蕂辟上徒登反分拆先擊反阤桓上音陀下音洹第八卷明苦角反中上郎管反爤壞上郎歎反阿阤音陀又尸尓反非也是嚅音暖俗諦上似欲反為復音福泍汙上而陝反第九卷掉悔上大了反以串古患反嫉姤上自疾二音下都悟反得猗於綺反歡喜上火官反有彊巨羊反善扼音厄阻壞上自與反正作沮也商估音古諧遂上戶皆反和也鬱陀那上於勿反亦云優陀那亦云嗢拖南皆一義也此云惣攝亦云攝散第十卷我音執間缺苦决反頗梨柯上普何反下古何反成熟音孰俗境上序欲反修修音由遠也正作悠壞卯郎管反明苦角反無竝音並區和上烏侯反梵言區和拘舍羅十波羅蜜中是第云妙波羅蜜也此云方便勝智亦云方便善巧也經云和其光不同其塵名漚惒拘舍羅第十一卷行秆音年彌多上莫卑反式叉上尸力反六法𡰱名毗荀音詢眉絺丑夷反以揳先結反破木所用者也江南曰櫼櫼子心反揳也拙訥上朱恱反不策初責反相苻音扶訶婁音樓第十二卷所染音染如啞烏雅反𭼩𢙣上於㷔反下烏悟反第十三卷若遍匹綿反兜率阤上都侯反下徒何反伈人上相遷反正作仙仚掖又上羊益反第十四卷蓄聚上丑六反䡄摸音謨瘵其上音察監也誤第十五卷調鼎音頂則音韋孝攝大乘論釋一部十卷一帙隋天笁三藏達摩芨多譯第二出第一卷五篇匹連反正作篇安否方久反青瘀於去反一音團爾𦦨又作炎同音熖此云所知第二卷犁柄上力兮反下兵命反如箕居之反木桶他孔反如之酉反如䔉音算轉上二知戀反傳也相傳而生也亦作傳也下知兖反回動也迦邏邏上音加中音羅下郎個反胎名第三卷生猗於綺反第四卷抂撗上於往反下戶孟反第五卷抃影上郎貢反正作挊弄寬大上苦官反毀訾音紫亦作呰鉢唎音利斯柘之夜反前論云毗跋耶斯者此譯為四念處亦云顛倒悉𨲙天弃反前論云修絺多此譯為善住又音剃絁捺上失之反下奴割反前論云離施那此言正勤亦云煩瑟吒知架反前論云僧柯履多此言染汙微𠸍音笑驅檳卑進反第六卷分扸音錫第七卷名羼初諫反名唎音利𡆗腎𧟄上郎個反中時忍反下而兩反梵言鉢邏腎𧟄此云智慧即般若也被鎧苦改反甲別名重軛音厄更互音護灰爐序進反第八卷逼惚音安怛多達反拏女加反以揳先結反策發上初責反耽上都南反下羊林反頑鈍上五還反如啞烏雅反斫茤測俱反隋云眼第九卷𢤱悷上郎孔反下力計反第十卷㽵飾尸力反又音勑非邏羯上郎個反下居謁反重軛音厄婆藪乘走反造論菩薩名婆藪盤豆此譯云天親又此世親當攝大乘論釋一部十卷一帙世親菩薩釋大唐玄奘譯第三出第一卷聰睿余苪反怛纜上達多反下郎暫反梵言素怛纜亦云蘇怛羅亦云修多羅皆一義異名唐言線亦云契經殟拖上烏沒反下徒可反阿笈巨劫反舊譯云阿含青瘀於去反二廛直連反第二卷喜阿上許記反好也衆纈戶結反脊梁上音積下音良犁柄彼命反如杵尺與反如箕居之反如臼巨久反正作臼也又居六俱玉二反非如之酉反稻𮂐上大老反下古木反踰繕上羊朱反下市戰反香臭尺呪反䔉不上桑亂反彎弓上烏還反第三卷羯邏藍上居謁反中郎個反下郎甘反欲廛直連反串習上古患反第四卷翳眩上於計反下音縣𭼓瘀上與青字同也捺落上奴達反亦云那落迦此言有四義也一不可樂二不可殺三暗𡨋四者地獄古只云地獄第五卷挊影上郎貢反堅鞕音硬毀訾音紫斷疑上徒短反逯得上徒愛反唅𠸍上戶南反下音笑上又呼南戶南二反非第六卷分折先擊反是𤏙奴短反𢈔余主反古云那由他善備音備梗上仕臻反下古杏反第七卷善備音備耐𭜨上奴代反善軛音厄策勵上初責反嗢拖上烏沒反下徒可反灰燼序進反第八卷安咀多達反正作咀以先結反欻然上許勿反耽樂上都南反下五孝反傾䨱上去營反下芳目反貝戍尸注反第九卷殉利上序俊反第十卷揭路上巨列反大蟒莫朗反竭攝大乘論釋一部十卷一帙無往菩薩釋大唐玄奘三藏譯第一卷序文𮄚天上去反視也鑑地上古懺反毫音狸𢫎之上一入反庸鄙上余封反下兵美反紛糾上芳文反下吉黝反慨深上苦代反拆理上先擊反杖策初責反上他含反下仕責反泫其上玄犬反䡄躅直玉反綜括上子宋反惣也宏遠上戶萌反祕扄古營反𣫍衽而禁反衣襟也神甸音殿千里之內曰甸齠齓上徒聊反下初覲反匿迹音跡備通上平祕反足嶽上將句反添也論文摽𢡠上必遙反下尺志反正作慓𢡠貫穿上音官下音川縫綴上扶峯反下竹稅反𡩺上古孝反下五故反已上音以下步莧反具也備也吠世師上扶廢反亦云鞞世師此云勝異阿笈巨劫反此云教法或云傳古譯云阿含聰睿余稅反薩迦邪羊嗟反薩者言虛僞亦云無常或言為有迦邪此云身謂有身見也二廛音纏有癎音間正作癎所詅音詮串習上古患反第二卷喜阿上許記反希願上許衣反是莁戶𥝷反正作莖羂索上吉犬反苣勝上音巨巨大也下尸證反本草云胡麻粒大黑者為巨勝也衆纈戶結反淡𭭩上徒濫反下所戢反分折先擊反脊𮌹上音積下音良犁柄上力兮反下彼命反如箕居之反如臼巨久反如之酉反枯喪桑浪反傳傳知戀反沉麝時夜時隻二反䔉上桑亂反下戶介反和揉女右反雜也正作糅𭼓瘀上音青俗下於去反稊稗上徒兮反下步拜反殖彼上市力反種也第三卷險𢛳上許奄反下音𢙣囹圄上力丁反下魚與反穢磧七亦反沙磧也說文云渚有石曰磧第四卷㮈落上奴達反地獄惣名也正作捺翳眩上一計反下玄反亦音爾憺怕上徒敢反下普百反骨鎖桑果反亦作瑣𮄆於上利反睡也正作𥧌𢎢教上羊忍反𢤱悷上郎董反下郎計反湍洄上他官反下戶灰反屎尿上尸旨反下奴𠮧反昌艷音㷔雜揉女右反正作糅菟角上他故反椰子上以嗟反能詅七全反騷揭上桑刀反下音竭亦云修伽陀此云善逝第五卷抃影上郎貢反潤漬疾賜反堅鞭五孟反正作鞕毀訾音紫㸦相上乎悟反配屬下朱玉反含笑音笑非泛芳梵反過上丘𠃵反第六卷分拆先擊反呬多上許記反是𤏙奴短反梗上仕臻反下古杏反阿揭音揭第七卷勉勵上音免勗勸也善備音備消融以中反潰散上戶內反角上力人反正作麟嗢拖上烏沒反下徒可反應斷徒短反逯真上徒愛反灰燼似進反澍清上朱句反骨瑣音鎖第八卷以先擊反踐踏徒盍反殟波陀上烏沒反下音陀貝戍上卜蓋反下商注反㧾括古活反如啞烏雅反隘室上烏賣反臥上於㦥反𠌵等上似兩反辨先擊反第九卷跳躑上徒聊反下持石反母邑於急反聚也此云女人大威德陀羅𡰱經云母村云梵名母村此名婦人名異義同也掉舉上大了反棓剌拏上卜口反中郎達反下女加反古譯云富闍那第十卷𣩦伽上巨陵反下巨迦反煩惚音愚之稅反經音義作戅竹絳反頑嚚音銀遏溼上烏割反下尸入反怛諾奴各反大𧎔莫朗反暫起上自濫反商賈音古休上許牛反力佛性論等四論十卷同帙佛性論四卷第一卷為奮巨右反菟角上他故反龜毛上居追反臍上自西反項齒上戶講反手捊音浮朾鼓上得冷反下正作鼓離樵疾焦反悉併卑政反鞞世上步迷反角屣所綺反花𩭈莫顏反歡喜上呼官反第二卷𢎢出上以忍反相皂音㒵明苦反祕蜜上音祕下音密𣽈滑上而兖反境堺音界別上楚加反不忽所戢反誤五陰於今反勝莫顏反蜘蛛上音知下音誅滭朴上爭史反第三卷煩惚音更熟市六反善熟同上諦攝尸反阿阤音陀惚聖上奴老反兔角上他故反知德音瞋見縹匹沼反拆除上先擊虛上力人反惚上奴老反下苦角反隱蔽必祭反第四卷破塘音唐如蜂音峯毒螫音釋為糠音康明敝苦角反正作殼二形也又毗祭反非也立摸莫呼反鑄金上朱句反相皂音㒵又彼立彼力於了詳羊四反並非也推胸上直追反不𢡽音昔如實音實足跌田結反燼溺上以進反㲂者上苦反决定藏論三卷上卷盛識上市政反貯受也說文云種子器也又市征反受也鬱阿上於勿反下徒何反正作陀梵言鬱陀南梁言攝散亦云鬱陀那亦云殟陀南冷𤏙奴短反牟㖃呼口呼搆二反正作㖃也大毗婆沙論云百𠛴那成一怛𠛴那成一䑎縛七千二百剎那卅臘縛成一牟呼栗多二百一十六千𠛴那卅牟呼栗多或一晝夜乾燥音掃猗證上於綺反又於冝反面爭瘐反中卷理上力條反嬉戲上許之反試藝魚祭反眂臥上莫田反正作眠問訊音信喜妄上許記反屏覆上并井反廮癩瘻上於井反中郎大反下力主反正作僂也又音漏非狂痟音消下卷依穅音康鮭𮫶上古携反下他盍反比目魚正作魼二形又去居反尓雅云東方有比目魚焉不比不行其名謂之鯀㭊色上先擊反食上徒官反更互音護煎煮之與反亦作鬻辨中邊論頌一卷序苞乎上布交反毫𨤲音狸慨深上苦代反析理上先擊反探𭭻上他含反下仕責反三篋苦叶反即三藏是也波濤徒刀反泫其上玄犬反䡄躅直玉反綜栝上子宋反宏遠上戶萌反祕扄古螢反黔黎上巨廉反𣫍衽而甚反衣襟也神甸音殿齠齓上音滌下音嚫嶽上子句反添反論文匱聞上巨位反沉掉徒了反示上居小反串習上古患反無閡音礙中邊分別論兩卷上卷撰擇上宣兖反如鎌音廉和上烏侯反梵言漚和拘舍羅此云善巧方便即是妙波羅蜜也波抳女爾反惰負上徒果反下卷劣棹大了反沒懶郎坦反四猗於綺反正作倚忠辨中邊論等五論十卷同帙辨中論三卷串習上古患反聰睿音𨦣掉舉上徒了反示上居小反相音韋攢截上子官反正作鑽究竟一乘寶性論四卷第一卷曀鄣上於計反下之向反彼音岸𧢻色上尺玉反皮糩苦外反泥摸莫乎反淴所戢反奮迅上方問反下私俊反跟𦟛上苦恩反下丑容反跌上隆上音夫腳惣名也正作跗趺二形下力中反高起㒵也上又田結反非也王踹市兖反頥方上與之反瞼眼上居奄反熱淴所戢反誤岨壞上疾與反正作沮也又子余七余二反非迭共上田結反第二卷噎鄣上於計反正作曀第三卷𤏙色上奴短反辛諸上息津反初生也勝經作新戲欷上許魚反下許既反𡐢屎上芳問反下尸旨反𢷋畫上匹妙反𥁞也也正作彯第四卷嚙諸上五結反煩惚音雲𮋅於計反花上五口反解脫勢上戶懈反中徒活反下正作勢音也忽𧢻上倉乎反中所戢反下尺玉反不矚音囑率阤上都侯反中所律反下徒何反伎藝上巨倚反下音藝淳熟上市倫反下市六反巠處上旨利反到也正作至古文作聖聖二同至趺上隆上音夫下力中反第一卷作趺上隆誤圓子答反方上與之反𩬇清上音發下音靜第一卷作髮淨十齒尺耳反下同上䁪眼上居奄反正作瞼也弟一卷作瞼眼是也南嶽音音斬非也𪪧鎧上丑之反下口改反諸獸音狩奮迅上芳問反下相俊反琉瑀上力由反下力支反下又音禹非𢁙有上許衣反彼音岸垢膱上古口反下女利反業成就論一卷翻譯記鄴隍上音業下音皇驃騎上毗妙反下巨寄反㪍海上步沒反烏萇直羊反智伈音仙論文楒分上子孔反正作惣也又音腮非謂萇直羊反不短也正作長𡱈見上具玉反𣰽㲙上具俱反下所俱反傭革上余封反紫礦古猛反樹汁也赤攘如羊反瓜果中子曰攘也正作瓤一葙息羊反居絺丑𭥲反隱𨳰傳計反稻芊古旱反禾莖也正作稈秆𦼮三形或作芉俗字也又千見反非也舒盧迦上一手諸反八字名中句六字以上名初句六字已下名短句三十二字生於四句如是四句成舒盧迦三十二字為舒盧迦亦云首盧大乘成業論一卷欲蕳古眼反正作簡又音姧誤為簡同上簡閲也略也分別也亞出上田結反高起也雪酢七故反緣𨷂丘月反坳凹上烏交反下烏狹反紫礦古猛反拘𢷻上俱禹反下羊專反埤蒼云果名似橘字蓋從木瓤生上如羊反瓜實也瑟祉上所擳反下丑里反舍利弗舅名俱瑟祉羅此云大膝謂膝骨大也舊云俱絺羅略也稻稈古旱反木莖也舊論作芊非躰銅鍱羊接反佛粟力日反八名也音義云此是西國地名此人因地為名也正作栗又息玉反誤因眀正理論本一卷鵂鶹上許牛反下力牛反懷菟他故反以𢇛齒石反指𢇛逐也遠也𠋫也躊蹉上持由反下直諸反行不進也冗豫也下正作躇也下又七何反誤詭語上居委反詐也則因明正理論等九論十三卷同帙因明正理門論一卷由緒徐與反所詅此緣反獯狐上許云反下和姑反上又音訓風俗云也懷兔他故反彼上昌隻反逐也撣也令無上自宣反今作全躊蹰上直由反下直朱反𢬃成上衣力反抑此同上意也推也按也詭語上居委反詐也因明入𬼈理論一卷𬼈理上之聖反𬼈當不偏也定也是也說文從一止懷菟他故反獸名正作兔也或作菟菟又音𦏌兔子也𤯔頂上而真反一生曰人相上音證能上楚魚反成唯識寶生論五卷第一卷序文茫茫莫郎反奠川上丁定見二反俯偱音巡善也歷也攸絶上音由所也邁也閟彩上兵媚反閇也漲日上知亮反悠音由遠也思也痛也品彚為貴反類也檀美上是戰反專檀也專獨也正作檀瓊編上祇營反玉名也正作瓊也下布玄反區分上丘愚反垣院也並騖無付反驅也駢蹤上蒲田反至𭋂助責反編氓上布連反下莫𥝷反田民也爰洎上于元反下其既反邅回上知連反迤邅也移也又直遠直戰二反羈絆上居冝反下補畔反巢燧上助支反下詞醉反古人姓𦏁軒上許冝反無垠五根斤二反屬上力尚反下之玉反相連也貂蟬上丁聊反𭫶芝上知𮧓反下止而反挹清上一入反丹嶠其妙反鼻鸖上古豪反高也澤也正作鼻縶影上知立反幼頂反明晤音悟朗也鼓棹上公五反動也擊也下丈孝反擑也從木升𮎃何郎反塵巖岫上里擊反正作歷下一囚祐反山穴也波濤音桃聖躅直玉反屢舉上力遇反跖詞上之石反跨𥘿上口化反越也虹憣上戶公反下芳煩反槥日上宣絶反滅槥也又子芮反裂也鳳吹尺僞反遏雲上烏割反鏘鏘七羊反鏗鏘也濟濟子禮反威儀㒵煒于鬼反煌戶光反置懷上之義反亡也置也扣𡨜上苦狗反論文悏順上苦協反快也正作悏也又五頰非反實乖上是力反昞然上兵永反緒糸上徐與反下乎計反咀囉上多達反下勒何反咀攞上多達反下羅可反仳喏上蒲𭥲反下而者反觀所緣論釋作仳若更互乎故反眩翳上玄縣二音惑亂也下烏計反根虧丘隨反分𡱈其玉反咸覿徒的反難音赤遠也鑠羯上書斫反下居謁反不𨴊古還反搖揚上羊招羊照二反下以良以亮二反棑檳上步皆反下必進反並從木第二卷令無上自宣反於稱赤證反嚼咽上才雀反下一見反青蒨千見反非關古還反毫𨤲里之反𮓪上去隨反藤𦽦上徒登反下無販反臥上七審反臥也幽也正作寢搆茲上古豆反杜麗上阻亮反下力計反崇墉音容飛薨莫𥝷反屋棟也正作也又呼𪪺反誤𧆑蘼上息委反下眉彼反𭽀上倉罪反白也或赤也正作皠二形下倉贊反鮮也冗隟上玄决反下去逆反融煮上余戎反下諸與反迸灒上補諍反下子炭反堅硬五更反牢實也懾瞻上之涉反下都敢反從月索上古犬反更之乎故反正作㸦互二形流泄先結以世二反漏也煩疼徒冬反所哲知列反正作蜇蛇螫尸亦反蟲行毒也又火各反墋𡧱上初錦反棰拷上之水反下苦老反更互乎故反忖己上寸本反下居里反驍勇上古堯反武也毒上直甚反堅鞭五更反牢也正作鞕第三卷䥫鏟初眼反疏條上所魚反分也通咀嚼上才與反驚飊必招反蠍𠹗上許謁反下知列反腳踏徒盍反顛蹶居月反繫絆音半毒上初錦反正作墋磣又七感反誤為墋初錦反琰魔卒上以染反下子沒反礭論上口甬反刑音六戾上結反下力計反侳穢上昨禾反侳短也正作矬也又子靴子臥二反安也有也非稟性上彼錦反偉大上于鬼反大也草𦬔古敗反或作芥容裕余遇反乘茲子慈反襂𡧱上初錦反誤頊阿笈上都困反正作䪺下其劫反阿笈摩此云教法舊云阿含警覺上居影反分扸先擊反濕𤌢奴管反第四卷蘇咀多達反相忓音干𫮺脫上火活反達也大開目也正作豁奯二形爴烈上古麥反破也打也正作摑二形又冝作掝呼麥反裂也下力竭反破也正作裂構晝戶麥反所刊口寒反窺惻上丘隨反下楚𭍠反惻度也正作測比上于㱕反刊定上口于反削也用拓他各反所音赤彈也能口堅反第五卷援己上于元反下居里反漂泊菩各反命𣧩之中反卒命上子律反唯識論一卷蘇甕烏貢反獄卒子沒反𦏌羊上奴侯反胡羊也長毛羊也色上之入反持也攝也守也秉也正作執𦋺上居例反串習上古患反陀柯古何反劇於上其逆反增也囏也慧愷口海反番禺上普官反下牛俱反義𨷂去月反別鈔叉孝反略取也唯識二十論一卷眩翳上玄縣二音下烏計反見𡐢方問反遮𢫵寒案反衛也𢪔也正作𢫵落上奴達反地獄一名也剌拏上郎達反下奴加反剛鑯天結反正作鐵二形又子廉反鐫鎽也或昂五郎反舉也分扸先擊反吠摩上𦘺廢反質咀多達反正作咀末蹬伽上摩鉢反中登鄧反下其迦反舊論作摩登伽蹬又音鄧非唯識三十論一卷掉舉上大了反濤波上六刀反轉識論一卷七猗衣綺反又平聲掉戲上徒吊反下喜義反又汦忍反滅也盡也正作泯又音悮互相上乎故反𮞏也差也字㨾作互𭃄作㸦又丁兮竹𡰱二反非此二呼也顯識論一卷內題云顯識品券約上丘願反榆華上羊朱反橘子上居律反雞雀上古兮反亦作雞身墳冝作坌步本步悶二反雞土浴又音汾非義唯識論一卷一名破色心論兩音岸迭相上田結反棘樹上居力反𦋺上居例反屠獦力業反屠臘同上並正作獵踏𠂢上徒盍反下古花反蝦蟇上戶加反下莫加反癸卯歲高麗國大藏都監奉勑雕造
