body:
  text: 漢中沙門可洪撰依河府方山延祚藏大乘論音義第三之三盡命臨深履薄夙興溫清似蘭斯馨如松之盛川流不息盡成唯識論一部十卷一帙第一卷橐蘥上音託下音藥分㭊先擊反開破也葂角上他故反沈淪上直林反下力純反剌闍上郎達反濕𤏙如短反表詅七全反瓶甌烏佼反提塘上都号反悞下徒郎反第二卷欇植市力反苣勝上其与反下尸證反第三卷能警音景戒也伊進反瞢昧上莫𪪺反豈音尺如尺證反仾昂五郎反駃流上所事反令无上自宣反軍音侶串習上古患反第四卷通𡱈其玉反踞傲上居去反下五告反𢢔也上正作倨掉舉上大了反嚻動上許反第五卷作模莫乎反寔繁上市力反下音煩第六卷礭陳上苦角反輕拒上去盈反下音巨正作輕拒又上奇下音振並非也悞勇悍音翰猛也蕑諸上古眼反善軛音厄𨷂輕上丘月反下去盈反所目結反便憤扶吻反佷戾上戶懇反下力計反䖧螫上知列反下尸亦呼各二反殉目上似俊反不耐奴代反秘力進反鄙𣾫上悲羙反下所戢反現上九小反詭詐上居委反𠕀𭥗上文徃反下莫報反醉上音奢也矜也悞下子遂反傷酒也櫌上子告反惛悼上呼昆反徒了反悞第七卷窹時上古㒵反波濤上徒刀反也中上知仲反下於小反殞沒上於愍反鄔陁上烏古反第八卷相音韋第九第十無字後序在第十卷末沈玄上尸稔反瀓玄上直陵反凝也清也涵万上戶南反又戶感反而濬音峻深也洩慈上以世反䯉也遐騖音務馳也奔也馳也繹空上羊益反理也陳也大也尋也終也兖也亦作䭞霏華上芳非反下戶花反緒澆上徐与反下古堯反毓彩上羊六反生也長也談芝音之瑞草也論衡曰芝生於土氣和故芝草生大者如茵五色皆有也瑞命禮曰王者慈仁則芝草生也賁研上音𦘺飾也又音秘羙也韜上他刀反下於玄反煙飈音摽玄圃音補韞玄上於殞反隣幾巨几反迮也又祈機二音景躅直玉反軔羬上而振反礙車輪木也下巨廉反羊六尺也尓雅曰羊六尺為羬又五咸反山羊也又羊有力𭭻探上仕責反下他含反仙羽上音扶風名也㽵子云扶搖之風以扇大鵠鳥一舉九万里非風不飛也下于過反鳥翅也覜九上他吊反遠望也正作眺也周禮云大夫眾來朝日頫寡來曰駛也非用又或作猶音眺仾頭聽也閟虹上音秘下音紅眇歸上小反目病也小也又𥬒反粵若上音越于也玄奘自朗反大也體睿音𨦣軼芳粹上羊一反中芳方反下雖醉反微上徒告反泳祥上于命反輟水上知劣反偱鏤杠上音巡中音漏尓雅曰金謂之鏤下音江旌旗飾又床前撗木也躙雵峯上音恡踐也中音英雪也下芳逄反山巔頂也睱玄上苦濫反從蒼上斯此反篆貝上直兖反摳電上尺朱反賮寶上辝進反旈邃上力由反杳通上於了反掞組樆上尸熖反中子古反下丑之反煥騰上呼乱反綸旨上力巡反溥令上滂古反廣也大也肈自上直小反環㴾步沒反紆宸上衣于反下市人反叶洽上戶頰反尓雅云太嵗在未曰恊洽糅茲上女右反雜和也彚聚上云貴反銓綜子宋反詁訓上公五反甄奇上居延反其揆巨癸反基鼎上音箕下音丁法汰音太緒𬿑音仙挏鸞上音同引也而絢許縣反潛上自熖反下余稅反初昕音忻明也琁景上序全反上居小反績功上子歷反甄其上居延反教蟠音盤屈曲也龜疇直由反等也麟籀上刀人反下直右反式上尸力反用也下苦㝎反盡也庸謏上音容下蘓了反小也又音縮亦作諚命大丈夫論等七論十卷同帙大丈夫論兩卷上卷彼圻上悲委反下五案反正作岸或作也下又魚斤渠依二反亦岸也然非本呼狑惜上居陵反愍也憐也慰也恤也正作矝矝矝又借為憐字又或作怜力千反愛也狑音靈犬名悞如灰火曰反愚莫瓶反暗也正作𡨋又田甸二音寒也悞明垢音㺃嬰姟戶哀反正作孩又音該非施苞蒲角反磪破上在迴反折也正作摧離上為丙反長也遠也正作永也又古懷反背也悞愱姤上秦七反下丁故反下正作妬㓻昌与反正作杵鳥獸手呪反速音授賣了也說文賣物出手也恐懼音具正懼侵徒活反喪失上桒浪反商賈上手羊反下公五反上又音的悞䨱𦿔上芳富反下愽例反正作覆蔽也豪里之反心𣽈而兖反又音儒炁味上去既反淂顯上都特反下火典反下卷何迴乎灰反正作迴𮕱禍上所追反下乎火反𫘆流上所事反覺悟儜上古孝反下女耕反勉厲上音免強也勗也下力計反勸也迴與上乎魁反還也避也大乘掌論兩卷上卷羂上古犬反眼瞙音莫安膳時戰反安那此云眼藥眩目上玄縣二音如昨含反處蠒古典反牧牛上音目養也放也槗舉上居小正作橋誙𠕀上文夫反聡以苪反橋設上居小反遮詅此宣反又音虛悞永上許斤反正作欣眯亂上迷禮反又物入眼中也馬莬他故反便𨷂去月反渥團上奴号反正作望也見棒步講反環玔上胡閞反下尺反𨷂脩上去月反下思由反翅羽上式智反下于遇反眩瞖上乎練反下一計反餌能上人志反食也下卷嗢鉢上烏沒反銅鍱羊接反犢子上大木反字從牛標𢡠上必招反下尺志反入大乘論兩卷上卷姓上在木反嚙莽上五結反下占敗正作芥製電上尺世反正作掣也悞𦒿毱巨六反陶室上大刀反相于㱕反法卬一進反徧黨上疋綿反下當朗反上音遍非用大帋之是反或作紙比𡰱上音毗或云毗柰耶隧沒上大遂反落也提諸与反東州名弗婆提也正作潛穬古猛反勘菩薩行上一苦含反任勝也正作堪戡二形因捊音浮鼓搥也或作抱僧佉丘迦反比舍上毗鼻二音或云毗世師或云衛世師皆訛也正言吠世師唐言勝異過餘論勝能破論故異死上郎道反正作老羅邏勒个反胎名諸胞疋㒵反氣胞也下卷如趐音施正作翅菩薩名燒也挃沙上知反唐言鬼宿所押烏甲反杵朾上昌与反下得冷反鞭杖上卑連反鉾捎上莫侯反下所卓反正作矛矟也下又消梢二音悞顯現上呼典呼見二反明也正作顯蹴蹹上七六反下徒盍反挾劣上胡夾反正作狹阿亶多旱反比致上蒲脂蒲必二反犍搥上巨焉反下直追反大乘廣五蘊論一卷歰性上生立反沉棹大了反警動上居影反礠石上音慈也慣習上古患反又作串矝倨上居陵反下居御反心憤父吻反鞭杖上卑連反獷古猛反忍耐奴代反妄上居小反詐也正作搞大乘五蘊論一卷溫蘓早反勇悍乎案反无䖧上于求反下知列反上正作尤過也甚也蒙昧上莫紅反或作曚冡蒙三形覆也下莫內反暗也或作昧同上寶行王正論一卷若扸先擊反互相乎故反不沈丈林反沒也大也止也普也正作沆湛二形又音審悞靖諸上情井反圍碁音其嬉戲上許之反涎唾上序遠反洟流上他帝反解𣴟上古賣反下乎管反汰淨上徒盖反濤也正作汏也又音太過也併增上并正反兼也並也皆也浣濯上戶管反下宅角反搔痒上蘇刀反下羊兩反王膊市軟反臂𦟛丑容反堅酋字由反長也瞼𥇒上居掩反繖盖上乘旱反田疇直由反園塘大郎反亭館音貫舍也屣繖上所綺反釣鑷上音釣又丁𠮧反悞下女輒反針綖音線荃提上此宣反菓上音尺沼反正作刀斧音府拯恤上之瘦反下私律反林蠲租上古玄反下則胡反林偃於㦥反侶上書羊反鈞調上居勻反虵嚙五結反刖除上月天二音足刑也䗍角上洛禾反徙舟上斯此反陜劣上乎夾反正作狹陿二形悲匂盖割二音有幹古案反多互乎悟反上挨在木反又於騃烏改二反非也被駐竹注反止也又音注香剌郎達反辛味也正作辢愔隘上冝作𩐞於棻反呃不平聲也下烏賣反又喑隘歎息𭜨聲也上又於心反靖也毀呰音紫剡浮上羊染反或云閻浮洲也又時染反或云瞻部州也及𧆛昌據反正作處大乘起信論一卷序文智愷口海反竆盡上巨弓反遣騁田井反馳走也汎舟上芳梵反櫌上苦𠋫反下而沼反慧旻羙巾反黃鉞于月反雖慨苦代反論文不揆求癸反不𨓤音退生莫列反盡也絕也亦死也字從威聲威許劣反臨大乘起信論等八論十一卷同帙大乘起信論兩卷上卷煩惚音𢙉又音忽悞慣習上古患反緣償時亮反俻也柔䎡如兖反分拆先擊反分也正作析扸二形下卷𭞚理上居御反依也按也正作㨿又其㨿反又玉篇音渠並非也鑛穢上古猛反憒𡗚上古對反下女孝反𤵜疾上丑刃反三无性品兩卷上卷煩惚音𢙉鞮迦上丁兮反兩互平悟反故昌陵反正作稱偁二形相皃莫孝反串習上古患反相皂莫孝反正作㒵貌二形又逼䳨杏香四音並非相狠莫孝反又似貇苦佷反非迭㸦上田結反傳傳相上二知戀反傳相傳也亦作下卷悎悟上古孝反睡惺也正作覺寤菟角上他故反正作兔發菩提心經兩卷亦云論上卷扸破上先擊反明口角口木二反慊疾上乎兼反又音嗛悞常係古詣反連也揣上尺少反下徒官反一縷力主反之綖音線置羅上子邪反免也正作罝䀎膝上普幼反視也羙目也正作盼下郎代反傍視也從目來二並悞毀呰音紫柔𣽈人兖反又音儒撾打上竹花反下得冷反加音無枉也不猗衣綺反正作倚又於冝反俻受上皮媚反燒𭧶諸与反俗下卷臅髏上大木反下洛侯反項脊上何講反下子昔反胷脇上許容反下許刧反寬䏶上苦官反下步米反脛腂上形定反下胡瓦反下俗抑制上衣力反而時力反種也生也正作植殖二形輕莫結反无相論一卷若㭊先擊反觀所緣論一卷瓶𠥷鳥侯反彼上先擊反觀所緣論釋一卷呾迦上多達反鎋反非謨阿上莫胡反譸議上知㽞反誑也瓨甌上行江反下烏侯反甌同上其仳疋尒反離也又皮羙反猜卜上此才反疑也恨也下布木反龜曰也方便心論一卷廣殖市力反荊棘居力反稊稗上徒兮反下步拜反羅𩦾毗妙反此云實嚴飾尸力反正作飾餝二形也又音勑非輕躁子告反揌破上子孔反攢𢷊上子乱反下音遂上又子官反正作鑽也但餝音識𢭀火上序緣反有創音瘡有𧢻音觸鹽香上羊廉反幾渧音的被音無如實論一卷自顯呼典反水滴丁歷反正作滴水適同上深迴諍論等十六論十六卷同帙迴諍論一卷飜譯記都鄴音業王種之勇反序文作王重非也驃騎上毗妙反下巨寄反仲密眉筆反序文作蜜非論文抂撗上於徃反下戶孟反能灡郎歎反憂憒古內反乱也亦作慖者音星正作惺憽了慧也亦醉悟也亦作醒也又息井息定二反悞也亦作悄別論作惺字是也郭氏音作𥨕二形息定反𥨕字郭氏未詳衣蕃音煩屏也又方煩反冝作幡繙二同音芳煩反幡𢡠㒵也繒繽繙風吹旗㒵也枉撗上於徃反下戶孟反前作枉撗非躰也大乘法界无差別論一卷所蝕市力反羅睺音羅𠋫者攝也睺者𢙉隱攝日月今諸天生𢙉也提婆菩薩破楞伽經中外道小乘四宗論一卷僧佉去迦反如爪爭巧反提婆菩薩釋楞伽經中外道小乘涅槃論一卷伊尸遮反倮形上戶瓦反淨也摩陁音陁安荼宅加反兩脾步米反正作髀提𠊷直利反虵蝎許謁反蚑䗈文盲二音正作蚊蝱蠅子老反正作螽是𤌢奴管反生同上婆只音紙婆枳同上又紙氏反𣮃多上巨六反尊者名擾波𣮃多也正作毱鶴勒上何各反正作鸖緣生論一卷彥琮在宗反破邏力人反具膱女二反酢與上倉故反五味之數也又音昨非舌唌序延反正作涎又音擅非用也甜酢上徒兼反辛澀所云反頞浮上安割反箄尸上音閇𫝊𫝊音轉知戀反相傳也百字論一卷聡以苪反淴所立反先舊巨右反刀鞘音笈紡織上音兔角上音吐十二因緣論一卷迭㸦上徒結反如㸦音巨生唌序延反口液又音壇歎非也壹輸盧迦論一卷輸盧迦上手朱反或云首盧迦或云室路迦此當三十二字為一輸盧迦也聡叡以苪反大乘百法明門論本事分中略錄名數一卷掉舉上大了反補特伽羅伽其迦反此云人亦云有情觀惣相論頌一卷連属之玉反不断也所詅此緣反正作詮又力丁反悞唯𡱈其玉反止觀門論頌一卷艶嬌上以贍反𮌨脹上疋泣反下知亮反筞勵上楚責反掉𢙣上徒吊反如蛭之日丁吉丁結三反水虫也鉤𣃆竹角反是𤏙奴短反連跨苦瓦苦化二反𦝫也抓狢何各反似抓而小鳥喙竹角反正作殘䈥音斤受𦘺膚上烏礙反下府無反鉾箭上莫浮反䖝唼子合反嬌態他代反洟唾上他帝反諠雜上許元反手杖論一卷㒹蹶居月反企耶上丘弭反等費妃沸反嗢波柁上烏沒反下陁可反髴心上芳味芳勿二反鉢𦍞丁兮反道渠巨魚反道渠謂說伊也取因假設論一卷嗢揭上烏沒反下其列反互無上乎悟反㮏癭上奴達反下一井反反出上音翻轉也眼睛音精巳音尺孾孩上於盈反俗窣都上蘇骨反六門教授習定論一卷串習上古患反缺犯上苦决反若掉徒了反動也修寂盡歷反录稟丘錦反解捲論一卷解捲音拳又作摧也蕳擇上古眼反於藤音騰分柝音錫菟角上他故反掌中論一卷毫力之反分折先擊反菟角上他故反已上大乘論音義已竟小乘經二百四十部六百一十八卷四十八帙小乘經音義第四之一履長阿含經一部二十二卷第一帙十一卷第一卷種自木反維濊相𨦣反年也正作歲嵗二形又烏外烏衛呼外三反非也拘剬力至反正作利後偈文作拘利七佛父母姓字經作拘鄰利真反騫荼上丘𠃵反下宅加反无惚奴老反又音忽非也憂傶倉歷反一煴烏昆反矮也正作溫也又於云反天地氣也非味𧢻音觸王上許建反進也周禮曰致初於人尊前曰也正作獻也羈靽上居冝反下布縵反腸上市軟反下直羊反𦟛直上丑容反𣒀紺上序全反下古暗反下亦作𥿀𥿀青赤色也齊亨徒丁反悞方愸之領反愸上同俱眴音舜動瞼右遊序全反正作旋䗍如上郎禾反互相上乎悟反𦟛䏶步米反摩捫音門俱眴与眴同尸閏反乳餔音步面爭瘦反襵也皮緩也正作四形也身屢力主反曲脊也正作僂柱杖上知主反喘息上尺軟反宮館古乱反不倉歷反苦忽奴老反正作𢙉㯢檡上思兖反正作選也憒𡗚上古內反下女孝反心乱也危脆此嵗反永滅上于丙反滅同上正作永也此偈中有九个永字四个作音永彼音岸蹬山上都能反上也除寘莫瓶反又支義反非憂音𢙉足上力底反拜也正作禮禮二形屈电音申隧墮上直遂反正作墜罣㝵上戶卦反下五代反死枙音厄如鵠戶沃反庄士上阻故反正作壯塵𮋅於計反第二卷𥘡巨友反國名也又作祇中阿含作䟦耆也又丁𠔃反悞𥘡同上又音脂悞閨門上古携反戲咲私妙反讓上一入反耗天告反猗覺上衣綺反又於奇反巴陵上布麻反防禦魚与反乘桴音浮小木伐也屈电音申揵推上巨焉反下直追反舍菟奴侯反明喆知列反𩣺疾上布門反麾盖上許為反嘆吒竹嫁反汝𮤝去月反并𩞚上必政反下其既反正作三形也人名也立五分律作祇四分律作耆般泥洹經作並同是一人名也經音義云相承音飽又以𩞹字替之一熖反飽饜並非珠鎧苦改反錠繚上徒丁反下力堯反大燭也正作燎曚矇音蒙二同勇悍音翰第三卷愕然上五各反殞絕上云愍反躃踊上步益反婉轉上於遠反㘁咷上戶高反下徒刀反祗巨支反前作𥘡非琦上巨冝反現閈音閇又音翰非姧邪上古顏反卒見上倉沒反轟呼萌反覺而上古孝反不睡也草蘆音閻舍也正作廬礔礰上普擊反下呂擊反仿佯上音房下音羊徙倚也謂閑睱遊行㒵也聲聒古活反礔嚦音歷正作霹靂渾濁上戶昆反四牒音𤗊問訊音信空缺苦血反欄楯上郎干反下食尹反刻鏤上苦黑反下郎豆反沾潭上徒兼反下徒濫反安靜也正作恬澹也下又音覃深水也又以審反並非銀蹬都鄧反堦級也正作隥繞遼上而沼反下力小反正作繚也又音聊非悉備音俻不於小反少歿也正作寶塼之緣反亦作甎以砌七細反銀櫨音盧析也綩綖上於遠反下以然反眩曜上戶反馚馥上芳文反下扶福反校飾音識𣰽𣯫上具俱反下數俱反織毛褥也下又力俱反非用也毾㲪上音塔下音登蹹蹈上徒盍反第四卷歔欷上許魚反下許既反下經文作唏非椚淚上莫本反拭也措骨上倉故反安也枝樤音調小枝也閑睱音可翅舍上音施外道名金被上冝作衾菳二同去吟反下音婆又或作枝外道名也諸經皆云欽婆羅即此經第十七卷作欽婆羅是也歔欷上許魚反下許既反倉頡篇云泣餘聲也亦噓啼淪曀上力巡反下於計反闡弩奴古反車匿也虜上音魯下音戶奄隧直遂反悞騷擾上乘刀反下而沼反渡熙許其反置床助㽵反正作床塟具上子浪反疇上直由反下普吉反正作匹瑕隟丘逆反相仾丁禮反捍䝴佛上子西反仚望上去智反第五卷嶷上魚力反炎𩭈上羊瞻反下莫顏反正作焱也上芳武反拍也正作拊撫二形下於陵反胷也何𦍬古胡反良幹古案反公也正作榦也炎𩭈莫姧反徵占上陟陵反下直照反呼也正作召或召即召直照反炎䰅莫姧反悞相卬上息亮反下因進反𣎸邁上許有反腐也枯也正作杅㱙二形下莫敗反上又郭氏作歷了二音杇邁同上知奮巨右反綜理上子宋反外俠戶夾反正作狹可養羊兩反別經作餮南岳音背非无上力條反正作聊𨱰上芳𠕀反下芳物反依俙也正作彷彿火𧂐子賜反誰𨳰必計反正作閉䰅𩬇上音湏下音發正作䰅髭也𮍜率陁上得侯反下徒何反舍奴侯反正作莬亦作㝹舍㝹同上頗漯上烏割反下失入反正作頞濕也中阿含經作阿攝貝是也二並悞也婆嗟七何反正作蹉秦言上疾辛反阤揵上音陁中音𠃵下正作椎直追反然上牛力反正作嶷提湖音胡正作醍醐沾然上音甜正作恬第六卷悉吒上辛七反下知加反𠉱佯上房下羊悉咤竹加反瑕郄上戶加反下丘逆反輕子告反正作躁堅䩕五更反正作鞕迭相上田結反也更也糠糩上苦郎反下苦會反棑儐上步皆反下必進反𠚫已上牛例反㯹試上必遙反疅畔上九羊反䉼理上力迢反慰勞郎告反𨢘換上呼𠔃反下所愸反正作搜𭜨訴音素弓𠂕音屎攻刼上居冬反椋𡙸上力向反下大活反荊蕀居力反𧈸䖟上文下盲蠅𧒢下音瑟冝作蚤音早蜂䖧上音峯下音哲珠璣音機溝坈上古侯反下苦庚反嵠𡼏上苦兮反下古反戈鉾音牟𥨍沒上芳福反傾也正作覆也又音伏非也𩚾饕上音䥫下音叨丘墟音袪隣比音毗並也又步必反次也儵伽上尸六反下丘迦反正作佉也或云蠰佉或云傷佉此云螺亦貝也雄桀其列反英特立也俊也正作傑百孤古胡反按孤狐也抓引也諸經中多作觚也孤古花反引羊刃反第七卷𦿔宿上傳世反智上以苪反隊徒對反智上羊稅反為莫結反竹蔓也經音義作𦽦音三刮古頢反淨灰火迴反鬒𩬊上相朱反正作䰅又音悞溝𫮺上古侯反下呵各反有泄私列反又音曳囚中上巨九反正作臼也揭以上刀老反杵也正作㨶也又其列去列居謁三反非也杵揭上昌与反下都老反悞碎扸先擊反堅䩕五更反牢實貴來上即西反䐗䐁上竹魚反下徒昆反下又音卓自刎文粉反其音福正作腹拤丸上盧貢反捔伎上古岳反撾打上竹花反下音頂磽确上苦交五孝二反下口角胡角二反石地也又塉土也亦作墝埇也忽所戢反𦿔𢙣上步祭反正作𡚁第八卷嬉怡上許之反下以之反和恱也而咲音笑裸形上戶瓦反彰𦿔上之亮反下必際反正作障蔽食上幸江反正作𤭇說文作瓨𤭊二形又第十六卷云不受夜食杅食上云俱反兩𥁄同上食莠音酉食𢇲美垂反𥠆稻上古斬反飼馬禾也子也苗似稻子如𥞫粒也水生曰陸曰𥠆也出萇筠和尚韻也又第十六卷作鹹稻中阿含經作稗子並是也步介反鹹古斬反出說文下音道稉穀也上又應和尚以穢字替之非也又郭氏音咸亦非也莎衣上素禾反襜身上尺廉反尺焰反蔽膝衣也毛編步典反正作辮床廗序昔反菓蓏郎呆反毀訾音紫黜汝上律反揣食上徒官反禁忌巨記反正作忌病瘦所右反四枙音厄棹戲上大了反下許義反狐疑上戶吴反可上伊進反第九卷瘖啞上於今反下烏雅反勉力上音免強也勗也第十卷妷羊一反相欑子官反為鐙音登毗阤音陁宎上音奔下徒骨反而𠸍音笑欣喜也又音美非恭恪苦各反敬也亦作㤩𧢻嬈上尺玉反下奴了反釋咲音笑𭜨讎市由反貪嫉自疾二音調戲上徒吊反第十一卷㝹夷上奴侯反下羊脂反所在名也寘寧上莫丁反又支義反非㝹夷上奴侯反下以脂反車上力計反正作此云薄皮亦云同皮恡不上力進反无垢音狗无於㷔反飫也正作饜也卑陋上音卑下音漏俻具上皮秘反皆也成也正作俻庍上古秤反下郎盖郎達二反正作疥癩也上又補卦反並悞也𡨋寧上莫瓶反前作𡨋悞糞扶久反伏舐時紙反糠糟上口郎反下苦外反穅也正作𥢶又普遭非也糠糩苦外苦邁二反作糟悞右序緣反索上于鬼反中桒各反下古詣反普悞枻於上以世反𨗨索上云鬼反下古詣反𧩨口上乎悟反正作護𪱦𢣷上音惶下音懼車上力計反車上同並悞但有上徒早反上力計反𢱍音晚奮迅上音糞下音峻檡宍上音宅下音向奮迅上方問反數上阻挌反下色禹反跪地上步包反正作跑穴鼠上玄决反下尸与反䆤塚上尺專反下知勇反戲𠸍音𥬒皆漯失入反浴上子老反逸羊一反秏火告反𢁙此上許衣反𨈢緬上都南反下兖反不音肯字樣作肎時晚音晚伴黨得朗反正作黨排濟上步皆反推也下子計反排也盪也正作擠又音賫不私列反狎也𢢔也正作𡝥也又或作嬖音閇愛也卑也賤而得寵曰嬖卑𡝥也冝作𡝥親音族親巨右反伎藝上巨綺反下魚祭反如音避抑制上於方反妻婦上七西反背上云㱕反威嚴音嚴撰檡上音選下音擇極宎上丁禮反下徒骨反如蜂音峯儲積上直余反𥞩田上古莖反置枚音𠬧薄第二帙十一卷第十二卷緬祗上兖反迭相上田結反朽塌音塔門閫苦本反抓押上爭巧下音甲腸𦝩上直羊反下云貴反汗肪上音翰下音方手捫音門又虵音野多咃音他毗牧音目羅嚀音寧枑陁上音脂亦作祗又丁𠔃反質𮍜都侯反諦婆上音帝經音義作諯專釗三音非犂上卑兮反下力𠔃反陛上呼𠔃反下步米反提豫音預阿𨗻郎个反正作邏伽予上巨迦反下乎西正作𠔃也悞多邏郎个反𦤈幾上巨既反下居衣反經音義作具幾𦽦陁上莫官反捎提上消稍二音羅翅音施櫨上音徒下音盧摩上戶遮反栗吒上力一反𠔃婆上戶西反鳴㨬上音烏下音園下或作裝音㽵𣏾㝹上羊力反正作𣏾也下奴侯反上又或作找牫藏牆二音六𨳰音閇卑予音𠔃子上音奚正作𠔃羅予同上伊昵女一反予余上音奚下音餘枇那上毗利反余枇同上秓廋雨愁桒走二反哆邏上都个反𠃵沓大合反羅予音𠔃自前十五箇𠔃字十三箇作予一箇作𠔃一箇作子礕礰上普擊反下魯擊反正作霹靂也第十三卷獨上古還反六十無妻五十無夫曰寡正作鱞卑陋音漏戲桛音弄於樔助交反鳥窠也配迮上普對反下普吉反悞䰅𩬊湏發二音古猛反𭜨𡧱乎盖反字㨾作𡧱見別本作周雞犮上鷄下犬斗秤尺孕反手捲巨貟反𭷣枻上丘堅反下以世反責上丁禮反下阻麦反負財也正作債𧩄𠕀上武夫反枉也羽翮上于遇反下行革反大𤴷仕㽵反又書類火骨二反悞菀綖羊然反䟽頭上所魚反或作梳鐶鈕女久反潔上子老反革蓰所綺反嬉戲上喜之反棊𢩁上巨之反下巨玉反瘖瘂上於今反下烏雅反針九救二音鼠嚙上書与反下五結反彗星上祥嵗反又音遂執鞭卑連反失轍緾列反塗創音瘡夜偃於幰反掉戲上大了反潤漬在賜反堅𨳰音閇戶嚮響向二音䆫也無𨵗去月反鞘中上私妙反從簏力木反赤綖音線顯敞昌兩反俠心上乎夾反正作狹村渃羅各反𮍜瀬上當侯反下來太反掘塹上其勿反下七熖反菀𮞠以然反持𮣃居迸反矟有歧者也狐疑上戶吾反即蹴七六反幢麾許為反酌上之林反蹶倒上居月反適上尸石反纔始也第十四卷稟幸上兵錦反下胡耿反下又音㒓悞妷以一反手捲巨貟反要上去願反正作券債上丁礼反下阻麦反聞上古瓦反𣰽𭯫上其俱反下山俱反𣰅㲪上他盍反下多能反碁𡱈上巨之反下巨玉反諂諛上丑染反下羊朱反瘖痾烏雅反又音阿悞鍼𬉹上之林反下九救反二音正作𬉹也疾上才反乳餔音步第十五卷綜練上子宋反桎梏上之日反下古沃反牸犢字讀二音援助上于願反火𧂐子賜反第十六卷猥屏冝作隈庰上烏對反下蒲政反惚僻處也又上烏罪反下音餅𮍜率上多侯反給㜾古胡反正作孤辟於陵反悞彼鸞於陵反正作鷹論云視岸鷹也阿室己下一音似亦云阿說木此云馬勝倮形上戶瓦反捨置知利反悞喜猗於綺反七覺之一也鄣弊必祭反掩也正作障敝也夜食第八云不受瓨食朽食上兩俱反正作第八云不受杅食兩辟音壁第八卷作兩壁兩朽上力掌反下云俱反第八卷作兩盂也見狗古口反食莠音酉鹹稻上古斬反詞馬禾也正作𥠆亦作鹻說文作醎鹹醶通上五形𥠆稗子也水田中生者名稗陸地生者名𥠆但是一物有此二名也如中阿含經直作稗子是也經音義作𥠆醎二形應和尚以穢字替之非也自渃音落莎衣上素禾反襜身上尺占反蔽膝衣也毛編步典反正作辮也又卑連卑典二反非牀廗上助㽵反下祥昔反𮏂蕀上居英反下居力反菓郎果反正作蓏勇悍音翰已辨音辯伈人上相遷反平圻音岸亦作𭎋也又祈銀二音非平同上槗樑上巨反第十七卷婆上烏含反菓名前後皆作菴婆羅園也或作掩音奄非旃那上之延反梨沸非味反又或作彿芳勿反維摩經云毗羅𦙁子沸者子也牝象上毗忍反雌也又毗履反鉾劒上音牟兵器也長六尺六寸牟正作予𢦵𨥤三形也鉾甲名也非弓𠂕尸旨反正作笑織䰅莫顏反刼𢱊亮略二音臠割上力兖反問爪古花反轝舁音余第十八卷香遍音遍耶仾上序嗟反下丁𠔃反又別本作俹鳥嫁反車淭巨魚反蘭楯音順銀桄音光車𤦲巨魚反蘭楯音順遶繆上而沼反下力鳥反下正作繚緾也下又羙休反綢繆緾綿也冝取繚字為正也鳬上音扶野鴨也正作𭄩也又音力非中汲居主反正作級夾道上古洽反梵加夷中作迦音加初禪惣名梵加夷天梵伽下音加正作迦又巨迦反非從廣上子容反于𨔵音代又田全反非也縱廣上音蹤上下也南狹戶夾反伽灆上巨迦反下郎甘反睒婆上尸染反佉阤上去迦反下徒何反北音岸佉詶音酬甘柘之夜反木瓜古花反滿杶上步乎反下徒刀反六身五加反無疧丁禮反又音祇非也馬𦜩奴老反繁茂上父幡反下莫侯反芬馥上芳文反下音伏正作馥梯𭠷上他号反下鞞米反珠挄音光愽𢲻子活反纖傭丑容反銀蹬登鄧反正作澄出圻音岸又祈斷二音洋㥧上音羊下音順芳梵浮也又音馮俠上嫌頰反下音岸右𢭀序緣反孔翠七遂反地山烏洽反下也𨺻也正作凹容二形坑坎上苦庚反下苦感反荊蕀上居迎反下居力反株𣐎上竹朱反下五骨反蚊虻文盲二音蜂上芳逄反下許謁反正作蜂蠍下又音疼悞𤝧𧆞二音槃縈於營反右梪序緣反正作旋也悞地烏洽反悞糩糩上音康下苦外苦夬二反釜鍑上音父下富福二音似釜而口大飯熟市六反皮口角反華𩭈莫顏反繁芪莫侯反悞寶𡐊古歷反復弊覆蔽二字也悞右𣒀序全反地烏夾反弦皼上音賢下音古周子合反陵阜音婦虴文音二音蠅子老反正作螽虵上許鬼反前作𬟸虵蜂峯歇二音正作蜂蝎右音旋地烏夾反陷也正作凹容二形也釜𮢩方救方伏二反於上陟利反正作置構牛上古豆反師上莫顏反𮕱秏必告反蜜遅上眉肇反下直利反四忂其俱反令所卓反正作嗽猗語上丘倚反正作倚不恡力進反牀㯓上助㽵反下他盍反徧枉上疋綿反下於徃反絞餝上冝作鉸珓二音古孝反裝也下施食反或云友飾或云扳飾也上又古巧古了二反縛也六牙五加反齒也正作牙㸦二形纖丑容反直也悞悉俻皮媚反珠𨱞音毛也長毛也從髟筫色上之日反謂形容㒵也身煴烏昆反正作温栴檀上之然反不衣小反琦音奇垖上都迴反下扶久反蠅子老反地烏狹反舀也正作凹容二形亭水經音義作渟同音泥淖女㒵反沾洽上竹廉反下乎夾反匱乏上其位反芬馥扶福憑逼二反香也悞第十九卷𥥆一了反莫瓶反𥑐上都迴反下烏甲反正作磓壓也下又音甲非釿斧上音斤下音府𤝦狼上助皆反鐵𤓰上天結反下爭巧反迭相上田結反相爴古獲烏號二反打也摣𤓰持也皮剝補角反或作㓟剝掬撮上居六反下倉活反從𠰸烏賢反鐵𭉨即委反號咷上戶高反下徒刀反捉擈蒲角反正作擈上蒲紅反下蒲沒反風煙𧺫㒵也火盛也正作䫻㶿也擗口上補麦反正作擘來囓五結反足蹬都能反上也正作登也喙頭上竹角反鳥𪅎也正作啄又許穢反悞奔馳音池走也䶥掣上側家反下尺世反䶩囓上竹皆反嚙挩曰也又音劑非杝枻上託何反下以世反凍陟玉反繩絣布耕反振繩墨也堆𥑐上都迴反下烏甲反麋碎上美為反下蘇𭔹反蹴蹹上七六反下徒盍反踐也正作蹋蹹囓也𨫼上上五告反前五高反䥫陶徒刀反輾熱上女展反車轢物也燎身上力鳥反𨃠上七羊反下蒲北反䪺伏㒵正作蹌踣也經音義作蹌踣是也飛颺以良以亮二反𢪱隨風飛㒵也有蕇多安反經云受六十四斛也此應西天有此噐名也正作簞也經音義以篅字替之乃此方倉号耳四戶木反正作斛也矇音蒙皮緩乎管反肌𣎅上居夷反下側瘦反襵也皮不伸也縮也正作三形也下又郭氏作乙在反非也膢脊上力主反正作僂又樓氀二音非柱杖上知主反或作拄憚恌上之扇反下徒了反四支動也正作戰桃或作顫掉也上又音佪下又遙桃二音並非酸疼徒冬反直上他頂反直也長也正作二形也悞也熢𤏮上蒲紅反下蒲沒反食上補各反兔梟上他故反下古堯反痾𢦶上烏雅反下古拜反不言也謂外道持不語或也上音阿非也捫摸門莫二音其䏶步米反其膊市軟反曲轅于元反如箕居之反如鼎音頂丘阜音婦如旧巨久反如絙古恒反大索也互相上乎故反第二十卷咤竹家反繞繆羙休反廣如前釋也歰所立反石墮徒果反堆也正作架紅𦆝疋沼反正作縹𭩦上曾貢反下無府反又經音義作挊舞音卞𨢘嵬上火兮反下五迴反不眴音舜又詢瞤二音揣食上徒官反䰿上魚袁反下徒何反第二十一卷㳙澮上古玄反下古外反㳙小水也尓疋谷注瀆曰澮也淵池上烏玄反虵池上市遮反經音義作𥝀至膝音悉𬧅踝上市軟反陶家上徒刀反然竈子告反頺落上大迴反灰燼似進反漸涱知亮反皷蕩大朗反濤波上大刀反宂泉上玄决反丁又經音義作湶坑澗上口庚反下古鴈反洗濯宅角反滌蕩上徒的反下正作盪也呼唅呼合反大歠也正作欲也下又火含乎紺二反非也或作哈亦非梵迦音加銅杵昌与反𥧼而上七結反仿佯房羊二音毀呰音紫觸𥥛徒骨反可俎才与反壞也又音怚尾朾得冷反又音頂戈鉾音牟弓矢上居雄反下尸旨反即勑丑力反誠也見別本作勑悞牟弰所卓反正作矟也又所交反弓未也悞也𧯞斤上竹角反正作鉞斧上于月反輪上序緣反𦊰索上古犬反𢭀輪同上第二十二卷稊稗上大𠔃反下蒲拜反茤摩上測俱反細軟衣也蝎上音峯下許謁反下又何割反非也阜垖上音婦下都迴反應言垖阜也悞𫇲芊上戶𥝷反下古旱反𭧶汁上諸与反正作煑𢱊奪上亮略二音下徒活反手探上居六反正作掬曰二形澁所戢反梓栢上音子木名也異係音計連也疾上扌反正作疾同上如蕇多安反又音典悞大孤古乎反白鵠胡反上尸有反下居雄反蝘蜓也正作守宮也悴才遂反推胷上直追反下許容反為耦胡果反正作𢰸為禑同上妷羊一反泆同上𭣣穫和郭反𠚫也併穫上必政反下同上又作獲悞柎匈芳武反拍也正作拊又音夫悞自悼徒到反傷也悴才遂反手朾得冷丁領二反擊也正作打也又中莖反悞也又見別隨函作摛蘇了息六所六四反擊也打也窂弓上勞下躬十在木反伽𤦫上其迦反下力乘反王名伽𤦫伽也四分律云迦陵迦㿈創上於容反下音瘡夙中阿含經一部六十卷六帙第一𤙈第一卷偈咃音阤亦云伽他亦云伽陁此言應頌鳥啄許穢反口也𭪿也言樹花如鳥𭪿也正作啄樓橧音曾正作橧㭾鑿上其月反下才作反弓矢上居雄反下尸旨反矛㦸上莫侯反勇魚既反堊灑上阿各反白七也木上才焦反儲畜上丈魚反下許六反秥豆上女廉反蔗餹上之夜反下大郎反鹽脯上以廉反下方武反內靖情井反勇𣪴冝既反華䰅莫姧反勑上古反縛也劫固也其𬧅市軟反其髀步米反銅鍱羊接反銅鐷同上䥫鉆叵反釧也燒斷魚斤反牀㩉床塔二音牀㩉同上同上樶舉上子活反挽也垔灑上与堊同烏各反又音因塞也非也溫𣊵乃短反堊灑上烏各反第二卷燒䴸芳夫反推打上丈追反下得冷反迸火上布諍反吒上女利反或大𡰱吒或云膩吒氍氀上其俱反下生茤反織毛褥也正作毹又力朱反非用𣰅㲪上他盍反下能反榣尤牟江反河名也正作尨二形也或云閻母那或云夜摩那皆是此一河名也又于求反傳寫悞也摩仚許延反河名也或云莫四或云莫𨢘或六摩𨢘可猗音倚枯熇古老反火乾也枯也正作槗薨三形也又呼各呼木二反熱㒵也非用至䐀巨冝反異也木別生也脚兩間也正作奇㩽二形也又音寄非也陶師上徒刀反燒瓦也廮電上七乱反下子告反正作㸑竈一憸音焰火晃昱上黃廣反下以六反不諳音菴反識也栽燼上子才反天火也正作烖也悞下辝進反燭餘也兜率哆多可多个二反亦云都史多天白晢先擊反白色衣也冝作鬄音昔髮也謂白髮也隆鼻上力中反鸚武𭉨上烏耕反中文府反下即委反言白髮鼻高如鸚武𭉨也婆雞吉𠔃反鞮舍上都兮反舍利弗名優波鞮舍優波此云逐鞮舍星名也此云鬼宿智度論云優波提舍樓瘦所救反屏廁上蒲政反正作偋庰二形又餅瓶并三音並非用蠅螽子老反正作螽第三卷雖𥧼千結反奪取上徒活羈瘦上居冝反下所右反仿佯上音房下音羊徙倚遊行也戲咲音咲大𠌵似兩反正作象尾𦞳苦駕反𦝫骨也正作骼亦作𦝣也項頟上乎講反下五格反華𩭈莫顏反古猛反蜫䖝上古塊反暐曄上為鬼反下云輙反按擵莫臥反正作摩第四卷麗𭪩上力計反下葛世反或云梨昌或云離車或栗㚲此云薄皮亦云同皮以槐苦迴反正作盛菜茹而庶反又汝如二音子上蒲拜反稻属苗似稻苗子如黍粒可食也正作稗也又卑睥二音悞穄米上子例反𪎭別名雜右猛反殼也正作穬麦名也大麦属編髮上蒲犬反正作辮手抒音序改而揚之也又直与神与二反羇瘦上居冝反下所反開創音瘡痍也刀傷痕也正作𠚫撿撓上居掩反下奴孝反木曲也畜卒上許六反養也下子沒反健也打皷上得冷反下公五反而𣐩古堯反斬首也正作梟二形所音六煞也枉煞上於徃反牧捕上書由反下蒲故反棒打上步講反木㩜戶黯反斬剉倉臥反制割上之兖反細𭃄肉也正作剸剬二形也又音制非也又徒端反截也正作剸也如食字作端字是也悞南音岸𥞩駕上古萌反正作耕第五卷拘絺丑脂反椯食上徒官反无䆤音川煒燁上云鬼反下云輙反老莫報反齒落上尺里反脚戾力計反曲也緩上戶管反下側瘦反群㝹那頭反比丘名破群論中作頗勒霎那亦云破求那此言翼宿群同上戶𮐯音藥正作鑰也遍至上補見反秔陁上諸然反洗上子老反青瘀於去反膖脹上疋江反下知亮反謗上武夫反謗同上枉也正作置岸上知利反正作置槀草上古老禾稃也正作槀藳二形或薨在二同火高反蒿薨渾濁上戶昆反可跽其几反膝加地也手膝音悉正作膝第六卷瞿尼蒒上其俱反下所持反躁擾上子告反下人沼反訶數師矩反責也誥嘖上輕吉反下阻百反上又音告悞調𠸍上條吊反下私妙反敖上居反下五告反𢢔也前作慠是也又五高反非瞿𡰱萌音師与藥字同也悞欺𧥶居况反正作誑王租則胡反祭餟陟稅反酹酒也蘭哆多个反闘瑟哆上都豆反下多左反亦作覩史哆也姓上在木反慧上才反問訊音信揵塌上其焉反下他盍反下又或作蹋徒盍反或云揵闥或云揵呇䩛勒上兵媚反馬也正作䩛二形又毗必反車革也堪耐奴代反白縶徒恊反正作㲲虻文盲二音蠅蚤音早訜訟上側迸反闘也引也正作諍爭二形負輦上扶富反下力遣反負擔也荷也正作負也輦人步挽𦍬也或作揵擔運物也慧上潛反疾也利也第七卷拘絺丑反𨳰塞上愽計反愽列二反掩也塞也正作𨳰諸畜丑救反六畜也扴齒上爭巧反下昌里反上古八反悞腸𦝩𡐢上丈羊反中云貴反下方問反嘖嘍上阻伯反下生主生遇二反呵罵也正作數或作𡂡柔似茲反正作辭捲杈上巨貟反下丑街反姑嫜音章謂𮌗𮌗根中二同奴老反頭中髄也悞膿血上奴冬反下呼穴反肪髄上方房二音肪也涎膽上序延反下都敢反嘖𡂡音數前作嘍字非也坐臥音臥鑽木上子官反珠燧音遂火母也風上音福正作腹掣縮上昌列反下所六反風上子六反崩山上布朋反正作崩哆邏葉上多可反中羅个反下以接反揵慧上𠃵反目揵音𠃵姓也憂戚倉歷反正作感老䎜莫報反正作耄痛上五各反口中齗也正作齶也經音義作勝開元樓藏作風喘昌兖反咳𠲿上苦愛反下速奏反肺氣病也正作欬瘶也二並非用也喝吐上烏芥反通食氣也正作䬵欬二形喉啤愽計反塞也正作閇箄二形癲癇上丁年反下行間反㿈癭上於容反下於郢反瞻㽵上都敢反下阻亮反正作瞻壯經云膽壯熱枯槗苦老反痔上持里反下女力反珨肆上丁念反舍也置也所以置貨物之所也正作店也下音四陳也放也有軄女利反床痤上助㽵反下才臥反正作床座也又上所類火骨二反下在禾反並悞也第八卷駱波上章廉反正作贍也四句頌攝十經一未曾有經二侍者三薄拘羅四阿修羅五地動六贍波七八郁加二經九十手長者二經頌云地動及波取擆直慮反正作筯箸一形又知略反擊也非用也挊上音挊下音武上又音汴擊手也迴序緣反抃上平變反拊手也梀上當口反下蘓走反舉衣振塵也搖也下正作擻駷二形下又所責反擇取物也掃菷之酉反滂沛上普旁反下普盖反耕者上古莖反送塟子浪反潢澇上戶光反下來到反邠褥上彼巾反下內沃反雄𠌵祥兩反正作象作之審反悞意係音計連也作枕之審反抆淚上文粉反枕頃上之審反下苦反少時也仿佯音房羊謂閑而東行西行也倩他上七性反縫衣上扶峯反針鋋囊上之林反中相箭反下乃郎反中又音祥悞琦音奇螺壁上洛禾反下正作鼊㭪覔反說文似龜而澷胡無指爪其甲有黑殊文如瑇琩可飾物也或作壁必益反云虎魄上火古反下普白反瑇琩上徒愛反下莫對反異物志云如龜生南海大者如蘧蒢背有鱗大如扇有文章將作器則煑其鱗如柔皮任意所作或作蝳𮔙或作𣫹𭻝琁珠上序緣反玉名正作璿瑢三形琁美石次玉也或作蜁螺也𤨴壁上洛禾反下必益反𧆞普百反正作琥珀龜鼉上居退反下徒何反黿属也字軆正作鼉黿二形從單音邵從黽帝麑音迷不堪啖多膏正作鼉也或云帝或云仾魚也帝魔同上或作莫加反鼉似龜鼈鼊也悞也捶尢上以招反下莫江反或作无莫胡反法薀足論作鹽母毗奈耶作婆母婆沙論作夜摩並此何名也榣尢同上柂設上或支反安也設置也陳也正作施也悞也瑇琩上代毒二音下妹曷二音如前以釋第九卷彗星上祥嵗反妭星也篲星同上瞻波上章廉反城名也第八卷頭作駱波下菕音藥又音論悞龜鼉上居追反下大何反帝麑迷麻二音並通呼也或云仾或云縶氏煒曅上為鬼反下為輙反毀呲音紫正作訾呰二形灌上子老反下古乱反嚴愸之領反讜能上他郎反他浪二反倖也亦語初也正作儻也又都朗反直言也初也第十卷已辨蒲莧反成也正作辨辦二形此堓音岸莖幹古案反莽上莫古莫朗莫口三反下仕臻反興第二帙第十一卷踝𦟛丑容反𬧅膓上市軟反下丈羊反眼眴音舜䭷馬上莫高反氍上其俱反下山茤反𣰅㲪上他盍反下得能反䁶潔上古了反編髮上步犬反又卑連卑兖二反暐曄上云鬼反下云輙反晃若上黃廣反所係音計連也火㷿音熖毀呰音紫堪耐奴代反第十二卷畜牧上丑救丑六許六三反六也養也聚也下音目養也食也蜫䖝上古塊反古猛反婦上古瓦反店肆上丁念反下音四鏵鍫上戶花反下七消反鼠塲始羊反新耕土也或作𤳈豌豆上烏官反蜱豆上卑𠔃反正作豍𦬔子上古敗反煒瞱上云鬼反下于輙反為立反飯飼音寺穬古猛反華音鏵鍬上戶爪反下七消反蜿豆上烏官反冤菀二音非蘿中上洛河反竹器名也豆羹古盲反來餉式亮反命𣧩之隆反𬼈見上之聖反嚶核上於盈反下戶哀反又音亥悞浴上子老反僂步上力主反臥㩉音塔烏鵄尺之反所喙音卓正作啄𤝦狼上助皆反臠力兖反著㩜戶黯反火燒失招反經音義作𤋲而兖反䥫臼巨久反正作臼虵𧎴知列反卑連反撾杖竹花反棒打上步講反下得冷反或梟古堯反其𭉨即委反攢破上子官反膓上市軟反破髀步米反破臗苦官反又音坤䥫鍱音掣彼上尺世尺列二反曳也挽也經音義作𢱯攬二同力敢反䥫喙許穢反口也生挑他刀他聊二反捾也喙破上音卓正作啄骨素菓反𫽄檏步角反䥫鉗巨廉反燒齗魚斤反齒也第十三卷獺狩他達反上手右反下溢上以嬰反滿也正作盈饒𦸲五口反枯熇苦老反乾也枯也正作洘槗燺三形也又火沃火各二反非用犲狩上助皆反莽上助臻反下莫古莫朗莫口三反僻靜上普益反無人處也生經音義作猩同音生桾拾上居運反蟲蟥上除中反下胡光反釜竈上音父下子告反𧂒薪上才消反下音新千刻古哀反數名十冓曰也正作姟也又苦得反悮也氍氀上其俱反下生反綩綖上於遠反下以然反𮁺同上曰螺上子月反下洛禾反勒佛時王名也諸經云傷佉或云穰佉或云儵佉第十四卷昱爍上羊六反下羊略反光明也正作煜爚又音鑠非手撫芳武反拍也正作拊也畜牧音目又失周失呪二反悞長跽巨几反嬉戲上許之反下許義反壘力水反梯陛上他𠔃反下步米反銀橙丁亘反噭潔上吉了反明也珠玉白㒵也正作皦也又音𠮧悞也鑪鍱上洛胡反柱也下素朗反柱下石也正作櫨磉𣰅㲪下音塔下音登𭣋體上楚覲反安之審反逯初上第代二音及也悞諭諂上羊朱反詭言也正作揄或作諛下丑染反偽也上又音喻非也第十五卷錦𦋺居例反咽鉗上於賢反下巨廉反儀式施食反法也用也度也珠抦兵命反正作柄飾屣所綺反稅租子胡反𢱫舉上古朗反下余預二音高敞昌兩反諳練上烏含反更也記憶也昱𤓈上羊六反下羊略反縛鞭卑連反罸錢自連反經音義作鍜以錢替之也或臬古堯反首形也正作梟二形也又五結反門橜也悞不翅音施更多也正作啻稗子上步拜反蔗𥼽上之夜反下徒郎反正作糖二形邪羊林反又苦莖五莖胡經三反並非也第十六卷蜱肆上邊号反正作豍螕二形也長阿含作𦷥宿也音義云此譯云遣使蹴螺上千六反踏也牧捕上失由反下蒲故反絞煞上古巧反縛也柔而兖反又音暖悞梨鑱仕懺反剔肉上他歷反編髮上蒲犬反又卑連卑兖二反非也火攢子乱反治上阻床反下直之反裝束也亦作裝擈著上步角反商人上手羊反正作𧷮蘅華𩭈上戶庚反下莫顏反杧香也生天帝山也正作蘅也下正作兩𨌪子孔反車輪也正作又音忩轞車載也非水𮒝才焦反撨草同上又條反擇也非此呼賭上都古反下并領反並千結反熇𡐢上苦老反乾也正作槁燺二形下甫問反上又火火各二反非也親才木反正作族森所林反自𧦹苦花反行拖尸智反不剖普口反不丑挌反菜茹而預反天上聲一𭤟疋見反楫樹上而容反木名似檀正作揖也川音亦作揖也經音但是仾小樹林也槗㷿上巨反下羊贍反或云伽梵鉢提此云牛呞第十七卷娑鷄居号反三在木反加絺丑脂反加𢼜音舍國名剋彼上口得反憂感倉歷反𠧸薄上郎古反下蒲古反車駕次第為活無放反正作望憂倉歷反活淫音望又以林反非也導𢎢上徒到反下羊忍反出曜以照反地上其几反正作跽伎蟄魚例反正作藝又丈立反悞馳驟助右反擲衒上持石反下古犬反索也正作羅也又音縣自媒也非伎藝魚例反猛魚既反出上持頂反又定二音非也七𨱚徒乱反悞七段同上𥄲涉上帽墨二音內鞘音笑刀室也頸上上居郢反居成二反在前曰在後曰也皆竪音樹立也驚音悟睡覺也敷助㽵反悮渇侕午雨反正作仰或作卬也象上毗忍反正作也大蹹徒盍反踐也又音呇齧也之渾戶昆反闍闍同上律阤音陁足橙都亘反杋也第十八卷提瘦所右反慰勞郎告反奇瘦上巨冝居冝一反下所右反或云耆瘦或云羇瘦也鼉山上徒何反字從單音那從黽音猛緘簏上戶屈反杯木篋也正作椷下力木反竹篋也上又古咸反非氍上其俱反下生俱反毛席也織毛褥也正作毹也下又玉篇作所愁反素𠋫二反羅戶屋反襯體上初覲反安之審反惒邏上戶戈戶臥二反下羅个反已辨蒲莧反池音岸蠅蚤子老反荖降上初冝反下古巷反第十九卷倩諸上青性反戶鑰音藥連綴竹衛反縫合上扶峯反獷古猛反店肆上丁念反𭫲積上而羊反禾也正作穰又音柰悞十橙登亘反不蹬音登上也土墽古歷反正作𡐊又磽二音非第二十卷用迸比耕反振繩墨也正作絣遜拼三形又布諍反悞上䶥五各反人上力垂反𢭀捉上序緣反朾鍜上得冷反下得乱反成揣徒官反水漬才賜反𦝩揣𡐢上云貴反下方問反腦及上奴老反髓也腦根同前正作謂𮌗𮌗根肪髄上方房二音涎贍上序反下當敢反悞蒿𧂐上音嵩息弓反菜名也正作菘也下音精正作菁或作𧂐應和尚音義云豊蕘蕪菁也齊魯之間謂之蕘関之東西謂之蕪菁也即蔓菁也下又子賜反非𦬔子上古敗反髮髦上音發下音毛唌膽上席反下當敢反烏鵄尺脂反所啄音卓犲苟上助皆反下正作狗腐爛上扶武反下郎歎反膊骨上市軟反髀骨上步米反亦作䯗寬骨上苦官反脊骨上子昔反頸骨上居郢反臅膢獨樓二音泥淖女孝反毛𣮕巨六反輕闡昌演反大也經音義以團字替之非也以𤍜蘓老反与燥同蠅蚉音早狗也嘖𡂡音數也呵罵也談譁音花喧也作話字呼蝦蟆遐麻二音耆音瘦鼉山上徒何反溫第三帙第二十一卷優𮑣跛塔二音葉屋上羊接反下烏木反草舍也正作屋𭕵二形也麗掣上力計反下尺世反靖處上才井反燕坐上一見反竫處上情井反稽首上苦禮反貴在木反隨㥧音㥧飯上扶万亦作餅飰二形下自西反平也等也正作齊俗作斊盛陰於今反冝去聲呼椎胸上直追反下許容反奮聖上求右反融消上余戎反憂傶倉歷反第二十二卷奇瘦上巨冝居冝二反下所右反正作瘦鼉山上徒何反市肆上時止反下斯至反藻水上子老反澡水同上中𡐢方問反店肆上丁念反无𧨏音義詣奮巨右反比舍上蒲脂反諭諂上以朱反牟哆上莫𠋫反下多个反花名也或云阿提目多屋邊布玄反飽食上布夘反第廿三卷蘭哆多个反又竹加反戾語上力計反𢙣也畜牧上丑救丑六許六三反六生財也養也聚也下莫六反養也惒邏上戶戈戶臥一反下羅个反仿佯上音房下音羊閑而東行西行謂之典語則謂之徙倚也慠上居槗反下五告反土漬在賜反拯浣戶管反慠五告反受憙愛喜二音愛憙同上在歷魯擊反馬槽正作櫪第廿四樓瘦所右反蒀𦽦上於云反葐盛㒵也正作蒀也下音万𮞠不断也經音謂喻生死不断也經音義以蘊字替之同於文反說文謂聚草束之以燃火也此釋非苻經意𫝊𫝊知戀反相傳也不依小反晃昱上戶廣反下以六反眠音悟覺也屈电音申用補耕反振繩墨也正作絣遜拼三形利斧音府斫治音持上𪙫五各反第二十卷作𪘽上序緣反正作旋打鍜上得冷反下都乱反成揣徒官反髦枛上莫高反下爭巧反正作髦毛下正作爪髮齒也薄膚上方無反腦上方問反下奴老反淚汗上力遂反下何案反涕唾上音剃正音洟肪髄膽上音方下音也蒿藉上昔弓反下子盈反正作菘菁下或作音精所喙音卓鳥物也正作啄又許穢反悞也骸骨上遐皆反骨璅素果反骨上市軟反髀骨上步米反寬骨上苦官反髑膢音摟第二十五卷刻印上口勒反䗈文赤所𧎴知列反正作哲蛆二形懊憹上烏好反下奴老反下又音農非㩲𭠎上巨貟反下街反𬒳步毛反持矟所卓反刀𣛝音順攻城上古冬反破塢烏古反挌戰上古客反闘也擊也朾皼上都冷反下公戶反搥打上丈追反下得冷反鉾㦸上莫侯反下居逆反臠力兖反㩜中上咸黯反火𤋲而兖反銅釜音父䥫臼巨九反正作臼卑連反杖撾竹花反棒打上步講反下得冷反得二反或臬古堯反斬首也正作梟二形又五結反悞山㟵古郎反背廔力主反正作僂又力朱反猗曲脊也正作瘻也脚戾力計反曲也柱杖上張主反盛扗阻狀反所喙音卓羈上居冝反下所右反㩲扠上巨貟反下街反𬒳步毛反死苟古口反𮌨脹上疋江蒲江二反正作胮也下知亮反上𪘽五各反人上力垂反上𪘽五各反第廿六卷恭恪口各反如𣏣音弄玩物也又音弁也讜至上他朗他浪二反倖也亦語初也也正作儻也又多朗反倮形上和瓦反以櫆苦迴反菜茹如庶反又如汝二音稗子上蒲拜反穄米上子例反雜古猛反編髮上蒲犬反又卑連卑典二反次也手杼序竹紵三音㳿也經旨謂之畋而揚之也嫉姤丁故反嬈亂上而沼反下來嘆反牀㯓上助㽵反下他盍反蠅蚤音早狗也堪耐奴代反第廿七卷牀㩉音塔狎習上咸甲反挽音脫引也牧淚上文粉反不剖普口反一㷿音熖火燥草素老反足以上句反添也熇木上苦老反𠃵也正作搞燺薨三形也又火木火沃火各三反熱㒵非用也第廿八卷壅本上於容反浴上子老反羈上居冝反下所右反𢗡舉上失由反𣫍也正作收奮頭上方問反振首㒵也正作奮也又作收舉上尸由反頭同上此勾九遇反塗跣先典反足赤脚也坋體上蒲悶反塵著身也正作坌又扶吻扶問二反並非也探養上居六反正作掬又音貪悞也作塢烏古反華𩭈莫頰反瞻富蒲北反正作匐悞華𩭈莫顏反扶抱上父無反下蒲保反死所反第廿九卷商人上手羊反又音的也瞻蔔蒲北反所沾竹廉反古猛反豆羹古莖反𤢌狩上巨今反下守右反堤帝上都𠔃都禮二反奚米上戶鷄反奢拖上手遮反下以支徒可二反禽獸名也𠧸薄上洛古反下婆古反車駕次第曰也胸行上許容反請請上青井反下情性反云十五日解相請請時經自𭃄也慧上才反節戾力計反乘也曲也罪也經音義以類字替之力對反多莭日也第卅卷下以略反正作鑰棄上進反下詰利反粃糠上卑履反下苦郎反掃菷之酉反汙雜在合反不脆此苪反聾啞上洛紅反舉貸他得反正作貣瑇琩上徒礙反下莫背反琁珠上序緣反庶幾上書去反下居依反縛繳下革反衣領中骨也又之若反音義云生絲縷也結繳於𠂕謂之矰也然此冝作憿吉了反緾也亦縛緾也蜫蟲上古䰟反下除中反雇賃上古悟反尨色上莫江反白黑雜也氍氀上其俱反下生反正作毹又力朱反非𭯘㲪上他盍反下都能反儭體上初覲反安枕之審反自衣小反自絞古巧反縛也淖蜜上女孝反和也又安卓反燋悴上才焦反下才遂反顦顇同上儲提上直魚反更迭大結反鼉山上徒何反佈林上普布反前後皆作怖林也又音布悞也覺礫六擊反抅荀大上九愚反中相偷反下徒个反佛名覺礫抅荀也取撨才消也𤍜撨上蘇老反下才焦反枓梀上都口反下蘓走反也舉衣振塵也動物也搖也下正作激駷二形也下又音速木名也非捕鼠上蒲故反鵂狐上許牛反下戶姑反儻能上他浪反倖也或也讜能同上又多朗反悞右𢭀序緣反顧視上公悟反有卒子沒反小悸求季反跱立上持里反築基上知六反下居之反清第四帙第卅一卷樓瘦所右反鍮蘆吒上他侯反中洛侯反下竹加反又去聲呼攝惒音和徧祖上疋綿反下徒旱反斷種上徒管反下之勇反以箕居之反摩牧文粉反水上子老反磐縈上步官反下於營反紺黛音代衒繈冝作羂上古犬反下巨亮反以繩安芊頭而取戰曰羂曰也又上音縣下居兩反非用也離餌人志反正作餌鞞醘上步迷反下火𠔃反獦師上力反作倡音昌樂也嚴𣪴魚既反邏騫上勒个反下去𠃵反筞慮上楚責反逯得上代第二音及也又音錄悞第卅二卷仿佯上音房下音羊問訊音信梚上去堅反下音晚長𨱞音毛毛裘音求枡擻上都口反下蘓走反洗髀步米反中戲許義反斫剉倉臥反制上之兖徒官二反𭃄肉也截也正作剬剸二刑又之世反断也非也騏麟上巨之反下呂真反麋鹿上美悲反毀呰音紫堪耐奴代反奮頭上方問反懷姙而甚反至市時止反𩬞師上莫顏反長綖音線縫衣縷也亦作綫第卅三卷鞞陁上步迷反山名也諸經中或作錍提經音義作普迷反非也恊琉上戶頰反窈窕上一了反下徒了反煩冤於元反問訊音信羈絆上居冝反下波畔反諛諂上若朱反揵沓惒上巨焉反中徒合反下戶戈反鼻嗅香右反又叱救反非燕坐上一見反畜牧音目煒燁上為鬼反下為輙反蝦蟇上戶加反下莫加反茤磨上側俱反消耗火告反嬉𪥩上喜記反下其綺反挊鈴上音弄狎習上乎甲反仞過上而振反識也正作認必拜音辯別也謂玄記別未崩事也上方作必辦音諞婚娶上音昏下音趣給恤私律反庶幾上尸去反下居衣反翻揵上音幡下疾葉反正作第卅四卷嬉戲上喜之反下喜義反賈客上公五反榬舩上音㽵正作裝備辨上皮秘反羖羊上公五反大瓠音護押栰上步皆反下扶發反並正作𥱼筏也蓊欝上烏孔反下於勿反瑇琩上音代下音昧喚嗷五高反棷樹上而容反木名似檀也正揖也上方經作揖相余反木名栮楫即椶𭣉也或作栮揶二同榬舩上阻床反𢭀珠上序全反䭷馬上莫高反玳琩上徒愛反一𨱞音毛髮髦同上此正晃昱上戶廣反下以六反珓飾上古孝反下厂力反惒堤上音和下音仾氍氀上其俱反下數俱反𣰅㲪上音塔下音登羅戶木反安抌之審反哆邏上多个反下郎个反曒潔上吉了反餘自木反正作族宗裔也禮䟽云百世不遷曰姓因事分案曰氏同源相謂為族族者類也加抂於徃反青桐息亮反正作相腐相上扶武反骨桒果反正作鏁將鎧口改反涕唾上吐計反餞木上昨干反餘也正作殘䏼二形火燼序進反觀掾直緣反第卅五卷瞿黜莫黑反正作默也又丑律反非也欝上於勿反下所右反改易音亦變也奮上巨右反下步末反床㩉音塔譁說上呼𤓰反雜合上自迊反慰勞郎告反椚摸上音門下音莫定𮒽音悟定同上我欲音欲㨔挮上音咸下他𠔃反一撜都鄧反堦級正作隥因絃戶犬反絆也擊也皮帶也正作也又呼反索也低仰上丁𠔃反下牛兩反舉首也下又五郎反見禮記音義安靖情井反無聲之處穰積上而羊反諳彼上烏含反俠長上戶頰反糞沃上方問反下烏酷反溉灌上古代古氣二反下古乱反落治上郎各反科樹去莭也正作㓢也下直之反諭諂上羊朱反下染反庶幾上尸𥎀反下居衣反第卅六瞿默音墨前卷初作瞿黜彼悞也徧祖上疋綿反下徒旱反兩翅下音施水上子老反蘭哆多左反喧𡗚女㒵反䗈上音文下音盲蠅蚤音早煩猥烏罪反婆蹉七何反此云𬌏子梨㝹奴𬾃反至夾音狹窄溢也悞蜫虫上古䰟反音鑛升上都口反下戶木反𡪍婦上二古瓦反玷肆上丁念反正作店痁肆同上華𩭈莫顏反倡妓上尸羊反下巨綺反逯初上音代及也又音錄非也所掘巨月反穿也冝作行也越也涇奴上羊林反滂沛上普悟反下普貝反第卅七卷闇莫瓶反他宍音肉施設上失支反袘設同上又以支徒何徒可他可四反並非利挨自木反士挨同上𫽄𤍜音掃乾也攢欑上子乱反下子官反㺃自刀反正作也悞有㷿音熖惒邏𨒌上戶戈反下以然反羅延羊然反又音正非也㺃槽音曹柱杖上知主反正作拄持繖桒旱反亦作傘衣變上於既反著也下蘓叶反屐也正作屣二形也應和尚音義作以字替之是也已下數个並同也鞞邏上步迷反下郎个反作灰乎迴反香陰於今反失辨皮件反稽首上苦禮反仾也首至地也正作稽諸二形也也周禮九拜之儀一日稽首再拜頭至地也第卅八卷閑上音湏下呼姧反經自𭃄梵麾莫何反悞讜能上他朗反語詞也謂不定之詞也也正作儻也又得朗反真言也非煒曄上云鬼反下云輙云立二反指擿他的反挑也大𠸍音𥬒抓㰅上爭巧反下他的反正作㰅插創開上楚㽵反皃健上戶管反抆摸上音門下音莫弟卅五卷作捫是也上又文粉反非懊憹上烏老反下奴老反讜能上他朗他浪二反正作儻也第卅九卷𧩄謗上文夫反吹攬古巧反以輕軯乳中二同普𥝷反撅也正作抨也別經本作併並音枰貪餮天結反亦作餘不廉力閻反手撮子活反地𭩒扶非反正作飢也上方經作地䏎是也經音義作地𦡕應和尚以𦘺字替之是也又𦡕或作騰雹二同步角反地皮也鼻柰耶云地生𠧸土雹是也諸經作地肌也淖蜜上女孝反儀禮曰嘉薦普淖鄭注云和也槀上古猛反下古老反朝牛例反鹽味上羊廉反𦿔𢙣上步祭反正作𡚁褋華上徒叶反單也正作檏說文作棣三形也上方經作𣜿抉玉反𢗌也華𩭈莫顏反儲畜上直魚反摽搒上卑遙反下卜朗反大板也正作榜稻䅽上徒老反下古木反牽詣上去堅反㩲杈上巨貟反下街反為雍於容反也悞為㿈同上柂與上尸利反惠也正作拖達哆多可反麻羹古盲反霏那上方非反一戶木反𤴷㯓上助㽵反下他盍反正作床㩉也並悞縫治上扶峯反下丈之反婚姻上音昬下音因齊行施上側皆反潔也正作齊前後十餘个並同上第四十卷猗杖上衣綺反胎助㽵反胎同上又所頰呼骨二反悞也眀郎管反正作𡖉猶鷄古𠔃反時𣊵奴管反口𭉨即委反足𤓰側巧反喙破上音卓所音果蒿草上呵高反猴弟上戶麦反得也正作獲𧳞弟同上又音侯非也揌持上子孔反夜阤音陁旃荼上之然反下宅加反求七西反敖五告反正作慠荼上之然反下宅加反愸御上之領反正作也又音勑非凡杅上五馬反下云俱反水漬疾賜反牛上去堅反牛同上所㵱疋遙反浮也水吹物也正作漂速駛音使疾也湏臾欲朱反投地上徒侯反正作投詶誨上訓連反正作訓似第五帙第卌一卷倮𦟛丑容反右𢭀序緣反鹿𬧅市兖反兩腂戶瓦反相棠宅廋反羹飯上古盲揣食上徒官反故𤵜丑忍丑刃二反病也宿疾也第卌二卷抓齒上爭巧反謂腦腦根中二同奴老反肪膸上方房二音下息委反涎膽上序延反𢳐縮上尺列反正作掣蹵風上子六反撨木上扌焦反鍜令上丁乱反火㩜力甘反持也經意是燎力含反以火燒也足火上將句反添也縺繒上力先反敖五高五告二反𢢔也正作婪捫摸上莫奔反下忙各反第卌三卷堓上上五案反住𡶨同上樓瘦所右反奇瘦上巨冝居冝二反下所右反或云耆痠或云羈瘦噵說上徒老反說𠥷烏侯反瓦盂也說他果反器狹長也說扜為俱反正作盂也說椀烏管反正作椀怨二形說他果反正作撱說歐烏侯反悞說杅云俱反第卌四卷從𠯞徒𠔃反作啼唬㖒𧦚四形郭氏作𠯞音啼經云徒至大言此外道前世名都提也經音義以㘁字替之戶高反非也玉篇音𪲀丁禮反郭氏又作丁𠔃丁地二反後四呼並非也誣謗上文夫反屈电音申䐗及𤞗上竹魚反下助皆反杷上步巴反下助㽵反把抱也正作把床抱步包反蜫虫上古䰟反手捲巨圓反古猛反五高五苦二反𢢔也或作𠢕与豪同也俠也華莫顏反前作髻並同也林㩉音床塔下又都盍反非也哺羅阤上蒲故反下達何反仿佯音房羊徙倚也舊覺上巨又反奮頭上方問反振也謂頭㒵也正作奮也稽首上苦禮反心竫情領反第卌五卷飽飲飼上布夘反中於禁反下音寺亦作𩚅飽飲飼同上以抨普耕反彈也以之也迮具上阻伯反𡑅也正作笮水漬慈賜反押之上烏甲反攢攢上子乱反下子官反以𤍜桑老反葛藤上古遏反下徒登反圮迸上皮羹反下補諍反剖上普口反下丑格反慰勞來到反以櫆苦灰反刦抄上居反下叉㒵反菜茹如庶反又汝如二音粺子上補拜反苗似稻也正作稗也又蒲卦反精米也悞穄米上子例反雜上在合反下古猛反自渃力各反編髮上蒲犬反又卑連卑兖二反手抒序音舀也樓瘦所右反正作瘦第卌六卷無字第卌七卷圍子耶反猛𮥸上莫哽反下即峻反喧𡗚女孝反不靜也文𮂰巨尸反正作祁收𣫍上尸由反下力掩反文祁音耆嚶咳上於盈反下戶哀反又上音羈悞筫直上之日反𮑣邏上波破反下羅个反金縷力主反正作縷柔𣽈音軟事𧂐上冝作華云鬼反下子賜反第卌八卷牀榻音床塔悞下正穰積上而羊反諭諂上羊朱反傲上居反下吾告反自前敖敖並悞讜能上他朗反倖也正作儻又多朗反非疾上才反土𡐊古歷反土𡐊同上不燒甎也第十九卷作燩苦堯苦友苦㒵三反非用也揵祁上音𠃵下者足橙登亘反跂耆上蒲末反又音祗悞耆同上正作跋第卌九卷給㜾古胡反正作孤椯食上徒官反不猗衣綺反焜虫上古䰟反正作蜫虵二形也蟲之惣名也古猛反𭽎上多口反下何木反賈婦上古瓦反正作寡二形又古假嫁三音並作非悞也婦上古瓦反雞䐗上古𠔃反下竹魚反沾肆上丁念反正作店坫治肆同上並悞華𩭈莫顏反𮇖粉上旨夷反胭也俗憂慼倉歷反憂同上獽積上汝羊反禾稈也正作穰蠻頭上莫還反𩣺𠌵上布門反下祥兩反叛兵上步半反拖設上式支反正作施問訊音信愁倉歷反張㭦知格反正作磔或作稅涉加陟駕二反開張也无側救反棘㓨上居力反嘩說上火爪反譁說同上音花喧也拖論上尸智反持物惠人筞慮上又責反陶師上徒刀反正作陶第五十卷漯貝上失入反下波盖反比丘名阿唐言馬勝𠻬帝上桑割反比丘名也律中作𠻬毗𡰱母作莎提經音義作𠻬應和尚以荼字替之非也荼宅加反非凷擲上苦內反杖打得冷反又音頂睒失染反𢮓電上尺世反正作掣洗盪大郎反㖒唾上他帝反鼻也正作又音啼非也慠吾告反自前作敖敖悞執𦇷音秘正作㘘鋤𡐢方問反撓除上火告反除田草也手曰除正作薅㧲𢫩三形撓攪也非用也洛治上力各反正作㓢堪耐奴代反理上力條反頟三上五格反面上側右反比隣上音毗並也紛紜上芳文反下音云眾也乱也獷古猛反穬同上鏵鍬上戶花反下七消反溺汙上奴吊反下烏故烏臥二反溺小便汙染也普八反車破聲也正作堯經音義以𤭃二字替之力頰反瓦破聲也蘭第六帙第五十一卷法靖才井反誣謗上武夫反絆脚上布畔反王稟兵綿反供縠也第五十二卷更互乎故反傲上居反下五告反儻能上他朗反脫屣所綺反猥處上烏罪反羅挌古客反慰勞來到反仿佯上音房下音羊問訊音信兩髀步米反尾脊上文匪反後作尻也楯矟上食閏反下所卓反矛㦸上莫侯反刀揗音順若嘯蘓𠮧反尻脊上苦高反臋也此前兩家作尾蠅蚤音早蠅蚉同上棰杖上之水反第五十三卷牧上失由反臠力兖反㩜中上戶黯反火爇而恱反正作𤑔䥫臼巨九反龍蜇知列反鞭鞭卑連反杖檛陟花反或臬音澆斬首也正作臬梟二形又五結反門橜也非用也臥塌音塔床也收賊上尸由反處皃戶官反全也又音𨗿悞八稜郎登反燒齗魚斤反燒嚥烏賢反㭦五上張𮧓反无側瘦反揚擈上以良反詐也下步角反正作佯𢷏薀豆上音蘊豆名𦬔子上古敗反創蟲上楚床反龜鼉徒何反齒齧五結反食尸旨反傴曲上於禹反第五十四卷宍臠上而六反下力究反憂倉歷反青𡂡色禹反柙彼上烏甲反彼音岸入巨依魚斤二反岸也彼音岸柙栰步街反上下房月反憂倉歷反郭氏作私古反非憂倉歷反病也悞煩勞郎夢反破墎古霍反過壍七㷔反破古霍反正作廓燥草上蘓老反𤍜草同上帝上割反正作𡂠第五卷十卷初廣𥼶帝同上帝同上又郭氏音𭃄非也揣食上徒官反懊惚奴老反又音忽悞𤵜患上丑忍反丑刃二反飯尺沼反第五十五卷蜫蟲上古䰟反下除中反因芳無反麦皮也正作麩也澡豆子老反上皂荚上才早反下古俠反𣴟故上尸管反磨鋥除硬反出光也或作火排步拜反吹火具也正作橐也鉆推上巨廣反下除追反跋蹉千何反蠰伽上式亮反下去迦反正作佉又巨迦非邵上力求力救二反下時照反蝳上徒礙反下莫退反琁珠上序緣反𢷋識上必招反下諸吏反出禮記摘除上他歷反解音也挑摘也正作剔揥咬嚙上五巧反下五結反俗或䲭尺脂反第五十六卷戶音藥𡄇咳上苦頂反下苦愛反正作謦欬上音磬通呼下又音孩非月魔羂古犬反䰅童上莫還反椑筏上步街反又卑擗二音非也牧聚上書由反下在主反便擗愽厄反正作擘十夘郎管反以𠿘即委反悞喙破上竹角反又穢悞第五十七卷喧𡗚女孝反夷哆多个反哻眠上何案反正作軒棚閣上蒲庚反閤也棧也又音朋第五十八卷無緯音胃拘絺丑夷反拘絺同上第五十九卷棘㓨上居力反𡄇咳上苦秘反下苦愛反撓戶上苦交反正作敲拘屢力遇反可敕丑力反急也正作勑古文作欶亦作也又或作𧫣遬工同音速疾也又音奇木別生技也珠柄兵命反燋悴上疾焦反下疾遂反白頗普㒵反白𦫗同上闇識上烏含反正作諳也相次四个諳唯此作闇眠上音翰正作軒輪租上束朱反下子乎反約稅枡上乘旱反下都口反磨榐女展反扞物令展也音譜作投亦作碾第六十卷仿佯上音房下音羊煩惋於元反正作煩悶乱也又烏乱反非奮頭上方問反速市右反𩭈童上莫顏反為柘之夜反為桒索郎反為擷居隨反木名堪作弓正作𬅁麞鹿上之羊反為𥿾直与反正作紵箭幹古旱反正作苛𪅃𪅋上力日反下力由反正作𪅃鶹經音義作𪅃鶹尓雅云鳥少美長醜為𪅃也應和尚以鷄翎替之非也經意但是鳥名不唯鷄𣬹也下又郭氏音陵書無此字上又音漂鳥飛㒵也非義也又或作鸅鴋上音宅下音房鳩鸚鶊鳥蒼色常在澤中俗呼為護澤鳥別本作𪁢也鵰鷲上丁聊反下疾秀反鵾鷄上古䰟反為鸖音涸箭𨮹音的為鑇音齊為鉀疋西反為予音牟鈹刀上普皮反經後序屬辝上之玉反則上巨右反正作舊𨒫忤五故反不怗他恊反安也眠也又經音義作愜苦類反可也快也玟本上古海反正作改也怏於亮反玫名上古海反更也正作改也出三藏記並作改字是也又莫迴反傳寫悞新舊巨右反此序三个舊一个作瘟兩个作舊探訪上倉海反擇也正作採下芳妄反見出三藏記刊之上口安反削也㝎也正作刊斯增一阿含經一部五十一卷五帙第一帙第一卷揵搥上巨焉反下丈追反䫃䀎音麵揮淚上許㱕反也便奮方問反不瞬音舜力彊巨良反順𧨏音義𭾖天上羊贍反甄陁上之人居莚二反或作真陁緊那白𨱞音毛冝作髮白髮音發衰耗呼告反逮沙上徒愛反第二卷𨗻沙上徒愛反瑠瑀力支反悞強梁上巨羊反澹泊上徒敢反下普伯反結上文徃反瑕疵上戶加反下疾斯反玉玷病卒暴上倉沒反爪上爭巧反下尺耳反𮏴骨上音斤下音骨膽肝肺上都敢反中古安反下芳癈反脾腎上步卑反下時忍反白直持力反𦘺膓也正作䐈旁光上步光反下作膀胱屎尿上尸旨反下奴吊反百葉音葉滄蕩正作倉宕止錯郎反下徒浪反倉稟也宕室也第五卷云生熟藏是也應和尚未詳也脾泡普包反正作脬溺淚上奴吊反唾涕音剃膿𮕜上音農下音血肪脂上夫亡反下序延反髑膢𦜩上音獨中音樓下音㤕第三卷離曰音越拖立上失支反讖比上初禁反鵬𦒿上步弘反耐辱上奴代反婆蹉七何反醘甯上呼𠔃反下奴定反鉗摩上巨廉反耐提上所姧反正作刪中上知仲反下於小反隱噎於計反正作曀般菟上音盤下音徒楚言摩訶盤菟此云大路也下正作免般兔同上梵言同利般兔此云小路此二人是親兄弟也婆醘太𠔃反獚古猛反又音黃非俎壞上疾與反正作沮奚音𠔃珕湏上力計反泯免上音民下音徒長者子名也亦云𪰋荼也下正作兔摩俞音逾笒婆上巨今反俠少上戶夾反正作狹觸惚音𢙉又音忽非隧隨上直遂反正作墜摸則上莫乎反㨾也疇迮上直由反下普吉反第四卷泍著上而陝反屈电音申眩或上玄縣二音乱也眼花也勸勉音免勗也病瘦所右反唐悁上徒郎反空也下以宣反弃也正作捐也又於緣反悞也鍼筩上音針下音同藻灌上子老反下古乱反一徒官反魔上毗例反𢙣也悞壞敗布邁反破他日也自破曰敗音唄也第五卷毫里之反毫𨤲同上髄𮪱音𢙉膖脹上疋江反下知亮反鵄梟上尺脂反下古堯反膊骨上市兖反尻骨上苦高反第六卷紡作上芳𠕀反諸惚音𢙉菓蓏郎果反沾汙上竹廉反丁念反冝作點呼揣若上徒官反膢者力主反傴不伸也正作僂也又力朱反正作瘻𤥖音保屋廬音閭之笒巨今反猥多上烏罪反第七卷泆羊一反拭𭉨音觜跳踉上音條下音良角音底脚蹹徒盍反口嚙五結反第八卷苦蔘所岑反乎上音干下音悉晃然上戶廣反闇寘莫丁反悞毀訾音紫鍮婆上託俠反蜎飛上於玄反𧑮動上而兖反第九卷噠嚫上徒怛反白潔田叶反正作㲲縶也夫聟音細所狂音在苞攬上布交反下郎敢反白潔音牒蹹𮛫上徒盍反艶天上羊贍反走𥥛徒骨反履屣所綺反牧餝上音問下音識兩目上別本作䓣力掌反火𧂐子賜反燌燒上扶文反倡妓上尺羊反下巨綺反第十卷著翅尸智反惡狸上烏各反俠道上戶頰反金鏤音漏馨第二帙第十一卷秘讖初禁反一牧莫迴反共桶音角積貯知与反娉娶上疋政反下七句反五莖戶𥝷反悞瘀埿上於去反屎尿上尸旨反下奴吊反般特上音盤第三卷作般菟悞掃㨹音遂又徐嵗反正作篲也𬉹土上呼迴反正灰第十二卷脩綺於蟻反正作倚愁悒音邑膏䡰上音告下音穀下又苦耕反非澹為上大甘反癊也正作痿詶彼上市州反搥胷上丈追反下許容反攻伐上古冬反斫剌七賜反𣓞剌上所卓反下七賜反而轢郎達郎擊郎各三反少牡阻狀反晧白上戶老反垢圿古八反面側右反脊膢上子晉反下力主反俗呻吟上失真反戰掉大了反動也蜎飛上烏玄反蠢動上尺尹反𧑮䖝上而兖而尹二反膊骨上市兖反䏶骨上步米反尻骨上苦高反脇肋上許刼反下郎得反盜竊千結反泆与一反第十三卷履屣所綺反勇捍何案反剔除上他歷反尅鏤上口得反下勒𠋫反幡𢣏古太反正作盖又烏盖反非也毫里之反針筩大東反正作筩坌身上蒲悶反𢪛淚上文粉反拭也第十四卷炳然音丙柔䎡音軟狼𤝧布㒵反曾眴音舜歎吒竹嫁反儼頭上魚掩反敬也經音義以顉字替之五感反𧰟天上羊贍反第十五卷毗醘火𠔃反浣濯上戶管反下宅角反蹹𣴟上徒盍反下戶管反比後上毗必反次也擿罸上吒革反第十六卷帝釋音釋㧯𢱊上口老反下力上反𠌵外上似兩反下互加反角𤴷助㽵反悮死惚音惚又音忽悞㚘將上芳無反下子良反正作扶抙也又上音伴下音剝並悞奮息上巨右反堪辨蒲莧反牧捕上尸由反下蒲悟反彈笒巨今反正作琴𠌵上祥兩反下居右反先𠸍私妙反薗館古乱反即枕之審反讖悔上楚鋻反正作懺悞此音岸一攝𮧓厄二音犁搹壓牛領者也第十七卷已辨蒲莧反見別本作辨耐辱上奴代反又別見本作幻偽上胡辨反下危睡反見別本作幼偽鴻鵠上乎公反下何各反下又戶反鍼筩上之林反下徒東反拘飢居梨反鳥名拘羅也見別本作𠍃字也二本並經中自有𭃄脚也經音義以翅字替之音施翅諸經作吉梨吉氏二反也鷙鳥脂梨反猛鳥也謂鷹鶻等類誦習尋集反學也因也又見別本作謂叱涉反非也第十八卷𭅇匍上之廉反下蒲北反智度論云秦言黃花也正作贍匐上俗下悞泆上羊林反下羊一反倮踐上戶瓦反下又作跣也百普吉反跽白上其几反空捲巨貟反事猥烏罪反般嗟千何反正作蹉經音義作嗟第十九卷老耄莫報反𧆞珀普白反氍氀上其俱反下生苕反𣰅㲪上他盍反下得能反鞌勒上何寒反髄𦜩音𢙉勇捍何案反擗水上普擊反正作劈沮壞上才与反一戶木反第二十卷淨上乎屋反貲輸上子斯反財也𣯈㲪上他盍反下多能反酸疼上蘓官反下徒冬反𤵜病上丑刃反唌唾上序延反淚㳮上力遂反下奴予反正作淚也下又音頰悞也擒獲上巨今反憂倉歷反邠陁利華上彼巾反亦云奔荼利亦云分陁利亦云芬陁利亦云邠陁利皆梵言楚夏耳此云白蓮華如第三帙第二十一卷倮露上戶瓦反全躰無衣也𭾖天上羊贍反揣食上徒官反丸也繖盖上乘旱反俎壞上疾與反正作沮甄陁上之人反拘絺丑夷反根上五口反剔除上他歷反第廿二卷邠𨚎上彼巾反下丁𠔃反正作枑也又丁禮反聲不便也下又或作𨸧音遟亦云邠遅並通酬匹普吉反㰅罸上知𮧓反正作謫䐗肉羹上竹余反下古盲反重釀女向反醞酒也五經音義作刓應和尚以刻字替之苦得反削也郭𫞕作刓五官反圎削也又按萇筠𭃄作刓五骨反斫物頭也又按瑠璃王經作五扤是也今定取机字為正豬肉上竹余反煩𭜨於元反愁𢙉奴老反下經音義作鳥乱反非㗛上尺之反盪鉢上徒朗反洗也蹹衣上徒盍反百鵠戶反又音鸖土上卜江反𨛁土同上澹泊上音噉下音拍門閾况逼反第廿三卷生漏音漏屢者上力主反背曲也又力朱也捨弓居雄反𣴟之上戶管反洗也無沾點店二音正作𪻕也疾上自反歰所戢反顏貌音㒵一函音咸有作者非也稽上吉兮反空墟去魚反彼堓音岸材木上音才又作村非也草蘓禾反草名可為雨衣第卅八云拾材木草葉縛栰而度川音作或作穰而羊反禾莖也作栰音伐溺者上奴𠮧反坋者上步悶反瓠籚卜乎護二音下亦嚧音盧兩尻苦高反荊蕀居力反𨀛踞上音存下音據𣜭除上即淺反滅也菓蓏郎果反莎草上素和反第廿四卷垢圿古八反戰𣏞于救反正作忱㘁上戶高反或閈音閇詣市時止反攢箭上才官反𣛰之上知与反盛也任也裝也正作貯褚著三形也又知略反非也㯹頭必招反䥫𭉨即委反鬲子上古厄反或啄音卓所押音甲揵搥上巨焉反下直追反勇捍何案反違叛音畔雪揣音團猥多上烏罪反撰擇上宣兖反菓苽郎果反正作蓏又古花古胡爭巧三反非第廿五卷耆𦫿上巨脂反長也又六十曰也下五盖反老也人五十曰也燌燒上扶文反拘屢力遇反佛名也捻挃上奴恊反下知栗反手捲巨貟反怙悴上苦胡反正作枯也下才遂反上又音戶悞第廿六卷為𦜩音惚湏阤洹上相朱反中徒何反下戶官反斯阤含上一音斯羅捺奴太反國名波羅𠇈人上相然反幡㦈古太反正作盖又烏盖反非也復儲音除即從自容反正作從幢麾音撝救𡧱上山八反下何太反稽㽞上古𠔃反下力由反水底丁禮反又音祗悞親在木反挊之上郎貢反令兀五骨反断足也正作刖杌二形深坑上失針反下苦耕反勑㑢魚去反𧴵一上莫侯反易也上上五按反拘璅上古侯反下蘓果反兩舌上力掌反䓣舌同上而𠸍私妙反而𠸍同上石押烏甲反長上爭巧反垢圿古八反病瘦所右反復辨音辨舉倩七見反利也又青性反假也辨見上蒲莧反共辨同上鐵上天結反下直朱反車𤥾巨魚反𭤔有上許依反金𮡻頂反屈公悟反舍鳩上手夜反下居求反下又音九並悞䨱弊上芳救反下愽例反下又音敝悞救𡧱上所八反下戶盖反不救同上根栽子才反檘歷上普擊反正作霹靂梢箭上生卓反正作矟王救音煞僂者上力主反得电音申寘中上莫瓶反又之𮐅反悞徧露上疋綿反正作偏又音遍悞也儼頭上五感反搖頭也正作顉第廿七卷沮壞上才与反第廿八卷唾上序延反眼𥇒音接粇米上古音反千柘之夜反豪里之反朁不上音剃𭾖天上以贍反煩𡗚女孝反康彊巨良反勞乎上來高反經音義作第二十九卷試挊上尸志反下來貢反杅緣上為俱反下以反箱篋苦頰反第卅卷瑕疵上戶加反下自斯反檘木上普擊反正作劈也猥多上烏罪反檝在上阻立反止也儉也正作戢又集接二音悞繫惙竹稅竹恱二反連也正作綴相疇市由反報也以財貨曰也荅也又作對是也正作酬醻詶三形又直由反悞捅論上古岳反𥪰也松第四帙第卅一卷燌煩上扶文反深灁烏玄反深也正作淵剡囦三形見別本作淵寑蜜二反貫鍼上古丸反下之林反鴦掘其勿反𣧑暴上許容反下步㦸反為蠻遝反訴辞上蘓故反下寺慈反華莫還反放𢗡音目放也正作牧禽獲上巨今反也急持也正作擒襟三形觸嬈而沼反捽母上存沒反玼也手捉持也並音笑㸌𥧝上呼活反達也見別本作豁豪釐上之反猥多上烏罪反𢪛攝上式由反鞕杖上卑達反正作鞭娉上疋聖反下七句反正作娶象廄音救倮踐上戶瓦反下先淺反見別本作祼跣也悞揵疾上疾反疾也見別本作第卅二卷掘山上其勿反勝漿即良反悞鱣魚上知連反桃眼上他刀他條二反顧視上音故正作額屈顧同上拍毱巨六反五兀五骨反断也樹也乇枝也正作刖𭠎二形也當古堯反蜜絺丑脂反園名綏納上息唯反係嗣上古詣反下辝字反園舘古乱反飰食上扶万反病𤸃所右反夷湍他官反外道名也此或端字悞也或云阿夷多或云阿耆多或云阿逸多或云阿夷耑比盧持上一音毗或云毗羅坘或云倍羅𦙁子也夷与端字同也又音偄悞之咎巨久反𭡢鹿上衣撿反取也第卅三卷灰色上火迴反雹莭上步角反昳起也正作𦢊也經音義作𦡕以皰靤二字替之滿孝反非也水底丁禮反又音祇悞擒獲上巨今反可鞭卑連反俎壞上才与反又音阻也猗覺上依綺反七覺支一也琥珀上火古反下普白反金扉音非門扇也煌煌音皇泆羊一反普𦁉息反又音接悞山上才作反蝦蟆上戶加反下莫加反蝦蟇同上見枷巨迦反杖也又音加釋云五欲也雜阿含作楞耆佛釋云无明也別譯阿含作楞祗毒虫節釋云愚癡也第卅四卷䖝䗍洛禾反陶家上徒刀反𭾖天上以賠反崩落上布登反下郎各反經律異相作崩音蒙慰勞来到反䣶蒲桃上徒兼反下徒刀反當儲音除手捲巨貟反正作拳撰擇上思兖反牙跂巨逆反正作屐外口豆反景𥧝上居影反戒也正作警一扼烏革反犁草也涕上徒兮反下空屋反正作㖒哭捅牛上古豆反取牛乳也正作擎搆二形又古嶽反仕角二反遼治上力予反下直之反正作療也又音聊悞第卅五卷抆飾上冝作文彣紋三同無分反文美也彣青与赤雜也紋綾也又無粉反拭也又前後皆作挍飾字也柘蕀上之夜反下居力反菓𤓰古花反掬水上居六反而穬古猛反俾勤上卑尒反翹足上居堯反八古孝反正作𡧱𦜩𦝩上奴老反下云貴反第卅六卷涕哭上徒兮反正作㖒下並同也又體剃二音悞諸經作𠮧喚大𠮧喚是也廷直上他頂反直也長也正作頲二形也又二音悞自摑古夌反荊蕀上居迎反下居力反泆羊一反押之上音甲束也草著知与反任也正作著五刖五骨五越二反断也五揆知挌反張也如世閒逆者以五車張之曰也正作磔也開元樓藏作知挌反張也又求癸反悞經音義作揆以捺字替之非也𢲉音祭奴達反並非也而梟音澆䥫𭉨即委反摩牧冝作捫莫本二反以手撫持也又吻問二音拭也𧑮動上而兖反較之上古孝反又音角量不等也略也自擗補益反襵褺也正作襞也第卅七卷夷耑音端前作湍𣽈二字彼應悞也初學上楚魚反始也新也正作初起敘音序未巨久反正作悞憒𡗚上古薱反下女㒵反疇匹上直由反下普吉反邠𨚎上彼巾反下丁禮反或作𨸧音遅如前釋酌之林反上第卅八卷殉弊上許容反下毗祭反鐙光上音燈也𦧧耳上時尒反草葉羊接反第廿三作彼或是葉字也第卅九卷𤝌猴上于元反下乎鈎反正作猨猴也擗口上補厄反正作擘也推捧上丈追反下步講反戈矛莫侯反春杵上書容反惔怕上徒敢反下普㒵反沆翳一計反苦惚音𢙉堅𩊅五更反堅牢也正作鞕硬二形也牧牛上莫六反不肥扶非反正作𦘺不廋所右反又音叟悞死邊音邊夷耑音端㸌然上火活火郭二反象上音字正作牸以挊音弄執勞洛刀反別本作𣬄䘏民上私律反𫽄𢌿音𢌿病瘦所右反正作瘦瘦二反中衣小反周序緣反瘀埿上於去反第四十卷辱上奴代反正作耐泆音迭隱慝女力反藏也又他得反悞隱匿同上此正居約反百愔蒲亥反正作倍也郭氏未詳玉篇作芳久反非此用千倍步乃反正理𮞼相遂反正作邃𨳰塞上愽計愽結二反問訊音信掃詳嵗反祥醉二反帚也正作慧二形又音慧悮搒抬上蒲育反下丑之反正作榜笞也栲𢱊上苦老反打也正作𭮂下力尚反笞也治也慇懃上於斤反正作慇躬欲上音弓下音浴義尠仙淺反愽𢸒郎敢反手取也正作攬擥二形酌上之林反鐙光上音燈佛名鴗羅上其列反佛名提和羅即然燈佛也又音立悞也事猥烏罪反眾多也之第五帙第卌一卷周序緣反𭤔有上許依反唯願魚願反正作願顯願二形嫉姤丁故反慳嫉上苦閑反喜𠸍音𥬒瑕疵上戶加反下才斯反悉俻音俻海音岸問訊音信問訙同上屈电音申𢗡攝上失由反下失反市𡗚上時止反下女㒵反病瘦所右反村渃音洛賢刧上乎堅反揣食上徒官反𢷋首上補招反正作摽𨲙上相朱反正作手捲音拳曽眴音舜利掘又作㭾同巨勿反人名或云尸利毱多門閫苦本反莘滿上音花下音滿芬香上芳文反憒然上古對反涕澪上他禮反下力丁反鉢丘至反正作器泆上羊林反下羊一反伈人上相連反正作仙第卌二卷叛𨒫上步半反謶譏上書去反居依反正作庶幾也上又之若反非也翅羽上音施鳥翼也尠少上星淺反恭恪口各反屈电音申青瘀𢪛去反𮌨脹上疋江反下知亮反第卌三卷拘睒失染反讖比丘上楚蔭反揵推上巨焉反下丈追反羈難上居冝反傒属上古諸反邊也彿于上芳佛反東洲名第卌四卷殃舋許覲反門𨳰音閇又入試詰上式志反亦尸棄皮𥢶苦外反曳右上音申舒手也蠰佉上商亮反下去迦反挮他𠔃反國名般綢上布官反下直由反守護銀藏龍名也或云頭或云班稠也𧰟天上羊贍反第卌五卷拘屢力遇反淡泊上徒敢反下普自反屏依上蒲政反隱僻無人處也下疋豈烏改烏對三反藏也隱掔也正作庰依也二並悞疾上才反第卌六卷摩刷所刮反瘡痍音夷沮壞上才与反愁悒音邑无煴烏䰟反又於云反非也翅甯上音施下奴定反一𭽎戶屋反屢者上力主反正作婁第卌七卷誦習尋集反經音義作謂誤抴電上以世反𢪛餝上冝作彣紋二同音文諸經或作文飾是也又或作披飾古孝反下始食反上又吻問二音悞膿血上奴冬反經音義作䐦創愈上楚床反下余主反膏車上古到反醇酒上市倫反𭜨巨九反正作咎蜎飛上烏玄反輪轢力達力各郎擊三反車踐也㕮咀上芳武反下子與反拍碎也亦作𥒰䃊來填陟隣反壓也經音義以鎮字替之鎮知人反也蹹𮛫上徒盍反銅羊接反卷上巨貟反下子消反第卌八卷淵流上烏玄反深也甄陁上之人反蜜𠽮梨反經文自𭃄也國名蜜羅也或云蜜絺或云挮或云𩭈音剃也猶挻音延泥洹經作延又丑延式然二反樹名七肢音支平跱直里反咃𭇅上訰何反下章移反至藏巨寶名也又經音義以他叉字替之下又或吱音仚也梳頭上所魚反正作梳欲剔他歷反為𢴠尺志式志二万又音志記也搮也正作𢡠也又音持悞寶跂巨𨒫反名荏如錦反王名也經文自𭃄鱞獨上古頑反一揆求癸反替癈上他帝反下方吠反相糺居黝反遘闘上古豆反生擗愽厄反正作摩壓烏甲反銅鍱𨧲下二音𦒱𢱊上苦老反下力尚反氍㲙上其俱反下生俱反織毛褥也下俗蹹蹬上他盍反下多能反正作毾㲪也又上音沓下音鄧悞垢玠古八反正作圿圿又音界悞摩𢪛文粉反𧋒哲上音釋正作螫蜇也繤修上子管也𭦟今上莫官反聞也器皿明丙反第卌九卷悲㘁戶高反又音亦垢圿古八反作攡力支反䥫槨古霍反擲中同上也悞四徼古矛反四謂四徑路也小道也妷音逸五𡚁毗例反僥倖上古堯反下胡耿反而爍羅各反正作炵又書約反非用邠𨚎上彼巾反下丁禮反或云邠音仾或邠遅音班稠直流反蜜締下音締丑脂反第𠦜四作挮𠦜八作蜜𠽮吐梨反勒成佛經作蜜絺羅後又作絺羅是也又徒𠔃反唯勒成佛經作提羅梵言楚夏耳門閾况逼反門㡾也鞞皷上步迷反般禂上布反下丈由反姑障上古胡反下諸良反夫𦕓音細旨也第五十卷蘭柘之夜反灡遮上郎坦反施挮上式支反橙墻上音登升也上也四十九云踰墻入內也又丁亘反挮挄也乳鋪音步撾打上竹花反鞭打上卑連反黮如上他感反𦬔子上古敗反勉此上音免脫也第五十一卷從廣上子客反多猥烏罪反履屣所綺反初甛徒兼反正作甜抑折上衣力反下之舌反綺語經音義作䛴丘倚反殃舋許覲反著腹上張呂反任也正作著䥫臼巨九反𢫎熱上步保反或桃他條反他刀二反擾動上而沼反脊觔上子昔反下居勤反攘厭上如羊反下於陝反琦音奇尻亦上苦高反嗽乳上所卓反泆音逸嫟女力反隱陰姧也正作匿也或作匿他得反𢙣也然非此義也姤忌上丁故反饋遺上巨位反下惟遂反稟食上兵錦反逢驅上羊招反正作遙下丘俱反晧白上戶老反夫聟音細遊佯音羊不消相焦反滅也盡也息也冝作肖音笑似也佯愚上以良反許也經音義作湯聾饕餮上他刀反下他結反蝗䖝上戶光反皆𡙸大活反奉禄上扶用反秩也君以禄為巨也又扶勇反獻也椽也下郎木反俸也賞賜為禄盛雜阿含經一部五十卷第一帙第一卷憘貪上許里反放逸羊一反輸屢力遇反正作屢第二卷阿㝹奴𬾃反傘盖上桒旱也揵茨上巨焉反下才資反鄣閡上之亮反下五愛反若曖奴管反正作曖也又音愛悞蚊䖟上音文下音盲申恕音庶傘盖上桒旱反獲泅音囚不憚徒且反示教音投別經作郣明苦角反第三卷逯得上徒愛反若𭊴許右反嬉戲上許之反下許義反慰勞郎告反第四卷水牸音字鞭笞上卑連反下丑之反執尺證反柄傘上彼命反傭客上羊封反澡漱上音早下音廋所係音計捷疾上自業反麦上古猛反蕀㓨上居力反正作𣗥若軛音厄若鞅於兩反若縻美垂反若鑱仕懺反應和尚以替之戶花反為轅于元反啾子由反絺丑夷反初徒官反木扚帝若反𢙢怛都達反悞迫恊許刼反正作愶𢱊護上力向反奪取也下正作訝乎悟反誌也認也下又經音義作𧥮丁礼反欺也彼悮誣他上文夫反祠祀上音詞下音似第五卷消煬上亦作焇下作羊阿漯失入反比丘名阿濕波誓亦云阿說亦唐言馬勝𠚫上牛例反下北末反下正作𦫿茷升藪上都口反下桒口反正作抖酒囊奴郎反壓取上烏甲反清淳市倫反亦作醇糟上子曹反下爭史反𦟛直上丑容反剽剝上疋妙反強取也刼也亦作跨說上苦花反大言也正作誇突目佉上徒骨反下去迦反中蟹戶買反罵謠音無枉也亦作𧩄輕躁子告反動也疾也亦作趮𣸡菴上千悉反第六卷手撥音鉢足蹴七六反魔縻羙垂反撰擇上思兖反第七卷鈆上應和尚以剬替之剬之兖反細𭃄也肉也断也截也今又冝作脟脮二同力兖反也諸經多作腐割也又依字緣鍾二音義無所取上方經及川音並同作鈆桃著上徒了反擲也不𤵙所眼反生也正作產二形郭氏作所景反非也不構古𠋫反𢭀轉上㡰全反尫瘵上烏光反下爭介反貪嗜神利反剎𢷋上音煞下疋妙反強取也刼也正作剬勡二形疾垢上正作嫉妒上音疾下都悟反楚詞曰𡧱賢曰嫉𡧱色曰妬槌打上直追反下得冷反㿈疽上於容反下七余反讁罸上知𮧓反下扶發反暴上許容反跳杖上音條又他子反呰執上將此反棹悔上徒了反惛忤上呼昆反下五故反𨒫也又經音義作惽悴才遂反憂也𨇱跣上蒲先反下蘓前反旋㒵也蹣跚行也正作蹁躚也𮥭欷上友秘反壯士作力也亦壯大也正作贔膊二形下許噐反正作屓也第八卷奮縈上巨久反下於管反苟肚上古口反下徒古反𥾣結上古巧反濤波上徒刀反大波也第九卷稽首上苦禮反揌持上子孔反又作惣彼音岸利搶七羊反㽞搜所愁反駮牛上布角反折𭉨上市列反下即委反波咤竹牙反純阤上市倫之尹二反下達何反或云淳陁西域記作准陁是也芭椒上布麻反下子消反大莫丁反糠糩上苦郎反下苦外反塢𨈢上烏古反下都含反𨈢陸音六捺渧上奴達反下丁計反肅捺上息六反下奴達反枳上吉以反塢娛上屋古反中牛俱反下力計反拘荼上九愚反中步官反下宅加反也毗紐女久反旃延以然反採才焦反敷𤴷助㽵反又所火骨二反悞嗽上子老反下所右蘓奏二反革屣所綺反𢢔上五高反五告反𢢔也倨也正作二形也編髮上蒲犬反又邊篇二音衣皮褐上衣氣反下何割反灰盆上火迴反下蒲問反正作坌不音𢙉第十卷拘睒失染反輸屢上束朱反下鐸句反復雞上扶富反鳥抱子也正作伏下古𠔃反菢步報反伏𡖉也蔭㽞力救反宿停待也經音義作鵽力救反鷄子也非宿音秀以𭉨即委反𤓰喙𡖉上爭巧反中竹角反下郎管反正作𤓰啄𡖉也出苦角苦木二反以𭪿子委反斧柯音歌滕綴上徒登反下竹稅反覆𧭼上芳救反下初覲反悞氍氀上其俱反下生俱反𣰅㲪上他盍反下得能反丹枕之審反茤摩上測俱反拘沾竹鹿反𪮧直上丑容反又音容也手攬力敢反發㧡古諧古哀二反萃根也正作菴也又音亥非也火燥他念反火杖也正作掭也經云𨐫如燒尸火樓弃塚閒是也經音義作以燴字替之非也他念反燥先早反並悞撨伐上才焦反又先條反悞土槫徒官反塊也川雜阿含經第二帙第十一卷眼䁔奴短反正作暖也又許袁許願二反悞也係念上古詣反連也縛也莖幹古岸反夫智上音扶語助也䈥骨上居設反篋虵上苦頰反憎惡烏故反所嗅香右反鼻取氣也又七秀反非也由恕聿預反踈𣾫所立反問訙音信試𦗟上尸志反迭相上田結反不減咸斬反懈勌音惓猗息上衣綺反唯聾郎紅反第十二卷解拆先擊反根幹古案反解折先擊反載撨才焦反撨薪同上拘絺丑脂反輾轉上知演反留所愁反背膢九主反正作僂班駮補角反雜色也𨅖陁上桑讚反又二十三作詵陁迦旃延郭氏作蘓安反亶延上諸連反犢牸上徒木反下才寺反玷牟上點店二音第十三卷為誌之熾反記也扼閡上烏革反下五愛反鹿紉女反或作細音鈿輕子苦反染泍烏故反悞第十四卷椯食上徒官反謂棹大了反刦盜上居業反防邏力个反𠠤以上住銜反㓨也百矛莫侯反第十五卷毗漯失入反正作濕食上徒官反癖陰上普擊反痃也下於禁反痰也唌唾上序延反百搶七羊反百搶同上第十六卷孔上五口反銅然上音同徹也悞橙階上都亘反為為鏘七羊反正作搶貫大上音官穿也䔉子上蘓乱反𤓰押上爭巧反下古甲反陁驃婢妙反此云實第十七卷拘睒失染反號呼上戶高反㘁呼同上呺呼同上毗𤨴失入反正作濕集異門足論作吠濕鞞嵐上步迷反下洛南反集異門足論作吠嵐毗漯失入反正作濕又他合反非也悞壹奢手遮反第十八卷破𭩶力竭反破也正作裂又音竭悞浚輪上相俊反鳥翮戶革反歰所立反築令上知六反正作築也喘息上川雍反係念上音計連也投上古火反正作裏第十九卷牗上楚江反下由抑反簾彰上力間反下之亮反𢳆其上普結反擊也正作撇也又昌六反動也又經音義以蹴字替之非也顛狽上丁田反下補盖反頸仆也正作伂也觔骨上又作𮏴同音斤正作𮏴䝱䯇上許刧反下來得反棎其上他含反脯腊上音府下音昔乾肉也好讒仕咸反𤓥矛上倉官反下莫侯反敘上倉官反下所八反唼食上子合反陰𡖉郎管反如瓮烏貢反鍜銅上都乱反烊銅上以良反蜜音餅熾然上尺志反𢴠然同上也悞鞅其頸上於雨反下經反𧿡袛上蒲末反失𭣣書州反山名也失𭣣同上第廿卷問訊息進反慰勞來告反問訊同上澡罐上子老反下古乱反或鞭卑連反澡漱所右蘓奏二反口也正作漱流第三帙第廿一卷拘睒失染反棹亂上大了反浚輪上相俊反澡漱所右反梨𡱝音西比丘名也辯疾反斖斖音尾成𧂐子賜反軛鞅上烏𮧓反下於兩反躶形上戶瓦反全身無衣也淨也正作稞也又郎果反說文赤躰裸躶非此呼涕泣上他禮反下去及反經音義作涕泗第廿二卷稽首上苦禮反遍照上卑見反難阤音陁鈎鏁素久反逯得上音代䫃鞭手連反長縻美垂反羈絡上居冝反烏泥上𢙣胡反水不流也正作洿商人上手羊反又音的悞破撨才焦反炊餅上尺惟反下扶万反作音餅娶婦上七遇反姧姟上古顏反下古夘反㽵飾施食反𤴷臥上助㽵反下五遏反揵荼上巨焉反下宅加反瘦㝹上所右反下奴侯反欠呿丘御反憒悶上古𭔹反如龜居追反以嗀口角反欲安故安各二反正作𢙣惡二形耒詣上洛才反正作來又力水盧對二反悞第廿三卷荊蕀上居迎反下居力反喑啞上於今反下烏雅反嬉戲上喜之反繖盖上旱反調咲上大吊反下線妙反之塌音塔料理上力條反澀上所立反不滑也園館古乱反重餉式亮反塟上必進反下子浪反阿㝹乃頭反撾打上竹花反下音頂䥫鉗巨廉反𣐬械上勑柳反下戶介反䥫戶郭反正作鑊著臼巨久反係心上古詣反縛也舟桁胡郎反舡也正作航𦨵二形冝作笐戶浪反架也以綖音線枯𤍜素老反僻地上毗益反倒也悞晧白上戶老反第廿四卷鷹爪爭巧反正作爪濬飛上相俊反染也音義以迅字替之迅疾也直音愽擊也以𣛲丑知反膠也正作蘓也又丑魚反也口齧五結反捲上力延反下巨貟反𮨇䀎音麺又普幻反易韻上羊益反變也改也轉也下于訓反物乱也正作也傘盖上桑旱反第廿五卷𣾫所立反甲冑丈右反商主上手羊反號咷上戶高反下大刀反無量音亮崩頺大迴反正作隤號咷大刀反悉俻皮媚反號上戶高反下大刀反闇暝莫丁反惋慨上烏乱反下口愛反貝䗍洛禾反萎悴上於為反下才遂反封緘古咸反排攩上步皆反下他浪反推拓也下正作摥也又經音義以湯字替之託唐反𥥛也又他浪反出團也攩他朗搥打也堆迮上都迴反下阻伯反堆落也聚也亦作磓也迮𡑅也正作窄苗𧜟以世反係心上古詣反恡惜上力進反岨壞上才与反正作沮也毀也壞也諸經作沮也或作俎壞或作阻壞並非又七余子余二反非也第廿六卷因釭音公車轂口䥫手掬他含反深也取也正作探又音菊悞其哽古杏反㓨在喉也正作輭也哽咽也非也䉼里上力條反障𦿔必祭反迦椑音卑又音悞傍佯上步光反下以良反第廿七卷駭散上戶騃反潛思上才尖反下司寺反猗覺上於綺反撨炭上才消反紫也足其上將句反添也欠呿丘御反撰擇上宣兖反箱簏右木反王蕃方煩反又音煩青瘀於去反膿潰上奴冬反下戶對反𮌨脹上普江反下知亮反第廿八卷白控苦貢反馬轡也白鞭卑連反白𢃑莫告反白傘素旱反手執之付反問訊音信慰勞力告反問訊音信彼音岸𭤔有上計衣反伴黨當朗反世俗似欲反苷蔗上音甘下音之夜反蒲桃上步乎反下徒刀反悉恬徒兼反正作甜㥧流上侍閏反第廿九卷憒𡗚上古𭔹反下女孝反㒹沛上丁田反下補盖反塠壟同上睒一上於敬反隱也正作暎也又他濫失染二反並非也㐲雞上扶富反烏菢子也生卵洛管反口喙音卓正作啄悞爪刮上爭巧反下古頌反第卅卷浴上子老反塌寺上他盍反椯食上徒官反丸也汪洋上烏光反下以良反麻屑先結反躶其上戶瓦淨无衣也正作裸也又郎果反說文赤躰躶裸也非此呼猘狗上居例反狂犬也又經音義作昌制反𭃄作狾𤢻二形刾九力反繁𦒿上步何反亦云傍耆佉槾伽上去迦反中洛登反下其迦反槾莫官反悞易韻上羊益反變也改也轉也下為訓反物乱也正作縫衣上扶峯反憒𠆴女孝反憒同上正作吏下坂方晚反坡也我衿居呤反不第四帙第卅一卷傘盖上桑旱反𠸍音笑祑粟上持日反下力日反悞匐叉上蒲北反青瘀於去反脹相上知亮反膿相上奴冬反羅羊朱反河名也第卅二卷嬉戲上喜之反下喜義反甲冑丈右反歰所立反枯熇苦老反乾也苦也正作槗熇二形又音臛熱㒵也非泍戒上烏故反深也正作汙仾責上丁禮反下阻麦反負財不還也正作債也䥫搶七羊反沃壤上烏毒反下而兩反瘠薄上秦昔反疾上疾反第卅三卷八態奴代反蹹人上徒盍反趯蹹也踐也正作蹋跪地上巨委反正作跪𧺫二形也膝加地也奮頭上芳問反囓人上五結反榐軛音厄鞭杖上布延反断居良反正作韁繮二形断鞅於兩反𥥛上丁禮反下大骨反輕蔑莫結反詵陁上所臻反比丘名陁迦旃延第十二卷作𨅊陁迦亶延是此別名耳棹悔上大了反身猗衣綺反又乎聲呼㐲雞上扶救反烏菢子也以抓側巧反正作爪啄𡖉上竹角反下洛管反第卅四卷唯幹古案反空榦同上浚輪上私俊反㩉補上都盍反或作㩉他盍反河名無異譯勘會見緾丈連反磬咳上苦頂反下苦愛反正作磬欬也又上音𣫆下音孩非執𥰢失戰反𥰢佛上失然反第卅五卷遼落上力迢反跪地上止包反正作跑又去委巨委二反悞野犴古案反正作于也別譯阿含作野干是也又可顏五寒五按戶岸四反非此呼毀呰音紫狂騷桒刀反洛漠音莫唌唾上序延反悼悔上大了反正作掉毗珊桒安反坘子上音遅亦云毗盧持又音伍亦云毗羅𦙁子枳舍上吉以反求備音俻逃竄倉乱反為榺徒登反正作藤為藕五口反為膠交挍二音苟腸上音狗下音長為絮相預反為榺音交前例作膠字也不慊音嫌又苦點又非瞋朾上尺真反下得冷反嫌彼上戶兼反前非第卅六卷阤羅驃上徒何反下毗妙反唐言實稽首上苦禮反顯深上呼典反少惚奴老反廬舘上力余反下古乱反𧯞𮗤上都口反下戶穀反欲求上余玉反峯牛上芳逄反正作𭷟上妻音妻也㥧夫上市閏反賢妻七西反輕躁子告反制御牛去反第卅七卷澡漱上音早下音瘦淳陁上市倫反毗濕失入反麻屑先結反撾捶上竹花反下之水反忽所戢反悞身恕音庶𡰱咤竹加反繖盖上桒旱反鞞細上毗迷反下女久反䥫鉾音牟水上倉官反仰同上樶水同上仰撮同上仰同上撮水同上空同上掇也遙擲也正作攘攛二形鏘投上七羊反下徒俠反第卅八卷駏驉上音巨下音虛上云馬父驢母為駏驉驢父馬母為騾也應和尚云牛父馬母為駏驉也坐妊上徂臥反罪也下而禁反孕也革履所綺反正作屣䫃䀎普幼反又音麵刀食凖反正作盾千也所以箭駃走上所事反疾也𡨜滅上自歷反別經作芴彼悞㯓補上他盍反河名又作㩉音荅也氍氀上具俱反下數俱反毛席也槾耆上郎登反別譯阿含作楞祇楞𦒿上郎登反揣食上徒官反第卅九卷疽蠅上七余反瘡疣于求反創如上楚㽵反䥫鑽戶郭反又音俠非也鑽鑿音昨効彼上乎教反傚彼同上繩衒古犬反索也正作羂又音縣非也睒現上失染反大帆凡梵二音舡上也曳電上以世反蠅𧈸音早𨥨槍上莫侯反下七羊反損觜子委反齒齧五結反手抒音序染也氣歔音虛瘖瘂上於今反下烏雅反築地上知六反第四十卷生擒巨今反馬鞕卑連反悞傘盖上桑里反革屣所綺反當遺以遂反贈也与也息第五帙第卌一卷湏阤音陁揣食上徒官反捫摸上音門下莫也非陋郎豆反掉悔上大了反染洿烏故烏臥二反正作汗佯佯上音羊詐也下音𡓜弱也驚悟上音景戒也正作警老嫗於遇反互相上乎悟反第卌二卷術筞楚責反掉悔上徒了反族丈右反闍𥘡丁𠔃反仿佯上音房下音羊摩揭音竭𦟛細上丑容反贈遺上自鄧反下以遂反与也收尸由反膢𮌡上力主反下卜昧反俱蹲音存老鵠戶沃反第卌三卷縫紩上扶用反下直一反拘睒失染反婆磋七何反骨幹古岸反流唌序延反肪脂上夫亡反溺上尸旨反下奴𠮧反殼內上苦角反麦上古猛反躭湎上都南反下兖反有柄彼命反有戾力竭反茅荻上莫交反下徒的反失𠬧尸由反入宂玄决反兇𢙣上許容反危脆七嵗反浚急上私俊反搸林上助臻反棘㓨上居力反俸祿上扶周反祑也君以祿与臣也莠稗上由柳反下步拜反緊獸上居引反樹名也亦云甄叔迦也㕘所今反長㒵也正作也經義以耗字替之蔯南反床㩉他盍反四褺徒恊反卷襞補益反係念上古帝反疾殆徒海反修揵音𠃵此云里花刪闍上所顏反枳舍上吉以反迦邅上古牙反下遮延反正作亶也諸經並作迦旃延也又知連反持破二反書人悞加之也第卌四卷絺丑夷反裸形上戶瓦反淨也更互乎故反孫阤音陁特上頂反䟽頭上所魚反磬咳上苦頂反下苦反正作謦欬也鑽燧音遂木杓市斫反叩戶上苦狗反迦咤竹家反杪𢱊上初孝反下力讓力差二反第卌五卷阿臈郎盍反姧𡛀上古顏反下古巧反鞭打上必連反稟无上兵錦反丞受也長縻美垂反第卌六卷金翅音施鳥巢鋤交反傘盖上桒旱反嗽上子老反下所右反施𦊰上失支反下古犬反迷醉子遂反豆羹音庚革屣所綺反給䘏私律反𠧒音蓋牧其上尸由反煎熬五高反理上力條反無𢪿音姑收錄上尸由反杻械上抽酉反下戶介反狼狽上盖反怖遽也虜𢱊上郎古反下亮略二音毀訾音紫又作呰訿二形第卌七卷𠧒貸他得反正作貣一徒官反悚慓上息勇反下力日反皼㰆步拜反釵鐺上初街反下得郎反扇排步拜反吹火具也正作排㰆二形其創音瘡断理上力條反正作料黨護上得朗反放牧音目牧臥上音床正作牀聲饗音響不憙音喜常抌之審反龜丑挌反儆筞上居影反下楚責反繒纊上疾陵反下苦謗反匕首上音妣匕首劒類短而便用故曰匕首長三尺重二斤一兩下經文作手非捲推上巨貟反下直追反遷滅上七仙反疾上疾反貓貍上莫交反下力之反𮊵惙上力垂反下知劣反第卌八卷駃流上所事反疾也速也是抱步包反逯得上徒礙反廬阤上力魚反下徒何反諸疱步㒵反佉梨上去迦反𠇾𠇾音𠇲珠璫都郎反凷相上苦內反𨚎舍上丁禮反積堆都迴反分湌七安反食也又音孫非章嫗於遇反忽所戢反正作歰卑遜蘓困反金槍七羊反兵器彼五案反正作岸勇勇捍戶岸反強刦音刧第卌九卷拘屢力句反生胞疋㒵反宍叚上如六反瘦紐上所右反下女久天名或云毗瑟怒也上又蘓走反悞揵推上音𠃵下丈追反憒亂上古對反死廋所右反正作瘦鈎鉺而志反正作餌鉤釣丁𠮧反疲勌其眷反勤跑步包反依猗於綺反綿上仕臻反叢牀上在紅反下音林踞牀上居去反下助㽵反俱襵之涉反亦作拘執此云毯褥枕上而属反亦蓐下章審反婆藪速走反鬼子名汝胷音拘引上音鉤正作拘縢綿上又作滕藤二同徒能反葛藟也第五十卷戲挊音弄枝䓸古顏反枝菅同上阿臈郎盍反醘摩上呼𠔃反語者經作耆悞歰所戢反𢙉同上不滑也正作澀澁惢三形也鹿𬧅市兖反深淵於玄反水出於地而不流曰𣷬𣷬深水也風上徒禮反嬉戲上許之反曳尾上以世反輕躁子告反灌拘上正作罐古乱反下音鉤姑上巨久反下古乎反種蓏古花反正作𤓰說文作苽也又郎果反非也瓦塸烏侯反瓦捥也出萇筠韻得豬竹魚反一𢪛莫迴反樔窟上助交反鳥窠也癸卯歲高麗國大藏都監奉勑彫造
