body:
  text: 漢中沙門可洪撰依河府方山延祚藏大乘論音義第三之三盡命臨深履薄夙興溫清似蘭斯馨如松之盛川流不息盡成唯識論一部十卷一帙第一卷橐蘥上音託下音藥分㭊先擊反開破也葂角上他故反沈淪上直林反下力純反剌闍上郎達反濕𤏙如短反表詅七全反瓶甌烏佼反提塘上都號反誤下徒郎反第二卷欇植市力反苣勝上其與反下尸證反第三卷能警音景戒也伊進反瞢昧上莫𪪺反豈音尺如尺證反低昂五郎反駃流上所事反令無上自宣反軍音侶串習上古患反第四卷通𡱈其玉反踞傲上居去反下五告反𢢔也上正作倨掉舉上大了反嚻動上許反第五卷作模莫乎反實繁上市力反下音煩第六卷礭陳上苦角反輕拒上去盈反下音巨正作輕拒又上奇下音振並非也誤勇悍音翰猛也蕑諸上古眼反善軛音厄𨷂輕上丘月反下去盈反所目結反便憤扶吻反佷戾上戶懇反下力計反䖧螫上知列反下尸亦呼各二反殉目上似俊反不耐奴代反祕力進反鄙𣾫上悲美反下所戢反現上九小反詭詐上居委反𠕀𭥗上文往反下莫報反醉上音奢也矜也誤下子遂反傷酒也耰上子告反惛悼上呼昆反徒了反誤第七卷窹時上古㒵反波濤上徒刀反也中上知仲反下於小反殞沒上於愍反塢陀上烏古反第八卷相音韋第九第十無字後序在第十卷末沈玄上尸稔反瀓玄上直陵反凝也清也涵万上戶南反又戶感反而濬音峻深也泄慈上以世反䯉也遐騖音務馳也奔也馳也繹空上羊益反理也陳也大也尋也終也兖也亦作䭞霏華上芳非反下戶花反緒澆上徐與反下古堯反育彩上羊六反生也長也談芝音之瑞草也論衡曰芝生於土氣和故芝草生大者如茵五色皆有也瑞命禮曰王者慈仁則芝草生也賁研上音𦘺飾也又音祕美也韜上他刀反下於玄反煙飈音摽玄圃音補韞玄上於殞反鄰幾巨几反迮也又祈機二音景躅直玉反軔羬上而振反礙車輪木也下巨廉反羊六尺也尓雅曰羊六尺為羬又五咸反山羊也又羊有力𭭻探上仕責反下他含反仙羽上音扶風名也㽵子云扶搖之風以扇大鵠鳥一舉九万里非風不飛也下于過反鳥翅也眺九上他吊反遠望也正作眺也周禮云大夫衆來朝日俯寡來曰駛也非用又或作猶音眺低頭聽也閟虹上音祕下音紅眇歸上小反目病也小也又𥬒反粵若上音越于也玄奘自朗反大也體睿音𨦣軼芳粹上羊一反中芳方反下雖醉反微上徒告反泳祥上于命反輟水上知劣反偱鏤杠上音巡中音漏尓雅曰金謂之鏤下音江旌旗飾又床前撗木也躙雵峯上音吝踐也中音英雪也下芳逄反山巔頂也睱玄上苦濫反從蒼上斯此反篆貝上直兖反摳電上尺朱反賮寶上辝進反旒邃上力由反杳通上於了反掞組樆上尸熖反中子古反下丑之反煥騰上呼亂反綸旨上力巡反溥令上滂古反廣也大也肇自上直小反環㴾步沒反紆宸上衣于反下市人反叶洽上戶頰反尓雅云太嵗在未曰協洽糅茲上女右反雜和也彚聚上云貴反銓綜子宋反詁訓上公五反甄奇上居延反其揆巨癸反基鼎上音箕下音丁法汰音太緒𬿑音仙挏鸞上音同引也而絢許縣反潛上自熖反下余稅反初昕音欣明也琁景上序全反上居小反績功上子歷反甄其上居延反教蟠音盤屈曲也龜疇直由反等也麟籀上刀人反下直右反式上尸力反用也下苦㝎反盡也庸謏上音容下蘇了反小也又音縮亦作諚命大丈夫論等七論十卷同帙大丈夫論兩卷上卷彼圻上悲委反下五案反正作岸或作也下又魚斤渠依二反亦岸也然非本呼狑惜上居陵反愍也憐也慰也恤也正作矝矝矝又借為憐字又或作憐力千反愛也狑音靈犬名誤如灰火曰反愚莫瓶反暗也正作𡨋又田甸二音寒也誤明垢音㺃嬰姟戶哀反正作孩又音該非施苞蒲角反崔破上在回反折也正作摧離上為丙反長也遠也正作永也又古懷反背也誤愱姤上秦七反下丁故反下正作妬㓻昌與反正作杵鳥獸手呪反速音授賣了也說文賣物出手也恐懼音具正懼侵徒活反喪失上桑浪反商賈上手羊反下公五反上又音的誤䨱𦿔上芳富反下博例反正作覆蔽也豪里之反心𣽈而兖反又音儒氣味上去既反淂顯上都特反下火典反下卷何回乎灰反正作回𮕱禍上所追反下乎火反𫘆流上所事反覺悟儜上古孝反下女耕反勉厲上音免強也勗也下力計反勸也回與上乎魁反還也避也大乘掌論兩卷上卷羂上古犬反眼瞙音莫安膳時戰反安那此云眼藥眩目上玄縣二音如昨含反處繭古典反牧牛上音目養也放也槗舉上居小正作橋誙𠕀上文夫反聰以苪反橋設上居小反遮詅此宣反又音虛誤永上許斤反正作欣眯亂上迷禮反又物入眼中也馬莬他故反便𨷂去月反渥團上奴號反正作望也見棒步講反環玔上胡閞反下尺反𨷂修上去月反下思由反翅羽上式智反下于遇反眩翳上乎練反下一計反餌能上人志反食也下卷嗢鉢上烏沒反銅鍱羊接反犢子上大木反字從牛標𢡠上必招反下尺志反入大乘論兩卷上卷姓上在木反嚙莽上五結反下占敗正作芥製電上尺世反正作掣也誤𦒿毱巨六反陶室上大刀反相于㱕反法卬一進反遍黨上匹綿反下當朗反上音遍非用大紙之是反或作紙比𡰱上音毗或云毗奈耶隧沒上大遂反落也提諸與反東州名弗婆提也正作潛穬古猛反勘菩薩行上一苦含反任勝也正作堪戡二形因捊音浮鼓捶也或作抱僧佉丘迦反比舍上毗鼻二音或云毗世師或云衛世師皆訛也正言吠世師唐言勝異過餘論勝能破論故異死上郎道反正作老羅邏勒個反胎名諸胞匹㒵反氣胞也下卷如趐音施正作翅菩薩名燒也挃沙上知反唐言鬼宿所押烏甲反杵朾上昌與反下得冷反鞭杖上卑連反鉾捎上莫侯反下所卓反正作矛矟也下又消梢二音誤顯現上呼典呼見二反明也正作顯蹴踏上七六反下徒盍反挾劣上胡夾反正作狹阿亶多旱反比致上蒲脂蒲必二反犍捶上巨焉反下直追反大乘廣五蘊論一卷歰性上生立反沉棹大了反警動上居影反礠石上音慈也慣習上古患反又作串矝倨上居陵反下居御反心憤父吻反鞭杖上卑連反獷古猛反忍耐奴代反妄上居小反詐也正作攪大乘五蘊論一卷溫蘇早反勇悍乎案反無䖧上于求反下知列反上正作尤過也甚也蒙昧上莫紅反或作曚冡蒙三形覆也下莫內反暗也或作昧同上寶行王正論一卷若扸先擊反互相乎故反不沈丈林反沒也大也止也普也正作沆湛二形又音審誤靖諸上情井反圍碁音其嬉戲上許之反涎唾上序遠反洟流上他帝反解𣴟上古賣反下乎管反汰淨上徒蓋反濤也正作汏也又音太過也併增上并正反兼也並也皆也浣濯上戶管反下宅角反搔癢上蘇刀反下羊兩反王膊市軟反臂𦟛丑容反堅酋字由反長也瞼𥇒上居掩反繖蓋上乘旱反田疇直由反園塘大郎反亭館音貫舍也屣繖上所綺反釣鑷上音釣又丁𠮧反誤下女輒反針綖音線荃提上此宣反果上音尺沼反正作刀斧音府拯恤上之瘦反下私律反林蠲租上古玄反下則胡反林偃於㦥反侶上書羊反鈞調上居勻反蛇嚙五結反刖除上月天二音足刑也䗍角上洛禾反徙舟上斯此反陜劣上乎夾反正作狹狹二形悲匂蓋割二音有幹古案反多互乎悟反上挨在木反又於騃烏改二反非也被駐竹注反止也又音注香剌郎達反辛味也正作辣愔隘上冝作𩐞於棻反厄不平聲也下烏賣反又喑隘歎息𭜨聲也上又於心反靖也毀呰音紫剡浮上羊染反或云閻浮洲也又時染反或云瞻部州也及𧆛昌據反正作處大乘起信論一卷序文智愷口海反窮盡上巨弓反遣騁田井反馳走也泛舟上芳梵反耰上苦𠋫反下而沼反慧旻美巾反黃鉞于月反雖慨苦代反論文不揆求癸反不𨓤音退生莫列反盡也絶也亦死也字從威聲威許劣反臨大乘起信論等八論十一卷同帙大乘起信論兩卷上卷煩惚音𢙉又音忽誤慣習上古患反緣償時亮反備也柔䎡如兖反分拆先擊反分也正作析扸二形下卷𭞚理上居御反依也按也正作據又其據反又玉篇音渠並非也礦穢上古猛反憒𡗚上古對反下女孝反𤵜疾上丑刃反三無性品兩卷上卷煩惚音𢙉鞮迦上丁兮反兩互平悟反故昌陵反正作稱稱二形相貌莫孝反串習上古患反相皂莫孝反正作㒵貌二形又逼䳨杏香四音並非相狠莫孝反又似貇苦佷反非迭㸦上田結反傳傳相上二知戀反傳相傳也亦作下卷悎悟上古孝反睡惺也正作覺寤菟角上他故反正作兔發菩提心經兩卷亦云論上卷扸破上先擊反明口角口木二反慊疾上乎兼反又音嗛誤常係古詣反連也揣上尺少反下徒官反一縷力主反之綖音線置羅上子邪反免也正作罝䀎膝上普幼反視也美目也正作盼下郎代反傍視也從目來二並誤毀呰音紫柔𣽈人兖反又音儒撾打上竹花反下得冷反加音無枉也不猗衣綺反正作倚又於冝反備受上皮媚反燒𭧶諸與反俗下卷臅髏上大木反下洛侯反項脊上何講反下子昔反胸脅上許容反下許劫反寬䏶上苦官反下步米反脛腂上形定反下胡瓦反下俗抑制上衣力反而時力反種也生也正作植殖二形輕莫結反無相論一卷若㭊先擊反觀所緣論一卷瓶𠥷鳥侯反彼上先擊反觀所緣論釋一卷呾迦上多達反轄反非謨阿上莫胡反譸議上知留反誑也瓨甌上行江反下烏侯反甌同上其仳匹爾反離也又皮美反猜卜上此才反疑也恨也下布木反龜曰也方便心論一卷廣殖市力反荊棘居力反稊稗上徒兮反下步拜反羅𩦾毗妙反此云實嚴飾尸力反正作飾餝二形也又音勑非輕躁子告反揌破上子孔反攢𢷊上子亂反下音遂上又子官反正作鑽也但餝音識𢭀火上序緣反有創音瘡有𧢻音觸鹽香上羊廉反幾渧音的被音無如實論一卷自顯呼典反水滴丁歷反正作滴水適同上深回諍論等十六論十六卷同帙回諍論一卷翻譯記都鄴音業王種之勇反序文作王重非也驃騎上毗妙反下巨寄反仲密眉筆反序文作蜜非論文抂撗上於往反下戶孟反能灡郎歎反憂憒古內反亂也亦作慖者音星正作惺憽了慧也亦醉悟也亦作醒也又息井息定二反誤也亦作悄別論作惺字是也郭氏音作𥨕二形息定反𥨕字郭氏未詳衣蕃音煩屏也又方煩反冝作幡翻二同音芳煩反幡𢡠㒵也繒繽翻風吹旗㒵也枉撗上於往反下戶孟反前作枉撗非躰也大乘法界無差別論一卷所蝕市力反羅睺音羅𠋫者攝也睺者𢙉隱攝日月今諸天生𢙉也提婆菩薩破楞伽經中外道小乘四宗論一卷僧佉去迦反如爪爭巧反提婆菩薩釋楞伽經中外道小乘涅槃論一卷伊尸遮反倮形上戶瓦反淨也摩陀音陀安荼宅加反兩脾步米反正作髀提𠊷直利反蛇蝎許謁反蚑䗈文盲二音正作蚊虻蠅子老反正作螽是𤌢奴管反生同上婆只音紙婆枳同上又紙氏反𣮃多上巨六反尊者名擾波𣮃多也正作毱鶴勒上何各反正作鸖緣生論一卷彥琮在宗反破邏力人反具膱女二反酢與上倉故反五味之數也又音昨非舌唌序延反正作涎又音擅非用也甜酢上徒兼反辛澀所云反頞浮上安割反箄尸上音閇𫝊𫝊音轉知戀反相傳也百字論一卷聰以苪反淴所立反先舊巨右反刀鞘音笈紡織上音兔角上音吐十二因緣論一卷迭㸦上徒結反如㸦音巨生唌序延反口液又音壇歎非也一輸盧迦論一卷輸盧迦上手朱反或云首盧迦或云室路迦此當三十二字為一輸盧迦也聰睿以苪反大乘百法明門論本事分中略録名數一卷掉舉上大了反補特伽羅伽其迦反此云人亦云有情觀惣相論頌一卷連屬之玉反不斷也所詅此緣反正作詮又力丁反誤唯𡱈其玉反止觀門論頌一卷艷嬌上以贍反𮌨脹上匹泣反下知亮反策勵上楚責反掉𢙣上徒吊反如蛭之日丁吉丁結三反水蟲也鉤𣃆竹角反是𤏙奴短反連跨苦瓦苦化二反𦝫也抓狢何各反似抓而小鳥喙竹角反正作殘䈥音斤受𦘺膚上烏礙反下府無反鉾箭上莫浮反蟲唼子合反嬌態他代反洟唾上他帝反喧雜上許元反手杖論一卷㒹蹶居月反企耶上丘弭反等費妃沸反嗢波柁上烏沒反下陀可反佛心上芳味芳勿二反鉢𦍞丁兮反道渠巨魚反道渠謂說伊也取因假設論一卷嗢揭上烏沒反下其列反互無上乎悟反㮏癭上奴達反下一井反反出上音翻轉也眼睛音精巳音尺嬰孩上於盈反俗窣都上蘇骨反六門教授習定論一卷串習上古患反缺犯上苦决反若掉徒了反動也修寂盡歷反録稟丘錦反解捲論一卷解捲音拳又作摧也蕳擇上古眼反於藤音騰分柝音錫菟角上他故反掌中論一卷毫力之反分折先擊反菟角上他故反已上大乘論音義已竟小乘經二百四十部六百一十八卷四十八帙小乘經音義第四之一履長阿含經一部二十二卷第一帙十一卷第一卷種自木反維濊相𨦣反年也正作歲嵗二形又烏外烏衛呼外三反非也拘剬力至反正作利後偈文作拘利七佛父母姓字經作拘鄰利真反騫荼上丘𠃵反下宅加反無惚奴老反又音忽非也憂傶倉歷反一煴烏昆反矮也正作溫也又於云反天地氣也非味𧢻音觸王上許建反進也周禮曰致初於人尊前曰也正作獻也羈靽上居冝反下布縵反腸上市軟反下直羊反𦟛直上丑容反𣒀紺上序全反下古暗反下亦作𥿀𥿀青赤色也齊亨徒丁反誤方愸之領反愸上同俱眴音舜動瞼右遊序全反正作旋䗍如上郎禾反互相上乎悟反𦟛䏶步米反摩捫音門俱眴與眴同尸閏反乳餔音步面爭瘦反褶也皮緩也正作四形也身屢力主反曲脊也正作僂柱杖上知主反喘息上尺軟反宮館古亂反不倉歷反苦忽奴老反正作𢙉㯢檡上思兖反正作選也憒𡗚上古內反下女孝反心亂也危脆此嵗反永滅上于丙反滅同上正作永也此偈中有九個永字四個作音永彼音岸蹬山上都能反上也除置莫瓶反又支義反非憂音𢙉足上力底反拜也正作禮禮二形屈電音申隧墮上直遂反正作墜罣㝵上戶卦反下五代反死枙音厄如鵠戶沃反莊士上阻故反正作壯塵𮋅於計反第二卷𥘡巨友反國名也又作祇中阿含作跋耆也又丁兮反誤𥘡同上又音脂誤閨門上古携反戲笑私妙反讓上一入反耗天告反猗覺上衣綺反又於奇反巴陵上布麻反防禦魚與反乘桴音浮小木伐也屈電音申揵推上巨焉反下直追反舍菟奴侯反明哲知列反𩣺疾上布門反麾蓋上許為反嘆吒竹嫁反汝𮤝去月反并𩞚上必政反下其既反正作三形也人名也立五分律作祇四分律作耆般泥洹經作並同是一人名也經音義云相承音飽又以𩞹字替之一熖反飽饜並非珠鎧苦改反錠繚上徒丁反下力堯反大燭也正作燎曚矇音蒙二同勇悍音翰第三卷愕然上五各反殞絶上云愍反躃踊上步益反婉轉上於遠反㘁咷上戶高反下徒刀反祗巨支反前作𥘡非琦上巨冝反現閈音閇又音翰非姧邪上古顏反卒見上倉沒反轟呼萌反覺而上古孝反不睡也草蘆音閻舍也正作廬礔礰上普擊反下呂擊反仿佯上音房下音羊徙倚也謂間睱遊行㒵也聲聒古活反礔嚦音歷正作霹靂渾濁上戶昆反四牒音𤗊問訊音信空缺苦血反欄楯上郎干反下食尹反刻鏤上苦黑反下郎豆反沾潭上徒兼反下徒濫反安靜也正作恬淡也下又音覃深水也又以審反並非銀蹬都鄧反階級也正作隥繞遼上而沼反下力小反正作繚也又音聊非悉備音備不於小反少歿也正作寶磚之緣反亦作甎以砌七細反銀櫨音盧析也綩綖上於遠反下以然反眩曜上戶反馚馥上芳文反下扶福反校飾音識𣰽𣯫上具俱反下數俱反織毛褥也下又力俱反非用也毾㲪上音塔下音登踏蹈上徒盍反第四卷歔欷上許魚反下許既反下經文作唏非椚淚上莫本反拭也措骨上倉故反安也枝樤音調小枝也間睱音可翅舍上音施外道名金被上冝作衾菳二同去吟反下音婆又或作枝外道名也諸經皆云欽婆羅即此經第十七卷作欽婆羅是也歔欷上許魚反下許既反倉頡篇云泣餘聲也亦噓啼淪曀上力巡反下於計反闡弩奴古反車匿也虜上音魯下音戶奄隧直遂反誤騷擾上乘刀反下而沼反渡熙許其反置床助㽵反正作床葬具上子浪反疇上直由反下普吉反正作匹瑕隟丘逆反相低丁禮反捍䝴佛上子西反仚望上去智反第五卷嶷上魚力反炎𩭈上羊瞻反下莫顏反正作焱也上芳武反拍也正作拊撫二形下於陵反胸也何𦍬古胡反良幹古案反公也正作幹也炎𩭈莫姧反徵占上陟陵反下直照反呼也正作召或召即召直照反炎䰅莫姧反誤相卬上息亮反下因進反𣎸邁上許有反腐也枯也正作杅㱙二形下莫敗反上又郭氏作歷了二音杇邁同上知奮巨右反綜理上子宋反外俠戶夾反正作狹可養羊兩反別經作餮南嶽音背非無上力條反正作聊𨱰上芳𠕀反下芳物反依俙也正作倣佛火𧂐子賜反誰𨳰必計反正作閉䰅𩬇上音須下音發正作䰅髭也𮍜率陀上得侯反下徒何反舍奴侯反正作莬亦作㝹舍㝹同上頗漯上烏割反下失入反正作頞濕也中阿含經作阿攝貝是也二並誤也婆嗟七何反正作蹉秦言上疾辛反阤揵上音陀中音𠃵下正作椎直追反然上牛力反正作嶷提湖音胡正作醍醐沾然上音甜正作恬第六卷悉吒上辛七反下知加反𠉱佯上房下羊悉咤竹加反瑕郤上戶加反下丘逆反輕子告反正作躁堅䩕五更反正作鞕迭相上田結反也更也糠糩上苦郎反下苦會反棑儐上步皆反下必進反𠚫已上牛例反㯹試上必遙反疅畔上九羊反䉼理上力迢反慰勞郎告反𨢘換上呼兮反下所愸反正作搜𭜨訴音素弓𠂕音屎攻劫上居冬反椋𡙸上力向反下大活反荊蕀居力反𧈸虻上文下盲蠅𧒢下音瑟冝作蚤音早蜂䖧上音峯下音哲珠璣音機溝坈上古侯反下苦庚反溪𡼏上苦兮反下古反戈鉾音牟𥨍沒上芳福反傾也正作覆也又音伏非也𩚾叨上音䥫下音叨丘墟音袪鄰比音毗並也又步必反次也倏伽上尸六反下丘迦反正作佉也或云蠰佉或云傷佉此云螺亦貝也雄桀其列反英特立也俊也正作傑百孤古胡反按孤狐也抓引也諸經中多作觚也孤古花反引羊刃反第七卷𦿔宿上傳世反智上以苪反隊徒對反智上羊稅反為莫結反竹蔓也經音義作𦽦音三刮古頢反淨灰火回反鬒𩬊上相朱反正作䰅又音誤溝𫮺上古侯反下呵各反有泄私列反又音曳囚中上巨九反正作臼也揭以上刀老反杵也正作㨶也又其列去列居謁三反非也杵揭上昌與反下都老反誤碎扸先擊反堅䩕五更反牢實貴來上即西反䐗豚上竹魚反下徒昆反下又音卓自刎文粉反其音福正作腹拤丸上盧貢反捔伎上古嶽反撾打上竹花反下音頂磽確上苦交五孝二反下口角胡角二反石地也又塉土也亦作墝甬也忽所戢反𦿔𢙣上步祭反正作弊第八卷嬉怡上許之反下以之反和恱也而笑音笑裸形上戶瓦反彰𦿔上之亮反下必際反正作障蔽食上幸江反正作𤭇說文作瓨𤭊二形又第十六卷云不受夜食杅食上云俱反兩𥁄同上食莠音酉食𢇲美垂反𥠆稻上古斬反飼馬禾也子也苗似稻子如𥞫粒也水生曰陸曰𥠆也出萇筠和尚韻也又第十六卷作鹹稻中阿含經作稗子並是也步介反鹹古斬反出說文下音道粳穀也上又應和尚以穢字替之非也又郭氏音咸亦非也莎衣上素禾反襜身上尺廉反尺焰反蔽膝衣也毛編步典反正作辮床廗序昔反果蓏郎呆反毀訾音紫黜汝上律反揣食上徒官反禁忌巨記反正作忌病瘦所右反四枙音厄棹戲上大了反下許義反狐疑上戶吳反可上伊進反第九卷瘖啞上於今反下烏雅反勉力上音免強也勗也第十卷妷羊一反相欑子官反為鐙音登毗阤音陀宎上音奔下徒骨反而𠸍音笑欣喜也又音美非恭恪苦各反敬也亦作㤩𧢻嬈上尺玉反下奴了反釋笑音笑𭜨讎市由反貪嫉自疾二音調戲上徒吊反第十一卷㝹夷上奴侯反下羊脂反所在名也置寧上莫丁反又支義反非㝹夷上奴侯反下以脂反車上力計反正作此云薄皮亦云同皮吝不上力進反無垢音狗無於㷔反飫也正作饜也卑陋上音卑下音漏備具上皮祕反皆也成也正作備庍上古稱反下郎蓋郎達二反正作疥癩也上又補卦反並誤也𡨋寧上莫瓶反前作𡨋誤糞扶久反伏舐時紙反糠糟上口郎反下苦外反穅也正作𥢶又普遭非也糠糩苦外苦邁二反作糟誤右序緣反索上于鬼反中桑各反下古詣反普誤枻於上以世反𨗨索上云鬼反下古詣反𧩨口上乎悟反正作護𪱦𢣷上音惶下音懼車上力計反車上同並誤但有上徒早反上力計反𢱍音晚奮迅上音糞下音峻檡宍上音宅下音向奮迅上方問反數上阻挌反下色禹反跪地上步包反正作跑穴鼠上玄决反下尸與反䆤冢上尺專反下知勇反戲𠸍音𥬒皆漯失入反浴上子老反逸羊一反耗火告反𢁙此上許衣反𨈢緬上都南反下兖反不音肯字樣作肯時晚音晚伴黨得朗反正作黨排濟上步皆反推也下子計反排也蕩也正作擠又音賫不私列反狎也𢢔也正作𡝥也又或作嬖音閇愛也卑也賤而得寵曰嬖卑𡝥也冝作𡝥親音族親巨右反伎藝上巨綺反下魚祭反如音避抑制上於方反妻婦上七西反背上云㱕反威嚴音嚴撰檡上音選下音擇極宎上丁禮反下徒骨反如蜂音峯儲積上直余反𥞩田上古莖反置枚音𠬧薄第二帙十一卷第十二卷緬祗上兖反迭相上田結反朽塌音塔門閫苦本反抓押上爭巧下音甲腸𦝩上直羊反下云貴反汗肪上音翰下音方手捫音門又蛇音野多咃音他毗牧音目羅嚀音寧枑陀上音脂亦作祗又丁兮反質𮍜都侯反諦婆上音帝經音義作諯專釗三音非犂上卑兮反下力兮反陛上呼兮反下步米反提豫音預阿𨗻郎個反正作邏伽豫上巨迦反下乎西正作兮也誤多邏郎個反𦤈幾上巨既反下居衣反經音義作具幾𦽦陀上莫官反捎提上消稍二音羅翅音施櫨上音徒下音盧摩上戶遮反栗吒上力一反兮婆上戶西反鳴㨬上音烏下音園下或作裝音㽵𣏾㝹上羊力反正作𣏾也下奴侯反上又或作找牫藏牆二音六𨳰音閇卑豫音兮子上音奚正作兮羅豫同上伊昵女一反豫余上音奚下音餘枇那上毗利反余枇同上秓廋雨愁桑走二反哆邏上都個反𠃵沓大合反羅豫音兮自前十五箇兮字十三箇作豫一箇作兮一箇作子礕礰上普擊反下魯擊反正作霹靂也第十三卷獨上古還反六十無妻五十無夫曰寡正作鱞卑陋音漏戲桛音弄於樔助交反鳥窠也配迮上普對反下普吉反誤䰅𩬊須發二音古猛反𭜨𡧱乎蓋反字㨾作𡧱見別本作周雞犮上雞下犬斗稱尺孕反手捲巨貟反𭷣枻上丘堅反下以世反責上丁禮反下阻麥反負財也正作債𧩄𠕀上武夫反枉也羽翮上于遇反下行革反大𤴷仕㽵反又書類火骨二反誤菀綖羊然反疏頭上所魚反或作梳鐶鈕女久反潔上子老反革蓰所綺反嬉戲上喜之反棊𢩁上巨之反下巨玉反瘖啞上於今反下烏雅反針九救二音鼠嚙上書與反下五結反彗星上祥嵗反又音遂執鞭卑連反失轍緾列反塗創音瘡夜偃於幰反掉戲上大了反潤漬在賜反堅𨳰音閇戶嚮響向二音窗也無𨵗去月反鞘中上私妙反從簏力木反赤綖音線顯敞昌兩反俠心上乎夾反正作狹村渃羅各反𮍜瀨上當侯反下來太反掘塹上其勿反下七熖反菀𮞠以然反持𮣃居迸反矟有歧者也狐疑上戶吾反即蹴七六反幢麾許為反酌上之林反蹶倒上居月反適上尸石反才始也第十四卷稟幸上兵錦反下胡耿反下又音㒓誤妷以一反手捲巨貟反要上去願反正作券債上丁禮反下阻麥反聞上古瓦反𣰽𭯫上其俱反下山俱反𣰅㲪上他盍反下多能反碁𡱈上巨之反下巨玉反諂諛上丑染反下羊朱反瘖痾烏雅反又音阿誤針𬉹上之林反下九救反二音正作𬉹也疾上才反乳餔音步第十五卷綜練上子宋反桎梏上之日反下古沃反牸犢字讀二音援助上于願反火𧂐子賜反第十六卷猥屏冝作隈庰上烏對反下蒲政反惚僻處也又上烏罪反下音餅𮍜率上多侯反給㜾古胡反正作孤辟於陵反誤彼鸞於陵反正作鷹論云視岸鷹也阿室己下一音似亦云阿說木此云馬勝倮形上戶瓦反捨置知利反誤喜猗於綺反七覺之一也鄣弊必祭反掩也正作障敝也夜食第八云不受瓨食朽食上兩俱反正作第八云不受杅食兩辟音壁第八卷作兩壁兩朽上力掌反下云俱反第八卷作兩盂也見狗古口反食莠音酉鹹稻上古斬反詞馬禾也正作𥠆亦作鹻說文作醎鹹醶通上五形𥠆稗子也水田中生者名稗陸地生者名𥠆但是一物有此二名也如中阿含經直作稗子是也經音義作𥠆醎二形應和尚以穢字替之非也自渃音落莎衣上素禾反襜身上尺占反蔽膝衣也毛編步典反正作辮也又卑連卑典二反非牀廗上助㽵反下祥昔反𮏂蕀上居英反下居力反果郎果反正作蓏勇悍音翰已辨音辨伈人上相遷反平圻音岸亦作𭎋也又祈銀二音非平同上槗梁上巨反第十七卷婆上烏含反果名前後皆作菴婆羅園也或作掩音奄非旃那上之延反梨沸非味反又或作佛芳勿反維摩經云毗羅𦙁子沸者子也牝象上毗忍反雌也又毗履反鉾劒上音牟兵器也長六尺六寸牟正作豫𢦵𨥤三形也鉾甲名也非弓𠂕尸旨反正作笑織䰅莫顏反劫𢱊亮略二音臠割上力兖反問爪古花反輿舁音余第十八卷香遍音遍耶低上序嗟反下丁兮反又別本作俹鳥嫁反車淭巨魚反蘭楯音順銀桄音光車𤦲巨魚反蘭楯音順繞繆上而沼反下力鳥反下正作繚緾也下又美休反綢繆緾綿也冝取繚字為正也鳬上音扶野鴨也正作𭄩也又音力非中汲居主反正作級夾道上古洽反梵加夷中作迦音加初禪惣名梵加夷天梵伽下音加正作迦又巨迦反非從廣上子容反于𨔵音代又田全反非也縱廣上音蹤上下也南狹戶夾反伽灆上巨迦反下郎甘反睒婆上尸染反佉阤上去迦反下徒何反北音岸佉酬音酬甘柘之夜反木瓜古花反滿杶上步乎反下徒刀反六身五加反無疧丁禮反又音祇非也馬𦜩奴老反繁茂上父幡反下莫侯反芬馥上芳文反下音伏正作馥梯𭠷上他號反下鞞米反珠挄音光博𢲻子活反纖傭丑容反銀蹬登鄧反正作澄出圻音岸又祈斷二音洋㥧上音羊下音順芳梵浮也又音馮俠上嫌頰反下音岸右𢭀序緣反孔翠七遂反地山烏洽反下也𨺻也正作凹容二形坑坎上苦庚反下苦感反荊蕀上居迎反下居力反株𣐎上竹朱反下五骨反蚊虻文盲二音蜂上芳逄反下許謁反正作蜂蠍下又音疼誤𤝧𧆞二音槃縈於營反右梪序緣反正作旋也誤地烏洽反誤糩糩上音康下苦外苦夬二反釜鍑上音父下富福二音似釜而口大飯熟市六反皮口角反華𩭈莫顏反繁芪莫侯反誤寶𡐊古歷反復弊覆蔽二字也誤右𣒀序全反地烏夾反弦皼上音賢下音古周子合反陵阜音婦虴文音二音蠅子老反正作螽蛇上許鬼反前作𬟸蛇蜂峯歇二音正作蜂蝎右音旋地烏夾反陷也正作凹容二形也釜𮢩方救方伏二反於上陟利反正作置構牛上古豆反師上莫顏反𮕱耗必告反蜜遲上眉肇反下直利反四忂其俱反令所卓反正作嗽猗語上丘倚反正作倚不吝力進反牀㯓上助㽵反下他盍反遍枉上匹綿反下於往反絞餝上冝作鉸珓二音古孝反裝也下施食反或云友飾或云扳飾也上又古巧古了二反縛也六牙五加反齒也正作牙㸦二形纖丑容反直也誤悉備皮媚反珠𨱞音毛也長毛也從髟筫色上之日反謂形容㒵也身煴烏昆反正作溫栴檀上之然反不衣小反琦音奇垖上都回反下扶久反蠅子老反地烏狹反舀也正作凹容二形亭水經音義作渟同音泥淖女㒵反沾洽上竹廉反下乎夾反匱乏上其位反芬馥扶福憑逼二反香也誤第十九卷𥥆一了反莫瓶反𥑐上都回反下烏甲反正作磓壓也下又音甲非釿斧上音斤下音府𤝦狼上助皆反鐵瓜上天結反下爭巧反迭相上田結反相爴古獲烏號二反打也摣瓜持也皮剝補角反或作㓟剝掬撮上居六反下倉活反從𠰸烏賢反鐵𭉨即委反號咷上戶高反下徒刀反捉擈蒲角反正作擈上蒲紅反下蒲沒反風煙起㒵也火盛也正作䫻㶿也劈口上補麥反正作擘來囓五結反足蹬都能反上也正作登也喙頭上竹角反鳥𪅎也正作啄又許穢反誤奔馳音池走也䶥掣上側家反下尺世反䶩囓上竹皆反嚙挩曰也又音劑非杝枻上託何反下以世反凍陟玉反繩絣布耕反振繩墨也堆𥑐上都回反下烏甲反麋碎上美為反下蘇𭔹反蹴踏上七六反下徒盍反踐也正作踏踏囓也𨫼上上五告反前五高反䥫陶徒刀反輾熱上女展反車轢物也燎身上力鳥反𨃠上七羊反下蒲北反䪺伏㒵正作蹌踣也經音義作蹌踣是也飛揚以良以亮二反𢪱隨風飛㒵也有蕇多安反經云受六十四斛也此應西天有此器名也正作簞也經音義以篅字替之乃此方倉號耳四戶木反正作斛也矇音蒙皮緩乎管反肌𣎅上居夷反下側瘦反褶也皮不伸也縮也正作三形也下又郭氏作乙在反非也膢脊上力主反正作僂又樓氀二音非柱杖上知主反或作拄憚恌上之扇反下徒了反四支動也正作戰桃或作顫掉也上又音佪下又遙桃二音並非酸疼徒冬反直上他頂反直也長也正作二形也誤也熢𤏮上蒲紅反下蒲沒反食上補各反兔梟上他故反下古堯反痾𢦶上烏雅反下古拜反不言也謂外道持不語或也上音阿非也捫摸門莫二音其䏶步米反其膊市軟反曲轅于元反如箕居之反如鼎音頂丘阜音婦如舊巨久反如絙古恆反大索也互相上乎故反第二十卷咤竹家反繞繆美休反廣如前釋也歰所立反石墮徒果反堆也正作架紅𦆝匹沼反正作縹𭩦上曾貢反下無府反又經音義作挊舞音卞𨢘嵬上火兮反下五回反不眴音舜又詢瞤二音揣食上徒官反䰿上魚袁反下徒何反第二十一卷㳙澮上古玄反下古外反㳙小水也尓匹谷注瀆曰澮也淵池上烏玄反蛇池上市遮反經音義作𥝀至膝音悉𬧅踝上市軟反陶家上徒刀反然竈子告反頺落上大回反灰燼似進反漸涱知亮反鼓蕩大朗反濤波上大刀反冗泉上玄决反丁又經音義作湶坑澗上口庚反下古鴈反洗濯宅角反滌蕩上徒的反下正作蕩也呼唅呼合反大啜也正作欲也下又火含乎紺二反非也或作哈亦非梵迦音加銅杵昌與反𥧼而上七結反仿佯房羊二音毀呰音紫觸𥥛徒骨反可俎才與反壞也又音怚尾朾得冷反又音頂戈鉾音牟弓矢上居雄反下尸旨反即勑丑力反誠也見別本作勑誤牟弰所卓反正作矟也又所交反弓未也誤也𧯞斤上竹角反正作鉞斧上于月反輪上序緣反𦊰索上古犬反𢭀輪同上第二十二卷稊稗上大兮反下蒲拜反茤摩上測俱反細軟衣也蝎上音峯下許謁反下又何割反非也阜垖上音婦下都回反應言垖阜也誤𫇲芊上戶𥝷反下古旱反𭧶汁上諸與反正作煮𢱊奪上亮略二音下徒活反手探上居六反正作掬曰二形澀所戢反梓柏上音子木名也異係音計連也疾上手反正作疾同上如蕇多安反又音典誤大孤古乎反白鵠胡反上尸有反下居雄反蝘蜓也正作守宮也悴才遂反推胸上直追反下許容反為耦胡果反正作𢰸為禑同上妷羊一反泆同上𭣣穫和郭反𠚫也併穫上必政反下同上又作獲誤柎胸芳武反拍也正作拊又音夫誤自悼徒到反傷也悴才遂反手朾得冷丁領二反擊也正作打也又中莖反誤也又見別隨函作摛蘇了息六所六四反擊也打也窂弓上勞下躬十在木反伽𤦫上其迦反下力乘反王名伽𤦫伽也四分律云迦陵迦㿈創上於容反下音瘡夙中阿含經一部六十卷六帙第一𤙈第一卷偈咃音阤亦云伽他亦云伽陀此言應頌鳥啄許穢反口也𭪿也言樹花如鳥𭪿也正作啄樓橧音曾正作橧㭾鑿上其月反下才作反弓矢上居雄反下尸旨反矛㦸上莫侯反勇魚既反堊灑上阿各反白七也木上才焦反儲畜上丈魚反下許六反秥豆上女廉反蔗糖上之夜反下大郎反鹽脯上以廉反下方武反內靖情井反勇𣪴冝既反華䰅莫姧反勑上古反縛也劫固也其𬧅市軟反其髀步米反銅鍱羊接反銅鐷同上䥫鉆叵反釧也燒斷魚斤反牀㩉床塔二音牀㩉同上同上樶舉上子活反挽也垔灑上與堊同烏各反又音因塞也非也溫𣊵乃短反堊灑上烏各反第二卷燒麩芳夫反推打上丈追反下得冷反迸火上布諍反吒上女利反或大𡰱吒或云膩吒氍氀上其俱反下生茤反織毛褥也正作毹又力朱反非用𣰅㲪上他盍反下能反榣尤牟江反河名也正作尨二形也或云閻母那或云夜摩那皆是此一河名也又于求反傳寫誤也摩仚許延反河名也或云莫四或云莫𨢘或六摩𨢘可猗音倚枯熇古老反火乾也枯也正作槗薨三形也又呼各呼木二反熱㒵也非用至䐀巨冝反異也木別生也腳兩間也正作奇㩽二形也又音寄非也陶師上徒刀反燒瓦也廮電上七亂反下子告反正作㸑竈一憸音焰火晃昱上黃廣反下以六反不諳音菴反識也栽燼上子才反天火也正作烖也誤下辝進反燭餘也兜率哆多可多個二反亦云都史多天白晢先擊反白色衣也冝作鬄音昔髮也謂白髮也隆鼻上力中反鸚武𭉨上烏耕反中文府反下即委反言白髮鼻高如鸚武𭉨也婆雞吉兮反鞮舍上都兮反舍利弗名優波鞮舍優波此云逐鞮舍星名也此云鬼宿智度論云優波提舍樓瘦所救反屏廁上蒲政反正作偋庰二形又餅瓶并三音並非用蠅螽子老反正作螽第三卷雖𥧼千結反奪取上徒活羈瘦上居冝反下所右反仿佯上音房下音羊徙倚遊行也戲笑音笑大𠌵似兩反正作象尾𦞳苦駕反𦝫骨也正作骼亦作𦝣也項額上乎講反下五格反華𩭈莫顏反古猛反蜫蟲上古塊反暐曄上為鬼反下云輒反按擵莫臥反正作摩第四卷麗𭪩上力計反下葛世反或云梨昌或云離車或栗㚲此云薄皮亦云同皮以槐苦回反正作盛菜茹而庶反又汝如二音子上蒲拜反稻屬苗似稻苗子如黍粒可食也正作稗也又卑睥二音誤穄米上子例反𪎭別名雜右猛反殼也正作穬麥名也大麥屬編髮上蒲犬反正作辮手抒音序改而揚之也又直與神與二反羇瘦上居冝反下所反開創音瘡痍也刀傷痕也正作𠚫撿撓上居掩反下奴孝反木曲也畜卒上許六反養也下子沒反健也打鼓上得冷反下公五反而𣐩古堯反斬首也正作梟二形所音六煞也枉煞上於往反牧捕上書由反下蒲故反棒打上步講反木攬戶黯反斬銼倉臥反制割上之兖反細𭃄肉也正作剸剬二形也又音制非也又徒端反截也正作剸也如食字作端字是也誤南音岸𥞩駕上古萌反正作耕第五卷拘絺丑脂反椯食上徒官反無䆤音川煒燁上云鬼反下云輒反老莫報反齒落上尺里反腳戾力計反曲也緩上戶管反下側瘦反群㝹那頭反比丘名破群論中作頗勒霎那亦云破求那此言翼宿群同上戶𮐯音藥正作鑰也遍至上補見反粳陀上諸然反洗上子老反青瘀於去反膖脹上匹江反下知亮反謗上武夫反謗同上枉也正作置岸上知利反正作置槀草上古老禾稃也正作槀藳二形或薨在二同火高反蒿薨渾濁上戶昆反可跽其几反膝加地也手膝音悉正作膝第六卷瞿尼蒒上其俱反下所持反躁擾上子告反下人沼反訶數師矩反責也誥嘖上輕吉反下阻百反上又音告誤調𠸍上條吊反下私妙反敖上居反下五告反𢢔也前作慠是也又五高反非瞿𡰱萌音師與藥字同也誤欺𧥶居况反正作誑王租則胡反祭餟陟稅反酹酒也蘭哆多個反鬪瑟哆上都豆反下多左反亦作覩史哆也姓上在木反慧上才反問訊音信揵塌上其焉反下他盍反下又或作踏徒盍反或云揵闥或云揵呇䩛勒上兵媚反馬也正作䩛二形又毗必反車革也堪耐奴代反白縶徒協反正作㲲虻文盲二音蠅蚤音早訜訟上側迸反鬪也引也正作諍爭二形負輦上扶富反下力遣反負擔也荷也正作負也輦人步挽𦍬也或作揵擔運物也慧上潛反疾也利也第七卷拘絺丑反𨳰塞上博計反博列二反掩也塞也正作𨳰諸畜丑救反六畜也扴齒上爭巧反下昌里反上古八反誤腸𦝩𡐢上丈羊反中云貴反下方問反嘖嘍上阻伯反下生主生遇二反呵罵也正作數或作𡂡柔似茲反正作辭捲杈上巨貟反下丑街反姑嫜音章謂𮌗𮌗根中二同奴老反頭中髓也誤膿血上奴冬反下呼穴反肪髓上方房二音肪也涎膽上序延反下都敢反嘖𡂡音數前作嘍字非也坐臥音臥鑽木上子官反珠燧音遂火母也風上音福正作腹掣縮上昌列反下所六反風上子六反崩山上布朋反正作崩哆邏葉上多可反中羅個反下以接反揵慧上𠃵反目揵音𠃵姓也憂戚倉歷反正作感老䎜莫報反正作耄痛上五各反口中齗也正作齶也經音義作勝開元樓藏作風喘昌兖反咳𠲿上苦愛反下速奏反肺氣病也正作咳嗽也二並非用也喝吐上烏芥反通食氣也正作䬵咳二形喉啤博計反塞也正作閇箄二形癲癇上丁年反下行間反㿈癭上於容反下於郢反瞻㽵上都敢反下阻亮反正作瞻壯經云膽壯熱枯槗苦老反痔上持里反下女力反珨肆上丁念反舍也置也所以置貨物之所也正作店也下音四陳也放也有職女利反床痤上助㽵反下才臥反正作床座也又上所類火骨二反下在禾反並誤也第八卷駱波上章廉反正作贍也四句頌攝十經一未曾有經二侍者三薄拘羅四阿修羅五地動六贍波七八郁加二經九十手長者二經頌云地動及波取擆直慮反正作筯箸一形又知略反擊也非用也挊上音挊下音武上又音汴擊手也回序緣反抃上平變反拊手也梀上當口反下蘇走反舉衣振塵也搖也下正作擻駷二形下又所責反擇取物也掃菷之酉反滂沛上普旁反下普蓋反耕者上古莖反送葬子浪反潢潦上戶光反下來到反邠褥上彼巾反下內沃反雄𠌵祥兩反正作象作之審反誤意係音計連也作枕之審反抆淚上文粉反枕頃上之審反下苦反少時也仿佯音房羊謂間而東行西行也倩他上七性反縫衣上扶峯反針鋋囊上之林反中相箭反下乃郎反中又音祥誤琦音奇螺壁上洛禾反下正作鼊㭪覔反說文似龜而漫胡無指爪其甲有黑殊文如玳琩可飾物也或作壁必益反云虎魄上火古反下普白反玳琩上徒愛反下莫對反異物志云如龜生南海大者如蘧蒢背有鱗大如扇有文章將作器則煮其鱗如柔皮任意所作或作蝳𮔙或作𣫹𭻝琁珠上序緣反玉名正作璿瑢三形琁美石次玉也或作蜁螺也𤨴壁上洛禾反下必益反𧆞普百反正作琥珀龜鼉上居退反下徒何反黿屬也字體正作鼉黿二形從單音邵從黽帝麑音迷不堪啖多膏正作鼉也或云帝或云低魚也帝魔同上或作莫加反鼉似龜鱉鼊也誤也捶尢上以招反下莫江反或作無莫胡反法薀足論作鹽母毗奈耶作婆母婆沙論作夜摩並此何名也榣尢同上柂設上或支反安也設置也陳也正作施也誤也玳琩上代毒二音下妹曷二音如前以釋第九卷彗星上祥嵗反妭星也篲星同上瞻波上章廉反城名也第八卷頭作駱波下菕音藥又音論誤龜鼉上居追反下大何反帝麑迷麻二音並通呼也或云低或云縶氏煒曅上為鬼反下為輒反毀呲音紫正作訾呰二形灌上子老反下古亂反嚴愸之領反讜能上他郎反他浪二反幸也亦語初也正作儻也又都朗反直言也初也第十卷已辨蒲莧反成也正作辨辦二形此堓音岸莖幹古案反莽上莫古莫朗莫口三反下仕臻反興第二帙第十一卷踝𦟛丑容反𬧅腸上市軟反下丈羊反眼眴音舜䭷馬上莫高反氍上其俱反下山茤反𣰅㲪上他盍反下得能反䁶潔上古了反編髮上步犬反又卑連卑兖二反暐曄上云鬼反下云輒反晃若上黃廣反所係音計連也火㷿音熖毀呰音紫堪耐奴代反第十二卷畜牧上丑救丑六許六三反六也養也聚也下音目養也食也蜫蟲上古塊反古猛反婦上古瓦反店肆上丁念反下音四鏵鍬上戶花反下七消反鼠場始羊反新耕土也或作𤳈豌豆上烏官反蜱豆上卑兮反正作豍𦬔子上古敗反煒瞱上云鬼反下于輒反為立反飯飼音寺穬古猛反華音鏵鍬上戶爪反下七消反蜿豆上烏官反冤菀二音非蘿中上洛河反竹器名也豆羹古盲反來餉式亮反命𣧩之隆反𬼈見上之聖反嚶核上於盈反下戶哀反又音亥誤浴上子老反僂步上力主反臥㩉音塔烏鵄尺之反所喙音卓正作啄𤝦狼上助皆反臠力兖反著攬戶黯反火燒失招反經音義作𤋲而兖反䥫臼巨久反正作臼蛇𧎴知列反卑連反撾杖竹花反棒打上步講反下得冷反或梟古堯反其𭉨即委反攢破上子官反腸上市軟反破髀步米反破臗苦官反又音坤䥫鍱音掣彼上尺世尺列二反曳也挽也經音義作𢱯攬二同力敢反䥫喙許穢反口也生挑他刀他聊二反捾也喙破上音卓正作啄骨素果反𫽄檏步角反䥫鉗巨廉反燒齗魚斤反齒也第十三卷獺狩他達反上手右反下溢上以嬰反滿也正作盈饒𦸲五口反枯熇苦老反乾也枯也正作洘槗熇三形也又火沃火各二反非用豺狩上助皆反莽上助臻反下莫古莫朗莫口三反僻靜上普益反無人處也生經音義作猩同音生桾拾上居運反蟲蟥上除中反下胡光反釜竈上音父下子告反𧂒薪上才消反下音新千刻古哀反數名十冓曰也正作姟也又苦得反悮也氍氀上其俱反下生反綩綖上於遠反下以然反𮁺同上曰螺上子月反下洛禾反勒佛時王名也諸經云傷佉或云穰佉或云倏佉第十四卷昱爍上羊六反下羊略反光明也正作煜爚又音鑠非手撫芳武反拍也正作拊也畜牧音目又失周失呪二反誤長跽巨几反嬉戲上許之反下許義反壘力水反梯陛上他兮反下步米反銀橙丁亘反噭潔上吉了反明也珠玉白㒵也正作皎也又音𠮧誤也爐鍱上洛胡反柱也下素朗反柱下石也正作櫨磉𣰅㲪下音塔下音登𭣋體上楚覲反安之審反逯初上第代二音及也誤諭諂上羊朱反詭言也正作揄或作諛下丑染反僞也上又音喻非也第十五卷錦𦋺居例反咽鉗上於賢反下巨廉反儀式施食反法也用也度也珠抦兵命反正作柄飾屣所綺反稅租子胡反𢱫舉上古朗反下余預二音高敞昌兩反諳練上烏含反更也記憶也昱𤓈上羊六反下羊略反縛鞭卑連反罰錢自連反經音義作煆以錢替之也或臬古堯反首形也正作梟二形也又五結反門橛也誤不翅音施更多也正作啻稗子上步拜反蔗𥼽上之夜反下徒郎反正作糖二形邪羊林反又苦莖五莖胡經三反並非也第十六卷蜱肆上邊號反正作豍螕二形也長阿含作𦷥宿也音義云此譯云遣使蹴螺上千六反踏也牧捕上失由反下蒲故反絞煞上古巧反縛也柔而兖反又音暖誤梨鑱仕懺反剔肉上他歷反編髮上蒲犬反又卑連卑兖二反非也火攢子亂反治上阻床反下直之反裝束也亦作裝擈著上步角反商人上手羊反正作𧷮蘅華𩭈上戶庚反下莫顏反芒香也生天帝山也正作蘅也下正作兩𨌪子孔反車輪也正作又音忩轞車載也非水𮒝才焦反撨草同上又條反擇也非此呼賭上都古反下并領反並千結反熇𡐢上苦老反乾也正作槁熇二形下甫問反上又火火各二反非也親才木反正作族森所林反自𧦹苦花反行拖尸智反不剖普口反不丑挌反菜茹而預反天上聲一𭤟匹見反楫樹上而容反木名似檀正作揖也川音亦作揖也經音但是低小樹林也槗㷿上巨反下羊贍反或云伽梵鉢提此云牛呞第十七卷娑雞居號反三在木反加絺丑脂反加𢼜音舍國名剋彼上口得反憂感倉歷反𠧸薄上郎古反下蒲古反車駕次第為活無放反正作望憂倉歷反活淫音望又以林反非也導𢎢上徒到反下羊忍反出曜以照反地上其几反正作跽伎蟄魚例反正作藝又丈立反誤馳驟助右反擲衒上持石反下古犬反索也正作羅也又音縣自媒也非伎藝魚例反猛魚既反出上持頂反又定二音非也七𨱚徒亂反誤七段同上𥄲涉上帽墨二音內鞘音笑刀室也頸上上居郢反居成二反在前曰在後曰也皆竪音樹立也驚音悟睡覺也敷助㽵反悮渴侕午雨反正作仰或作卬也象上毗忍反正作也大踏徒盍反踐也又音呇齧也之渾戶昆反闍闍同上律阤音陀足橙都亘反杋也第十八卷提瘦所右反慰勞郎告反奇瘦上巨冝居冝一反下所右反或云耆瘦或云羇瘦也鼉山上徒何反字從單音那從黽音猛緘簏上戶屈反杯木篋也正作緘下力木反竹篋也上又古咸反非氍上其俱反下生俱反毛席也織毛褥也正作毹也下又玉篇作所愁反素𠋫二反羅戶屋反襯體上初覲反安之審反惒邏上戶戈戶臥二反下羅個反已辨蒲莧反池音岸蠅蚤子老反荖降上初冝反下古巷反第十九卷倩諸上青性反戶鑰音藥連綴竹衛反縫合上扶峯反獷古猛反店肆上丁念反𭫲積上而羊反禾也正作穰又音奈誤十橙登亘反不蹬音登上也土墽古歷反正作𡐊又磽二音非第二十卷用迸比耕反振繩墨也正作絣遜拼三形又布諍反誤上䶥五各反人上力垂反𢭀捉上序緣反朾煆上得冷反下得亂反成揣徒官反水漬才賜反𦝩揣𡐢上云貴反下方問反腦及上奴老反髓也腦根同前正作謂𮌗𮌗根肪髓上方房二音涎贍上序反下當敢反誤蒿𧂐上音嵩息弓反菜名也正作菘也下音精正作菁或作𧂐應和尚音義云豐蕘蕪菁也齊魯之間謂之蕘關之東西謂之蕪菁也即蔓菁也下又子賜反非𦬔子上古敗反髮髦上音發下音毛唌膽上席反下當敢反烏鵄尺脂反所啄音卓豺苟上助皆反下正作狗腐爛上扶武反下郎歎反膊骨上市軟反髀骨上步米反亦作䯗寬骨上苦官反脊骨上子昔反頸骨上居郢反臅膢獨樓二音泥淖女孝反毛𣮕巨六反輕闡昌演反大也經音義以團字替之非也以𤍜蘇老反與燥同蠅蚉音早狗也嘖𡂡音數也呵罵也談譁音花喧也作話字呼蝦蟆遐麻二音耆音瘦鼉山上徒何反溫第三帙第二十一卷優𮑣跛塔二音葉屋上羊接反下烏木反草舍也正作屋𭕵二形也麗掣上力計反下尺世反靖處上才井反燕坐上一見反竫處上情井反稽首上苦禮反貴在木反隨㥧音㥧飯上扶万亦作餅飰二形下自西反平也等也正作齊俗作斊盛陰於今反冝去聲呼椎胸上直追反下許容反奮聖上求右反融消上余戎反憂傶倉歷反第二十二卷奇瘦上巨冝居冝二反下所右反正作瘦鼉山上徒何反市肆上時止反下斯至反藻水上子老反澡水同上中𡐢方問反店肆上丁念反無𧨏音義詣奮巨右反比舍上蒲脂反諭諂上以朱反牟哆上莫𠋫反下多個反花名也或云阿提目多屋邊布玄反飽食上布卯反第草三卷蘭哆多個反又竹加反戾語上力計反𢙣也畜牧上丑救丑六許六三反六生財也養也聚也下莫六反養也惒邏上戶戈戶臥一反下羅個反仿佯上音房下音羊間而東行西行謂之典語則謂之徙倚也慠上居槗反下五告反土漬在賜反拯浣戶管反慠五告反受喜愛喜二音愛喜同上在歷魯擊反馬槽正作櫪第草四樓瘦所右反蒀𦽦上於云反葐盛㒵也正作蒀也下音万𮞠不斷也經音謂喻生死不斷也經音義以蘊字替之同於文反說文謂聚草束之以燃火也此釋非苻經意𫝊𫝊知戀反相傳也不依小反晃昱上戶廣反下以六反眠音悟覺也屈電音申用補耕反振繩墨也正作絣遜拼三形利斧音府斫治音持上𪙫五各反第二十卷作𪘽上序緣反正作旋打煆上得冷反下都亂反成揣徒官反髦枛上莫高反下爭巧反正作髦毛下正作爪髮齒也薄膚上方無反腦上方問反下奴老反淚汗上力遂反下何案反涕唾上音剃正音洟肪髓膽上音方下音也蒿藉上昔弓反下子盈反正作菘菁下或作音精所喙音卓鳥物也正作啄又許穢反誤也骸骨上遐皆反骨璅素果反骨上市軟反髀骨上步米反寬骨上苦官反髑膢音摟第二十五卷刻印上口勒反䗈文赤所𧎴知列反正作哲蛆二形懊憹上烏好反下奴老反下又音農非㩲𭠎上巨貟反下街反𬒳步毛反持矟所卓反刀𣛝音順攻城上古冬反破塢烏古反挌戰上古客反鬪也擊也朾皼上都冷反下公戶反捶打上丈追反下得冷反鉾㦸上莫侯反下居逆反臠力兖反攬中上咸黯反火𤋲而兖反銅釜音父䥫臼巨九反正作臼卑連反杖撾竹花反棒打上步講反下得冷反得二反或臬古堯反斬首也正作梟二形又五結反誤山㟵古郎反背樓力主反正作僂又力朱反猗曲脊也正作瘻也腳戾力計反曲也柱杖上張主反盛扗阻狀反所喙音卓羈上居冝反下所右反㩲扠上巨貟反下街反𬒳步毛反死苟古口反𮌨脹上匹江蒲江二反正作胮也下知亮反上𪘽五各反人上力垂反上𪘽五各反第草六卷恭恪口各反如𣏣音弄玩物也又音辨也讜至上他朗他浪二反幸也亦語初也也正作儻也又多朗反倮形上和瓦反以櫆苦回反菜茹如庶反又如汝二音稗子上蒲拜反穄米上子例反雜古猛反編髮上蒲犬反又卑連卑典二反次也手杼序竹紵三音㳿也經旨謂之畋而揚之也嫉姤丁故反嬈亂上而沼反下來嘆反牀㯓上助㽵反下他盍反蠅蚤音早狗也堪耐奴代反第草七卷牀㩉音塔狎習上咸甲反挽音脫引也牧淚上文粉反不剖普口反一㷿音熖火燥草素老反足以上句反添也熇木上苦老反𠃵也正作攪熇薨三形也又火木火沃火各三反熱㒵非用也第草八卷壅本上於容反浴上子老反羈上居冝反下所右反𢗡舉上失由反𣫍也正作收奮頭上方問反振首㒵也正作奮也又作收舉上尸由反頭同上此勾九遇反塗跣先典反足赤腳也坌體上蒲悶反塵著身也正作坌又扶吻扶問二反並非也探養上居六反正作掬又音貪誤也作塢烏古反華𩭈莫頰反瞻富蒲北反正作匐誤華𩭈莫顏反扶抱上父無反下蒲保反死所反第草九卷商人上手羊反又音的也瞻蔔蒲北反所沾竹廉反古猛反豆羹古莖反𤢌狩上巨今反下守右反堤帝上都兮都禮二反奚米上戶雞反奢拖上手遮反下以支徒可二反禽獸名也𠧸薄上洛古反下婆古反車駕次第曰也胸行上許容反請請上青井反下情性反云十五日解相請請時經自𭃄也慧上才反節戾力計反乘也曲也罪也經音義以類字替之力對反多莭日也第卅卷下以略反正作鑰棄上進反下詰利反粃糠上卑履反下苦郎反掃菷之酉反汙雜在合反不脆此苪反聾啞上洛紅反舉貸他得反正作貣玳琩上徒礙反下莫背反琁珠上序緣反庶幾上書去反下居依反縛繳下革反衣領中骨也又之若反音義云生絲縷也結繳於𠂕謂之矰也然此冝作憿吉了反緾也亦縛緾也蜫蟲上古魂反下除中反雇賃上古悟反尨色上莫江反白黑雜也氍氀上其俱反下生反正作毹又力朱反非𭯘㲪上他盍反下都能反襯體上初覲反安枕之審反自衣小反自絞古巧反縛也淖蜜上女孝反和也又安卓反燋悴上才焦反下才遂反憔悴同上儲提上直魚反更迭大結反鼉山上徒何反布林上普布反前後皆作怖林也又音布誤也覺礫六擊反抅荀大上九愚反中相偷反下徒個反佛名覺礫抅荀也取撨才消也𤍜撨上蘇老反下才焦反枓梀上都口反下蘇走反也舉衣振塵也動物也搖也下正作激駷二形也下又音速木名也非捕鼠上蒲故反鵂狐上許牛反下戶姑反儻能上他浪反幸也或也讜能同上又多朗反誤右𢭀序緣反顧視上公悟反有卒子沒反小悸求季反跱立上持里反築基上知六反下居之反清第四帙第卅一卷樓瘦所右反鍮蘆吒上他侯反中洛侯反下竹加反又去聲呼攝惒音和遍祖上匹綿反下徒旱反斷種上徒管反下之勇反以箕居之反摩牧文粉反水上子老反磐縈上步官反下於營反紺黛音代衒繈冝作羂上古犬反下巨亮反以繩安芊頭而取戰曰羂曰也又上音縣下居兩反非用也離餌人志反正作餌鞞醘上步迷反下火兮反獦師上力反作倡音昌樂也嚴𣪴魚既反邏騫上勒個反下去𠃵反策慮上楚責反逯得上代第二音及也又音録誤第卅二卷仿佯上音房下音羊問訊音信梚上去堅反下音晚長𨱞音毛毛裘音求枡擻上都口反下蘇走反洗髀步米反中戲許義反斫銼倉臥反制上之兖徒官二反𭃄肉也截也正作剬剸二刑又之世反斷也非也騏麟上巨之反下呂真反麋鹿上美悲反毀呰音紫堪耐奴代反奮頭上方問反懷妊而甚反至市時止反𩬞師上莫顏反長綖音線縫衣縷也亦作線第卅三卷鞞陀上步迷反山名也諸經中或作錍提經音義作普迷反非也協琉上戶頰反窈窕上一了反下徒了反煩冤於元反問訊音信羈絆上居冝反下波畔反諛諂上若朱反揵沓惒上巨焉反中徒合反下戶戈反鼻嗅香右反又叱救反非燕坐上一見反畜牧音目煒燁上為鬼反下為輒反蝦蟇上戶加反下莫加反茤磨上側俱反消耗火告反嬉𪥩上喜記反下其綺反挊鈴上音弄狎習上乎甲反仞過上而振反識也正作認必拜音辨別也謂玄記別未崩事也上方作必辦音諞婚娶上音昏下音趣給恤私律反庶幾上尸去反下居衣反翻揵上音幡下疾葉反正作第卅四卷嬉戲上喜之反下喜義反賈客上公五反榬船上音㽵正作裝備辨上皮祕反羖羊上公五反大瓠音護押筏上步皆反下扶發反並正作𥱼筏也蓊鬱上烏孔反下於勿反玳琩上音代下音昧喚嗷五高反棷樹上而容反木名似檀也正揖也上方經作揖相余反木名栮楫即棕𭣉也或作栮揶二同榬船上阻床反𢭀珠上序全反䭷馬上莫高反玳琩上徒愛反一𨱞音毛髮髦同上此正晃昱上戶廣反下以六反珓飾上古孝反下廠力反惒堤上音和下音低氍氀上其俱反下數俱反𣰅㲪上音塔下音登羅戶木反安抌之審反哆邏上多個反下郎個反曒潔上吉了反餘自木反正作族宗裔也禮疏云百世不遷曰姓因事分案曰氏同源相謂為族族者類也加抂於往反青桐息亮反正作相腐相上扶武反骨桑果反正作鎖將鎧口改反涕唾上吐計反餞木上昨干反餘也正作殘䏼二形火燼序進反觀掾直緣反第卅五卷瞿黜莫黑反正作默也又丑律反非也鬱上於勿反下所右反改易音亦變也奮上巨右反下步末反床㩉音塔譁說上呼瓜反雜合上自匝反慰勞郎告反椚摸上音門下音莫定𮒽音悟定同上我欲音欲㨔挮上音咸下他兮反一撜都鄧反階級正作隥因絃戶犬反絆也擊也皮帶也正作也又呼反索也低仰上丁兮反下牛兩反舉首也下又五郎反見禮記音義安靖情井反無聲之處穰積上而羊反諳彼上烏含反俠長上戶頰反糞沃上方問反下烏酷反溉灌上古代古氣二反下古亂反落治上郎各反科樹去莭也正作㓢也下直之反諭諂上羊朱反下染反庶幾上尸𥎀反下居衣反第卅六瞿默音墨前卷初作瞿黜彼誤也遍祖上匹綿反下徒旱反兩翅下音施水上子老反蘭哆多左反喧𡗚女㒵反䗈上音文下音盲蠅蚤音早煩猥烏罪反婆蹉七何反此云𬌏子梨㝹奴𬾃反至夾音狹窄溢也誤蜫蟲上古魂反音礦升上都口反下戶木反𡪍婦上二古瓦反玷肆上丁念反正作店痁肆同上華𩭈莫顏反倡妓上尸羊反下巨綺反逯初上音代及也又音録非也所掘巨月反穿也冝作行也越也涇奴上羊林反滂沛上普悟反下普貝反第卅七卷暗莫瓶反他宍音肉施設上失支反袘設同上又以支徒何徒可他可四反並非利挨自木反士挨同上𫽄𤍜音掃乾也攢欑上子亂反下子官反㺃自刀反正作也誤有㷿音熖惒邏𨒌上戶戈反下以然反羅延羊然反又音正非也㺃槽音曹柱杖上知主反正作拄持繖桑旱反亦作傘衣變上於既反著也下蘇叶反屐也正作屣二形也應和尚音義作以字替之是也已下數個並同也鞞邏上步迷反下郎個反作灰乎回反香陰於今反失辨皮件反稽首上苦禮反低也首至地也正作稽諸二形也也周禮九拜之儀一日稽首再拜頭至地也第卅八卷間上音須下呼姧反經自𭃄梵麾莫何反誤讜能上他朗反語詞也謂不定之詞也也正作儻也又得朗反真言也非煒曄上云鬼反下云輒云立二反指擲他的反挑也大𠸍音𥬒抓㰅上爭巧反下他的反正作㰅插創開上楚㽵反貌健上戶管反抆摸上音門下音莫弟卅五卷作捫是也上又文粉反非懊憹上烏老反下奴老反讜能上他朗他浪二反正作儻也第卅九卷𧩄謗上文夫反吹攬古巧反以輕軯乳中二同普𥝷反撅也正作抨也別經本作併並音枰貪餮天結反亦作餘不廉力閻反手撮子活反地𭩒扶非反正作飢也上方經作地䏎是也經音義作地𦡕應和尚以𦘺字替之是也又𦡕或作騰雹二同步角反地皮也鼻奈耶云地生𠧸土雹是也諸經作地肌也淖蜜上女孝反儀禮曰嘉薦普淖鄭注云和也槀上古猛反下古老反朝牛例反鹽味上羊廉反𦿔𢙣上步祭反正作弊褋華上徒叶反單也正作檏說文作棣三形也上方經作𣜿抉玉反𢗌也華𩭈莫顏反儲畜上直魚反摽搒上卑遙反下卜朗反大板也正作榜稻䅽上徒老反下古木反牽詣上去堅反㩲杈上巨貟反下街反為雍於容反也誤為㿈同上柂與上尸利反惠也正作拖達哆多可反麻羹古盲反霏那上方非反一戶木反𤴷㯓上助㽵反下他盍反正作床㩉也並誤縫治上扶峯反下丈之反婚姻上音昏下音因齊行施上側皆反潔也正作齊前後十餘個並同上第四十卷猗杖上衣綺反胎助㽵反胎同上又所頰呼骨二反誤也眀郎管反正作𡖉猶雞古兮反時𣊵奴管反口𭉨即委反足瓜側巧反喙破上音卓所音果蒿草上呵高反猴弟上戶麥反得也正作獲𧳞弟同上又音侯非也揌持上子孔反夜阤音陀旃荼上之然反下宅加反求七西反敖五告反正作慠荼上之然反下宅加反愸御上之領反正作也又音勑非凡杅上五馬反下云俱反水漬疾賜反牛上去堅反牛同上所㵱匹遙反浮也水吹物也正作漂速駛音使疾也須臾欲朱反投地上徒侯反正作投酬誨上訓連反正作訓似第五帙第卌一卷倮𦟛丑容反右𢭀序緣反鹿𬧅市兖反兩腂戶瓦反相棠宅廋反羹飯上古盲揣食上徒官反故𤵜丑忍丑刃二反病也宿疾也第卌二卷抓齒上爭巧反謂腦腦根中二同奴老反肪膸上方房二音下息委反涎膽上序延反𢳐縮上尺列反正作掣蹴風上子六反撨木上手焦反煆令上丁亂反火攬力甘反持也經意是燎力含反以火燒也足火上將句反添也縺繒上力先反敖五高五告二反𢢔也正作婪捫摸上莫奔反下忙各反第卌三卷堓上上五案反住𡶨同上樓瘦所右反奇瘦上巨冝居冝二反下所右反或云耆痠或云羈瘦噵說上徒老反說𠥷烏侯反瓦盂也說他果反器狹長也說扜為俱反正作盂也說碗烏管反正作碗怨二形說他果反正作撱說歐烏侯反誤說杅云俱反第卌四卷從𠯞徒兮反作啼唬㖒𧦚四形郭氏作𠯞音啼經云徒至大言此外道前世名都提也經音義以㘁字替之戶高反非也玉篇音𪲀丁禮反郭氏又作丁兮丁地二反後四呼並非也誣謗上文夫反屈電音申䐗及𤞗上竹魚反下助皆反杷上步巴反下助㽵反把抱也正作把床抱步包反蜫蟲上古魂反手捲巨圓反古猛反五高五苦二反𢢔也或作𠢕與豪同也俠也華莫顏反前作髻並同也林㩉音床塔下又都盍反非也哺羅阤上蒲故反下達何反仿佯音房羊徙倚也舊覺上巨又反奮頭上方問反振也謂頭㒵也正作奮也稽首上苦禮反心竫情領反第卌五卷飽飲飼上布卯反中於禁反下音寺亦作𩚅飽飲飼同上以抨普耕反彈也以之也迮具上阻伯反𡑅也正作笮水漬慈賜反押之上烏甲反攢攢上子亂反下子官反以𤍜桑老反葛藤上古遏反下徒登反圮迸上皮羹反下補諍反剖上普口反下丑格反慰勞來到反以櫆苦灰反劫抄上居反下叉㒵反菜茹如庶反又汝如二音稗子上補拜反苗似稻也正作稗也又蒲卦反精米也誤穄米上子例反雜上在合反下古猛反自渃力各反編髮上蒲犬反又卑連卑兖二反手抒序音舀也樓瘦所右反正作瘦第卌六卷無字第卌七卷圍子耶反猛𮥸上莫哽反下即峻反喧𡗚女孝反不靜也文𮂰巨尸反正作祁收𣫍上尸由反下力掩反文祁音耆嚶咳上於盈反下戶哀反又上音羈誤筫直上之日反𮑣邏上波破反下羅個反金縷力主反正作縷柔𣽈音軟事𧂐上冝作華云鬼反下子賜反第卌八卷牀榻音床塔誤下正穰積上而羊反諭諂上羊朱反傲上居反下吾告反自前敖敖並誤讜能上他朗反幸也正作儻又多朗反非疾上才反土𡐊古歷反土𡐊同上不燒甎也第十九卷作燩苦堯苦友苦㒵三反非用也揵祁上音𠃵下者足橙登亘反跂耆上蒲末反又音祗誤耆同上正作跋第卌九卷給㜾古胡反正作孤椯食上徒官反不猗衣綺反焜蟲上古魂反正作蜫蛇二形也蟲之惣名也古猛反𭽎上多口反下何木反賈婦上古瓦反正作寡二形又古假嫁三音並作非誤也婦上古瓦反雞䐗上古兮反下竹魚反沾肆上丁念反正作店坫治肆同上並誤華𩭈莫顏反𮇖粉上旨夷反胭也俗憂戚倉歷反憂同上獽積上汝羊反禾稈也正作穰蠻頭上莫還反𩣺𠌵上布門反下祥兩反叛兵上步半反拖設上式支反正作施問訊音信愁倉歷反張㭦知格反正作磔或作稅涉加陟駕二反開張也無側救反棘㓨上居力反譁說上火爪反譁說同上音花喧也拖論上尸智反持物惠人策慮上又責反陶師上徒刀反正作陶第五十卷漯貝上失入反下波蓋反比丘名阿唐言馬勝𠻬帝上桑割反比丘名也律中作𠻬毗𡰱母作莎提經音義作𠻬應和尚以荼字替之非也荼宅加反非凷擲上苦內反杖打得冷反又音頂睒失染反𢮓電上尺世反正作掣洗蕩大郎反㖒唾上他帝反鼻也正作又音啼非也慠吾告反自前作敖敖誤執𦇷音祕正作㘘鋤𡐢方問反撓除上火告反除田草也手曰除正作薅㧲𢫩三形撓攪也非用也洛治上力各反正作㓢堪耐奴代反理上力條反額三上五格反面上側右反比鄰上音毗並也紛紜上芳文反下音云衆也亂也獷古猛反穬同上鏵鍬上戶花反下七消反溺汙上奴吊反下烏故烏臥二反溺小便汙染也普八反車破聲也正作堯經音義以𤭃二字替之力頰反瓦破聲也蘭第六帙第五十一卷法靖才井反誣謗上武夫反絆腳上布畔反王稟兵綿反供縠也第五十二卷更互乎故反傲上居反下五告反儻能上他朗反脫屣所綺反猥處上烏罪反羅挌古客反慰勞來到反仿佯上音房下音羊問訊音信兩髀步米反尾脊上文匪反後作尻也楯矟上食閏反下所卓反矛㦸上莫侯反刀揗音順若嘯蘇𠮧反尻脊上苦高反臀也此前兩家作尾蠅蚤音早蠅蚉同上棰杖上之水反第五十三卷牧上失由反臠力兖反攬中上戶黯反火爇而恱反正作𤑔䥫臼巨九反龍蜇知列反鞭鞭卑連反杖檛陟花反或臬音澆斬首也正作臬梟二形又五結反門橛也非用也臥塌音塔床也收賊上尸由反處貌戶官反全也又音𨗿誤八稜郎登反燒齗魚斤反燒咽烏賢反㭦五上張𮧓反無側瘦反揚擈上以良反詐也下步角反正作佯𢷏薀豆上音蘊豆名𦬔子上古敗反創蟲上楚床反龜鼉徒何反齒齧五結反食尸旨反傴曲上於禹反第五十四卷宍臠上而六反下力究反憂倉歷反青𡂡色禹反柙彼上烏甲反彼音岸入巨依魚斤二反岸也彼音岸柙筏步街反上下房月反憂倉歷反郭氏作私古反非憂倉歷反病也誤煩勞郎夢反破墎古霍反過塹七㷔反破古霍反正作廓燥草上蘇老反𤍜草同上帝上割反正作𡂠第五卷十卷初廣𥼶帝同上帝同上又郭氏音𭃄非也揣食上徒官反懊惚奴老反又音忽誤𤵜患上丑忍反丑刃二反飯尺沼反第五十五卷蜫蟲上古魂反下除中反因芳無反麥皮也正作麩也澡豆子老反上皂莢上才早反下古俠反𣴟故上尸管反磨鋥除硬反出光也或作火排步拜反吹火具也正作橐也鉆推上巨廣反下除追反跋蹉千何反蠰伽上式亮反下去迦反正作佉又巨迦非邵上力求力救二反下時照反蝳上徒礙反下莫退反琁珠上序緣反𢷋識上必招反下諸吏反出禮記摘除上他歷反解音也挑摘也正作剔揥咬嚙上五巧反下五結反俗或鴟尺脂反第五十六卷戶音藥𡄇咳上苦頂反下苦愛反正作謦咳上音磬通呼下又音孩非月魔羂古犬反䰅童上莫還反椑筏上步街反又卑劈二音非也牧聚上書由反下在主反便劈博厄反正作擘十卯郎管反以𠿘即委反誤喙破上竹角反又穢誤第五十七卷喧𡗚女孝反夷哆多個反哻眠上何案反正作軒棚閣上蒲庚反閣也棧也又音朋第五十八卷無緯音胃拘絺丑夷反拘絺同上第五十九卷棘㓨上居力反𡄇咳上苦祕反下