又上音伴下音剝並誤奮息上巨右反堪辨蒲莧反牧捕上尸由反下蒲悟反彈笒巨今反正作琴𠌵上祥兩反下居右反先𠸍私妙反薗館古亂反即枕之審反讖悔上楚鋻反正作懺誤此音岸一攝𮧓厄二音犁搹壓牛領者也第十七卷已辨蒲莧反見別本作辨耐辱上奴代反又別見本作幻僞上胡辨反下危睡反見別本作幼僞鴻鵠上乎公反下何各反下又戶反針筒上之林反下徒東反拘飢居梨反鳥名拘羅也見別本作𠍃字也二本並經中自有𭃄腳也經音義以翅字替之音施翅諸經作吉梨吉氏二反也鷙鳥脂梨反猛鳥也謂鷹鶻等類誦習尋集反學也因也又見別本作謂叱涉反非也第十八卷𭅇匍上之廉反下蒲北反智度論云秦言黃花也正作贍匐上俗下誤泆上羊林反下羊一反倮踐上戶瓦反下又作跣也百普吉反跽白上其几反空捲巨貟反事猥烏罪反般嗟千何反正作蹉經音義作嗟第十九卷老耄莫報反𧆞珀普白反氍氀上其俱反下生苕反𣰅㲪上他盍反下得能反鞍勒上何寒反髓𦜩音𢙉勇捍何案反劈水上普擊反正作劈沮壞上才與反一戶木反第二十卷淨上乎屋反資輸上子斯反財也𣯈㲪上他盍反下多能反酸疼上蘇官反下徒冬反𤵜病上丑刃反唌唾上序延反淚㳮上力遂反下奴豫反正作淚也下又音頰誤也擒獲上巨今反憂倉歷反邠陀利華上彼巾反亦云奔荼利亦云分陀利亦云芬陀利亦云邠陀利皆梵言楚夏耳此云白蓮華如第三帙第二十一卷倮露上戶瓦反全躰無衣也𭾖天上羊贍反揣食上徒官反丸也繖蓋上乘旱反俎壞上疾與反正作沮甄陀上之人反拘絺丑夷反根上五口反剔除上他歷反第草二卷邠𨚎上彼巾反下丁兮反正作枑也又丁禮反聲不便也下又或作𨸧音遲亦云邠遲並通酬匹普吉反㰅罰上知𮧓反正作謫䐗肉羹上竹余反下古盲反重釀女向反醞酒也五經音義作刓應和尚以刻字替之苦得反削也郭𫞕作刓五官反圎削也又按萇筠𭃄作刓五骨反斫物頭也又按琉璃王經作五扤是也今定取機字為正豬肉上竹余反煩𭜨於元反愁𢙉奴老反下經音義作鳥亂反非㗛上尺之反蕩鉢上徒朗反洗也踏衣上徒盍反百鵠戶反又音鸖土上卜江反𨛁土同上淡泊上音噉下音拍門閾况逼反第草三卷生漏音漏屢者上力主反背曲也又力朱也捨弓居雄反𣴟之上戶管反洗也無沾點店二音正作𪻕也疾上自反歰所戢反顏貌音㒵一函音咸有作者非也稽上吉兮反空墟去魚反彼堓音岸材木上音才又作村非也草蘇禾反草名可為雨衣第卅八云拾材木草葉縛筏而度川音作或作穰而羊反禾莖也作筏音伐溺者上奴𠮧反坌者上步悶反瓠籚卜乎護二音下亦嚧音盧兩尻苦高反荊蕀居力反𨀛踞上音存下音據𣜭除上即淺反滅也果蓏郎果反莎草上素和反第草四卷垢圿古八反戰𣏞于救反正作忱㘁上戶高反或閈音閇詣市時止反攢箭上才官反𣛰之上知與反盛也任也裝也正作貯褚著三形也又知略反非也㯹頭必招反䥫𭉨即委反鬲子上古厄反或啄音卓所押音甲揵捶上巨焉反下直追反勇捍何案反違叛音畔雪揣音團猥多上烏罪反撰擇上宣兖反果苽郎果反正作蓏又古花古胡爭巧三反非第草五卷耆𦫿上巨脂反長也又六十曰也下五蓋反老也人五十曰也燌燒上扶文反拘屢力遇反佛名也捻挃上奴協反下知栗反手捲巨貟反怙悴上苦胡反正作枯也下才遂反上又音戶誤第草六卷為𦜩音惚須阤洹上相朱反中徒何反下戶官反斯阤含上一音斯羅捺奴太反國名波羅𠇈人上相然反幡㦈古太反正作蓋又烏蓋反非也復儲音除即從自容反正作從幢麾音撝救𡧱上山八反下何太反稽留上古兮反下力由反水底丁禮反又音祗誤親在木反挊之上郎貢反令兀五骨反斷足也正作刖杌二形深坑上失針反下苦耕反勑㑢魚去反𧴵一上莫侯反易也上上五按反拘璅上古侯反下蘇果反兩舌上力掌反䓣舌同上而𠸍私妙反而𠸍同上石押烏甲反長上爭巧反垢圿古八反病瘦所右反復辨音辨舉倩七見反利也又青性反假也辨見上蒲莧反共辨同上鐵上天結反下直朱反車𤥾巨魚反𭤔有上許依反金𮡻頂反屈公悟反舍鳩上手夜反下居求反下又音九並誤䨱弊上芳救反下博例反下又音敝誤救𡧱上所八反下戶蓋反不救同上根栽子才反檘歷上普擊反正作霹靂梢箭上生卓反正作矟王救音煞僂者上力主反得電音申置中上莫瓶反又之𮐅反誤遍露上匹綿反正作偏又音遍誤也儼頭上五感反搖頭也正作顉第草七卷沮壞上才與反第草八卷唾上序延反眼𥇒音接粇米上古音反千柘之夜反豪里之反朁不上音剃𭾖天上以贍反煩𡗚女孝反康彊巨良反勞乎上來高反經音義作第二十九卷試挊上尸志反下來貢反杅緣上為俱反下以反箱篋苦頰反第卅卷瑕疵上戶加反下自斯反檘木上普擊反正作劈也猥多上烏罪反楫在上阻立反止也儉也正作戢又集接二音誤繫惙竹稅竹恱二反連也正作綴相疇市由反報也以財貨曰也答也又作對是也正作酬酬酬三形又直由反誤捅論上古嶽反𥪰也松第四帙第卅一卷燌煩上扶文反深灁烏玄反深也正作淵剡囦三形見別本作淵寢蜜二反貫針上古丸反下之林反鴦掘其勿反𣧑暴上許容反下步㦸反為蠻遝反訴辭上蘇故反下寺慈反華莫還反放𢗡音目放也正作牧禽獲上巨今反也急持也正作擒襟三形觸嬈而沼反捽母上存沒反玼也手捉持也並音笑㸌𥧝上呼活反達也見別本作豁豪釐上之反猥多上烏罪反𢪛攝上式由反鞕杖上卑達反正作鞭娉上匹聖反下七句反正作娶象廄音救倮踐上戶瓦反下先淺反見別本作祼跣也誤揵疾上疾反疾也見別本作第卅二卷掘山上其勿反勝漿即良反誤鱣魚上知連反桃眼上他刀他條二反顧視上音故正作額屈顧同上拍毱巨六反五兀五骨反斷也樹也乇枝也正作刖𭠎二形也當古堯反蜜絺丑脂反園名綏納上息唯反係嗣上古詣反下辝字反園館古亂反飰食上扶万反病𤸃所右反夷湍他官反外道名也此或端字誤也或云阿夷多或云阿耆多或云阿逸多或云阿夷專比盧持上一音毗或云毗羅坘或云倍羅𦙁子也夷與端字同也又音偄誤之咎巨久反𭡢鹿上衣撿反取也第卅三卷灰色上火回反雹莭上步角反昳起也正作𦢊也經音義作𦡕以皰靤二字替之滿孝反非也水底丁禮反又音祇誤擒獲上巨今反可鞭卑連反俎壞上才與反又音阻也猗覺上依綺反七覺支一也琥珀上火古反下普白反金扉音非門扇也煌煌音皇泆羊一反普𦁉息反又音接誤山上才作反蝦蟆上戶加反下莫加反蝦蟇同上見枷巨迦反杖也又音加釋云五欲也雜阿含作楞耆佛釋云無明也別譯阿含作楞祗毒蟲節釋云愚癡也第卅四卷蟲䗍洛禾反陶家上徒刀反𭾖天上以賠反崩落上布登反下郎各反經律異相作崩音蒙慰勞來到反䣶蒲桃上徒兼反下徒刀反當儲音除手捲巨貟反正作拳撰擇上思兖反牙跂巨逆反正作屐外口豆反景𥧝上居影反戒也正作警一扼烏革反犁草也涕上徒兮反下空屋反正作㖒哭捅牛上古豆反取牛乳也正作擎搆二形又古嶽反仕角二反遼治上力豫反下直之反正作療也又音聊誤第卅五卷抆飾上冝作文彣紋三同無分反文美也彣青與赤雜也紋綾也又無粉反拭也又前後皆作挍飾字也柘蕀上之夜反下居力反果瓜古花反掬水上居六反而穬古猛反俾勤上卑爾反翹足上居堯反八古孝反正作𡧱𦜩𦝩上奴老反下云貴反第卅六卷涕哭上徒兮反正作㖒下並同也又體剃二音誤諸經作𠮧喚大𠮧喚是也廷直上他頂反直也長也正作頲二形也又二音誤自摑古夌反荊蕀上居迎反下居力反泆羊一反押之上音甲束也草著知與反任也正作著五刖五骨五越二反斷也五揆知挌反張也如世閒逆者以五車張之曰也正作磔也開元樓藏作知挌反張也又求癸反誤經音義作揆以捺字替之非也𢲉音祭奴達反並非也而梟音澆䥫𭉨即委反摩牧冝作捫莫本二反以手撫持也又吻問二音拭也𧑮動上而兖反較之上古孝反又音角量不等也略也自劈補益反褶褻也正作襞也第卅七卷夷專音端前作湍𣽈二字彼應誤也初學上楚魚反始也新也正作初起敘音序未巨久反正作誤憒𡗚上古薱反下女㒵反疇匹上直由反下普吉反邠𨚎上彼巾反下丁禮反或作𨸧音遲如前釋酌之林反上第卅八卷殉弊上許容反下毗祭反鐙光上音燈也𦧧耳上時爾反草葉羊接反第草三作彼或是葉字也第卅九卷𤝌猴上于元反下乎鈎反正作猿猴也劈口上補厄反正作擘也推捧上丈追反下步講反戈矛莫侯反春杵上書容反惔怕上徒敢反下普㒵反沆翳一計反苦惚音𢙉堅𩊅五更反堅牢也正作鞕硬二形也牧牛上莫六反不肥扶非反正作𦘺不廋所右反又音叟誤死邊音邊夷專音端㸌然上火活火郭二反象上音字正作牸以挊音弄執勞洛刀反別本作𣬄恤民上私律反𫽄𢌿音𢌿病瘦所右反正作瘦瘦二反中衣小反周序緣反瘀埿上於去反第四十卷辱上奴代反正作耐泆音迭隱慝女力反藏也又他得反誤隱匿同上此正居約反百愔蒲亥反正作倍也郭氏未詳玉篇作芳久反非此用千倍步乃反正理𮞼相遂反正作邃𨳰塞上博計博結二反問訊音信掃詳嵗反祥醉二反帚也正作慧二形又音慧悮搒抬上蒲育反下丑之反正作榜笞也栲𢱊上苦老反打也正作𭮂下力尚反笞也治也殷勤上於斤反正作殷躬欲上音弓下音浴義鮮仙淺反博𢸒郎敢反手取也正作攬攬二形酌上之林反鐙光上音燈佛名鴗羅上其列反佛名提和羅即然燈佛也又音立誤也事猥烏罪反衆多也之第五帙第卌一卷周序緣反𭤔有上許依反唯願魚願反正作願顯願二形嫉姤丁故反慳嫉上苦間反喜𠸍音𥬒瑕疵上戶加反下才斯反悉備音備海音岸問訊音信問訙同上屈電音申𢗡攝上失由反下失反市𡗚上時止反下女㒵反病瘦所右反村渃音洛賢劫上乎堅反揣食上徒官反𢷋首上補招反正作摽𨲙上相朱反正作手捲音拳曽眴音舜利掘又作㭾同巨勿反人名或云尸利毱多門閫苦本反莘滿上音花下音滿芬香上芳文反憒然上古對反涕澪上他禮反下力丁反鉢丘至反正作器泆上羊林反下羊一反伈人上相連反正作仙第卌二卷叛𨒫上步半反謶譏上書去反居依反正作庶幾也上又之若反非也翅羽上音施鳥翼也鮮少上星淺反恭恪口各反屈電音申青瘀𢪛去反𮌨脹上匹江反下知亮反第卌三卷拘睒失染反讖比丘上楚蔭反揵推上巨焉反下丈追反羈難上居冝反傒屬上古諸反邊也佛于上芳佛反東洲名第卌四卷殃舋許覲反門𨳰音閇又入試詰上式志反亦尸棄皮𥢶苦外反曳右上音申舒手也蠰佉上商亮反下去迦反挮他兮反國名般綢上布官反下直由反守護銀藏龍名也或云頭或云班稠也𧰟天上羊贍反第卌五卷拘屢力遇反淡泊上徒敢反下普自反屏依上蒲政反隱僻無人處也下匹豈烏改烏對三反藏也隱掔也正作庰依也二並誤疾上才反第卌六卷摩刷所刮反瘡痍音夷沮壞上才與反愁悒音邑無煴烏魂反又於云反非也翅寧上音施下奴定反一𭽎戶屋反屢者上力主反正作婁第卌七卷誦習尋集反經音義作謂誤抴電上以世反𢪛餝上冝作彣紋二同音文諸經或作文飾是也又或作披飾古孝反下始食反上又吻問二音誤膿血上奴冬反經音義作䐦創愈上楚床反下余主反膏車上古到反醇酒上市倫反𭜨巨九反正作咎蜎飛上烏玄反輪轢力達力各郎擊三反車踐也㕮咀上芳武反下子與反拍碎也亦作𥒰䃊來填陟鄰反壓也經音義以鎮字替之鎮知人反也踏𮛫上徒盍反銅羊接反卷上巨貟反下子消反第卌八卷淵流上烏玄反深也甄陀上之人反蜜𠽮梨反經文自𭃄也國名蜜羅也或云蜜絺或云挮或云𩭈音剃也猶挻音延泥洹經作延又丑延式然二反樹名七肢音支平跱直里反咃𭇅上訰何反下章移反至藏巨寶名也又經音義以他叉字替之下又或吱音仚也梳頭上所魚反正作梳欲剔他歷反為𢴠尺志式志二万又音志記也搮也正作𢡠也又音持誤寶跂巨𨒫反名荏如錦反王名也經文自𭃄鱞獨上古頑反一揆求癸反替廢上他帝反下方吠反相糾居黝反遘鬪上古豆反生劈博厄反正作摩壓烏甲反銅鍱𨧲下二音𦒱𢱊上苦老反下力尚反氍㲙上其俱反下生俱反織毛褥也下俗踏蹬上他盍反下多能反正作毾㲪也又上音沓下音鄧誤垢玠古八反正作圿圿又音界誤摩𢪛文粉反𧋒哲上音釋正作螫蜇也繤修上子管也𭦟今上莫官反聞也器皿明丙反第卌九卷悲㘁戶高反又音亦垢圿古八反作攡力支反䥫槨古霍反擲中同上也誤四徼古矛反四謂四徑路也小道也妷音逸五弊毗例反僥幸上古堯反下胡耿反而爍羅各反正作炵又書約反非用邠𨚎上彼巾反下丁禮反或云邠音低或邠遲音班稠直流反蜜締下音締丑脂反第卌四作挮卌八作蜜𠽮吐梨反勒成佛經作蜜絺羅後又作絺羅是也又徒兮反唯勒成佛經作提羅梵言楚夏耳門閾况逼反門㡾也鞞鼓上步迷反般禱上布反下丈由反姑障上古胡反下諸良反夫𦕓音細旨也第五十卷蘭柘之夜反灡遮上郎坦反施挮上式支反橙墻上音登升也上也四十九云踰墻入內也又丁亘反挮挄也乳鋪音步撾打上竹花反鞭打上卑連反黮如上他感反𦬔子上古敗反勉此上音免脫也第五十一卷從廣上子客反多猥烏罪反履屣所綺反初甛徒兼反正作甜抑折上衣力反下之舌反綺語經音義作䛴丘倚反殃舋許覲反著腹上張呂反任也正作著䥫臼巨九反𢫎熱上步保反或桃他條反他刀二反擾動上而沼反脊斤上子昔反下居勤反攘厭上如羊反下於陝反琦音奇尻亦上苦高反嗽乳上所卓反泆音逸嫟女力反隱陰姧也正作匿也或作匿他得反𢙣也然非此義也姤忌上丁故反饋遺上巨位反下惟遂反稟食上兵錦反逢驅上羊招反正作遙下丘俱反晧白上戶老反夫聟音細遊佯音羊不消相焦反滅也盡也息也冝作肖音笑似也佯愚上以良反許也經音義作湯聾叨餮上他刀反下他結反蝗蟲上戶光反皆𡙸大活反奉祿上扶用反秩也君以祿為巨也又扶勇反獻也椽也下郎木反俸也賞賜為祿盛雜阿含經一部五十卷第一帙第一卷憘貪上許里反放逸羊一反輸屢力遇反正作屢第二卷阿㝹奴𬾃反傘蓋上桑旱也揵茨上巨焉反下才資反鄣閡上之亮反下五愛反若曖奴管反正作曖也又音愛誤蚊虻上音文下音盲申恕音庶傘蓋上桑旱反獲泅音囚不憚徒且反示教音投別經作郣明苦角反第三卷逯得上徒愛反若𭊴許右反嬉戲上許之反下許義反慰勞郎告反第四卷水牸音字鞭笞上卑連反下丑之反執尺證反柄傘上彼命反傭客上羊封反澡漱上音早下音廋所係音計捷疾上自業反麥上古猛反蕀㓨上居力反正作𣗥若軛音厄若鞅於兩反若縻美垂反若鑱仕懺反應和尚以替之戶花反為轅于元反啾子由反絺丑夷反初徒官反木扚帝若反恐怛都達反誤迫協許劫反正作愶𢱊護上力向反奪取也下正作訝乎悟反志也認也下又經音義作𧥮丁禮反欺也彼悮誣他上文夫反祠祀上音詞下音似第五卷消煬上亦作焇下作羊阿漯失入反比丘名阿濕波誓亦云阿說亦唐言馬勝𠚫上牛例反下北末反下正作𦫿茷升藪上都口反下桑口反正作抖酒囊奴郎反壓取上烏甲反清淳市倫反亦作醇糟上子曹反下爭史反𦟛直上丑容反剽剝上匹妙反強取也劫也亦作跨說上苦花反大言也正作誇突目佉上徒骨反下去迦反中蟹戶買反罵謠音無枉也亦作𧩄輕躁子告反動也疾也亦作躁𣸡菴上千悉反第六卷手撥音鉢足蹴七六反魔縻美垂反撰擇上思兖反第七卷鉛上應和尚以剬替之剬之兖反細𭃄也肉也斷也截也今又冝作脟脮二同力兖反也諸經多作腐割也又依字緣鍾二音義無所取上方經及川音並同作鉛桃著上徒了反擲也不𤵙所眼反生也正作産二形郭氏作所景反非也不構古𠋫反𢭀轉上㡰全反尫瘵上烏光反下爭介反貪嗜神利反剎𢷋上音煞下匹妙反強取也劫也正作剬勡二形疾垢上正作嫉妒上音疾下都悟反楚詞曰𡧱賢曰嫉𡧱色曰妬槌打上直追反下得冷反㿈疽上於容反下七余反謫罰上知𮧓反下扶發反暴上許容反跳杖上音條又他子反呰執上將此反棹悔上徒了反惛忤上呼昆反下五故反𨒫也又經音義作惛悴才遂反憂也𨇱跣上蒲先反下蘇前反旋㒵也蹣跚行也正作蹁躚也𮥭欷上友祕反壯士作力也亦壯大也正作贔膊二形下許器反正作屓也第八卷奮縈上巨久反下於管反苟肚上古口反下徒古反𥾣結上古巧反濤波上徒刀反大波也第九卷稽首上苦禮反揌持上子孔反又作惣彼音岸利搶七羊反留搜所愁反駮牛上布角反折𭉨上市列反下即委反波咤竹牙反純阤上市倫之尹二反下達何反或云淳陀西域記作准陀是也芭椒上布麻反下子消反大莫丁反糠糩上苦郎反下苦外反塢𨈢上烏古反下都含反𨈢陸音六捺渧上奴達反下丁計反肅捺上息六反下奴達反枳上吉以反塢娛上屋古反中牛俱反下力計反拘荼上九愚反中步官反下宅加反也毗紐女久反旃延以然反採才焦反敷𤴷助㽵反又所火骨二反誤嗽上子老反下所右蘇奏二反革屣所綺反𢢔上五高反五告反𢢔也倨也正作二形也編髮上蒲犬反又邊篇二音衣皮褐上衣氣反下何割反灰盆上火回反下蒲問反正作坌不音𢙉第十卷拘睒失染反輸屢上束朱反下鐸句反復雞上扶富反鳥抱子也正作伏下古兮反菢步報反伏𡖉也蔭留力救反宿停待也經音義作鵽力救反雞子也非宿音秀以𭉨即委反瓜喙𡖉上爭巧反中竹角反下郎管反正作瓜啄𡖉也出苦角苦木二反以𭪿子委反斧柯音歌滕綴上徒登反下竹稅反覆𧭼上芳救反下初覲反誤氍氀上其俱反下生俱反𣰅㲪上他盍反下得能反丹枕之審反茤摩上測俱反拘沾竹鹿反𪮧直上丑容反又音容也手攬力敢反發㧡古諧古哀二反萃根也正作菴也又音亥非也火燥他念反火杖也正作掭也經云𨐫如燒尸火樓弃冢閒是也經音義作以燴字替之非也他念反燥先早反並誤撨伐上才焦反又先條反誤土槫徒官反塊也川雜阿含經第二帙第十一卷眼䁔奴短反正作暖也又許袁許願二反誤也係念上古詣反連也縛也莖幹古岸反夫智上音扶語助也䈥骨上居設反篋蛇上苦頰反憎惡烏故反所嗅香右反鼻取氣也又七秀反非也由恕聿預反踈𣾫所立反問訙音信試𦗟上尸志反迭相上田結反不減咸斬反懈倦音惓猗息上衣綺反唯聾郎紅反第十二卷解拆先擊反根幹古案反解折先擊反載撨才焦反撨薪同上拘絺丑脂反輾轉上知演反留所愁反背膢九主反正作僂班駮補角反雜色也𨅖陀上桑讚反又二十三作詵陀迦旃延郭氏作蘇安反亶延上諸連反犢牸上徒木反下才寺反玷牟上點店二音第十三卷為志之熾反記也扼閡上烏革反下五愛反鹿紉女反或作細音鈿輕子苦反染泍烏故反誤第十四卷椯食上徒官反謂棹大了反劫盜上居業反防邏力個反𠠤以上住銜反㓨也百矛莫侯反第十五卷毗漯失入反正作濕食上徒官反癖陰上普擊反痃也下於禁反痰也唌唾上序延反百搶七羊反百搶同上第十六卷孔上五口反銅然上音同徹也誤橙階上都亘反為為鏘七羊反正作搶貫大上音官穿也䔉子上蘇亂反瓜押上爭巧反下古甲反陀驃婢妙反此云實第十七卷拘睒失染反號呼上戶高反㘁呼同上呺呼同上毗𤨴失入反正作濕集異門足論作吠濕鞞嵐上步迷反下洛南反集異門足論作吠嵐毗漯失入反正作濕又他合反非也誤一奢手遮反第十八卷破𭩶力竭反破也正作裂又音竭誤浚輪上相俊反鳥翮戶革反歰所立反築令上知六反正作築也喘息上川雍反係念上音計連也投上古火反正作裏第十九卷牗上楚江反下由抑反簾彰上力間反下之亮反摮其上普結反擊也正作撇也又昌六反動也又經音義以蹴字替之非也顛狽上丁田反下補蓋反頸仆也正作伂也斤骨上又作𮏴同音斤正作𮏴䝱䯇上許劫反下來得反棎其上他含反脯臘上音府下音昔乾肉也好讒仕咸反𤓥矛上倉官反下莫侯反敘上倉官反下所八反唼食上子合反陰𡖉郎管反如瓮烏貢反煆銅上都亂反煬銅上以良反蜜音餅熾然上尺志反𢴠然同上也誤鞅其頸上於雨反下經反𧿡袛上蒲末反失𭣣書州反山名也失𭣣同上第草卷問訊息進反慰勞來告反問訊同上澡罐上子老反下古亂反或鞭卑連反澡漱所右蘇奏二反口也正作漱流第三帙第草一卷拘睒失染反棹亂上大了反浚輪上相俊反澡漱所右反梨𡱝音西比丘名也辨疾反斖斖音尾成𧂐子賜反軛鞅上烏𮧓反下於兩反裸形上戶瓦反全身無衣也淨也正作稞也又郎果反說文赤躰裸裸非此呼涕泣上他禮反下去及反經音義作涕泗第草二卷稽首上苦禮反遍照上卑見反難阤音陀鈎鎖素久反逯得上音代䫃鞭手連反長縻美垂反羈絡上居冝反烏泥上𢙣胡反水不流也正作汙商人上手羊反又音的誤破撨才焦反炊餅上尺惟反下扶万反作音餅娶婦上七遇反姧姟上古顏反下古卯反㽵飾施食反𤴷臥上助㽵反下五遏反揵荼上巨焉反下宅加反瘦㝹上所右反下奴侯反缺呿丘御反憒悶上古𭔹反如龜居追反以嗀口角反欲安故安各二反正作𢙣惡二形耒詣上洛才反正作來又力水盧對二反誤第草三卷荊蕀上居迎反下居力反喑啞上於今反下烏雅反嬉戲上喜之反繖蓋上旱反調笑上大吊反下線妙反之塌音塔料理上力條反澀上所立反不滑也園館古亂反重餉式亮反葬上必進反下子浪反阿㝹乃頭反撾打上竹花反下音頂䥫鉗巨廉反𣐬械上勑柳反下戶介反䥫戶郭反正作鑊著臼巨久反係心上古詣反縛也舟桁胡郎反船也正作航𦨵二形冝作笐戶浪反架也以綖音線枯𤍜素老反僻地上毗益反倒也誤晧白上戶老反第草四卷鷹爪爭巧反正作爪濬飛上相俊反染也音義以迅字替之迅疾也直音博擊也以𣛲丑知反膠也正作蘇也又丑魚反也口齧五結反捲上力延反下巨貟反𮨇䀎音麵又普幻反易韻上羊益反變也改也轉也下于訓反物亂也正作也傘蓋上桑旱反第草五卷𣾫所立反甲胄丈右反商主上手羊反號咷上戶高反下大刀反無量音亮崩頺大回反正作隤號咷大刀反悉備皮媚反號上戶高反下大刀反暗暝莫丁反惋慨上烏亂反下口愛反貝䗍洛禾反萎悴上於為反下才遂反封緘古咸反排攩上步皆反下他浪反推拓也下正作摥也又經音義以湯字替之託唐反𥥛也又他浪反出團也攩他朗捶打也堆迮上都回反下阻伯反堆落也聚也亦作磓也迮𡑅也正作窄苗𧜟以世反係心上古詣反吝惜上力進反岨壞上才與反正作沮也毀也壞也諸經作沮也或作俎壞或作阻壞並非又七余子余二反非也第草六卷因釭音公車轂口䥫手掬他含反深也取也正作探又音菊誤其哽古杏反㓨在喉也正作軟也哽咽也非也䉼里上力條反障𦿔必祭反迦椑音卑又音誤傍佯上步光反下以良反第草七卷駭散上戶騃反潛思上才尖反下司寺反猗覺上於綺反撨炭上才消反紫也足其上將句反添也缺呿丘御反撰擇上宣兖反箱簏右木反王蕃方煩反又音煩青瘀於去反膿潰上奴冬反下戶對反𮌨脹上普江反下知亮反第草八卷白控苦貢反馬轡也白鞭卑連反白𢃑莫告反白傘素旱反手執之付反問訊音信慰勞力告反問訊音信彼音岸𭤔有上計衣反伴黨當朗反世俗似欲反苷蔗上音甘下音之夜反蒲桃上步乎反下徒刀反悉恬徒兼反正作甜㥧流上侍閏反第草九卷憒𡗚上古𭔹反下女孝反㒹沛上丁田反下補蓋反塠壟同上睒一上於敬反隱也正作映也又他濫失染二反並非也伏雞上扶富反烏菢子也生卵洛管反口喙音卓正作啄誤爪刮上爭巧反下古頌反第卅卷浴上子老反塌寺上他盍反椯食上徒官反丸也汪洋上烏光反下以良反麻屑先結反裸其上戶瓦淨無衣也正作裸也又郎果反說文赤躰裸裸也非此呼猘狗上居例反狂犬也又經音義作昌制反𭃄作狾𤢻二形刾九力反繁𦒿上步何反亦云傍耆佉槾伽上去迦反中洛登反下其迦反槾莫官反誤易韻上羊益反變也改也轉也下為訓反物亂也正作縫衣上扶峯反憒𠆴女孝反憒同上正作吏下坂方晚反坡也我襟居呤反不第四帙第卅一卷傘蓋上桑旱反𠸍音笑祑粟上持日反下力日反誤匐叉上蒲北反青瘀於去反脹相上知亮反膿相上奴冬反羅羊朱反河名也第卅二卷嬉戲上喜之反下喜義反甲胄丈右反歰所立反枯熇苦老反乾也苦也正作槗熇二形又音臛熱㒵也非泍戒上烏故反深也正作汙低責上丁禮反下阻麥反負財不還也正作債也䥫搶七羊反沃壤上烏毒反下而兩反瘠薄上秦昔反疾上疾反第卅三卷八態奴代反踏人上徒盍反躍踏也踐也正作踏跪地上巨委反正作跪起二形也膝加地也奮頭上芳問反囓人上五結反榐軛音厄鞭杖上布延反斷居良反正作韁韁二形斷鞅於兩反𥥛上丁禮反下大骨反輕蔑莫結反詵陀上所臻反比丘名陀迦旃延第十二卷作𨅊陀迦亶延是此別名耳棹悔上大了反身猗衣綺反又乎聲呼伏雞上扶救反烏菢子也以抓側巧反正作爪啄𡖉上竹角反下洛管反第卅四卷唯幹古案反空幹同上浚輪上私俊反㩉補上都盍反或作㩉他盍反河名無異譯勘會見緾丈連反磬咳上苦頂反下苦愛反正作磬咳也又上音𣫆下音孩非執𥰢失戰反𥰢佛上失然反第卅五卷遼落上力迢反跪地上止包反正作跑又去委巨委二反誤野犴古案反正作于也別譯阿含作野干是也又可顏五寒五按戶岸四反非此呼毀呰音紫狂騷桑刀反洛漠音莫唌唾上序延反悼悔上大了反正作掉毗珊桑安反坘子上音遲亦云毗盧持又音伍亦云毗羅𦙁子枳舍上吉以反求備音備逃竄倉亂反為榺徒登反正作藤為藕五口反為膠交挍二音苟腸上音狗下音長為絮相預反為榺音交前例作膠字也不慊音嫌又苦點又非瞋朾上尺真反下得冷反嫌彼上戶兼反前非第卅六卷阤羅驃上徒何反下毗妙反唐言實稽首上苦禮反顯深上呼典反少惚奴老反廬館上力余反下古亂反𧯞𮗤上都口反下戶穀反欲求上余玉反峯牛上芳逄反正作𭷟上妻音妻也㥧夫上市閏反賢妻七西反輕躁子告反制御牛去反第卅七卷澡漱上音早下音瘦淳陀上市倫反毗濕失入反麻屑先結反撾捶上竹花反下之水反忽所戢反誤身恕音庶𡰱咤竹加反繖蓋上桑旱反鞞細上毗迷反下女久反䥫鉾音牟水上倉官反仰同上樶水同上仰撮同上仰同上撮水同上空同上掇也遙擲也正作攘攛二形鏘投上七羊反下徒俠反第卅八卷駏驉上音巨下音虛上云馬父驢母為駏驉驢父馬母為騾也應和尚云牛父馬母為駏驉也坐妊上徂臥反罪也下而禁反孕也革履所綺反正作屣䫃䀎普幼反又音麵刀食凖反正作盾千也所以箭駃走上所事反疾也𡨜滅上自歷反別經作芴彼誤㯓補上他盍反河名又作㩉音答也氍氀上具俱反下數俱反毛席也槾耆上郎登反別譯阿含作楞祇楞𦒿上郎登反揣食上徒官反第卅九卷疽蠅上七余反瘡疣于求反創如上楚㽵反䥫鑽戶郭反又音俠非也鑽鑿音昨效彼上乎教反效彼同上繩衒古犬反索也正作羂又音縣非也睒現上失染反大帆凡梵二音船上也曳電上以世反蠅𧈸音早𨥨槍上莫侯反下七羊反損觜子委反齒齧五結反手抒音序染也氣歔音虛瘖啞上於今反下烏雅反築地上知六反第四十卷生擒巨今反馬鞕卑連反誤傘蓋上桑里反革屣所綺反當遺以遂反贈也與也息第五帙第卌一卷須阤音陀揣食上徒官反捫摸上音門下莫也非陋郎豆反掉悔上大了反染汙烏故烏臥二反正作汗佯佯上音羊詐也下音𡓜弱也驚悟上音景戒也正作警老嫗於遇反互相上乎悟反第卌二卷術策楚責反掉悔上徒了反族丈右反闍𥘡丁兮反仿佯上音房下音羊摩揭音竭𦟛細上丑容反贈遺上自鄧反下以遂反與也收尸由反膢𮌡上力主反下卜昧反俱蹲音存老鵠戶沃反第卌三卷縫紩上扶用反下直一反拘睒失染反婆磋七何反骨幹古岸反流唌序延反肪脂上夫亡反溺上尸旨反下奴𠮧反殼內上苦角反麥上古猛反耽湎上都南反下兖反有柄彼命反有戾力竭反茅荻上莫交反下徒的反失𠬧尸由反入冗玄决反凶𢙣上許容反危脆七嵗反浚急上私俊反搸林上助臻反棘㓨上居力反俸祿上扶周反祑也君以祿與臣也莠稗上由柳反下步拜反緊獸上居引反樹名也亦云甄叔迦也參所今反長㒵也正作也經義以耗字替之蔯南反床㩉他盍反四褻徒協反卷襞補益反係念上古帝反疾殆徒海反修揵音𠃵此云里花刪闍上所顏反枳舍上吉以反迦邅上古牙反下遮延反正作亶也諸經並作迦旃延也又知連反持破二反書人誤加之也第卌四卷絺丑夷反裸形上戶瓦反淨也更互乎故反孫阤音陀特上頂反疏頭上所魚反磬咳上苦頂反下苦反正作謦咳也鑽燧音遂木杓市斫反叩戶上苦狗反迦咤竹家反杪𢱊上初孝反下力讓力差二反第卌五卷阿臘郎盍反姧𡛀上古顏反下古巧反鞭打上必連反稟無上兵錦反丞受也長縻美垂反第卌六卷金翅音施鳥巢鋤交反傘蓋上桑旱反嗽上子老反下所右反施𦊰上失支反下古犬反迷醉子遂反豆羹音庚革屣所綺反給恤私律反𠧒音蓋牧其上尸由反煎熬五高反理上力條反無𢪿音姑收録上尸由反杻械上抽酉反下戶介反狼狽上蓋反怖遽也虜𢱊上郎古反下亮略二音毀訾音紫又作呰訿二形第卌七卷𠧒貸他得反正作貣一徒官反悚慓上息勇反下力日反皼㰆步拜反叉鐺上初街反下得郎反扇排步拜反吹火具也正作排㰆二形其創音瘡斷理上力條反正作料黨護上得朗反放牧音目牧臥上音床正作牀聲饗音響不喜音喜常抌之審反龜丑挌反警策上居影反下楚責反繒纊上疾陵反下苦謗反匕首上音妣匕首劒類短而便用故曰匕首長三尺重二斤一兩下經文作手非捲推上巨貟反下直追反遷滅上七仙反疾上疾反貓貍上莫交反下力之反𮊵惙上力垂反下知劣反第卌八卷駃流上所事反疾也速也是抱步包反逯得上徒礙反廬阤上力魚反下徒何反諸疱步㒵反佉梨上去迦反𠇾𠇾音𠇲珠璫都郎反凷相上苦內反𨚎舍上丁禮反積堆都回反分餐七安反食也又音孫非章嫗於遇反忽所戢反正作歰卑遜蘇困反金槍七羊反兵器彼五案反正作岸勇勇捍戶岸反強劫音劫第卌九卷拘屢力句反生胞匹㒵反宍假上如六反瘦紐上所右反下女久天名或云毗瑟怒也上又蘇走反誤揵推上音𠃵下丈追反憒亂上古對反死廋所右反正作瘦鈎鉺而志反正作餌鉤釣丁𠮧反疲倦其眷反勤跑步包反依猗於綺反綿上仕臻反叢牀上在紅反下音林踞牀上居去反下助㽵反俱褶之涉反亦作拘執此云毯褥枕上而屬反亦蓐下章審反婆藪速走反鬼子名汝胸音拘引上音鉤正作拘縢綿上又作滕藤二同徒能反葛藟也第五十卷戲挊音弄枝䓸古顏反枝菅同上阿臘郎盍反醘摩上呼兮反語者經作耆誤歰所戢反𢙉同上不滑也正作澀澀惢三形也鹿𬧅市兖反深淵於玄反水出於地而不流曰𣷬𣷬深水也風上徒禮反嬉戲上許之反曳尾上以世反輕躁子告反灌拘上正作罐古亂反下音鉤姑上巨久反下古乎反種蓏古花反正作瓜說文作苽也又郎果反非也瓦塸烏侯反瓦捥也出萇筠韻得豬竹魚反一𢪛莫回反樔窟上助交反鳥窠也癸卯歲高麗國大藏都監奉勑雕造
