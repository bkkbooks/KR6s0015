巧反柱地上知主反波卑椽下以反或云波卑夜以言𢙣者撾打上竹花反下得冷反擊也又音頂河北幽鎮云也挑却上他聊反棺也取物也撥也又吐刁反棺烏活反第廿九卷橐籥上他各反下羊略反疾上才反諸莫瓶反晦也正作瞑第卅卷燈燎力遙反燎大燭也甄叔上居延反樹名魁膾上苦迴反下古外反代王煞人者也魔古犬反騏驎上巨之反下力人反鳥第四帙第卅一卷或蒔時志反種也霔甘上之句反灸療上久救二音灼也第卅二卷拘抧吉以反又音紙泡沫上疋包反䏶上步米反下市兖反𦟛滿上容反芬馥上芳文反下扶福反頰輔上古挾反下扶武反西骨也正作𩔁𩒺窪曲上烏花反炳著上兵永反下猪去反𢁙有上許衣反正作希憒閙上古內反所螫音釋又呼各反鄙𢙣上悲美反佷戾上戶懇反下力計反詭異上居委反矜高上居陵反錯糅女右反懷姙而甚反攀藤徒登反蠲勞上古玄反第卅三卷懟恨上直遂反弭挐上尒反下女加反從斯此反污囊上𢙣胡反下奴朗反污企丘弭反你瑟咤上奴里反中所擳反下加反又音奓非縛呬希至反薩攘而羊而兩二反虵呢音𡰱阿麼莫果反吠囉妮上扶廢反中呂加反下女尒反又音𡰱俗斫怩上之若反中測俱反下女遅反抧吉以反吒哩上竹加反下力尒反囉女買反亦作嬭迦𠼐力𠔃反却佉丘迦反瑟咤呬上所擳反中加反下許至反咤借音伽眤上巨迦反下女日反頞哆上烏割反下多可反瞖妮上烏計反下𡰱尒反正作狔蒱上多霖反下薄胡反經文自出書無此字環珮蒲昧反㸦樘上乎故反下宅耕反觸也正作揨𢾊𢿧三形不完戶官反全也第卅四卷你𢈔余主反麼麗上莫果反下力計反句拏女加反微𡀔音路彈舌唎姤上力至反下丁故反喉腭五各反煖法上奴管反亦作𤏙暖第卅五卷摩揭音竭國名超特頂反憺怕上徒敢反下普白反䎡膱上而兖反下女利反正作膩二形斷際上牛个反狻猊頷上桑官反中五𠔃反下戶感反頸前上居郢反肩音正作亦作二形傭圓上容反髀腨上步米反下市軟反鞔莫官反雙跖音隻足也拉坡上郎合反下普波反竊懷上千結反明膜音莫駃流上音使疾也速也正作駛也又快决二音並非也癡𥌒音古無目也伺隙上相寺反下去𨒫反迴澓上正作洄下音伏波濤徒刀反熏勃蒲沒反羸劣上力垂反惛耄莫報反面側瘦反撮摩上倉活反被巨向反魔古犬反第卅六卷揭路荼上其列反下宅家反緊捺上吉引反下奴達反縕鉢上烏沒反正作殟又烏昆於云於吻三反其聲意亦通但非本躰也青蓮華也拘莫𠋫反紅蓮華奔荼宅加反白蓮華殑伽上巨陵反毒剌七賜反殟鉢上烏沒反姝大上尺朱反儀式尸力反梯隥都鄧反階𨸚梯桄皆云隥蹶失上居月反牽奪上去堅反下徒活反不掉徒了反躁動上子到反拕那上徒可反第卅七卷洟唾上他帝反淡飲上徒甘反下於禁反正作𢉘𤸌也筯脉上音斤下音麦亦作䈥𤛆牛上莫包反牛名也正作𤛆又毛狸二音亦作𣯛也𢁙法上許衣反不鞕音硬不所立反莖幹古案反燎力遙反衣襟音金氍毹上巨俱反下所俱反之帔披義反倚抌之審反以錦綺為表形如氣毬而大其內以香草軟物褚中依之而坐故云枕也颯然上桑合反第卅八卷標幟上必搖反下尺志尸志二反偱環上徐勻反灰燼辝進反第卅九卷怡適上音貽下音釋怡適恱樂也映奪上於敬反逃迸上徒刀反下補諍反竄走也琢磨上音卓攻玉也第卌卷輕侮音武遣上卑進反逐出也謇吃上居輦反下居𠧒反獷古猛反詷疾上徒弄反𧩟詷言急也鴻鸖上音紅也下胡各反黃鸝立支反瘖瘂上於今反下烏雅反捷利上疾反反官第五帙第卌一卷企邪上丘弭反下以嗟反諠譁上許元反下呼𤓰反大語𡗚也根栽子才反𠍴犯上丘𠃵反䛕諂上欲朱反鄙賤上悲美反諸掉徒了反動也躭嗜音視逐上補各反㘁𠮧上戶高反圂猪上戶困反魔古犬反聡叡以芮反關鍵巨偃反昵近上女日反獷古猛反囹圄上力丁反下牛與反桎梏上之日反下古沃反如毱巨掬反丸也毬也毬音求開闢毗益反桃眼上他聊反刖足上魚越反問訊音信誑上居小反亦作槁䊸𬅕上衣于反不𢁙音希貶退上兵撿反黜也柁那上徒可反亦云陁那亦云檀那此云布施毀呰音紫𩚢餬上音提下音胡蘇精也亦作醍醐也上又丁𠔃反皓齒上胡老反白也紡績上芳𠕀反下子歷反紡綫音線第卌二卷鄔波拕邪上一烏古反丁一以嗟反梵云鄔波拕邪此云親教師阿遮利邪下一以嗟反梵云阿遮利邪此云教受師㿈癤上於容反下即列反疽癬上七余反下息淺反𢙣癘音頼𢙣疾也與癩同說文作癘貯水上知與反挻埴上失然反下時力反𭣙觸上宅耕反馲駝上洛託二音下徒何反訶喝呼葛反正作𠿒又烏芥反非用以鋸音據堅鞕音硬𡑅笮上烏甲反下阻革反危脆七嵗反問訊音信鞭杖上畀連反強抑於力反䆿言上魚祭反愚戇知降反恚憤上於季反下扶吻反愚騃五駭反瘖瘂上於今反下烏雅反頑嚚魚巾反寶阮五換反正作玩又元二音並非挃捁上之日反下古沃反扭械也正作桎梏也在足曰挃在手曰梏也紂王所作也並從木問訊音信姦偽上古顏反下魚位反第卌三卷𨒫𣄆上魚㦸反下力與反𨒫𨒦也旅客也謂於路上修屋作食以迎待人客也如經律中云福舍是也范曄漢書周防字偉公少而孤微常修𨒫旅以俟過客而不待報謂迎客舍也臨𣧩音終中上知仲反下於小反羸顇自遂反揭路荼上音竭下音茶緊捺上吉引反下奴割反捷慧上疾反捷疾上疾反速也嶷然上魚力反繚戾上力小反下力計反不傴衣禹反不呰音呰憒𡗚上古內反下女㒵反蠲除上古玄反他闕丘月反栽棒上子才反下五割反赫弈音亦美也咸也亦作奕第卌四卷惟忖村本反欻上許勿反机隥上居履反下都鄧反案属也正作橙凳𡱁尿上尸旨反下奴吊反雞豕尸尓反黑駮布角反輕躁子到反掉動上大了反山犺由秀反獸名以猨亦作貁幻舘古乱反經作館蜫蟲上古䰟反下直中反膿潰戶內反不肖音笑似也像也不肖不似也綺繪音會堪耐奴代反第卌五卷羼底上初諫反古譯經作羼提此言忍辱虵蝎音歇蟽蝲也正作蠍也又戶割反桑蠹也非蛟䖟上音文下音盲正作蚊蝱也上又音交悞堅鞭音硬正作鞕也忿懟直遂反箭矟所角也栽𪮘上子才反下五割反正作枿不二形口噤巨飲反譏㓨上居衣反下七賜反亦作𧧒矛矟上莫侯反陵𮆘音第卌六卷而摧門戶圭反提也離也正作攜驍勇上古堯反抗拒上苦反下音巨𠡽上巨亰反下徒的反甲冑丈右反奮發上方問反店肆上丁念反下音四陳貨所也挫辱上祖臥反殖薑上是力反下正作礓也商佉丘迦反此云螺唼食上子合反正作𠯗𠾱二形孾兒上於盈反殟鉢上烏沒反拘莫𠋫反鳬上房無反振發上音振奮也燥爛上蘇早反下郎歎反第卌七卷蘇揭音竭亦云修伽陁唐言善逝篾戾車上一莫結反此云樂垢穢人謂此等人全不識佛法賕上子郎反下音求納賄曰贓也璅骨上桑果反涎流上序延反或䶧五巧反或齧五結反或吮徐兖反囓𡧱上五結反規求上居隨反調謔上徒吊反下許約反微隟丘𨒫反恬怕上徒兼反下普百反靜也超徒頂反鎣飾上烏定反寶屐巨逆反蹲踞上音存下音據一徒官反誙謗上音無正作誣譏剌七賜反亦作𧧒依泊蒲反止也親狎下甲反第卌八卷塗傅音付塗也潰爛上戶內反痤癤上昨禾反號訴音素資稸六許六二反𬽦匹上音求下普吉反毒螫音釋村墟丘魚反第卌九卷魯檏普角反呬多上許至反三昧名也唐言等引謂等引諸功德也亦云等持第五十卷無瞚音舜憺怕上徒敢反下普白反入上七句反詑那上徒可反人第六帙第五十一卷輕蔑莫結反堅鞕音硬溼潤上失入反空燼似進反揭路荼上巨列反下宅加反緊捺上吉引反下奴達反疾上疾反利也謇吃上居輦反下居𠧒反梗歰上古杏反下所立反輕掉徒了反獷古猛反𢙣言也呬多上香至反關𨷲上古還反下羊略反第五十二卷扝壞上許有反傲逸上五告反鄔波上烏古反拕邪上徒我反下以嗟反詭詐上居委反欺也饕餮上他刀反下他結反善枙音厄憒𡗚上古內反下女㒵反卉木上許鬼反叢林上才紅反館舍上古喚反用莫𠋫反過各巨久反𢙣也第五十三卷策勵上初責反攝持上尸涉反正作攝憺怕上徒敢反下普百反不掉徒了反徒吊二反引也動也躁擾上子告反下而沼反惛漠音莫諠閙上許元反𢁙望上許衣反弊鄙悲美反固鎧苦改反能擐音患衣也著甲也又音串衣於氣反衣著也聡叡余芮反難上力向反信也第五十四卷拕那上徒我反羼底上初諫反企耶上丘弭反舊云阿僧祇數名也仚耶同上涕泣上他禮反哽噎上古杏反下伊結反伐瑳七何反竊自上千結反惟忖村本反𢜬也羯利沙鉢那上一居謁反或云迦利沙鉢拏或云𦋺利沙盤此云銅錢十六錢為一羯利沙鉢拏也又僧祇律云十九古錢為一𦋺利沙盤一𦋺利沙為四兮據律文筭即當此六十八文也十誦律云一大錢直十六小錢是也七莁戶萌反正作莖殟鉢上烏沒反駝驢上徒何反籍如上慈夜反責上尺之反渥濕上奴𠔃反正作埿足趾音止足也拘莫𠋫反不肖音笑似也像也不肖不似也䭾都上徒个反此云身骨即舍利異名也如古毗婆沙論作舍利新毗婆沙論作䭾都是也第五十五卷車轅于元反車轂古木反藤笋上徒登反多泄私列反路澁所立反窟穴玄决反羅邏來人反來酪上子老反乾尺沼反亦作麵牙莁戶耕反悞諸皰普㒵蒲孝二反兩䏶步米反緊紡芳𠕀反商佉丘迦反此云螺云蠃郎禾反髦牛上莫高反亦作氂犛有上市軟反𦝫胯苦化反調勻余旬反堅鞭五更反正作鞕也此前䏶字下亦有堅鞭並同也堅硬五更反瘖瘂上於今反下於雅反攣躄必益反跳躑上徒聊反下持隻反牀榻上助㽵反下他盍反囹圄上力丁反下牛與反蚉䖟上音文下音盲正作蚊蝱虫唼子荅反鞭撻上卑連反下他達反鞌乘上烏于反下實證反依腭五各反名羸洛禾反正作嬴也悞羸口上洛禾反悞依胏芳廢反為荻徒的反兔腹上他故反鹽口上羊廉反億𭽪阻瘦反依䏶步米反依市軟反虛羸力垂反憔悴上自焦反下自遂反風癇音閑涕唾上他帝反正作洟癲狂上丁年反淋瀝上音林下音歷疥癩上音介下音剌痃癖上胡堅反下普歷反痔瘻上直里反下郎豆反痰病上徒甘反撾打上陟花反下得冷反擊也扭𢬿上抽酉反下戶戒反枷鏁上古牙反下乘果反劓耳上魚利反刖手上魚越反蜂螫音釋第五十六卷顧䀎上音故下音麵縫補上扶峯反糞屎尸旨反火便也以鉗巨廉反捩齒上力結反抉目上烏决反鋸㓟上居去反下普皮反開也兮也正作披翍二形也又音皮廣雅㓟剝也又郭氏音疋美反牟𥎞倉乱反鑱身上仕懺反剟也又仕銜反㓨也棒打上步講反下得冷反矟㓨上所角反䥫鎚直追反哽咽上古夻反下一結反易燥上羊至反下蘇老反痰癊上徒甘反下於禁反宍增上而六反鵶口上烏牙反凹亞上烏洽反下徒結反正作凸瓶攢子乱反堅鞭五更反正作鞕如榍先結反鍋中上古禾反頞部上烏割反刀韒音笑䥫箸音筯蚯蚓上音丘下引胤二音鞋楥上胡街反下許院反荑草上徒𠔃反草名水苔音臺鍜家上都乱反以橐音託差舛川兖反骽有上他罪反亦作腿膝有上辛七反䏶有上步米反𦝫髁苦瓦反頜有上古合反頤傍也車也或作頷音撼插在上初洽反尖搮上子廉反下必遙反𮡗黑上力夷反正作黧也又音黎煗蘇上奴短反榆皮上以朱反鋒芒上音峯下音亡臠割上力兖反幾死上巨几反近也第五十七卷潰爛上戶內反下郎歎反螺貝上洛禾反口上羊廉反或作鹽依脛戶定反襁褓上居兩反下老反法式尸力反挭槩上古杏反下古代反大略言也欬喇上苦愛反下蘇奏反鞭打上卑連反𣑥楚上苦老反拘牽上古侯反下苦堅反咀嚼上自與反下自雀反溼以上失入反涎唾上序延反嘔𨒫上烏口反亦作歐青瘀於去反蜂上音峯下音牒𧈸虱上子老反下所擳反蛆虫上七余反正作疽魚并列反鼉上音元下音陁蟬蛭上常演反魚名也正作鱓下之日反又丁悉反蚌蛤上步講反下古合反蝦蟇上音遐下音麻狐狢上音胡下音鶴蠅𧏙蜋上羊陵反中丘良反下力羊反善軛音厄肉疱步孝反頷車上戶感反頸骨上居郢反眼匡丘王反正作眶肋骨上郎得反兩腿他罪反脆危上七嵗反無梢所交反與篅市專反洟唾上他帝反昉膏上音方正作肪又方𠕀反悞翊從上羊力反下自用反撫塵上芳武反擊也拍也城墎音郭森竦上所岑反下息勇反痆斯上女八反栗枳上力日反下吉以反第五十八卷恬怕上徒兼反下普百反門閫苦本反倮者上胡瓦反無衣也聾聵五恠反貧寠其禹反澄睟相遂反視㒵也潤也又子對反目際也䣑肆上直連反謦欬上苦頂反下苦愛反暨乎上其既反遍捫音門險詖彼義反恐愶許刼反第五十九卷稸用上許六六二反聚也積也正作稸如犀音西第六十卷無字皇第七帙第六十一卷歰摸上所立反下莫乎反乾燥乘早反狂𤉢上巨王反惚恨上奴老反又音忽悞夫音細臺舘音貫姝咽頸上尺朱反中烏堅反下居郢反前曰頸後曰項膺平於陵反傭纖上容反髀股上步米反下公五反王市軟反盲𥌒音股劒矟所角反涕唾上音剃正作洟王憲許建反迯走上徒刀反原隰音習下溼曰隰百卉許鬼反枝蔓音万蓊欝上烏公烏孔二反舩栰扶月反寶𨥥古猛反綢雨上直由反蔫萎上於𠃵反下於為反旌皷上子盈反警寤上居影反下五故反覺也經作悟非用悒慼上於立反下倉歷反聖牀音床樂之審反正作枕金綫音線第六十二卷甛美上徒兼反鞌韀上烏干反下則先反鞦轡上七修反下兵媚反鞾帽上許肥反下莫報反青鞭卑連反金翅音施神龜居追反舊并列反穿鑿音昨傲貴上五告反騣尾上子紅反旒蘇上力由反金鎻桑果反耳璫得郎反之帒音代掉動上徒了反樓櫓郎古反門閫苦本反門摳尺朱反櫨拱上郎胡反下居勇反彫鏤上丁聊反下郎𠋫反𢁙望上許衣反𭏊下音遅亦云婆稚修羅名此云睒婆上尸染反柔䎡而兖反踟躕上直知反下直朱反第六十三卷羸信上力垂反曲㩕力丁反㖶羅上烏𠔃反龍象王名也又因烟二音或云翳羅婆那或云伊羅婆那或云哀羅𧿡拏或云藹羅伐拏繮鞚上居良反下苦貢反四葙息良反正作箱鶬鵠上郎反下胡反毀訾音紫第六十四卷輕躁子告反椽柱上直專反般籌上布姧反下直由反緘婆上古咸反及劓魚利反稱盤上尺證反瘡疣于求反迭㸦上田結反利上疾反第六十五卷焦惚音𢙉來往上郎才反閉相上必計反憒𡗚上古內反下女㒵反第六十六卷窓牖由柳反騏驎上巨之反下力真反仁獸也尓疋曰身牛尾一角正作麒麟也第六十七卷沮壞上才與反淤泥上於去反倫正普吉反第六十八卷刖鼻上魚越反絕也斷也鎚擣上直追反下都老反蹉蹹上倉何反下徒盍反籚𥯤上郎胡反下為鬼反蒸煑上之陵反挑目上他聊反鉾矟上音牟下音朔穿剌音㓨第六十九卷樓𨷂丘月反欄楯上洛干反下食准反寮孔上力條反寱語上牛列反所粘女廉反魔羂古犬反煇赫上虛㱕反曰色也又䰟昆二音第七十卷厭𢙣上於焰反下烏故反汙泥上烏故烏臥二反下奴計反始第八帙第七十一卷投鹽余廉反淤泥上於去反腥臭上息丁反下尺右反枝蔓音万憒閙上古內反綺澀所立反遆互上徒禮反下乎悟反第七十二卷覺寤上古孝反下五故反嘶破上斯𠔃反騾聲上洛禾反驢父馬母也或馬父驢母鉾矟上莫侯反下所卓反嚙草上五結反憘以上許里反剜掘上烏官反下巨勿反昂頭上五郎反欠㰦音去空噍才妙反嚼也裸形上胡瓦反憘讒仕咸反冝作饞巷路上胡絳反街收𣫍上尸由反挾怨上胡頰反輕蔑莫結反毀訾音紫羞耻上息由反第七十三卷𮏴脉上久殷反脾腎時忍反肝脯上音干下芳廢反正作肺也又音府非胞膜上普交反下忙各反腦胲上奴老反下古哀反飴也腦髓也言腦中髓如稀餳也正作䬵暟二形洟唾上他計反肪膏上音方𭥲也乳膽都敢反至跨苦化反至市軟反至踝戶瓦反蒸熱上之剩反胞胎上怖交反餳餔上似盈反飴也下蒲故反嚼食餧子也飴音怡遏浮上烏割反𭥗者上莫報反枯燥乘老反皷脹知亮反折樹上時列反槯上布𪪺反下自迴反破析先擊反掘強上巨勿反正作倔麦尺沼反孔竅苦𠮧反掘作上巨月反第七十四卷恾怖上莫郎反於頸居郢反苦瓠音護婆上而林反正作紝䋕二形也此言苦練木也悞挹持上蒲保反正作抱也第七十五卷銅鍱音為蹬都亘反正作隥陁㝹奴侯反窯師上余招反寶篋苦頰反第七十六卷轂上古木反下文往反鉺𤦲上而止反下巨魚反摩捫音門摸撫持也粳米上古盲反亦作秔稉二形糠糩上苦郎反下苦外反扚撓上市斫反下呼高反紺艶音焰美也人䏶步米反柔䎡而兖反𢁙有上許依反視瞬音舜𧨏應上音義善也第七十七卷彊梁上巨羊反謙遜蘇困反問訊音信訶耐奴代反第七十八卷屎尿上尸旨反下奴吊反搥其上都迴反亦作塠𢤱戾上力孔反憒𡗚上古內反下女㒵反揵䭾上巨焉反下徒个反貧嗜音視牀榻上助㽵反下他盍反利上自反施遺以遂反火焱音焰問訊音信洴沙上蒲丁反或作蓱萍虺虵上許鬼反蜈蚣上五乎反丁古紅反毒螫尸亦呼各二反第七十九卷瘡𤻧音盤鐵輪上天結反鞭打上卑連反菓蓏郎果反刑戮音六可恕音庶尒諾而者反今作也又奴各反坑塪苦感反踊跳上音勇下音條蹇陁上丘𠃵反正作褰騫二形也比丘名褰陁達多或云騫荼達羅或云始欠持唐言缺財也悞第八十卷𦟛纖上容反縵莫官反正作鞔過膝音悉言上而兖反柔也佷戾上胡懇反如犀音西儲積上直諸反瘦上力垂反睒子上失染反抒大上音序渫也除水也亦作汿又除與神與二反渫音𦵮達拏女加反啇主上尸羊反正作𧷮作雉直旨反給恤相律反羆身上彼皮反焚燎力小反作兔他故反諸兔同上竹筒音同種蒔音侍盪突上他郎反下徒骨反䞉長上實證反下直向反多也上正作賸樂憙音喜又許記反毀呰音紫上田知反下音交製第九帙第八十一卷城墎音郭燻香上許云反鸜鵒上音瞿下音欲形戮音六戰掉徒了反躃地上毗益反顦顇上才焦反下才醉反濬流上相俊反深也戰慄音栗䏶如上步米反長腨市兖反毀呰音紫纖𦟛容反千㪶胡屋反第八十二卷撫喻上芳武反安存也輕子到反謿譁上竹交反下呼𤓰反大言也牽抴上去堅反下以世反財賄音悔問訊音信戲咲音笑相上乎故反𮞏也差也𢁙望上許衣反躑躅上持隻反下持玉反上古犬反洄澓上音迴下音伏淤埿上於去反讁罸上吒𮧓反出上奴登反挮隥都亘反貯聚上知與反耗呼告反減也舩栰音伐巢窟上初交反麞鹿上之羊反憒閙上古內反第八十三卷警覺上居影反胎苦角反如昨含反處蠒古典反綜習上子宋反讒見上音才正作纔也又仕咸反悞也第八十四卷中姦古顏反鄙弊上悲美反輕躁子告反邪僻上似嗟反下普益反兇險上許容反掣繩上昌列反下市陵反第八十五卷較試上古岳反藏倉乱反甲冑丈右反上居妖反馬高六尺也字義冝作高也恣也第八十六卷捫摩上莫奔反羼提上初諫反此云忍辱金屣所綺反第八十七卷俎壞上才與反正作沮也又音阻俎豆禮噐也啇主上尸羊反正作𧷮商二形也又音的悞第八十八卷一盞側眼反撾打上竹花反癭長上於盈反緾也諸經多作嬰字也又於郢反非嘊喍吠上五街反中助街反下扶廢反辱鎧苦改反第八十九卷憒𡗚上古內反下女㒵反鑯鍱上天結反下羊接反瞻䀎音麵殞絕上于愍反涕唾上他計反第九十卷沮壞上自與反莚上無販反下以箭反篾戾上莫結反下力計反一徒官反翱翔上五高反下似羊反文第十帙第九十一卷憒閙上古內反𢪛淚上文粉反毀呰音紫炫曜上音縣明也獷古猛反恬然上徒兼反沮壞上自與反呪詛阻䟽反廛𨳰上直連反城市內地也亦作𫮈下胡案反里也閭居也垣也第九十二卷著上都南反正作躭法羸力垂反劣也疲也諠雜上許元反偈伎上音昌正作倡也悞擾上子到反下而沼反憔悴上自焦反下自遂反沈重上直林反瘡疱步孝反正作靤聲嘶音西佷戾上戶懇反愛蔓音万上卑進反下昌隻反謇澀上居輦反下所立反第九十三卷草簁所綺反澡罐上子老反下古乱反疾上才反鞭杖上卑連反刑戮音六挑眼上他條反𧈸䖟上音文下音盲蠅音早正作𧎮毒螫音釋又呼各反第九十四卷牽應上去堅反下於證反屏猥上并郢反下烏悔反骨𤨏乘杲反第九十五卷試鍊音練藻飾上子老反文也姝盛上尺朱反抌席上之審反貨賄音悔竊作上千結反殘剝補角反踏之上徒盍反踐也正作蹋第九十六卷拘絺夷反啇估上音傷下音古讌會上一見反圊廁上七情反旅館上力與反下占乱反舍也𨒫旅館謂迎客舍也警畏上居影反如扸先曆反駃河上所事反食上徒官反痰𤸌上徒甘反下於𣓏反經作蔭非義也編絡上卑連反下郎各反關宂上古還反下玄决反七竅苦𠮧反殨爛上戶內反下郎歎反鼻中洟他帝反鼻液也眵蟲上尺之反下直中反磨鎣於定反餧狐上於偽反嬉遊上許記反哀慜眉殞反第九十七卷拘睒失染反婚娶七句反頸項上居郢反下胡講反前曰頸後曰項也上又巨成反被軛音厄乳餔音步費用上芳沸反易上莫𠋫反彫刻上丁聊反下苦得反㘁𠮧上戶高反躭嗜音視霔雹上朱句反稼穡上音嫁下音色窯師上羊招反焚燒上扶文反正作焚焚燎力小反涎洟上序延反倉廩力審反穬上古猛反下以力反唼食上子荅反游泳上音由浮也下音咏流也潛行水中也野雉直履反跳躑上音條下音擲災摽上子廉反正作尖也䥫觜即委反探啄上音貪下音卓煻煨上徒郎反下烏迴反灰火也蒺䔧上秦七反下力夷反銛利上息廉反第九十八卷諛諂上以朱反穿鑿音昨沮壞上才與反毀也壞也第九十九卷無迮普吉反寶屐巨𨒫反𦳈麻上早𠔃反正作𦱔蓖二形也又音毗蒿也非躑躅直玉反小栰音伐大舶音白若蚔音氏舌取食也正作舐𦧓舓三形懷娠音身第一百卷上他帝反除也今作剃也又徒帝反非也眼眴音舜目動也又如春反傭䏶上容反下步米反腸上市軟反下直羊反字第十一帙第一百一卷怛姪上多達反下田結反替哆都可都个二反羯椑音卑或作裨又蒲卑反堵嚕上都古反下盧古反𭉮仾上尸戰反帽提上莾報反央矩俱禹反索𨢘呼𠔃反輸商句反使咤雅反又加反此二𭃄皆借呼也又步加反非唎上居𠧒反下力至反馳上蒲沒反下音䭾悞駞𡀔音路𪾼嚩上於計反下無可無个二反唎㖿余歌反去聲呼互相上呼故反寬廣上苦官反憒閙上古內反沮壞上慈與反第一百二卷奮迅上方問反捷疾上自反剜身上烏官反割股音古全身上自宣反上尺證反豪𨤲音狸大推文追反撾擊上陟花反羇羅上居冝反絆也正作羈也第一百三卷蠲除上居緣反迫窄阻伯反昏耄莫報反羸瘠上力垂反下秦昔反戰掉徒了反諠猥烏悔反右音第一百四卷鬀除上他帝反蘭拏奴加反腐爛上扶府反下郎歎反第一百五卷把棓蒲講反捉塊苦對反亦作由右音昔愆丘𠃵反氛馥上芳文反下音伏第一百六卷䎡語上而兖反能古犬反倫匹普吉反一待官反僻地上毗益反倒也正作躃頓抴音曳血宍而六反正作肉也俗脂肪方房二音殞沒上云愍反第一百七卷叡智上以芮反欻然上許勿反悕望上許衣反板椑音卑補也增也附也助也正作裨也又毗益反棺也匍匐上音蒲下蒲北反以手膝行也攀絳古巷反瞋憤扶吻反誅戮音六澀所立反第一百八卷綩綖上於遠反下以連反姝妙上尺朱反暫瞬音舜蹔眴同上鑽牟上倉乱反正作䂎佉陁上丘迦反脚蹹徒盍反木音盂姙身上而甚反第一百九卷𧿡陁上蒲末反新嬾奴困反弱也正作嫰㜛三形牀榻上助㽵反下他盍反火𣴟戶管反麻紵直與反恣態他代反艶美上羊贍反調謔許約反夫音細眉上側瘦反蹙頞上或作顣子六反下烏割反鼻䫜促㒵妖治上於反下音野正作冶䫃䀎音麵逶迤上於為反下徒何反行㒵也或作委他尓疋曰委委他他美也下又音移結㧧音踈嫡婦上丁歷反正也君也羹臛上古盲反下呼各反糧上古盲反下或作梁力羊反稻名也花卉許鬼反樓櫓音魯易上莫𠋫反正作填咽一結反園圃音補卑愻蘇困反不完戶官反鞋上戶街反下無發反靴履上許肥反多蓄六反積也聚也又許六反走跳音條斯此反腰跨苦瓦反亦作髁也又苦化反亦作胯也又應和尚經音以䯊代之苦亞反蠶虫上自南反糸縷上音覓細絲也作蠒古典反小棗子老反字從束音㓨或酢倉故反今作醋浮坘多𡰱反經自出縫腦上扶用反膓肺芳吠反正作肺肝腎時忍反脂𦝓桑安反脂也又經音義作肪𦙽涕唾上音剃正作洟髭上即斯反下卑進反牢鞕音硬稀軟上許衣反有甛徒兼反蓊欝上烏公烏孔二反鎧甲上苦改反控轡上苦貢反下兵媚反騗騎上譬見反下巨𡧱反第一百一十卷微咲音笑圊屏上音清下蒲政反字統云廁也正作偋庰二形孫愐韻說文作屏規求上居隨反妍醜上五堅反箭鏃子木反喘息川兖反心憙許記反好也正作憙耳璫得郎反喎戾上苦乖反下力結反揩析上苦皆反下先擊反火焱音焰又呼𨵙反火花刀𣓞所角反賊趂刃反駮布角反鍮石上他侯反擘𭠧上厄反兩手分破利鉄音夫令身上自宣反牽挽上去堅反下無遠反登豆上烏官反乃第十二帙第一百一十一卷諛諂上羊朱反警覺上居影反寤也戒也不燎力小反如犀音西毀呰音紫𭷥牛上莫交反正作𤛆𠧒匂音盖求也正作丐𠣏二形也又以旬反悞自挑他條反坌以上蒲悶反正作坌第一百一十二卷編入上布玄反俎壞上自與反戲𠸍音笑人𢭃都管反亦作短撾打上知花反憙樂上許記反自音違百䅽古木反稟實上兵錦反悲呺音豪哭也正作號也易曰先號咷而後㗛是也又音囂非也躃地上蒲益反雜世上才合反如虫音仲亦作蟲瑠瑀上音留下音离下又音禹悞也依猗於綺反螥蠅上錯郎反下羊陵反𦒱𢱊音亮治也笞也如犮苦反憒𡗚上古內反下女㒵反俗戒上似欲反味𧢻音觸𢤱悷上力董反下力計反𤻕𤺨上於容反下楚床反㵱沒上疋遙反下莫勿反𢶕除上即淺反扮押上爭巧反下古狎反正作𤓰甲善濡而兖反又音儒彼音岸逯得上音代正作逮𭎟舩上普柸反未燒瓦也正作杯下常專反第一百一十三卷道龔居容反儀式尸力反恭恪苦各反掉動上徒了反動也鬀頭上他帝反瘖瘂上於今反下烏雅反矬陋上昨禾反下勒𠋫反側戾力結反咲上尺之反夭上於小反離扼音厄捫淚上莫本反拭也如上徒官反堅硬五更反獷古猛反稗麦上蒲拜也穟生上徐醉反逋生上布乎反穭也嚴餙音識滲浴上子老反正作澡瘡疣于求反應倩七性反易上莫𠋫反鞭打上卑連反讁罸上知𮧓反下音伐釘挓知格反張也開也正作磔也又冝作厇音摘張也俗火焱音焰曾眴音舜第一百一十四卷麞鹿上之羊反諭諂上羊朱反適意上尸亦反漱口上所右反又蘇奏反淨滌徒的反諛諂上以朱反蚋子上而稅反浣濯上戶管反下直角反善綴知芮反補也善縫音逢綻壞上宅莧反衣縫解也亦作袒組二形也輕躁子告反一百一十五卷无字第一百一十六卷金丱古猛反見字樣說文孫愐韻說文亦作丱金璞也與礦同也又串𡖉二音非呼也鎚打上直追反樹胞疋㒵反第一百一十七卷淳淑上市倫反下市六反瘳愈上由反下以主反濡音上而兖反菩薩名溥首上音普經中亦作普首菩薩名也或作溥音儒經中或作濡首或作軟首消𡨋莫瓶反頒宣上布還反祐上古瓦反耗呼告反蠲除上吉玄反憺泊上徒敢反下普百反正作怕鞕音硬恂恂相倫反不挍古孝反打也不慍於運反不殆徒改反懈也正作怠痛痒羊兩反炬矅音耀泛流上芳梵反便摸莫胡反姝好上尺朱反美也好也無矩俱禹反𭗲險上許冝反字從戲下亦作嶮蔭蔽必祭反殃舋上於良反下許覲反恬憺上徒兼反下徒敢反澹泊上徒敢反下普百反驛使上羊歷反馬也薄尠息淺反少也而不音視正作示又音祇非也行上巨支反喘息上川兖反饕餮上他刀反貪財也下他結反貪食也癖者上毗益反倒也正作躃也又音劈非也第一百一十八卷悕求上許衣反親𬽦音求岨邃上音阻隔也又七余子余二反非曲隘烏懈反抄𢱊音略為均音俱苦也正作拘別本作物彼亦悮門閫苦本反懷抱步保反正作抱憙忘上許記反牀㯓上音床下音塔婉綖上於遠反下以連反冠㥽上音官下音責小冠子也正作幘也倫疋普吉反屢申上力句反抑制上衣力反孳盛上子慈反厥年上居月反其也𢲻土上倉活反坋之上蒲悶反正作坌辯上才反𥥆𡨋上一了反慇勤上於斤反倦助上子个反助也作也為也副力助之也正作佐𠡃二形也又巨眷反非也悞第一百一十九卷慈晤音悟尋繹音亦明苦角反遆共上徒禮反第一百二十卷拘抧吉以反蔭覆上於禁反離欲音欲苦波上失占反仙人名丹荼宅家反仙人名林藪蘇走反那剌郎達反蓬上蒲紅反捿止上先𠔃反鳥宿也亦作拪林莾莫朗反白繩市陵反枯燥桑老反羯上尸遮反面𭽪側瘦反擡眉上徒來反倡伎上尺良反携持上戶圭反蝦蟆蛭上戶加反中莫加反下之日反並水中虫也荻葦上徒的反下云鬼反蒲萄上薄胡反下徒刀反易上莫𠋫反雲涵音含水澤多㒵亦久雨也正作二形濠塹上戶高反下七焰反隄防上仾提二音風濤徒刀反鼉上魚喧反下徒何反鯨鯢上巨亰反下五𠔃反搖颺上羊高反如蠶昨含反作蠒古典反亦作繭皯上古旱反下以證反瘦上力垂反悞輻轄上芳六反下行瞎反二音𠕀轅軛上于元反下烏𮧓反髑髏上音獨下音樓膓肺芳廢反肝𦝩音胃鈴都果反前垂者也正作𥿰𦀉二形懷妊而甚反炫曜上音縣明也鵄吻上尺夷反下文粉反藻飾上子老反眺望上他𠮧反軒㩜胡黯反終歿音沒彫顇自遂反輕躁子告反羸瘦上力垂反正作羸也垢汗音翰㽄破上斯𠔃反遺瀝音歷母䏶步米反雌黃上此斯又藥名龕室上苦含反秔稻上古盲反下徒老反寥亮上力條反遠聲也正作嘹亦作憀吟嘯先𠮧反讌會上一甸反嬉遊上許之反中夭上知仲反下於小反迦潭音覃枯𤍜桑老反哽咽上古杏反下一結反欻自上許勿反流延正作涎序延反折傷上市列反夭枉於往反摩捼奴迴奴禾二反𦟛長上容反垂皺側瘦反皮緩㒵黧皯上力夷反斒也又音黎下音稈耏毛上奴代反也又音而獸多毛也斑也繭蠶上古典反下昨含反蒱上薄胡反下徒刀反正作萄黃毯他敢反芬馥上芳文反下音伏其觜即委反苦澁所立反合呼昆反雜糅女右反呼噏許立反躭欲上都含反下余玉反陁上莫官反辟諭音喻垂徒各反正作鐸鞞鐃上毗𠔃反騎上皷也下女交反皷似鈴無舌𧋠皷上洛禾反正作蠡下音古字從蛟上音文下音盲正作蚊蝱也悞𭞽上許偃反車慊也正作㦥不輟陟劣反臺榭音謝花𥿰都果反金翠七醉反旈音流踐踏徒盍反櫨拱上音盧下居勇反遆相上徒禮反繪以上戶外反氛氳上扶文反下於云反肚不亞上徒古反下徒結反正作凸也悞珠璫得郎反修委於為反修長也委美也曲㒵也輝艶音焰脆草上七嵗反環珮步昧反嚬妬上毗反眉瞋㒵也正作顰也上丁故反倨上居妖反下居去反陁上莫官反跳出上滌聊反惶遽其去反亦作懅䬃便上蘇合反銜喙音卓又許穢反悞桃舉上徒了反正作桃縵陁上莫官反奄相上於撿反忽也歔欷上許居反下許既反𭇺嗟上子私反正作咨也下子邪反𨓤已上他對反戲處上許義反種𮁽昨木反親舊巨右反故也正作舊也服大方廣三戒經等四經十卷同帙大方廣三戒經三卷上卷𠌵馬上似兩反騏驎上巨之下力人二反仁獸也正從鹿熊羆上音雄下音碑獐鹿上音章出字樣𦍘上魚袁五官二反野羊角大者可為罇罍也正作羱下丁𠔃反眾狩音獸鸜鵒上其俱反下余玉反𩿦上九愚反下吉以反正作拘枳鳥名也此云鵶鷗也又上音瞿下音紙非此呼也盖率意從鳥作致乖字躰𩾜上音扶寶積作鳬又呂陟反似鳬而小鴦上於元反下於良反鵝鴨上五何反下烏甲反里上力耳反即是𭄩故知𭄩字是鳬字也山鷄古𠔃反正作雞鷄二形𪀫鷄上助俱反烏鴩直尓反正作雉也又逸迭二音非也所惚音𢙉茹食上而庶反緊祝上吉忍反下尺六之六二反樹名也諸經作甄叔迦毗𨢘呼𠔃反木𤓰古花反梨㮈奴大反菓名亦作奈𡰱駒音俱樹名豫章上余庶反下正作樟勳陸音六經作陸沉上之然反樹名也應云栴檀沉水也不俻音俻牛蕀九力反亦名馬桵花似薔薇充潤上尺隆反正作充也花莫顏反遂俗音俗其𧢻音觸為臺徒來反无音狗正作垢樔窟上助交反彼音岸髺音計𠇈主上相遷反悕望上許衣反貫䆤上古丸古乱二反下昌專昌二反狂讇染反互相上胡故反䛴語上丘倚反毀呰音紫毀也捕鳥上音步捉也師上力反戲挊音弄不音徒婦上古瓦反揣食上徒官反禁剬之世反正作制止也斷也卬相上伊信反中卷摛離上尸者反正作捨也又音魑悞撾打上竹花反花莫顏反不嬉許記反孔宂玄决反生𮏯七賜反老耄莫報反營事上余傾反正作營忽所立反頻蹙子六反貯聚上猪與反葙篋上息良反下苦頰反並悞財賄音悔貸財上他得反從人借本也正作貣也又他代反非以鞕卑連反正作鞭一筞初責反依猗於綺反碎財上蘇對反寶積經作騫荼達羅唐言缺財亟舍上丁𠔃反正作互寶積經作迦盧底輸唐言鬼宿比丘名也眾𡗚女㒵反唌唾上序延反正作涎又徒丹反非也輕子告反正作躁膿厚上女容反正作醲𨑊二形又或作腆他典反又音農非謪罸上知𮧓反閞邏來个反下卷渿著上而陝反正作染嗜酒上神利反捫摸上音門下音莫我挊音弄卄郎合反正作臘互唱上胡悟反輕𠸍音笑渧㕸上音提下丘立反正作啼泣也上又音帝非也吁坐上音呼下苦屋反正作𧦝哭也並悞逃徒骨反蟥䖝上音黃灾䖝也正作蝗也完具上戶官反聾啞上郎紅反下烏雅反捶上補各反下之水反盲瘻力主反正作僂也寶積經作盲傴也又力朱反郎豆一反並非也𭼔𢙣上七余反正作疽療戾上力小反絞脚不正也正作繚也下力計反曲也聾騃五駭反輕子告反正作躁矜愍上居陵反柒柈上青悉反下音盤皼俳上音古動也下蒲拜反韋囊也正作鼓𣡖捉搥音鎚以鍜丁乱反排囊上蒲拜反推鉗巨廉反无量清淨平等覺經兩卷上卷牛呞音詩廋𢭃上所右反下都管反㜾獨上古胡反寶珥耳餌二音長者名生僂音縷信女也蜎飛上烏玄反蠕動上如兖反邊幅音福錠光上徒徑反亘羅上古鄧反普逯音代適莫上音的釋名曰適底也平也底止也言法無止住處也雄傑音竭妷音逸薜荔上毗計反下力計反𦒱𢱊音亮焜煌上音混下音皇𠧒𠣏音盖棠柱上庚反下知主反正作撐拄也又音堂非儲飢上直諸反佂忪上之盈反下之龍反施貸他代反蒙籠上莫公反下勒東反佷上丁禮反下恨字恃怙上時止反下胡古反𠧒音盖劣上力垂反正作羸曝露上步報步二反日乾也正作暴也省瘦上所景反正作㾪至膝音悉好憙許記反又音喜𦋺疊上居例反下音𤗊細毛布也𣮧也糜盡上美為反爛也散也衣裓古得反拘蝅昨含反花名也諸經作優曇其柄彼命反本也柯也霍然上呼郭反或作㸌廅樓亘上烏盍反此云明明者光也下古隥反此云世音即光世音菩薩是也摩訶那鉢此云大勢至菩薩雷二音疾雷也痛痒羊兩反幾牧莫廻反駃疾上音使速也正作駛又快决二音非也下卷浩浩浩浩阿陁經作浩浩皓皓並同戶老反浩者浩汗大水㒵也皓者皓然明白㒵也光也悠悠音由遠也探古上他含反起塌音塔有鉉玄犬反鼎耳也按此但取耳字訓也從倚上斯此反移也移處立也悷上力計反下力向反悲也下正作恨應和尚未詳蹉跌上七何反下田結反恢廓上苦迴反淡安上徒濫反安也靜也正作倓苞羅表裏上布交反下力耳反事譊女交反唐突徒骨反觸也或作搪揬慉氣上許六反𥥆𥥆一了反各勱音邁勉也強也諸經作𭦟目盤反高昌人謂聞曰𭦟也曚𡨋上莫紅反仾突上丁禮反捴猥上子孔反下烏悔反憒譊上古內反奪之上徒活反虧負上丘為反也慊苦上苦兼反勞也虗也堅持意也正作謙䌠二形也又苦點反非滛泆上以林反下以一反適五上音摘罰也正作謫也又音的悞不貰世社二音𠧒丐音盖瘖啞上於今反下烏雅反尫狂上烏光反及逯音代及也過讁音摘轉貿莫𠋫反怛取上徒旱反正作但侫諂上奴定反諭媚上羊朱反詭也用支上蒲弘反盜竊千結反尪力垂反䀎膝上疋莧反下郎代反滛佚羊一反迫䝱許刼反正作愶偃蹇上於㦥反下居輦反傲也正作偃𠐻也頑健上五還反癡也下巨建反𢪿較上古胡反下古岳反游散上羊修反下桑旱反串數上古患反下所卓反酒上苦擊反正作喫二形嗜美上神利反魯扈音戶魯扈自縱恣也仾突上丁禮反前作𢪔突睢吁上許維反下况于反舉目視也僥倖上古堯反窈窕徒了反浩浩上二戶老反下二莫郎反滄海狀也冝作吂不知也㢮張上失支反設也正作施又尸尓反悞糺舉上居酉反焭焭巨營反揆度上求癸反圓䂓上音徒謀計也思度也下居隨反正作圖䂓湔洒上子仙反下先禮反嚴慄音栗開闢毗益反跛躄躄上布果反中布蓋反下居輦反下正作蹇遠炤之曜反與照同迺當上奴改反無量壽經兩卷上卷愽綜子宋反慴怖上之涉反又音牒摑裂上古麦反殖眾上市力反係念上古詣反戢重上阻立反冷曘奴管反或作微灡浪干反愚鄙悲美反嚮茲上許兩反當也受也正作畗也下子慈反煒曄上云鬼反下云輙反煥爤上呼乱反下郎歎反下卷昱爍上羊六反下羊略反光明也正作煜爚也僉然上七廉反該羅上古哀反皆也俻也矇上莫紅反下莫瓶反突上丁禮反下徒忽反卒嵗上子律反惣猥烏悔反憒擾上古內反下而沼反謙苦上苦兼反无量清淨經作慊苦倫匹普吉反煞戮音六吞噬音誓齧也正作噬不赦音舍𠧒丐音盖不逮音代諛媚上欲朱反諂也䀎睞上普莧反下郎代反𡆾然上俱永反𢪿較上音姑下音角賑給上之刃反𨟼酒上都南反上音魯下音戶宎下徒骨反正作突抑制上於力反僥倖上音澆下音幸浩浩如前具釋施張上失支反設也安也𠛩舉上居酉反字從糸從比几音鳩繚也煢煢巨營反伀伀音鍾灾𭙿力世反滉瀁上戶廣反下羊兩反水㒵也浩汗上戶老反下戶案反大水㒵也阿陁經三卷內題云佛說諸佛阿三耶三佛薩摟佛檀過度人道經上卷目錄是兩卷見藏三卷裝拘鄰力真反正作鄰也亦云拘倫即陳如是也或云陣那此云知本際亦云了本際扷智上蒲未反末𡉶上莫鉢反下仾紙三音正作坘也維末坘此云无垢扷𢪕丁禮反比丘名迦為扷𢪕亦云梵婆提亦云炎鉢帝亦云伽梵鉢底此云牛呞也揭質上居謁反下兵義反下正作貲賁二形亦云刼那此云多睡邠提上彼巾反脾𢪕上居延反中步支反下丁禮反此云了深定湏楓音風䗍越上力支反亦云離婆多羅倪五𠔃反波鳩䗍洛禾反即薄拘羅也蔡揭上音薩下音竭或云莎竭或云沙曷此云善來比丘名俱𨖴音第夜蔡音薩方言也如南人呼蘇為喚梭為之類也桵音莎七禾反陁上蒲末反朱蹄徒𠔃反亦作蹏扶𢪔底帝二音陁扈音戶滑攱居委居偽二反愈樓上以朱反䫛戶鉤反遬臾上蘇屋反下洛朱反扷和上蒲未反拘岑助今反潘波上普官反署提上時去反蒒耶上所夷反疧埿上丁禮反下音祇悞𤢌狩上巨今反下尸右反嬖荔上音閇下力計反或云卑或云薜荔此譯云餓鬼迊之上魚亰反正作迎遍以上補見反正作徧遍二形雄桀音竭特立也正作傑焜煌上音混下音皇蘭𣛝上洛干反下巡順二音淳金上市倫反𠧒音盖牚柱上庚反下知主反正作撐拄也上又孟反非也應和尚未詳拖上尸智反下他代反蒙悾下苦江反信也愨也苦貢反誠心也又音空佷上音帝𮑇壞上蒲袂反敗也𢙣也正作敝弊二形𮑇形上袂反掩也省瘦上所景反正作㾪也不駃音使中卷甛酢上徒兼反下倉故反盖樓亘上烏盍反此云明明者光也如光音天亦云阿會亘羞亦云阿波亘羞又如光壽天亦云廅天並是也下故鄧反梵言廅樓亘菩薩此云光世音无量清淨作廅樓亘也又古太古盍二反悞浩浩皓皓无量清淨經作四箇浩浩浩浩如彼已釋也昭昭汁遙反悠悠音由茗茗音條正作苕也探古上他含反所鉉胡犬反鼎耳也按此但取耳字訓也又无量清淨經云隨其功德有鉉不鉉此經云隨其功德有所鉉不鉉剩所字也從倚上斯此反悢上力計反正作悷也下力向反悷悢悲恨也上悞下卷羅表裏上布交反裹也正作苞下音里无量清淨經作苞羅表裏也上又布高反非也譊譊女交反屏營上音并傍偟也佂伀也稸氣上許六反憂𢣷音具正作懼也膓盡上斯義反正作賜也焳心上子消反正作燋朦𡨋上莫紅反𢪔宎上丁禮反下徒骨反便𢭀上蒲田反下徐全反正作旋也捴猥上子孔反下烏悔反憒譊上古內反下女交反心乱也正怓亦作呶𭦟佛上莫盤反聞也高昌國人為聞為𭦟佛無量清淨經作勱慊苦上苦兼反勞也虛也无量壽經作謙苦也表裏音里讁五上知革反罰也過也不貰世社二音貸也𠧒音盖瘖瘂上於今反下烏雅反憋𢙣上蒲袂反困也𢙣也正作弊也无量清淨經作弊也又鱉瞥二音尫狂上烏光反及逯音代轉𧴵莫𠋫反侫諂上奴㝎反榆媚上羊朱反冤枉上於元反下於往反正作冤枉也矇聾上莫紅反破挨才木反祝祝之六反无量清淨經作專專應和尚未詳膝上疋幻反下郎代反正作䀎膝也悞𢙣態他代反攻城上古冬反挌闘上古額反擊也闘也假貸他得反正作貣較上音姑下音角串數上古患反下所角反酒上苦擊反正作喫二形也𢪔上丁禮反下徒骨反睢吁上許維反下况于反僥倖上音澆偽也出孫愐韻又音堯國名也非此呼殃咎巨久反窈窕上伊了反下他了反深遠㒵也下正作窱也下又徒了反寬也好也浩浩皓皓上二戶老反下二莫郎反昧深暗㒵也又滄廣遠也无量清淨經及无量壽經並作浩浩也拖張上失支反正作施也糺舉上居黝反焭焭巨營反忪忪音鍾揆度上求癸反圖視上亦作音徒謀計也思度也下居隨反正作規字從夫見俆作上似余反欺殆徒改反忩洞冝作𢛌恫應和尚音義作𧩟詷上倉弄反說文云𢛌恫不得志也𧩟詷言急也无量清淨經云周旋不安是也湔洗上即仙反洗也浣也嚴慄音栗𠷠善上苦禮反謙愻孫困反頭𦜩音𢙉則遍見反正作遍徧二形喑者上於今反瘂也正作瘖也文子云皐陶瘖是也傴者上於禹反蔡𮜨上桑割反下倉割反應和尚未詳若曹上而斫反尓也汝也下自刀反軰也那鋡音含第三果聖者名也梵言阿那含此譯云不來謂生色界更不來人間也衣阿閦陁佛國經等六經八卷同帙阿閦佛國經兩卷上卷阿比音毗蜎飛上於玄反下亦作蜚蠕動上而兖反諭諂上以朱反由譽正作猶豫疑也不定也讒言上仕咸反咲為上私妙反陂陁上蒲末反此云賢又碑賁二音悞提洹竭中戶官反亦云提和竭此云錠光即然燈佛也阿𨳖初六反與同僧那僧泹奴結反僧那言鎧僧泹言著亦云㽵飾也謂著甲也又云僧那大誓僧泹自誓也謂大誓㽵嚴也經作洹悞也上𨽦古厄反胷也正作膈隔二形也郭氏音垂又而涉反並非也絞路上音交又作交露諸經作交絡也又古巧反非呼悉𦿔必袂反相叩音口𤢌狩上巨今反下尸呪反薜荔上蒲計反下力計反此云餓鬼上又布厄反嵠谷上苦𠔃反這舉上音釋纔始也綩綖上於遠反下以連反杭頭上之審反榰頭物也正作枕適舉上尸亦反珠璣音機珠不圓也妊身上而甚反妷音逸上一了反下正作冥𨳰門上計反又結反塞也詎能上其與反羆極上音皮倦也下卷病所右反城墎音郭𦬔子上古敗反坘上丁𠔃反下莫卑反樹名也下正作諸經亦魚名仾羅嬈𡧱上奴了反亦作嬲下胡盖反正害撾捶上陟花反下之水反文殊師利佛土嚴淨經兩卷上卷闍貰音世貪恡力進反瑕疵才斯反恪心上苦各反殊桀音竭特立也正作傑門閫苦本反相棠宅庚反拘躄卑益反毒螫音釋裸者上戶瓦反猜恚上此才反恬惔上徒兼反下徒敢反澄停上直陵反下或作渟昺著上音丙下竹去反上悞汪汪洋洋上二烏光反下二以良反不猗於綺反了陰於禁反割判上普口反因咲音笑顯咲同上疇匹上直由反下普吉反酌上之林反琦寶上巨冝反生焉于𠃵反用瞢瞢下二莫登反憋𢙣上毗祭反𢙣也困也正作弊也又鱉瞥二音悞穬古猛反𢤱悷上力孔反下力計反侏張上陟流反誑也正作譸也又音朱非也綩綖上於遠反下以連反憒𡗚上古內反下女㒵反𨷂漏上丘月反常𢬘步保反正作抱往造七到反燕處上一見反𨷂漏上丘月反呪咀阻去反正作𧨏愁惚音𢙉沾汙上霑店二音冝作點字呼刈除上牛吠反怖懅其去反弊𢙣上毗祭反潭然上徒南反深水也冝作憺字音啖純淑市六反善也𭉊嗟上音資正音咨穢七到反正作操𫟎忽上呼光反諸作慌惚呼廣反想上他弄反塵埃烏開反二姟古哀反數名也十冓曰姟也亦作垓下卷跏趺上音加下音夫大坐也經音義作跤趺以交趺替之非也匂𠧒音盖篋藏上苦頰反鉤鎻桑果反晃昱上胡廣反下以六反苾芬上蒲結反下芳文反就塌音塔淡泊正作惔怕不訾即斯反思也法鏡經一卷目錄兩卷今一卷成序臧否上子郎反善也下悲美反𢙣也出筠和尚韻諸家韻並方久反周𢭀音由歷也行也正作遊二形也出三藏記作周遊也又音旋悞稟无勌上兵錦反下其眷反疾梨出三藏記作蒺䔧等上奴定反三𩲐音媚正作鬽孫愐韻作鬾信古瓦反尊耶徐嗟反不正也僻猥異也正作哀邪二形𤻀賤上於廢反𢙣也璅謗上桑果反小也字意冝作惢音鏁心疑也穢濁出三藏記作𤻀濁也其𭙿力計反懾懾之涉反怖也邁上徒困反避也去也正作遁遯二形說文作遯出三藏記作遁也剔上他歷反除髮也正作𩮜也靖處上情井反攘𤻀上而羊反開導音道教也引也正作導出三藏記作闓道聾瞽音古枕石上之審反漱流上所右反滌垢上徒的反臨淮音懷東齓上尸玉反下初覲反出三藏記作束齓謂𩭤角去齒也即齠齓也又得紅反悞也矇或上莫紅反景摸上居影反大也明也下莫胡反法也規也茟受上彼密反稽古上古𠔃反未戢㽵立反義壅於勇反心憤扶刎反口匪芳尾反正作悱出三藏記作悱𨷂疑上丘月反俟後上音仕待也庶有上尸去反冀也經文除饉其恡反比丘異号也謂除六情飢斷貪欲渇也按饉即飢也尓疋曰穀不熟為飢𬞞不熟為饉殆棄上徒改反𨶳音上去隨反眾祐于救反眾祜同上又音戶悞稽首上苦禮反𭤈演上芳無反多𢙣烏各反不善也或作𦷢二形並非除剔他歷反上音湏正作汝迺音乃溝港上古侯反下音講果異名也謂入流也亦云𥎀流也昆弟上或作晜二同古䰟反周人謂兄曰何貺音况和恊胡頰反合也墟聚上丘魚反壤者上而兩反諂上奴定反𭃄磋千何反𦒱𢱊力向反治也笞也搒苔上蒲音反下之反打也正作榜笞也糅毒上女右反鍼孔上之林反魅上知反下眉秘反正作魑也上又丘禹反悞臼注上其祐反表試尸志反表識音志標識也記也今疑試識二字與𢡠同尸志反憲教上許建反以𥩣直與反久立也正作佇竚二形𧈸䖟上音文下音盲正作蚊蝱也蟆子上忙各反似蚋而黑小也齧人甚毒應和尚未詳𦘺腴羊朱反𠧒丐音盖禽尸呪反正作獸上方經作禽狩猴上音正作獼下戶鉤反㹢狩上音加下音獸應和尚音義作作㹢𤞙以假玃替之上古牙反下俱反上方經作伽𤞙冝作猨音袁不𮓪丘為反𢲉察上求癸反度也正作揆也又七細反悞也食卒上音倉下七沒反錯忤音悟卒師上子律反勘能上苦含反正作堪戡二形殊巨良反正作彊質音亮修羅名後序著經上陟去反立也正作著箸二形縠德上冝作懿乙冀反美也大也又胡屋反羅繒類也悞𭽀然上倉贊反煥炳上音喚下音丙綢繆上直由反下美休反其愆丘𠃵反過也疣贅上于求反下之稅反腫也小曰疣大曰贅亦聚也玷缺上丁忝反下苦穴反瘢瘡上薄寒反矇矇音蒙謶得上書預反冀也正作庶又音斫非首悔上書呪反自陳罪也下呼對反改也懊也大乘十法經一卷可灌音官見也正作觀也諸經中皆云佛不可見頂也又或作矔音貫邪娙羊林反正作也又五莖苦耕戶經三反非也䛴語上丘倚反貯積上知與反牀榻上床下塔枷柙上古牙反下烏甲反撾打上知花反若俗音俗隧沒上直遂反落也又音遂悞𧴵易上莫𠋫反百迮普吉反佐㫑床䟽反正作助徧袒上疋連反又音遍悞𠰥捲巨貟反正作拳胞胎經一卷胞胎上怖交反押撥上音必正作蓽裨二形也下音鉢正作茇也藥名沙上乙冀反正作懿𡄻二形別本作也祝伽上之六昌六二反下巨迦反眼瞳音同堅核行𮧓反牀㩉音塔依猗於綺反䖝䗍郎禾反又字躰以胡孔反盝虫甲類也非如尺沼反或作𪍑蓮藕音偶成肧普杯普侯二反孕一月也完具上戶官反不虫音仲𥞩覆上古莖反正作耕胚胎上普杯反懷胎一月也與肧同陽燧音遂𤍜牛上乘老反若芠五盖反𣽈濕上而兖反煴𤏙上烏昆反下奴短反息創上正作瘜下音瘡兩毗忍反樹荄皆該二音根也流澍音注觚枝上古胡反廿力兖反痤短上昨禾反正作矬煩子告反鍜師上都乱反排囊上蒲拜反下奴郎反正作囊囊腹𦝩上芳六反下云貴反左䝱許刼反字從肉或縹疋沼反陶家上徒刀反項頸上胡講反下巨成居郢二反䩕上五孟反堅牢也正作鞕也下胡朗反剛強也正作行骯二形上又五郎反下又應和尚作胡浪反經押音甲梵甲冊也甕上烏莖反下烏貢反瓮上蒲門反正作瓮盆二形也下丁計反上又烏貢反悞尪細上烏光反瘖瘂上於今反下烏雅反槃創下音瘡正作瘢瘡跛蹇居輦反亦屯難也禿瘻力主反傴不伸也背曲也正作僂也又音漏瘡也非多膩女二反甛酢上徒兼反下倉故反今作醋衾受上丘今反酤劇上苦沃反正作酷也酷毒也下巨𨒫反上又姑故二音悞虵虺許鬼反陂水上彼皮反濼也乳哺音步揣飯上徒官反舌𭇇音氏正作舐也舌舐同上青莫丁反捲捥上巨貟反下烏乱反疥瘌音剌又音頼並瘡名痔下直里反㿈疽上於容反下七余反咳𨒫上苦礙反癡惷江容用三反愚也疣癃𤺴上于求反中力終反下居月反正作瘚也煩疼徒冬反臚脹上力魚反下知亮反席下上陟例反赤白痢也正作㿃也又音帶也琉繫上冝作摎同音流絞殺也又上方藏經作鏁繫乘果反二義通鞭杖上卑連反榜笞上蒲盲反下之反𦒱𢱊音亮曠野上苦謗反䖟上音文下音盲蛟蜂上音祇下音峯正作蚔蜂或作蜂也上方藏作廣野虵䖟𧌡䗦之難彼悞痛痒羊兩反普門品經一卷問訊音信溥首上音普諸經亦作普首也又或作漙音儒或云濡首或云軟首也海淵烏玄反慌忽上呼廣反柔䎡音軟䩕上五更反下胡朗反適住上音的又音釋別𧨏音義揵沓上巨焉反下徒合反憺怕上徒敢反下普百反无弊必袂反掩也正作蔽也又毗袂反悞𢭀觧上序全反下古買反无丁禮反正作底又音𦙁非也逯得上徒愛反蠲除上居玄反潔也弊魔上毗袂反矜濟上居陵反怖懅其去反適建上尸亦反下居彥反裳郁伽羅越問菩薩行經等九經十卷同帙郁伽羅越問菩薩行經一卷郁伽巨迦反長者名郁伽羅越祁音耆寵具上隴反長者名也正作寵也又音籠悞長跽其几反瑕璅上音遐下丘𨒫反正作隙周𣒀序全反贏劣上力垂反滴漠上音的下音莫幻𣴊疋包反悞諭諂上以朱反妷音逸憋𢙣上毗祭反𢙣也困也又鱉瞥二音非也癡音𡨋貪餮音䥫鍼𭉨上之林反下即委反為警音景強項上其兩反下胡講反𭉊嗟上音資正作咨也咨嗟謂讚歎也𠧒音盖問訊音信塵塵上音主正作塵也應和尚音義作塵蠱狐上音野古體野射獦力反正作獵𦿔上芳救反下袂反憒𡗚上古內反下女㒵反漏盡上郎𠋫反便咲音笑幻士仁賢經一卷墟聚上丘居反陁上蒲末反骨言仁賢巧𪐚胡八反聞不瘀也為人惺也正作黠也有方便曰巧有智慧曰黠也郭氏作烏兮反非用普徽音暉遠炤音照曄如上為輙為立二反光也𦬔子上古敗反瓶烏耕反長頸瓶也亦謂之也或作甇甖四形鎧錠上音登正作鐙燈二形下殿定二音紛馥上芳文反下扶福反𭼩蔽上於琰反正作𥜒也殿館古乱反怡懌上與之反下與益反蠲除上古玄反走竄倉乱反自韙為鬼反是也首過上音獸自悔其罪也𠬧愆也睡莫田反悞覺悟上古孝反下正作寤鐙明上都恒反无𭼩於焰反不嫌也未飽也正作饜探捉上他含反揵沓惒上巨焉反中徒合反下胡戈反誘嬈上余手反下奴了反擾乱也戲弄也亦作嬲决定毗尼經一卷給拖音施俎壞上才與反正作沮及逯音代正作逮帋施上之尓反犯塌音塔虹炎上音紅下音焰鉾矟上莫𠋫反下所角反迴裋序全反正作旋也又竪豆二音並非空捲巨貟反握手也正作拳也俗發覺淨心經兩卷上卷毀呰音紫不憙許記反好也捫淚上莫本反拭也不憘許記反好也正作嬉憙二形又音喜憘情也𠧒丐音盖膿䑌郎歎反呪咀阻去反正作詛迭相上田結反若陂音碑寘中上音置𣛰也設也亦作置也又之義反置也慊𢙣上胡兼反下烏故反井泊普反𡨜靖情井反多𠸍音笑𡱝牛上先𠔃反下卷輕子告反乾鞕音硬莖榦古岸反麁所立反瘡疱步孝反面生瘡也稟質上兵錦反遼乱上力條反正作繚嘶破上斯兮反正作𧬊蒙憒古內反籠知孝反猥濁上烏悔反財賄下或作𧶅同音悔財也經音義作財購非也蹇吃上居輦反語澀也重言也正作謇卯可上伊信反排毀上冝作誹音非謗也又步皆反推也憂填王經一卷娉焉上疋政反問也獲普吉反正作匹得聟音細步瑤音搖珠璣音機曳踵上尸人反正作申下之勇反足後也操指上力染反正作𣫍也又七刀七到二反並非也久悞也足躘七六反踏也正作蹴也經意謂佛行時不到地也諸經中云如來行時其離地四指而有印文現是也六度集云者申行多恚𣫍指步愚者築地諸經要集云愚者踏地並是也解脫道論云欲行人舉脚疾行卒舉脚不廣舉脚即此經云人申踵行是也解脫道論云瞋人急起脚急下相觸以半脚入地即六度集云多恚𣫍指步是也解脫道論云癡人起脚摩地亦摩下以脚觸脚行即六度集云愚者之築地是也言佛行足迹平穩不趿地下脚抽脚也又力用力鍾龍三反並非也悞䐗頭上竹魚反有𦜩音𢙉又音忽非腥𬛓上先丁反下桑刀反是胞疋㒵反有涕音剃正作洟也肝肺芳廢反膓𦝩音胃膀光上蒲黃反屎尿上尸𣅀反下奴吊反腐臭上扶武反下尺右反相柱知主反𮏴癵力拳反正作攣皮韜他刀反解剝布角反譖之上阻禁反原赦音舍宥也凶頑五還反魑魅上知反下眉秘反尠能上息淺反改操七到反不係古詣反籌量也預謀也正作計也渾沌上胡本反下徒本反處溷胡困反其上子荅反嗽也小𡂜也嗚也正作𠯗𠾱嘁四形也稚得上直利反幼也小也晚也應和尚以遅替之非也櫂家上宅角反愚𦿔必祭反女音計連也互求上乎故反車笮阻百反壓也毒許謁反蟽蝲也正作蠍諸經或作蝎也又徒冬反鳥名也非鋒釯上音峯下音亡以蕀居力反沆毒上直惎反正作赴彊上芳務反下居良反上正作超仆二形下正作殭僵二形超前倒也伏面地也僵仰臥也偃倒也身冒莫報反㔜亂上蒲沒反湏摩提經一卷碝妙上而兖反裨助上必支反城墎古霍反湏摩提菩薩經一卷勾蟲上九愚反下直中反知𧨏音義善也宜也抑制上於力反探識上音貪深取也褊袒上疋連反正作偏漚惒上烏侯反下胡臥反阿闍貰王女阿術達菩薩經一卷闍貰音世和𠶾音呵阤上蒲末反下徒何反槗曰兜上巨反中于月反下都侯反或云越兜因堤丁𠔃反邠耨上彼巾反下內沃反䗍越上力支反或云離越或云離婆多也胺波臾上烏割反下以朱反𠂢子上古花反熒火上戶營反正作螢互上丁禮反下徒骨反𠧒𠣏音盖又作匂𣏾音代舩也正作筏栰二形于柘上音乾下之夜反南人呼甘蔗也問訊音信捐讓上一入反蟲狐上羊者反正作蠱胞胎上怖交反鞞竭俞上步迷反下以朱反佛名也漢言離愁鞞末拘遼𡧱胡盖反佛剎名也漢言无垢濁光炎蘭𣛝巡順二音薜荔上毗計反下力計反栴檀廅上之然反下烏盍反夫人名也漢言月明盡汧胡經反正作形也又鄜州篇作苦田反非盡形同上此正憣上巨之反正作旗離垢施女經一卷邠耨上彼巾反下奴沃反虛音跡窓牖音酉𨳰窂上計反祠壇上音詞發也這見上尸亦反始也又之亦反老耄莫報反八十也憺怕上徒敢反下普麦反火告反正作耗愚戇陟絳反頭上苦昆反去也眉䀹音接目毛也正作𥇒也又五洽反非用也又郭氏音作閃攝二音並非也笳竽上音加下音于鷪鳥上烏𥝷反鵾雞上古温反穆天子曰鸛飛八百里郭璞曰鵾雞也赤𭪿即委反𦟛體上容反恭恪苦各反憔悴上自焦反下自遂反危脆此嵗反之許鬼反虵也正作虺也又五骨反悞坑塹七焰反一杓市斫反央舋許覲反愚騃五駭反敢訕所姧所諫二反謙愻蘇困反順也讒言上仕咸反諛訑上以朱反下徒我反欺也又徒何吐禾二反推得无垢女經等六經十一卷同帙得无垢女經一卷苻瓨下江反靡𢭀上眉彼反下序全反鹿𬧅市軟反危脆此嵗反一瓢毗遙反羅尸遮反樹名遞共上徒禮反更代反如音五問訊同上毀訾音紫微𠸍音笑文殊師利所說不思議佛境界經兩卷上卷酸鹹上乘官反下胡緘反控弦上苦貢反下胡堅反捷疾上才反繡柱上息幼反五色俻也從糸從肅聲攢攎上昨官反下洛胡反疊拱居勇反磊砢上洛悔反下洛可反儀孋力計反美也或嘯蘇𠮧反瞬息上音舜目動也或作瞚眴二同下卷怛姪上多達反下徒結反阿麼莫果反耻哆都可反睒迷上失染反亦作覢地𠼝力夷反佉契上丘迦反弭履上莫尒反遏梯上烏割反下他禮反下又他𠔃反婆拏奴加反曷寫上何割反遞相上徒禮反善軛音厄沮壞上自與反猗覺上於綺反七覺支之一也唐新譯經論並作輕安是也古經云倚覺也又於奇反非呼如幻三昧經三卷上卷常咲音笑光艶音焰亦作𧰟甄陁上之人反燕坐上一見反愚戇陟降呼貢二反枑上丁禮反下徒骨反止作恭恪苦各反扷擢宅角反澹泊上徒敢反下普百反怳忽上呼往反虛妄見也下正作惚憒亂上古內反乱也肅恭上息六反正作肅舊斯上方問反正作奮唯然上維癸反諾也等匹普吉反以撾陟花反瓌奇上古迴反量𢙉音𢙉床榻音塔亦作㯓稽乘朗反駭𡨋上胡騃反中卷懷遽其去反急也戰慄也亦作勮懅二形老耄莫報反柱杖上知主反僉共上七廉反皆也咸也慙上息由反牧餝上音問正作抆諸經作文餝也又音目非也刈嫉姤上魚吠反中自疾二音下都故反勗勉上許玉反下音免憒𡗚女㒵反毛力之反挍餝上與抆同也又古孝反不殆徒改反悒悒音邑汜流上芳梵反浮也又音似水名也下卷損秏火告反狂悖蒲沒反愚騃五駭反矛㦸上莫𠋫反大棒步講反黑冥莫瓶反六所追反無皃戶官反儔疋普吉反椎成上直追反殃舋上於良反下許覲反䫃䀎音麵芬馥上芳文反下音伏僥倖上古堯反下胡耿反懷懅其去反聖善住意天子所問經三卷上卷歌咏為命反割今作淨古文作瀞同疾性反淨潔無穢也栢梯經云自割淨身肉臠臠力兖反稱上尺證反下尺陵反璃莫姧反王羂古犬反中卷嚴餝尸力反床坐上助㽵反華㙜徒來反布拖音施彼音岸闇莫瓶反毛竪音樹闇窴莫瓶反又田甸二音悞也恐跳徒聊反躍也苦惚音𢙉不音違䆤漏上尺專反𦿔日上必祭反希有上許衣反一𭃄蕫下是菩二字也一𭃄董皆𥘉發心空迭田結反泡沫上疋包反秉作上兵永反下卷若賞音常藪上都口反下蘇口反正作抖擻懞上莫孔反又音蒙太子和休經一卷繖盖上乘旱反娙妷上羊林反下羊一反蜎飛上烏玄反𧑮動上而兖反捄觧上居右反正作救𧧷二形又俱求二音並非也履屣所綺反亦作簁二形傘盖上乘旱反便咲音笑太子刷護經一卷刷護上所刮反蜎飛上烏玄反又經音義作蠉許緣反諭諂上以禾反憘學上許記反好也正作憙也又音喜情也好憙許記反愛也又音喜馲駞上洛託二音或作𩧐𩢵二音位慧上菩薩問大善㩲經等八經十一卷同帙慧上菩薩問大善㩲經兩卷上卷挨姓上才木反闓士上苦哀反一揣徒官反煒曄上云鬼反下云輙反芬馥上芳文反下音伏匂𠧒音盖恢廣上苦灰反適莫上丁歷反振于上之刃反救也或作賑贍及上時焰反睭救也周𢭀音旋罪舋許覲反菓蓏郎果反抑制上衣力反悖於上蒲沒反𨒫也能蠲古玄反今首音獸悔也㷿光上音焰正作㷿闋嵗上苦决反終反㷿光音焰瞿惒音和雨霽子計反雨止也姦穢上古顏反伏首音狩誣橫上文夫反枉也謗也殫盡上音單盡也縲紲上力追反下私列反蔭芘上於禁反下卑至反正作庇也又毗鼻二音非財賄音悔激憤上古歷反下扶吻反儛刀上文府反摧拉郎合反堪偕音皆俱也斷韯才節反正作截也又音纖非也腐肉揣上扶武反下徒官反自存沒反捉髮也也正作捽或作捽也冝作猝倉沒反暴疾也郭氏音步盲反非也蠱道上公五反盟稱上音明約也𢙢懅其去反猗行上衣綺反又平聲儀式尸力反錠光上徒徑反瑕𨷂丘月反宮舘音貫遘精上古𠋫反瘡瘠自昔反澹泊上徒敢反下普百反迄于上許𠧒反便薨呼弘反樗蒲上魚反嘲調上竹交反下徒吊反嘲弄也下卷室娶七句反配疋普吉反娉納上疋政反冠㥽上音官下音責小冠子常服也㷿華上羊瞻反貴挨自木反頭上苦昆反未酒莫管反盈也正作滿也郭氏音囚非㩉机上他盍反正作㯓氍氀上具俱反下數俱反𣰅㲪上音塔下音登重莚音延正作筵貲量上子斯反正作訾生創音瘡得瘳音抽差也正作瘳䥫鈛羊力反橜也正作杙幣魔上毗祭反𢙣也困也正作弊俎癈上自與反正作沮悵上向反下文往反訕譏上所姧反興拏女加反罪𢪿古胡反馬𤠕六反半稟兵錦反粟也謂滅半所賜之粟施佛也應和尚音義作廩以粒字替之非也投從斯此反正作徙大乘顯識經兩卷上卷聖教序大唐御製逗根上徒𠋫反叡唐上余稅反御㝢于主反属上力向反下之玉反夙遘古豆反閔上眉殞反蓄用六許六二反舟捐音接汙青上胡案反裝縹疋反青黃色也鴻基居之反丕業上普悲反法䗍洛禾反經文暉煥音喚轟欝上呼宏反嬉戲上許之反倚抌之審反火浣胡管反濯也洗也弊帛上毗祭反正作弊䙬飾上伊迸反襇錯綵也又於耕反袨麗上音縣好㒵也閑婉於遠反削蠟郎合反蜂倉也亦作蝎也懸綴竹芮反飄颺上疋遙反下以良反鏗鏘上苦耕反下七羊反般拏上蒲官反下奴加反樂名也銅蒲末反虅上徒登反正作藤下音万正作蔓鮮𮎲疋巴反蓊欝上烏公烏孔二反昭晣之熱反光也峻峙直里反樓櫓郎古反卉藥上許鬼許貴二反鮮粲倉贊反寶輅音路赫爤郎歎反鈿廁上田甸二音剖折上普口反下先歷反身羸力垂反瘦瘠秦昔反屣履上所綺反矜慠上居陵反料理上力條反熱剌郎達反正作辢視瞬音舜跳擲上徒聊反下正作躑邃谷上相遂反正作邃竅穴上苦𠮧反孔穴也𡖉殻上郎管反下苦角反肩音莖柯音歌談謔許約反唼吮上子合反下徐兖反如蠶昨含反作繭古典反如𬃷音早字従兩𣐁𬃷音刾今作𭪀俗字也果名或甜徒兼反甘也或澀所立反昭著竹去反明也立也補也成也正作著箸二形也下卷𦚻液上乘安反膜腎上母各反下時忍反肝肺芳廢反涕唾上音剃正作洟堅硬五更反不軟也无上倉感反慼也冝作燥蘇老反燥乾也甲冑丈右反驥駿上居利反互因上音護交也今作㸦鑽燧上子乱反下徐醉反偱身上徐遵反遷植上七仙反下神力反謝殞云愍反華侈上戶花反下昌尒反蚊蚋上音文下而稅反秦謂之蚋楚謂之蚊異名也鞕䎡上五更反下而兖反捲縮上音卷屈也又巨貟反寳璫得郎反炫煥上音縣下音喚捷習上疾反爆裂上補㒵反剛棒蒲講反杖也齧脣上五結反羂索上古犬反黃淡徒甘反正作痰𥯤廬力魚反舍也大乘方等要慧經一卷耗減上呼告反下胡斬反不壓烏焰反嫌也正作厭饜大徍音街善也善擁巨貟反變也冝也秉也常合道也正作㩲也勒菩薩所問本願經一卷牛齠失之反比丘名也梵言梵婆提此云牛也正作𪗪呞二形也瑛吉上於亰反菩薩名如鶡胡割反撾檏上陟花反下普木反佛遺日摩𡰱寶經一卷邠耨上彼巾反下內沃反輕侮音武慢也侵也輕也儌冀上古堯反求也正作徼僥二形嘩說上呼𤓰反諠譁大語也又譁誇也誇誕大言也諭地上以朱反下徒可反欺也正作訑也讒倿上仕咸反下奴定反頑佷上五還反下胡懇反諭訑徒可反又徒何吐禾二反誘𧧓上由柳反下相律反不憙許記反天𩄆疾盈反雨止也又雨夜晴見星也正作晴殅二形也戴壤上方閻反正作𡐢下而兩反土也上悞是冥莫瓶反䅽實上古木反五穀惣名為䅽謂麦菽稷麻黍等是也䖝上丁故反下除降反芬子上古敗反菜名也正作芥𦬔二形榅油上烏困反其巔丁田反皆愈余主反螥蠅上郎反釣魚上丁𠮧反如坂音返𠧒匂音盖𨅨上徒郎反下徒骨反頭上苦昆反正作髡憘學上許記反好也正作憙也又音喜為廬力魚反索嘩上所責反下音華杼身上序音當効戶孝反學也媮諂上以朱反靡也字義冝作榆諛二形諛諂也揄詐也壁荔力計反傅飾上音付塗也无𭧤他含反正作貪貪瞋癡三毒也沾汙上知廉反冝作玷字我曹自勞反輩也勝夫人師子吼一乘大方廣經一卷經首無夫人字末利上莫鉢反此云柰踰闍上以朱反下實遮反國名阿踰闍此云不可戰捕養上蒲故反羼提上初諫反尒炎音焰此云所知比𡰱上音毗律名也无閡音礙明苦角反祇桓戶官反毗耶娑問經兩卷上卷彊伽上巨良反下巨迦反河音又格反非也羅枳吉以反瘦瘠秦昔反裴苫上蒲迴反下失占反商枳上尸羊反下吉以反正作商枳也仙人名鞞軻上蒲迷反下苦何反洋金上音羊正作烊爭巧反𨀛踞上自尊反下居去反蕀㓨上居力反絞攝上古巧反一葙息羊反正作廂綖繩上他丁反絲綬帶也或作𦀚䋼二同也䋼縚屬也又音線細絲也下實陵反角絡郎各反稠穊上直由反下居利反不狎烏甲反正作壓押之同上刀楯音順迭㸦上田細反舒舒音書魚名舒舒摩羅𢙣音元爤栰上郎歎反下扶月反羶那上失然反羯那同上也悞𩈅𪓱上古旱反下以證反靣黑點子也正作䵟𡨠重上乙本反俗𭽪面上阻瘦反腸處𦝩上直羊反下云貴反肚與肺上徒古反下芳廢反香莫姧反首飾也不萎於為反不䔍於𠃵反正作蔫極徒兼反正作甜揣食上徒官反渜草上而兖反又音悞戲咲音笑萎蔦於𠃵反卷屈上巨貟反操疾上子告反動也疾也正作躁趮二形也又七刀七到二反並非也下卷渫渠上古侯反正作溝亦作溝又私列反大甲徒頰三反悞城堭音皇甛如上徒兼反甘也正作甜華㒖五口反嘯咏上蘇𠮧反下為命反瞬上普幻反美目視也正作盼也又胡計五計二反非也又或作䀎音麵下音舜胷膺上許容反下於陵反消洋音羊正作焇烊延唾上序連反正作涎佉陁上去迦反此云可食之物蒲闍上薄胡反此云所食壞爤郎歎反杼氣上音序㳿也上苦愛反下蘇奏反並俗蒸熱上之剩反燈莫姧反耳巨魚反牽綖上去延反下音線旋動上序全反攕長上息廉反如弓把上於遙反下補駕反雨䏶上力掌反下步米反芭蕉上北麻反下子消反俱枳上九愚反陁邏盧个反輕䟽所魚反池湶音全馬𦜩音𢙉眾䗦峯蓬二音蜜主也正作蜂螽三形瑠璃𭉨音觜錯上古莧反廁也隔也正作間生上蒲安反正作槃㪸張上之林反正作斟忽苦上所立反下枯古反揣而上徒官反正作揣二形芥子上古敗反湏彌音氣噓音虛㭬柱上直緣反屋壀卑益反鵄尾上尺脂反馨馥音伏頰頟五格反視上疋幻反奮動上方問反正作奮若嗚音烏若𢬘步保反華上初洽反頰如上古恊反遊上五高反陰上上於今反缽衣上苦瓦苦化二反𦝫也彌樓上莫卑反暵鄣上於敬反正作映也又罕漢二音非也頭頟五格反勘耐上苦南反下奴代反啇人上尸羊反悞心懊烏告反躃地上毗益反拯熱上之勝反悞兩手上力掌反號喚上音豪下音喚敦扶上都昆反天名細上一消反密上尺里反親奮巨右反故也正作舊也悞摩訶衍寶嚴經一卷毀呰音紫撾捶上竹花反調譺上徒吊反下魚記反雜糅女右反醐上徒𠔃反下戶吾反如豕尸尓反樂蟺音善擲上音下音團䛅習上胡甲反正作狎也又呼甲反語聲也非毀訾音紫剔除上他歷反滲浴上子老反不叩音口可也正作𧥣也共𧨏音義冝也癸卯歲高麗國大藏都監奉勑彫造
