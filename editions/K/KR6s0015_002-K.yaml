body:
  text: 漢中沙門可洪撰依河府方山延祚藏大乘經音義第一之二此冊二十一帙潛羽翔龍師火帝鳥官人皇始製文字乃服衣裳推位潛道行般若經一部十卷第一卷熟念上市六反實也詳也正作熟塾二形也𭙡庠上他弄反下羊兩反正作痛痒也五蘊中受蘊也下又音祥悞所𭣣尸由反吁與上火孤反正作呼也又况于反悞離本上力義反下布反今作本正作李也字樣作本說文云從木十𭃄韻云從木丁舊韻云從木丁音下无點罣㝵上戶封反下五代反小兒如支反正作皃兒是𠛩戶辦反相誑惑也正作幻二形也字汙音呼與吁同也悞邠休上甫巾反下冝作傉內沃反前諸部作兮耨文陁𡰱弗文阤音陁僧那僧涅奴結反僧那言大誓僧涅言自誓號如上胡告反如音幻邊幅上音邊下音福令上古雅反邠祁與休字同也冝作耨也又音耆悞適得上音釋又之釋反謙苦上苦兼反敬也勞力法俗音俗𨳰塞上計反那鈴音含若枯古反正作苦也又音袴拘祐上九愚反下冝作扯丑耳反比丘名也諸經云拘絺羅是也上方經作私延上之然反下以然反經弓居願反有平皮兵反亦作坪无手同上諸部作底此經作平按底字說文下也平也今經文作㸦以底字替之彼悞也住罝音罝第二卷因坘音遅亦云因提此譯云主即天帝釋也又丁𠔃反古經字多作坘也亦梵言楚夏耳如梵婆亦云伽梵鉢底如三摩跃提亦云三摩鉢底如支提作制底是也亘脩上古鄧反避隈上普益反正作僻也下鳥對反又鳥迴反摩蚔巨支反藥名也自前諸部作摩祇小品經作摩𨢘猛祝上音猛下音呪蜎飛上烏玄反下或作蜚字𧑮動上而兖反擣搗香上二同都老反大般若云末香旗幡上巨之反寶塌音塔一轅于元反洴沙上蒲丁反羼持上初鴈反下音提悞大竹朱反正作株栢梯本作株問訊音信鹽天上閻焰二音即夜摩天也唐言妙善甄陁上之人反拔致上蒲末反廅天上烏盍反𢩘波同上湏音滯直世反中陰經作湏滯四阿含暮抄作脩提經律異相作湏陁並一義異名也此云善見天也又音帶都盖反大樓炭經作湏𠸻應和尚音義作啑同音帝並正作蹛也郭迻音武非皃堅上胡官反𣽈美上而兖反前諸部並作耎美飽也所齧五結反除愈余主反繒裏上疾陵反下古火反若篋苦頰反若臽音咸正作函又音非也枝棭音亦第三卷义上以劣反揵陁上巨焉反甄陁上之人反摩睺戶鉤反此云大腹行神恍忽上許往呼廣工反又音光非也病瘦所右反醫藥上於其反拔致上蒲末反亦云拔提天𤸱天上烏盍反𤸱波同上正作廅伊潘普官反亦作番膱吒上女利反痛痒羊兩反无夾下恰反正作狹中𢭃音豆是輩倍反是曹自刀反軰也儻聞上他浪反醜𦼇烏各反久劇巨𨒫反悏習上胡夾反近也正作狎也又五頰苦頰二反並非也大鎧苦改反第四卷牧牛上莫六反盧舍上力魚反正作廬𣽈遅上而兖反下直𡰱反上又音𪝥非也悉豫余庶反先也署菩上常預反效驗上胡挍反心卒倉沒反陂波上彼皮反下冝作池撜作上求癸反度量也正作揆便吁音呼甫當上音府始也不肯苦等反病瘦所右反適安上音釋纔也書上胡角反𤢌狩上巨今反下尸右反薜荔上步計反下力計反奈之上奴太奴个二反𠧒歹音盖求也正作丐𠣏二形第五卷厄害胡盖反也正作害𤍜漯上乘老反下尸入反正作燥溼也下又他合反非也至奏子豆反號字上戶告反罣㝵上戶卦反下五愛反邊幅音福一逮居業反時名也正作刼或作砝三形梵言刼簸此云分別時節也前後諸部皆作刼也應和尚經音作疌以刼字替之是也川音作疌音刼並是也又或作建刼彥反刧之與建或譯主㸦用聲轉也亦不失輕重也二同音接逮音代並非也又音致亦非也證詄自七反速也急也正作疾𧪠二形也小品經云疾得涅槃明度經云已得證疾並是也玉篇作意佚二音非也𭃄作徒結反亦非也一逮音刼前後諸部皆云若一刼若減一刼是也又子反或梵云楚夏耳乃序全反仾上助架反仰牛兩反舉首也又五郎反見禮記音義卒破上倉沒反若𡓜自羊反舩上忛柱也正作檣二形坏瓶上普迴反拖張上託何反曳也亦作拕扡二形又或作施失支反設也敷也又他可徒可與尓力尓尸智他个弋支七反並非牀褥上助㽵反下而欲反病愈余主反間臺音臺適著上釋的二音從也樂也愍念上眉殞反悲也有翅音施自投音頭弃也擲也又之禾反手擎撲也第六卷祠祀上音詞下音似嗜酒上神利反嫉姤上自七反下都悟反蹈地上徒到反斐服上芳尾反文章㒵也冝作披普皮反披也應和尚以裴字替之步迴反垢坋上古口反下步悶反塵著物也正作坌也又或作圿古黠反蝨上子老反下所擳反不孚芳無反信也詭𡣠上居委反下奴了反滛妷上羊林反下羊一反完具上戶官反亦作皃創癩上楚㽵反下郎太反蠱道上公五反又音野䅽食上古木反羼提上初諫反惟逮音代精進別名燈炷主注二音棄捐音緣佛咲音笑更斐布姧反正作斑扳二形也謂扳拽整理衣服也上方經作被亦非也悞阿𨴟初六反梵言阿𨴟此云无動亦作閦第七卷勇悍戶岸反阨難上烏𮧓反危也迫也閔傷上眉殞反䎡語上而兖反菓蓏郎果反說文云木上曰果地上曰蓏應云木實曰果草實曰蓏張晏云有核曰果無核曰蓏也底跪上丁禮反下也又音𣅀致也自音呼榆旬上羊朱反第八卷𠇺習上胡甲反正作狎問訊音信𦲸離上力掌反下力義反上又莫官反非也却乎上居業反正作刼也无拔助亮反正作狀今作狀也作槗巨反聾羊上洛紅反瘖痾歐上於今反中烏雅反下冝作傴衣禹反背屈也痾音阿非也導首上音道引也斤𦲸力掌反𮂶限上苦禾反程也條也本也斷也或作䉼音療幾渧音的正作滴又丁計反非刻作上苦得反屈伸音申佻上丁𠔃反下五郎反俯仰也正作仾仰也賈客上音古居賣曰賈通財曰𮚘又音嫁山顛丁年反琦音奇問訊音信羅麟音隣第九卷悉牧音捨釋也弃也散也明度經云悉捨忘之其過少耳又音目放也又或赦音舍宥也悉音亡遺也正作忘湏欲朱反无鞅於良反又於兩反非啼笑苦屋反惟逯音代精進波羅蜜也正作逮也恒𨓉布玄反揵陁呵盡上音𠃵下知右反此云香𤉢也下正作晝山巔丁年反正作巔明度經云湏嶺姝好上尺朱反諭諂上欲朱反下染反彊染上巨良反下力羊反悞僥倖上音澆下音幸舊韻作儌幸說文作僥幸亦作徼幸說文僥偽也徵求也幸寵也說文云吉而免凶曰幸也字從夭從𢆉又應和尚云徼遇也幸得也非分而得謂之幸也冀望得也又云䂓求親遇也拖行上音絁正作施惆悵上由反𨳰在上計反曇无鴗上徒南反下其列反下又音立悞阿祝昌六反又音粥鴗羅上其列反羅戶屋反緹縵上他禮反下莫半反湏揵提中音𠃵亦云修𠃵提此云黑花占匐蒲北反黃花也𩾜鷹上音扶下五諫反正作鳬也上又音力並悞女上羊招反美好也亦作姚也拖高上失之反設也安置也正作施文繡音秀綩䘰上於遠反下以然反自衒音縣賣也行賣曰不售音授試之上尸志反不伹徒旱反正作但又蛆粗二音非也人四音血人宍而六反兩䏶步米反高㙜徒來反炳然上兵永反作織音隻布施尸智反以物惠人也㯓上都盍反撗被也如架上安衣謂之也正作褡㯓二形也本作㯓書人悞從木作㩉也下補覓反牆也𢙢懼音具格戰上古額反闘也𥛏幡上音其正作旗菩薩因進反三昧名第十卷波崘洛昆反前卷作薩陁波倫悞曲戾力計反荊𣗥上居英反下居力反汙埿上烏故反下奴計反䪺上之領反下都困反坌師上蒲悶反皃健上戶官反正作完池邊音邊欄楯上洛干反下食准反俠陛上戶頰反下步米反儲水上直居反副也貯也貯積俻急用也湏彌音𧏦動上而兖反行上巨支反喘息上川兖反巫祝上音無下之六反女仕鬼者曰巫也祝者辝也祭也謂禱祝祭祀鬼神祈福祥求永貞也下又音呪須音逾返遺以遂反贈也光琰音焰三昧名曰光焰也明度經作曰光炎也又以染反悞箜篌上音空下音侯有絃音賢有桴音浮皷椎正作枹也諂上欲朱反下染反手拊撫下二同芳武反拊拍也撫持也據也安存也羽小品般若經一部十卷第一卷調象音像逯得上徒愛反五於今反大般若云五蘊即色受想行識是也拘絺夷反拘絺羅此云膝𮕾辿上之然反下以然反第二卷眾華音花逼上音正下音遍㠻有上香衣反欲毀許委反摩呼𠔃反小蟲直中反惚𡨟上音𢙉下音𡧱經弓居願反道場直羊反又音亦非也以存呼老反正作好也以好華香也悞是上音置悞求𢭃音短問訊音信斯慝女力反王名也正作匿也又他得反悞羼提上楚諫反此云忍辱𤾇率上都侯反梵輔音父遍淨上補見反𠃵闥他達反所螫呼各反又音釋裹著上古火反其篋苦俠反第三卷是上陟吏反委也釋也且住之言也㓨蕀居力反闇𡨋莫丁反苦惚音𢙉糟粕上子刀反下疋各反熱血上而設反下呼决反第四卷无疧丁禮反又音祇悞成熟市六反園林應和尚音義作垣林于元反牆也彼悞懷姙而甚反欲上息惟反正作雖慠上五告反互相上乎故反輕蔑莫結反得寫音像正作𤉢揆度上求癸反妨癈上撫方反𡧱也礙也下方肺反止也正作廢𭜨魔上烏各反正作惡詭誑上居委反第五卷救療力𠮧反正作療蚊䖟文盲二音正作蚊蝱毒螫音釋无閡音礙𤾇率上都侯反所𢫀苦堅反輕躁子告反動也疊毳上正作㲲下尺稅反細毛也大般若經云覩羅綿是也本破上倉沒反正作卒卆二形又音叨今為本字也悞彼音岸爤壞上郎岸反邊舡上音邊下音舩下又呼江反非也棠治上宅庚反下音持舩也止水也正作𣥺也周礼云角𣥺之也切作𣥺悮也一掖音亦隧落上直遂反正作墜上音道引也𣜦師上音道正作導悕望上音希欲得也不悕普故反正作怖隨㥧上音隨下音翅未上尸智反戲挊音弄第六卷偷奪徒活反耶上似嗟反下羊林反𣽈語上而兖反安似余反穢上古口反諂曲上染反下丘玉反慳愱音疾沖若上而與反正作汝賊上苦𠋫反寫馬上徐兩反自抑音憶監閡上古銜反領也下音礙言婦人有三監五礙也惡獸尸右反正作獸第七卷微嘆私妙反正作笑二形也徧袒上音偏下音但金華音花精𨦣以芮反躓頓上陟利反相柱知主反城墎音郭輕蔑莫結反𢙣賤上烏故反雜女右反正作糅𩚖二形賊上苦𠋫反正作寇憒𡗚上古內反下女㒵反刑勠音六隨慎音順隨㥧同上第八卷礕上普擊反下呂擊反菩䔒下音薩梵言菩提薩埵今菩下除提薩下除埵而作菩薩也聾瘂烏下反眼上郎代反痤𢭃上昨禾反正作矬聾疴烏雅反正作瘂也郭氏音阿非也上又經文作聾悞頑鈍上五還反邪上徐嗟反无䛘俱况反悞第九卷莘悉上呼𤓰反微𠸍音笑湏音逾新乘浪反第十卷惡魔上烏各反頋錄力玉反𭄩上音扶又音力悞玟瑰上莫迴反下戶魁古迴二反陛上他𠔃反下步米反挮撜都鄧反幃帳上于㱕反下知亮反隱抉反掩也正作蔽也不售音授試是上尸志反大祠音詞右䏶步米反困苦音苦創槃上音瘡下正作瘢重壍七焰反金鍱音大品經作金牒音𤗊碎粖上乘對反下莫鉢反有槽才刀反箜篌身有棍古本反此依應和尚經音呼也今冝作毗結反轉絃関子也如經配媲字並作婫是也又胡本反非也媲疋詣反字從音毗非從昆古䰟反冝取字坌於上蒲悶反无上乘浪反湏𢏏音山名也唐言善高亦云妙高翔大明度經等二經十一卷同帙大明度經四卷第一卷善業魚刼反正作業也梵言湏菩提或云修浮底或云蘇補底或云藪浮帝或云蘇部底並同也唐言善現亦云善實亦云善吉又云空山雜譬喻經云舍衛國有長者名鳩留產一子字湏菩提有自然福報食噐皆空所欲即滿因以名之也後出家成羅漢秋露子亦作鶖鷺鳥名也梵言舍利弗亦云奢利弗多羅此云鸜鵒子也舍利此云鸜鵒弗此云子此是時人見其母眼似鸜鵒故詺云舍利子也本名優波提舍不怛都達反驚也熱也火起也正作𢛁𤇅二形應和尚作憚貲貨上即斯反財也經文作訾即斯反量也思也非義也費秏上芳味反下火告反擁著上巨貟反不但都割反正作怛進擢宅角反拔出也不擁音拳變也逯得上徒愛反不否方久反不也應言不不行斯譯主迴不為否也佪流上音迴正作洄不睹音覩慧一進反𧑮動上而兖反文𩚠尸力反裝也正作飾之鎧苦改反柰何上奴太奴个二反捐人上一入反悴上倉感反下自遂反奏三上祖豆反質音亮即阿修羅是也𪪺裕欲注反寬也苞容上布交反閑睱音下費耗火告反昆弟上或作晜二同古魂反兄也後也周人謂兄為也近狩尸呪反守也俻也正作獸也狩冬獵也非義也廓上苦迴反溝港上古侯反下音講南人謂近河小水溝為港也今經中以為湏陁洹者取其入流之義也溝淃同上也又音倦悞其膝音悉鳴絰乎鳴絰乎鳴音烏經徒結反歎異聲也道行經云作如是歎譽小品經云快哉快哉經文作鳴經悞錠光上徒徑反除饉巨恡反神祝音呪𤢌狩上巨今反琦音奇質鿌音亮一轅于元反質諌音亮正作鿌二形耶償上徐嗟反下得朗反正作黨𢁙有上許依反監天上閻焰二音正作鹽也第二卷去莫丁反不夾胡夬反正作狹狎習上胡甲反量樓藏作植常軄反種也或作殖无玷音點𭟃喜上火官反菆樹上才紅反出字樣又才宮义注二反但欲上徒旱反又蛆粗二音悞皃具上戶官反正作完陂水上彼皮反慍猒上於運反𠧒音盖問訊音信之𦠊音𢙉力計反一刼道行經作一逮得證疾道行經作得證詄非一切音刼道行經作一逮居健反𬌏子上徒屋反乍𫢏丁𠔃反乍仰五郎反舉首也又魚兩反平壞上倉沒反板𡓜自羊反舩中帆柱也正作檣推慧上音拳正作蓷不𨗻音代正作逮也又徒合反正作遝也尓疋曰逮遝也郭璞曰今荊楚人言逮為遝拖張上託何託可二反曳也舒也冝作施失支反施設開張也捕治上音補下音持兩闢毗益反盟誓上音明約也嫉姤丁故反上音早下音瑟瘡癘音頼妷羊一反放嫁也倿𭒯上奴定反下魚列反榆𭁿上音余蠱道上公五反倡優上尺良反楺利上音貪殞命上云愍反歿也第三卷卬幾上伊進反夫上羊一反應和尚經音作妷夫也婸也也鐙炷上音燈下音注者音禍或作楇戚為上倉歷反佛咲音笑重讎市由反之裁子才反正作栽𥧝已上五故反捋踧子六反踖行而謹敬也經意是蹙迫也近也從也欲憙許記反屈伸音申仰五郎反又魚兩反捔才古反也略也正作觕粗二形之臧自浪反正作藏第四卷喪親上乘浪反揵陁呵盡上巨焉反下知右反正作晝也菩薩名也或云𠃵陁訶提此云香𤉢菩薩也即小品經作香𤉢菩薩是也經中作揵揵陁陁呵呵盡盡開開士士悞也非无怒奴故反梵言阿閦亦云阿祝此云无動亦云无怒亦云妙喜小品經作阿閦應和尚經音作阿閦此經作无怒斛量上胡屋反湏嶺力郢反或作巔道行經作山諭諂上欲朱反下染反強梁上巨良反僥倖上音澆下音幸不𢡽音昔不暏都古反正作睹調悵上由反正作惆哀慟徒弄反適无上釋隻二音徃也又音的從也帷縵上于誰反下莫半反戲廬力居反舍也占副蒲北反正作匐也𭄩匕音扶野鴨也又音力似鳬而小也本非𭄩也百稽音啟炫煌上音縣下音皇文繡音秀綩綖上於遠反下以然反不售音授啼器苦屋反正作哭試之上尸志反悞兩脾步米反正作髀如舊音舊瘡愈余主反忻豫音預寶函音咸闟壁上都盍反以衣物橫被於壁以充捨施正作褡也道行經作㩉也又許急反非也又應和尚經音以毾字替之他盍反毛席也非是此義罷倦上音皮惓也因坭丁𠔃反洗上子老反師拖失支反正作施了戾力計反荊棘居力反愸頓上之領反下都困反坌師上蒲悶反𦢊瘡上補角反皮破也正作𦢊也蘭偱上洛干反下音巡階際木也正作欄楯也下又食准反俠陸上胡頰反下步米反正作陛也儲水上直余反羆字上蒲買反㱕也正作罷也悞胸臆上許恭反蜎飛上烏玄反𧑮動上而兖反蚑行上巨支反喘息上川兖反巫呪上音無道行經作巫祝音粥返遺以遂反與也贈也光炎音焰正作焱卬封上一進反桱手上遙曜二音動也正作播種娉呼老反正作好也自警音景𮧓桴音浮不謟染反又音叨非也唃音粗前卷作捔又古木反非也又郭氏音角又呼角反非也畫玷上戶麦反下音點句投音逗勝天王般若經一部七卷第一卷序文此序或在經後置之始洎其既反及也至也寘懷上之義反雅懆七到反正作操也又音草非辤丘月反𮝛睦上音集和也負笈上音及負書箱也又其刼反義同法其俱反人名僧杲古老反紛綸上芳文反下力勻反又古頑反渙然上火乱反揵搥上巨焉反下直追反咸萃自遂反智昕音忻彭匯胡罪反尚書云東匯澤為彭䗍也匯洄也又苦乖反澤名伏膺於陵反偱環上似均反萬駰因殷二音股肱上音古下古弘反𣏌梓上音起下音子或猜倉才反經文兜上先安反正作𦙽摩𨢘呼𠔃反優波舍羅亦云漚惒拘舍羅此云沙波羅蜜亦云善巧方便第七波羅蜜名也𡰱坵丁𠔃反又音遟或云𡰱仾或云尼提此云願婆羅此云力闍那或云若那此云智親戚七歷反治𦲭上直之反下七入反喧撓奴巧反擾乱也三𠍴丘𠃵反意有三業三也謂貪嗔邪見也撾打上陟𤓰反下得冷反盲𪾼音翳如𣓞音朔如衝尺鍾反正作䂌命𣧩音終憤恚上扶吻反覆知孝反儵忽上尸六反𮌨脹上疋江反下知亮反毀呰音紫漬草上疾智反坑塪苦感反溼物上失入反暫住上昨濫反正作暫蹔二形也嚬蹙上毗反懷𢜩胡感反恨也正作憾也又丘廉苦減二反悞輭語上而兖反恚堙於堅反正作煙云貪欲火瞋恚煙也嘶喝上斯𠔃反下鳥芥反聲敗也噎也經文作嘶唱悞也拙歰所立反欺侮音武易上莫𠋫反悞瘖瘂上於今反下烏雅反第二卷降澍音注腥𬛓乘刀反酤酒上古胡反輕鄙兵美反犁軛音厄盟洗上管貫二音正作盥巖宂音穴罕人上呼笴反勒上兵媚反量忖村本反第三卷塋治上烏定反正作瑩鎣二形也下音持塊擲上苦內反亦作𠙽聞上古瓦反懆毒上初錦反正作墋也又音草悞戲卡音弄𠬧獲戶麦反得也又應和尚音義作穫戶郭反親狎胡甲反可𡂡所角反𥛬𬽹上力計反料理上力條反塠𭚖上都迴反下音負第四卷佷戾上戶懇反折挫上之熱反下子臥反𤹪背上於禹反正作傴裸形上戶瓦反芧衣上莫交反稗子上蒲拜反暑預上常庶反下余庶反根可食也正作薯蕷食芋于遇反食藕音偶炒穀上初巧反倒仆蒲北反火𦦨音焰又以染反第五卷真丁𡰱反正作𦙘此云善思惟多姪借音夜反又徒結反羅挐弩假反又作拏莎臼荼上素禾反中巨久反下杜假反柘上之夜反下寧履反簉多上初救反义近音延大般若作剎莚暮舸古我反甌樓上烏侯反𦏌莎上奴侯反褒多上布高反占匐步北反門堞音牒臱上音扶正作鳬狌狌音生革屣所綺反第六卷若鑿音昨第七卷甘之夜反荻林上徒的反𡰱上於真烏兮二反王膊市軟反眼睫音接頟廣上五格反不愜苦頰反徧袒上音偏又音遍悞貲財上子斯反龍文殊般若等經十二經十五卷同帙文殊師利所說般若波羅蜜經兩卷上下合卷拘絺夷反實蒢子例反邊也畔也會也正作際也又音除悞𡨜靖情井反生疱步孝反皮起也法卯卬一進反二同金屑先結反欝波上於勿反或云優鉢羅花或云嗢鉢羅此云青蓮花鉢頭摩華或云波頭摩華唐言赤蓮華拘物頭華或云拘牟陁華唐言紅蓮華分陁利華或云奔荼利唐言白蓮華文殊師利所說摩訶般若波羅蜜經一卷羼提上初諫反唐言忍辱疲勞上蒲碑反下郎刀反深殖時力反无貌音㒵金釙音朴鎚打上直追反下得冷反樹脃疋㒵步㒵二反皮小腫起㒵也正作胞靤二形也又七絕此歲二反並非濡首菩薩經兩卷上卷𣽈首上而兖反經中亦作軟首或作轜䎡二同音軟又而朱反瑕疵上戶加反下才斯反所覽音攬深邃相醉反肅恭上息六反淵𢢶上於玄反下於冀反汪洋上烏光反下以良反崖邊上五佳五奇二反底泓烏厷反深也淡泊上徒敢反下普伯反正作惔怕也澶然上徒岸反漫也𮨇䀎音麵㸌出上呼郭反然雲消㒵也正作霩霍二形又音鵠煒曄上云鬼反下云輙反炳然上兵永反𦗟稟兵錦反受也遷飛上七仙反吹噭古吊反鳴軻苦何反螺也𧋒䖝上音釋䖝行毒也蛆也正作螫也又徒冬反悞蟒蝮上莫朗反下芳六反虵蚖五官反蜂蝎上芳逄反下許謁反樓𨳾音各正作閣又音右悞垣𡓜上于元反下自羊反牗上所初反下由柳反恱懌羊益反樂也正𠮮胡搆反正作后恢廓上苦迴反下苦郭反動上子到反摷窟上助交反苞蕉上布加反悞下子消反𮄎𮄆上七朕反下利反躇步上直余反无伸音申坵𨽁上去求反下才句反並俗潭泊上徒南反下普愽反琦上巨冝反苞羅上布交反渆上於玄反下於冀反正作淵懿也澹滿上徒敢反猗著上於綺反錠燭上徒丁反正作也又音殿巨燎力堯反擿霧上時隻反療撈上力吊反下郎到反賜也正作僗也又音窂悞雪上昨木反類也周禮四閭為族鄭玄曰百家也亦聚也今言族雪者誅其根本也正作族也又於騃烏改二反䒵莇上呼高反下助魚反正作茠鋤亦作薅也下又郭氏作側魚反非也盪除上徒朗反下卷罣㝵上戶卦反下五愛反慌惚上呼廣反下呼骨反𨽁落上自字反愷慷上苦改反下苦朗反喟然上苦貴苦恠二反華孚芳無反花榮㒵也正作荂莕二形倡導上音唱下音道霧蘢郎公反茙盛上莫𠋫反正作茂也又音戎悞巔倒上丁年反創楚上初㽵反眾惚奴老反正作𢙉也又音忽悞雜垢音狗益集上於亦反正作益㸌然上呼郭反褊袒上音偏下音但奚為上乎雞反這當上音釋纔也始也又音隻正作適也煒煒云鬼反𪾳畢上云鬼反下云輙反瓅瓅音𢟍玓瓅明珠色也又應和尚音義作玓瓅上音的晑然上音丙光也正作昞也郭氏音響非也應和尚音義作暠古老反上方藏作晌郭氏音禄亦非也晃昱上戶廣反下羊六反窴上一了反下莫瓶反並悞奇嶷魚力反之筫音質封莂彼列反仁王護國般若波羅蜜經兩卷上卷僉然上七廉反味勾俱遇反正作句也字樣云無著厶者一渧音的城塹七焰反鉾𣛝上音牟下音順下卷杻械上勑酉反下胡戒反𠃵巛苦昆反古文坤字也𠃵者天也巛者地也灰煬上呼迴反彫喪上丁聊反下乘浪反尚殞于愍反瘡疣于求反蠢蠢春尹反憺怕上徒敢反下普百反日蝕時力反彗星上祥嵗反妖星也又音遂㵱沒上疋遙反水吹也正作漂礔礰上普擊反下郎擊反𠕵陽上苦浪反玉葙息羊反正作箱鳩睒失染反國名上居例反正作𦋺健拏奴加反涕出上他禮反目淚也金剛般若波羅蜜經舍衛國者秦羅什譯筏喻上扶月反涕淚上音剃正作洟自鼻曰洟自目曰淚也金剛般若波羅蜜經舍婆提城者後魏菩提流支譯味𧢻音觸栰喻上扶月反捫淚上莫本反金剛般若波羅蜜經祇陁林者南梁真諦譯徧袒上疋連反抆淚上文粉反𠳀躍上容隴反能斷金剛般若波羅蜜多經唐玄奘譯補特伽羅此云數取趣亦云更求趣亦云人殑伽上巨陵反下巨迦反俛仰上音免俯也羯利上居謁反俱𦙘竹𡰱反那𢈔以主反鄔波上烏古反強有上巨兩反苾上毗必反下測俱反能斷金剛般若波羅蜜多經唐義淨譯圓寂秦歷反舊經云滅度伽上巨亮反制底丁礼反亦云支提亦云窣堵波舊經云塔廟新經云靈廟即佛塔異名也星毉於計反正作翳摩訶般若大明呪經惚壞上奴老反罣㝵上戶卦反下五愛反實相般若波羅蜜經唅呼含反唵烏感反憾胡紺反引淤泥上於去反咭利上許吉反又音吉怛纜上多達反下郎闞反烏舸古我反㘕郎甘反荷胡可反頡唎上胡結反下力至反性徧音遍周也驃毗妙反擾亂上而沼反般若波羅蜜多心經罣礙上胡卦反揭諦上其列反大明呪經作竭也作羯字者非師大寶積經一部一百二十卷一十二𧙍第一帙第一卷序太上皇製毫芒音亡草端也麦芒也陶鈞上徒刀反下吉旬反甲冑文右反首鎧也潰旅上戶內反下力與反惠晷音䡄瓊編上巨營反下卑連反睿聖上余芮反靜𭒯魚列反巢燧上助交反下音遂執鞭卑連反擁篲音遂又徐嵗反蟠桃上蒲官反下徒刀反永淳市倫反當宁直與反禮云天子當宁而立謂門屏之閒也又音除義同循機上徐倫反登摳尺朱反㔻搆上普悲反下古𠋫反勗就上許玉反尋繹羊益反部襄直一反億兆音趙甿之上莫𥝷反野人也恒佚音逸緗帙上息良反第二序告成縣主簿徐鍔撰澡漉上子老反下郎木反唯曒古了反明也聿修上余律反亶作上多旱反大也厚也仙虹音紅晝爍尸斫反睟容上相醉反視也潤澤㒵也又子內反目際也危屏音瓶三禮圖曰扆縱廣八尺晝斧文今之屏風則遺像也係慈航上古詣反下戶郎反烏虖音呼烏虖歎辤也古作於戲今作嗚呼也又音乎又况于反非也終𥃁知流反山曲為𥃁水曲為厔謂山曲水洄則舩車不行也正作盩也又江西音作力計反綬名也非用𮀒示上呼閴反然物相離聲也又呼麦反遹被上余律反亟傳上去記反玄奘自朗反如綸音倫又古反炯茲上音逈又古逈反光也明也瑞憲許建反豁屢上呼各反下力遇反侚齊上徐俊反罕能上呼旱反希也丕就上普悲反洎我上其既反苑籞魚與反禁苑也隄封上音提湏畒也又是支反亦作提之扉音非之驥音冀勛格上許云反下古厄反法一信反肅敷上息六反敬也明𫾻音羊刊𦂝上苦千也頺網上徒迴反絕紐女久反弼諧上皮密反輔也俻也亦作㢸不忒他得反握仙扎上烏角反下爭八反謂持筆也慧迪徒的反探諸上他含反神古眼反庇影上必至反纂而上子管反邠王傳上彼巾反下知戀反驛也盧𭽀倉贊反詹事上之廉反文館古乱反亦作舘崔璩音渠鳳墀音遟雞圃音補鉅鹿上其與反張說音稅𤨏闈上乘果反青𤨏墀也下于㱕反倐換上尸六反衡晷音䡄宸襟上音辰下音金彤霄上徒冬反荐加上才見反式顏上尸力反徐巨反正作鐈彼穹去弓反遙岵音戶胠篋上丘刼反下苦頰反㽵子篇名也上又去魚反江西音作丘呂丘鹿二反非探笥司寺反簡牋作先反槐火上戶灰反木名苔上徒來反下直一反鏤軸上郎𠋫反瓊籤七廉反綵簟徒點反竹席也霓舒上五𠔃反吹𡽺五角反姤路上都故反梵云修姤路唐言契經也正作妒經文卉木上許鬼許貴二反百草惣名也麒麟上巨之反下力人反熊羆上乎弓反下彼皮反鴝鳲上奇枸反下之尓反亦云拘枳羅亦云拘翅羅此云烏鴉鳬上音扶野鴨也茹食上而去反蓊𬅕上烏公烏孔二反草木盛㒵也甄叔上居延反樹名靃靡上息委反下眉彼反草木弱㒵趾步上音止也流澍音注畋獵上徒年反第二卷上古入反下音𠕀獷古猛反蝦蟇上音遐下音麻刀搶七羊反拒也毀呰音紫貲財上即斯反貨也財也所貸他代反遆㸦上徒禮反下乎悟反䛕諂上羊朱反詭也虗加上許魚反憒閙上古內反下女㒵反𥧦𥧝上古孝反下五怖反濕繁上尸入反下步波反比丘名唐言馬勝繖盖上桑旱反輟己上竹劣反薄蝕上布各反下神力反涎唾上序延反噬齧上時世反下五結反讁罸上知𮧓反下扶月反邏上古遝反下來个反第三卷然上倉感反亦作𢡚擗踊上毗益反號咷上戶高反下徒刀反掉弄上徒了反投倉乱反徒穴上於少反嬉戲上許之反贈遺上才鄧反下以醉反鄙陋上悲美反下郎𠋫反盲傴於禹反蝙蝠上音邊下音福眼睛音精梨黯烏斬反媒上莫迴反下古𠋫反毯毛上他敢反毛席也橐囊上他各反刀鍼音針奮長推上方問反下直追反碪前上知林反鍜䥫上都乱反鉗推上巨廉反甲也正作鉆下直追反正作椎第四卷明苦角反哆地上多个反下提也反隖計上烏古反𡀔計上盧故反娜唎上那可反下力至反設儜女耕反又冝作濘奴頂反聲穩闥上商遇反下他達反吃唎上居𠧒反嗢哆上烏沒反下都个反𢈔伽上余主反下巨迦反磨𬮼喜夷反正作𣢁也又許器反㮈陁上奴割反麼底上莫果反下丁禮反弭磨上尒反薩𠼝力夷反㘕婆上洛甘反勢囇下力計反磨𨢗呼𠔃反又音海磨𨢗呼𠔃反正作𨢘醢醢醢四形又音海鄔荷上烏古反下胡可反羅嚀音寧勢𨭝所拜反亦作鍛三縵莫半反囉呬上魚𠧒反中魯加反下香至反下亦作㕧第五卷暎奪上於敬反下徒活反簡擇上古眼反亦作蕳醍醐上徒𠔃反下戶吾反親戚倉歷反諸經作二形唐捐上徒郎反下以宣反謂空卉也枯槁苦老反㸦相上乎故反第六卷牟折之熱反咤你上竹加反下奴里反揭帝上巨列反靺囉上莫鉢反憚上傷句反下徒按反嚩嚟洛𠔃反彈舌呼那𠼝同上波𭊵同上鉢唎音利枲你上𦙃里反扷上音下音致莫音異又與之反莫企丘智反皤上蒲波反下扶廢反些設上蘇个反俱𦙁竹𡰱反省霓五𠔃五結二反囉攘汝羊汝兩二反地孕以證反二合囉上戶沒反囉瘧魚約反耄䭾上莫報反下徒个反䛧嚧上莫計反下洛俱反枳邏上吉以反下來个反怒𦽆魚列反亦作𦾨第七卷粵皤上于月反𠧒矖所拜反悞曩酩莫頂反目谿苦奚反吒𭊵上陟嫁反下力𠔃反驕上居妖反下尸遮反矖野上所介反囉莾莫朗莫古二反囉喃女咸反鉢碪知臨反塞唎上蘇沒反中魚𠧒反下力至反爛捺上郎歎反下奴達反墮喏而者反阿䞘其𠧒反其迄許𠧒反圖蒲弘反今作朋古作本是古文鳳字今為朋黨未捻奴頰反多𭊃蒲梵反多囒郎干反寧疙魚近反經自切罨上