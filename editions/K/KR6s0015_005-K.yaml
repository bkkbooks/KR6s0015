激悞也枰閣上步盲反閣也別本作視閣是也又音平非也損秏呼告反下卷㸌滅上呼郭反中上竹仲反下於小反亦作殀薄尠息淺反棚閣上步盲反上卷作非也菀囿于救于六二反罪舋許覲反挑其上他條他刀二反偃上徒到反下於㦥反洟唾上他計反大邦愽江反煒煒于鬼反從倚上斯此反移也倚佼也謂移處立也𢢔穾徒骨反堅音硬唾賤疾箭反輕也或作濺音箭汙也祝術上之右反願求祭之詞也又音粥木寶雨經一部十卷一帙第一卷顯𥢓市右反与也切韻作穢𬼈法上之聖反是也取也學峚徒異反古之作墮墜坔三形則天皇帝作峚也寶𢡠尺志反菩薩名藏上而質反解脫音月眾𬻃音天睒末上尸染反婆稚直利反娑揭音竭緊㮈上古引反下奴達反天歌樂神也阿鞞步迷反亦云阿惟越此云不退轉是第七地菩薩也最上子外反下音朸宿上乘經反像形字也古作壘下音秀獷悷上古猛反下力計反詐上居小反亦作橋琰摩上以染反懷孕羊剩反無睱戶架反閑也呬多上許利反瑜伽上羊朱反下巨迦反怛纜上多達反下郎反梵云素怚纜唐言契經邀頡上於消反下戶結反鄔波䭾上烏故反下徒个反梵言鄔波䭾耶唐言親教師脾腎上步卑反下時忍反心肺芳廢反正藏之一也亦作肺肝膽上古寒反下都敢反肪膏上音方下音高洟唾上他計反涎淚上序延反脂痰徒甘反頑嚚牛巾反窣堵上乘骨反第二卷毀訾音紫手音愽擊也又普愽反目瞖於計反亦作𪾼倨慠上居去反下五告反狹劣上戶央反勇捍音翰倨傲音敖炫矅上音縣下音曜光明盛㒵也怙恃上乎古反下時止反串習上古患反尖摽上子廉反下必搖反如鑹倉乱反憒閙上古內反覺上音初下音挍角上音西正作犀第三卷法式尸力反昵健上女日反𮌨爛上普江反下郎炭反頑嚚牛巾反聾𥌒上郎紅反下公五反啞羊上烏雅反蚊蚋而稅反育上子代反氶受也正作載也第四卷堅鞕五孟反亦作硬塵坌步悶反珉陁上美巾反企耶上丘弭丘智二反第五卷流澍音注驚駭戶騃反柔輭音軟嗅者上許右反第六卷𢬃令上於力反駛流上所事反疾也嗄上音西下所詐烏芥二反聲敗也上作㽄嘶𧬊三形嚬蹙上毗反下子六反嫉姡上自七反下都悟反我諳烏含反縣忠音巨第七卷𦕍嗜上都含反下神利反痆斯上女黠反愚憃江絳二反瑩拭上於定反俎壞上疾與反正沮第八卷而龍上託田反聚戲許義反洗濯音濯縫綴上扶峯反下竹稅反弊步祭反汙垢古口反正作垢蚤虱上子老反下所擳反詶對上市由反嫉姤都故反躭嗜上都南反身力垂反為郎刀反問訊音信躁動上子告反葛家上音割中音蒙下音万穰上而羊反下羊力反膖脹上普江反下知向反少音年荼上之然反下宅加反屠煞者捴名也蚊䗈上音文下音盲囂舉上許反獷古猛反又音黃非貪婪郎南反發趣七句反正作趣第九卷睡眂莫賢反第十卷防禦音語惸獨上巨營反無兄弟也傭力上余封反賃也𩓋寶雲經等二經十卷同帙寶雲經七卷第一卷逯得上徒礙反首槾洛登反正作楞三昧名淵池上一泉反深也煴光上於云反頂信息進反會也門曰也正作凶二形也揣食上徒官反荊蕀居力反徧祖上疋連反下徒坦反上又音遍悞正作偏袒也恨悷力計反正作佷悷有子𠔃反華𩭈音幽莫瓶反裸者上乎瓦反瘂者上烏下反不能言也或作𤺘癖者上補益反跛也通俗云攣跛躄也謂脚手不伸也正作躄又疋益反非用瘸巨靴反懷孕羊證反華音坎上口庚反搥𭚖上得迴反下浮九反特上頂反澹泊上徒敢反下普百反又蒲各反非旃衣上諸然反之也尒雅云章旃以白為之不盡也倮形上乎瓦反淨也如來塌音塔緻密上池利反稠也瑕缺犬穴反抓齒上爭巧反皮膚音夫涕唾上吐計反鼻也俗肪膏上方房二音下古豪反腦膜上音𢙉下音莫心膽都敢反肝肺上古寒反下芳廢反脾賢上步卑反下時忍反悞膓𦝩云貴反正作胃百羊涉反牛肶百也又直反非又經音義作尸涉反非自𦿔必祭反憒閙上公退反下女孝反不𨵗丘月反第二卷毀訾音紫愧𢟻女板反慙而靣赤也亦悚懼也正作𧹛戁二形也寶雨經作羞恥字是也捲打上巨貟反正作拳蹴蹹上七六反下徒盍反踐也下又音沓淤泥上於據反眼瞙音莫渙然上火乱反炳徹上兵永反鋒炎上芳逢反下羊贍反熟臃於容反憒市女孝反不靜也正作𠆴懟恨上直遂反膚體上方無反志逞領反通也疾也盡也經音義云快也𫽄也擾𡧱上而沼反乱也亦作嬈同上如吁音呼又况于為遇二反悞互為上乎故反如犀音西牛也似豕角在鼻上正作犀也僧坊音方院也又音房舍也居也𮌨脹上疋江反下張亮反蚊翅音施鞭打上卑連反縷綖音線第三卷𢤱悷上力董反瘖啞上於林反下烏雅反𢭀火上序全反蝎上子老反下許謁反上又或作音峯流澍朱句反時雨也溉潤上古代居氣二反善五加反正作㸦也淹灑上於廉反漬也麞鹿上之羊反火𤏙奴短反得煴烏昆反正作温也又於云反非憘樂上許記反好也欝上於屈反下之勝反熱氣也下悞隱弊必祭反正作蔽昬暝上呼昆反下莫瓶反𧣦魚上音交正作鮫龜鱉上居追反下并列反獐鹿上之羊反不䩕音硬聚渃郎各反穬古猛反第四卷龍𠌵音像筫直上之日反下持力反正作質直他𢭃音短頻蹙子六反瞋厄所側反正作色卒暴上倉𣳚反下步報反上音湏正作卜莖上布木反下音逝正作筮决疑也正作筮龜日卜蓍曰筮太公曰卜者半十之義也无𮋅於計反𨙻㑯苦反正作項誹謗上夫微反下卜浪反闇𭔁莫瓶反畏𢗂音忌辞辨音辯騫吃上居輦反正謇鮮少上息淺反謟詭上染反下居委反聾噁烏雅反正作啞以巧苦夘反能也正作巧也字從丂音考非從𠔃塗佳上達乎反下古定反第五卷依𠗦皮陵反除愈余主反戲咲音笑憘戲上許之反正作嬉𮤝少上丘月反