矝高上居陵反玟瑰上莫迴反下古迴戶灰二反𤚐牛上莫交反自𦷥必祭反盲暝音𡨋儀式音識法也用也第二卷多阤音陁又尸尓反非倫疋普必反隤落上徒迴反小墜池也欻然上許物反嬉戲上許其反遊也衣祴古得反衣袖也幰盖上許偃反姝好上尸朱反不匱巨位反乏少也傾斜序嗟反基陛上居之反下步米反頺毀上徒迴反正作隤圮上皮羙反岸毀也相丞作披羙反非也下格反落上直尒反𡶤也正作陊陀裭三形椽梠上直緣反下力与反𤜴狸上由秀反獸名似猨正作𤜴狖或作鼬鼷鼠上戶雞反下尸与反𧏙蜋上丘羊反下力羊反咀嚼上自与反下自雀反踐踏徒盍反正作蹋䶩齧上竹皆反齧挽曰也玉篇作䶩𭃄作也下五結反又上在計反常至齒也非用𢲻上市各反下子活反䶥掣上爭加反下尺世反啀喍上五街反下助街反犬闘㒵也㘁吠上戶高反正作嚊也下扶廢反皆歎聲孚乳上芳無反卵生也正作孵蹲踞上自尊反下居去反撲令上步角反擲地加頸經郢反在前曰在後曰項又巨成反裸形上胡瓦反淨也黑瘦所右反爆聲上補孝補角二反火烈聲熢烰上蒲紅反下蒲沒反煙起㒵也亦風㒵也正作㶿也下又音浮悞也𦽦莚上無販反下羊線反不斷也躭媔上都含反下兖反繒纊上疾陵反下苦謗反細㲲音𤗊頃瘦上苦沒苦本二反白光也黧黮上力𠔃反下徒感他感二反今皆作黤字呼烏檻反疥癩上古拜反下郎達反今皆作頼字呼馲駞上郎各反下達何反蟒身上莫朗反聾騃乙駭反唼食上子荅反矬陋上昨禾反下婁豆反攣躄上吕貟反下必益反背傴於主反痟瘦上相焦反瘖瘂上於今反下烏雅反𣧩歿二音終沒傭債上余封反下女甚反擗地上毗益反燋悴上疾焦反上又焦了二音悞下疾遂反雇汝上古悟反跉跰上力丁反下普丁反毀呰音紫注記上中住反券䟽上去願反䨱自上芳六反審也躃地上蒲益反眇目上小反草庵烏含反第三卷卉木上許鬼許貴二反草木惣名等澍注樹二音時雨靉靆上烏礙反下徒礙反枯槁苦老反乾也塠埠上都迴反下扶久反象土日塠山無石曰凖正作堆阜也悚慄上息勇反下力日反憺怕上徒敢反下普白反盲暝莫瓶反第四卷貿易上莫𠋫反交易也市賣也正作字躰似貿音負非呼𮛫七上徒到反毀訾音紫穿鑿曹作反正作鑿乾𤍜蘇早反龕室上口含反問訊音信關鑰上古還反下羊略反手抱北馬反捉也正作把又步巴反亦悞正作法華云若以一手捲捉盡於虛空是也淳善上市倫反第五卷菓蓏郎果反嚬蹙上毗反下子六反卒暴上寸沒反相扠街反相撲步角反正作𢷏旃陁上之然反代王煞人者即今瞺子也畋獵上亭年反漁捕上牛居反下蒲故反膾上苦迴反下古外反𭃄肉也輕𮆘莫結反憒𡗚上古對反下女孝反面側瘦反第六卷擣篩音師瞻蔔步北反褰縮上去𠃵反澀沙丘反創緊上楚㽵反下居忍反喎斜苦緺反口戾也緺古喎反䐔䏲上卑典反下他𠔃反薄㒵也正作匾篋曲戾力世力結二反曲也乖也窪曲上烏花反四也深也第七卷苦惚音𢙉又音忽非謦欬上苦頂反下苦愛反作聲警覺也細粖莫鉢反此堓音岸六銖音殊兮也十黍曰銖也又云十二粟為一分十二分為一銖二十四銖為一兩也甄迦上居延反名甄迦羅亦云矝羯羅此名千万億為𧂐子賜反收取上尸由反亦作薝蔔上之廉反下蒲北反大智度論云黃花也㥲恚上尺真反下於季反甄叔上居延反樹名甄叔迦其花赤色此寶似之故以名之亦云緊獸第八卷呪咀阻䟽反正作詛摩奴禮反咩上尸遮反下尒反今皆作也反羊鳴音多瑋云鬼反子聲呼之叉裔以世反簸蔗上補可反下之夜反叉膩女二反正作膩二形便哆上步田反下多可反阿亶多旱反平聲呼之又相丞作壇呼之非也波力計反漚究上烏侯反帝上直一反卸樓上于牛反舎略力者反自𭃄义邏郎个反上聲呼义冶羊者反正作冶𬞈上而反𠰥字𭃄脚郁抧吉以反目抧同上緻抳上猪履反下女尒反𭡱抳上直尼反正作𭏊𭏊婆上𡰱反摩蹬音登頞㡳上烏反睪帝上古刀反提泯音民㝹𨢘上奴侯反下呼𠔃反斗尺證反正作秤羶上尸然反下奴禮反阿㤢徒果反正作惰也大唐玄奘三藏重譯云怛唎阿背縛僧伽咄略此經云帝阿惰僧伽兜略皆梵言訛舛略廣有異也應和尚音義云怛唎此言三阿特縛此言世僧伽此言眾咄略此言同一種所謂梵言帝阿㤢伽兜略唐言三世眾同一種也僧伽是梵語眾是唐言也又尼夜反不失梵音字義也云云又見經中作郁於六反非也兜略上都侯反下力也反三摩地徒利反此真言內有七个地宇除三摩地字其餘並途賣反繚戾上力小反下力計反角睞郎代反傍視也見別本作𣍿非膿血上奴冬反古文作舋樹正法華經一部十卷一帙第一卷㝹奴侯反牛呞音詩梵言波提唐言牛呞亦云牛主離越上力義反上方經作雖越非也薄拘盧中九愚反妙法蓮華經作薄拘羅拘絺夷反妙法蓮華經作摩訶拘絺羅秦言大滕也上方經作薄拘盧揥彼經悞也又盧字下揥字上少拘字也又應和尚音義亦作盧揥並非也盖傳寫之悞矣揥丑例反溥首上音普寶積經作普首菩薩也即文殊是也又作濡或作漓同而朱反又作耎渜二同人兖反恩施上方經作拖尸智反所照上方經作炤之妙反㷿明上羊贍反正作焰柔𣽈音軟燕居上一見反脩羅名金翅音施妙法蓮華經云有四迦樓羅王講渲上古項反下羊闡反下作演也又音選非身音㒵揵沓惒上巨焉反中徒合反下戶戈反摩𠇲許牛反亦作𬽼周旋上方經作𢭀序全反𤇏民上之陵反眾也遙見上羊招反上方經作逢非闊上迴反彰顯上音章下呼典反上方經作顆樓藏經音顒非也暨今上巨既反𧨏乎上魚寄反与義義同㸌然上呼郭反正作霍貧劇其𨒫反覩盻普幻反羙目視也正作盼䀎二形又詣系二音並非牀臥上助㽵反机㯓上居履反下他盍反環珮上戶開反下步昧反所猗於綺反施與上方經作拖尸智反闌楯上郎干反下食准反恡惜上力進反上方經作左法式音識用也儔正上直由反下普吉反正作匹捐棄上余宣反下輕利反修上子管反有遙上于救反正作又也下音搖上方經作又兆載上直小反下子改反上方經作坐非秉勢上兵永反擊扣苦狗苦𠋫二反僉然上七廉反撾捶上陟花反下之水反蠲除上古玄反憒乱上古內反除上魚吠反懷合作㘌巨𨒫反盛也濟裸戶瓦反兆載上直小反上方經作坐同兆溥柔𣽈上音普下音軟芬馥上芳文反下扶福反昱鑠上羊六反下羊略反光明也正作煜爚也下又尸斫反非𭽀麗上倉贊反煒曄上云鬼反下云輙反曰光也上方作煒畢斑斕上布閑反下力閑反奮大上方問反法𧋠郎和反海中介虫也亦名貝燈明上方經作鐙用音登佛名也愁戚七歷反上方經作𭀁璝異上古迴反正作瓌也上方經作樓藏經音徒見反非定光上方經作錠同徒徑反錠又音殿瑕疵上戶加反下自斯反猶豫上羊修羊秀二反下羊庶反不定也猗靡上於綺反猗狔順風也下文彼反偃也𭦟羙也較略上音角略也直也又音狡法㹸音㒵犾也明哲亦作悊知列反智也上方經作喆蚑行上巨支反䖝行㒵也又去智反喘息上尺兖反蜎𧍃上烏玄反下音非正作飛又房未反非𧑮動上而兖反𠬧屏上尸由反下卑領反卷束也辟易上普益反法也下以義反𢢔也佳矣上音街善也下于起反靈洋音祥上方經作珜音非也妙法華經云如優曇鉢花是也優曇鉢樹名也此樹佛若不出世則但結子而無花諸佛出世方有花耳𭤔有上許衣反蒸庶上之陵反下尸去反凶暴上方作下方報反等詶許運反敖也正作訓雜糅女右反上方作禄非也瑕疵上方經作瑕玼同自斯反玉病也䩭繫上居冝反承民上之陵反正作蒸𡐊治上古歷反下音持刻鏤上苦黑反下郎𠋫反模像上莫胡反𢙣餝上烏各反白土也正作堊下音式蕭成上蘓條反樂噐也大者二十四管無依小者十六管有成下冝作箎音池樂噐也以竹為之大者長一尺四寸小者長一尺二寸有七孔也妙法華云簫笛是也嬉笑上許記反肅敬上音宿恭也鐃鏡上女交反皷似鈐有柄無古執而鳴之抱灑上冝作浥同於急反濕潤也又一入反拊挊上芳武反下郎貢反拍手作舞也下經音義作挊皮變反南无莫胡反梵言南无此云歸依亦云救我也上方經作南摸律𥐛上力出反下伏亡反禁也正作防樓藏經音作砌七細反非也探覩上他含反𡶤墜上下𪪺反下直遂反六塹七焰反曾眗音舜正眴不肖音笑似也尋俓古定反道也正作徑也上方經云尋時往詣此經云尋俓時詣靈瑞上力丁反經文作雩非容音㒵上方經作徨非琦上巨冝反求都管反正作短𢭃二形第二卷悼感上徒到反傷也憐也均惕上之若反戰也憂也正作灼灼二形下吐的反讌室上一見反弊𢙣上步祭反祠祀上音詞下音似我適音釋纔也上方經作這而引上方經作弘以忍反彼岸上方經作五按反未嘗石羊反又音曾柔𣽈上而由反下而兖反上方經作筞𣽈非志強巨羊反上方經作彊非予决上音余我也上方經作于音牟非亘然上古鄧反遍也嬉戲上許之反下許義反好憘許記反好也正作嬉也又音喜非㲘氀上巨俱反下所俱反織毛褥也正作氍毹綩綖上於遠反下以然反鑠如上尸斫反光明也冠幘上音官冤也下音責小冠子也履屣所綺反上方經作蓰停儲音除適出上音釋上方經作這志操七到反停畜六許六二反聚也積也上方經文作稸眾冥莫瓶反燒𬉹之亦反脯煑上芳武反稠煑也正作熏也下之与反盪逸上徒朗反放戲也正作𢠽難𥧝音悟上方經作𮄆非孚出上芳務反急也疾也正作䞯二形也又芳無反信也非免上眉辯反脫也止也上方經作勉慍恨上於運反帑藏上他朗反金帛舍也榱棟上所追反捔也椽也下都弄反屋脊梁也軒闥上許言反簷也下他達反門內也窓牖音酉崩隤徒迴反墜也亦作墤覆苫失占反虺虵上許鬼反虵名廣三寸首大如擘指或走或飛或爪鱗音義云一身兩口也蝮螫上扶福反下尸亦反經音義作蝠上方經作蝠螫並悞下又呼各反𠆐上徒困反逃也隱也正作遁遯三形也上方經作重經音義作垂並同音遁下倉乱反藏也上方經作富樓藏經音隨凾錄中作癲丁年反非狖狸上羊秀反鼠属也正作鼬也狖獸名似猨也又別本作狐狸非鼠上戶雞反下尸与反嗚呼上屋胡反歎聲也又嗚呼𠮧喚聲也古文作於戲啾唧上子由反下子悉反上方經作啾㗌溷廁上戶困反矢溺上尸旨反下奴吊反上方經作屎溺䖝用上直中反下步𪪺反正作蠱明也妙法蓮華經云𧏙蜋諸䖝是也上方經作䖝明亦悞也㓨棘居力反㘁吠上戶刀反咀嚼上自与反下自雀反窠窟上苦禾反鳥獸所居也上方經作萂非也掣上側加反以指按取也正作摣䶥二形下尺世尺列二反上又女加反正作摣疲𤸑上音皮下所右反也瘠也正作疲瘦二形也下又𭷀富𭷀福二反並非齧上魚綺反側齒齧也樓藏經音作䶩在詣反非也下五結反齩也蠅蚤上羊陵反下子老反䖝名壁虱所擳反孚乳上芳無反𡖉生也羯羠上居謁反下辝姉反犍羊也𦍞羊上丁西反特羊懷恧烏各反正作𢙣也又女六女力二反非塚埌上知勇反下郎宕反方言曰墳堬培塿埰埌塋壠皆塚別名上方作琅非也鳩桓戶官反妙法華經云鳩盤荼鬼祝術上之右反撲令上步角反下方經作摸絞加上冝作交又古巧反非頸項上居郢反下戶講反厥狀上居月反其也扈上蒲未反下胡古反遙見上方經作逢同音悞茤蒿上測俱反草也正作芻也下呼高反鍼𭉨䖝上之林反中即委反下音直中反上方經作鍼虫䥫喙許穢反鳥口也𢢔幹古按反圮裂上皮羙反破格反上六經作居跱直里反燔燒上扶番反恇攘上丘狂反下如羊反逼迫也正作劻勷也上方經作框攘也懷懅其去反急也烏殟烏𣳚反又音温灰燼辝進反燭餘也上方經作灰蒭非𬉹燎上之亦反下力小力照二反燋爛上即消反下郎歎反噉食上徒敢反上方經作骰非也熢勃上蒲紅反下蒲沒反奔鶩音務馳也奔也正作鶩也上方經作務非蜈蚣上音吳下音公上方經作螇蚣上音奚非蚰蜒上音由下音延蚔䖧上巨支反下知列反毒虫齟齚上自与反嚼也正作咀也下助迮反齧也上又床呂反齬齒不齊也舘內上古乱反闇弊必祭反掩也正作蔽閇塞上并例反下乘則反盲䠿吾恠反聾也正作聵魃魅上於嬌反上方經作魅又音非執愚上之入反忖度上村本反燒炳而恱反燒也正作焫𤑔躭媔上都含反下兖反愍猥上眉殞反下烏悔反鄙也勱厲上莫芥反勉也強也下力世反勸也又上方經作勸厲上丘願反又經音義作勉厲上音免眠𮄆蜜二反珠璣音機白縶音細布也正作㲲經作縶茵蓐上音因下音辱惋綖上於遠反下羊然反地衣也上正作綩也又烏喚反非也擾馴上而沼反下似勻反順也善也從也上方經作擾偱非用縶紲上知立反下相列反繫也下亦作絏靾𦁛三形也上方經作繫紲非闡上苦迴反下昌演反上方經作核闡非不勌音倦典摸莫胡反法也頑騃上五還反下五駭反下音作疾謗訕所顏所諫二反謗也蠱狐上羊者反憔悴上自焦反下自遂反黤上烏感反下他感反黑也下又都含反撾捶上陟花反下之水反搒笞上步盲反下之反軀形上丘俱反瘦燥上所右反下乘老反上方經作疾𤍜又經音義亦作痋𤍜非用懊𢙉奴老反上方經作懊憹身疽七余反癘創上郎太反下楚㽵反痤陋上在木反短也正作矬下郎𠋫反戲弄上許義反下上方經作上下音弄相蹹徒盍反上方經作踰非也處上徒的反北方胡名也正作狄𧑮動上人兖反聾啞烏雅反憂瘀於去反上方經作非喚唽陟轄反鳥鳴也經音義云冝作吠馬交反水腫之勇反上方經作冰漜非也楚撻他達反騃五恠反毀呰音紫瘖瘂上於今反下烏雅反梨黮上力𠔃反正作黧下他感反好忤音悟𨒫也觸也上方經作忓非思僥古堯反求也第三卷怡上許之反下以之反和懌音亦恱也老耄莫𠋫反尠少上息淺反芬薀上芳文反下於云反應和尚以盆蒀替之上扶文反流宕徒浪反過也僑停上巨反寄也馳騁郢反帑藏上他朗反竊唯上千結反私也騷散上乘刀反遑懅上戶光反下其去反躃地上毗益反呰計上紫斯反量也思也上方經作貲財非用璝異上古迴反則譬疋義反飢𩚛奴悔反餓也正作餒妙卬伊進反卬卬五郎反恭敬㒵也志操七到反欲自濟上余玉反下即計反上方作洷古文作𣸫根原上古恩反欲使上余玉反正作欲也下音史矝施上居陵反悒慼上於急反下七歷反䐗上竹魚反下直利反豕也関東謂猪為也正作彘也上方經作彘是也鷄騖音木鴨也正作鶩野曰鳬家曰鶩羠羊上辝姉反又音夷也計隰音限慕傒音計正作係又音奚夷名也非𭍠口上音胡粥也正作餬或作臺也又音色非征營上之盈反褊上卑緬反荊𣗥居力反𨤲身上力之反畫也正作嫠上方經作剓券莂上丘眷反下兵列反猗住上於綺反上方作倚所牽去堅反別本作幸非擗地上步益反赴強上芳務反下居良反正作超僵上方經作僵仆薀積上於云反下子賜反上方經作薀藉非也悞虧敗上丘隨反又上方經作腐敗上音父糞壤上方問反下而兩反鹹釀上戶緘反下女亮反上方經作醎釀下女容反不知何正𠢕黠上戶高反侯也鞭杖上卑連反財賄音悔完具上戶官反全也塠阜上得迴反下扶久反雨上注樹二音叵我上方經作𧿽𨀳上普可反下五可反傾㒵仾仰上丁西反下五郎反䀎布上知与反正作貯也又音麵非區域上丘愚反垣院也域也上方經作塸鳥侯烏口二反並非激灌上古堯反又𠮧擊二音非浸漬才賜反林蔍郎木反正作麓蓄幽藪上曰六許六二反聚也下乘走反上亦作稸萌葉羊接反正作亦作也上方經作苦結反非木上居幽反亦作尓雅曰下勾曰上勾曰喬也幹上古哀反又音皆正作荄也荄謂草根也下古岸反莖也陜隘上戶夾反下烏介反上正作陜狹迮處上阻格反上方經作窄處著靽音半草㓨亦作莿古文作剌同七賜反字從夾非從束䅥䅥居列反長也木髙㒵也又割渇二音枯𤍜老反力耐奴代反伎也正作能也墮草上他果徒果二反雨下也豊美眉彼反上方經作羡非㧾智上子孔反而澍音注陶家上徒刀反埏埴上失然反下時力反盛釀女向反醞也上方經作釀女容反非也縱使上子用反上方經作縱熱癖並益反㕮咀上方武反下子与反漬藥也以物初碎也㨶合上得老反針灸九敕二音躇步上直余反緩行萌洮音趙正作兆也淳愚上時倫反上方經作淳𡨋非寶上方經作珍陟隣反儔莂彼列反移蒔也拜授上卜介反正作拜𢱎撫䘏上芳武反下私律反跱舘上直里反下古乱反限笇乘乱反計𢿘也上方經作笄非柔𣽈音軟上方經作䎡也斐𭽀上芳尾反下倉贊反第四卷悠𨗿上余修反下莫角反𬽜𬽜於容反和也肅肅音宿敬也潛淨上自廉反上方經作潛靖傾猗於綺反脫上眉辯反晃昱上戶廣反下以六反𧰟䀎上音焰美也下普幻反視也下又音麵鑠鑠尸斫反光也正作爚又音藥駱驛上音洛下音亦馬也弈弈音亦羙也煌煌音皇光也昱曄云輙云立二反僥倖上音澆下音幸逯得上音代及也正作逮傎見上直至反遇也正作值懽喜上呼官反方筞楚責反倡道上音唱導也饒裕音喻寬也荒陬音聚又子侯反聚居也又子于反開闡昌演反大也明也問也經音義作閻應和尚以闖𨷕二字替之闖𨷕二同于彼反並非也彼悞子聲上羊諸反創礙上楚㽵反羸上力垂反下步介反訟訴音素諄諄之倫之閏二反怜上居陵反下力延反還上居隨反𡓜垣上目羊反下于元反綺𡣶自贊反好㒵也誘恤上音酉下私律反謏也誘也正作𮗼也勉厲上音免勗也梅還上呼罪反正作悔第五卷邠耨上彼巾反下內沃反解懌音亦不嫪郎告反𠫤也婟也戀也上方經作悴非也裸軆上戶瓦反上舡市專反正作舡又呼江反非用舉帆音凡四隅音愚角也丘墟去魚反谿谷上去𠔃反荊棘居力反核大上古哀反正作垓嫉二形盛於斤反大也正作殷淳㝹上市倫反下奴侯反探挔上音貪下魚既反果敢也正作毅也上方經作穀可否方久反賀易上莫𠋫反下以益反求眺吐𠮧反望也裁自上音才今作纔傒活上音計正作係谿𫮺火各反頑嚚上五鰥反下魚巾反聽上卜各反廣也正作愽諸篋苦叶反曠邈上苦謗反下木角反攬攝上郎敢反剖判上普口反崖底上五街反下丁禮反下又別本作二形同音底脩執上音匈正作脩洮汰上徒刀反下達大反洗浣也正作掏汱也下又音太去沙也上方經作洮汱第六卷𦬔勳上芳文反下許云反經弓古顛反正作弓舋咎上許覲反下巨久反崎岴上丘冝反下丘愚反顯綽上呼典反下尺若反𦬔薰上芳文反正作芬也下許云反穿鑿音詐穿也正作鑿也燥土上乘老反墟𨽁上丘魚反下自遇反眾人所居處也逢見上音搖正作遙遙二形亦作逢四嵎音愚正作隅眾流上之中之仲二反多也經音義作潀之中才冬二反非也移徙斯此反移也管籥羊略反鎻也關柚上古還反下直六反悠悠音由跳著上冝作挑掉二形同大了反擲也拋也又音𭛹躍也非手捲巨貟反華裔上戶花反下以世反問訊音信海淵烏玄反儱戾上郎蓳反下力計反調馴上徒聊反下音旬善也經音義作裝馴非敬遶巨迢反正作逵也敬愛也逵道也妙法蓮華經作大愛道比丘𡰱是也敬遶同上也此正諭諂上羊朱反下染反第七卷弋射上羊力反繳也也亦作堆下時夜反繳音斫矰也雞鶩上吉𠔃反下務木二音野鴨也不𢚄郎告反正作嫪綢繆上直由反下美休反緾綿也下又音謀調譺上徒吊反調韻相嘲也弄也下魚記五介二反嘲也欺也謿談上竹交反咏也親稚直利反䖝蚤音早差錯上楚加反下倉各反經音義作唾踖非也明喆音哲眩惑上玄縣二音乱也藏戢阻立反伓帛上知六反正作竹也簡也秦已前未有紙皆載文字於竹簡也簡竹片也下音白也古者無紙皆於絲帛而載文字也上郭迻音者丕非也又玉篇作方鳩反亦非也歌咲私妙反正作笑儭著上楚覲反裏也匧藏上苦頰反笥箱類也圓曰簞方曰笥也縶薄上徒叶反綄綖上於遠反下以然反上正作綩也又丸綏二音非也叡喆上以稅反下亦作悊二形柔慎又作慎同音順又時刃反詳義讀之勞廢方吠反止也退也經音義作廢廐非被柷之審反躊躇上直由反下直余反憎上則登反下烏故反㸌然上呼郭反明㒵溥首上音普寶積經作普首菩薩是也又作濡或作濡同音儒又作耎音軟不綜子宋反濡首上与溥同又儒耎二音未率所律反𨶳𨵦上去隨反下以朱反欲距音巨違也大邽愽江反國也正作邦二形也又音圭非也悞舊武上方問反正作奮尅揵上苦黑反下自反必獲也下正作摙稽乘朗反攻涇上古冬反下羊林反尅揵自反戰慄力一反藏上苦叶反道塲直羊反平淨地也正作場也諸佛於中坐禪得道故名為道場也又音商非也又別本作壕非也後現壽品亦作場疇類上直由反惔怕上徒敢反下普百反悉靖疾井反審也安也和也剖折上普口反下先擊反淡泊与惔怕同也下又音薄非錠光上徒俓反貧寠其禹反空也貧也正作寠也孜孜子司反遽也力篤愛也經音義作忱忱以元字替之非也忱音岏非稽首上苦禮反悶愊普逼反倒也著地聲也正作福踾二形也又應和尚以腷字替之皮逼反腷臆不泄也儱戾上郎董反瘳愈上由反下余主反終歿音沒夢曀上呼弘反下一計反死也正作薨殪愁悒音邑憂𭀁倉歷反郭氏作思占反非闇𡚁必祭反正作蔽第八卷㩉席上他盍反油鐙音登古文燈字𩚢上徒兮反下戶吳反蘓精也正作醍醐下亦作餬也涅槃經云從乳出酪出生蘓從生蘓出熟蘓從熟蘓出醍醐也錠鐐上音下音聊大燭也正作燎也並俗力𡚁步祭反困也正作弊疲殆音待嬾也貲計上子斯反量也正作訾偏戾力結反塞𪖵上乘則反下烏貢反不癖必益反跛也正作躄也又疋亦反非痿黃上於為反完具上戶官反朽耄莫報反𣧑𢙣上許容反迎上疋聖反問也捎拂上相焦反下芳勿反觜鵶上即委反下烏牙反鵁鶄上音交下音精鳥名似鳬脚高毛冠江東畜厭火下又音青藏去丘与反藏物也正作弆四激音𠮧小道也徑也南人呼四徑路為四激道也正作徼也牸牛上才寺反往造七告反和淑市六反善也蚖阿上音元蠑蚖也亦名蜴蜥亦名蝘蜓一名守宮俗謂之地師皆一物異名也又五官反虵名也諸經云摩羅伽此譯云大胷腹行也亦云蟒神亦云腹行神也此龍類中攝也如後云蛟阿湏倫是也蚖字或是蛟字悞作蚖矣嚮餼上或作饗同許兩反下許既反經音義作饕餮非也此經無蛟阿湏倫上一音交龍属也山海經曰蛟似虵而四脚頭小有角細頸頸有白纓大者十圈也前作蚖疑是蛟字耳下一音輪諸經云阿脩羅此經云阿湏倫聲之轉也梵言阿脩羅唐言無妙戲也云云第九卷獷古猛反制止上方經作剬山非經卷上方經作弓居願反眼耳上五限反上方經作非也𦿔礙上必祭反覆也掩也上方經作歒㝵非漬溺上疾賜反續逢音搖正作遙也形嘆私妙反正作㗛𦒱𢱊力向反笞也毀呰音紫形嘆私妙反正作笑也悞欽尚上去今反上方經作鈷音古非也典誥音告上方經作詔非彼音岸演舊方問反揚也正作奮號咷上戶高反下徒刀反上方經作号啅非也裸露上戶瓦反𤵜疾上刃反𤵜宿病曰𤵜亦作疼上方經作疾非也懷抱步保反上方經作𭡽桅非也悞適見上尸隻反上方經作這逢讚上音搖正作遙雜糅女右反相和也嵠澗上苦𠔃反寶瑛於亰反上方經作璞非問訊音信愚癡之反亦作痴也又或作疾五駭反癡也上方經作疾非秏呼告反遝得上徒愛反還正同上正作逮也逮及也第十卷治上苦老反下直之反打也代也周序全反經卷上方經作号溷廁上戶困反穾鬼上徒骨反𣧑呪上許容反魅𩲐上冝作魃妖二同於嬌反下眉秘反下正作鬼也上亦作邪狐鬼之属也蟲道上音古正作蠱也又羊者反並毒藥也上方經作主非苻祝音呪此舋香覲反軻雪上苦何反正作珂也无𣏾羊力反合作我妙法蓮華經云阿檀此云無我經弓居勸反謿讛上竹交反下魚例反正作藝也又應和尚云合作譺五戒反嘲弄也鷄鶩務木二音調戲上徒吊反下許義反生靤步㒵反瘡也創痍上音瘡下音夷憎恧烏故反正作𢙣上方經作𭞪也𨗻㧾上徒愛反下則孔反仾頭上丁𠔃反上方經作非白添品法華經等二經十一卷同帙添品法華經八卷第一卷序燉煌上徒䰟反下音皇郡名龜茲上居追反下子司反國名也西域記作居支上居勿反又上音亡也下音慈寶積經作丘慈䡄上音犯常也下居羙反崛多上巨句反笈多上巨劫反經文頻螺郎禾反拘絺夷反漚鉢上烏侯反婆稚直利反騫丈上丘乹反下徒介反輦轝上力蹇反下羊諸反步挽車也正作輿駟馬上相利反捶打上之水反惟忖七本反法䗍音螺適從上尸隻反從也始也悟也纔也正作適又音躄猶豫上羊修華秀二反下余反下定也嫉姤上自七反下丁悟反下又音搆非瑕疵上戶加反下自斯反糟糠上子刀反下苦郎反尠福上息淺反歧夜上巨支反矝高上居陵反自賢也自大也白鑞郎盍反膠柒上音交下音七犛牛上莫交反儀式尸力反法度也第二卷頺毀上徒迴反正作隤腐敗上扶武反朽也欻然上許勿反嬉戲上許之反遊也衣祴古黑反衣袖也勇𨦣余梲反利也傾耶祥嗟反不正也正作襄斜邪四形基陛上居之反下步米反圮上皮羙反下格反落上直尓反散也落也毀也覆苫上芳富反下尸瞻反椽梠上直專反下力与反蚖虵上五官反毒虵蝮蝎上芳福反下許謁反下又音曷非用咀齚上自与反下助百反踐蹹徒盍反䶩齧上竹皆反齧挽也出玉篇下五結反上文在詣反義不挼𢲻上卜各反下倉活反齟掣上側加反以指按取也正作䶥摣抯三形下尺世反挽也也上又床呂也非也嘊喍上五街反下助街反㘁吠上戶高反孚乳上芳無反夘生也蹲踞上自尊反下居去反土埵徒果反又都果反非撲令上步角反例也加頸居郢反裸形上戶瓦反𮄚看上兵隨反爆聲上卜㒵反熢㶿上步紅反下步沒反煙起㒵也𦽦延上音万下以面反不斷也蝮上五官反正作𧈭也又許鬼五骨二反非躭愐上得南反下兖反張施失支反柔䎡音軟繒纊上疾陵反下苦謗反從自用反阿鞞毗𠔃反梵言阿鞞亦云阿惟越此云不退轉即弟七菩薩也𩑔瘦上苦沒苦本二反白禿也梨黮上力𠔃反黑而黃也正作黧下他感反黤黮青黑色也疥癩上古拜反下郎達反觸嬈奴了反蟒身上莫朗反聾騃五駭反唼食上子合反痤陋上自禾反下郎豆反攣癖上力貟反下卑益反背膒於禹反不伸也又烏侯反非也増劇巨𨒫反抄刼上初孝反聾啞音瘂瘖瘂上於今反下烏雅反𤻕疽上於容反下七余反商估音古賈客上音古居賈也行日商又音嫁人知善𢙣也庸賃女甚反躃地上步益反憔悴上自焦反下自遂反酢上羊廉反下倉故反跉跰上力丁反下疋丁反毀呰音紫注記上中句反券䟽上丘願反眇目上小反相雇音故厚𥌎奴短反正作塌廟上他盍反第三卷卉木上許鬼許貴二反等澍注澍二音時雨也掩𦿔必祭反靉上烏改反下徒愛反蒲萄徒刀反枯槁苦老反所廩兵錦反愛也又力錦反非也與癊於禁反涕泣上他禮反憺怕上徒敢反下普百反勉出上音免強也第四卷溝𫮺呼各反𧴵易上莫𠋫反蹈七上徒告反穿鑿音昨乾燥乘老反第五卷欄楯龕上郎于反中食尹反下苦含反問訊音信關𨷲上古還反下羊略反手把博馬反捉也推鍾上直迫反打也正作推菓蓏郎果反辱鎧苦改反戲許義反相扠甲街叉相撲步角反戲咲私妙反魁膾上苦迴反下古外反屏處上毗政反隱辝無人處也又音餅輕蔑莫結反第六卷單已居里反正作己奮迅上方問反下相進反㨶上都老反下所綺反羅物也恃怙上時止反下胡古反𢭀捴上序全反下子孔反繽紛上疋反下芳文反面側瘦反缺落上苦血反正作也騫縮上丘𠃵反下所六反歰所戢反瘡胗居忍反喎耶上苦乖反下似嗟反䐔䏲上卑典反下他𠔃反薄㒵也正作匾𠥶曲戾力計反曲未也窪曲上烏花反凹也深也正作窪可憙許記反頟廣上五格反沫泡上莫鉢反下普包反第七卷䗍聲上郎禾反謦欬上苦頂反下苦愛反警覺作聲也𡄇欬同上怛姪上多達反下徒夜反奴𦍞丁兮反折唎上之舌反下力至反跢得个反糝迷上乘濫反𥣯鼻上烏合反釤所反杜頥上時夜反下余𦍞反並文自𭃄下正作頥憩頥上丘反下余𦍞反㿲上丘冝反下女買反囉膩女利反𮟩上郎个反下丁夜反鞞剎上步西反下音察鼻𡀔音路𥣯便上烏合反下蒲延反瑟䶩都皆反自𭃄唎書出反㔜地上步沒反正作勃鉢囄力義反𭦟窒𠼐上莫安反中丁結反下力𠔃反跢上都个反下居昭反𧿡柰上步末反下奴介反𭦟𧧂奴陁反拖音豕涉皤蒲播反頞荼上烏割反下屠家反比郅你上扶必反中都筆反下奴弃反文自𭃄部力由反睪帝上古刀反六銖音殊甄迦羅上居延反𢿘名也或云更割羅或云矝羯羅或云𠷐迦羅此云千万億指抓爭巧反為𧂐子賜反第八卷杻械上抽酉反下戶戒反𧬜訶上斯蠅反繚戾上力小反下力計反角𣍿郎代反傍視也或內視也俗謂斜眼曰也正作親睞二形也又辛七反脛節也非用維摩詰所說經三卷上卷踰於上以朱反越也過也常七感反悲愴㒵山相息羊反相擊相磋聲也熟聞上常六反誰也正作孰也坈坎上苦庚反荊棘居力反沙礫音歷𢲻摩上倉活反揣食上徒官反丸也塊也應和尚云冝作徒官反又云按漢書賈𧨏服鳥賦云何足控揣如淳注云音團是也又初委丁果二反非也拘賖上具于反无垢稱經作瞿邪古維摩經作瞿邪長阿含經作瞿耶又作瞿舍增一阿含經作瞿耶雜阿含經作瞿舍中阿含作瞿舍根本律作瞿舍又音俱唯有一經云舍下尸遮反𡬬闍上所姧反正作刪仾子上竹尼反正作𦙁翅舍上尸智反鳩䭾上居牛反下徒个反尼揵巨焉反外道恾然上莫郎反𡨋昧也不知也无所見也正作吂經音義作芒也恾怖也非殖眾上市力反豁然上呼活反勿擾而沼反煩也乱也嬈固上奴了反弄也俛仰上音免亦作頫𡨋者上莫定反羼提上初諫反此云忍中卷以己居里反自身為己魚并列反鼉上魚袁反下徒何反陶家上徒刃反針鋒音峯乘葉上子老反下以接反號泣上戶高反蹴踏上七六反下徒盍反唯𭊴香右反又七秀反非嚴尸力反漿也又作餙餝二形淤泥上於去反訥鈍上內骨反殖種上市力反置子於田也種也生也下之勇反子果也未生㸦者糞壤上方問反下而兩反之疇直由反華𩬞莫顏反𭘵乱上古內反𡗚也鉤牽去堅反不肖音笑似也不肖謂不似也不眴音舜下卷問訊音信鄙恥上兵羙反揣若上徒官反丸也正作團三形也諸經律中歡喜字作歡喜揣亦六歡喜丸是也按西域及諸番飯等皆以蘓酪蜜沒之為而食之也古經字皆作揣也支謙譯者云使眾人食𠰥湏猶不能盡唐玄奘譯者云假使無量大千世界一切有情一一食其食量等妙高山如是食或經一劫或一劫餘猶不能盡是也又初委尺丁果三反非此三呼也承聞有人定作初委反呼者非也若非今古對驗焉敢定指乎盖字體不正也應和尚云假借呼是也攏捩上郎董反下力計反多𢙣也正作𢤱悷瘡疣于求反小腫也磎谷上苦芳反貳吒上女利反正作膩或云阿迦尼吒或云尼沙詫正言阿迦抳瑟搋唐言色究竟華莫顏反正作鬘駒維摩鞊經等四經十卷同帙維摩鞊經兩卷吳支謙譯上卷維摩鞊去吉反正言毗摩羅詰此云淨名不倩七性反或云不請闚音上去隨反披羅門上音婆悞或作拔音跂編𩬇上步大反古文辯字甄陁上之人反蚑行上巨支反喘息上尺兖反雜糅女右反不猗於綺反不肖音笑恍惚上呼廣反下呼骨反心神錯乱也靈幻也普拖尸智反夷耑都官反外道名也亦云阿耆多迦𢪨先上古牙反中之然反下蘓千反中正作旃新經云迦旃延是也邠耨上彼巾反下內沃反阿夷恬徒兼反新經云新學比丘是也無創音瘡內坏普迴反於電子告反而詭居委反榮冀音既望也幸也新經云有何等利有何功德是也牛乳或作𧳮湩二同都弄反乳汁也又而主反悞也淳淑上市倫反下市六反妖蠱上於反下音野媚也恣態事容也㝡𫀽上子外反辜昭云第一為㝡下五口反匹也諧也正作偶露枰平病二音床也冝作棚步盲反從以為枰閤字是也枰謂獨板床也非取上居月反速也起也頺坑上徒迴反下苦庚反安錯倉故反正作措抧㧙上亦作眦㧗二同側買反跐蹋也㧗擊也下毗結反也西亰賦曰徒之所撞柲經音義云梵謂相椎曰秘新經云龍為蹴踏是也下又毗必反推也廣雅曰秘擊也下卷溝港上古侯反下音講預流果聖名也虫蚤音早已𮒽音悟不嬈奴了反亦作嬲俎教上目与反正作沮唯𪖻許右反恱懌音亦如類音蘱貧窶其禹反扶容蓮華盛㒵也正作芙蓉蘅華上戶庾反草也埤濕上音卑下田也汙田上音烏正作洿水不流曰洿也又烏故反穢也之疇直由反徒力計反菀囿音右厥實上居月反㕘駕上倉南反正作𩥵傍曰𩥵三馬曰駕華䰅莫顏反不殆音待嶮峪古木反勤恤私律反兆民上直沼反恒恊音叶首𨳰音閇又廣𪪺明集作首閉戶岸反不眴音舜作又作烏玄反正作也揣若上徒官反音鑛𢤱悷上郎孔反下力計反䩭靽上居冝反下卜畔反侏張上竹由反䛘也正作侜又音朱非創疣上楚㽵反下于牛反未孚芳務反疾也正作俘也又音敷非也不恐丘勇反以仂呂勑反不懈也又郎得反餘也漸漬上子廉疾染二反下疾賜反浸也度汜芳梵反俾沙上卑尒反藏上苦叶反墟聚上丘余反空也居也說無垢稱經六卷大唐玄奘譯第一卷無垢稱尺陵反梵言維摩詰正言毗摩羅詰唐言無垢稱舊云維摩詰此云淨名西域記云淨則無垢名則是稱也離呫尺反隧級上音遂古井中延道第二卷我㫺音昔往也古文昔字也出說文食上徒官反犎迦上方容反亦爾音尒整理上之領反正也正作整字從勑竚立上直与反待也久立𢎤發上以忍反貿易上莫𠋫反第三卷𢪨對上苦浪反下都內反𦬔子古敗反魚并列反鼉上魚袁反下徒何反第四卷上古頑反下古瓦反正作鰥寡字也鄭氏云六十無妻曰鰥五十無夫曰寡殟鉢羅上一烏沒反此云青蓮花鉢特摩此云赤蓮花也拘母陁此云紅蓮花奔荼利中宅加反亦云兮陁利此云白蓮花也𢌿濕上必支反下也驚巨季反心動也正作悸無瞬音舜憙見上音喜又音憘猜疑上此才反第五卷芬馥上芳文反扶福反正作馥斷生上徒管都管二反䫃𠫤力進反慓𢡠上必遙反下尺志尸志二反高舉物令人遠見也從巾第六卷恊同上音叶和也嗢拕上烏沒反下徒可反梵云嗢拕南此言惣攝舊云欝陁𨚗輕蔑莫結反大方等頂王經一卷彼音岸門閫苦本反芬葩普巴反係心上古詣反𣧑禍上許容反挍𩚠音識裝也㻕琦上巨屈反下音奇出應和尚經音義高鐙音燈姟兆上古哀反床㩉音塔寶塌同上探古上他含反恭恪苦各反好憘音喜冝作嬉許記反好也大乘頂王經一卷抧羅上古以反亦云雞羅梵言也此云不動方等經云門閫如捲音拳又音卷非用憒閙上古內反下女㒵反食善思童子經等二經十卷同帙善思童子經兩卷上卷玩咔音弄嬉戲上許之反𧿾於閫上苦化反下苦本反鏗鏘上苦𥝷反下七羊反曀不上一計反謌嘯蘇𠮧反戰恌徒了反動也又搖桃二音並非細喘尺軟反嶷然上牛力反搦拳上力角反握也又女百反猗著上於綺反正作倚下卷紅𦆝疋沼反謌嘯蘇𠮧反係念上古詣反連也大悲分陁利經一部八卷第一卷珊兜上乘于反下都侯反兜率天王名也棠觸上宅庚反為䰅相朱反根也正作䰅也惔怕上徒敢反下普百反埮頞上徒甘反下鳥割反悲花經作陁阿是也真言中字翅咃厲上吉攴反中託何反下力世反咃翅同上肆尸上相次反下呵𡰱反𭘳穾上以世反下頭骨反悲花經作闍栘頭𧯞上尸遮反下多豆反悲花經作舍多牟力計反牟邏郎个反瞋上音慎下奴禮反上亦作脊也悲花經作闍尼𪳉若上斯𠔃反下者反悲花經作斯比哆上步夷反下多可反檀哆上陁可反正作誃悲花經作檀陁毗滯除𠚫反經作際收反悞多咩尓反抳伽上𡰱尓反下巨迦反𭎐南上直尼反下㝹啖反婆𭎐音遅𠕀𨾤直𣅀反頞𩓂上烏割反下託計反悲花經作頞緹䭾上徒个反下力計反帝巨久反正作舅二形牧上尸牛反下步拜反羼帝上初諫反抧帝上吉以反欝𭎐上於勿反下直𡰱反蜫叹上卑𠔃反下初加反並正作螕又悲花經作比叱又經音義作螕以非股上音鉢正作般羅𧋠直六反正作𧏿悲花經作羅陁佉秖上丘迦反下求臂反自𭃄佉仚去智反阿𣆓女日反目哆多可反阿羅下冝作罷薄啞反悲花經作阿婆毗雉直旨反欝崘郎昆反兜嵐上都侯反下郎南反阿𠻬宅加反悲花經作阿荼𠻬𬽲上宅加反下徒何反悲作陁陁屏趣上步丁反步字𭃄脚波柂音陁悲作拖磨𧯞都豆反又音斗悲花經作摩兜阿㝹奴侯反磨姤同上侈𬽲上尸智反下徒何反正作陁絺哆上夷反下多可反悲花經作涕多頞抳上烏割反下尼尓反佉磨上去迦反中莫何反下竹𡰱反悲花經作摩阿𭎐直𡰱反正作坘悲花經作阿提邏啜上郎个反下市恱反下又經作都欝反咩上尸遮反下未尓反多摸系反經作橫系也非也撗系上莫乎反下戶計反字𭃄脚正作摸系也叉𧜟羊世反羅上戶割反漯上尸入反下武移反樓上奴禮反正作也薩𦳄毗連反悲花經作薩婆𬽲匐上徒何反下步北反齕栗上巨𠧒反正作下力日反悲花經作𠃵拏也上又限沒反非毗𭎐音遅𡰱稚直利反地上之然反悲花經作戰提𥞀陁上之連反正作旃栴二形悲花經作戰提師薜步計反郵樓上于求反正作卸阿虵音野又羊歌羊支二反悲花經作阿夜蹉其上倉何反遮鹽羊廉羊瞻二反悲花經作遮夜失栴之連反正作栴旃二形悲花經作沙旃遮翅下借音吉支吉以二反悲花經作遮迦是也䤈上呼𠔃反下力計反簸婆上布果反耶𬽲音陁利𭎐音遅㽞遮夜反正作柘悲花經作㽞遮浮躭都南反眤酣上𡰱曰反下呵甘反悲花經作𡰱呵下又乎甘反緻膩上直利反下𡰱利反奴侯反鵄鵄尺夷反多甯奴定反虵眤上耶者反下𡰱曰反悲花經作耶𡰱𡂡咩上所角反下尓反悲花經作宿伽俟上巨迦反下床史反頞旨上烏割反伽𭎐哆上半槃反中直𡰱反下多个反悲花經作半持多揵𭎐上音𠃵下音遅目仚詰利反叵峨上普可反下五可反輪莫姧反𡬥提上所姧反怛哆上多達反下加反檀哆加反慉敘上許六反下楚加反下正作敘也悲花經作稸差桔略上居一反正作拮羅臽音陷又余由坎三音摩哆多个反俾叉上卑尒反愈波上余主反伽𭥗上巨迦反下闍反頞吒上烏割反下竹加反仚去智反浮哆多个反槃哆上步官反下多个反㽞緹他禮反多柘之夜反邏哹上郎个反下芳鳩反多驃毗妙反磨堅竹𡰱反頞雉上烏割反下直利反叉上冝作奴怛奴歎女閑三反悲花經作奈叉悉太徒盖徒个二反正作大悲花經作悉曇也俟吒上許其反正作娭悲花經作䤈吒俟伽同上昆梨上音毗正作悲花經作卑利卑步反人性卑也左傳鄭大夫卑諶昵緻上𡰱一反下兜雉反悲花經作𡰱帝珊緻上乘安反下知利反悲花經作珊帝伽緻上巨迦反下知利反甯伽上奴定反帝抳尼尒反迦眯音米只上之尒反下步拜反利虵音野羅𭊴許右反婆𧯞斗闘二音並通呼悲花經作婆都桔邏上居一反婆柘吉也反糺若上吉黝反下而者反經作𠛩若悞也第二卷安詶市由反又音受牀榻上助㽵反下他盍反病瘦所右反𣰽𭯫上具俱反下色俱反𣯾𣰆上音塔下音登𥱰噐上所冝所綺二反冠幘上音官下音責幢麾上宅江反下許為反澡罐上子老反下古乱反淨水噐鐙鑪上都能反下音盧不眴音舜蓰器上所綺反澡古乱反正作罐與二形也𡰱獷莫乎反王子名也正作摸𢌿賤上必反𡬥兜上乘安反正作珊𮤄𩬩上郎禾反下古詣反兜上乘十反又音刪第三卷微咲私妙反柔䎡音軟食上徒官反𡱁尿上尸旨反下奴𠮧反涕唾上他計反柔𣽈音軟第四卷在炤音照積𤵜丑刃反宿疾𢢔上五告反輕抃音弄掉動上徒了反動乎下尸有反正作手古文兼說文並作導才三形也千輻音福䡰上音下音穀下又苦𥝷反非明㷿音焰懷妊而甚反泥𣛰知略反佛名也又音筋也師紐上或作師下女久反尠少上息淺反璫𤦲上都郎反下巨魚反澡𤃗又作盟同古短古乱二反洗也第五卷澍法上朱遇反時雨也伈放上相遷反空捲又作惓同巨貟反握手也正作拳所𦿔必世反嗒然上他合反㽵子云嗒然體解忌懷也經音義云精靈失其所也坊舍上音方聚郭也玟瑰上莫迴反下古迴反羼提上初諫反兔形上他故反遨五告反矝𢢔在心之名也不敬也正作敖慠二形禮記曰敖不可長是穬音鑛悼心上徒告反訾毀上將此反盜竊七結反杻核上勑酉反下戶介反穿鑿音昨迭相上田結反鬻賣上羊六反賣也長也醎𠧸音魯蚊蚋上音文下而稅反秦曰蚋楚曰蚊也露雹步角反淴所戢反正作澀也又