文目瞑莫瓶反入眼也眠麵二音把碎上北馬反下蘇對反未上口角反簾力闘反多音義作𭃄作同其俱反花名也或作音㺃一揣徒官反丸也捩身上力結反迴也經音義作拔蒲末反悞入定不定卬經一卷序文瓊編上巨營反下布玄反玄樞尺朱反繫象上胡計反易緘舍上古咸反式彰上始力反秘躅直玉反秘籙力玉反德苞布交反道𨏭力進反正作𨏼輕二形餘本皆云道駕繕寫上時戰反无泯忍反𮗆於徒南反及也經文狎習上咸甲反流汎芳梵反䥫竹林反妙翅音施嚴飾始食反嗢鉢上烏沒反花名嗢羅上多達反毫𣯛里之反挑出上吐條吐刀二反琰摩上羊染反舊云閻羅揭路荼上巨列反萬等集眾德三昧經等三經十卷同帙等集眾德三昧經三卷上卷溥首上滂古反寶積經第八卷作普首是也經云文殊師利者音曰溥首童真也經文又作濡出三藏記等目錄作漙同音儒散𧨏魚寄反冝也與義同慷慨上苦朗反下苦代反缺廢上苦血反下丂吠反弘𭚧魚既反果敢也正作敦二形門閫苦本反埃垢上烏開反𨷂廢上丘月反羅丁計反居士名倫迮普必反觀鈴此全反量也正作銓詮二形炤臨上之曜反光明及處稽首上苦禮反彎弓上烏還反惶悸巨癸反心動也這生上尸隻反纔也車釭古紅反𠿉䥫弊魔上步袂反𢙣也𣧑暖上音下步沒反下正作悖𨒫也蜎飛上於玄反𧑮動上而兖反蚑行上巨支反喘息上尺兖反苞在上布交反𠇾祐上許牛反芥子上古敗反无嫍丑染反侫也曲嫍諛也正作誦讇二形之疇直由反功績音積継也功業也及逯音代及也紛葩上芳文反下普巴反于膝辛七反廩𧨏上兵錦反丞受也正作稟也又力錦反非咨稟同上媮媚上羊朱反下丑染反上又他𬾃反非也澹泊上徒敢反下普百反痛痒羊兩反典誥古号反大賚郎代反賜与也盡秏呼告反髄上息委反下音𢙉掇取上都括反拾取也枝榦古岸反譽上布高反進揚人羙也牀㯓上助㽵反下他盍反不猗於綺反依也蹉踖上楚加反下倉各反舛誤也正作差錯也又上七何反下自昔子昔七雀三反非也邀迭上古堯反下田結反詭異上居委反詐也蹉㸦上楚加反下乎故反毀訿音紫揵呇惒上巨焉反中徒合反下戶戈反虵許鬼反正作虺又五骨反非也乖脫上于丙反正作永沾汙上音點又竹廉反中卷行𨀖子昔反蹤也正作跡聽上兵錦反敬也正作稟不𠫤力進反惜也正作吝𠫤鐙明上都能反經弓居願反撾杖上竹花反鞭撻上卑連反下他達反打也恭恪居各反黮黤上他感反下烏感反燋悴上疾焦反下自遂反上正作憔創痏上楚㽵反下于羙反祝願上之右反堅彊音強禍臧上方目反下自浪反正作福藏也並悞銖兩上市朱反芬子上古敗反𦒡翔上五高反下序羊反究鍊力見反敦為上都昆反迫也實也厚也又都困反堅也正作教大雒五格反面上垠也正作額頟二形又都各反非番殖上布臥反市也揚也種也今作播說文作番也經音義作譒匊也下市力反生也多也枊制上於力反稽首上苦禮反仾首也媮上羊朱反下染反法上毗祭反𢙣也困也正作敝也上方作蔽亦悞拘婁郎侯反聡喆音哲純淑市六反所僥音澆病瘦音瘦狐疑上音胡正作狐𭤔望上許依反下卷錠光上徒徑反送藏上苦頰反正作篋篋藏上苦頰反此字正享祚上許兩反徒乱反正作叚不麤倉胡反大也物不精也正作也常遜乘困反如市日反正作窴也又古瓦反非諂訷羊朱反又音申非也瑕疵疾斯反舡師上市專反又呼江反非用不僫都勒反正作得也郭氏作烏臥反非也慷愷苦代反正作慨也慷慨志大也竭誠也上卷作慷慨是也又苦改反窮窶其禹反叡達上余稅反覆𡚁必祭反正作蔽有𨚎下禮反正作底閣上步盲反正作棚畏懅其去反蒸庶上之陵反祠祀上音詞下音似集一𭃄福德三昧經三卷上卷彼堓音岸穬音鑛力上挍角二音建提上居健反逮提同上逯提同上並悞持䰅莫姧反天名也又之忍反非常醉子遂反天名也正作醉月蝕市力反𢎢前上羊忍反𦬔子上古敗反愍悼徒到反眾𡗚女㒵反中卷魁𮫨上苦迴反下古外反莽虵上莫朗反正作蟒蛆上他達反下郎達反虫也正作蟽蝲應和尚以蠆替之也上又哲捺二音效我上所八反正作殺煞二形闇蔽必祭反正作蔽剝皮上布角反折骨上旨熱反刻縛上所八反正作煞捶打上之水反苦他弄反傷患也瘀也正作痛也創盤上楚㽵反刀傷也正作𭃅也下正作瘢憒𡗚上古內反下女㒵反依猗於綺反下卷𢢔上五告反矝𢢔在心日也字樣作敖說文作禮記曰敖不可長是也用黨上步𪪺反下都朗反善𣽈而兖反舡栰上市專反下扶發反失㤢音墯所尺音見相尺音見而尺音見得尺音見持心梵天經四卷第一卷明音䋄菩薩名也古作网罔冈三形逯得上徒礙反及也又音錄非陰盖上於金反去聲呼不燆居妖反正作憍去遇反非揵沓惒上巨焉反中徒合反下戶戈反者上他定反聆也眩惑上玄縣二音乱也視不定所僥音澆求也晦寘上呼內反月盡也暗也寘也下莫瓶反暗也正作也又支義反非然錠音定燈也又徒見反無燈也澹泊上徒敢反下普百反興𢛳烏各反正作𢙣洒釋上先禮反浣也情態他代反稽首上苦禮反稽首同上𦷢趣上烏各反設上苦迴反正作奉暴上倉沒反息也正作卒卒二形闡上苦迴反本暴上倉沒反罪舋許恡反幡黨上卜安反類也正作𤳖所七告反持也窮也厄困迫不失志日也又七刀反周旅序全反正作旋私竊上息咨反下七結反受賕音求枉法取財曰又以財有求曰也不七歷反毀呲音紫綜了上子宋反剖折士普口反下先擊反犬豕尸紙反馳騁郢反愚騃五駭反徙得上斯此反渥曰上奴𠔃反正作渥力援音院助也錠燎上徒丁反正作下力燒反大燭也偱觀上音巡歷也不懅其去反周𢭀序全反躓礙上知利反愚戇呼貢竹絳二反懷恊音叶邪傜古定反擾攘上而沼反下而兩反第二卷不戚倉歷反愁同上周序全反正作旋指爪爭巧反瘖瘂上於今反下烏雅反尫𮊵上烏光反下力垂反弱也倮形上戶瓦反老耄莫報反意㑯苦反少時也僉然上七廉反荊蕀九力反牀搨上音床下音塔闇𡚁必袂反正作蔽不乳郎喚反正作亂繫綴竹稅反第三卷愚戇呼貢竹絳二反枰閣上步盲反又平病二音非重壘力水反周序全反正作旋所炊之曜反正作炤抨閣上步盲反又普𥝷反非也仂行上音力不懈也𢪛捨上尸利反正作施拖覿空上徒的反窈𡨋上伊了反希𦼔力迢反否耶上方久反失上于㱕反𢬃制上於力反神伈音仙掊一上尸者反弃也正作捨也又步交卜口二反非澍大上朱遇殊遇二反時雨也愚𢥧呼貢竹絳二反第四卷小狩尸呪反蠱狐上羊者反㸌然上呼郭反電㷿音焰光上夫問反愚𢥧呼貢竹絳二反愚也正作戇拘璅上音鈎下音鏁秏呼告反正作耗不七歷反谿谷上去𠔃反下古木反漂沒上疋遁反正作漂鹹若上戶緘反如鹽羊廉反這省上尸隻反下息井反之濆音老雨水也濁水也正作潦也又普門普悶二反並非疾𤵜丑刃反宿疾也鐙錠上音登下音殿說苑曰錠謂之蹬也又無足曰燈有足曰錠下又徒徑丁定二反蹊俓上戶雞反邪道曰𠧸伏上郎古反又上方經作降伏戶江反伏也秉意上兵永反沉趣上踈阻反正作所帑藏上他朗反金帛舍也予等上以魚反末𥇭直知反正作踟也思益經作摩賒思惟經作摩𮯐遮同上思益經作遮𮚎揥離上例他歷二反思益梵天經作挮力計反正作思益經作雉樓上戶鉤反正作睺睺樓上戶鉤反睺上戶鉤反下力由反𠱔扷𥇭上於𦒿反中步未反下音池上正作吚也思惟經作聖婆上又應和尚作許伊反非錍扷上𢘤迷反思惟經作鞞應和尚作普迷反非㨶提上巨列反正作揭袍揵上步毛反下巨焉反披上郎盍反下音婆思益經作羅婆提上巨列反下丁𠔃反思惟思益二經並作伽帝䁥偌上女日反正作暱醢多上呼𠔃反又音海悉蟬徒年反諸真言主皆云悉利覩憧真上徒東反正作僮也字樣云古以僮為童本暴上倉沒反正作卆卒䀎上倉乃反願也取也下普幻反正作采目睞郎代反暨百上巨既反約盟音明諸邦愽江反危𡧱音𡧱普炤音照癸卯歲高麗國大藏都監奉勑彫造
