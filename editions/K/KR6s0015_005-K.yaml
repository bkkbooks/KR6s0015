body:
  text: 漢中沙門可洪撰依方山延祚寺藏大乘經音義第一之五十五帙鳴鳳在樹白駒食塲化被草木頼及萬鳴方廣大㽵嚴經一部十二卷第一帙十卷從此經已後是大乘雜藏經所以過五大部故也言五大部者一般若部二寶積部三大集部四華嚴部五涅槃部是也序文御製逗根上徒𠋫反叡唐上余稅反載叶上子代反事也古文作繹下戶頰反會也亦作恊諒属上力向反下之玉反相連也朕爰上直甚反下于元反幼齡力丁反年夙遘上息六反早也下古豆反遇也閔上眉殞反遽違上其去反招提上之遙反此云四方舟擑接集二音月𢬜力与反亦作呂八月律管南呂十二月大呂又隻月為律雙月為呂汗青上戶岸反裝縹疋小反塵區丘愚反域也丕業上普悲反法螺郎禾反海中介虫也亦云貝經文娑伽巨迦反梵言娑伽陁此云善來摩䤈呼𠔃反梵言摩䤈首羅唐言大自在天也技術上巨綺反騁武上丑領反勸勉音免瀑流上步報反急也又步卜反布縣流水也為蘂而水反正作𧄜罣礙上戶卦反嚬申上毗反巖宂玄决反窟也孔也正作穴又而勇反非柰邪上奴太反下羊嗟反梵言毗柰耶唐言調伏也慣習上古患反螢燭上戶營反軒㩜上許言反下戶黯反窓牖音酉交絡音落𭦟陁上莫官反華名𭦟陁羅唐言圓華花悵竹向反拘抧吉以反亦云拘𦒿羅此云赤觜鴉翡翠上扶味反下七遂反洒甘上所賣反与灑字同瘂羊上烏雅反卒暴上倉沒反微鮮息淺反暴戾力計反竊上初患反𡙸位也侵也下七結反私也閹䆠上於廉反下戶串反梯他𠔃反瑕疵上戶加反下自斯反試之上尸志反驗也嫉姤上自疾二音下都故反楚詞曰害賢曰嫉害色曰姤躁動上子告反妍羙上五堅反玄蜂音峯玄黑也蜂蜜虫也柔䎡而兖反弱也虹蜺上戶公反下五𠔃反下正作霓雄曰虹雌曰霓臂𮌸丑容反正作𦟛膚彩上音去肌也沮壞上自与反嚬慼上毗反下子六反正作𮜫蹙縱廣上子容反上下日縱東西日廣也遷沒上七仙反幡䋿烏迴反五色餝物也稽首上苦禮反兮柝先擊反羼提上初諫反唐言忍嬾惰上郎旱反下徒果反奢摩上尸遮反梵言奢摩他唐言定毗鉢舍那唐言慧銷渇音竭輪檀上束朱反正作輸繫奏上古歷反正作擊也下子𠋫反作樂也第二卷暎𦷥上於敬反下必祭反婇女上倉改反弦歌上戶堅反寬宥音右赦也囹圄上力丁反下魚与反𬽹上羊招反使也操持上倉刀也綩綖上於遠反下羊然反淡泊上徒敢反下普百反聖𠮮胡吼反正作后袨服上音縣好衣也晧齒上戶老反齎持上子西反扣擊上苦吼反驚悸其季反勤劬音瞿甲丈右反互宿上丁𠔃反翊從上羊力反下自用反弘敞尺兩反𡨜靖自井反水漬才賜反鄔佉上烏古反下丘迦反侔佉上莫侯反問訊音信怡懌羊益反痊愈余主反痰氣上徒甘反𠲣痺上烏雅反正作啞也後偈云聾瘖瘂種種疾是也下必利反喉閇塞齲痛上丘主反瘰癧上力水反郎果二反下郎的反瘡也白癩音頼瘡也說文作癘痟渇上相焦反癲胘上丁田反下音玄癭癤上於井反下即𭃄反瘡𤻧音槃盲聾郎紅反瘖瘂上於今反烏雅反第三卷泛以上芳梵反飄拂上疋搖反下芳弗反藹然上烏盖反弗沙上芳物反星名也或云富沙唐言鬼宿臺榭音謝蓊欝上烏孔反翫園上五貫反駿捷自反朱𩣭子紅反正作騣𩣭𩭤金鞍音安各擐音患羂索上古犬反妙帊普架反彫瑩上丁聊反下烏定反除屏卑政反擋掃除也正作摒輦輿音餘倡妓上尺羊反下巨倚反辮𩬇上蒲犬反織也枝幹古岸反欠呿上亦作㐸下音去酔音乱掉舉上大了反纓紼上於盈反下方勿反亦作駿馬上子峻反駿尾上子紅反正作𩣭執篲音遂幰盖上許偃反各造七到反乳哺音步啥也膏腴上音高下音逾沃壤上烏酷反下而兩反哀老上所追反正作襄歔欷上許魚反下許記反哽咽上古杏反下一結反捫淚上莫本反睫如上子反髀𦟛上步米反下容反腨如上市軟反䋄鞔音𭦟軗𨊾上古木反下文徃反獷古猛反第四卷䣑肆上音緾下音四藻飾上子老反巷陌上戶降反街也門閫苦本反溟海上莫瓶反耳璫音當寶巨逆反所獻許建反正作獻躃地上毗益反明璣音機佉盧虱上丘迦反下所擳反唐言驢脣沓毗上徒合反多瑳七何反摩瑜羊朱反書名暴磨上步布反梵言暴磨提婆唐言地居天也沃憩上烏酷反下丘例反梵言沃憩婆唐言舉匿憩波上女力反唐言擲戾佉上力計反下丘迦反梵言戾佉鉢羅底唐言徃復也閉瑳上愽計反下七何反梵言陁羅𡰱閉瑳唐言觀地伽伽巨迦反梵言伽伽耶必利綺那唐言觀虗空睺婁上戶鈎反下郎侯反梵言婆部多睺婁多唐言一𭃄種音已自上音以此也甚也正作已該通上古哀反面貌音㒵教詔上音交下音招訓示也䫃己上音故下居里反焉能上於𠃵反字母与涅槃經十四音文同唱阿烏可反長阿烏何反唱伊於以反唱伊於者反唱烏屋古反唱烏屋胡反唱磬一𠔃反正作瑿唱愛烏代反唱烏屋胡反唱燠烏告反唱唵烏合反唱阿烏个反唱迦居者反唱佉丘者反唱伽巨者反唱伽巨迦反唱哦魚者反此行是㸦音又魚兩反唱者之也反唱車尺也反唱社時者反唱闍市耶反唱壤而者反此行是齒音又而兩反唱吒知雅反唱吒雅反唱荼宅雅反唱荼宅加反唱拏尼雅反此行是舌音又尼兩反唱多都可反唱他託可反唱陁徒可反唱陁徒何反唱那奴可反此行是喉音又奴郎反唱波卜可反唱頗普可反唱婆蒲可反唱婆蒲何反唱摩莫可反此行是脣音又莫朗反唱也羊者反唱羅來雅反唱羅來可反唱婆伏可反唱捨尸者反此後除差字餘名超聲唱沙所雅反唱娑索何反唱呵呼歌反唱差七何反重結句如後阿阿伊伊烏烏磬愛上烏兮反烏燠唵阿此行名十四音然闕理狸二字迦佉伽伽哦者車社闍壤吒吒荼荼拏多他陁陁那波頗婆婆摩已上二十五字名五音也羅羅婆捨沙娑呵差已上名超聲毗紐女九反毗鈕同上悒然上於立反舅姑上巨九反不肖音笑㩲摙自反正作𣄆力上力与反適无藝上音釋嫁也下魚世反之上卜各反而毗世反寶輅音路車也頞順上烏割反拘𦙁丁𡰱反更割古遏反𢌿波上必尒反摩呶女交反兔毛上他故反一蟣音幾榤手上知𮧓反室哆丁可反淩侮音武相撲步角反顛仆步北反倒也勁強上居政反下巨羊反控弦上苦貢反㩲捷自反相扠街反誹謔上步皆反下許約反上悞故敉毗祭反正作敝第五卷抒彼上音序渫去也首鞞步𠔃反犛牛上莫交反牛名也又力之反凍餧奴罪反正作綏熊身上戶弓反佃獵上年五涕唾上吐計反齧其上五結反霹靂上普擊反下呂擊反麻枲息里反毀呰音紫馭者上魚去反枯槁苦老反乾也傴僂上衣主反下力主反喘息上川兖反筋肉上居殷反銷秏火告反乍偃上助詐反下於㦥反苦劇巨𨒫反何暇音下閑也危殆音待近也綿惙知劣反惻上七感反下初色反掦捊音浮皷搥疪蔭上必至反下於禁反隕墜上云愍反隱𦷥必祭反殀上於小反下斯浪反頭枕之審反渤澥上步沒反下戶買反從齋自西反其杪小反班駮上布還反下布角反第六卷𥧦𥧝上古孝反睡也涕泣上吐禮反断嗣音寺百兩力讓反車數也擐甲上関患一音著甲也持矛莫侯反巡警居影反管鑰音藥戈鋋市連反階闥他達反門也玟瑰上莫迴反下戶灰反廁填田甸二音芬馥上芳文反下扶福反瞖目上一計反蓬乱上蒲逢反喎斜上苦緺反下似嗟反角𣍿來代反呀喘上呼家反呷喉病欬嗽上苦愛反下素奏反裂上格反穢污安故安臥二反䶜齒上遐瞎反讇語上視廉反牀上皮氷反下助㽵反𢪨皷上之審反從冘抱箏上步保反下側生反𧡲然上江反直視目不明也正作覩熢㶿上蒲逢反下蒲沒反縱撗上子從反下戶音反羣豕尸尓反溷廁上胡困反舩舫方妄反損耗呼告反脾腎神忍反肝肺芳廢反窟宂玄血反褰七上去𠃵反幃帳上于㱕反下猪亮反疽蟲宂上七余反中池中反下玄决反泫露上玄犬反毒𦽦音万恃怙上時止反下胡古反險溜力右反驚洄戶魁反旋洑音伏繕修上市戰反掉擑上杖孝反下才入反寶鞌音安迴䀎音麵視也又疋幻反當廄音救象也躃地上毗益反扈從上乎古反導我上徒老反苔撻上之反下他達反上悞冀望上居利反驤首上息羊反馬騰躍也仾昴也𡱈䫃上其玉反馬立不定正作驕躑䠱上池石反下直玉反行不進也苑囿于救于六二反城𨵗去月反簫條上蘓條反下徒聊反馬嘶音西毒蠱直中反又音古悞塗拭書食反顦顇上才焦反下才遂反唼膚上子荅反下芳無反歰色立反𮑭履上秦昔反踐也正作踖二形𦟛長上容反蹋地上徒塔反𠎱過上去𠃵反易上莫𠋫反換也携其上戶圭反妃后上撫非反下侯吼反孤寡古瓦反號咷上戶高反下徒刀反諫諭音喻𧿡陁上蒲未反遁於上徒本反𨏈音隱第七卷羅邏來个反𨶳望上去隨反闤闠上戶開反下胡對反共莅音利臨也涕涶上吐帝反下吐臥反正作洟唾下又他禾反悞鑽燧音遂火母也燥木上素老反湍洄上他端反下戶灰反涯岸上魚奇魚隹二反丘墟丘魚反米泔音甘淳酒上市倫反一𢲻子活反紡績上芳兩反下子歷反鵂上許牛反下力牛反毯𣮷上他敢反毛席下何割反毛布或貫音官髑髏上徒木反下盧侯反頭骨也編椂上𤰞連反下縁反𭊭聲上合口喉中作聲去聲呼之無下𭃄𥥛伽上徒骨反槃荼宅加反刀釰久欠反悞輪所卓反鞴囊上蒲拜反下奴郎反脊骨上子昔反笻竹上巨龍反乾瓠胡故反爪也又音胡𧹞上側瘦反下女板反穪也乾瘦也正作割句上古遏反下其俱反句脯也正作胊𠣪二形也洟唾上他計反杵音庭莖也杵臼上尺与反下巨久反狗吠扶廢反沙糖音唐糠汁上苦郎反毛毼音褐敉衣上毗世反髽髻上㽵花反婦人喪冠仾昂五郎反蔽壞上毗世反洗浣戶管反而彀音搆為糜羙為反偕來上古諧反第八卷堆阜上都迴反下扶久反沮壞上自与反暎蔽上於竟反下必世反𠒎上伏無反枝樂上巨倚反沙𠧸音魯丘墟音袪魚井列反鼉上音元下音陁𠚫草上牛伺反憺雅上徒敢反詹波上之廉反第九卷羽翮上于遇反下行𮧓反頭坌步悶反刎首上文粉反戰慄力日反違忤音悟冗旱上可浪反稼穡上嫁下色滄溟上郎反下莫瓶反激𠂕上經歷反下尸履反迅捷上私俊反下疾反祗為上諸移反斜䀎上祥嗟反下莫見反嫈嫇上烏𥝷反下莫瓶反態也拈掐上奴兼反下口洽反𨇾𨁻上蘇恊反下徒恊反脾腦上步米反下乃老反毒力閻反噐也瑕疵上下家反下疾移反親暱𡰱日反嫌隟丘㦸反隕墜上于愍反墜也落也鉞斧二音越府矛䂎上莫侯反下千乱反或刖音月断也虵豹北㒵反欲噬音逝畟塞上初力反欝蒸之勝反鏃上上子木反柯幹上古何反下古案反澮乱上右外反挫𢙣上子臥反折喜慍於運反第十卷啇人上手羊反又音的悮蓮音嘔血上烏口反霖雨上六針反不霽即計反杖捶之水反車轅為元反躓於上知利反偱路上似倫反𤚲乳上古豆反三薄何反佛名也又音波羅𭡠奴太反國名也亦作柰鮮少上息淺反鳳方廣大㽵嚴經下帙兩卷二經十卷同帙第十一十二也第十一卷羅邏來个反跋陁上蒲末反詹波上諸廉反躃地上毗益反齎種上即西即夷二反持也危脆七嵗反潤漬才智反難沮才与反馴鳥上似遵反䋄鞔莫安反𬧅如上時軟反脚肚臂𦟛容反掃抳奴𠔃反正作泥又𡰱尒反悞獷古猛反眼睫子反目毛艱劬上古閑反下其俱反媏正上都官反正也直也正作端第十二卷問訊音信米上古盲反懅而上其㨿反遄流上市緣反衣帔披義反泝流上蘇故反逆也斆彼上胡孝反祠祀上祥慈反下祥里反慇繁上於斤反下扶番反著上都南反正作躭該綜子宋反沈沒上直深反沒也止也又音審悞繢飾上胡對反綩綖上於遠反下余然反喜慍於運反芬馥上芳文反下扶福反𩥵駕上倉南反旌旗上子盈反下渠之反𧿡陁上婆末反技樂上奇綺反躄者上蒲益反傴者上於主反苞匿上布交反下女力反携羅睺上戶圭反下戶鉤反瑕疵上戶家反下才移反普曜經一部八卷第一卷牀蓐上仕㽵反下而欲反號名上何告反名也錠光上特徑反羡求上似箭反式佛上拾食反隨葉尸涉反或云毗舍浮迦葉上古㸦反下書涉反此云飲光鋡戶南反迄今上許𠧒反闇𦿔必袂反純淑殊六反諭諂上羊朱反又音喻非謙遜蘇困反恭也憒乱上古退反愚贛竹絳反愚也正作戅戇二形也又音貢悞蕩滌上堂朗反下亭的反祽閣上步盲反棧也閣也正作棚輣𨍩三形又作平病二音獨坐板床也非用鳬上㐲無反瑕疵疾斯反卒暴上倉沒反尠少上息淺反圃上於遠反下卜古反琦上巨冝反雕文上丁聊反閛閣上步盲反又普𥝷反門聲也非周旋序全反正作㳬遊戲許義反鏺樹上布末反國名也正作撥橃𦪑驋鉢六形也菩薩本行經作鉢樹中阿含經作般闇是也又玉篇作方吠普末二反並非此呼音鑛胞胎上布交反僉共上七廉反志七到反正作操惔怕上大敢反下普百反得𨗻音代又或作還徒合反殖眾上市力反帑藏上他朗反殃舋許恡反淳真上市倫反恭恪各反𠮮名上戶吼反女皇也這昇上尸赤反纔也始也正作適也又音老非奮光上方問反湏臾音逾牀㯓上音床下音塔稽首上苦禮反燕靜上一見反痛痒羊兩反𨗻成上徒愛反諮嗟上音資正作咨一勉他故反正作免勉馬同上此上又有勉之並同苾芬上毗結反下芳文反香也亦作𭄩上音扶又音力非鷹鵄上於陵反下尺之反赤𭉨即水反屏障上步名反風也又卑領反芙容上伏無反下亦作蓉宮裏音里笛簫上徒的反下乘條反讒言上助咸反兩舌上力掌反二也第二卷㒃吒上女利反下陟嫁反除望羊林反正作滛也滛怒癡三毒也音危脾踵上步米反下之隴反閛閣上步盲反這震上尸隻反窈上一了反下木瓶反塵𡨋音𡨋晃昱上戶廣反下羊六反光明也沓惒上徒合反下戶戈反金痍音夷創上音盤下音瘡篋笥上苦叶反下司寺反丘墟去魚反瘖痾上於今反下烏雅反下正作瘂不言也又音阿非𤸇殘上力中反彊場上居羊反下羊益反嗷嗷五高反眾口愁也傾斜音邪煒煒于鬼反柔渜又作𣽈音軟又奴乱反非笳簫上古反下乘條反鶩上莫卜反雄傑巨列反英特立也又作奮光上芳問反芬𮎲普巴反羔子上古刀反齎天上子西反生矣于起反正作矣冠幘上音官下音責能昱羊六反養也正作育推燥上他迴反排也下乘差反乾也乳哺音步幾渧丁歷反又音帝戾也非帛縶音𤗊目𥇒音接俱眴音舜又絢縣瞤三音子膺於陵反胷也外握烏角反合𭦟莫官反正作鞔埋陰於今反正作陰腨腸上市軟反下音長鉤璅乘果反不𢭃音短迭代上田結反中跱直冝反當𠚫牛例反第三卷四徼音𠮧小道微咲音笑過上於反歎吒竹架反𦬔子上古敗反彿宿上亦作佛同音拂大㽵嚴經作佛沙亦云富沙星也唐言鬼宿或作沸方物反闇𡨋莫瓶反𦷥嚴上必世反種𮁽音族閣上步盲反又平病二音非即僻步益反正作躃𭦟佉去迦反陁比音毗夷狄徒的反揵沓上巨焉反𨳰句上傳計愽列二反憂惚音𢙉𥞩犁上古莖反正作耕新墒尸羊反亦作塲尋啄音卓正作啄也鞭杖上卑連反正作鞭曀上必祭反下一計反顏䫉音㒵屢中上力遇反下知仲反呪咀阻䟽反不挵郎貢反亦作挊周𢭀序全反不肖音笑似也儻不上他郎反正作儻象上去堅反下似兩反撲捏上步角反下奴結反逯成上徒愛反樗蒲上余反禍福上戶果反躓礙上竹利反挑𢭀上徒了反下序全序二反𭡠張上奴達反拼弓上普𥝷反彈也正作抨也或作拼布𥝷反振也又音并非放撥音發起也去也又音鉢非用至上於見反正作燕宴二形閑居也禮記注云退朝而處日燕居也𤢌狩上巨今反下尸呪反呻吟上尸人反下牛今反僂步上力主反渧淚上音帝渧淚下也下力遂反上又音的推胷上直追反下許容反拊臆也打也吁嗟上火乎反大𠮧也正作呼諕二形屈伸音申仾仰上丁𠔃反下牛兩反舉首也下又五郎反見禮記音義怖懅其去反深堀巨月巨勿二反穿也正作掘又音窟非宮裏音里汎汎芳梵反臱上音扶下五諫反正作鳬也並悞窓牗音酉較路上音交枝相過也前後皆作交露亦作絞露又作珓露又挍角二音非猗在上於綺反𡨋上一了反下音𡨋第四卷荷上戶可反下之審反鼻涕他計反正作洟流涎序延反鵁鶄上音交下音精𦜩膸上奴老反下相委反上又音忽非也肪血上方房二音脾腎上步卑反下辰忍反肝膽上古安反下都敢反屎尿上尸履反下奴吊反涕涶上吐計反下吐臥反正作洟唾也迭羊一反又徒結反悞咬骨上五巧反正作齩又古包烏交二反非抴畜上余世反下右反如淵烏玄反此上七歷反親也痛也正作戚慽二形也悞撾象上陟花反稽遅上古𠔃反捕處上音補悞晃昱上胡廣反下羊六反王上祥兩反正作象又五諌反悮空捲巨貟反正作拳羸溺上力𡸁反下而灼反劣也木也出龍首山不勝鴻毛恃怙上時止反下胡古反𤵜患上丑刃反大棒蒲講反諧偶上戶皆反下五口反哀鸞洛官又下𮐯羊灼反匙也関也正作鑰𨷲二形也𥥛上丁禮反下徒骨反懷倉歷反國上去利反𧴵鹿上莫𠋫反桃我上吐條他刀二反捾取也恍惚上許兩反下虎骨反虛幻不實也上又音光悞奄不上於撿反忽也取也治衿上竹廉反下居吟反上又持值二音悞脚蹹徒盍反撾鼓公五反正作皷從壴從皮音叨壴注駐二音魃魅上於反又音非用也下音媚惋轉上於遠反從女又烏貫反悞宍結上如六反下作髻呼炳著上兵永反下竹慮反𠃵巛苦昆反古坤字喁喁愚容反魚口上下㒵老耄莫