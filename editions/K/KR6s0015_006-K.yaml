音笑邊愊音福剬力上之世反正作制无穢於吠反在音𡨋无離力至反開辟毗益反阤鄰上徒何反下力人反弓弩奴古反布失尸旨反消音伏正作眼𭤔望上許衣反兩道上力掌反不揔則孔反譴之上去見反歌氣音氣笛氣上徒的反下丘既反姑樹上苦乎反正作枯姑珊瑚上乘干反下戶吾反馬音𢙉銚音搖光也正作姚鐄音黃光也正作煌也又戶盲反非也又應和尚以焜惶替之上音混下卷諸窴莫瓶反悞悕望上許衣反𭸷𤥿上音枝下音亦潘那上普安反儻加上他朗反便𭉋音笑沮去上才呂反㳅離上力由反法鐙音鎧蔭覆上於禁反所拖音施之臧自浪反正作藏不𡙸徒活反微眇音妙又沼反非也无疧丁禮反又音祇非蜎飛上於玄反千垢古口反正作垢昧昉音時又方𠕀反非也佛說无極寶三昧經一卷𦷥沒上必祭反忘上音亡下市力正作食也𧺫塌音塔煒曄上云鬼反下云輙反乳哺音步僥上古堯反下子才反𦷢意上烏各反琦音奇虵虺許鬼反枝棭羊益反麗上倉贊反下力計反尠於上息淺反逢為上羊招反遠也正作遙逢蜎飛上於玄反𧑮動上而兖而尹二反苞潤上布交反佛說如來智印經一卷俱絺丑夷反邠耨上彼巾反下內沃反非𭊴許右反正作齅此音岸空捲音拳𦬔子上古敗反淤泥上於去反經文作游非也如𡱝音西輕子告反𠧒音蓋衣祴古累反鴻鵠戶各反正作鸖也又戶沃反拘翅上音俱下音施空篗戶鉤反荊棘上居英反下居力反輕挊音弄笑上尺之反親挨自木反所𣏋音弃又音棻非虧失上丘隨反㸦相上乎悟反轍跡上直列反撰檡上思兖反綸音輪繁茂上扶番反慧印經一卷𨔵得上徒愛反阤鄰上徒何反下力人反㸌然上呼郭反踰墳上他侯反下知人反正作鋀填也填音寶也二並悞瑱又徒見他見二反非此二呼迦惒音和惋𢚀上於遠反下以然反邠䅶上彼巾反下內沃反尼彿音拂无徙斯此反非耦音偶非猗音倚可戶麦反非侯戶麦反正作獲衣上之領反正作整便效戶挍反其𦷢音𢙣諭諂上羊朱反仂行上良𠡠反惕去上他歷反正作剔𠇾息上許牛反桂樹上古話反逢佛上扶峯反不稸六許六二反沙上步𡨋反亘那上古鄧反下郎盍反洴沙上步丁反遍炤音照譴過上去見反泍亂上烏故反𢢣殆音待端丁禮反又音止非得䔍都沃反寘者上莫丁反暗也夜也又之義反非也柔𣽈音軟惟大灌頂經一部十二卷一帙第一卷三㱕五戒帶佩護身神呪經經音義以此為第三卷非也𧿟跪上乎故反正作㸦也一膝加地坐也亦作䠒跪亦作㸦跪也又音帝非杭陁上之然反坘哆上丁𠔃反下多可多个二反上又遅紙底三音苾闍上毗結反蜚尸上又作飛同音非又扶味反非呼戾揥䭾上力計反中徒計反下徒个反中又丁𠔃例他的三反蛊毒上公五反正作蠱呪詛阻䟽反蔡上倉太反下測俱反摩亶多坦反雄雌此斯反摩吁况于反邪藪上序嗟反下乘走反温𩁿牛約反𮍜嘻上都侯反下許之反鳲鳴上音尸布穀鳥凶疰注懈二音腹病𩲓魅上音妖下音媚上又步末反非魍魎上音𠕀下音兩邪忤音悟薜荔上步計反下力計反此言餓鬼上又音擘井電子告反𣴟池上戶管反廁溷戶困反熊羆上乎弓反下彼皮反虵虺許鬼反正作虺或作蚖五官反䥫搥丈追反拍張上普百反洋銅上音羊正作烊灌其口上音貫經音義作沃口上烏酷反探割上他南反戰恌徒了反正作挑口噤巨禁反自音愽擊也叩頭上苦吼反裏呼吉反皃具上戶官反剝奪音脫單衣上音薄也亦作禪白悏古洽反複衣也正作也應和尚以祫字替之也又苦頰反非也漱上子老反下所右反涮也經作瀬悞第二卷七万二千神王護比丘呪經經音義以此為第一卷非羅音恱即王舍城是也錍㮛上步号反山名也文悲經作鞞提雜阿含經作鞞提佛所行讚作鞞提又作毗提金剛力士哀戀經中作毗提華手經作韋提本行讚作隨提並是也應和尚作普提反非也蚖蝮上五官反下芳福反道軻苦何反殷錍音鞞嘻上許之反漚羅上烏侯反𡉬錍上丁号反下音鞞上又逯底紙三音區惒上烏鉤反下戶戈反唯棱上戶鈎反正作喉也下郎登郎水二反課林上苦禾苦臥二反經音義作掬諊二同居六反揵陁上巨焉反鞬陁上居言反郁佡去智反目佡去智反經音義作㑫非也頞提上烏割反迦偂昨先反正作前騚二形字樣作歬二形陁隣𡰱鉢經作迦前應和尚未詳迦偂同上陁隣𡰱鉢經作迦前酸梨上蘓官反又經音義作緊烏兮反賁䟞上扶非扶文布門兵媚四反下音沙正作砂又郭氏音抄或作初孝反應和尚未詳𡲎提上步卑反正作陴經音義作陴羅仚去利反羅佡同上羅子音𠔃此呪有七个子字並𠔃字悞也𭋉陁上竹由反正作輈開元樓藏作輈郭氏作之然反應師未詳𦪣吒同上應師未詳梨上一計反披𥪫上步河反下或作移音多經音義作汥𥪫應師未詳郭氏作敬冝反來齧三結反躃地上蒲益反倒也濆灑上普門反潠水也頞吱上安割反下經音義作居梨反字體或吱去智反般吱同上劬羅上其俱反沙勒盍反瀬漏上所右反又音頼悞豁尒上火活反罣閡上戶卦反下五受反寶函音咸佩劒上蒲昧反若偑同上又音風悞齊愸之領反又音勑悞盟誓上羙平反下時世反破塌音塔異邽市江反又音圭悞毒蠆彐芥反罸謫知𮧓反恍忽上火廣許徃二反虛幻也又音光悞迮帛上音疋悞救贖市五反翩翩疋連反飛㒵也第三卷十二万神王護比丘𡰱呪經經音義以此為第二卷彼悞上莫𠋫反下力底反提上五禮反經義作倪提郭氏作丁侯反迦上頻引反阿銖音殊遮壚音盧栴遮上之然反欶摩上所卓反某胇芳廢反肝也某腎神忍反某臗苦官反某䏶步米反鋪何上市胡蒲故二反神名那都禮反正作妶某咲音笑游沙上余修反攘諸上而羊反櫨樓上郎胡反澠迦上兖忍二反稜迦上洛登反劒蒱音蒲臋頭上徒門反𭋉吒上竹由反從車從舟傳寫久悞妖魅上於蒲末二反前作𩲓魅字也井竇子告反洿池上烏故烏臥一反正作汙又烏戶二音非前作浣池也呪咀阻䟽反第四卷百結神王護身呪經長𭔰都管反正作短𢭃二形鞮上密二反下丁𠔃反樓經音義作以脾字替之莫浮反案字體或胮普江薄江二反神名也郭氏音有掔胮二同烏乱反琦梨上巨冝反睒摩上失染反雄上於亰反正作瑛字憘音喜𮚪迦上毗忍反与字同也又開元樓藏作矉音亦悞𢥈遮上洛胡反与壚字同也悞攎經音義作𤗶廣濟藏作𤗶開元樓藏作𤗶𭃄作同古黃反字體或璜獚二同音黃鞭撻上卑連反下他達反杻械上勑酉反下胡戒反在手曰杻在足曰械唾𠵖經音義作廣濟藏作同子悉反又讚箭二音架抄上吉亞反樓音禮譚𦒿上徒南反主𨔵直六反倪和上五𠔃反謣難上為俱反經音義作呼故反非體繚亂上力條反較坘上教角二音下遅底二音虺蝮上五官反下芳六反許羅上經音義作䚷於禮反摩䟞仙何反又布門反又音抄𨀸飢案光讚經作𨀸同宅家嫁二反正作踞䖳二形也經音義以侘字替之家反郭氏作知格反並非瞘上烏侯反苞腫上步孝反正作疱又布交反非至潰戶內反濃血上奴冬反正作膿漱口上所右反稽首上苦禮反仾頭也首至地也正作稽陁上步末反鮫龍上音交正作蛟憋龍上毗世反𢙣也正作弊也又并列普滅二反非矛㦸上莫浮反虵𧈭許鬼反大莫朗反正作蟒獼猴上音下音侯經音義作軗玃上音加下居縛反此經無殊𭩶巨列反正作雄𭪴音竭甄陁上之人反𫟈𧰟音焰荐臻上疾見反重也正作𨀛也妖蛊羊者反正作蠱冶第五卷呪官宅神王守鎮左右經併力上卑政反並也摑地上居麦反抓距上爭巧反下其与反煩憒古內反探知上音貪深取也或作鞫居六反修叱音毗正作比又尺日反非優唦經音義作吵小初巧二反應和尚未詳郭氏音沙蕪薎上文夫反下莫結反頭謣音于或作謼火孤火故二反挍𢪔丁禮反質力底反正作𧑝也多音禮正作𧑝樓掔苦閑反或作拏梨架音拏梨掔音拏𭼩詐上於琰反欀也正作𥜒經中多作禱字也又經音義作壓笮上烏甲反下阻挌反非𭦟鳩上莫安反正作曼𭦟梨茤測俱反正作蒭二形字從廾從芻古文多經音義作渠寄反非也躭波上丁含反菴叉上居五反經音義作輂廣濟藏作輂也又音庵悞庵悞陁越于月反弭伏上尒反坘上遅仾底紙四音下始遮反毗𢗝与坘字同也遅底二音鄜州篇音帝𢗝術上同絳繖上古巷反下桑旱反膠香上古肴反各上去𠃵反下求有反第六卷塚墓因緣四方神呪經塟上卑進反下子浪反幡効胡孝反苾芬上毗結反下芳文反碑𨵗上彼皮反下丘月反魃耶上於反下似嗟反前作妖邪也又音脫鐱上他活反下居欠反正作劒怖悸求季反戰悼徒了反動也正作掉也悞那櫺力丁反咃陁上吐何反毗𢗡書周反又音獸大迹子昔反正作迹跡二形婆嚀奴丁反唋阿郭氏作余途二音堀地上苦骨反或作掘其物反神名郵婆上于求反鞞鞞毗号反萆上必脾必𠔃必尒必計四反字從竹卑𨢘上呼𠔃反下傍禮反階階惚患上奴老反悞伽予余与二音又或兮字帝力計反𢙢怖經音義作㤼以𭞼字替之許刧反𧑮動上而兖而尹二反第七卷伏魔封印大神呪經牛桊居院反牛拘也咀魔上多達反正作呾𢘉𢥈上烏甲反下洛胡反經音義云今人謂黑貂為𪀌盧貂也從齋自西反浮二同蒲沒反上悞如雲厭迮上烏甲反下爭白反上悞椋奪上力讓反下徒活反欀灾上汝羊反𭼩之上於閃反欀也怛署常遮反或著諸經皆云怛姪他也𮟯穰如羊如兩二反蔚多上於貴於物二反枑羅上仾底帝三音並通怖懅其據反雄𭪴音竭菓上并領反索也字義是餅尉伺上於貴反下相寺反𠋫也經音義未詳第八卷摩𡰱羅亶大神呪經羅亶多但反阤上蒲求反下達何反和菩薩名也此言賢惟睒失染反忉利上都勞反監摩上閻焰二音正作鹽或云夜摩天是也悞婆郎敢反龍名也正作攬茫伽上莫郎反陁上蒲末反正作又烏交反悞毗監音閻又古衘古懺二反非檐邊上羊廉反也從木人䰟戶昆反正作䰟大𭉋音笑相丑街反撮上布各反下七活反汙漊上衣主反下力主反五掣尺世尺列二反從手上古郎反下浮久反隴也埠山無石曰埠也正作𭚖宅也嬈𡧱上奴了反龜形上居追反正作龜二形鳴上書呂反正作鼠也墜床上直遂反痛痒羊兩反𨺚殘上力中反正作𤸇跘継上補畔反羈也正作絆靽二形也經音義作平患反玉篇音盤並非此用涕上徒𠔃反下空木反正作㖒也虛秏火告反蘺間上力支反下古閑反䧺死上都退反正作碓餔禱上布胡蒲故二反下得老反上又疑是确音府絞死上交巧反蠻國上莫姧反羗國上去良反虜國上郎古反竇中上子告反電上同上注阤上烏光反下直冝反悞經音義作汪池是也遮蛊音古正作蠱也悞人止時紙反正作𦧓舓舐三形屏風上步丁反第九卷召方龍王攝疫毒神呪經赫赫呼格反赤也明也咸也正作赫赫二形也煞力反取禽獸也白虎通曰四時畋之怒名也為曰除𡧱也尸子曰伏羲之代天下多數故教人以議也易曰庖羲氏之王天下結繩之為罟以畋盖取諸禽獸此其獵之始也正作獦獦又古曷反非用麞鹿上之羊反麋麈上𫟈悲反下朱乳反上魚袁反下徒何反魚并列反正作婆攬郎敢反因𦤼徒來反脩只下借音吉以反法花經作修吉梁翟狄宅二音𡧱枑音帝𢸒菩上郎敢反薄茤測俱反茫伽上莫郎反下巨迦反曰嘻許之反肫頭上徒䰟反亦作豚某栗力曰反前後數箇並同也又音漂非多祺巨之反又經音義中作禖音媒不委何正屢生上力句反懽樂上火官反愚憃彐江絳二反香𧂒自焦反所嚼自雀反𢷋心上必遙反第十卷梵天神筞卜經仕𮃻音患高遷七仙反讖謝上楚鑒反悔罪也正作懺享其上許兩反遷迸補諍反幢幢江反旌旗類也釋名曰幢童也其白童童然也又經音義作燑應和尚以烔字替之徒東反騏驎上巨之反下力人反正作麒麟也尓雅曰身半尾一角狼啼來翔音徉練乱上力迢反正作繚憋惡上毗世反下烏各反上又并列普列二反並非誙君上文夫反羊犾苦泫反狗也狗有懸蹄者曰也正作犬也玉篇音銀非此用也至上乎果反正作禍嫉姤都故反又胡刮反悞老瘦蘓走反老也父也正作華暄許袁反經音義作諠譁字也詵林上所臻反絓尋冝作詿㝵上胡卦反下五愛反絓綵結也詿礙也礙止也經云所求多是也並悞命上於沼反背𮌡上蒲昧反下補昧反下俗洴薄上蒲丁反浮草也顏莫孝反悞頎家上去營反側也正作傾也又音祈悞鄉上求右反故也正作舊他𨛁布江反歡顒魚容反仰也經音義以娛字代之音愚姻媾古豆反重婚也厚也行疋音疋夫音細惋恨上烏喚反歎也祜佑上胡古反下于救反幹軻上苦感反下口我反多迍也不遇也正作轗軻禍𥚢息遂反正作祟䨱蔭上芳救反下衣禁反𥿠毗上夷反正作絺哆上音婆下音多𫇿法上又白反三筞同上七筞同上瀬上子老反下所石反口齒尺里反神筞楚責反謀也籌筮也正作䇿筴二形第十一卷隨願徃生十方淨土經墾惻上口佷反下楚力反至誠也正作懇如餉書亮反遺也逕生上結定反近也罪舋許覲反放赦音舍免也羅音恱洗上子老反又所禁反悞𠧒盖割二音求也頭蹄音提菓𦬔郎果反𦽦實也正作蓏又音爪雜䅽苦角反皮𡖉等課菓皮也正作殼二形也悞問訊音信安厝倉故反奄便上衣撿反懊𢙉上烏老反正作懊閹便上於撿反忽也久也正作奄不探他含反婪也愛也正作貪諸本皆作貪也探取也第十二卷扷除過罪生死得度經軁者上力主反傴僂不伸也尪也因也正作僂刑音六鞭撻上卑連反下他達反倮露上胡瓦反𢤞貪上苦閑反正作慳矒憒上莫登反下古對反呪咀側慮反蜚尸上方微反邪忤音悟迸也蒺䔧上秦七反下力脂反蝍蛆也蜈蚣別名也𧈭虵上許鬼反下食遮反上又或𧈭五官反蝮蝎上芳六反下許謁反下又寽割反非也痿黃上於為反祠祀上祥茲反下祥里反洋銅上以良反謂銷銅也正作烊嬈惚上奴了反下奴老反尫𮊵上烏光反下力垂反妖𦾨上於反下魚列反料蕑上力招反下古限反駐錄上之句反摩𠇾音休鞠藥師如來本願經等六經十卷同帙藥師如來本願經一卷隋笈多譯序文禳灾上如羊反慧蕳古限反正作簡又古閑反悞雜糅女救反矩俱雨反僧名紕繆上疋夷反下靡幼反錯誤也正作𧧺謬揩定上苦駭反摸也笈多上其刧其急二反大隋音隨國号也正作隋海馭魚據反正作馭經舘古喚反懲上直陵反下魚吠反式貽上尸食反下与之反經文橽達上其焉反樂神名也正作犍又他達反悞𭦟殊上莫安反從座音坐床也又音矬悞一膊音愽瑕垢古口反跛躄補益反身攣呂貟反𤷄屈也背傴於矩反鞭撻上𤰞連反下他逹反飽足上布夘反升拱上得口反下居勇反淳善上市倫反姤忌上都故反下其記反摩𦊰古犬反明苦角苦木二反蠱道上公五反憙樂上許記反又音喜覺𥧝上古孝反睡也𢙣蠍許謁反瘦上力垂反下所右反乾燥蘓老反薄蝕上補各反下成力反𧆞𤝧補㒵反迷佉去迦反安㮈奴達反鼻羯居謁反藥師瑠璃光如來本願功德經一卷大唐三藏玄奘譯𢉩瘂上於今反下烏下反攣躄必益反背僂力主反完具上胡官反羂上古犬反繩也刑音六煎迫上子仙反下愽陌反城𨵗丘月反互相上乎故反呪咀阻䟽反苾茤上毗必反下測居反上又蒲結反此呼不便也鄔波上烏古反粖香上莫鉢反徧袒上疋綿反下徒旱反正作偏袒也又音遍組並悞琰魔上羊染反手上吒格反又音竭悞粄𨒫上步半反正作叛悞薄𮔣上補洛反下時力反侵也妖𦾨上於反下魚列反畋獵上徒年反下力反嬉戲上許之反遊也耽婬上都舍反下羊林反伐折上扶月反下時熱反迷企去智反頞你上安割反下奴里反揭路荼上其列反下宅家反藥師瑠璃光七佛本願功德經兩卷大唐三藏義淨譯上卷序文奠川上田練反設也又丁定反貯也俯侚旬俊反閟彩上兵媚反之徵陟陵反詎藉上其呂反下才夜反闢圓上旁益反普該音垓慾浪上逾玉反貪也漲曰上張亮反悠音由遠也品彚下音胃類也襢美上時戰反又音但悞瓊編上巨營反下布玄反𨵁浮上羊廉反樹名也因樹為洲名正作閻並騖無付反駢蹤上步田反著範上竹筯反下音犯至𦣱助責反流䂓居隨反頃属朱玉反會也膺運上於陵反編甿莫𥝷反田民也野人也閴𡨜上苦覔反靜也爰洎上為无反下其既反悞邅迴上知連反羈絆上居冝反下補判反巢燧上助交反下音遂並古妵也羲軒上許冝反无垠魚斤五根二反掩巛音坤古文遝淳市倫反亘𠃵上古鐙反属上力讓反下之玉反相韓音寒姓也貂蟬上丁條反恬神上徒兼反㰅芝上知𮧓反下止而反挹清上一入反丹嶠其照反棲偃上思𠔃反下衣緫反臯鸖上古毫反縶影上知立反繫也絆也亦作馽㓜特頂反明晤音悟朗也玄樞赤朱反皷棹直孝反揖也正作掉昇航戶郎反波濤徒刀反聖躅直玉反不泯忍反屢攀上力遇反蹗詞上之石反跨𥘿上苦化反下疾辛反虹幡上古公反槥曰上于嵗相絕二反裂也滅也正作櫘遏雲上烏割反鏘鏘七羊反濟濟子禮反煒煒為鬼反煌煌尸光反于闐音殿寘懷上之義反渾金上戶昆反璞玉卜普角反寔法上實力反扣𡨜上苦吼反經文伽上其亮反嚴飾書力反𢙣守右反正作獸舡舫上市專反下方亮反上又呼江反非有娠音身孕也呾姪上多達反下徒結反悉睇提帝反謨折你上莫胡反中之舌反下奴里反萫末上烏含反下莫鉢反上正作菴忙揭音竭呬上香器反下浴干反悞曷唎上何割反下力反頞他上安割反窒步上知日反蚶摩上呼甘反呾囉上多達反悞𠿒帝上呵割反瑟㨖知利反又上聲勃陁上蒲沒反多喃女咸反飛莫𥝷反屋棟也戶牖音酉窓也耕耘音云无上莫庚反正作盲頑痺卑至反下卷瘦上所右反下魚約反㽽疾也正作瘧窶嚕上其矩反下盧古反薜琉上毗計反鉢喇郎達反咀他上多割反揭多上其列反晨嚼才雀反澡漱所右反裏𧙯上占火反下陳日反乾燥桑老反琰魔上閻染反叛𨒫上蒲半反儲君上直魚反妖𦾨上於反下魚竭反呪詛阻䟽反鮮少上思淺反警召上亰影反咀姪上多割反下田結反具䛧迷計反𧫦𡰱上烏兮反膱呬上女利反下香器反馺䫂上三合反下多可反怚他上多割反勃睇音弟嗢荅上烏沒反隖䛧上烏古反眤曇上𡰱曰反朅囇上去竭反下力計反喇你上洛達反下泥里反瑟侘家嫁二反泥娜𨚗可反曷𠸪力各反𭦟㮃奴迴反正作捼或作捿奴禾反漢㘓洛干反苫謎上式占反晡㘓上布胡反脯㘓同上又音府儺隟上市由反仇也正作讎下去𨒫反𭜨也𭜨也隟咀姪上多達反下徒結反𢙣寠瞿矩反麼麼莫可反𮠴末上火𠔃反喇拏女加反脯与剌字同也悞揭路荼上其列反下宅家反悞文殊師利普超三昧經三卷上卷寶卬因進反无圻魚斤反俱造七到反濡首上而朱反僉然上七廉反之疇直由反迭相上徒結反德鎧口改反憒亂上古對反𢬃挫上衣力反下子臥反塵勞音勞歆慕上許今反厄懅其據反諭諂羊朱反澹泊上徒敢反下普百反喟而上丘愧苦恠二反鏗然上口耕反純淑常六反𤵜疾上丑刃反際上五案反耗減上呼告反下咸斬反撾捶上竹花反下之水反打撲普木反恬忽上徒兼反琦上巨冝反紛葩上芳文反下普巴反暉上必袂反痛痒羊兩反猗著上於綺反又平魃求上蒲末反早也經意冝作妖字呼忽上書六反疾㒵也正作倐悠二形怳惚上許兩反下火骨反予所上羊諸反其上尸人反正作伸功憅許云反聖喆知列反所僥音澆求也頫于上他𠮧反視也正作眺也頫聽也又府免二音蜜揣徒官反䫃䀎普幻反反音麵中卷飄上疋搖反下疾反淵渟上一玄反下徒丁反灼音斫煒上云鬼反下云輙反僉然上七廉反汎𣽈上芳梵反下他端反這說上尸隻反始也繞也又的隻二音正作適也又音彥非交絡音落枰帳上平病二音獨座板床也又音棚下知向反四峙直里反柱反欣𭉋音笑甫𡆮上音府下音因疇𠤭上直由反下普必反分䅶內沃反文阤徒何反正作陁罪亹許覲反之誥音告䩭綴上居冝反下竹稅反𪫟惕上田律反下他歷反羣獠力條反正作僚憂悸巨季反不歆許今反瞢瞢莫𪪺反憔悴上疾焦反下疾遂反拯㧋上取蒸字上聲呼拯救也助也下步八反等恤思律反惶懅其去反虛乏扶法反匱也古作丐躃地上毗益反泡沒上直林反正作沉也又普交反非也溥首上音普寶積經作普首也又音儒餚饍上戶交反牀㩉上助㽵反下他盍反皆享許兩反悕望上許衣反震慴之攝反念上相兩反正作想𭦓滅上莫郎反遽也遠也怖也正作朚茫二形出經音義利𧨏音義㧾持上則孔反精核戶𮧓反菓中寶也料蕳上力條反下古眼反探暢上音掬又他含反悞慕靖自井反憂倉歷反正作慼三苦顏反藏也謂聲聞緣覺菩薩三藏教也悉苞布交反綜理上子未反崖柜上五佳反下丁禮反下正作底偱理上音巡歷也无嵎牛俱反下卷𣽈首上人未反前作溥首倡伎上昌唱二音下巨倚反蘅華上戶庚反跳騰上徒凋反下徒登反樔翳上助交反下一計反未孚芳無反信也經音義云亦生也恱懌音亦樂也猥多上烏罪反飼之上音寺餧食也金仳音毗勞悒音邑闡上苦灰反跱立上直里反殿舘古乱反無焚扶文反燒也梵言阿耨達唐言無熱𢙉也經音作芬非跳擲上徒聊反蹉跌上千何反下田結反般黨上卜安反下都朗反正作𤳖黨慌忽上呼廣反危𡨟戶盖反泍汙上而陝反囹圄上力丁反下魚与反不詭居委反𮞏互上音弟下音護酸酷苦沃反𨀸宅加反正作垞秺二形也地獄名咤羅晉言集欲阿闍世王經作頭是也年上居月反四植直志反柱也貲限上子斯反正作訾𦿔曀上必祭反下一計反㷿佪上音焰下音迴錠光上徒俓反予在上羊諸反我也匠素上普必反正作匹阿闍世王經兩卷上卷若那上或作𢜪同而者反此云智菩薩名闍傎都田反波秳鎮音活披𢪕上音波下音仾呵麑五𠔃反波𧴵莫𠋫反阿藍郎甘反摩坘丁𠔃反又者遑呵俞音逾頞悉上烏割反鳩遬蘓木反漚術上烏侯反法鐙音登柔䎡音軟恱懌亦音樂也改也𨗻此上音代及也諭諂上羊朱反婬妷上羊林反下羊一反不必祭反檛捶上竹花反下之水反打也唵嗒上烏感反下他荅反開僻毗益反正作闢開辟同上妹好上尺朱反牧手上莫六反放也使也開闢毗益反波羇居冝反摩仳音毗又疋尒反三昧經也式佛上尸力反時咲音笑正作㗛竭勃步沒反而𠸍音笑䗍越上力支反亦云離越怖懅其去反綩綖上於遠反下以連反皆施失支反設也皆拖同上下卷恍忽上呼廣呼往二反虛幻也忽也失志也上又音光非也䖝狩上直中反下尸反正作蟲獸俸禄上扶用反秩也君以禄与目曰所䂊羊庶反縺縛上力千反𭄩上音力或作鳬音扶之𭩥徒果反積也堆也又上羊雪反下初加反金鈚音毗神名繡紵上修救反下除吕反檠持上巨京反舉也従手跳擲上徒聊反冝作挑呼轉捶音遙邊愊音福怕然上普百反痛庠羊兩反悞擿沐上持石反投也拋也下助㽵反正作牀泥梨力兮反地獄也悞薜荔上蒲計反下力計反栴檀上之然反起塌吐盍反陁上蒲末反放鉢經一卷道劇其𨒫反湏羊朱反求索所革反求也下探吐含反深取也泆上羊林反下羊一反摩坘直𡰱反又仾底二音陁𢜪而者反佛剎名屎尿上尸履反下乃𠮧反涕唾上他計反鼻也俗無聊力條反形𤸇力中反拘攣吕貟反𢜪𮟯上而者反一云龍首漱口上所右蘓奏二反養月燈三昧經一部十一卷一帙第一卷殖眾市力反上緊陁上居引反防捍寒案反讎上市周反下亭的反糅以上女右反謨噠上莫胡反下徒怛反躁擾上則到反下而沼反嫉姤丁故反奪者上徒活反姝妙上尺朱反卬一信反揵陁上音𠃵淳至上尚倫反懽喜上呼官反應式始力反憒眾上古𭔹反涕唾上音剃鼻液也正作洟也第二卷作倡昌唱二音掉戲上大了反兇暴上許容反下步報反蕀㓨上居力反塵埃烏開反蘯然上徒朗反陰曀一計反如榜布朗反摽其善𢙣以示人也分𢩁其玉反優垤徒結反刧𢱊亮略二音嚬上毗反下子六反逕時上音經歷也瑕疵上戶加反下才移反貪嗜食利反泥五口反擇飡倉安反更愸正領反瘖瘂上於今反下烏雅反屎尿上尸履反下奴吊反指抓爭巧反爪正悕求上許衣反障𦿔必袂反睒婆上失染反寶裹音果手上子老反第三卷堪抗苦浪反睺荼上戶鉤反下宅家反悞氣馥音伏又平逼反香氣也倫疋普吉反上古豪反伇事車皷也又大皷長一丈二尺也音義云長六尺四寸下扶文反大皷也音義云長八尺也正作磬下正作皷二形蠡皷上洛戈反銅蒲末反微𠸍音笑鳴鐃女交反拘翅上九愚反下尸智反鳥名鴝鵒上其俱反下余玉反金鉦之盈反鐃也似鈴諸鼙毗𠔃反騎上鼓也䗍貝上洛戈反亦貝也簫筑上蘓條反下張六反隧落上直遂反落也悞枝𦽦音萬弱莖聡叡余稅反智也柔𣽈而兖反弱也又音儒輕子告反佻上徒了反搖也正作挑又吐凋反悞易上莫𠋫反掍物䂓利上居隨反飲醼一見反𡍭殖上口佷反下市力反廾秤上丁口反下昌證反孚乳上芳無反㗛上尺之反下私妙反憙妄上許記反好也㸦上大禮反下乎故反陵莫結反柔耎音軟𥥛上丁禮反下徒骨反第四卷婆藪乘走反暯蔽上於竟反下必祭反上正作映暎二形胎而陝反正作染係心上古詣反連也筞下上初責反駈也揩正上苦騃反心上巨焉反敬也正作虔第五卷不窄阻格反寒𣲙彼陵反糞尿上夫問反下奴予反𡱝牛上斯𠔃反焱電上羊贍反遊力反正作獵激川上古歷反而辭音詞尠少上息淺反少也又思勻反被鉀古押反第六卷㩲蜜上巨貟反下眉筆反吃忽上居𠧒反下所立反怯訥內骨反悕求上許衣反皼具上公五反下正作貝不完戶官反全也諛諂上羊朱反憒𡗚上古對反下女孝反第七卷入匣胡甲反匱也魔羂古犬反成熟神六反實也正作熟開闢旁益反不𢁙音希𢢔撞宅江反正作幢恬靜上徒兼反在音岸水際也百園為元反園裏音里內也𨓝相上提禮反常㴻注樹二音縫治上扶峯反下直之反杻械上抽酉反下胡戒反𩑬暴上古隨反下步報反㗛弁音弄又音卞悞狡猾上古巧反下戶八反暴虐上步報反下魚約反𨷂失上丘月反柔而兖而朱二反又奴短奴乱二反悞悕望上許衣反係心上古詣反獄諸与反尤劇上于求反下其逆反第八卷鞭杖上卑連反畏𦊰吉犬反繫默繩臺榭上徒來反下辝夜反尓雅曰闍者謂之臺有木者謂之榭闍音都隧於上直遂反正作墜可䛩烏故反相毀也亦作䛩白阻瘦反羸虛上力垂反腥臊上先丁反下乘刀反楗速上自反健堓音岸貨賄音悔欲上羊林反又五𥝷苦耕戶經三反非倫普吉反廊廡上音郎下音武堂殿下外屋也愛㓨七賜反正作㓨荊三形郭氏作楚乙反非鴻鵠戶沃反又音鸖弱冠古乱反束也男二十而冠顏艶音焰厝塔上眉照反正作廟二形又音措悞烔然上徒弄反正作洞洞然通澈㒵也又音同非投下上徒侯反后妃上戶口反下芳非反抱上步保反音愽霄淚上云愍反墜也落也第九卷毀訾音紫相𢪛尸由反謝過也嚬顣上毗反下子六反右䏶步米反將師所類所律二反防邏郎个反羹臛上古盲反下呼各反㾉愈上七全反下余主反其創音瘡不隧音墜謦欬上苦頂反下苦愛反作聲也或挑他聊反刖足上魚越反劓鼻上魚至反礕礰上普吉反下郎擊反味𧢻音觸隧墮上直遂反正作墜䫃䀎普幻反又音麵抓塔上爭巧反竚立上直与反暨乎上巨既反蘭楯上郎千反下食反為轅于元反豪挨自木反𮧓屣上古包反皮也下所綺反履也徧袒上疋連反又音遍非𠡠理上之領反願此上魚勸反正作願耳璩巨魚反違叛音畔視瞬音舜動瞼音撿眼外皮也殺戮上所八反下力竹反兇暴上許容反下步報反古作焚金莫顏反樂上牛俱反下五孝反臻萃自遂集也左葙上子可反下息羊反正作廂分先擊反擗地上毗益反伏也倒也正作躃媅著上都南反樂也不音希願第十卷鑒治上古銜反正作礛也礛䃴青礪石可以攻玉也下直之反理也代也裏昞上音里下音丙俟用上床史反待也香𧂐子賜反三斛戶木反十斗也六外都口反正作計可䈂音筭剜身上烏官反渧𢿘上丁歷反又音帝非利上疾反毀莫結反鉀冑上音甲下丈右反兜鍪首鎧也枝樤徒聊反如鑛古猛反鳥跡子昔反不窄阻百反恐怕普嫁反怖也讒倿上仕咸反下奴定反第十一卷篋中上苦頰反屖象上思𠔃反熊羆上乎弓反下彼皮反獸名捫摸上莫昆反下忙各反堅䩕三孟反巖穴玄决反甄陁上之人反樂神名也又居𨒌反亦云緊那羅舟栰扶發反愠習上烏昆反煖也善也知也正作温也論語云温故而知新是也又於運反怒也非用豈月燈三昧經等十三卷同帙月燈三昧經一卷僮子上徒東反男未冠者也字樣云男有罪曰童古作僮今經典相丞為僮僕字也嫉姤上自七反下都故反能奪徒活反柔𣽈音軟又人朱反𡨜漠音莫无聲也采建居健反立也字從廴音引又聿律二音字從辶丑略反戒彊巨羊反𡩡索上蘇各反取也好也下所𮧓反求也飰食上扶万反諭諂上羊朱反諂也詭言也正作諛大㽵嚴法門經兩卷上卷獚古猛反𢙣也又戶光反非䫃䀎普幻反又音麵嬉戲上許之反無臭許右反正作齅嗅二形剛橛巨月反如鐵天結反倉鵠戶沃反唯所甲反鳬也下卷伽阤上巨迦反下徒何反大𧂐子賜反羼提上初諫反此云忍膝上上星七反𮌨脹上普江普絳二反下知向反屍臭臭爤上尺右反下郎嘆反剖裂上普口反𭇭食上子合反嗽也正作𠯗唼二形蛆䖝上七余反加音六泡沫上普包反衣裓古黑反寶炎音焰佛名奮迅上方問反下相俊反奮揚也又鳥張毛㒵也正作奮𡙸也大淨法門經一卷溥首上音普寶積經作普首菩薩又出三藏記作潟又作𣽈同而朱反憔悴上疾焦反下疾遂反駕駟音四䨱𦿔上芳富反下必世反煒煒音偉揵沓上巨焉反下徒合反𧨏者上魚寄反巔倒上丁年反澹怕上徒敢反下普百反蠲除上吉玄反㷿電上羊瞻反慌忽上呼廣反如鍜都乱反明喆張列反𭞪難上烏故反下奴歎反瘕疵上戶加反下自斯反上又加嫁二音非慜濟上眉殞反僉然上七廉反咸也虵虺許鬼反戲挊郎貢反著祴古黑反螫人上尸亦呼各二反者𢁙音希惔怕上徒敢反𨔵捨上徒愛反專秉音丙他矩都管反正作短其𨷂去月反神祝音呪窈𡨋上一了反𤵜去上刃反上䎡音軟差𭷅徒得反𦬔薰上芳文反下許云反爤上普江反下郎歎反步沒反腥穢上先丁反潰壞上戶內反膓𦝩云貴反正作胃肝肺上古安反下芳廢反脾腎上步卑反下時忍反怖懅其去反勉大上音免脫也正單作免揵呇徒合反屎𡱤上尸旨反下奴予反愚戇陟絳反挽上無遠反眩受黃見反湏羊朱反捲手上巨貟反慌惚上呼廣反下呼骨反痛痒羊兩反亦作癢泡起上普包反䎡首上而兖反如来㽵嚴智慧光明入一𭃄佛境界經兩卷上卷蘭𣛝音順頸下上居郢反𡨜靖自井反可𭊴許右反能澍注樹二音時雨也埠阜上都迴反下扶久反不憘音喜菓芪古花反正作爪苽二形下卷䂓礙上古隨反正作規土塊苦內反迭共上徒結反牀㩉上助㽵反下他盍反病瘦所右反寶塌音塔寶莫顏反林㯓与牀㯓同仚耶上丘智反薩卬一進反陁洹戶官反唐云預派洹陁桓上音湏下戶官反梵言湏陁洹亦云湏陁槃耶皆訛略也正作窣路多阿半那唐言預流度一𭃄諸佛境界智嚴經一卷祇夜上巨支反十二部經之第二部名祇夜唐言應頌也祼形上戶瓦反阿㝹奴侯反基階上居之反脩姤都故反十二部經中第一部名修多羅唐言契經也稱讚淨土佛攝受經一卷玄奘音藏𢈔多上羊主反芬馥上芳文反下扶福反揭拉上巨列反下郎合反𪃩鷺上七由反下郎悟反羯羅上居謁反古經云迦陵頻伽戾上莫結反下力計反磽伽上巨陵反正作𣩦𣩦伽同上此正磽伽同上此悞𢁙有上許衣反阿陁經一卷俱絺夷反阿㝹奴侯反𠃵陁訶提下合作堤音仾此云香𤉢桓因上戶官反衣祴古黑反衣袖也飰食上扶万反白鵠戶各反阿鞞步𠔃反難阻合作沮自与反觀无量壽佛經一卷浴上子老反正作澡和尺沼反乾飯屑嗽口上乘奏反鷹隼上於陵反下相尹反也經音義作䳬憔悴上自焦反下自遂反瘐損也上經文作燋非投地上徒侯反幽閈愽計反𨳲目同上正作閇閈二形種畫戶麦反柔𣽈音軟甄上居賢反𭄩上音力或作鳬音扶于晝戶麦反逕歷上古形反逯元上徒愛反後出阿陁偈經一卷夷易上羊脂反平也下羊義反本莖尸𢈔反諸源魚袁反翕習上許急反胳肩上古𢙣反腋也基坐上居之反頃頃苦反姟刼上古哀反懀世上冝作快㕟二同苦夬反快稱心也可也善也恱也㕟息也尓雅云苦㕟隸呬息也又烏快烏外二反非像腋經一卷𡄇咳上苦頂反下苦愛反正作謦妖也瘶也亦警覺聲也下又音孩非無𡪲市一反𩇕過上自井反可徙阻卓反搦也手把物也正作捉也又斯此反非動方伐反得實音實不實同上𢪔子上音遲正作无所希望經作毗盧持古維摩經作毗盧持增一阿含經作毗盧持中阿含經作鞞羅邏雜阿含經作毗羅坘又丁𠔃反維摩經陁羅𡰱集及諸經中多作毗羅𦙁子也捴務上倉公反正作忩稗䅎上步拜反下羊柳反所𢫀丘堅反業彰之向反正作障也又音章非𢭀陁上序全反皮𠻬宅加反正作荼咃下音他㝹𠻬上奴侯反呿伽上去迦反下巨迦反𭋥伽上莫公莫亘二反經音義作𭋥以瞢字替之瞢莫𪪺莫亘二反瞗吔上音凋摩㕤巨牛反正作也經音義以仇替之虵螫呼各尸隻二反无所悕望經一卷性𧨏音義燕坐上於見反磬咳上苦頂反下苦愛反正作謦欬又上苦定反下戶哀反並非用擾攘上而沼反下而兩反家滅上自歷反善㩲音拳造證上七到反夷音端正作耑其邪令上居之反中羊嗟反下力丁反或云基耶令又上音期或云瞿邪樓比盧上音毗亦云鞞羅持猶豫上音由下余去反不定也又上余救反疑也怖懅其去反愚戇呼貢陟絳二反罪舋許恡反不猗於綺反正作倚也又於冝反空檐都濫反蛟龍上古肴反虵虺許鬼反嫌隟丘𨒫反蜚尸上音非正作飛抱在上步保反𠻄如上呼廣反虛幻也應和尚未詳除愈余主反𧎔虵上莫朗反大虵也正作蟒蚑蜂上巨文反下芳逢反病創音瘡疽癩上七余反下郎太反疇迮上直由反下普必反偶也正作匹愚騃五駭反荊棘居力反正作𣗥種殖時力反種也生也敢觀勒菩薩上生等十一經十三卷同帙觀勒菩薩上生兜率天經一卷垣墻上于元反下自羊反正作牆棠觸上宅庚反欄楯上郎干反反下食尹反樑棟上力羊反下都弄反荷佩上乎可反下步昧反炳然上兵永反甄叔居賢反樹名也好艶音焰勒下生成佛經一卷義淨譯阻人上音隔入也悞閞𨷲上古還反下羊略反繞𡍕音𤗊隍壍上戶光反下七焰反擢芳上音濁下音妨餉佉上尸亮反下去迦反羯陵伽上居謁反下巨迦反蜜絺夷反般逐上北安北還二反寶藏名痆斯上女八反俄誔上五何反下徒旱反正作誕褓母上補老反正作褓也襁褓真兒衣也又卜口反非也雕輦上丁聊反下力蹇反毀格反羈籠上居冝反下郎公反蓊欝上烏公烏孔二反𣫆捨上口定反翳藥上於其反正作醫翳勒成佛經一卷亦云下坐經羅什三藏譯𣽈草上而兖反義淨譯者作耎草次比音毗並也又毗必反次也翅頭上借音吉支反亦云雞頭又音施非戶牖音酉塞上尸遮反𪂏翠上扶味反下七遂反蠰佉上尸亮反羅咤知加反幡𢣏音盖傘也又音藹非勒成佛經一卷羅什三藏譯翡翠上扶未反下七遂反七穫胡郭反刈也朱𮤅力反髦尾上莫高反蹄䠋上音提下音甲正作𧿵甲二形法䗍音螺門閫苦本反門㡾也刑音六狠跡上音郎正作痕擗山上愽厄反正作擘揵推上音𠃵下音槌長跽巨几反鷹鶻鶷上於陵反中戶骨反下羊照反並俊猛之鳥也下正作鷂也下又音鎧非撮食上子沽反捉也又倉活反取也勒來時經一卷失譯主名菓蓏郎果反如音紙築城上知六反杵擣也倪上於耆反中丂底反下北末反正作伊鉢也龍名也下生經作伊勒鉢成佛經作伊羅鉢增一阿含經伊羅鉢並是也又上五𠔃反下音峯非幡頭上市官反正作也下生經作般逐成佛經作𧹞軸增一阿含經作班稠邠𨚎經作𦨟籌汜羅上芳梵反吁湏上火乎反正作呼也大威燈光仙人問疑經一卷傴僂上衣禹反下力主反𦽦陁上莫官反葦町他丁反田也又他頂反坘也迭相上田結反骨琑音鏁正作𤨏也郭氏音消非也道𮏯七賜反草木針也芒也呪咀阻䟽反一知格反一張手也又音竭非蟒虵上莫朗反金𮡻徒頂反罝金上知利反正作置𭤔有上許衣反𧈸虫上音文正作蚊相皂音㒵盲𥌒音古忽所戢反峙立上直里反靉靆上音愛下音代紅縹疋沼反奮迅上方問反下相俊反字愜苦頰反笥箱類也正作篋第一義法勝經一卷𤹪身上於禹反正作傴齧食上五結反有蟒莫朗反涎呼上序延反迭㸦上田結反下平悟反字篋苦頰反順權方便經兩卷上卷僉共上七廉反珠璣居衣反晃昱上戶廣反下羊六反光也不猗於綺反惔怕上徒敢反下普伯反陰𦷥愽袂反正作蔽使𨔵音代正作逮尓雅曰逮及也又緣反非用而竊千結反洒除上西禮反大邽愽江反又音圭非也坵聚上半牛反下自禹反聚人所居處曰丘聚也上正作辛大邽愽江反正作邦下卷夫音細州牧音目珠琦上合作下音奇若是珠璣字合作璣音機頂頥与之反犇逸上布門反或撾陟花反揵上巨焉反下直𡰱直利二反西天鍾皷之類或木為之也或云揵椎或云揵邏或云健稚應和尚云此無定翻耳耗上火告反曳其上尸人反正作申揌持上則孔反普也皆也正作揔也又思來反非也樂瓔珞㽵嚴經兩卷上卷泥泯巾忍二反菩薩名也這意上尸反樂也正作適也又音彥非互相上乎悟反棠𧢻上宅庚反下尺王反姞章上古乎反关之母也正作姑也又巨乙反非恱𢠽余庶反樂也正作豫又徒朗反非也足滿上子句反添也戲挊音弄勉猫上他故反正作兔下卷㯢檡上相兖反苦𣾫所立反所螫呼各尸隻二反十𠳞丘迦反雜阿含經云四斗為阿羅為獨籠那十六獨籠那為一闍摩那十六闍摩那烏摩𡰱二十摩𡰱為佉梨二十佉梨為一倉也又丘約反或作㑢曕蔔上之廉反下步比反華䰅莫顏反闇𦷥愽袂反諸法勇王經一卷坘舍上丁兮反舍利弗本名也或云鞮舍或云提舍又音遅梵言輕重通呼也槗律阤上居妖反下音陁上正作槗二形也目犍連本名也本行集作俱律陁四䨥所江反失獸尸呪反魚名梵音父正作輔揣如上徒官反潤漬才賜反浸也漚也軻貝上苦何反下補盖反螺也海中介虫也嬰咳戶哀反小兒也正作孩塌廟上他盍反曾眴音舜目動也亦作瞬瞚二形又而春反亦目動也又音詢悕怡諸經皆作凞怡上許之反下以之反和恱㒵也𫟈也而𭉋私妙反欣也喜也正作笑㗛二形又萇筠和尚𭃄音美非𬼘用一𭃄法髙王經一卷有譯記辮上蒲犬反交織也綰也古經多作編舒舒音書前經作失獸或云失稻田上徒老反秔穀也廣萇直羊反坘𮬚上丁𠔃反下莫卑反蝦蟇上戶加反下莫加反鳥鴨烏甲反勉脫上眉遠反脫也正作免也勉強也勗也書人悞加力碎身上蘓內反知芬上人諸反下古敗反正作如𦬔也經云碎身舍利量如芥子是也當伽上方救反正作富也下巨迦反梵言富伽羅亦云補特伽羅此云人毀六度集經等七經十四卷同帙六度集經八卷第一卷布施度無極經厥則上居月反其也𢪿者上古胡反重𦍬同上罪也極拔上之庱反助也救也正作拯下蒲八反𠃵川上巨焉反下苦魂反天地也僉然上七廉反咸也皆也滂沛上普光反下普盖反大雨㒵也又流溢㒵也割䏶步米反凶禍胡果反瘳復上由反下扶救反瘳差也復安也貧寠其禹反空也無財禮也正作寠鱣魚上知連反大黃魚也口在頷下大者長二三丈蕩身上他郎他浪二反𥥛也𥥛出也行也正作盪盪二形苾芬上便結反下芳文反香也菓𦬔古花反或作蓏郎果反手補各普各方務三反擊也䚪寡上古頑反下古瓦反西𥥧其殞反急迫也經律異相作拪窘是也又郭氏作香仲反憶上他活反可也經也瘦疵上所右反下自斯反一軓烏𮧓反珠璣音機鷹子活反贖妻上市玉反惻愴上楚色反下楚向反巨細上渠与反大也正作巨偏頗普波反軍儲音除副也蜎飛上一玄反𧏦動上而兖反蚑行上巨支反䖝行㒵也又去智反窠藪上苦戈反下先走反賑給上真刃反贍也貸金上他得反佷也借也正作貣耀曄上遙照反下為輙為立二反性上卷月反澹怕上徒敢反下普白反箕上居其反下周酉反可殞于愍反栺櫂音濁拔也瓢杼上毗遙反杓也下徐呂反漾也改操七告反大𢼜音舍免也蕃屏上方煩反下并郢反籬牆也親輔之目猶如籬牆以投其主也又音煩躃踊上蒲益反下容隴反賣撨才焦又薪也又蘓條反悞慍於上於運反怒也德韜他刀反藏也不贊他帝反廢也滅也正作替又音讚悞毒直甚反枕其上針審反拔劒九大反刀也正作劒灼熱上之若反熱也藏否上子郎反善也厚也下方久反𢙣也又皮部反塞也豺狼上仕皆反第二卷布施度无極經遁邁上徒困反下莫芥反無羊亮反憂也病也正作恙千音疋䪺僻上都困反下旁益反絕倒也悞哊咿上於六反下於尸反悲也正作噢咿也上又于六反非冒昧上莫報莫北二反涉也千也正作冒龜鼉上居追反下徒何反𨒫上蒲沒反正悖蠱女上羊者反妖也懷柈音盤問訊音信冒涉上莫報反誡言上音戒言警也今𢪛失由反恍忽上火廣反又音光悞溼隨上失入反𩬇杖上巨文反畏於身也正作𨱜見別隨函作𨱜金甕烏貢反百揆其癸反震犇布門反誥之上古到反𭦟坘上莫安反下丁𠔃反太子妻名也下又音遅煒𤈛上于鬼反光也下古黃反盛也正作恍下又黃廣反明也暉也正作晄也俗徙吾上斯此反移也遷也毒蠱音古毒藥也經律異相作䖝斃鬼上毗祭反死也礔嚦上普擊反下六擊反非𨂂之石反履踐也經律異相作蹠經音義作跖並同也侯聒耳上公活反為識音志摽也又音式認也不暏音覩見也正作暏當卒子律反絡也無𠢚其卷反疲也猒也懈也正作𠡠也經律異相作動字訣辝上古血反別也懷𡜟而案反孕也正作妊姙執𮝲音秘𩾜上音扶經律異相作鳬也又音力悞嚶嚶烏耕反尠有上息淺反葌服上古顏反掔延上居例反中女加反下以然反經律異相作𦋺拏延也彼翁烏公反又音公內否皮𫟈反塞也專愚上之緣反獨也自是日專愚鶣鶙上卑典反下他𠔃反薄㒵也正作匾𠥶也面側廋反皮緩也縮也正作腷四形脣䫂都可反蹇吃上居輦反下居𠧒反虛秏呼吉反正作耗勞賚上郎吉反下郎代反与也賜也正作僗賚德徽音暉美也勃然上步沒反䎡然上女六女力二反慙也正作恧而詭居委反許也王建徒受反及也正作逮亦作𨗻二形也又居建反非也怛懼上都達反驚也正作也携手上戶圭反提也離也正作擕俱逃徒刀反握蒢上冝作窟堀二同苦骨反下冝作窨蔭二同於禁反窟窨地室也又上烏角反下音除並非義也其槄苦感反坑也正作塪也又叨恰二音並非疲勌巨眷反𤶆痛上奴老反出郭迻音也今冝作𤶝惣二同作孔反會也皆也湏大拏經云舉身皆痛是也經律異相作𤶝痛歎㰻乙兾反美也正作皼𡄻遮延上尸去反冀也下羊連反遠也正作庶延在塪苦感反坑也戰慓力日反悞握澡上烏角反下子老反自去堅反𢝆𢝆直勇反遟也應和尚以幢替之昌鍾反意不定也徃來㒵也目而春反目皮動也正作𥌎瞤眴三形腋痒上羊益反下羊兩反湩流上都弄反汙汁也跳𨄈上音條下音良鬼𩲐音媚老窘巨殞反急也迫亦作盟誓上眉乎反約也勞上居月反碎然上普𥝷反正作碎編身上卑連反又音辮地上都安反赤也正丹也上於遠反下以然反岑巖上助今反山小而高噓唏上許魚反下許既反膝乎上辛七反勦曰上助交子小二反捷也疾也絕也經意冝作䜈魅二同初交反䜈代人說也疾也財幣毗祭反帛也菓苽郎果反正作蓏也又古花反薇菜上文非反㘅泣上戶巖反含物在口𣐀淚上文粉反帳上知向反下莫半反趣蹌上七逾反下七羊反冋也集也正作趍蹡也經律異相作超蹌也上又七遇倉狗二反非也退僗郎告反戢藏上阻急反下自郎反杭遮上之然反調達妻名也正作旃栴𭥆三形第三卷布施度无極經狂悖步沒反泆上羊林反下羊一反貧窶其禹反菜糜上倉代反下美為反上又音來非也勸懌音亦惴惴之睡反憂也尓雅云惴惴燒燒懼也恰恰苦洽反用心也恭恪苦各反盥槃上管貫二音正作盥食鼎音頂韜衣上他刀反綻綴上直莧反下竹稅反牀㩉上仕㽵反下他盍反鞌勒上烏千反厥體上居月反盪樹上他郎反小𤛅右反搐獸同上正作畜也又六反舊上巨右反下普吉反偶也妻也居踞音據慈祝音呪又之六反瘖語上於今反廦甲上必益反狂𠕀音古文也正作网四二形殆危上徒改反妖蠱上於反下羊者反䰡魅上利反下眉秘反禲鬼也又知反狐獺他達反嬖好上必計反愛也卑也妾也賤而得寵曰嬖者甲姨也有偟音皇暇也生卬郎管反正作𡖉以音胡噐名也又苦本反非盛上市盈反下郎管反煴煖上烏昆反正作温力幹古岸反勢援音院孝悌音弟帑藏上他朗反号丁計所甲二反正作亦作帝沙佛名也唯鐙音登古燈𤬪盛上行江反白縶音𤗊柎手上芳武反拍也正作拊蚑行上巨支反心悼音導烹之上普庚反作音伐竹木為之可以渡水也從木來齚助伯反齧也別本作齕戶沒反齚正告訴音素烔然上徒弄反徹也又音同急笮阻伯反隘也隕下上云愍反落也墜也加澁所戢反孔竅苦𠮧反穴也截𮏴音斤䎡為上而兖反䚪上古頑反六十無妻也下古瓦反五十無夫也炫熿上音縣下音黃有蝨音瑟身痒羊兩反悞掬手上他含反愴然上初狀反漚曇上為侯反樹名第四卷戒度无極䛴語上丘倚反俎醢上音阻下音海拯濟上之度反適妻上丁歷反正作嫡煞上直甚反鳥名食虵以其毛歷飲食則煞人也正作䲳珮几上步昧反下居履反沮骨上自与反冝作葅側魚反哀號戶高反牧焉上莫六反下于𠃵反烹之上普耕反饕餮上他刀反貪財也下他結反貪食也無牢音勞猶𡖉郎管反出援為元反引也以臘盧盍反抑卬上衣力反下一進反𦾨妾上魚列反也經音義以嬖字替之愽計反非也鑒眼上才作反聊有上力迢反糅毒上女右反雜也𣗥苔上居力反下持反下又音臺悞洋上余良反下古肴反熇即上冝作槁熇薨三同苦老反乾也又火沃火木火各三反熱㒵也非嶮岨上許撿反下側所反危也阻也難也𢙣正作險阻字也下又七余反非仇憾上巨休反下舍感反強負上居兩反褓負兒也正作也𠧒匂盖割二音求也憒濁上古內反眾譟速到反森然上所今反滔天上他刀反漫也行上巨支反正作蚑周拯蒸字上聲正作拯推上他迴反下蒲皆反鎻賣上蘓果反二牧莫迴反箇也正作枚也舅至上巨久反蹹地上徒盍反甥還上音生外也𩲱蠱上公五反下羊者反恧然上女六女力二反鬼魅音媚魑魅上丑知反無𮄆蜜二反無者言莫寢也正寐真喭冝作二同五諫反為也經意勿以魑魅為妻也經音義以諺字替之与喭同音彥並不苻經意蟲妻上与蠱同羊者反妖也又直中反悞訛𮄆上五禾反下二反由詐腄也心上居月反憮然上火胡反怯也憮大也又無武姥三音失意㒵懾驚上之攝反僅而上其恡反纔也劣也𧆛辝上巨焉反敬也烔然上徒弄反又音同非轢其上勒達勒的勒各三反轔車踐也北門上音毗並也悞比門上音毗並也正躇步上直魚反翠羽上青𨔵反辟錕古䰟反指環戶関反歌𡕆乙冀反美也走攫居縛反也嗷嗷五高反眾口愁也𥌒者音古譛濟上㽵蔭反讒也坏舟上普灰反𮍏否上子郎反下方久反絕湩都弄反豺狼上助皆反𥥛眾上陁骨反衝也觸也又吐骨反撮䴏上子活七活二反下一見反着上吒格反張也确頭上口角反正作毃苟辱上古口反且也擘象上蒲益反倒也𢷏也正作躃擗二形又補格反悞懷嬖音閇受也援其上為元反引也耆𦫿五盖反長也顧䀎上古悟反下莫見反樟梓上諸羊反下咨里反柵杖上奴含反下昨來反木名也正作材煒煒為鬼反正作煒汙上尸履反下烏故反共檻胡黯反一胡木反一枚莫迴反欲苦角反打頭也擊也正作毃攉二形第五卷忍辱度无極經盲罝莫瓶反悞滅上阻格反壓也悞撲之上普木反正作撲支二形曰睒上千月反下失染反䛴語上音綺不實也貪天結反草茅莫交反為廬力魚反蓬蒿上薄紅反下呼高反彎弓上烏還反發矢失履反箭也麋鹿上美悲反杭聲上苦浪反舉也以上斯𠔃反牛也悞翠以上青遂反鳥名子橾七到反志也吮上慈兖徐兖二反嗽也羼提上叉諫反此云忍辱肅虔上息六反下巨焉反揥手抓上他歷反下爭巧反效其上胡教反學也懷忿芳粉芳問二反㲲裏上徒恊反下古火反香上居月反汫中上才頂反塋小水㒵也縶𫟚上徒恊反下古火反正作裹牛躓知利反必虜盧古反獲也辜著上去利反也正作棄弃二形也又音姑悞人𨽁才句反又或才送反聚也挑戲上徒了反弄也憧憧尺鐘反徃來㒵也經音義以伀子替之章喀反惶懅也𨚏閣上丁禮反舍也深𣾬一玄反深也悞娛嬿上牛俱反下一見反帶佩蒲妹反虛誣音無枉也謗訕所姧所諛二反訧端上于求反過也多也字同尤體振𢬜力与反涕洫上他禮反下相利反淚也正作泗也又况逼反悞倿蠱上奴定反下羊者反謂納諂媚也箕坐上居之反滎流上戶扃反小水也山俎側所反正作阻矢上冝作𭢛楄二同儒遇反迦也又徒官持兖二反悞股肱上公五反下古𪪺反獲眾上戶鈎反獼也悞獲王同上疥癬上古拜反下思淺反累沓徒合反重也仆地上蒲北反倒也眾瘳由反差也奪鼻上方問反揚也振也正作奮又大活反悞耀上二音疾雷也門蘥音藥旬𦙚所卓反月一日也堓矣上格反裂也正作𭏊下于起反語助也力幹古案反楨有力也石雄都迴反正作堆舟地上多安反赤也正作丹胘倒上玄縣二音乱也感也正作眩又音賢悞喣味上香句反下莫鉢反吐沫也下悞奪其上方問反悞之𩲐音媚遮上北末反國名也悞咋煞上助麦反齧也火葬子浪反藏也施𦋆上式支反下古胡反㭫之上倉臥反斫也正作剉悞作羹古盲反媛親上為元反嬋枝相連引也又音院悁悒上於緣反下於及反憂也襲位上似集反入也煒曅上云鬼反下云輙反捋之上浪活反葅醢上阻初反鮓也下呼改反肉醬也顦顇上疾焦反下疾遂反骨挂竹主反正作柱拄啄骨上普卓鳥物摘捶上竹厄反下之水反栝耳上古活反聲擾也正作聒否告上夫久反不也蹌地上七兩初奏二反頭㓨地也鉢也正作搶也又七羊反非踤疾律反餙饍上戶交反正作餚肴二形餚饍美食也悞炅現上古迴反光也尡尡戶本反光也正作焜弈弈羊益反𫟈㒵也水𭻫音幡覆也槩煞上古愛反平斗者也又摩也亦作馬蹟音積小步也踐也正作躋也蹟理也𤶴吟上音身正作呻上栿音伏陽燧音遂絕上自作反竹索也正作苲也應和尚作側格反壓也非義第六卷精進度无極經𨽦以上古厄反礙也正作隔也又郭氏作而涉反又音垂並非求藤徒登反藤蘿葛菡也經作藤藤並悞揮淚上許㱕反崐崘上古䰟反下郎昆反厥訧上居月反下于求反就𢱢乘各反大繩也正作索𦁎二形不淑市六反稟命上彼錦反裂𢱢上音列下音索安厝倉故反咀咋上自与反下助伯反下正作齚傳之上音付淦也怡上詐之反下以之反即泅序由反浮渡也楥吾上于元反引也踰犀音西自殞云愍反啄耳上竹角反𩣩耶上丘愚反逐也趂也正作駈驅二形也下序嗟反上又郭氏作𣅀熱反非也曄上于鬼反下于立反䥫錞徒對反子下銅也䂎也亦作鐓子管反𠱕其上慈兖徐兖二反正作吮援吾鬣上于元反下力反妖蟲羊者反正作蠱又直中反悞恊胡頰反合也倒殞于愍反沒也舉䌉音𧔦上烏典反下田典反亦名守宮亦名蠑蚖亦名蜥蜴在壁曰在洲曰蜥蜴俗謂虵師也正作蝘蜓殘与同力竹反煞也力幹于案反竹衡戶庚反眾讙許元反讙嘵古堯反聲也𦒡翔上五高反下似羊反蜇之上知列反懅悸上其據反下其季反㘁曰上戶高反大呼也又音亦上則登反魚頑子上五還反愚也姦𦾨上古顏反下魚列反譴𥚢上去戰反問也下私遂反禍也噠嚫上徒怛反下叉覲反躓閡上竹利反下五愛反呺啼上胡高反属手上之五反連也暮謵音習學也串也又昌涉反非用以賂音路遺也殘音六瘕穢上戶加反玷也又家嫁二音非㘸上必進反下子浪反䖭同上徒登徒得二反神虵也正作螣經意謂二人煞龍濟國因此王有令曰有不奉佛六度十善而事妖鬼者罪与同也此意謂龍為虵又音卷𧌲蛛別名也非用又經音義以或字替之亦非也播徒刀反著柄小皷也刮面上古類反𨟼毒上直甚反商妻上丁歷反本也正也正作啇嫡二形也適妻同上懼面上九反也正作攫忼惚上許徃反下火骨反虔奉上巨焉反敬也悞出適始石反嫁也徃也正作𡣪適二形瑑壁上持兖反壁上文也正作瑑呪詛阻䟽反妖蟲与蠱同羊者反寒慓力日反戰懼也正作慄又疋招毗小疋妙三反並非綩綖上於遠反下羊然反前作俗字也第七卷禪度无極經埏埴上式然反下市力反炅然上古逈反蚑行上巨支反𧏦動上如兖反煴逝上烏昆反温煖也言火去也又於云反非滂沲上普傍反下徒何反足跖之石反踁髀上与脛同胡定反下蒲米反尻脊上苦高反下子昔反泥土上奴𠔃反𡱁尿上失履反下奴吊反格戰上古額反擊也闘也涕涶上他計反下他臥反正作洟唾也下又吐禾反非澆灒音讚蚑行上巨支反經作蚊悞捻變上奴恊反下蘇恊反取也熟也捏也正𨈛爕二形眼眵赤支反汗肪上寒案反下方房二音刳觧上苦胡反背膢力主反曲脊也又力俱浴俟二反非老窟与𥥧同巨殞反建旐池沼反旗也帛全幅長八尺也儌脩上古堯反下祥遵反警𬾨上居影反鵁鶄音交青鳥名也木梗古杏反直也木木人也琨上古門反下戶関反笳簫上古牙反下蘓條反並樂器也眼𩅑見別隨函作同疋皃反窖也經意是皰字又力救反非閉目上計列二反以暝莫瓶反鞬德上居言反馬名馬蹄音提槁草上苦老反佛這音釋始也正作適鳩𭔹上居牛反下巨恡反河名也亦云迦躨亦云迦拘上又戶官反非也躨巨退反拘具俱反胞𦋺上布交反下居例反外道名也長阿含作福貴阿譚音覃蜎飛上於玄反蚑行上巨支反菓𦬔郎果反正作蓏恍忽上呼廣反又音光非𪪺摸莫乎反規也正作摸適上尸隻反始也纔也鑿石上自作反菅衣上音姧茅草名一笇古安反正作竿以泥渥其中二同奴𠔃反水𣸈土也塗也並悞欣懌音亦恱也樂也憒憒古內反心乱也徒生上大乎反空也第八卷明度无極經明度上眉兵反光也淨也明度者即般若別名也童而注歹稚也𦒿𦫿五盖反耆長也𦫿老也悉𨳰音閇妖蠱羊者反曄上于鬼反下于輙反脩虔上息由反下巨焉反蟲道上古野二音正作蠱也為簟徒點反太上居月反無窈於了反正作𥥆也𥥆深遠㒵也為塪苦感反憮然上音武失意㒵也又呼無姥三音閈閤上愽計反癈事上夫吠反息也恧然上女六女力二反供亨呼庚反通也又許兩反歆也頭音亮適后上音的正也齓齒上初恡反乎上古還反正作鰥其瞑莫賢反為𦠆蘓本反熟肉更煑也冝作饌助眷反飯也挑七上徒了歹弄也動也不貸冝作忒他得反差也變也失常也亦作𢘋他代反假也施也非扶格音各腋也正作胳僅能上巨恡反尸蹌七兩反仆也頭㓨地也正作槍也又七羊反非炅然上古逈反崩徂上北𪪺反下自蘓反桃鉢上徒了反擲也正作挑掉二形經音義作拋普包反喟然上去貴反大息也蠣蟲上市王反正作蠾也䖭蠾蜘蛛別名也下直中反䖭音眷上又音例蛤屬也非前𨽁疾遇反圖讖楚禁反傭賃上余封反下女反褰衣上去𠃵反五枚莫迴反淹漸子廉反跱𠛴上直耳反川微柴𢰔上一羊止反下一楚洛反上正作以也又音𠃵非也經云有長者子名賢𠃵以微柴𢰔其地是也適存上尸隻反巾櫛上居銀反冠幘之類也釋名曰巾謹也二十成人土冠庶人巾當自謹修於四教也下阻瑟反梳也脯冥上布乎反日晚也正作晡也下莫瓶反䚪上古頑反下古瓦反鄭氏云六十無妻曰鰥五十無夫曰寡也並悞華䛴上戶花反下丘倚反鄹中上音聚又爭愁反非俱獵力反王名也恍忽上呼廣反又音光非鈔少上楚交反取也正作蘓無𥥆於了反𥥆窕美㒵也又𥥆窱深遠㒵也勞來上郎告反下郎代反童丁䧟反鎻小上乘果反漆䇶上青悉反下徒東反高坑音剛隴也𮑣箕上補破反下居其反如苦迴反正作潢洋上戶廣反下羊兩反正作滉瀁也大水㒵也又上戶光戶浪二反下序羊以良二反並非稟玩上兵錦反下五乱反𤌢者上奴短反温也不𥧝五故反覺也覩耗呼告反蒲陶徒刀反抗著上戶郎反舉也度也又古郎反舁也度居倚反蹠翁上之釋反下烏公反無㤥戶愛反患也苦也謂不嫌厭也百揆巨癸反矇矇音蒙瞢瞢莫登反痛上烏玄反骨節疼也瘦疵疾斯反簏牀上郎木反下助㽵反湎胘上音緬下音縣𭃄磋七何反𬒳笞之反栝耳上古活反正作聒靡忤上眉彼反下五故反朱鬣力反項上長毛也菩薩睒經一卷菩薩睒尸染反拖作上失支反正作施麋鹿上美悲反慰勞郎告反菓蓏郎果反犀坐上斯𠔃反翠為上七遂反𤢌狩上巨今反下尸呪反㘁呼上戶高反怖懅其去反號呼上戶高反仿佯上音房下音羊騁疾上郢反馳也自撲步角反拋擲也弃也自訴音素捫摸上莫奔莫本二反下莫乎忙各二反以手撫持也摸𢱢手摩物也㨊也射力反取獸也睒子經一卷含咲私妙反菴施上烏含反下失支反上正作庵牀蓐上助㽵反下而欲反獐鹿上之羊反犀坐上音西正作犀廣志曰犀似水牛豬頭大腹庳脚四足三蹄甲身有肉鱗蒼黑色二角一角在額上一角在鼻上好食𣗥口中常血出武陵已南山中有之翼為上七遂反正作翠號呼上戶高反峨上五迴五罪二反下五何五可二反山高動㒵也嵯峨也太子慕魄經一卷邠坘上彼巾反下丁𠔃反湏達長者名也下又直𡰱反梵言阿那他荼揭利阿跛底此云給孤獨亦名邠𨚎音底亦云邠𥘡音仾襲續上以集反受也及也重也入也下經音義作績音積功也恬惔上徒兼反下徒敢反矇瞶上莫紅反下五恠反正作聵也又音貴悞空刻經音義作刓五官反圓削也又苦得反郁伊上於六反下於尸反內悲也正作噢咿勉仰上眉遠反勤也強也𡇂共上一真反神上即計反定也止也沐魄經作濟神瘖瘂上於今反下烏雅反驚竦上居迎反下思勇反叩頭上音口磕額也願赦音舍免也犇馳上布門反㕘駕上倉南反正作𩥵䎡弱上而兖反琦音奇愚戇火貢反罪舋香覲反𢢔徒骨反觸也正作突又一𠮧反非𨒫上蒲沒反驚俻上居影反蹕也屬城上之玉市玉二反附也烹煞上普庚反仱頭上五感反頭也正作顉也經律異相作音頷泆音逸逡𧏦上七旬反下如兖反又經音義作選䎡說文湏也推託也徒益上達胡反空也然上文兩反忸怩上女六反下女遅反裁有上音才僅也危殆徒改反何貲即私反思也量也正作訾佛說太子沐魄經一卷憺怕上徒敢反下普百反熒惑上戶扃反翦棄上即淺反嵗儲音除副也劈我上普擊反剖也𧆞賁布門反勇也恍忽火廣反佛說太子湏大拏經一卷大拏女加反此云善牙乳湩都弄反乳汁也𭦟坘上莫安反下丁𠔃反瘖瘂上於今反下烏下反柱杖上知主反翹一巨堯反舉也懸也倉天上七郎反尓疋春為天注大万物生然也正作蒼象居右反正作廐金鞌音安水子老反愕然上五各反驚也當柰奴太奴个二反何徙汝上斯此反違戾力計反菓蓏郎火反為弍志尺志二反慓也記也𠧒匂盖割二音求也𠧒也寫車上思夜反正作卸步挽無遠反市厘直連反以偃於㦥反擁水也正作堰褰裳上去𠃵反蜎蜚上烏玄反下府微反占文飛也嶔岑上去今反下魚今反山高也正作嶔崟也下又助今反非嵯峨上昨何反下五何反𭄩上呂勑反冝作鳬鵁鶄上音交下青精二音翡翠上肥味反下七遂反州阤音陁六度集作珠陁編𩬇上蒲犬反俗𦋺挐上居例反下女加反嚶嚶烏𥝷反跳踉上徒聊反下力羊反靣𮕜呼决反肉內脉津也正作血如𣸡音七三睡冝作酢都回反面醜也又直偽反非也經音義以顀字替之直追反說文額出也亦非𪖯𪖦上邊典反下他𠔃反面側右反脣哆丁可反醜㒵也垂下㒵也正作䫂嚲二形又昌者反亦脣下垂㒵也亦作胅寬上田結反下苦官反高起也正作凸髖了戾力計力結二反𩑔禿上苦本苦沒二反白禿也下吐屋反說上赤之反笑也其聟音細一力反捶鞭卑連反自撲蒲角反檛我上竹花反下痒羊兩反復𥌎而春反亦作眴僻地上步益反倒也正作躃擗被上側床反束也亦作正作裝嘔吐上烏口反不𠇾許牛反旃遮上之然反六度集作杭彼悞也九色鹿經一卷著堓音岸叩頭上苦狗反磕頭也拂柄彼命反踞其上居去反坐也啄其上音卓鳥鵮物
