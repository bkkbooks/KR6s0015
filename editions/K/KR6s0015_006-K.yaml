body:
  text: 漢中沙門可洪撰依方山延祚寺藏大乘經音義第一之六十六帙方盖此身𩬇四大五常恭惟鞠養豈敢毀方思益梵天所問經等二經十卷同帙思益梵天所問經四卷第一卷𣽈語上而兖反問訊音信久殖音食第二卷彼音岸淤泥上於去反貪餮天結反陵𡙸徒活反強取也危脆此嵗反音瘂上或作瘖下烏雅反拘癖必益反跛也正作躄裸形上戶瓦反囹圄上力丁反下牛与反周之獄名也𦬔子上古敗反粗略上自祖反也大也牀㯓上音床下音塔第三卷投上音頭正作投床榻音塔憙見上許里反互相上乎故反死淵烏玄反憒𡗚上古內反下女㒵反如𡱝先𠔃反牛名第四卷侵嬈奴了反賈客上公五反煩惚音𢙉不倉歷反雨澍注樹二音時雨也陂池上彼皮反𥸮葉上子老反下羊接反少賈古亞反正作價棘林上居力反疇上直由反下普吉反𢙉上而設反祝術上之右反燕室上一見反組上他禮反正作緹下力計反上悞摩宅介反遮同上別本作悞睺樓上戶鉤反禋婆上音因下宅介反持心梵天經吚扷下又別本作非也麴丘上丘掬反勝思惟經作佉佉經音義作麴鴩徒結反非𡬬上所姧反下奴禮反摩呼𠔃反那徙斯此反佛䭾徒个反涅枷上徒結反下巨迦反提方吠反正作廢癈二形梵嵐郎南反阿哆多可反提鞞步迷反提託堤上徒兮反中嫁反下丁𠔃反勝思惟經作提虱天帝經音義作提詫枷羅吁上巨迦反下呼条反悉緾上辛七反𭦟多上目官反問訊音信勝思惟梵天經六卷第一卷奮迅上夫問反下私俊反聞慈烏各反正作惡柔䎡音軟第二卷脩伽𬽲上息由反中巨迦反下徒何反焚天上扶泛反正作梵善上而兖反弱也燈炷主注二音以蕩徒朗反洗也正作盪蕳錯上古顏反中也正作間又昔澗能收尸由反𣫍也刦盜上居葉反憘恱上許里反第三卷背𤹪於禹反正作傴裸形上戶瓦反棘㓨上居力反第四卷床㯓音塔被褥皷䗍郎禾反第五卷間淵於玄反獨𡗚女㒵反如𡱝音西血宍而六反微咲私妙反喜也又作𭉋第六卷恡姤上力進反下都故反𥸮葉上子老反下羊接反蕀林上居力反無疋普吉反文辭音詞投於上徒侯反召諸上直照反多軼徒結反咍邏上許来反下郎个反摩𮯐䐗廁反自𭃄摩忂具愚反或作衢灈絺上莫卑反下夷反樗離上彐魚反垔婆上伊真反鞞多上毗迷反佉佉去迦反㝹閇上奴侯反𭰖字𭃄脚伽堤上巨迦反下丁𠔃反摩子戶雞反正作𠔃𧿡大上步末反下徒个反亦作䭾婆系戶計反波羶尸連反𭣣提上𮐃太反勺知闍反𦀇自𭃄波兔他故反囉尸遮反提虱瑟音潸婆賀上所諫反憒𡗚上古內反問訊音信毛竪音樹盖持人菩薩經等四經十卷同帙持人菩薩經四卷第一卷𧨏理上魚寄反之𦜩音𢙉剖判上普口反析破也所𦿔必祭反憒乱上古內反闢漏上冝作僻𠪮二同普益反僻誤也邪也𠪮陋也庂也鐙光上音登佛名也億垓音該這生上尸隻反亦逯代音叡喆上余稅反下知列反探古上他舍反景摸目乎反大邽愽江反正作邦猗求上於綺反第二卷有這音釋慌惚上呼廣反下呼骨反欄楯上郎干反下食准反不抱步保反恭恪苦各反恍惚上呼廣反与慌同淡泊上徒敢反下普百反痛痒音養疽癩上七余反下郎大反第三卷瑕疵疾斯反不肖音笑惔怕上徒敢反下普百反瘡痍音夷諭諂上羊朱反憒𡗚女㒵反戢滅上阻澀反獷音鑛第四卷壞敗步芥反麋散上美為反姟兆上音詼下音趙殃舋許恡反琦音奇裹樹上音果正作圍𢭀雨非反正作也陁上步末反大猷音由忻𭉋音笑六坂音反篋藏上苦頰反誓鎧苦改反持世經四卷第一卷柔音軟水普包反第二卷豪力之反行謨音苦集滅道四諦也又音摸悞識陰於禁反識陰同上无閡音礙一桮布迴反也蘭楯食尹反第三卷說𧢻音觸骨幹古岸反莖也所音果𢲻摩上倉活反空捲音拳如虹紅絳二音俎壞上自与反正作沮能去堅反戲調音掉輕乘刀反動也柔音軟所𭷣去堅反第四卷亂系音覓細絲也又計反無緒音序芧根上莫交反草名𦽦草上無販反得底丁禮反下也平也上也又音祇悞佛說濟諸方等學經一卷空上苦弄反下苦决反鍼不上諸林反亦作針煌音皇䫃䀎音麵僉然上七廉反咸也皆也備悉上皮秘反毀訾音紫用備音俻具也不𨷂丘月反瑕疵才移反諛諂上羊朱反志操七到反尠聞上息淺反輕莫結反雜碎亲對反郁咿於耆反歔欷上許魚反下許既反涕泣㒵也悲也殃舋忻覲反罪過也錠光上音定佛名也愚戇大貢反侏張上竹流反誑也亦壅蔽㒵也正作譸侜二形也瘖瘂上於今反下烏雅反尸羼楚鴈反恭恪口各反援助上為願反𢦱吒上女利反天名也灼灼之若反明也謗訕所諫反謗也又所姧反危害音害眾𡗚女㒵反揵呇上其焉反下徒合反大方廣捴持經一卷塗飾尸力反𧿡陁上步末反涕淚上他計反鼻液也經云涕淚交流嫉姤上自疾二音下都悟反正作妒親倉歷反郭氏作私占反非親同上親亦同上正作戚能勉眉遠反止也脫也正作免此佛說文殊師利現寶藏經等四經九卷同帙佛說文殊師利現寶藏經三卷焉用上於𠃵于𠃵二反何也委也豈也亦語助也正作焉也園囿于救于六二反凶𡚁毗祭反𢙣也憒亂上古𭔹反不慌火光反迷也又火廣反奚為上戶雞反下于垂反奚何也為名也是也畏懅其據反沾汙上音點瑕也又霑店二音騏驥二音其既羯隨上居謁反或云羯毗或迦毗或云𪂃寶篋經云迦陵頻伽是也皆一躰異名也此譯云好聲鳥也𪂃音羯陴樔窟上助交反憎惡烏故反曲掖羊益反蠕動上如兖反大淵一玄反擗地上瓶益反倒也正作躃為竪時主反經作監悞琦異音奇異也恬然上徒兼反靜泊普百反惔怕上徒敢反下普百反中卷𡚁匿上步祭反下女力反橐䖝上都故反食木虫也正作蠹金翅音施人上公五反曷云上戶割反黤黮上烏感反下他感反撾揵槌上竹花反中巨焉反下直追反門閈音閇又音翰非激道上古予反小道也徑也南方俗謂四徑道為四徼道也正作徼也孚舉上芳務反疾也正作䞯經音義作䞯也跳置上徒聊反躍也冝作挑徒了反擲也健上巨建反下直利反前作揵搥小鍾類也智度論云撾銅犍搥甘醲女容反嬲固上奴了反戲相擾也𡚁𭩶上毗祭反下力結反破衣也正作裂跛蹇九輦反跛也禿僂力主反曲脊也食上徒官反饐不上為結反食塞也得咽一見反吞也寂寞音莫又作漠淡泊上徒敢反下普百反掛掖上古賣反下羊益反赦我上聲夜反免也宥也古猛反讇言上市占反熱病荒言也藝語上魚世反病人乱言也正作囈不哨私妙反不不似也小也正作肖又七笑反醋好㒵是矣于起反下卷邠耨上彼巾反下內沃反文阤音陁悞裸形上乎瓦反苗𧜟移世反未也澹泊上徒敢反𠧒丐盖割二音痛痒羊兩反𢯇讓上一入反手著胷曰也又進也正作捐字也蠱道上公五反毒藥明喆陟列反意卬一進反便咲音笑焜燿上胡本反下搖照反稽首上苦禮反稽首同上首仾其首也說文首至地也正作稽二音大方廣寶篋經兩卷上卷得疧丁禮反又音祇悞樔窟上助交反窠也礔礰上普擊反下六擊反並俗如漉力木反水䇶音同火燧音遂上洛管反悞其𭉨即水反鳥口也有嚊許赦反以鼻取氣也正作齅嗅二形又疋俻反悞隧落上直遂反又音遂非皆𥪛殊主反立也正作豎竪隧下上音墜悞嵐上徐全反下洛含反隱𦿔必袂反正作蔽問訊音信華綱音䋄𧢻人上昌玉反堅䩕五更反牢也五郎反非也𮁼檀上諸然反木名迮狹上爭伯反𠇾止上許求反下卷此音岸蕭笛上蘓條反下徒的反羸瘦上力垂反下沙右反揵㨖冝作𠊷緻三同直利反又陟里陟利二反非用一𬂣爭巧反甲也正作爪抓二形又古八反悞壞上毗祭反衣敗也𥆌睞上古岳反下来代反捲手上巨貟反賦食上方務反布也躃地上房益反摱𢢔上居妖反正作又莫安反泥也上方經作𢢔嘰呵上居衣反譴也諫也正作作譏從口者口醜也作捄居右反護也又俱求二音非貫䆤二音官川不憘音喜多管餘反造也正作營憂倉歷反管作上音營讁罸上吒𮧓反怯愵如約反又音溺悞貫䆤上古丸反下昌專反通也又去聲持瓨下江反也長頸者也正作缸𬎩或作瓨三形也攢攢上子乱反下子官反向上戶買反曉也悟也正作辭嬉見上許記反證契大乘經兩卷上卷序文逗根上徒𠋫反叡唐上羊稅反属上力讓反下之玉反相連也夙遘上息六反下古𠋫反閔上眉殞反蓄用上許六丑六二反舟擑集接二音汗青上寒案反裝縹疋沼反法䗍洛戈反經文遊萃疾遂反栖託上西細二音憧𢡠昌志式志二反慄也傘盖上乘旱反憣繖音散拯濟上蒸字上聲呼也正作拯達拏女加反挑與上吐條反讒𢬵上仕咸反下古𠋫反譖言也勤筞楚責反凝冴音護凍也商人上尸羊反閞綴上古還反下竹稅反洲島音搗虹霓上戶公反下五兮反棹曳上徒了反下以世反弊𢙣上步祭反捕煞上蒲悟反甲棒步譐反矛矟上莫侯反下所卓反拋丸上普交反鉞斧上于月反下方武反逃上徒刀反下倉乱反戰慓力日反正作慄又疋妙反非也堆阜上都迴反下扶久反藪澤上案走反澤無水也崎嶇上丘冝反下丘愚反坑穽上口𥝷反自井反蟲㓨上除中反滌淨上徒的反隱𦷥必祭反不完戶官反喧囂許反香馥音伏旄拂上莫高反羯上莫鉢反下居謁反炫麗上戶麵反暉煥音喚繽紛上疋反下芳文反寶鈿田殿二音冠𢝌上古丸反下莫報反耳璫得郎反曳繕上以世反下時戰反无垠五根反下卷欄拏上郎于反下女加反俠塌上戶頰反下他盍反錯峙直里反黑蜂芳逢反頰頷上古叶反下戶感反䏶脛上步米反下戶定反特上徒頂反枝榦古岸反攢茂上自官反下莫𠋫反寶榻音塔虧上丘隨反下决反大乘同性經兩卷上卷盲龜居追反傎佛上直志反遇也逢也正作值也又丁年反非𭤔逢上許衣反鉀鎧上古狎反下苦改反毀訾音紫夘生上郎管反正作𡖉破膜音莫舩舶音白大舩也婬妷羊一反山埠音婦𡐢穢上方問反戰慓力曰反又疋遙疋妙毗沼三反非也大音福正作腹也證契經作腹又皮力反非也𢙣上五孟反堅牢也正作鞕硬𩊅三形證契經作弊𢙣鄙醜上悲美反喉貪上音喉悞槌弩上直追反下奴古反鉾楯上音牟下音順輪𣓞所卓反㦗然上金禁二音謹也止也沙郎古天蕀剩上居力反下七賜反正作𣗥㓨啞者上烏雅反亦作瘂下卷垂毦人志反毛飾也天音官正作冠他音塔蘭楯上郎干反下食准反寶榻音塔螺髻上郎波反下古詣反又音括非弓霸北嫁反俆庠上似余反下似羊反傲𢢔上五告反磐石上步干反穢上方問反平愸之領反又音勑非明𦠣列直列二反佛名敖𢢔上五告反矝𢢔在心之名也禮記曰教不可長是也啇主上尸羊反通財鬻貨曰也又丁歷反非也身深密解脫經等二經十卷同帙深密解脫經五卷不𨓤音退迭共上田結反共上徒禮反更代也又去聲陰界上於今反去聲呼毀訾音紫掉動上大了反憒閙上古內反下女㒵反細揳蘓結反屈也憘相上音喜情也羼提上初諫反𣽈中上而兖反皮膚音夫多上羊朱反練治音持解深密解脫經五卷第一卷揭路荼上巨列反下宅加反亦云迦樓羅亦云誐嚕拏此云食吐悲苦聲也謂此烏凡取龍先內於嗉中後吐出食之也諸經云鳳凰神或云金翅鳥神並是也緊捺上吉引反下奴達反亦云緊那羅緊者疑也那羅此云人謂此神以人頂有一角令見者生疑云人耶非人耶揵慧上自反殑伽上巨陵反下巨迦反矛䂎上莫侯反下倉乱反槍也䂎㓨上倉官反下七賜反胡椒音焦羅上都故反𩚢餬上徒𠔃反下戶吴反第二卷眩瞖上音縣下一計反蜂蠅上芳逢反下羊陵反巨勝上其与反下尸證反胡麻也印今大是也皮可為索作布者是也亦作苣羯多上居謁反披音恱簡也痆斯上女八反鄔波上烏古反牛蹄音㮛第三卷青瘀於去反膿爛郎嘆反掉舉上大了反橈泉上呼高反攪也細𢰟先結反陶練上徒刀反瞬息上尸閏反煩惚奴老反瑜伽上羊朱反下巨迦反此云相應亦云修行亦云方便𠧒丐音盖諠雜上許元反𭦟殊上莫官反雕飾上丁聊反刻也第四卷禂林上直由反穊也耐𭜨上那代反憙樂上許記反好也憒𡗚上古內反下女㒵反自讚音讚歎也傲五告反憤發上扶吻反𭜨也心中慾怒也捨軛烏𮧓反涸竭上胡各反富伴上戶盖反正作𡧱第五卷劬勞上具于反我齅許右反我嘗音常頗𦙁竹𡰱反磨瑩烏定反𩬇解節經等五經十卷同帙解節經一卷蕑擇上古眼反也略也分別也正作簡也又草閑反悞蓄財上許六六二反傷佉去迦反或云餉佉此云螺毗挐女加反亦云頻伽辛勒達反勒澁沙立反不滑也呵梨勒綿纊苦謗反緣生經兩卷序文笭窮上此全反正作筌菟浮上奴頭反兔子也淵乎上一玄反深也正作淵古避廟諱故省一畫尓稻芉古旱反莖也獨苞布交反經音旨義也詞也志也意也正作旨說文云從匕從甘之笭七金反笈多上其刧其急二反三藏名彥琮昨宗反隋言上音隨國号也扣擊上苦吼反擊也蕑質上古眼反正作簡也又古閑反悞尤失上于求反經文一膊音愽正作髆死𨓤他對反喘息上川兖反牛脊子昔反䟽相上山初反除也分也通也分別緣起初勝法門經兩卷徧袒上疋綿反又音遍悞喘息上川兖反愈急上音逾古文又余主反僂曲上力主反戰掉徒了反未苦决反破也正作名䪺都困反漸之正作䪺楞伽阿𧿡多羅寶經四卷第二出第一卷海音徧袒上疋綿反下徒旱反拘勾上多管反下俱遇反鉤上古侯反諸經云拘𨚗含牟𡰱佛弓弓居雄反正作弓麦上古猛反青稞也獨籠盧紅反佉梨上去迦反阿㝹乃頭反葛上古曷反下徒登反質哆多我多个二反或云質多羅所音誓正作噬分徒乱反𡨋壑呵名反谷也坑也靈也正作壑繢眾上胡對反盡也羅驃毗妙反陁羅此譯為實分析先擊反扸為同上破也分開也互相上乎故反𡁱怡上喜之反下以之反躁動上子告反第二卷齗齒上魚斤反悕望上喜衣反𨒫𢰟先結反木也字從木瘖瘂上於今反下烏下反磬欬上口頂反下口愛反上又苦定反悞蚋如稅反僧佉去迦反外道也第三卷如蝅昨舍反作古典反棄捨上輕利反正作棄第四卷鑽燧音遂火母也作古典反魚鱉并列反輸上束朱反下書周書右二反亦云失獸此云鰐魚譚婆經音義云今借為徒紺反說文云西國食狗肉人所嗜神利反愛也韮䔉上居有反下蘓乱反師上力反取獸也正作獵又音葛非相續解脫地波羅蜜了義經一卷陀羅𡰱上一達何反此言惣持楒別上則孔反又思未反悞智坧正作垢古口反塵膩著物也羼提上楚諫反忍也空𫮺黑冬反虛也栁上上衣力反按也推也意也正作𢬃又力酉反悞睺妬上侯𠋫二音下都故反離注作𮍜同當頭反注云兩箇月為一節節為離四入楞伽經一部十卷一帙第一卷靈室上力丁反南音岸微咲私妙反都咤竹家反雄凡耳上烏貢反嵬上才迴子罪二反下五迴五罪二反山林崇積㒵也上正作催也芬馥上撫文反下扶福反𧢻法上昌玉反翳暯上一計反障也下毛各反皮也寶網下文兩反羅也又古郊反悞視盻正作昐普幻反美目視也或作䀎淺經作䀎音麵也大𭉋音笑正作㗛宍𮫀肉計二字𦝫䏶蒲米反股外也正作䯗中虹戶公古巷二反懽憘歡喜二字迭相上田結反羅網音網如澍注樹二音時雨也注水之義兔馬上他故反徧袒上疋綿反悞相音違幾圻上巨依反下魚斤反脞陋上昨戈反下郎豆反短𢙣㒵也上又倉禾倉果二反非剬斷上之世反斷止絕也正作制又之兖反悞琵琶上房脂反下旁巴反麦上古猛反青稞也一斛胡木反第二卷鹽珂上羊廉反下口何反憒閙上古對反下女孝反拆為上先擊反窯師上羊招反堅濕深入反𧺫麤倉胡反第三卷輕子告反鹿櫨上魯木反下曾胡反陰界上於今反去聲呼手上手真反伸也舒也菟馬上他故反牙橦直絳反齗齒上魚斤反癡𤍽然舌反目𪾼一計反因榍先結反出先結反瘖瘂上於今反下烏雅反第四卷不瞬音舜目動也不不動也名上苦愛反瘶也正作欬字也又音孩非用打槶古麦反嗚步保反盻視上正作盼普幻反視也又戶計反非奮迅上方問反下私俊反正作奮迅第五卷如蠶昨含反作古典反蠶同上第六卷聚中才遇反又上聲廣古買古馬二反講也說也釋義理也正作解汝䞈㱕偽反賭也諸𢛳烏各反世俗訟欲反正作俗蕀㓨上居力反兔角上他故反手抓爭巧反爪伈人上相遷反荖別上楚加反舛也也不束容反擣也正作不吹赤唯反正作炊明黨當朗反朋儻同上軰也美也德也又他朗他浪二反悞顯眾上呼典呼見二反明也著也從㬎攢柚上子官反下直六反上俗下悞堅漯深入反又土合反悞隨勘音堪第七卷駝驢上徒何反狡猾上古巧反下戶八反如蝅自南反作繭古典反龜上并列反下居追反第八卷旃遮上之然反密迹音跡陶師上徒刀反鹽等上羊廉反捕魚上蒲故反逢見上音遙悞狼上仕皆反𧏙蜋上丘羊反下力羊反𨔵上直六反下夫問反逄見上羊招反遠也正作遙亦作遙𪽉懼上於貴反心𦚣也正作貧畏畏三形滿肚上莫管反正作蒲可𭊴許右反殿臺徒來反㿈創上於客反下又床反䓗韮居有反䔉薤上蘓乱反下乎或反蘍亲上許云反下息津反剔除上他歷反𩭈䭾上相朱反下方伐反正作䰅髮也又上音剃下音懊並悞疥野犴上古拜反中羊者反下古寒反下又我寒我眾二反非呼驚怖上居𨒦反腥𬛓上息丁反下息刃反創癬蘓淺反不憙音喜恱也騫陁上丘𠃵反上上尺證反𢫀入上去堅反與雌此夷反斑足上布閑反𩢃也雜也𤝔𤝧上助街反下包㒵反鵄梟上