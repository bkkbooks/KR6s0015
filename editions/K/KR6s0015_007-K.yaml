body:
  text: 漢中沙門可洪撰依河府方山延祚藏大乘經音義第一之七此冊有十一帙傷女慕貞潔男効才良知過傷無字寶篋經等二十一經二十二卷同帙無字寶篋經一卷元魏天笁三藏菩提留支譯寶篋苦頰反箱類也緘也亦作匧頂𩬩古詣反綰髮也正作髻也又古活反結髮也非此呼淳熟上市倫反亦作純淑大乘遍照光明藏无字法門經一卷大唐天笁三藏地婆訶羅譯安穩烏本反如𦦨音焰火光也荷擔上戶可反𧴥也缺減上苦决反下戶斬反大乘離文字普光明藏經一卷大唐中天笁三藏地婆訶羅初譯序言緒音序筌其上七全反逗根上徒𠋫反叡唐上余稅反聖也智也正作叡睿一形御㝢音字属上力向反下朱玉反相連也閔凶上眉殞反遽違上其去反舟檝接集二音月𢬜音呂裝縹上側床反下疋小反青黃白色雜也法𧋠郎禾反正作蠡部帙直一反正作帙經文寶洲音州渚也水中可止曰也勉濟上眉辯反強也勗也法音𠕀珠𩬩音計佛說孝女經一卷痛痒羊兩反相揩口皆反有揲桑朗反正作𣞙二形持捊音浮皷搥也亦作抱棓二形𤘽㽞上音俱佛名披揵上布何反下其焉反佛名也一云波健佛說孝母經一卷棰皷上之水反擊也禽狩守右反孝羸力垂反孝母六英經一卷恂恂相倫反從燧音遂撾皷上竹花反從椎直追反佛說長者子制經一卷食上盖割二音高𤍜蘇老反迦㮈奴太反云加奈歿故上莫骨反嬈我上奴了反小音摩經意冝作磨莫果反小也劇苦上其𨒫反𧑮動上而兖反遮迦為月反轉輪王也𤾇術上都頭反馬𦜩音𢙉寶名又音忽悞佛說菩薩逝經一卷高𤍜蘇老反加奈奴盖反好縶音牒蜎蜚上一玄反下甫微反嵠峪上苦𠔃反中古木余五二反前經作溪谷郭氏音路非也裁淹上音才下於廉反前經作纔掩佛說逝童子經一卷𡨜漠音莫肅然上息六反剝業上布角反脆哉此芮反佛說無垢賢女經一卷樓上補益蒲益二反婦人名也懷妊而甚反懷子也探察上居六反盡也窮也之𡖉郎管反未孚芳無反𡖉化也舒翅上羊諸反下手智反鳥羽也布翼羊力反餟草上竹劣反止也正作輟竦立上息勇反蛐蚓上丘玉反下羊忍羊刃二反正作蚯蚓不捶初立反行㒵也正作𢕬二形又爭洽反裸形上胡瓦反捍樓与字同也又音汗身上莫𠋫反達嚫叉覲反倡道上音唱導引也佛說腹中女聽經一卷肅肅音宿相柱猪主反撐也但𮏴音斤鵄鵂上赤脂反下許求反虵蚖五官反蝦蟇上戶家反下莫家反懽喜上火宮反佛說轉女身經一卷固鎧苦海反苗稼上美反下古亞反上又徒的反悞臭穢上昌右反手捲居轉反樢藥上覩考反正作搗舂米上束容反若𭵶五高反袖毳上由反下尺稅反紡疊上芳𠕀反下正作㲲筋上正作荕音斤下丘堅反佛說德護長者經兩卷上卷拘舍上瞿俱二音般浮上蒲安反刪闍上所姧反坘子上音遅又丁𠔃反翅舍上尸智反器皿上丘利反下眉丙反𤴷前上助㽵反正作床牀延咃音他評章上乎病二音漏泄私列反又音曳籧篨上巨魚反下直魚反或嘯蘇𠮧反沮壞上自与反蜘蛛上音知下音株下卷傘盖上乘旱反踏寶上徒盍反踐也又他合反非聡叡余芮反廡廊上音武下音郎盧戶沒戶結二反毗挃知日反邏莎上郎个反下素禾反佛說月光童子經一卷嫉姤上自疾二音下都故反愁憒古內反欝毒上於物反憂也垂𦗟下他定反許也川音作非也俎敗上自与反正作沮𠷰上居隨反正作規効命上戶孝反這半上音釋正作適為椓直全反頑𠷰上居隨反正作拱手上居勇反頑計上居隨反特上徒頂反神摸莫乎反以索乘各反盡也奮發上方問反旌旗上音精下音其曀日上伊計反圍嬈而沼反周也正作遶繞二形蹹地徒塔反正作蹋唱喚或作喚同呼乱反川音作噭音𠮧摧折上自廻反挫也川音作非皓汗上戶考反下戶岸反滔天上他刀反摷木上助交反鳥窠也拪山上西細二音雞宿之處蟄鳥上直立反藏也又應和尚以鷙字替之音至猛鳥也非義也慴竄上之徒叶二反懼也伏也下七乱反金翅音施怖巨季反心動也氣不定也正作悸痵迯走上徒刀反遁藏上徒困反逃也避也縱撗上子容反熢隧上芳逢反下隨醉反蠅莫結反小䖝也毀悴自遂反稽乘朗反之莫瓶反推之上尺維反貫綜祖宋反肅然上息六反正作肅綪紺上七見反赫弈上呼挌反下羊益反遏絕上烏割反晃照上戶廣反印成上伊進反煌煌音皇俾傀上普米反下五米反傾側也正作䫌倪經音義作脾倪也𬽯俄上普果反下五可反厭鬼上於反亦作魘魅鬼上眉秘反仾仰五郎反痾言上烏雅反癖行上卑益反跛也正作躄釵釧上初街反下尺反㽵嚴具也相棠宅耕反人𢒈音刑笓芭上步夷反下步巴反箏笛上側耕反下徒的反魚并列反正作鱉魭𩵔上音元下音陁正作鼉系竹上音思正作絲有絃之樂器也又音覓細絲也羅縠戶屋反緹縵上他禮反下莫半反互相上乎故反赤𭉨子累反拘𦒿上音俱鳥名也羯鞞上居謁反下毗迷反飛𤢌巨今反正作禽海力丁反重戶果反正作裯縱𫃻上七容反下余鍾反有威儀也閑睱㒵也正作傱容亦作瑽容瘳除上音抽病差也首罪上音默自伏非罪也欲免音免脫也去也得免同上𨓤坐上他內反自揆巨癸反勉罪上音免脫也正單作免採道上他含反正作探經音義作探也𭟙然上呼郭反𨗻得上音代正作逮刀釰居欠反正作劒无限五根魚斤二反岸也正作垠圻二形經音義作垠也琵琶上步夷反下步巴反申日兒本經一卷申日下于月反大集經作申越此云首寂傳記作申𮍜本又作申日兜並非也掘坑上巨月反下苦庚反駱動上長水藏作駱素刀反僂者上力主反更炊上古硬反下尺維反乳光佛經一卷乳𭓜都弄反乳汁也正作湩也又竹用反憋惡上毗世反下烏各反上又普結并列二反非搆取上古𠋫反牸牛上疾寺反殺上丁禮反下所八反折辱上之舌反挫也所所八反正作殺壍裏上七焰反下力耳反弊惡上蒲祭反若儻他朗他浪二反或也踏上丁禮反下徒盍反踐也下又他合反非蝡動上而兖反捫摸上莫奔莫本二反下門門胡二反突徒骨反牛麤倉胡反踈也更愸之領反踏上丁禮反倩鄉上青性反𢪕㑦上丁禮反下力計反枑拒也㑦佷也謾𢪕上莫盤反欺也也但痤音坐罪也佛說犢子經一卷邠遅上彼巾反下直𡰱反弊𢙣上毗祭反前經作憋惡伽耶山頂經一卷編𩬇上卑連反織也次也冝作辮字呼法𧋠鹿禾反貝也鄣閡音礙奮迅上方問反下私俊反大乘伽耶山頂經一卷法螺洛禾反分析先擊反蕳擇上古限反佛說象頭精舍經一卷𧋠𩬩上音螺下音計摩拭手食反係念上音計連也莁軡上戶耕反下古案反噁啊上音𢙣下音阿文殊師利問菩提經一卷浴上子𦒳反車匠疾亮反斫治音持女佛說无上依經等二十三經二十四卷同帙佛說无上依經兩卷上卷葉上子𦒳反下羊接反繖盖上桑旱反古文作傘荻林上徒的反𢙉口角反稚小上直利反幼也脚跌徒結反𮌨爤上疋江反下郎歎反漚和上烏侯反沾汙上音點又霑店二音毀呰音紫𨱞髮上莫高反下卷坑埳苦感反陷也斜戾上似嗟反下力計反轂上古木反下文兩反𦟛直上容反衣飴上於既反下辝字反下又与之反非王市兖反鉤鏁蘇果反眼瞼居掩反眼外皮眼睫子反无腋羊益反縫也正作也經音義作腋以解字替之非也頟廣上五格反輪㻔都果反委陁上於為反下徒何反委委陁陁德之羙也悠悠音由遠也遐也思也正作洗濯直角直孝二反浣也佛說甚希有經一卷玄奘徂朗徂浪二反大也窣堵上蘇沒反塔也䭾都上徒个反舍利別名棗葉上子𦒳反下羊接反穬麦上古猛反青稞也間隟上古莧反下丘㦸反珠簾力閻反隖波上烏古反又音鳥殺曇上所八反下徒南反數隖波𡰱殺曇亦云優波𡰱沙陁此譯為因佛說未曾有經一卷戶牗音酉芬子上音芥正作芥上拖式支反設也正作施柈盖上音盤露也酸來上蘇官反下子𦒳反麦上古猛反芬子上音芥菜名罝是上陟吏反委也釋也正作置弗于逯下一音代東洲名栴檀上諸然反欄楯食准反挍飾上古孝反下尸食反樓櫓鹿古反舘閣上古乱反挍餝手力反裝也正作餙佛說决定捴持經一卷瑕疵上戶加反下疾移反熒火上戶扄反虫名也正作螢救䇢枯古反正作苦惣令上子孔反又音窟悞馳駛所里所吏二反疾也速也姓上昨木反正作慠貴上五告反塌寺上他盍反自悞音娛牛拘反樂也又吾故反錯也為莘呼瓜反正作華花二形橫枉上戶孟反下於徃反夷犾徒的反東夷北番人也䨱弊上芳右反下必袂反正作覆蔽喑啞上於今反下烏雅反蛟龍上音交似龍鮫人上牛居反捕魚人也獵也正數漁三形也又音交悞所𭓯胡盖反煞也正作害𡧱二形盲寘莫瓶反又之義反悞床㩉吐盍反柔慎音順謙遜孫困反𢌿順上音卑又音俾悞諭謟上羊朱反下染反虵蚖五官反毒螫呼各書亦二反殞歿上于愍反下莫勿反揌持音惣謗佛經一卷面上音笑喜也挑拔上吐條反下蒲八反能忓音干犯也悞也多軼田結反波坘直𡰱反天音底由系胡計反唐鵞五何反正作鵝如來師子吼經一卷電炎音熖離上上力義反斥法上疋麵反又尺夜昌右二反悞辞辯上祥慈反正作辝一逕音經歷也又音徑非大方廣師子吼經一卷嚬申上毗反舒展也赫弈上呼格反下羊益反暉愌音喚火光也正作煥分剖普口反久植音食種也前世三轉經一卷便咲音笑光𭉋同上迦翼羊力反法華經云伽耶迦葉鞕杖上卑連反正作鞭妷羊一反姝好上尺朱反手去堅反子同上且待上七野反創上音瘡下音盤豆上子𦒳反耕種上古莖反稻米上徒𦒳反穬古猛反且續上七也反齒不上尺耳反不傴於禹反扶拭尸力反乳哺音步口餧食也向市時止反空匂音盖𩬞𩬇上音湏正作身上而甚反菓蓏郎果反身食音寺餧也古文飤字也經音義作餧於位反饐口上五恨反食飽也方言云秦晉之間食麦饘謂之也郭璞云関西呼欲絕食為也正作饐二形又於冀反非也經音義作餬音胡饘音旃妙法决定業障經一卷嬈𢙉上奴了而小二反誹謗上非沸二音屎尿上尸旨反下奴𠮧反瘖瘂上於今反下烏雅反金翅音施鳥羽也亦作翍𦐊翨三形時俗之人皆与熾字同呼非也盖寡聞矣希有希有挍量功德經一卷車葙息羊反正作箱淳淨上市倫反清也朴也㝡无比經一卷繕那上市戰反車箱息羊反鄔波上烏古反間𨻨丘𨒫反孔也正作隙隟大乘百福相經一卷序筌其上七全反逗根上徒𠋫反叡唐上余稅反聖也御㝢音宇属上力向反下朱玉反相連也夙遘音搆閔凶上眉殞反遽違上奇去反舟檝上音周関西謂之舩東謂之舟下接集二音進舩木也正作檝裝縹疋小反部帙直一反經文雨渧丁歷反又音帝輪埵丁果反耳鉤鎻蘓果反不撓女巧反婆瑳七何反王上彼休反翡翠上扶味反下七醉反蹠俱上之釋反𧿡多上步末反虛茅音猫耳璫都郎反矛矟上莫浮反下所卓反弓𠂕尸旨反鉞斧上音越下音府𦊰索上古犬反耒𥞐上郎內反下辝子反羖羊上公五反金椎直追反啇佉丘迦反唐言螺䡴刃上宅絳反縵莫宮反足跗音夫脚板㹅名𦟛上市軟反下容反眼睫音接大乘百福㽵嚴相經一卷雨𤁷丁歷反芬馥上芳文反下扶福反稀穊上許依反下居利反紺艶音焰疵穢上疾斯反筯脉居忻反悞密緻丈利反傘盖上乘旱反弓弧音胡弓也箭矢尸旨反亦作𥬘金鉅音巨天棒步講反杖也正作棓麰麦上莫浮反翠鳥上七遂反大五高反頷頰上戶感反下古叶反兩髀步米卑弭二反股外也足膚音夫正作附趺鞔莫官反稱讚大乘功德經一卷遊適音釋劇苦上巨𨒫反映𡙸徒活反毀呰音紫淩𮆘莫結反謗讟音讀捶打上之水反下得冷反駈卑進反鄙劣上悲美反瘖瘂上於今反下烏雅反䐔䏲上卑典反下他𠔃反正作匾𠥶侳陋上昨禾反正作矬悞等澍注樹二音綜攝上子宋反寥廓上力條反枯槁苦𦒳反俱𦙁竹𡰱反大乘四法經一卷苾茤上毗必反下測俱反喪命上乘浪反喪命同上喪命同上菩薩修行四法經一卷序眾夥音禍多也又戶買反覆籄上芳目反下巨位反土籠子枕之審反樞轄上尺朱反下戶瞎反關鍵音件行顗牛豈反徙於上斯此反鷄鶩音木鵷鴻上於元反經文憒𡗚上古內反下女㒵反筞勤上楚責反所囋音讚讚歎稱美也又自贊自達二反非銀色女經一卷食揣徒官反正作團也又初委反非也不上布夘反贖得上市玉反电地上以世反引也𮒌灌上子𦒳反下古乱反採華違王上佛授决号妙華經一卷䩭伇上居冝反愕然上五各反驚也愁倉歷反發篋苦頰反湏𦽦莫安反牧取上音目使也當殺音煞不懅其據反唯願諸經多作原同魚勸反放免也今也原樂也又音元佛說阿闍世王受决經一卷百㪶戶木反激起上𠮧擊二音疾波也涕淚上吐帝反下力遂反哽咽上古杏反下一結反這見上音釋始也悞㸌然上火郭反𭭲也目開也俗寶積三昧文殊師利菩薩問法身經一卷得印因信反痛痒羊兩反禽獸守右反薜荔上蒲計反下力計反悕望上許依反正作悕入法界體性經一卷磨瑩於定反提上蒲末反河名珂玉上口何反螺貝也佛說正恭敬經一卷壘足上力本反重也經音義作蹀音牒踔足孝卓二反跳也經音義作白反半步也桛足上音弄重循音旬㖒唾上吐帝反臯也正作洟又音提非温𤏙乃短反𧆞𧳓洛堂反正作狼稟受上兵錦反正作稟佛說善恭敬經一卷十盧盍反踔脚褚挌反半步也謂闊脚而立也褊隘上邊緬反肩音捫拭上文粉反下尸力反塠擈上都廻反下蒲角反鉤𭉨即累反正作噿嗺觜紫四形也不憘音喜情也經意是喜憙二字也喜忻也憙恱也又冝作嬉許記反好也慕佛說諫王經等二十九卷二十九卷同帙佛說諫王經一卷霸治上補嫁反下直之反徧枉上疋綿反下於徃反不正也鄙也上又音遍悞滛泆上余林反下羊一反稟與上兵錦反觸上古還反下古瓦反正作鰥寡也上悞巾㥽爭革反也𤟮上方武反下方勿反經音義云白与黑謂之黑与青謂之𤟮尓疋章也斧謂之文畫為斧形也正作黼蔽字也字從繭竹几反復窴莫瓶反心惚音𢙉𢲻上布各反下七活反𢱊治上力讓反下直之反狂攘如羊反乱也正作孃勷二形也上冝作劻音匡哈之上戶紺反哺也正作唅也又五合反非也脣乾古寒反經作乹𤍜燋上乘旱乘告二反下即消反乾㒵也𨳲塞上計并列二反拘𦇷上九愚反下力貟反手足屈病也下正作孿𮏴急上居忻反杷空上步巴反摸索上怇各反下正作𢱢讒言上仕咸反煒燁上于鬼反下于輙反目窴莫瓶反悞旁圻巨衣牛斤二反藏匿女力反苾芬上步結反下芳文反栝鼻上古活反塞也又或作䄆音活祠也珠璣音機文繡音秀華𮤝上戶花反下丘月反壂舍上徒見反大堂也牀㩉上音床下音塔𣰽𣯫上具俱反下數俱反𣯚𣰆上音塔下音登筵上於遠反下以然反幃帳上于㱕反下知向反柱音梁倡伎上尺羊反翠毛上七遂反寶羽上正作葆音保羽葆皷吹之餝聚翟毛為之似纛也畫上音丹下音話蘭𣛝音順椎心上直追反吁天上火乎反正作呼郁嗟上於六反悲也正作噢走狩音獸摑抴上古麦下以世反打掣㒵風疋遙反隱隱真真上或作𨏈於譁反車聲也盛也下冝作𭣪之人之忍二反𨌈𭣪喜恱也又經音義作闐冝作𨌈同音田呂氏春秋云天子𨌈𭣪莫不戴恱也酷治上苦沃反虐也下持值二音大方等修多羅王經一卷婇女上倉改反擇正正作採亦作綵也所以採擇眾女填宮也書無此婇娛樂上牛俱反覺已上音挍下音以如來示教勝軍王經一卷无撓女巧反傘盖上乘旱反灰燼似進反𢪨拒上苦浪反下音巨佷戾上戶反延涕上似延反正作涎也下音剃喉乘朗反梗噎上古杏反正作哽喘息上尺兖反偃臥上於㦥反牀針審反正作枕琰魔上閻染反舊云閻羅泛大上芳梵反浮也溟海上莫瓶反𤌢火上乃管反熷光上則登反屏障上蒲經反又音餅惟上于㱕反下烏角反從巾氍毹上其俱反下山茤反綺悒普駕反錦衾去今反被也鵄梟上尺脂反下古堯反乘馭魚據反目上莫瓶反辟手上蒲益反除也車上蘇郎反崩慟同弄反楂掣上側加反下尺世反雨漬前智反熢𤊀上蒲紅反下蒲沒反佛為勝軍天子說王法經一卷傜伇上余招反黜罸上律反形音六煞也恤上取蒸字上聲呼之救也助也下私律反黔黎上巨廉反下力𠔃反園圃補布二音乾燥蘇𦒳反撩亂上力迢反取物也涎唾上序延反溘然上苦合反奄也奈曳以世反揭多上其列反𠿒帝上呵割反怛姪上多達反下徒結反苫䛧上式占反下迷計反澡漱所右反凉燠烏告於六二反熱也室燎力燒反爛潰胡對反喰食上倉安反㦥悵上許偃反佛說𭦟殊室利呪藏中挍量數珠功德經一卷𭦟殊上莫安反舊言文殊此云妙吉祥槵子上音患木名無也八顆苦果反粒也佛說挍量數珠功德經一卷誦掐口洽反木檈音患佉叉上去迦反佛說了本生死經一卷序文𢯇讓上一入反𩥵惑上倉南反押賢上安甲反侮聖上文府反姦慝上古顏反下他得反恚鍼之林反梟截上古堯反正作法音精節也正作旌重霓五𠔃反八紘戶萌反際也𨦣䧟上余稅反舉上才古反麁也略也字從扌從角古文粗字也綸音輪淵乎上一玄反雅邃雖醉反奧莫角反探玄上他含反取也𮥸哲上子峻反刈足上魚吠反折中上之舌反下知仲反童曚音蒙又蒙孔反穿鑿音昨讜孤上得朗反直言也經文躇步上直魚反苦懣莫本反愁悶也又音滿煩悶也心惚音𢙉嘗啖徒濫反箭芒音亡草端麦也鋒也色猗音倚又於奇反噤閇上其禁反𣧑衰上許容反緣起聖道經一卷玄奘徂朗反大也沉淪音輪沒也舊其右反下古定反故道也欻然上許勿反卒也城墎古霍反隖波上烏古反白衣中受佛五戒男弟子名隖波索迦舊云優婆塞佛說貝多樹下思惟十二因緣經一卷極劇上渠力反中也致也下奇逆反增也艱也痛痒羊兩反唐飜為受山塹七熖反坑也得態他代反意也佛說龍施菩薩本起經一卷蠕動上如兖反菓蓏鹿果反嬰烏耕反鳥聲也正作嬰蜚鳥上府反占飛走狩音獸悢力讓反已已音以上也涕零上音剃下音靈淚落也泆上羊林反下羊一反懈殆徒海反䖝蛾五何反𧒢上子𦒳反下所擳反自投音頭弃也置也又之未反悞愕驚上五各反艱淴上古閑反下所立反下又烏沒反悞也屢陳上良遇反數也胎世佛說龍施女經一卷浴上子𦒳反危脆此歲反乃咲私妙反正作㗛八吉祥經一卷揵闥上其焉反下他達反緊那上居忍反摩睺侯𠋫二音此云大胷行神佛說八吉祥神呪經一卷缺減上苦穴反下咸斬反觸嬈奴了反弄也亦作嬲义上緣雪反蛊道上音古又直中反悞諭諂上羊朱反陁上蒲末反槗曰兜上居妖反中于月反下都頭反亦越兜因坘音遅佛說八陽神呪經一卷內噲音快經意是快字稱心也喜也可也八佛名經作普入毒螫呼各始石二反呪詛阻䟽反澡漱音瘦臣億上音巨大也懽喜上呼官反蠱道上公五反毒藥也前經作蛊將師所類所律二反并力上卑政反專也曰兜菩薩內戒經作越兜八吉祥經作槗日兜悞八佛名号經一卷鄣閡音礙逯得上音代及也又音錄悞右𢭀序緣反正作旋熊羆上于弓反下彼皮反犲豹上助皆反下補㒵反槃荼宅家人芬馥上芳文反下扶福反佛說盂蘭盆經一卷盂蘭盆此言倒懸乳哺蒲故反含食餧字往餉式亮反奉物也揣食上徒官反握也𮡻燭上音燎也燭也又音汪洋上烏光反下余良反佛說報恩奉盆經一卷連柱知主反食上徒官反握也燭与𮡻同音又持頂反浴像功德經一卷浮蓱音瓶水上浮草也正作萍惚乱上音𢙉陁上莫安反此大壇甘松似容反香名芎藭上去弓反下巨弓反麝香上時夜時亦二反獸似麞齊有香佛說浴像功德經一卷麦上古猛反窣都上蘇骨反下音覩悞計上子𦒳反𠛴竿古寒反麩片上芳夫反麦皮也沈水上直林反水香也又音蜜悞熏陸上許云反下力竹反藿香上呼郭反淨濾力去反瀝取上呂擊反足踏徒盍反正作蹋稻芉經一卷稻芉上徒𦒳反下古旱反生穗音遂潤漬疾賜反駛流上所事反正作駛又快决二音非也佛說轉有經一卷睡夢亦作寢同莫鳳反寐中神遊也黠慧上遐八反恱豫余慮反安也樂也佛說文殊師利巡行經一卷毀呰音紫𧿡提上蒲末反號上戶高反下苦屋反文殊尸利行經一卷折伏上之舌反俆步上祥魚反孔宂戶决反正作穴特上頂反相皂莫孝反正作㒵煩惚音𢙉毀訾音紫一𧢻下尺玉反犯也𥥛也亦作觕佛說自誓三昧經一卷精蘆力魚反舍也正作廬珓露上古孝反或云交露或云絞露顯颺音羊洋序上徐羊反踔茅上冝作趒他吊反越也又孝卓二反非湏申羊朱反正作今贈才鄧反相送也專推下作擢同文孝反進舩者也又尺佳他廻二反非也積殖音食翼從上羊力反下才用反研精上五堅反宍結上而六反下音髻薩披上蘓割反下彼依反遠上七到反捻耳上奴篋反兆意上音非悞句睒上音俱下音陝謳合上烏侯反揵推上音𠃵下音搥草耨音辱泥曰子月反亦作越如來獨證自誓二昧經一卷句潭上音俱下徒南以審二反國名也又冝作瞫二同音審前經作句睒也踔苐上他吊反越也正作趒趠二形也趍向上七俱反專擢直孝反進舩木箄也正作擢棹二形徧露上疋連反又音遍非薩披上蘓割反下彼依反操遠上七到反分乘讚反揵搥上巨焉反下直追反草蓐音辱灌佛像經一卷一臠力兖反斷期上徒管反絕也僉然上七廉反咸也皆也摩訶𠛴頭經一卷繕作上時戰反補故就新洋銅上余良反𦫿納上五盖反下或作奴合反香草也異物志云如拼櫚子似檳榔可食也三月採其細破乾之味積苦荳是也捼而上奴廻反紺黛音代足之上將句反添也造立𢒈像福報經一卷憂填音田王名言諾奴各反應也又而者反柔𣽈音軟恢上土上苦廻反下徒古反无於熖反炎光上羊贍反醜陋音漏刻畫上苦黑反下戶卦反作佛形像經一卷拘鹽上音俱下郎甘反前經作拘羅琦物上巨冝反正作奇薜荔上步計反下力計反貞不空羂索神變真言經一部三十卷第一帙第一卷阿商遇反輭草上而兖反喜愉音逾恱也𮒷魯荼上魚列反下宅加反䠆跪上直羊反斷愕上魚斤反下五各反腹助下音勒正作肋痔痢上直里反下力至反腫上都反癀病上戶光反㿃病上知例反赤白痢也又當盖反瘡皰疋㒵反又薄孝反經後作薄者反非痒瘨上音羊下音顛𥜒蠱上於瑛反下公五反鞭撻上卑連反下他達反能禳而羊反即譡都浪反芬馥上芳文反下扶福反身膚音夫正作膚姝上尺朱反下以雪反怕怖上普嫁反呪詛阻䟽反荼枳吉以反𣩦𡧱上奴了反正作嬈溥示上音普廣也若讜當朗反直言也經後作他朗反娜麼上那可反下摩可反窒上下吉反下力計反上經作丁吉反悞誐嚲上魚者反下都我反帝瓢毗藥反陁𭌆音履囉窋丁律反㫊唎上烏可反下音利索跢上蘇古反下都个反囉拏上文發反中魯雅反下女加反韈囉拏同上嚲詑上多可反下他可反僧㰤上斯孕反下呼可反縒澷上娑可反下莫半反喇濕上盧達盧乞二反弭嗢上尒反下烏沒反詘巽上俱欝反娜曳上莫口反中乃可反下以世反枳嘌上吉以反下力日反悌耶上音弟下以嗟反播苫式占反唎上胡沒胡結二反目佉去迦反去聲呼訕洙上所諫反下莫鉢反韈嚲上望發反𡀩起上力角反下其乙反拓囉上之夜反悞枲唎上星里反䭾上輸律反下陁个反翳曳呬上烏計反中以世反下呼以反勃𠆙上蒲沒反下亭夜反囉莾牟廣反又音母翳吃居𠔃居禮二反說文平上二聲䞘𤙖注云取特牛合口作聲短呼之短呼謂鼻中出氣喉中作聲也口上子活反正作𡫸他上寧吉反下丁也反𮨏旨上蒲滅反正作𩓝縛祗上無各反下虬逸反你禰上奴里反下虬逸反說文同上是也悞灑𤚥牟含反薩𢋑無吉反下同囉𮠴火𠔃反縛𡖺名夜反隖䭾上烏古反下徒个反縛攞羅可反曝杖上蒲報反下亭樣反亭㨾羊亮反薩地丁也反正作𬺼詫詫魑賈反瘻瘻摛矩反摛矩上知反下俱禹反柘囉上之夜反下來雅反拽腎饒上移結反中時忍反下而照反下二二合囉徙斯此反劒𬼩并也反馹唎上而質反二合郝呬上呵各反下希至反𤙖怖上牛鳴音如前說文下步末反悞莎嚩訶上乘邑反中無可反下呼箇反呼䓢古餓反正作箇馺皤上蘇合反下婆可反莾拏上補門反白蓮華也𮒷魯上魚列反溥獲上鋪古反剛橜拳月反肢分上章移反隱撩經後音略正作𢱊又音亮溲麵上所有反捏彼上奴結反温蘸㽵䧟反正作蘸謀叛音畔畿曰上巨衣反八枚母迴反俣上羊亮反下愚兩反拋諸上無遠反正作挽也經後作𢱍又音胞非第二卷燼為上辝逢反掐珠上口洽反燒焯之若反火氣也臺榭音謝光鎣烏定反透徹上他豆反勿泄先結反主嚕音魯白上苦禮反檠覺上居影反正作警驚二形又音擎悞閼伽上烏割反下其迦反瑟詫娜上所擳反中嫁反下乃可反徙唎上斯此反䠇數上俱勿反下詩古反牀榻上助㽵反丁他盍反𠼐𤙖上力𠔃反下牛鳴音說文如前㧧𩬇上所魚反又作梳罐索上古喚反疧上無發反企縛上丘弭丘智二反䭾禰上徒个反下奴禮反𮄽𬼨上寧立反下名也反痰飲上徒甘反下於禁反㤄字上蒲𣳚反後自𭃄莾拏上布門反花名膚體上方無反澤上緣雪反羙好也滌垢上徒的反𬼨上寧立反正𮄽𭌆上寧吉反下音履枳𩕳上吉以反下寧頂反眼眵尺支反醫瞙上音𪾼下音莫瞻眺他𠮧反溝壑上古𠋫反下呼各反蝮蠍上芳目反下許羯反悃御上苦本反幅至誠也絡膊上音洛下音愽窋乞使上一丁聿反下二二合呼避詵所臻反捎帶去聲呼觸揬音突彊畔上居羊反詑囉上他可反捶持上楚洽反正作𢰔𢰔瓶上同此正第三卷𮄽𥐨名也反正作𬼨也括量上古活反撿也幹者上古岸反𮄽𬼨名也反跢嚟上多可反下力丁反散撦也反也上尺之反撦字𭃄俣上其亮反下牛主反警發上居影反唵上烏感反下勒達反光音熖縛諵奴金反𮒷䏶步米反鞋履上戶皆反下無發反步臡人𠔃反係念上古詣反頑嚚魚巾反猜慮上此才反漬滋上慈智反浸也經後作資任反非也能繤子管反䞘𭌆上冝反下音履拏上虗覲反正作釁各捻奴恊反磔開上吒格反指胛音甲第四卷竪音愽相怗著也跢上多可反下力計反正作二形土方藏作跢譡倪上丁浪反下五𠔃反急掘烏角反悞藺力進反二合譟𡅖上蘇告反下名養反憋𢙣上普滅反怒也掊卬上蒲講反膊齊上補各反步臡人𠔃反阿眤女日反迦上始羊反設咄𭋳上尸列反中都骨反下力尹反亦云設都嚕此云𭜨羯侘加嫁二反依字失志㒵也迦㘕洛甘反不墜直類反繚䋢掊上力小反中并結反下蒲講反䥫槊所卓反亦作矟搠突嚕上徒骨反正作姥娑上莫古反傘盖上桑旱反龜卬上居追反下一進反苾𠆙上毗結反下亭夜反牝抳上蒲忍反下𡰱尒反鄔喇上烏古反下勒達反鳬上父無反白鷺音路鳥名白尸各反摸畫上莫乎反第五卷䥫上音青䥫也蠶絲上自南反菓蓏郎火反拋擲上普交反拘縶知立反降澍注樹二音輪轂古木反輻上音福下音𠕀輪軗音轂否觀上皮羙反塞也又方久反不也端音恱若莫鉢反正作瀎建奴禮反姶娑上烏合反踠轉上於遠反湫泝上子由反下普丰反水涯也經後音畔非偤護上羊修反侍也撚為上奴典反下于垂反叩城上苦狗反頭磕額蝮蝎上芳目反下許羯反黑黲倉感反傭纖上容反下思廉反扸骨上先擊反翦除上子淺反𧤼地上巨月反填築上音田下音竹𧿡馹上步末反下而質反交撽古了反緾也正作憿也又戶的反非妬憋上都故反下普滅反第六卷瑕㙠上戶加反下於計反㽵徒年反正作填𡀔波上郎故反㘄迦上郎鄧反聹舍上寧枳反㕹柱上扶廢反邙上伊進反下奴達反㫊灘上烏可反下奴按反亦作攤羅𤙖𤙖許今反弟一卷注云取特牛合口作聲短呼之也言短呼者謂合口鼻中出氣喉中急作其尅聲㤄㤄步末反成淑市六反訊相上思進反遞他兮反正作𠥶冗旱上苦浪反牛上莫交力之二反一古麦反打也正作第七卷重椽羊反脣也木榓音蜜扇挻尸然反瑟詑亞反正作詫縒麼上乘可反下忙火反𤙖㤄如前卷內具註㵶散上音節正作韱𥸮木上索郎反構木上古豆反鉺之上而志反正作餌鬻仜恱上公五反𦘺也眼餌而志反適懌上尸石反下羊益反撓攪上呼高反下古巧反腴恱上羊朱反膚狀上方無反𡰱鍋古禾反治鏇上直之反下似反瞬目上書閏反瞼上上居儼反眼外皮也紫橿居良反蠍螫上許謁反下尸亦反痃癬上黃堅反下普擊反正作癖也悞痼癥上公悟反下陟陵反矛槊上莫侯反下所卓反酤乳上古胡反圈牛上其遠反孳生上子慈反第八卷鍮鉐上他侯反下市亦反淨簏力木反禰𭌯上奴禮反妬裔上丁故反下以世反擲躅直五反皂莢上曹老反下兼恊反盞筆上側眼反理俣愚禹反枯所右反正作瘦第九卷畋飾上音電平也僑履上魚驕反剛鎻音鏁拆外上他各反手同上曲匑居雄反謹敬㒵銀壜徒南反𢰔枝上初洽反泡花上芳梵反浮也正作泛汎二形窒上莫罪反下丁吉反邏上郎个反下而占反𠻐𠧒上力角反秝陁上輸律反正作秫自切𡫸𠅗上寧吉反下丁夜反拏𩓝毗滅反𭙐囉上魚反腎饒上詩振反作諸振反雙聲也非是𭃄劒瓶并也反正作𬼩莾拏上布門反下女加反亦云分陁利此云白蓮華也