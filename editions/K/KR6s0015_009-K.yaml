欲研五堅反祇在上与只同章移反適也語辝也今多入聲呼戶牖音酉開豁火活反食上徒官反丸也思忖村反根裏音里根裏同上竅宂上苦𠮧反下玄决反自窒陟栗反撞也觸也正作挃隳上許規反戾車上力計反枉入上於往反徵心上陟陵反矍然上居縛反遽也竉弟上丑勇反愛也又力董反悞揣摩上初委反亦作晃昱上戶廣反下以六反赩如上許力反大赤也屈掘烏角反悞亭上力与反俶裝上昌六反始也厚也攸往上羊修反所也新霽即帝反晴也清暘音陽日出也隟中上丘𨒫反壁孔也右盼普幻不洎今上其既反及也第二卷𢪔子丁𠔃丁禮二反或作坘音遅外道名貞元經作𦙁或云毗盧持或毗羅仾宍身上如六反成灰火迴反銷殞于愍反孩而注反膚腠上方無反下倉奏反頺齡上徒迴反下力丁反裏耄莫報反面側右反殂落上昨奴反携我上戶圭反瞪矒上直陵直證二反直視㒵也下莫弘莫鄧二反目不明也悶也在也正作瞢蕄懵三形也目睛音精目珠子不瞬音舜動也瀛渤上羊清反下蒲沒反晦暝上火對反下莫瓶反則紆衣干反𣫍氛扶文反氳元氣也欝𤊹步沒反煙𧺫㒵祇見上音只專詞也簷上羊廉反下無府反𨥤縮上音書伸也正作舒小竇音豆空也穴也礭實上口角反鞕也定也拆出上先擊反兮也變慴之涉徒恊二反亂上居小反詐也投灰上獨樓反下火回反上又之未反悞甄明上居延反察也措心上倉故反投也撮摩上子活倉活二反取也祇益上音只適也凌奪同活反眚赤上所景反屏帳上蒲丁反几筵上九履反下以連反席也捏所上奴結反括量上古活反暈適上為問反下始石反珮玦上步昧反下古穴反彗勃上音遂下步沒反虹蜺上戶公反下五𠔃反瘴𢙣上之亮反乖捔音角𣾫滑上所立反酢梅上倉故反又音昨非用思踏同盍反也淪溺上力匈反用餉式亮反第三卷舐吻上神紙反下文粉反撞種種上一直絳反下二同音鍾誤冷𤌢奴管反雙𤓰爭巧反炊上尺惟反下倉乱反陽燧音遂融泮普判反散也正作冸鑿井上在作反𥥛然上陁骨他骨二反觸也出也正作突宊㐬三形也誤含裹音果爍迦上書藥反此云能瞋第四卷聆於上力丁反蚊蚋而稅反渾濁上戶昆反洲潬徒旱反水中沙也林藪速走反因絞吉了古巧二反繚綟也相上徒禮反倐有上書六反雲屯徒門反聚也成霾莫皆反尓疋曰風而雨土為經意是薶字羼提上初果反鉢剌郎達反怛闥他達反自蔽必祭反劬勞上其俱反𣄆泊上力与反下步各反現徒官反丸也又直臠反緷也賊媒莫迴反遷上莫𠋫反分劑在計反頭奚戶西反何也粘湛上女廉反下直林反普也大也下又直減反蒲陶捶上步乎反中徒刀反下都果反正作蒲萄䒳偃月上於𭞽反皷桑朗反正作𣞙𡕏二形黯然上烏咸烏減二反深黑也象恡上莫紅反下力進反舂米上東容反搗也遄知上市綠反第五卷雜糅女右反洗滌徒的反寶杋居履反案也正作机綰成上烏枝反繫也絹績上七入反下子歷反鋒起上芳逢反偏掣尺列反偏𭷣苦堅反鵠白上胡沃反水鳥佛上九利反望也昆季上古䰟反兄也同也弟也少也小稱也牛呞音詩婆瑳千何反闤闠上戶開反下戶𭔹反涕唾上他帝反正作洟窺窓上去隨反童稚直利反䫃䀎音麵來上疾反啾子由反第六卷𠗦塵上平水反阿閦初六反過音悟錯也正作誤悞二形機抽丑由反祇名上音只㠻冀上許衣反鬼師所類所律二反正作帥不踏徒盍反秏散上火告反𤑔一上如恱反放火也香炷主注二音長挹一入反漏庀音攴正作巵𠨬二形又疋弭反具也誤捶詈上之水反婦上古瓦反如噬音逝齧也第七卷堙盡上因堅反正作煙也又音因悞饗佛二許兩反恃怙上時止反下乎古反此下真言曩麼上奴朗反下莫官反颯跢喃上蘓合反中多可反下女咸反囉喝何葛反貞經作曷𡀔跢上音路哩音里娜誐弭上奴可反中魚也反下婢反跢上魚竭反嚩上奴禮反捺囉上奴達反塢麼上烏古反呬夜上香異反演拏女加反鼻聲枲𩕳上息里反下寧頂反矩攞上俱禹反下羅可反惹囉上自我反麼抳上莫火反下𡰱反荼戍上宅加反下商還反怛他上多達反佩殺上步昧反下所拜反麌嚕吠上逆縷反經作迂縷反誤也貞元經作霎禹反是也中洛占反下扶廢反𣾫必上所立反抧也上吉以反二合翳瓢瓶遙反伊𤚥牟含反姤丁故反儗囕上霓以反下郎𨷂反囉上冝𠧒反沒嘌力日反正作㗚底𢈔以王反二合𧹞迦上女板反耨娑上內沃反矩砧知林反娜莾莫朗反餉迦上式尚反麼上居小反引矩嬾郎旱反你也上奴里反二合謇左上居輦反矩遜蘇困反矩喇音剌闥難上他達反日懍婆上二二合則廩反下一薄賀反嘞𠧒鏟上郎得反下初眼反下二二合啒挽上俱律反下音晚吽𤜽嚕唵上一牛鳴音上二女濟反上三洛古反下一烏感反下三三合拶都上子末反𤚥牟敢反部薺在禮反或作𧆌即西反貞元經作部濟囉曬所賣反怛懶上寧定反中多達反下洛盖反惹嚩哩上而者反中無可反卜力耳反上二二合嚩上無愽反下二二合則盧反轉舌拏𥟖力𠔃反訥躃上內骨反下音婢塞謇娜上桑得反中居輦反下奴可反上二二合㾑跛上烏合反搵麼上烏困反蹉夜上千何反建姹丑雅反又玉篇及郭氏音並作陟家反勘貞元經無此句難可詳定哩孃寧耶反䛧娜上迷計反阿秫上烏可反下詩律反帝釤所鑒反你琰上奴里反下羊濂反二合弭抧笄異反笄吉𠔃反拽拏上以世反薄儗上婆各反下研以反比𠻱上步一反下力繩反窣堵上蘇沒反哆曩上丁个反惹嚩上而也反二合吽吽二同牛鳴音急作聲撥吒上普末反係係二同胡計反下引喝多上賀葛反貞元經作賀多霓毗藥上一五𠔃反下二二合𠧒抴以世反二合揭吒上居謁反貞元經作羯吒訥稜勒登反哩躰聽以反薩无奧反嘮捺上丑交反唧多上子悉反鄔惹上