body:
  text: 漢中沙門釋可洪撰依河府方山延祚藏大乘經音義第一之九此冊有十三帙欲難量墨悲絲染詩讚羔羊景行欲大方便佛報恩經等二經十卷同帙大方便佛報恩經七卷第一卷智音岸菓蓏郎果反躃地上步益反倒也撫也暉炎音焰經音義作暉𧰟塠阜上都迴反下扶久反山藪乘走反溪澗上苦奚反正作谿溪尓雅曰水注川曰谿也溝呼各反甄廾上居延反亦云緊獸迦並是樹名其花赤色此寶似之循環上音巡下音還聡余稅反聖也掉動上徒了反音𠺜子耶反經音義作喑昔子夜反𬛍上上思七反正作膝粮𥹝式亮反饋也餫饋野也正作餉也呼噏許及反悞上蘇丁蘇頂二反下音悟了覺㒵也正作醒寤挑目上他條反扶也里程直貞反期也限也式也法也𨒫上其呂反違也正作拒又音振誤仾昂下五郎反銜髭上戶巖反下即斯反經音義作馘眥又見別本作貲應和尚以掝眥替之上呼麦反裂也馘二同古麦反截耳也眥自詣反瞋目㒵也咆地上步交反正作跑也咆虎聲也騰躑上徒登反下持隻反囓上卜各反下五結反身創音瘡第二卷隱𦷥必祭反蟠蘭上音盤龍臥㒵舂輪上尺倫反正作春上方經作春輪是也又經音義作椿輪蒨練上七見反𭽀爤上倉贊反下郎贊反目眩音縣瘻者上力主反曲脊也又力朱反痀也拘卑益反髻上音保菩薩名闍暝莫瓶反鞭打上卑連反搒笞上步盲反下丑之反𦒱𢱊力向反笞也杻械上抽酉反下戶戒反𢫱上戶郎反大械也三禮圖曰如今机形狹而長也迫噏經音義作迫愶下許刼反恐也擑遏上阻𣾫反止也正作戢也經音義作截遏下烏割反上又音接非炳說上兵永反財賄呼罪反財帛也𮍜上都侯反下莫侯反首鎧也正作兜鍪箭矟所卓反宦人上居中反正作宮又音患非浣足上戶管反桉濯上烏岸反下宅角反𮋖曬上戶管反濯也正作澣下所賣反上又音捍非水上子老反捲𤗊上居兖反浦闍𡰱上音蒲此云所食佉陁𡰱上丘迦反此云可食食唵上倉安反下烏感反手進食也蝮蝎上芳福反下許謁反毒螫音釋嶔巖上冝作嵌苦銜丘嚴二反石龕也峻廊也古井中隧道也又音欽崟山高也非用挮撜上他𠔃反下都亘反羸裰竹劣反𢇳也正作惙唼食上子荅反茹食上如与反貪也食也雜也枉㩜上於往反下郎啖反正作濫无𢪿音姑罪也顦顇上才焦反下才遂反擔揭音竭擳捥上子結反指骨莖之正作莭也下烏乱反手也上又音擳非用上毗忍反下市軟反肝膽得敢反脹𦝩止直羊反下為貴反正作膓胃也上又音帳非也冗旱上苦浪反高也旱也沙𠧸洛古反薄也𣰽𣯫上其俱反下生茤反𣯾𣰆上他盍反下得恒反䗍貝上洛禾反䆤此上赤專反猥多上烏罪反眾也頓也𭥗涉上莫報反郁噎上於六反悲也正作噢抓摑上爭巧反下古麦反經音義作𤓰攫音钁單己九里反自身也經音義作單孑𠾬喈上許蔭反大聲也下呼成反𠿒也正作䅽㖑也又經音義作减嘁上呼減反上又郭氏作噤噞欽𨺻四音下音並皆非也噏帳上許急反下知向反𢙢愶人㒵也應和尚以蹋張替之徒盍反非眴速上尸順反蹊逕上音𠔃下音徑然上吉了反正作皦炳著上兵永反下竹去反上序全反銅釜音父竝挽上音並下音晚䥫釵音叉㓨膓音福正作腹第三卷㯹像上必遙反嫡音的君也飯上戶木反陁驃毗妙反比丘名也此云實尊𢌿音卑衰䙗戶果反聡以我反不𮂴於往反姧詭居委反𢬘子上步保反為𧂐子賜反有娠音身又之刃反踉䠙上洛堂反下步郎反顛厥上丁年反下居月反走㒵也正作𧽍𧽸蹴地上七六反瑚上普官反下戶吴反大方甎也正作㽃瓳概歎上苦愛反歎也耗櫌上呼高反下而沼反正作撓擾杖筞楚責反荊棘居力反如蝅自南反處繭古典反反叛步半反背也奔他國也稽遅上吉𠔃反㽞也邑遅上經音義作悒憂也煩惋於元反屈也枉也曲也正作冤也又烏乱反驚歎也非用染坑上尸林反下苦夷反正作深坑汪屎上烏光反下尸旨反經音義作汪水乳哺音步第四卷嬉怡上許之反下以之反和恱㒵也禱祀上都老反下辝姉反乳餔音步正作哺作倡音唱導也𡍭土上苦佷反力也耕也啄吞上竹角反紡織上芳𠕀反㓟剝上普皮普美二反開也分也正作披翍二形也下布角反𦠌動上而春反動也又音軟誤餌魚上而志反放牧音目繁息上房憣反穊也經音義以蕃字替之蕃滋也息也幃帳上于㱕反于知尚反湍浪上他端反急瀬也矇盲上莫紅反音義云有子而無見日目無子曰盲也舉帆音𭂫上慢也正作䑺二形㨬束上側良反束結裹也正作𫌏樓櫓盧古反嚙毒上五結反氣噓音虛喘息上川兖反蹹蓮上徒盍反聟言上音細女夫也𥇒𦠌上子反下如春反餉上式尚反振濟上之刃反救也堺上上音界境也俗捫摸上莫奔莫本二反下麻胡反麻各二反忍距音巨違也捍也正作拒曒然上吉了反明也白㒵也草藻子老反水草也經音義作濚應師以䕓字替之䕓音察釵釧上初街反下川反哮哧上虎交反下虎嫁虎格二反正作嚇憘食上音喜情也押上爭巧反下古狎反正作爪甲排石上步皆反推也蟣𧒢上居豈反下沙擳反土蚤音早第五卷猖狂上處良反白虹音紅日邊氣似虹音絳𠧒匂盖割二音挑其上吐條反取也劓削上冝器反割鼻也經音義作劓耶呼翕許及反瘻者上力朱力主二反曲脊也拘癖補益反正作躄財賭音賄又音覩非踐蹋徒盍反皂白上曹早反秳古活苦活二反箭受弦處也正作筈又音活誤殞滅上于愍反削耳經音義作刖耳音月眂在上莫賢反睡也又匙視二音誤螫剎上呵各反下沙八反膖脹上疋江反下知亮反以裠音群失裾音居袵也探摸上他含反遠取禍酷苦沃反急也把發上步包反足地也取也正作跑掊抱三形也又步巴反亦通易上莫𠋫反第六卷牛呞音詩比丘名跳枰上徒聊反下平病二音獨坐板床也田疇直流反𦋺上居例反捕蟒上蒲故反下莫朗反第七卷創痍上音瘡下音夷上巨向反取獸具嘊喍上五街反下助街反愽撮子活倉活二反童齓楚覲反毀齒也男八月而齒生八歲而齒女七月而齒生七歲而齒也𦟛滿上丑容反直也膓上市軟反膚體上方無反佛說菩薩本行經三卷上卷𥞩田上古莖反正作耕阤上達何反丁蒲末反絞絡上古夘古了二反駿馬上子峻反一迮音疋又作匹珠璣居依反䅽上初巧反下古木反作尺沼反䍧𤘳上子郎反羊三嵗曰下丁𠔃反𦍞也正作𦍝又音底來抴羊世反𭷣引也捉擿他歷反挑撥火也正作揥又音擲裖也象廐音救羯羠上居謁反下徐姉反犍羊也相𤘳丁𠔃反蠅上羊陵反下莫結反𨳰著上愽計反慍心上於運反怒也酸阤上蘇官反下徒何反老耄莫報反草𦮽古老古八二反禾稈也正作槀秸二形也或䄩二同羊力反麦禾也冝求秸呼也郭氏音告又古勒反並非也又經音義作古木反亦非也璣鄯上居依反丁是戰反攘却上如羊反琦餝上巨冝反下守力反𥥛走上徒骨反濟上自宣反兀其上五骨反削也正作刖也我曹昨遭反輩也編身上布玄反次也織也冝作辯字呼也啞者上烏下反拘癖桶益反攣跛也正作躄𤸇殘上力中反正作𤸇脛踝上胡頂反下胡瓦反脾入上蒲米反正作髀上序全反𨱞尾上莫高反正作髦長毛也合作朱鬣𨱞尾此句闕鬣字也中卷而啄音卓鳥食也𧟶梨上愽嫁反神名欲挑他條他刀二反捾取也嗒摩上荅塔二音神名僂者上力主反拘躃布益反又音倒也非用𤸇殘上力中反枷靽音半繫也怖懅其御反不肖音笑小也不于㱕反正作違無䨥所江反兩隻也漱口上所右反相棠宅耕反虵𧎔莫朗反龍蚖五官反毒虵也又音元欲頑古隨反圖也謀計也求也正作規也古猛反搒苔上步盲反下丑之反正作榜笞也借貸他代反假也又他得反仾𥥛上丁禮反下徒骨反蝙蝠上音邊下音福仙鼠也亦名伏翼𧊤蝪上羊昔反下先擊反此經文俗用也經音義作蝪蜥上音亦下音錫此呼正𨱰餝上芳勿反下芳𠕀反按首飾也正作髴髣下卷泥洹上奴𠔃反中戶官反下音岸上下悞𡶅峨上普火反下五可反傾俹㒵也俗騷動上蘇刀反尓疋妯騷感訛蹶動也盧力反地獄名不収書由書救二反𣫍也穫多也條䟽上徒聊反下所魚反稟上始陵反下兵錦反供穀也与也所𡱈其玉反𥞩種上古莖反比舍上音毗並也又妣鼻底邲四音近也次也倒上丁田反正作巔這欲上音釋始也正作適也悼愍上音導傷也願言上魚勸反欲念也正作願二形也欣𠸍私妙反喜也正作㗛也晃焴上黃廣反下羊六反涉𥄲莫報反涉也正作冒字從兩日𥄲音帽手上子老反口上所右蘇奏二反正作漱也嗽咳也非轉𧴵莫𠋫反坵墓上去鳩反上又音遟非用見㛐蘇老反兄妻也亦㛮嫂二形賊帥所類所律二反將也雇汝上公㸦反衣上蒲袂反𢙣也正作弊幣二形前聟音細哽噎上更杏反荊蕀斤力反行䟢音跡又田典反蹈也悞尊榮上子孫反下為兄反熱上奴老反正作𢙉亦惚毛𩬊音發膸𦜩上息委反下奴老反䖍闍上音𠃵國名也正作𧆛瀬上音早下音瘦正作澡漱也大𠇈相遷反正作仙仚𬽐身上乘浪反亡也正作喪禮䟽云失國曰喪也而九救二音灼也燒也正作𬉹也哀㘁戶高反也正作號嗅二形又音亦坐廗上自果反下祥昔反噵從上徒到反引也正作導下自用反隨後也栢上音福下普百反相近也正作拍癡莫瓶反暗也正作𡨋眾窴同上也又田甸一音並非痛婆借音莫果反問辝也正作沒也又音摩創槃上音瘡刀傷也正作𭃅下音盤痕也正作瘢難法集經等二經十卷同帙法集經六卷第一卷彼音岸羼提上初諫反唐言忍不恡力進反惜也奮迅上方問反下相俊反𠇾息上許牛反𪾼障上一計反龍音𢙉𣴊沫上普交反下大鉢反法悼大了反正作掉第二卷𫘆流上所事反懈殆上古賣反下徒改反姝大上尺朱反堙羅上於真反象王名膚艶上音夫下音焰奇徒頂反堆埠上都迴反下扶久反為𡋍胡耕反草木幹也正作莖虹𧺫上戶公反又音絳拔提上步末反三昧名三摩拔提生憘音喜生嬉同上也又許之許記二反非呼第三卷跋提上步末反鉾矟上莫侯反下所角反鉞斧上于月反下方武反獷音鑛行上息由反癡瘂烏雅反第四卷𬧅脛上市軟反下戶定反䏶膝上步米反下新七反寬骨上苦官反正作臗𦝫脊音積腹肋音勒正作肋頸項上居郢反下戶反肪膏上方房二音下音高腦膜上音𢙉下音莫亦作𦜩澹陰上徒甘反下於禁反正作痰癊洟唾上他計反柔䎡音軟齗齒上牛斤反肉也𤓰𩬊上爭巧反下方伐反栰喻上扶發反音啞上正作喑瘖二形也下烏雅反憒乱上古內反溝𫮺呼各反第五卷捷疾上自反憒𡗚女㒵反鑛上古郎反下古猛反堅䩕五孟反正作鞕逯得上徒愛反糠糟上苦郎反下苦外反正作糩也又音遭非麞鹿上之羊反問訊音信稠林上直由反第六卷微尠息淺反僉於上七廉反皆也咸也暫瞬音舜亦眴荖別上楚加反威勢音世右音悉正作膝𣜦師上音道引也觀察諸法行經四卷第一卷五音年貪焚郎含反正作婪惏二形也願鎧苦改反𠸍顏上私妙反嚬蹙上毗反下子六反義式音識捨扼音厄囒拏上洛干反下女加反撞弩上宅江宅絳二反下奴古反者䇿楚責反掉悔上大了反姓破上音性別經作娃經意冝作同戶卦反多能也娃又圭桂二音𢙢譯主偕為字第二卷詫字上丑架反𠻬字上宅加反妍妙上五堅反犀行上先𠔃反𭥦宿上莫巧反剔除上他的反叱責上尺一反第三卷枯燥乘老反𦽦菁上莫官反下即盈反不槩古愛反禁𨳰愽計反寬廣上苦官反毀呰音紫第四卷雜𡗚女㒵反村戍商注反鵁鶄上音交下音精似鳬項短有毛冠謫罸上知厄反嗟慨口代反慳悋力進反不謟丑染反蠱道上公五反蹴蹋上七六反下大塔反𣗥剌上居力反下七賜反量菩薩處胎經等三經十卷同帙菩薩處胎經五卷第一卷翅上尸反下所愁反自擗補益反褺衣也正作襞又音躃非用褺音牛呞音詩唼𠲿上子合反下所角反槁木上苦老反智上自反豪𨤲力之反沮壞上自与反臠力兖反肉塊也㨶香上都老反經作㨶非相棠宅耕反憒𡗚上古內反下女㒵反傒意上古詣反正作係也又音𠔃非咽上徒果反下烏賢反落也咽喉也言佛示現受食其食實不落喉中也經云諸佛受食威儀從閻浮提上至十八天皆見如來食不退轉菩薩及九地菩薩見旋疾天子接如來食於他方施作佛事是也經音義作應師以哊字替之哊禹六反說文云哊吐也咽嗌喉也此乃非是經意也嗌音益也愽㗱子集反噍也噍嚼也噍才妙反𮌨脹上疋江反下張亮反青瘀於據反第二卷揌持上子孔反普也真實音實漯生上尸入反四生之一也悞受上兵錦反作皼音古樂器不上音世正作勢𢙣獸尸右反正作獸創夷上又㽵反脣騫去𠃵反𧇊也鼻嵃魚蹇反㟞山㒵也經音義作𡹼字替之魚偃反如甕烏貢反如箕居之反如蕇音正作簞此應和尚有此噐名也小乘經云簞盛六十斛也經音義以篅字替之非也如栓巨月反杙也正作橜橛二形惔怕上徒敢反下普白反沽黃上古乎反經音義作蛄蟥岳峙池耳反抒水上音序渫也又直呂神与二反灰埌音浪塚也蚊蚋上無分反下而稅反伊奴禮反蛻身上書芮反又他外他臥夷雪三反𥥛徒骨反稚究上直利反𮑣义上布破反亦云毗樓愽义第三卷梯梐步米反勸恤辛律反憂也經音義以𮗼字替之音恤𮗼誘也勾璅上古侯反下蘇果反阿祁音耆或云阿逸多即勒也撓勾上苦交反擊也正作敲又呼高奴巧二反攪也乱也非此二呼剗以上初眼反勾摷蘇果反与鏁璅同也悞互相上乎故反𢯇讓上一入反羅戶木反今作縠倢疾上疾反利也便也瘻者上力朱反痀曲脊也又力主反穩便也䟽漏上所魚反密緻直利反挾密也龜䰿上居追反下徒何反魚鼈并列反蜎飛上烏玄反𧑮動上而兖反覆𦷥必祭反正作蔽倮跣上戶瓦反下先典反針𭉨即壘反碓囚上都退反下巨九反正作臼也琢石上竹角反次玉石也跱立上直耳反毛力反捲空上居願反𦥞也正作𢍶也南䀎音麵視也紹傒音計連也杻核上勑酉反下戶戒反鏁靽音半濩湯上戶霍反洋銅上余良反消也第四卷傃著上音計与係同也又音素誤溉灌上古氣古碬二反䖝蝗音皇豪𨤲音狸可俎慈与反又音阻非也搜求上所愁反蚑行上巨支反喘息上尺兖反𣷱水上音使速也正作駃深溷戶困反廁也濮湯上戶郭反正作鑊濩二形也又補木反非也食上徒官反𭥦宿上莫巧反觜宿上子危子委二反食上之忍反冗宿上苦浪反氐宿上丁𠔃丁禮二反萁宿上居之反奎宿上苦圭反或翹巨堯反禿梟音澆𢬘石上步保反菓苽古花反或作蓏郎果反𢦙編卑連反織也臅膢上徒木反下郎侯反互相上乎悟反虵𮓸香鬼反正作虺枯𤍜乘早反撩擲上力條反下亦作擿桎腹上知栗反正作挃鼎沸上丁反所污烏故烏臥二反處壯上尺与反下尸制反正作世避太宗諱故闕大僻毗益反法也正作辟瘂膢上烏雅反下力主反有甛徒兼反拍毱巨六反緾裹古火反盲鱉并列反光裏音里綜練上祖宋反秘讖初禁反𦍞羊上都西反百迮普一反上子老反下古乱反債上丁禮反𣹉古乱反一洸烏光反水深也正作汪也又音光非眼眴音舜豪𨤲力之反㸌然上呼郭反唼嗽上子合反下所卓反釤除上所銜反伐草也正作也又所鑒反大鐮也非義八関古還反正作關黿䰿上音元下音陁正作黿鼉第五卷堅䩕音硬潤漬疾賜反腥𬛓上蘇丁反下蘇刀反利崛其屈反木杅云俱反正作盂裏上音群正作帬嚙盂上五結反下云俱反馬鏘七羊反拒也正作槍𥑐頭上音甲束也正作押不杇許有反腐也正作朽也又音烏非也𦬔子上古敗反菜名𭇇耳上神尒反舌取物也正作舐舓𧉮三形忮行上巨支反正作蚑也又支義反非㘁泣上戶高反摩捫音門摸也安厝倉故反置也瓮裏上烏貢反下力耳反弘道廣顯三昧經四卷第一卷使勉音免恊懷上戶頰反恭怙苦各反敬也正作恪也又音戶非罪惚音𢙉恍惚上呼廣反下呼骨反上又音光非也治懌上正作怡与之反下羊益反恱樂也志七告反正作操慥無饜於焰反仂具上音力不懈也行上倉告反𦳁滅上呼高反手扷草也正作薅茠多奴定反恭恪苦各反亦作㤩懽恱上呼官反𭄧易上羊脂反乎也下羊義反不難周序全反迊也正作旋也上方經作旋無耦五口反正作偶煇明上暉混二音第二卷琦樹上巨冝反玉名也蔚有上於貴於勿二反文章也盛也熀明上戶廣反正作晄晃二形郭氏作筠輙反非炤煒上音照中音偉下合作燁云輙反忽遷七仙反怖悸巨季反洗盪徒朗反耶窴上序嗟反下莫瓶反䇢無上枯古反有讇丑染反𮆘而上莫結反狎音習聞上古瓦反憒𡗚上古內反下女㒵反黶然上音黯黑也又於琰反不猗於綺反澹泊上徒敢反下普伯反忍耐奴代反不𠇾音𠇲第三卷不偝步昧反无勘苦含反正作恭上巨焉反能敝必祭反正作蔽說上乘贊反布也無摷助交反鳥窠也又音抄非也完上自宣反下戶官反淵池上於玄反輪倉乎反大也正作諸經作麤或作麆蔍五形並同也琦異上巨冝反正作奇渜首上音儒正作𣽈也即是文殊菩薩也之𢣏音盖傘也又烏盖反非也問訊音信告也正作訊訙二形又相遂蘇對二反言也康彊巨羊反亦作強懽恱上呼官反無儔直由反无迮普吉反𢢩恠上音亰𢙢也正作驚如㕘倉南反第四卷𣽈首上而朱反疋夫上普吉反力贔音俻杜㒵勇捍戶岸反㩲榮上音拳下楚責反正作筞通疾反速也疾也正作寁疌二形又音接非也輕驫補遙補幽二反馬走㒵也飜疾上芳煩反奮曜上方問反拜暑常𥎀反悞明鑠書斫反鋒宭上音峯下音瘡濩湯上戶郭反施燈功德經一卷塌廟上他盍反𤥖幢上音保古寶字攣躃必益反手足屈病也正作躄瘠上力垂反下秦昔反輭語上而兖反獷古猛反燈䰅莫顏反前作墨鴦崛魔羅經等四經十卷同帙鴦崛魔羅經四卷第一卷阿磋七何反年上居月反其也辨慧上皮件反正作辯𧿇上徒何反下步末反鴦崛魔羅師名陁也悞純淑上市倫反下市六反暫受上自濫反指扴爭巧反正作自俱縛反擭也正作攫自絞古巧反阤音陁前作𧿇者悞捲屈上居軟反隧渃上直遂反下郎各反𫡿性上彼錦反𭤔有上許衣反作莫顏反素尺里反𦟛長上丑容反銅押音甲𤓰也無力垂反劣也鞠育上居六反坋污上步悶反下烏故反龜丑格反平齧上七沒反下五結反所螫呼各反蜿轉上於遠反濤波上徒刀反蕀㓨上居力反相亢苦浪反鎧解上苦改反蚊蚋上音文下音芮裸形上戶瓦反倮形同上躃地土毗益反乞匂音盖鹽油上羊廉反稊稗上徒𠔃反下步拜反第二卷傭作上羊反負債上音婦正作負蹴弊上七六反下毗世反履屣所綺反堪耐奴代反䲷鳥上古堯反輕躁子告反鵄鵂上尺脂反下計牛反罸黜丑律反輕𮆘莫結反輕無也闞上呼交反下呼鑒反虎怒聲也正作虓雄𭪴音竭剪㧓爭巧反酣醉上戶甘反中酒曰酣也下即遂反第三卷名恬音甜香苦頰反香匧同上咲華上私妙反綿纊音曠𮕾陁上之然反毀呰音紫津溜力右反第四卷嬉戲上許之反掉疑上大了反濁上子吉反攢求上子官反鑿山上自作反伏上之折反正作折迭為上田結反探華上倉改反正作採障𦿔必世反頭𤺨音瘡撨者上自焦反多𤺨音瘡蠅蜂音峯𧌃食上子合反正作唼𠾱驍上古堯反下自反震疊音𤗊怖也正作慴俛仰上眉遠反卜𡋍音誓蓍曰也正作筮也瞪矚上直陵反下之玉反不眴音舜顛沛音貝之輙音厄正作軛衝繫古的反正作擊無所有菩薩經四卷不𠡶音惓毀訾音紫𡑅油上烏甲反買贖市玉反嚙壞上五結反莫瞬音舜禪憙音喜灰燼似進反氣噓音虛纊廣上子容反正作縱毀呰音紫少上苦決反明度五十挍計經兩卷上卷道裁子才反悞細𣽈音軟𢙣臭尺右反下卷𢙣臭尺右反頭上苦昆反剔𩬇上他的反頭上苦昆反蠉飛上許緣反𧑮動上而兖反驕樂上居妖反螺飛上許緣反悮𦒱𢱊音亮薜荔上毗世反下力計反唐言餓鬼亨煞普庚反刑也煮之於鑊曰也正作烹祠祀上音詞下音似悲中陰經等五經十卷同帙中陰經兩卷上卷甄陁上之人反𠲿指上所角反把士上北馬反下正作土収攝上尸由反裸形上戶瓦反菓蓏郎果反上㐲無反怗汙上音點正作玷沾二形廅天上烏盍反此譯云光湏滯直世反瘡疣于求反姓上自木反𦟛䏶上丑容反下步米反下卷綖丸上音線正作綖緒在上徐与反膖脹上普江反下知向反荊棘居力反獨膢音樓正作髑髏足徙斯此反枯燥乘老反鞭筞上卑連反下初責反智劒居欠反剔除上他的反經音義作劒刎非大方廣如來秘密藏經兩卷上卷彼音岸法䗍音螺廁瑱田殿二音正作填鈿隱𦿔必祭反不𨓤音退穬音鑛下卷秘力進反𧢻嬈上尺二反下奴了反華䰅莫顏反速遼音聊遠也嬉樂上許記反不實音實月上女經兩卷上卷草茅莫交反嚬蹙上毗反下子六反草茅音猫啇客上尸羊反雜寶上自合反惚上而設反下奴老反㑢嚇上許刼反下呼格反相𢙢也正作愶也上又音却非也抑奪上於力反下徒活反呵喝呼割反又烏芥反非床耨而玉反煩𫁕於元反枉也曲也屈也正作冤頞上爭右反下烏割反不瞬音舜漂然上疋搖反呪咀阻䟽反壯麗上阻狀反浴上子老反曅于立于輙二反紅縹疋沼反莖稈古旱反樓櫓音魯雀墮徒果反城上女牆也遼窓上力條反正作寮句蘭上古侯反𮒌上子老反下之恱反捨上丘利反互作上胡悟反種顃力遂反輩也正作類也玉篇作談塩二音非用喑啞上於今反下烏雅反烟燻許云反杒械上勑酉反下戶介反撾辱上陟花反刖劓上魚越反下魚至反挑眼上吐條反儛𠱚上無府反下郎貢反歌嘯上古何反下蘇𠮧反㸦生上乎悟反繖盖上乘旱反愸衣上之頞反下卷從廣上即容反𦬔子上古邁反亦作芥隧下上直遂反又音遂非攘佉上尸羊尸向二反正作饟蠰二形也下丘迦反諸經並作商佉或云蠰佉此譯云螺上又而羊而兩二反非也大法皷經兩卷上卷諸雜在帀反生𨓤音退攻伐上古冬反恩恤相律反憂也之捊㐲牟反皷搥也白廨思淺反正作癬白㿍同上暨今上巨既反至也姝好上尺朱反美好也咲上尺之反下私妙反俞多上羊朱反益也下卷雄𭪴上乎弓反下巨列反燈爓羊贍反亦作焰焱小莬他故反袘作上式之反設也為也正作施又与支徒何他可三反並非周䄈序全反迊也還也正作旋又殊主徒𠋫二反並非也疇上直由反下普吉反偶也正作匹疋二形文殊師利問佛經兩卷上卷𦒿闍崛下巨勿反梵云𦒿闍崛唐言鷲峯那伽巨迦反此云龍羅茯苻福反蘿茯草名寶如小豆諸經云採菉豆或云採菽氏迦葉上古牙反下尸反善脾步迷反懽喜上呼官反大怵助㽵反正作牀介不上爭巧反正作𤓰橫上古猛反下古木反正作穬也穬穀稻未舂者也又上戶盲反下徒的反穀別名也正作䊮也言𤓰甲如一穬稻穀許不得太長也搔癢上乘刀反下羊兩反食徒官反𪁰上吉𠔃反下郎管反正作鷄𡖉腐爤上扶武反下郎嘆反絰咃上徒結反下吐何反梵云多絰咃此言如是亦云所謂謂入呪之初也阿㮈奴達反阤呵上徒何反僧柯古何反慓多弭上力日反下尒反上正作慄龜上徐兩反下居追反經名也目錄云象咳亦云象步楞伽上郎登反噉䔉音筭醍醐上徒𠔃反下戶吾反乳糜美為反及繖乘旱反亦作傘螺皷上郎禾反𭦟陁上莫官反擯榔上必頻反下洛堂反豆上子老反摩𨢘呼𠔃反正作𨢘梵言摩𨢘首羅此云大自在毗紉女久反正作細或咲私妙反忻也正作㗛䥫屑先結反枯𤍜蘓老反一而玄反正作邊末阤摩中音陁示言莫陁摩言中言莫著中也擣成上都老反浣濯上戶管反下宅角反涅槃僧梵云涅槃僧亦云泥婆珊此言裠卑挨才木反正作族翦𤓰上即淺反下爭巧反踐蹹徒盍反突吉羅上徒骨反此言𢙣作僧炎于廉反此云𨒫守義也伽他𡰱上巨迦反中徒何反此言不生義也經云若未犯前罪𨒫守護令不生是菩薩僧炎伽他𡰱字母說阿烏可反長阿烏何反說伊於以反長伊於者反說憂於有反長憂於牛反說力以反長力之反說梨力底反長梨力𠔃反說㙠於𠔃反說翳一計反說烏屋胡反說炮烏告反說菴烏含反說阿烏个反說迦居伽反說佉丘迦反說伽巨迦反說𠷐巨等反又巨者反說餓冝者反說遮章車反說車尺遮反說闍時遮反說禪時演反又時者反說若而者反說多知加反說他丑加反說陁宅加反說檀宅恨反又宅雅反說那女雅反輕多當何反輕他託何反輕陁徒何反輕檀徒恨反又徒可反輕那奴可反說波卜何反說頗普何反說婆蒲何反說梵蒲錦反又蒲可反說磨莫可反說耶夷柘反說羅來雅反說羅來个反說婆蒲个反又浮个反說捨尸夜反說屣所詐反說娑乘何反說訶呼何反說攞來雅反重結句如後阿阿伊伊憂憂梨梨㙠翳烏炮菴阿迦佉伽𠷐餓遮車闍禪若多他陁檀那多他陁檀那波頗婆梵磨耶羅羅婆捨屣娑訶攞已上三行准前𭃄脚讀之与𣵀槃䒭同䖝蚋而稅反五慾余玉反貪嗜也五欲者色聲香味觸是也甛味上徒兼反酢味上倉故反辢味上郎達反澁滑上所戢反生上郎管反于逯音代蚊䖟𧒢上音文中音盲下所擳反相皂莫挍反豫知上余庶反闇莫瓶反諂諭上丑染反下以朱反酤酒上古胡反賣也不𭟢於焰反正作𢣽柱杖上知主反𮊵步上力垂反𮕱耗呼告反无莫孝反儀狀也正作㒵貌勤筞楚責反下卷高拘音俱梨柯古何反只疧舸上支紙二音中丁禮反下古可反可庿倉故反正作庴犢子上大木反芿山上而陵而證二反迦葉比上音加中尸反下音毗律主姓也或云迦葉惟或云迦葉毗或云迦葉波唐言飲光脩妬又作姤都故反梵言修妬路亦云修多羅亦云蘇羅亦云素纜唐言契經墮渃郎各反髄上息委反下奴老反翦𤓰爭巧反糠糩上苦郎反下苦外反從泍而陝反煩惚奴老反又作惚灆弗上郎甘反梵言欝頭藍弗唐言猛喜子淤埿上於去反懽喜上呼官反憒閙上古內反下女㒵反棘㓨上居力反蕀㓨同上正作𣗥字從束挴𠫤上呼每反下力進反正作悔𠫤面淚上呼决反下力遂反正作血毀訾音紫輕𮆘莫結反穢洿烏故反舟杭戶郎反上子登反治飢瘡上直之反膏車上古到反𭟢離上一焰反林藪速走反闥𭂁冶上他達反中息夜反下羊者反未抲古何反膚履上又作蘆下民旨反多𧜟以世反波扡徒何反上都含反下余廉反龕嵐上苦含反下洛含反鍮跛上託侯反下音漱上子老反下所右反及跨苦化反唅此上戶南反口物也又火含戶紺二反非㴎貪上而陝反正作染亢旱上苦浪反飴之上音寺餧也正作飤飼二形即愈余主反病差也正作愈牛上疾津反牛名也八遍補見反周也迊也正作遍徧二形塗賦音付布也氣𠲿蘇奏反欬病也正作瘶嗽二形波拖徒何反前作波扡翕嵐上苦含反前作龕嵐又許及反非也悞鍮蒲末反前作鍮跛誤也經作烏灾反非也疧耶上丁以反又音祇非絲大乘密嚴經等五經十卷同帙大乘密嚴經三卷上卷序文筌其上七全反取也逗根上徒𠋫反止也唐上余稅反聖也御寓于矩反棟也說文与字字略同也宇宙也大也邊也正字㝢也属上力尚反下之玉反相連也夙遘上息六反下古豆反閔上眉殞反遽違上其據反道架音駕行也乘也或云道𨏦力進反舟接集二音櫂也橈也裝縹疋沼反經文虹電上戶東反下五𠔃五結二反正作霓竅隟上苦𠮧反下丘逆反蒸涌上之陵反䀲而上呼𭔹反𡨋也從日執柂徒我反舩尾繢像上戶對反奔電上布門反拽羊列反喘懼上尺兖反葦荻上為鬼反下的反如蜺五𠔃反而柂他我反長舒㒵也曳也又音他牛跡音跡服上音免冠也從曰免曰音𭥗軒宇直呂反門屏之間也禮云天子當而立遊𦧯去例反菡萏上胡感反下徒感反蓮華也縲絏上力追反下先結反蛛蝥上知朱反下丈夫反尓疋云蜘蛛也又音牟中卷陶工上徒刀反挻埴上或連反下市力反伶人上力丁反樂人也絲竹上息慈反匏木上蒲交反瓠也繁會上父幡反力上力竹反力併力也正作勠矩鞞上俱禹反下步迷反頡𩑜上賢結反下戶郎反鳥飛高下㒵也亦作也波濤徒刀反兔角上通故反摩掘烏角反正作握往上云記反數也遽也精粹息遂反治容上羊者反妖也正者冶蓊欝上烏公烏孔二反馳騖音務馳也奔也驅也兔上彼幽反虎也鑽燧音遂龜鼁音去尓疋𪓰蟾蠩又烏咼戶咼二反並蝦蟆属也別錄作耄環繞上戶関反下卷牝鹿上毗刃反雌也捊鼓上房謀反攢搖上子官反捅力上古岳反鼁衣上烏咼戶咼二反蝦蟆属正作鼁醋鹹戶緘反聾𥌒音古有涯冝崖二音水際也羽翰戶案反銛利上息廉反綜知上祖宋反惣也獷古猛反簡暢上古限反鍵羅上其偃反烏拖徒我反弭儋上尒反下都甘反翼從上羊力反下才用反沙汀他丁反水際平沙也蓮華靣經兩卷上卷華綖音線悉𦷥必袂反悉不現捫淚上門本反吞噬音逝正作噬也倒躃蒲益反闇莫瓶反哽咽上更杏反下一結反𧵤畜上猪暑反下丑六反聚也圍碁音其卜莁音逝正作筮也費用上妃沸反耗也惠也商賈音古佛塌音塔曷羅上寒割反裴富上扶非蒲迴二反經名金鏘七羊反兜上所姧反比嗜上蒲脂反下時利反裴囉上步迴反又音肥𡰱憩去例反下卷𢪛淚上文粉反率阤音陁摩俟床李反丘墟去魚反姞利上近乙反𦋺上居例反正作𦋺𮄆吱曷上蜜二反中去智反下何割反國王