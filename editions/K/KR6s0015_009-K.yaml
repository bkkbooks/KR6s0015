反感匱巨位反竭也乏也備殖上皮秘反下市力反殉利上辝閏反傲𢢔上五告反遽相上其據反競也急也記上𠉡記反住也委也委弃也謂弃而不荅也正作置置二形也四荅之一也佛垂般涅槃略說教戒經一卷𧴵易上莫𠋫反𡍭土上口佷反耕也力也治也掘地上其物反其月二反媟嫚上私列反狎也𢢔也下莫諫反悔也易也瑕疵上戶加反下才斯反崖畔上魚奇五佳二反制上兵媚反輕子告反正作躁踔擲上丑孝反急挫子臥反驚悟上居影反𥧝也戒也黑𧈭許鬼反正作虺閙憒古對反堤塘上丁兮反下徒郎反危脆此芮反不堅也滅十方𡨋經一卷憂灼之若反熱也痛也亦作㣿𢡖慼上倉感反下倉歷反侵嬈奴了而沼二反窹𥧌上三故反下蜜二反竊自上七結反妖蠱上於反下羊者反正作妖冶下又音古非姦邪上古顏反服上正領反正作整熊羆上于弓反下彼皮反溷邊上戶困反恱懌尸尺反悞佛印三昧經一卷推索上尺維反窮也下所革反求也臾頃上欲未反下苦反劇坐上其去反疾也正作勮遽二形又巨𨒫反非也𤢌狩上巨今反下尸呪反薜荔上毗計反下力計反此云餓鬼也上又愽厄反亦云閇荔多是也文殊師利般涅槃經一卷茂咤上莫𠋫反下竹加反揵推上巨焉反下直追反小鍾之類也智度論云銅揵𢹌是爓爓音焰佛卬因進反盲莫瓶反金剛頂經𭦟殊室利菩薩五字心陁羅尼品一卷大唐南天笁三藏金剛智譯開元錄云十一紙𭦟殊上莫官反梵云𭦟殊室利亦云文殊師利唐言妙吉祥䠒跪上乎悟反相柱知主反如栓巨月反弋也正作橜也又或作杙同羊力反獨鈷音古正作股𦙶二形枳里上吉以反𧿡曰𠼝上步末反中咨反下力𠔃反亦云𧿡日囉亦云𧿡折囉亦云𧿡遮羅亦云伐闍羅唐言金剛部𠷈音律吽泮上牛鳴音下普半反電𤥻似全反正作旋吽𠰢下音判正作泮𣒋進上年結反捻也正作捏桑上索郎反下戶沒反㮈𭉊上奴達反下吕角反正作𠸪遁走上徒本反怛𣑽上多達反拍開上音百正作擘𨶩智上戶臘反閇也亦作闔亡犯反正作鋑下上疾西反𦽆多上魚列反𡀔弭上郎悟反下尒反警悟上居影反下正作寤𤚥字上牟含反瑟姹丑架反晃然上戶廣反耨佉泚上內沃反中丘迦反下七細反哩磎上力耳反下𡰱奚反䞘哩上巨乞反跋日啢上步末反中咨反下力掌反下二二合遏伽上烏割反迦侘丑架反瑟咤丑加反𡬗嘌上寧壹反下力一反擢迷上大巧反皤嚩上步何反下無可反𡀩上郎各反悉𩐴亭音反拽車上羊列反下尺舍反霓迷上魚枳反嬉戲上許之反譟企曳上桒到反中丘智反下以世反下二二合度豍卑𠔃反巘提上魚蹇反拏穆上女加反下莫六反旃娜上之然反下奴可反此從旃娜囉字前十紙十一行據開元錄不少文也開元錄云十一紙是也此後二紙廿五行出品次錄不是金剛智三藏一系所譯者也未詳譯代人名也今疑是錯讀矣攞郎可反嚕莾上郎古反下莫朗反郝歌娜上呼含反中呼可反下奴可反中正作㰤虎吽上呼古反下許今反二合牛鳴音呼之卷初單作吽字是也下亦作𤙖𤙖緘三形也並見萇筠和尚韻殑伽上巨陵反下巨迦反蘗都上魚列反正作也又愽厄反非也瑟昵女日反枳哆上吉以反下多个反姥欶上莫古反下魯骨反正作𤜲也一字佛頂輪王經作姥𤜲是也下久瘶朔二音並非䭾哿上徒个反下古可反捻弊上奴𢯇反下并也反奴𢯇一入反捻字𭃄脚𭡖軄上音吕下而軄反自𭃄也今冝借音而質反甚善也㓛勣音積扷折上步末反下之熱市熱二反梵云扷折囉亦云遮羅亦云闍羅亦云嚩𭍒此卷初云𧿡日囉皆一也唐言金剛故知不是元譯一系文也姪力上丁以反文自𭃄啅嚕上竹角反莫喇郎割反皤伽上步何反隖瑟上烏古反剌陊上郎逹反下他可反自𭃄下又徒可反䭾𩕳奴頂反一𭃄㓛徳㽵嚴王一卷羯闌鐸上居謁反中郎干反下徒各反苾茤上毗必反下測俱反嗢鉢上烏沒反此云青花拘物頭上九愚反此云紅花分陁利上方文反此云白花蘇健提亦云湏𠃵提此云黑花𭦟陁羅上莫官反此云弱諸經云柔軟花佇𦗟上直与反揭嚕荼上巨列反中郎古反下宅加反枉死上於往反纔得上音才僅也輕淩音陵欺也恨忿芳粉反蘭若上郎干反亦云阿闌那唐言無諍亦云寂靜亦云無人處哀慜眉殞反怛姪田結反薜阿上毗計反婆麼莫果反梵謎莫計反唎泥上桒割反中力至反下奴計反地哩音里婆䫂多可反喇泥上郎達反下奴計反瑜地上羊朱反喇你奴耳反脯喇上音府或作晡音逋倉廩力審反勃陁上步沒反揭多喃上巨列反下女䧟反莫𠿒呼割反姪栗力日反目企去至反俱㨖陟利反栗閉音閇颯末上桒合反亦作䬃又音立麼下是臿貝二字臿初洽反川音音賚江西音作所賈反又音𧷮後三呼並非白𩚳音飯劇苦上巨𨒫反艱卒也輕此上去反戰悼徒了反正作掉鄔波上烏古反酸疼徒冬反荊棘居力反正作𣗥千佛因緣經一卷頻䗍鹿戈反衣裓古得反盛𦽦莫槃反華名天后戾吼反皇也號咷上胡高反下徒刀反憒閙上古𭔹反下女孝反𮤥浮上余廉反樹名也南洲因以為名闇暝莫瓶反毀呰音紫毀也善印一進反各儲音除副也創疣上楚𤴷反下于求反行德光太子經等二十二經二十二卷同帙德光太子經一卷羯隨上居謁反下祥規反或云羯毗或云加毗或云迦毗或云迦陵頻伽皆訛略也正言羯邏頻伽唐言好聲鳥也諭諂上羊朱反如𡱝音西貧寠其禹反憒亂上古內反𢭀嵐上序全反下郎含反拘𨳰愽計反蘭楯上郎干反下音順帶係戶計反緒也正作系橈槩上苦交反下苦盖反相繫也正作敲設也又上而招反下古代反非也鸕上郎乎反下自司反鶡鵯上居謁反下蒲卑反或云羯隨或云羯鞞正言羯邏頻伽唐言好聲鳥也並俗僻地上毗益反正作躃明𧰟音焰𨒫洇似由反正作泅根檔上音郎正作𢭗下都郎反杻械上抽酉反下戶或反憒𡗚上古內反下女㒵反拘閈音閇又音汗非躃地上步益反塌寺上他盍反𡨜照神變三摩地經一卷玄奘自朗反水災子才反正作災烖灾挑擲上他聊反下持石反吠舍𨤲上扶廢反下力之反𥟖呫上力𠔃反下昌反𥟖呫毗此云薄皮亦云同皮謂一男一女同一肉皰後分為二人寶𨥥音鑛揭闍上巨列反鄔波上烏古反斯上女八反國名正作痆雰散上芳文反憘貪上許里反聡以稅反輕蔑莫結反掉動上徒了反獷古猛反焚盪徒朗反悎悟上古孝反下五故反商主天子所問經我實神日反祇刦居葉反微咲私妙反喜也筭𢿘上蘇乱反大意經宮𨷂丘月反正作闕嶮岨上許撿反下側所反正作阻又七余反非也宮𨷂丘月反琦巨冝反抒盡上徐与反㳿也又神与直与二反渥出上奴𠔃反正作泥埿繈負上居兩反正作襁息逯第代二音及也誤蜎飛上於緣反蚑行上巨支反𧑮動上如兖反杼海与抒字同也音序湏蒲末反般特上步官反比丘名也蘓曷戶葛反比丘名也披拘㽞上音婆比丘名也亦云薄拘佛說堅固女經狹劣上胡夾反号勝此證反經音義作媵非也輕莫結反輕無也大乘四法經一卷磐曲上步官反白鵝五何反迴翔音祥稠林上直由反千輻音福縵莫官反警筞上居影反下初責反大乘流轉諸有經一卷羯蘭上居謁反下郎干反即迦陵頻伽鳥也綢密上直由反般泥洹後灌臘經一卷許經有貲計二字此𢙢悞書噠嚫上徒怛反下初覲反栲治上苦老反下直之反薜荔上步計反下力計反師子素䭾娑王断內經一卷牡母上毗忍毗言二反雌也正作牝也下莫口反四足之雄者也正作牡山藪乘走反冊子楚責反捕捉上蒲故反訴云上桒故反親蹙倉歷反正作戚又子六反非也囚縶知立反王矴丁定反拄下石欲擒巨今反慜念上眉殞反身上尺陵反正作秤右繞佛塔經一卷倉廩力審反堿穢上音狗正作垢鞠養上居六反詎能上奇与反佛說不增不減經衰惚音𢙉雖除上音雖是𧢻音觸從莫瓶反受持七佛名号所生功德經劇苦上巨𨒫反艱也枉生上於徃反佛臨般涅槃記法住經枯槁苦老反塵坌上直隣反下蒲悶反訕謗上所姧所諫二反穬古猛反費芳未反折挫子臥反未音全師子㽵嚴王菩薩請問經序文隆上烏花反凹也正作窊窪二形挾道上胡頰反駢羅上蒲田反諸蕃父番反滋也息也屏也又方煩反霈然上普盖反經文三皤蒲我反一搩張格反正作磔也又音竭非也蟲螘上直中反下冝豈反偏斜似嗟反離垢慧菩薩所問禮佛法經序文流湎兖反遠也正作緬而闢毗益反德跨苦化反頺運上徒迥反東壤而兩反洎龍𦙚上其既反下所卓反統括上他宋反下古活反發之刃反動也車後橫木也經文栰悉上扶月反城名也輕尺證反潛行上疾廉反深也沉也藏也止也正作潛替二形也有德女所問大乘經恬曠上徒兼也嶷然上魚力反𮧓屣所綺反差摩婆帝授記經都拏女加反溼潤上水入反佉陁上去迦反此云可食謂根菓也造塔功德經𥸮上子老反髭𤓰上即斯反下爭巧反妙色王因緣經稻蔗上徒老反下之夜反荒梗古杏反以箱思量反所飡倉安反卒求上倉沒反携子上戶圭反甲冑丈右反首鎧也佛為海龍王說法印經一卷無字佛說八部佛名經一卷勝𦔺丑耳反佛名也正作恥杺二形卓然上知角反高也正作卓𡏞坑上古侯反下口庚反正作溝坑字也燕坐上一見反魅上於反下眉秘反薜荔上蒲計反下力計反壙路上苦謗反鈔賊上楚孝反熊羆上于弓反下彼皮反虵蚖五官反又音元諸法㝡上王經一卷曾瞬音舜輭心上如兖反嚬蹙上毗反下子六反𡄇欬上苦頂反下苦愛反樓𨷂丘月反窓牖由聊反刪兜上所姧反或云珊兜率陁是兜率天王名也怛𮑣布火反𠷐伽上其陵反河名盪諸大朗反不澀所立反不挑大了暗顇自遂反癸卯歲高麗國大藏都監奉勑彫造
